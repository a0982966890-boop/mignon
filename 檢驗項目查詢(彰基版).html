00.0 ng/mL、81歲18.0~193.0 ng/mL、82歲17.0~186.0 ng/mL、83歲17.0~179.0 ng/mL、84歲17.0~173.0 ng/mL、85歲17.0~167.0 ng/mL。","i":"定量血清中IGF-1的濃度，協助臨床診斷生長狀況及作為評量營養狀態變化的指標。","cl":"類胰島素生長因子(insulin-like growth factor, IGF-1)或稱Stomatomedin-C(Sm-C)，是一個內含3個雙硫鍵的單一多胜?(peptide)，具有70個氨基酸分子量為7,649 daltons，是血液高濃度的營養調節因子，具調節大部分的生長賀爾蒙的功能；血液中IGF-1主要來自於肝臟，肝臟上富含GH接受器，還有其他器官也可以合成，IGF-1對營養作用敏感，結構上與IGF-2及Insulin同源。\nIGF-1在血液中的濃度主要受到GH刺激，並且在營養失調時受阻滯。多數血清中GH依賴性、生長促進性作用是由IGF-1來啟動機制，藉由IGFs的調節可合成代謝、促進生長作用，包括細胞增生、蛋白合成等。\n人體每個細胞幾乎都會受到IGF-1的影響，特別是肌肉、骨骼、肝臟、腎臟、神經組織、皮膚以及肺臟細胞；除類胰島素影響之外，IGF-1也可調節細胞生長與發育，特別是神經細胞，或是細胞DNA的合成。人體可終生產生IGF-1，在青春期時IGF-1會以最高速率生成，而最低的生成速率發生在嬰兒期與老年時期，人體血液中IGF-1的濃度在初生時期幾近於零，但隨幼兒期逐漸增加到青春期時上升到高峰，直到40歲以後再逐漸下降。\n在血液中IGFs鍵接餘載體上，此結合蛋白是相對於血液中IGF-1濃度，當IGF-1缺乏時，IGFs亦會迅速變動減少，此與血液中IGF-1濃度的穩定相關，因此IGF因子成為GH產量的一個可信指標。在診斷生長異常時，因GH濃度本身變化很大，通常需要刺激試驗來加以解釋，而IGF-1濃度穩定，因此可藉由IGF-1濃度來判斷生長激素(growth hormone, GH)分泌情形，是很好的GH指標。在生長激素缺乏症(垂體功能低下)或生長不足或身材矮小的孩子，體內IGF-1及GH濃度較低；在肢端肥大或巨人症的孩童，體內IGF-1及GH濃度較高，但在青春期時IGF-1濃度可能達成人正常濃度的4~5倍，因此在診斷此時期病人需特別小心。在懷孕時，IGF-1濃度也會增加。測定IGF-1也同時可用來作為評量營養狀態變化的指標。","tags":["荷爾蒙/內分泌"]},{"n":"IGF-BP3","c":"FENBP3","p":"自費","r":"否","ct":"02-黃頭管(Serum separator tu","d":"2mL全血","g":"生化免疫組","t":"其他","m":"化學冷光免疫分析法(Chemiluminescent immunometric method)","rv":"(1)Pediatric Reference Ranges(μg/mL):1 Age,(year):1.6(Median):0.7-3.6(Central95％Range)；2 Age,(year):1.8(Median):0.8-3.9(Central95％Range)；3 Age,(year):2.0(Median): 0.9-4.3(Central95％Range)；4 Age,(year):2.2(Median):1.0-4.7(Central95％Range)；5 Age,(year):2.4(Median):1.1-5.2(Central95％Range)；6 Age,(year):2.7(Median):1.3-5.6(Central95％Range)；7 Age,(year):2.9(Median):1.4-6.1(Central95％Range)；8 Age,(year):3.2(Median):1.6-6.5(Central95％Range)；9 Age,(year):3.6(Median):1.8-7.1(Central95％Range)；10 Age,(year):4.1(Median):2.1-7.7(Central95％Range)；11 Age,(year):4.5(Median):2.4-8.4(Central95％Range)；12 Age,(year):4.9(Median):2.7-8.9(Central95％Range)；13 Age,(year):5.4(Median):3.1-9.5(Central95％Range)；14 Age,(year):5.8(Median):3.3-10(Central95％Range)；15 Age,(year):5.9(Median):3.5-10(Central95％Range)；16 Age,(year):5.7(Median):3.4-9.5(Central95％Range)；17 Age,(year):5.3(Median):3.2-8.7(Central95％Range)；18 Age,(year):4.9(Median):3.1-7.9(Central95％Range)；19 Age,(year):4.6(Median):2.9-7.3(Central95％Range)；20 Age,(year):4.6(Median):2.9-7.2(Central95％Range)；IGFBP-3 (2)Adult Reference Ranges: 21-25 Age,(year):5.1(Median):3.4-7.8(Central95％Range)；26-30 Age,(year):5.2(Median):3.5-7.6(Central95％Range)；31-35 Age,(year):4.9(Median):3.5-7.0(Central95％Range)；36-40 Age,(year):4.8(Median):3.4-6.7(Central95％Range)；41-45 Age,(year):4.7(Median):3.3-6.6(Central95％Range)；46-50 Age,(year):4.7(Median):3.3-6.7(Central95％Range)；51-55 Age,(year):4.8(Median):3.4-6.8(Central95％Range)；56-60 Age,(year):4.8(Median):3.4-6.9(Central95％Range)；61-65 Age,(year):4.6(Median):3.2-6.6(Central95％Range)；66-70 Age,(year):4.3(Median):3.0-6.2(Central95％Range)；71-75 Age,(year):4.0(Median):2.8-5.7(Central95％Range)；76-80 Age,(year):3.5(Median):2.5-5.1(Central95％Range)；81-85 Age,(year):3.1(Median):2.2-4.5(Central95％Range)","i":"IGFBP-3可以用為測定生長異常的指標，由於它依賴生長激素的回饋調節故可用於評估生長激素的分泌。","cl":"在人體的血液中，IGFBP-3的濃度隨著幼兒時期逐漸增加，在青春時期到達濃度高峰，之後才逐漸下降。在生長異常疾病的診斷分面，測量血液中IGFBP-3的濃度是一個很好的生長激素分泌指標。在臨床和生長激素分泌有關的疾病，例如:肢端肥大症患者(Acromegly)是生長激素過多，IGF-1及IGFBP-3的濃度也較正常人偏高。成人生長激素缺乏症患者(Adult GH deficiency)，IGF-1及 IGFBP-3 的濃度較正常人偏低。而矮小症患者(Laron dwardism)，是因為生長激素受體的基因缺陷(genetic defects of the growth factor hormone receptor)造成，IGF-1及 IGFBP-3的濃度也較正常人偏低。近來文獻指出，IGF-1也和數種癌症有關，IGF-1的活性受IGFBP-3的調控。在人體內IGF-1的濃度上升，IGFBP-3的濃度下降，罹患癌症機率也比正常人增加;反之，若IGFBP-3上升可減少罹患癌症的機率。如IGFBP-3上升，罹患肺癌的機率為IGFBP-3下降的0.5倍，而罹患大腸癌為0.28倍。","tags":["腫瘤標記","荷爾蒙/內分泌"]},{"n":"IgG","c":"FBIIGG","p":"12025B(275點)","r":"是","ct":"03號綠頭管(Lithium heparin)","d":"全血3.5 mL","g":"生化免疫組","t":"其他","m":"免疫比濁法(Immunoturbidimetric assay)","rv":"成人: 635.0~1741.0 mg/dL;\n1個月: 251.0~906.0 mg/dL;\n2~4個月: 176.0~601.0 mg/dL;\n5~12個月: 172.0~1069.0 mg/dL;\n1~5歲: 345.0~1236.0 mg/dL;\n6~10歲: 608.0~1572.0 mg/dL.","i":"測量IgG濃度可輔助診斷蛋白代謝異常疾病和體內缺乏抵抗傳染性病原體能力。","cl":"免疫球蛋白由漿細胞(plasma cell)製造，在免疫系統中扮演與抗原反應之角色，當抗原與抗體反應後，IgM抗體濃度最早上升，其次為IgG及IgA抗體。定量免疫球蛋白抗體可協助臨床評估個體之免疫狀況。\n血清中免疫球蛋白減少常見於原發性免疫球蛋白缺乏、次發性免疫球蛋白缺乏如惡性腫瘤、淋巴性白血球增多症、多發性骨髓瘤及Waldenstrom’s disease。血清中免疫球蛋白增加於多株或單株免疫球蛋白增生，例如肝炎及肝硬化、急慢性感染、自體免疫疾病及臍帶血中因子宮內感染及heavy-chain disease等。單株免疫球蛋白增生需進一步分型及定量分析。","tags":["肝臟/膽道","腫瘤標記","貧血/血液疾病","自體免疫"]},{"n":"IL-6 (Interleukin-6,介白素-6)","c":"FSIIL6","p":"自費","r":"否","ct":"03號綠頭管(Lithium heparin tu","d":"全血2 mL","g":"生化免疫組","t":"其他","m":"電子化學冷光免疫分析法(Electrochemiluminescenceimmunoassay, ECLIA)","rv":"＜7.000 pg/mL","i":"定量血清中IL-6濃度，可作為急性發炎的早期指標，協助急重症病患的管理。","cl":"Interleukin-6(IL-6, 介白素)是一個具多功能的多效型細胞激素，最初被稱為干擾素β2、漿細胞腫瘤生長因子、肝細胞刺激因子，其後稱為人類B細胞刺激因子2(BSF2)，已證實對B細胞顯現活性，也對T細胞、造血幹細胞、肝細胞、腦細胞也會現顯活性。1989年報告指出也可在急性細菌感染的病患之人體偵測到。\nIL-6是一種會促進發炎的免疫蛋白，在與創傷、外傷、壓力、感染、腦死、腫瘤及其他急性發炎反應病程中均可快速的誘導IL-6的產生。\n其他輕微憂鬱可能會影響老年人的免疫系統，研究顯示即使只有一些憂鬱症狀，血液中也會有較高的IL-6，IL-6的濃度與心臟病、糖尿病、骨質疏鬆症及某些癌症有關，顯示心理健康與身體健康密不可分。","tags":["糖尿病","腫瘤標記"]},{"n":"Immunoelectrophoresis(Serum)(IgA, IgG, IgM)、Immunoelectrophoresis(Serum)(IgD, IgE)","c":"FBIIEP、FBIIEP2","p":"12103B(900點)","r":"是","ct":"02號黃頭管(Serum separator tu","d":"全血3.0 mL","g":"生化免疫組","t":"其他","m":"Immunotyping／Immunofixation electrophoresis","rv":"No evidence of monoclonal protein","i":"鑑別血清中是否存在monoclonal protein，協助鑑別意義未明的單克隆丙種球蛋白病(Monoclonal gammopathy of undetermined significance, MGUS)、多發性骨髓瘤(Multiple myeloma)、華氏巨球蛋白血症(Waldenstrom macroglobulinemia)、澱粉樣變性(Amyloidosis)等疾病。","cl":"在血清與尿液蛋白電泳圖中主要在beta-球蛋白及gamma-球蛋白地帶出現異常的區間，通常被懷疑為單株球蛋白(M-蛋白質、異常蛋白質，單株免疫球蛋白)因而視為單株gamma球蛋白病。\nMonoclonal band的出現可分為良性與惡性。良性可見於MGUS(Monoclonal Gammapathy of Undetermined Significance) Monoclonal Immunoglobulin 濃度小於2000 mg/dL。其他Immunoglobulin濃度正常，且尿液中無Bence Jones Protein。Monoclonal Immunoglobulin濃度不會隨時間而增加。其他Immunoglobulin濃度不會隨時間而減少。惡性可發現於B lymphocytes chronic lymphoid leukemia，immunoblasts Burkitt lymphoma， lymphoplasmocytes Waldenstrom disease，heavy chain disease，plasmocytes myeloma。Monoclonal Immunoglobulin濃度大於3000 mg/dL。其他Immunoglobulin濃度減少，且尿液中可能Benece Jones Protein。Monoclonal Immunoglobulin濃度不會隨時間而增加。","tags":["腫瘤標記","貧血/血液疾病"]},{"n":"Immunofixation electrophoresis(Urine) (免疫固定電泳分析(尿液))","c":"FBIIEPU","p":"12159B (900點)","r":"是","ct":"66號白頭塑膠管，得以35號50mL無菌管。","d":"尿液5.0 mL","g":"生化免疫組","t":"其他","m":"免疫固定電泳分析法(Immunofixation electrophoresis)","rv":"No evidence of monoclonal protein","i":"鑑別尿液中是否存在monoclonal protein，鑑別多發性\n骨髓瘤、Waldenstrom’s disease、paraprotein種類、輕鏈、重\n鏈。","cl":"在血清與尿液蛋白電泳圖中主要在beta-球蛋白及gamma-球蛋白地帶出現異常的區間，通常被懷疑為單株球蛋白(M-蛋白質、異常蛋白質，單株免疫球蛋白)因而視為單株gamma球蛋白病。\nMonoclonal band的出現可分為良性與惡性。良性可見於MGUS(Monoclonal Gammapathy of Undetermined Significance) Monoclonal Immunoglobulin 濃度小於2000 mg/dL。其他Immunoglobulin濃度正常，且尿液中無Benece Jones Protein。Monoclonal Immunoglobulin 濃度不會隨時間而增加。其他Immunoglobulin濃度不會隨時間而減少。惡性可發現於B lymphocytes chronic lymphoid leukemia，immunoblasts Burkitt lymphoma， lymphoplasmocytes Waldenstrom disease，heavy chain disease，plasmocytes myeloma。Monoclonal Immunoglobulin濃度大於3000 mg/dL。其他Immunoglobulin濃度減少，且尿液中可能存在Bence Jones Protein。Monoclonal Immunoglobulin濃度不會隨時間而增加。","tags":["腫瘤標記","貧血/血液疾病"]},{"n":"Immunoglobulin G subclass","c":"FBIIGS","p":"12146B(400點)+12147B(400點)+12148B(400點)+12149B(400點)","r":"是","ct":"02號黃頭管(Serum separator tu","d":"全血3 mL","g":"生化免疫組","t":"其他","m":"免疫散射法(Immunonephelometry assay)","rv":"IgG1 (2.5th and 97.5th percentile): ≦1y: 151-792 mg/dL, >1~≦3y:265-938 mg/dL, >3~≦6y: 362-1228 mg/dL, >6~≦12y: 377-1131 mg/dL, >12~≦18y: 362-1027 mg/dL, >18y: 405-1011 mg/dL; IgG2 (2.5th and 97.5th percentile): ≦1y: 26-136 mg/dL, >1~≦3y:28-216 mg/dL, >3~≦6y: 57-290 mg/dL, >6~≦12y: 68-388 mg/dL, >12~≦18y: 81-472 mg/dL, >18y: 169-786 mg/dL; IgG3 (2.5th and 97.5th percentile): ≦1y: 9.3-92.0 mg/dL, >1~≦3y:8.7-86.4 mg/dL, >3~≦6y: 12.9-78.9 mg/dL, >6~≦12y: 15.8-89.0 mg/dL, >12~≦18y: 13.8-105.8 mg/dL, >18y: 11.0-85.0 mg/dL; IgG4 (2.5th and 97.5th percentile): ≦1y: 0.4-46.4 mg/dL, >1~≦3y:0.9-74.2 mg/dL, >3~≦6y: 1.3-144.6 mg/dL, >6~≦12y: 1.2-169.9 mg/dL, >12~≦18y: 4.9-198.5 mg/dL, >18y: 3.0-201.0 mg/dL","i":"定量血清中IgG subclass濃度，協助免疫功能低下相關疾病之診斷。","cl":"人體IgG抗體由4個subclasses為IgG1，IgG2，IgG3，IgG4組成。不同的IgG subclasses具不同的生理功能：如抗原辨識，補體活化，細胞表面受器的結合。IgG1佔total IgG相對的比例為60-75％；IgG2佔total IgG相對的比例為15-25％；IgG3及IgG4佔total IgG相對的比例分別低於10％。許多研究報告顯示serum IgG subclasses與反覆性上、下呼吸道感染有關聯。IgG1降低，可能與一般免疫缺陷相關。IgG2缺乏，由於病毒或細菌性的感染，造成個體對於免疫反應的缺陷。IgG2濃度偏低，可能與呼吸道感染及自體免疫疾病相關。腎病症候群，可見低濃度的IgG1和IgG2，特別是小變化的腎炎。泌尿道受相關的病毒感染，可見IgG3低下。患者患有慢性的支氣管炎和支氣管擴張，可檢測到極低濃度的IgG4。IgG subclasses的濃度會因為患有自體免疫疾病、神經方面症狀和HIV感染而有改變。多株的增加IgG subclass會發生於慢性的抗原刺激，但僅可作為第二線的診斷參考。","tags":["腎臟","感染/敗血症","自體免疫","結核/呼吸道"]},{"n":"Immunoglobulin M","c":"FBIIGM","p":"12029B(275點)","r":"是","ct":"03號綠頭管(Lithium heparin)。","d":"全血3.5 mL","g":"生化免疫組","t":"其他","m":"免疫比濁法(Immunoturbidimetric assay)","rv":"成人: 45.0~281.0 mg/dL; \n1~4個月: 17.0~105.0 mg/dL;\n5~9個月: 33.0~264.0 mg/dL;\n10個月~1歲: 41.0~173.0 mg/dL;\n2~8歲: 43.0~207.0 mg/dL;\n9~10歲: 52.0~242.0 mg/dL.","i":"定量血清中IgM濃度，協助診斷免疫相關疾病。","cl":"免疫球蛋白由漿細胞(plasma cell)製造，在免疫系統中扮演與抗原反應之角色，當抗原與抗體反應後，IgM抗體濃度最早上升，其次為IgG及IgA抗體。定量免疫球蛋白抗體可協助臨床評估個體之免疫狀況。\n血清中免疫球蛋白減少常見於原發性免疫球蛋白缺乏、次發性免疫球蛋白缺乏如惡性腫瘤、淋巴性白血球增多症、多發性骨髓瘤及Waldenstrom’s disease。血清中免疫球蛋白增加於多株或單株免疫球蛋白增生，例如肝炎及肝硬化、急慢性感染、自體免疫疾病及臍帶血中因子宮內感染及heavy-chain disease等。單株免疫球蛋白增生需進一步分型及定量分析。\n異常的血清免疫球蛋白濃度範圍是寬廣多樣化的。免疫球蛋白濃度範圍從單一種或結合多種免疫球蛋白(IgG抗體，IgA和IgM)的缺乏到增加皆屬於異常濃度範圍。檢測免疫球蛋白濃度可以幫助診斷蛋白代謝異常疾病和體內缺乏抵抗傳染性病原體能力的個體。","tags":["肝臟/膽道","腫瘤標記","貧血/血液疾病","自體免疫"]},{"n":"Immunophenotyping for Leukemia/lymphoma (白血球、淋巴瘤表面標記檢查)","c":"FCMSML","p":"12206B (8000點)","r":"否","ct":"採檢容器：Blood、Bone Marrow、Ot","d":"5 mL","g":"血液及組織相容組","t":"1週以上","m":"Immunophenotyping by flow cytometry","rv":"血液腫瘤科醫師配合臨床診斷及其他實驗室數據進行判讀","i":"懷疑血液相關疾病如白血病、淋巴瘤時可申請此檢驗。","cl":"(1)白血病的免疫分型以流式細胞儀利用螢光染劑標記的單株抗體作探針，多參數分析白血病細胞的細胞膜、細胞質、甚至於細胞核的免疫表型，由此瞭解被測細胞所屬之系列及其分化程度，能區分細胞起源、劃分其分化發育階段。經細胞表面抗原分析，可用來協助鑑定各類型之白血病。\n(2)針對B-ALL，當收集500,000顆白血球時，Minimal Residual Disease Protocol (MRD)最低測試極限可達0.01%。","tags":["貧血/血液疾病"]},{"n":"Indium (In) (血清銦)","c":"FDPIND","p":"01078B (400點)","r":"否","ct":"65號紅標籤深藍頭管","d":"全血5 mL (最少採檢量3 mL)","g":"生化免疫組","t":"1週以上","m":"誘發偶合電漿質譜儀 ( Inductively Coupled Plasma – Mass \nSpectrometry)","rv":"＜3.00 μg/L","i":"定量血清中銦濃度，協助監控銦暴露狀況。","cl":"銦非人體必須元素。銦化合物可藉由攝入或是吸入進入人體中，主要儲存位置於肌肉、皮膚和骨頭內，而人體經由尿液及糞便來排泄銦的方式主要取決於其化學形式，而銦的生物性半衰期大約兩週。銦化合物的職業暴露會造成潛在的健康危害，例如：工業上使用的銦-錫氧化物（ITO）製造平板顯示器。\n暴露型態分以下兩種：\n(1)急性暴露：以吸入或攝入暴露到含銦的化合物會刺激眼睛、皮膚、黏膜、呼吸系統，可能會有的症狀包括灼燒刺激感、咳嗽、呼吸困難、頭痛、噁心、嘔吐等。\n(2)慢性暴露：經由呼吸道接觸到各種含銦的化合物包括氯化銦(indiumchloride, InCl3)、磷化銦(indium phosphide, InP)、砷化銦(indiumarsenide, InAs)、三氧化二砷(indium trioxide, In2O3)、氧化銦錫(indium tin oxide)會造成肺部發炎及增生。目前有研究指出人體在暴露氧化銦錫四年後，會造成肺纖維化疾病。","tags":["其他"]},{"n":"Inflammatory Myopathies autoantibodies自體免疫發炎性皮肌病自體抗體檢測","c":"FSIMYO","p":"12137B(600點)*1+12155B(600點)*1+12063B(300點)*6","r":"是","ct":"03號綠頭管(Lithium Heparin)","d":"全血2.0 mL","g":"生化免疫組","t":"其他","m":"Immunoblot","rv":"Negative","i":"定性檢測血清中Autoimmune Inflammatory Myopathies autoantibodies(IgG) (anti-Mi-2α、Mi-2β、TIF1γ、MDA5、NXP2、SAE1、Ku、PM-Scl100、PM-Scl75、Jo-1、SRP、PL-7、PL-12、EJ、OJ與Ro-52)，輔助診斷皮肌炎(Dermatomyositis)、多肌炎(Polymyositis)、特發性肌炎(Idiopathic inflammatory myopathy)、抗合成?綜合症(Anti-synthetase syndrome)、重疊綜合症(Overlapping syndrome)，相關疾病診斷需結合病患臨床表徵。","cl":"肌炎是骨胳肌炎症性疾病，可能是因感染、毒素或免疫功能失調所致。\n遺傳因素引起的肌炎，進行性骨化性肌炎(Fibrodysplasia Ossificans Progressiva, FOP)，也叫進行性多發性骨化性纖維發育不良或Munchmeyer’s疾病，是一種人體支持組織和結締組織的進行性僵化。\n自體免疫性肌炎(特發性炎症性肌肉病變)是系統性自體免疫性疾病，伴有骨胳肌炎症，對稱性近端疼痛和肌無力，發生率為每年十萬分之0.1~1，陽性率為十萬分之1~6，男女比例為1:2。自體免疫性肌炎可以分為成人多肌炎(約30%)，成人皮肌炎(約30%)，肺、卵巢、乳腺、胃腸道和骨髓增生性疾病中的副瘤性多肌炎(約8%)，伴有血管炎的兒童肌炎/皮肌炎(約7%)，以及與自體免疫性疾病相關的肌炎，例如風濕性關節炎，紅斑狼瘡，混合性結締組織病(MCTD)，以及一些罕見形式例如肉芽腫病，嗜酸性粒細胞增多症，中心體和包涵體肌炎(約20%)。需要注意皮肌炎/多肌炎的病源多為副瘤性，尤其在老年患者中。皮肌炎症狀甚至可在檢測到腫瘤前出現。\n多肌炎(PM)是一種病因不明的骨胳肌系統性炎性疾病，伴有外周血管的淋巴細胞浸潤。如果累及皮膚，則稱為皮肌炎(DM)。實驗室檢測結果顯示肌炎患者肌?濃度升高並出現非特異性炎症，例如CRP濃度升高，發熱和ESR升高。肌炎相關自體抗體的檢測對於多肌炎/皮肌炎的診斷、疾病病程的控制和治療管理起著重要的作用，雖然該病的死亡率很高(心肺病變是導致死亡的主要原因)，但是一半的患者可以完全康復，儘管可能會有持續的輕度肌無力表現。經治療後30%患者疾病會停止發展，而20%的病人則病情 惡化。\n目前已知的肌炎特異的和肌炎相關抗原的重要IgG型抗體可在患者血清或血漿中檢測到，包括針對以下抗原的自體抗體：Mi-2 (Mi-2alpha and Mi-2beta亞型), TIF1γ, MDA5, NXP2, SAE1, Ku，PM-Scl100，PM-Scl75，Jo-1，SRP，PL-7，PL-12，EJ，OJ和Ro-52。\nMi-2(NuRD複合物的解旋?蛋白成分)\n抗Mi-2(核解旋?)抗體對皮肌炎有高特異性(約95%)，尤其對肥厚性甲折疊的皮肌炎。在15%到30%的皮肌炎患者中可檢測到該抗體。在8%到12%的特發性肌炎患者中也可檢測到抗Mi-2抗體。一些多肌炎患者，極少的包涵體肌炎患者也可檢出抗Mi-2抗體陽性。抗Mi-2抗體通常在疾病早期就可通過血清學檢測到。疾病早期檢測到抗Mi-2抗體陽性的皮肌炎患者(包括青少年)通常會有一個良性的發展。然而，抗Mi-2抗體陽性的皮肌炎也可能跟腫瘤形成相關，如結腸癌或乳腺癌。\nMi-2 alpha(CHD3, 染色質解旋?DNA結合蛋白3)\nMi-2 alpha是Mi-2的兩個亞型抗原之一，抗Mi-2alpha的自體抗體，與抗Mi-2具有大致相同的血清學診斷意義，在大約20%的皮肌炎患者中可檢出。 \nMi-2 beta(CHD4, 染色質解旋?DNA結合蛋白4)\nATP依賴的解螺旋?CHD4，Mi-2beta是Mi-2的主要亞型，其自體抗體的血清學檢測在與腫瘤相關(如結腸癌或乳腺癌)的皮肌炎患者中檢出率更高。 \nTIF1γ(Transcriptional intermediary factor, 轉錄仲介因數1- gamma)\nTIF1-gamma抗體檢測在15%的皮肌炎患者中可檢出，且只在這些人中檢出。因此，抗TIF1-gamma抗體的檢測對皮肌炎的診斷是明確的。約58%的抗TIF1-gamma陽性患者，皮肌炎伴隨其它惡性疾病(如胰腺癌)。 \nMDA5(AntiYmelanoma differentiationassociated protein 5, 黑色素瘤分化相關基因5)，同IFIH1(解旋?C誘導干擾素域1)\n抗MDA5的自體抗體可在13%至26%的皮肌炎患者中檢測到。它對臨床無肌病性皮肌炎(這類患者中的95%抗MDA5抗體陽性)或合併間質性肺病的皮肌炎高度特異。 \nNXP2(AntiYnuclear matrix protein 2 autoantibodies) (MJ-p140-MU 140 kD蛋白，同MORC3，小睾丸家庭CW型鋅指3)抗NXP2自體抗體可在18%到25%的青少年多發性肌炎/皮肌炎(JDM)和約1%的成人病例中檢出。這種形式的肌炎/皮肌炎的特點是伴隨鈣質沉著症和特別嚴重的慢性疾病過程。在成人中，可能是癌症相關(乳腺癌、子宮癌或胰腺癌)。 \nKu(甲狀腺自體抗原，70kd G22P1)\n抗Ku(DNA結合的，非組蛋白蛋白質)抗體最初發現於多肌炎-硬皮病重疊綜合症。之後，多種自體免疫性疾病中均可檢測到抗Ku抗體，抗Ku抗體在這些疾病中的發生率不同，且與種族相關。抗Ku抗體在系統性紅斑狼瘡(SLE)中的發生率可達10%。SLE是一種系統性自體免疫性疾病，屬膠原病的一種，主要表現有臉頰部出現蝶形皮疹。40%抗Ku抗體陽性患者表現出肌炎或系統性硬化症(SSc)的症狀，SSc是一種慢性自體免疫性疾病，主要表現皮膚、關節和內部器官(如食管、肺、心和腎臟)的纖維化。抗Ku抗體也可見於乾燥綜合症。 \nPM-Scl100 / PM-Scl75(位於核仁和核漿顆粒中核糖核酸外切?上的抗原；核仁PM-Scl大分子複合物PM-1的蛋白質)\n抗PM-Scl(PM-1)抗體的抗原是PM-Scl大分子複合物的幾種蛋白。兩種主要抗原蛋白成分是PM-Scl75和PM-Scl100，兩個蛋白的分子量不同。抗PM-Scl抗體幾乎100%識別PM-Scl100抗原，對PM-Scl75的識別率是50~60%。抗PM-Scl抗體(針對PM-Scl75和PM-Scl100的抗體)在重疊綜合症患者中的陽性率為50%-70%，這類疾病表現?多肌炎(PM)、皮肌炎(DM)和系統性硬化症(SSc)症狀的重疊。SSc患者主要是抗PM-Scl75抗體陽性。抗PM-Scl75抗體能夠在3%的多肌炎患者、2~3%的SSc患者和24~50%的重疊綜合症患者中檢出。如果只檢測抗PM-Scl100抗體，則大部分SSc患者會漏檢。該抗體濃度和疾病活動性之間沒有相關性。由於抗PM-Scl抗體與HLA II型等位基因之間存在強關聯，這些抗體幾乎僅在白種人中能夠檢測到。 \nJo-1(AntiYhistidyl-tRNA synthetase, 組氨醯-tRNA合成?)\n抗Jo-1抗體在多肌炎中的陽性率為25%-55%，特異性幾乎100%。多肌炎患者通常同時患有其他自體免疫性疾病，如SLE、系統性硬化症或肺間質纖維化。也可能出現雷諾現象、多滑膜炎和發燒等其他症狀。抗Jo-1抗體的效價可能隨疾病活動性而變化，在成功治療或症狀緩解後可轉陰性。\nSRP(AntiYsignal recognition particle, 信號識別顆粒，核糖核蛋白複合體)\n抗SRP抗體在多肌炎患者中的檢出率約為5%(特異性約90%)。抗SRP抗體是壞死性肌病(抗SRP綜合症)的標誌。壞死性肌病症狀多為急性、嚴重的近端對稱性骨胳肌無力，和肌痛(包括心肌)。該病的肌外症狀可以是間質性肺病。 \nPL-7(Anti-threonyl-tRNA synthetase, 蘇氨醯-tRNA合成?)\n抗PL-7抗體在肌炎患者中的陽性率大約為3%-6%，也出現在與SLE、系統性硬化症或肺間質纖維化重疊的患者中。 \nPL-12(Anti-alanyl-tRNA synthetase, 丙氨醯-tRNA合成?)\n抗PL-12抗體在肌炎患者中的陽性率大約為3%。患者常表現出纖維性肺泡炎、關節痛、肢端硬化症或雷諾氏綜合症。 \nEJ(Anti-glycyl-tRNA synthetase, 甘氨醯-tRNA合成?)\n抗EJ抗體是多肌炎的診斷標記物，陽性率為1~3%。也可見於肺間質纖維化，以及與SLE，關節炎以及雷諾氏綜合症重疊的重疊綜合症中。 \nOJ(Anti-isoleucyl-tRNA synthetase, 異亮氨醯-tRNA合成?)\n抗OJ抗體與多肌炎患者(陽性率3%)和肺間質纖維化(陽性率3%)相關。抗OJ抗體也可見於雷諾氏綜合症以及與風濕性關節炎重疊的重疊綜合症。主要症狀為肌無力，某些情況下與多發性關節炎相關。 \nSAE(anti-small ubiquitin-like modifier activating enzyme) (SAE1/SAE2)-相撲活化?亞基1(40kDa)和2(90kDa)\n抗SAE1自體抗體是8%的皮肌炎患者的高度特異性標記物，在成人皮肌炎伴隨間質性肺病(ILD)中的檢出率為5%。\nRo-52\n抗Ro-52抗體在肌炎患者中的陽性率為25%。抗Ro-52抗體常常出現在一些風濕性和非風濕性疾病中。Anti-Ro-52抗體在新生兒狼瘡和先天性心臟阻滯中具有重要作用。在這些病例中，某些特殊的抗原表位很可能與孕期的併發症相關。\n採用間接免疫螢光法篩查有時檢測不到抗細胞質抗原抗體(Jo-1，SRP，PL-7，PL-12, EJ, OJ 與Ro-52)，建議篩查試驗(IIFT)與確認試驗(EUROLINE)同時進行。","tags":["甲狀腺","腫瘤標記","自體免疫"]},{"n":"Infliximab (英夫利昔單抗)","c":"FDPINF","p":"自費","r":"否","ct":"02號黃頭管(Serum separator tu","d":"3 mL全血","g":"生化免疫組","t":"1週以上","m":"螢光免疫分析(Fluorescence immunoassay, FIA), Boditech AFIAS1","rv":"<0.20 μg/mL","i":"定量測定血清中free Infliximab濃度，可作為接受infliximab治療病人的血中藥物濃度監控之依據。","cl":"Infliximab是一種用於治療多種自身免疫性疾病的嵌合單株抗體。其適應證包括克隆氏症、潰瘍性結腸炎、類風濕性關節炎、僵直性脊椎炎、乾癬性關節炎及斑塊型乾癬。其給藥途徑為靜脈注射。Infliximab藉由與水溶性及穿膜型式的TNF-α形成高親合力結合及抑制TNF-α與其受體結合來中和TNF-α的生物活性。Infliximab不會中和TNF-β (lymphotoxin-α)，TNF-β是一種與TNF-α使用相同受體的相關細胞激素。TNF-α的生物活性包括：誘導促發炎細胞激素如IL-1與IL-6、藉由增加內皮層的通透性與內皮細胞及白血球黏著分子的表現來促進白血球的移動、活化嗜中性白血球與嗜酸性白血球的功能活性、誘導急性期反應物及其他肝臟蛋白、及滑膜細胞(synoviocyte)或軟骨細胞生成的組織降解酵素。表現出穿膜型TNF-α的細胞與infliximab結合後，不論在活體外或活體內皆會被溶解。Infliximab在各種使用人類纖維母細胞、內皮細胞、嗜中性白血球、B及T淋巴細胞與上皮細胞的活體外生物檢測中，皆顯示可抑制TNF-α的功能活性。\n臨床療效與下次給藥前血中infliximab濃度(trough level)有密切相關，藉由監測血中藥物濃度，可協助制定個人化劑量策略，提升治療成效。","tags":["自體免疫","藥物/毒物監測"]},{"n":"Influenza A/B Ag rapid test (流行性感冒病毒抗原快速檢驗)","c":"FVPINF","p":"14065C (150點)/ 14066C (150點)","r":"是","ct":"#87流感抗原專用拭子","d":"不適用","g":"微生物組","t":"其他","m":"免疫螢光法(Immunofluorescence assay, FIA)","rv":"Negative","i":"Sofia Influenza A+B FIA抗原檢驗採用免疫螢光技術，測定為直接由鼻腔拭子檢測流行性感冒A與B型抗原之快速定性法。此測定用來幫助快速鑑別診斷急性流行性感冒病毒A與B型感染。","cl":"流感病毒是導致呼吸道高傳染性、急性和病毒性感染的病原體。流感病毒是具有大量變種的單鏈RNA病毒。流感病毒主要有三種類型：A型、B型和C型。A型流感病毒是最常見的，常與最嚴重的流行病相關。B型流感病毒所引發的疾病通常比A型流感病毒溫和。C型流感病毒與人類疾病的大流行無關。A型和B型流感病毒可以同時出現，但通常在一個特定季節只有其中一種會主導流行地位。每年冬季台灣都有小規模流行，約每十年有一次大規模的流行。","tags":["其他"]},{"n":"Influenza A/B RNA (qualitative)流感病毒A型和B型核酸擴增試驗(定性)","c":"FVPIRP","p":"12183C x 2 (2400點)","r":"否","ct":"#81 RP拭子/保存液","d":"至少3 mL","g":"微生物組","t":"其他","m":"多重即時反轉錄聚合酵素連鎖反應 (Multiplex real-time RT-PCR)","rv":"Not detected","i":"進行A型流感、B型流感的鑑別診斷，並無檢測C型流感。\n陰性結果並不能排除流感病毒或呼吸道融合病毒感染，不應作為唯一使用治療或其他病患管理決策的基礎。相反地，陽性結果不排除細菌感染或與其他病毒共同感染。檢測到的因子可能不是明確的疾病原因。","cl":"進行A型流感、B型流感的鑑別診斷，並無檢測C型流感。\n陰性結果不能排除流感病毒感染，不應作為唯一使用治療或其他病患管理決策的基礎。相反地，陽性結果不排除細菌感染或與其他病毒共同感染。檢測到的因子可能不是明確的疾病原因。\n流感和呼吸道融合病毒是呼吸道感染的主要原因。流感病毒由三種類型：A型流感、B型流感和C型流感病毒。A型流感進一步分為兩類膜蛋白，血凝素（H）和神經氨酸?（N）。在美國，A型流感H1N1、H3N2和B型流感是主要的季節性病毒。流感症狀包括發燒、寒顫、頭痛、不適、咳嗽、鼻炎、噁心、嘔吐和腹瀉。呼吸道融合病毒是一種常見的病毒，導致成年人輕度，感冒樣症狀，但可能在嬰幼兒、老年人和慢性心臟病或肺部疾病的成年人中導致嚴重的疾病。流感自動和快速檢測可以幫助有效控制，適當選擇治療和預防疫情。","tags":["感染/敗血症","結核/呼吸道"]},{"n":"Influenza A/B/RSV RNA (qualitative) A/B流感病毒與呼吸道融合病毒核酸擴增試驗(定性)","c":"FVPRSV","p":"12183C x 3 (3600點)","r":"是","ct":"#81 RP拭子/保存液","d":"至少3 mL","g":"微生物組","t":"其他","m":"多重即時反轉錄聚合?連鎖反應 (Multiplex real-time RT-PCR)","rv":"Not detected","i":"進行A型流感、B型流感、呼吸道融合病毒的鑑別診斷，並無檢測C型流感。\n陰性結果並不能排除流感病毒或呼吸道融合病毒感染，不應作為唯一使用治療或其他病患管理決策的基礎。相反地，陽性結果不排除細菌感染或與其他病毒共同感染。檢測到的因子可能不是明確的疾病原因。","cl":"流感和呼吸道融合病毒是呼吸道感染的主要原因。流感病毒由三種類型：A型流感、B型流感和C型流感病毒。A型流感進一步分為兩類膜蛋白，血凝素（H）和神經氨酸?（N）。在美國，A型流感H1N1、H3N2和B型流感是主要的季節性病毒。流感症狀包括發燒、寒顫、頭痛、不適、咳嗽、鼻炎、噁心、嘔吐和腹瀉。呼吸道融合病毒是一種常見的病毒，導致成年人輕度，感冒樣症狀，但可能在嬰幼兒，老年人和慢性心臟病或肺部疾病的成年人中導致嚴重的疾病。呼吸道融合病毒感染症狀包括鼻充血、喉嚨痛、咳嗽、痰液產生、呼吸困難，和發燒。流感和呼吸道融合病毒感染的徵兆和症狀與其他感染原因廣泛重疊。識別感染流感和呼吸道融合病毒病患的自動和快速檢測可以幫助有效控制，適當選擇治療和預防疫情。","tags":["感染/敗血症","結核/呼吸道"]},{"n":"Inorganic As specification (Random urine) (無機砷分類)","c":"FDPASU","p":"自費","r":"否","ct":"64號15 mL無重金屬殘留離心管","d":"尿液10 mL (最低採檢量5 mL)","g":"生化免疫組","t":"2天","m":"高效能液相層析法/感應耦合電漿質譜法(HPLC/ Inductively Coupled Plasma – Mass Spectrometry)","rv":"<35 μg/L；報告備註：特殊勞工健康管理分級第三、第四級管理：尿中三價砷、五價砷、MMA、DMA等砷及其代謝物檢驗值合計之總無機砷≧35 μg/L","i":"協助無機砷中毒之診斷與評估","cl":"自然界中的砷可分成有機砷及無機砷兩大類，一般海產類的食物都含有有機砷的成分，有機砷對人體的毒性很低，且在人體中很易被代謝，大部分經由尿液排出體外，而無機砷主要是指arsenite (As3+)及arsenate (As5+)的砷化合物，對人體頗具毒性，人體攝入後會在體內被代謝成monomethylarsonic acid (MMA)及dimethylarsinic acid (DMA)，同樣地尿液亦為其主要的代謝途徑，因此當作尿液砷檢測時，有必要針對無機砷的部分作偵測。 尿液無機砷分類包括As3+、As5+、MMA及DMA四項檢測，而其總量(即As3+、As5+、MMA及DMA四項濃度的總和)為人體砷中毒的重要指標。在電子半導體、染料、殺蟲劑及顯影劑等產業，其工作人員較常接觸砷的化學試劑，尿液無機砷分類即為慢性砷中毒重要的指標。若尿液無機砷的總量(即包括As3+、As5+、MMA、DMA 4項總和)，大於50 μg/g creatinine (註：由於所採的尿液檢體為random urine，為減少因尿液體積所造成的變異，所以結果會經由尿液檢體中的creatinine含量作校正)，則受檢者有慢性無機砷暴露的危險，必須定期作檢測，以確定攝入人體的無機砷含量下降至安全範圍。而慢性的砷暴露可能使身體產生致癌的的機轉及砷中毒的症狀。慢性砷中毒通常會有明顯的皮膚上的病變(例如：hyperkeratosis、hyperpigmentation、alopecia、squamous cell carcinoma)及肝臟性病變(如：cirrhosis、hepatocellular carcinoma)","tags":["其他"]},{"n":"Insulin (AC, PC)","c":"FENINS、FENINP","p":"09103C(120點)","r":"是","ct":"02號黃頭管(Serum separator tu","d":"全血3.5 mL","g":"生化免疫組","t":"2天","m":"免疫酵素冷光分析法(immunoenzymatic assay, sandwich)","rv":"飯前胰島素(Insulin AC)：1.90~23.00 μIU/mL；\n飯後胰島素(Insulin PC)：Please consult endocrinologist.","i":"定量偵測人類血清胰島素(insulin)的含量，以輔助診斷DM，早期偵測DM，監測insilin治療DM診斷insulinoma。","cl":"胰島素的分泌依據兩種基本機制：強直性分泌(tonic secretion)和雙相分泌(biphasic secretion)。基本或強直性分泌與外生性葡萄糖的刺激無關，而是由體內葡萄糖含量的變動所調控。雙相分泌主要會直接受到外生性葡萄糖刺激而產生反應。許多因子能刺激胰島素分泌，包括血糖過高之升糖激素(glucagon)、胺基酸、以及牽涉生長激素和兒茶酚胺(catecolamine)之複雜機制。肥胖症、庫辛氏症候群(Cushing’s syndrome)、口服避孕藥、肢端肥大症、胰島素瘤和甲狀腺腫大都會使胰島素的量增加。明顯的糖尿病(雖然在症狀早期並未清楚表現出來)和部分牽涉兒茶酚胺之複雜機制都會使胰島素的濃度降低。\n胰島素的測定被應用於下列研究中：\n(1)糖尿病的診斷：空腹胰島素和飯後胰島素的測定可用於評估胰腺分泌胰島素的能力，胰島素依賴型糖尿病病人(IDDM)血中的胰島素濃度通常很低，相反地，非胰島素依賴型糖尿病病人(NIDDM)血中的胰島素濃度通常很高。\n(2)糖尿病的早期檢測：在臨床症狀出現以前，胰島素對於預測血糖的反應應該是遲緩的。\n(3)監測和穩定胰島素治療的糖尿病：胰島素檢測對臨床啟用胰島素治療時，來評估的各種作用的持久性。\n(4)預測第二型糖尿病(NIDDM)的併發症：持續的胰島素濃度升高，是第二型糖尿病發展為慢性的危險因素。\n(5)胰島素瘤的診斷：胰腺β細胞瘤可產生高胰島素血症的狀態，而導致低血糖。","tags":["糖尿病","甲狀腺"]},{"n":"Intact PTH","c":"FENIPT","p":"09122B(360點)","r":"是","ct":"03號綠頭管((Lithium heparin))","d":"全血3.5 mL","g":"生化免疫組","t":"2天","m":"雙向化學冷光免疫分析法(two-site chemiluminescent immunoenzymatic assay)","rv":"12.0-88.0 pg/mL (95% non parametric)(年齡19-67歲)","i":"定量Intact PTH以協助診斷原發性副甲狀腺機能亢進症及續發性副甲狀腺機能亢進症。","cl":"副甲狀腺激素(parathyroid hormone, PTH)由副甲狀腺主細胞(chief cell)分泌並儲存在致密的神經內分泌型顆粒等待分泌。Intact parathyroid hormone(i-PTH)有84個胺基酸，分子量約9.43kD，分泌後PTH迅速發生蛋白水解，循環C端PTH進入血液循環中，透過腎小球過率將PTH排除。\n定量血液中之PTH濃度，可協助臨床區分高血鈣或低血鈣之原因。PTH調控鈣濃度主要反映在3個器官：骨骼、小腸黏膜及腎臟。i-PTH在循環中的半衰期小於5分鐘。\nPTH在人體中維持鈣的平衡扮演重要的角色。在健康人中，PTH分泌，在幾秒鐘內即會使鈣產生變化，血液中低鈣即會促發PTH分泌，但當高鈣時即會負回饋抑制PTH分泌。\n引起續發性副甲狀腺機能亢進的病因有：維生素D缺乏，吸收不良症候群：胰臟機能不全、阻塞性肝膽病、胃切除後、Gluten敏感性腸病，腎機能衰竭，低磷酸鹽血症，偽性副甲狀腺機能低下症。慢性腎病患者常見次發性副甲狀腺機能亢進，可能導致腎性骨病變及心血管併發症。其致病機轉主要為活性維生素D不足及目標組織對副甲狀腺素產生抗性所引發的低血鈣，加上腎病後期的血磷滯留，合併刺激副甲狀腺增生。\n引起血中PTH異常偏低表示副甲狀腺機能低下，造成副甲狀腺機能低下的可能原因有：外科手術切除甲狀腺時不小心把副甲狀腺同時切除、自體免疫性疾病引起的副甲狀腺機能低下症、放射性碘治療、鐵質儲蓄病、慢性鎂缺乏等。","tags":["腎臟","甲狀腺","自體免疫","電解質/代謝"]},{"n":"Interleukin-2 soluble receptor Alpha (sIL-2R alpha)","c":"FSIIL2R","p":"自費","r":"否","ct":"02號黃頭管(Serum separator tu","d":"3 mL全血","g":"生化免疫組","t":"其他","m":"酵素連結免疫分析法( enzyme-linked immunosorbent assay, ELISA)","rv":"458.0~1997.0 pg/mL","i":"定量檢測血液中Interleukin-2 soluble receptor alpha濃度。","cl":"IL-2(白細胞介素-2)是人體內一種由T細胞分泌的蛋白質，主要功能是促進T細胞的增殖和活化，在免疫反應中具關鍵角色。IL-2的受體(IL-2R)與IL-2結合後，可調控免疫系統反應，促進T細胞增殖、分化和存活，從而維持免疫系統的正常功能和反應能力。IL-2 Rα鏈(又稱CD25)在免疫活化狀態會從細胞表面游離；因此可溶性(s)IL-2 R濃度增加，被認為是持續中的免疫反應的指標，可用於監測免疫介導的疾病。特別是在噬血細胞性淋巴組織細胞增多症(Hemophagocytic lymphohistiocytosis, HLH)和T細胞淋巴瘤等疾病中，其濃度往往相當高，並且分別與診斷和預後有關。對於其他疾病，特別是肉芽腫性疾病，如結節病(sarcoidosis)，sIL-2 R可用作監測疾病活動性的生物標記。 \nsIL-2 Rα被認為是HLH的重要診斷測試和疾病標誌物之一。HLH也常稱為嗜血症候群(Hemophagocytic syndrome)，是不常見但嚴重的一種症狀。臨床上HLH通常被細分為原發性/次發性，原發性與體染色體隱性遺傳相關，次發性則多發生在強烈免疫活化之後，如全身性感染，免疫缺乏，或是惡性腫瘤；大部分還是感染所激發免疫反應造成，尤其是病毒感染後引發。 \n確切的HLH發生機制並不是很清楚，目前認為所有形式的 HLH 都是由毒性T淋巴細胞(Cytotoxic T cell)和NK細胞(Natural killer cell)功能受損造成。因T及NK細胞的免疫缺損，不足以清除和壓制過度活化的免疫細胞，如抗原呈現細胞和毒殺T細胞，因此免疫反應呈現過度激化。這種細胞功能障礙會阻止Macrophage有效的去除抗原，隨後會引發細胞激素風暴(包括IL-6、IL-18、IFN-γ、TNF-α)及不受控制的巨噬細胞活化而造成巨噬細胞噬血作用，危害病人導致多個器官功能衰竭，嚴重時可能致命。","tags":["感染/敗血症","腫瘤標記","貧血/血液疾病"]},{"n":"Ionized Ca","c":"FRCICA","p":"24007B(400點)","r":"是","ct":"08號A-line針筒","d":"1 mL A-line針筒為全血0.6~1.0 mL；3 m","g":"生化免疫組","t":"其他","m":"離子選擇電極法(Ion Selective Electrodes)","rv":"Adult：1.15~1.33 mmo/L；New born 3~24小時：1.07~1.27 mmo/L；New born 24~48小時：1.00~1.17 mmo/L；＜18歲：1.12~1.23 mmo/L。","i":"測定血液中游離鈣濃度","cl":"Ionized Ca於體內具有生理功能，正常情況下Ionized Ca佔總鈣46-50 %，其它大部份與蛋白質結合，白蛋白下降時總鈣下降，但Ionized Ca不變。Ionized Ca濃度異常時會影響酵素活性、神經傳導、肌肉收縮、腺體分泌等正常功能。副甲狀腺素 (PTH)、維生素D及抑鈣素(calcitonin)三者的平衡亦取決於血中Ionized Calcium的變動；Ionized Ca上升於酸中毒，原發副甲狀腺功能亢進，惡性腫瘤，Vit D過量，下降於鹼中毒，輸血後(citrate)，副甲狀腺功能不足，鎂缺乏，Vit D缺乏，手術後，燒傷，敗血症。其容易受到pH值改變的影響，pH增高時，Ionized Ca降低。pH值降低時，Ionized Ca上升。","tags":["甲狀腺","感染/敗血症","腫瘤標記","輸血/血型"]},{"n":"Irregular antibody screening; Indirect coombs' test","c":"FBBAB、FBBICO","p":"11004C;12098B(100點)","r":"是","ct":"採檢容器：血液 (全血)/07號6 mL紫頭管 (","d":"(A)非備血檢體：6 mL；新生兒科(<120天)：1 mL","g":"血庫組","t":"其他","m":"(1)管柱凝集法Column Agglutination test (CAT gel card)","rv":"陰性 (Negative)","i":"輸血前常規檢驗、偵測非典型或非預期性產生的不規則紅血球抗體（自體抗體或異體抗體）、自體免疫溶血性貧血的調查。","cl":"(1)抗體篩檢即以O血型的血球測試病人是否帶有ABO血型以外的血型系統抗體，稱異體抗體，不規則抗體或意外的抗體，所用的O血型的血球來自2到3個捐血人，這些血球包含國人出現的大部份抗原，因此若病人的抗體篩檢結果為陽性，表示病人有帶異體抗體。\n(2)臨床上有意義的異體抗體(不規則抗體)是指抗體可引起新生兒溶血症，明顯的溶血性輸血反應，故抗體篩檢在輸血前配合試驗是不可缺少的步驟，但篩檢陰性並不代表病人體內沒有不規則抗體。","tags":["貧血/血液疾病","自體免疫","輸血/血型"]},{"n":"Japanese cedar (日本杉)","c":"FALJAP","p":"F30022C(1620點)","r":"是","ct":"03號綠頭管(Lithium heparin)","d":"全血4.5 mL","g":"生化免疫組","t":"其他","m":"螢光酵素免疫分析法(Fluorescence enzyme immunoassay, FEIA)","rv":"＜0.35 kU/L；參考值備註：0.35~0.69 kU/L(Class I)、0.70~3.49 kU/L(Class II)、3.50~17.49 kU/L(Class III)、17.5~52.49 kU/L(Class IV)、52.5~99.99 kU/L(Class V)、≧100 kU/L(Class VI)。","i":"定量分析特異性過敏原IgE之濃度，協助診斷IgE媒介之過敏疾病。","cl":"過敏性疾病大約佔全世界人口30%。過敏反應主要分為四型，其中過敏原引起主要為第一型過敏反應，為外因性氣喘、花粉熱或異位性濕疹的病人，當第一次接觸過敏原，症狀會立即發作，免疫系統會產生對應過敏原之過敏原特異性IgE抗體，其會循環於血液中並接合於mast cell上，當第二次接觸相同過敏原時，會使mast cell產生去顆粒作用，使細胞內之發炎性物質，例如：histamine、serotonin等，釋放至細胞外，造成流鼻水、打噴嚏等臨床症狀產生，嚴重者甚至產生休克。可藉由檢測血液中之引起過敏相關之特異性抗體IgE(如花粉、動物毛屑、塵?及家塵等)，此可輔助了解引起過敏之過敏原種類，仍需配合其它臨床證據一起判斷。","tags":["過敏"]},{"n":"K(24 hr urine)、K(Random urine)","c":"FBIKU、FBIKR","p":"09022C(40點)","r":"是","ct":"66號白頭塑膠管，得以21號10 mL尖底管或35","d":"尿液3.0 mL(白頭試管約五分滿)","g":"生化免疫組","t":"急診可","m":"間接離子選擇電極法(Indirect ISE method)","rv":"(1) K(24 hr urine)：25-125 mmol/day。\n(2) K(Random urine)：\n(A)腎外流失(Extrarenal loss)：Urine K to creatinine ratio＜2 mmol/mmol；\n(B)腎流失(Renal loss)：Urine K to creatinine ratio＞2 mmol/mmol。\n(C)(mmol/10 mg)x11.3=mmol/mmol。","i":"協助高血鉀症(hyperkalemia)、低血鉀症(hypokalemia)、腎衰竭、愛迪生氏症(addison’s disease)或其他電解質不平衡之診斷。","cl":"鉀是細胞內最主要的陽離子，由飲食供應，依細胞的需求從腎臟調節排出的多寡。尿中鉀上升於鹼中毒、脫水、攝取過多、低血鉀的情形、腎小管酸中毒、慢性腎衰竭、頭創傷。尿中鉀下降於愛迪生氏病(addison’s disease)、下瀉、高鉀血症、低鎂、吸收不良、腎病、SIADHS。還有很多藥物會改變血鉀濃渡。","tags":["腎臟","電解質/代謝"]},{"n":"K(血中鉀)","c":"FBIK、FRCK","p":"09022C(40點)","r":"是","ct":"03號綠頭管(Lithium Heparin)","d":"全血3.5 mL","g":"生化免疫組","t":"急診可","m":"間接離子選擇電極法(Indirect ISE method)","rv":"3.4~4.5 mmol/L","i":"協助高血鉀症(hyperkalemia)、低血鉀症(hypokalemia)、腎衰竭、愛迪生氏症(addison’s disease)或其他電解質不平衡之診斷","cl":"鉀負責調節細胞水的平衡、肌肉訊號傳導、酸鹼平衡、電解質的平衡，鉀應用於評估心率不整、腎功能不全、精神錯亂、胃腸道痛苦。細胞破壞、Insulin不足時，細胞內之鉀會流入細胞外造成高鉀血症。腎臟Na、K競爭氫離子交換排出，腎小管酸中毒鉀排出或消化道鉀喪失增加會使血鉀偏低。\n血清鉀上升於酸中毒、腎上腺皮質功能不全、溶血性貧血、氣喘、燒傷、心率不整、急性感染、白血球增多症、惡性腫瘤初期體溫上升、大量輸血、酮酸中毒、肌肉壞死、腸阻塞、腎衰竭、腎性高血壓、敗血病、休克、抗利尿激素分泌失調綜合症( SIADHS)、血小板增多症、組織創傷。 \n血清鉀下降於乙狀結腸鏡後、急性腎小管壞死、酗酒、primary aldosteronism、鹼中毒、心速過緩、大腸癌、霍亂、大腦性癱瘓、心臟衰竭、庫辛氏病(Cushing's syndrome)、脫水、尿崩症、下瀉、糖尿病、心率不整、發燒、葉酸缺乏、高血壓、低鎂、體溫過低、血容過低、酮酸中毒、水楊酸中毒、瀉藥、吸收不良、代謝性鹼中毒、腎炎、饑餓、壓力、嘔吐。","tags":["腎臟","糖尿病","腫瘤標記","貧血/血液疾病","電解質/代謝","輸血/血型","荷爾蒙/內分泌","過敏"]},{"n":"kappa & lambda free light chain (quantitation)","c":"FBIFLC","p":"12160B(900點)","r":"是","ct":"02號黃頭管(Serum separator tu","d":"全血3.5 mL","g":"生化免疫組","t":"其他","m":"比濁法(turbidmietry)","rv":"Kappa free light chain:3.30 mg/L~19.40 mg/L\nLambda free light chain:5.71 mg/L~26.30 mg/L\nFree kappa/lambda ratio:0.26~1.65","i":"測定游離型輕鏈之濃度可輔助臨床上對於多發性骨髓瘤、淋巴細胞腫瘤、Waldenstrom巨大球蛋白血症、類粉樣變性(AL amyloidosis )、輕鏈沉積病變及結締組織性疾病(例如全身性紅斑性狼瘡)等疾病之診斷及監測。","cl":"免疫球蛋白分子由2條相似的重鏈及輕鏈所組成，每條輕鏈與重鏈在樞紐區之間以共價連結。健康人體內，血清中的輕鏈主要是與重鏈結合的形式存在，正常人血清中若發現低濃度游離型輕鏈(free light chain, FLC)，是因為漿細胞過度製造及分泌游離型輕鏈，2條輕鏈之分子量約為22.5 kD，血清中κ游離型輕鏈(kappa free light chain, κ-FLC)主要以單體存在，而血清中λ游離型輕鏈(lambda free light chain, λ-FLC)則以共價方式結合成分子量約45 kD的雙體，結果將導致κ-FLC及λ-FLC有不同的腎絲球過濾率，可解釋為何輕鏈在尿液中的濃度很低，健康個體腎小管細胞可選擇性的重新吸收所有游離型輕鏈，因此若尿液中出現游離型輕鏈代表其以分泌至泌尿道。\n但在多發性骨髓瘤、獨立性漿細胞瘤、淋巴 B 細胞有關的惡性疾病(淋巴瘤等)、惡性漿細胞增生疾病、原發性類澱粉沉著症及輕鏈沉積病變等相關疾病發生時，製造免疫球蛋白的淋巴漿細胞會傾向製造單一型態的輕鏈分子，可能造成全部免疫球蛋白的輕鏈結構都是κ鏈或是λ鏈，血清中單株游離型輕鏈濃度上升，使κ與λ鏈的比值明顯偏離正常範圍。當血清κ、λ及κ/λ ratio結果皆符合生物參考區間時，若電泳結果亦正常，則monoclonal gammopathy之可能性較低；當κ/λ ratio為Abnormal時，可能為monoclonal gammopathy，應進一步以tissue biopsy確認，κ/λ ratio些微上升常見於腎臟功能異常；κ及λ濃度偏低時，可能為骨髓功能不良；κ, λ濃度上升且κ/λ ratio正常，常見於腎臟功能異常、發炎性疾病導致polyclonal free light 製造過多，偶而可見於biclonal gammopathies of different FLC types；κ, λ濃度上升但κ/λ ratio異常，可能為monoclonal gammopathy及腎臟功能不佳。Monoclonal urinary FLC與惡性淋巴瘤相關即被稱為Bence Jone protein。","tags":["腫瘤標記","貧血/血液疾病"]},{"n":"Lactate Dehydrogenase；LDH","c":"FBILDH、FRCLDH","p":"09033C(60點)","r":"是","ct":"03號綠頭管(Lithium Heparin)","d":"全血3.5 mL","g":"生化免疫","t":"急診可","m":"Lactate-Pyruvate (NAD) (Rate method)","rv":"140-271 U/L(參考值僅適用於成人)","i":"定量血清或血漿中LDH(乳酸去氫?)的活性，協助診斷肝臟及心臟等相關疾病。","cl":"乳酸脫氫脢(LD)升高會因其疾病─心肌梗塞、肝臟疾病(急性病毒性肝炎，肝硬化及轉移性肝癌)、有害的巨母紅血球性貧血、肺的栓塞、惡性病類、肌肉失養症。\n結合LD與CK(creatine kinase)isoenzyme的分析可以為心肌梗塞(myocardial infarction)的診斷下一個明確的定義。","tags":["肝臟/膽道","心臟/心血管","腫瘤標記","貧血/血液疾病"]},{"n":"Latex (乳膠)","c":"FALLAT","p":"F30022C(1620點)","r":"是","ct":"03號綠頭管(Lithium heparin)","d":"全血4.5 mL","g":"生化免疫組","t":"其他","m":"螢光酵素免疫分析法(Fluorescence enzyme immunoassay, FEIA)","rv":"＜0.35 kU/L；參考值備註：0.35~0.69 kU/L(Class I)、0.70~3.49 kU/L(Class II)、3.50~17.49 kU/L(Class III)、17.5~52.49 kU/L(Class IV)、52.5~99.99 kU/L(Class V)、≧100 kU/L(Class VI)。","i":"定量分析特異性過敏原IgE之濃度，協助診斷IgE媒介之過敏疾病。","cl":"過敏性疾病大約佔全世界人口30%。過敏反應主要分為四型，其中過敏原引起主要為第一型過敏反應，為外因性氣喘、花粉熱或異位性濕疹的病人，當第一次接觸過敏原，症狀會立即發作，免疫系統會產生對應過敏原之過敏原特異性IgE抗體，其會循環於血液中並接合於mast cell上，當第二次接觸相同過敏原時，會使mast cell產生去顆粒作用，使細胞內之發炎性物質，例如：histamine、serotonin等，釋放至細胞外，造成流鼻水、打噴嚏等臨床症狀產生，嚴重者甚至產生休克。可藉由檢測血液中之引起過敏相關之特異性抗體IgE(如花粉、動物毛屑、塵?及家塵等)，此可輔助了解引起過敏之過敏原種類，仍需配合其它臨床證據一起判斷。","tags":["過敏"]},{"n":"LDH (Body fluid)","c":"FCSLDH、FRBLDH、FBILDH","p":"09033C(60點)","r":"是","ct":"36號15mL無菌試管，得以66號白頭塑膠管或21","d":"體液／CSF 1.5 mL","g":"生化免疫組","t":"急診可","m":"Lactate-Pyruvate (NAD) (Rate method)","rv":"(1)Body fluid\n    (A) Transudate: <0.67× (upper reference limit of serum).\n    (B) Exudate: >0.67× (upper reference limit of serum)\n(2)CSF\n    (A) Adult: ≦40 U/L\n    (B) Neonatal: ≦70 U/L","i":"定量體液及腦脊髓液中LDH(乳酸去氫?)的活性，協助區分滲出液或漏出液。","cl":"CSF的LDH活性升高可見於cerebrovascular accidents、CNS tumors、Meningitis等。體液LDH活性可協助區分滲出液及漏出液。","tags":["其他"]},{"n":"LDL-cholesterol","c":"FBILDL","p":"09044C(250點)","r":"是","ct":"03號綠頭管(Lithium heparin)","d":"全血3.5 mL","g":"生化免疫組","t":"急診可","m":"(1)LDL-c實測法：時間終點反應法(Timed-endpoint method)；\n(2)LDL-c計算法：Cholesterol-HDL-(Triglycerol/5)\n(限制：當Triglycerol≧400時，因會造成LDL計算值錯誤，因此不提供計算值。)","rv":"<130 mg/dL；\n檢驗備註說明：\n依據美國國家膽固醇教育專案對成人冠狀動脈疾病管理及預防建議(2001)：\n最佳濃度：＜100 mg/dL、接近或大於最佳濃度：100-129 mg/dL、中度高濃度：130-159 mg/dL、高濃度：160-189 mg/dL、非常高濃度：≧190 mg/dL","i":"定量血清或血漿中低密度脂蛋白膽固醇的濃度，協助臨床診斷脂質代謝相關疾病。","cl":"低密度脂蛋白膽固醇(LDL-cholesterol, LDL-c)與發展中的冠狀動脈疾病的危險因素成正比。1988 年美國國家膽固醇教育計畫成人治療小組(NCEP-ATP)制定了高膽固醇血症患者的診斷和治療建議，建議將 LDL-膽固醇定義為主要治療目標，LDL濃度分別為最佳濃度小於100 mg/dL、100-129 mg/dL為接近或大於最佳濃度、130-159 mg/dL為中度高濃度、160-189 mg/dL為高濃度、≧190 mg/dL為非常高濃度。\n高密度脂蛋白膽固醇/低密度脂蛋白膽固醇的比值(HDL/LDL ratio)偏低與發展中的冠狀動脈疾病的危險因素成正比","tags":["心臟/心血管"]},{"n":"Lead (Pb, Random urine)","c":"FDPPBR","p":"Pb: 09049B(400點)、creatinine: 09015C (40點)","r":"是","ct":"64號無重金屬殘留離心管","d":"尿液45 mL","g":"生化免疫組","t":"其他","m":"感應耦合電漿質譜儀(Inductively coupled plasma-mass spectrometry，ICP-MS)","rv":"＜23.0 μg/L；\n參考值備註說明：\n特殊健檢管理分級建議指引之異常結果為≧150 μg/L","i":"定量尿液中鉛濃度，協助診斷職業或環境鉛暴露之評估。","cl":"鉛是一種有毒金屬，不僅使用廣泛且已造成嚴重環境污染和健康問題。\n造成血中Pb增加的因素：工業暴露、食入含鉛之油漆、釉藥等。Pb中毒會導致：ALA去水解酵素受抑制、厭食、胎兒神經系統缺損、神經傳導速度減緩、抑制Vitamin-D代謝活性、腹痛、嘔吐、過敏、呆滯、腦病變、貧血、周邊神經病變、小球性低血色素貧血(排除缺鐵性貧血及海洋性貧血)、腎臟病變等。","tags":["腎臟","貧血/血液疾病"]},{"n":"Lead(Pb)","c":"FDPPBB","p":"09049B(400點)","r":"是","ct":"61號紫標籤深藍頭管","d":"全血3 mL","g":"生化免疫組","t":"其他","m":"感應耦合電漿質譜儀(Inductively coupled plasma-mass spectrometry，ICP-MS)","rv":"＜10.0 μg/dL；\n參考值備註說明：\n1.兒童(≦18歲)＜5.0 μg/dL；\n2.特殊健檢管理分級建議指引之異常結果為男性≧40.0 μg/dL、女性≧30.0 μg/dL。","i":"定量血液中鉛濃度，使用在鉛中毒評估，職業病或不慎吸入、食入暴曬指標。","cl":"鉛是一種有毒金屬，不僅使用廣泛且已造成嚴重環境污染和健康問題。\n造成血中Pb增加的因素：工業暴露、食入含鉛之油漆、釉藥等。Pb中毒會導致：ALA去水解酵素受抑制、厭食、胎兒神經系統缺損、神經傳導速度減緩、抑制Vitamin-D代謝活性、腹痛、嘔吐、過敏、呆滯、腦病變、貧血、周邊神經病變(如垂腕或垂足等伸肌麻痺或感覺異常)、小球性低血色素貧血(排除缺鐵性貧血及海洋性貧血)、腎臟病變等。","tags":["腎臟","貧血/血液疾病"]},{"n":"Legionella pneumophila serogroup 1 antigen(退伍軍人桿菌抗原)","c":"FCSLPA","p":"12191C(400點)","r":"是","ct":"75號立寶紅蓋檢體瓶","d":"1mL 以上","g":"微生物組","t":"其他","m":"免疫螢光法(ImmunoFluorescence Assay, FIA)","rv":"Negative","i":"作為尿液之Legionella pneumophila serogroup 1抗原定性檢測，以輔助診斷Legionella pneumophila serogroup 1感染。","cl":"(1)\t個案符合臨床條件「肺炎病人，並出現倦怠感、畏寒、肌肉痠痛、頭痛、發燒、頭昏、咳嗽、噁心、腹痛、腹瀉及呼吸困難等任一症狀」始符合送驗條件。\n(2)\t配合感控中心調整開立檢驗的權限，限感染科醫師可開立。\n(3)\t陽性：現在或是過去有Legionella pneumophila serogroup 1的感染\n(4)\t陰性：現在或是過去沒有Legionella pneumophila serogroup 1的感染，無法排除其他Legionella血清型的感染，可能早期感染或檢體中抗原低於可偵測濃度。","tags":["結核/呼吸道"]},{"n":"LH","c":"FENLH、FRELH","p":"09126C(180點)","r":"是","ct":"03號綠頭管(Lithium heparin)","d":"全血3.5 mL","g":"生化免疫組","t":"急診可","m":"雙向免疫酵素冷光分析法(two-site immunoenzymatic assay , sandwich)","rv":"(1)Males: 1.24~8.62 mIU/mL；\n(2)Females:\nMid-Follicular phase: 2.12~10.89 mIU/mL,\nMid-Cycle Peak: 19.18~103.03 mIU/mL,\nMid-Luteal phase: 1.20~12.86 mIU/mL,\nPostmenopausal: 10.87~58.64 mIU/mL.","i":"定量偵測人類血清與血漿中黃體素（human luteinizing hormone, LH）的含量。測定LH濃度對於預測排卵期、不孕症之評估以及腦下垂體和生殖腺疾病之診斷是重要的依據。","cl":"在女性，人類黃體化激素刺激濾泡最後的成熟，使得濾泡破裂，導致排卵。人類黃體化激素是由下丘腦中體所分泌的性腺分泌激素(gonadotropin releasing hormone，GnRH)來刺激腦下垂體前葉的促性腺細胞所分泌。在正常的月經週期，濾泡期人類黃體化激素的分泌，會被estradiol負回饋作用而抑制。在濾泡成熟的過程中(對於人類濾泡刺激素的反應)，二氫基春情素的分泌會增加，這會引發性腺分泌激素的增加，以及增加腦下垂體對於性腺分泌激素的敏感度。性腺分泌激素的起伏，會造成在排卵前(週期中期)人類黃體化激素的起伏，且造成排卵。隨著這些起伏，在黃體期時，人類黃體化激素會被黃體脂酮及estradiol的負回饋作用所抑制。\n在正常成熟的女性中，經期長短的不同是因為濾泡期的長短不同所造成的。在更年期的女性，因為卵巢的estradiol及黃體脂酮的分泌量下降，排除了腦下垂體的負回饋機制，導致人類黃體化激素的濃度上升。最後，排卵與月經周期減少，最後完全終止。在男性中，人類黃體化激素通常被當作是細胞間隙刺激激素，並且影響著睪丸內Leydig細胞產生睪固酮。\n測量人類黃體化激素及人類濾泡刺激素的濃度通常是用來研究月經週期、生殖能力以及青春期發育的不正常，例如：不成熟的卵巢障礙、更年期、排卵疾病及腦下垂體障礙。人類黃體化激素與人類濾泡刺激素的比例常被用來診斷多囊性卵巢的疾病。人類黃體化激素與人類濾泡刺激素濃度偏低時，可能是腦下垂體有缺失；而人類黃體化激素與人類濾泡刺激素濃度偏高，且伴隨性腺類固醇濃度的下降，可能是因為性腺的缺失(更年期、卵巢切除手術、卵巢不成熟症候群、Turners症候群)。促性腺激素的濃度偏低，通常是由於女性服用口服避孕藥所造成的。男性的人類黃體化激素及人類濾泡刺激素濃度偏高，且伴隨性腺類固醇濃度的下降，可能是因為睪丸有異常或缺乏。在Klinefelter’s 症候群中，人類黃體化激素濃度可能會上升，這是因為Sertoli細胞的異常所造成。","tags":["荷爾蒙/內分泌"]},{"n":"Lipase","c":"FBILIP、FRCLIP","p":"09064C(150點)","r":"是","ct":"03號綠頭管(Lithium Heparin)；","d":"全血3.5 mL；體液3.5 mL","g":"生化免疫組","t":"急診可","m":"比色法","rv":"Blood: 11~82 U/L\nAscites,Body fluid, Pleural Effusion: Variable","i":"檢測血清中的解脂?活性可被用於急性胰臟炎和胰臟損傷的診斷與治療","cl":"Lipase是一群胰臟製造的酵素，功能是將三酸甘油脂分解成甘油和脂肪酸。在胰臟炎時，lipase活性增加，當急性胰臟炎發作時，活性會立即升高。Lipase上升於胰臟炎、膽結石造成之腹痛、內臟穿孔、腸絞扼或腸梗塞、胰囊腫或假性囊腫、腹膜炎。\n對於急性胰臟炎診斷，通常上升至正常值3倍以上較有診斷特異性，但血清amylase和lipase上升多寡與胰臟炎嚴重程度無關。Lipase的臨床敏感度及專一性較amylase佳。\n胰臟炎時，腹水lipase活性會增加，胸腔滲出液lipase活性亦會增加。","tags":["其他"]},{"n":"Lipoprotein electrophoresis(脂蛋白電泳)","c":"FBILIE","p":"09066B(360點)","r":"否","ct":"02號黃頭管(Serum separator tu","d":"2 mL全血","g":"生化免疫組","t":"其他","m":"Electrophoresis(電泳分析法)","rv":"Alpha fraction: 12.6~46.6%, pre-beta fraction: 0-57.1%, beta fraction: 21.7-67.7%, chylomicron: 0-1.0%。\n檢驗報告備註：高脂蛋白症分為第一型至第五型，第一型高脂蛋白症為chylomicron上升；第二型高脂蛋白症，IIa為LDL上升(Beta上升)，IIb為VLDL及LDL上升(Beta及Pre-Beta上升)；第三型高脂蛋白症為IDL上升(Beta及Pre-Beta上升形成寬的融合)；第四型高脂蛋白症為VLDL上升(Pre-beta上升)或第五型高脂蛋白症為chylomicron及VLDL上升(chylomicron及Pre-beta上升)。","i":"協助臨床醫師區分高脂蛋白症(Hyperlipoproteinemia)","cl":"阻塞性肝臟疾病及肝硬化常見Alpha lipoprotein顯著增加，肝實質病變則顯著下降；Tangier’s disease為罕見之基因問題引起的Alpha lipoprotein缺乏疾病。Abetalipoprotein為遺傳性基因問題造成所有比重小於1.063的脂蛋白缺乏(除Alpha lipoprotein)。Lipoprotein-X常見於肝臟疾病患者，主要為未脂化(游離)膽固醇、磷脂質及蛋白，電泳分析時移動速度較LDL慢。\n高脂血症共有五種型式，第一型高脂蛋白血症(Hyperchylomicronemia)：出現chylomicron，pre-Beta正常或些微上升，Alpha及Beta顯著下降，血漿呈現牛乳外觀；第二型高脂蛋白血症(Hyperbetalipoprotenmia)為最常見的家族性高脂蛋白血症。因cholesterol上升導致Beta-lipoprotein cholesterol增加，Alpha cholesterol通常為正常或下降，可再區分兩型為Type IIa為pre-Beta及triglycerides正常，血漿外觀正常；Type IIb為pre-Beta及triglycerides增加，血漿外觀正常或輕微混濁，其他可能產生第二型高脂蛋白血症原因如黏液性水腫(Myxedema)、骨髓瘤(myeloma)、巨球蛋白血症(macroglobulinemia)、腎臟病、肝臟疾病及攝食過多含膽固醇或飽和脂肪酸食物；第三型高脂蛋白血症(“Broad Beta”- Abnormal lipoprotein)：triglyceride大幅增加，cholesterol也上升。血漿外觀呈現混濁。此類型較少見；第四型高脂蛋白血症(Carbohydrate induced endogenous hypertriglyceridemia)：Pre-Beta及triglyceride增加，total cholesterol正常或輕微增加。Alpha及Beta lipoprotein通常正常，其他可能產生第四型高脂蛋白血症原因如腎臟病、糖尿病、胰臟炎、肝醣儲存疾病及其他急性代謝fatty acid。酒精攝取、情緒壓力、飲食及體重改變會顯著影響內生性triglyceride濃度，外生性triglyceride影響則不明顯。90%第四型高脂蛋白血症患者有異常葡萄糖耐性，原因可能為對內生性triglyceride的合成及清除不平衡；第五型高脂蛋白血症(Mixed Triglyceridemia, carbohydrate and fat included)：內生性及外生性triglycerides增加、出現chylomicron、Pre-Beeta增加、Beta正常或輕微增加。其他可能產生第五型高脂蛋白血症原因如腎臟病、黏液性水腫(Myxedema)、糖尿病酸中毒、酗酒、胰臟炎、肝醣儲存疾病及其他急性代謝fatty acid。\n除第一型與胰臟癌有關外，其餘第二~第五各型均會造成動脈粥樣硬化症(CAD)，而以第二型最具危險性。","tags":["肝臟/膽道","腎臟","糖尿病","貧血/血液疾病"]},{"n":"Lipoprotein(a), Lp(a)","c":"FBILPA","p":"12164B(275點)","r":"是","ct":"3號綠頭管(Lithium heparin tub","d":"全血3.5 mL","g":"生化免疫組","t":"其他","m":"酵素免疫分析法(Enzyme Immunoassay)","rv":"<30 mg/dL","i":"定量人體血液中Lipoprotein(a)的濃度，協助心血管疾病風險評估。","cl":"Lipoprotein(a)(簡稱Lp(a))是一種低密度脂蛋白，包含獨特的載脂蛋白( a )[apolipoprotein(a), apo(a)]，以雙硫鍵與載脂蛋白B結合。Lp(a)為一種具高度遺傳決定性的脂蛋白，其血中濃度受LPA基因影響，終生相對穩定，與飲食及生活型態關聯性較低，通常在5歲後保持不變，除非出現嚴重的發炎、肝病或腎臟病。大量流行病學與遺傳研究證實，Lp(a)與動脈粥樣硬化性心血管疾病(Atherosclerotic Cardiovascular Disease, ASCVD)及主動脈瓣狹窄具有因果且劑量相關的風險關係，高濃度的Lp(a)會造成血管內皮功能障礙、炎症反應增加，並促進血栓形成，因此心血管疾病風險隨濃度上升呈增加，成為心血管風險的重要指標。依據2026年血脂異常管理指引，Lp(a)為動脈粥樣硬化性心血管疾病(ASCVD)之風險增強因子，建議成人至少測量一次Lp(a)以進行心血管風險評估。當Lp(a)濃度升高時，應結合低密度脂蛋白膽固醇、血壓、血糖及其他心血管危險因子進行整體臨床風險評估與管理。近期亦有研究顯示，Lp(a)與Cardiac CRP(hsCRP)濃度在預測CVD風險方面具有很強的相關性。","tags":["肝臟/膽道","腎臟","凝血/血栓"]},{"n":"Lithium (Li)","c":"FBILI","p":"10520B(150點)","r":"是","ct":"2號黃頭管(Serum separator tub","d":"全血2 mL","g":"生化免疫組","t":"急診可","m":"Colorimetric/Endpoint (Rate method)","rv":"Therapeutic range：0.6~1.2 mmol/L;  \n1.治療最低濃度(服藥後12小時)：1.0~1.2 mmol/L\n2.最低有效濃度：0.6 mmol/L\n3.治療最低濃度(服藥後12小時)＞1.5 mmol/L有中毒之風險","i":"定量血清中Lithium濃度作為臨床治療及血中藥物濃度監控之依據。","cl":"鋰鹽是用來治療躁鬱症，鋰是作用在提高神經傳送素(neurotransmitters)的攝取，神經傳送素會對中樞神經系統產生鎮靜效果。鋰鹽劑型可為膠囊、糖漿或錠劑，完全經由腸胃道吸收，且不與血漿蛋白結合。口服後2-4小時血漿中濃度達peak serum level，在血清中的半衰期為48-72小時，主要是靠腎臟的排泄完成廓清作用，單一次劑量後約95%鋰鹽於6-12小時後由尿液排出，剩餘劑量於10-14天後排出 。監測鋰離子的濃度可以確保病人確實遵從醫囑並預防中毒。中毒的早期症狀包含神氣呆滯(apathy)、遲鈍、嗜眠狀態、嗜眠症、說話困難、不規則顫動、肌肉陣攣性抽搐、肌肉軟弱無力和運動失調。濃度高於1.5 mmol/L (服用後12小時)顯示有中毒的顯著風險。","tags":["藥物/毒物監測"]},{"n":"Lobster (龍蝦)","c":"FALLOB","p":"F30022C(1620點)","r":"是","ct":"03號綠頭管(Lithium heparin)","d":"全血4.5 mL","g":"生化免疫組","t":"其他","m":"螢光酵素免疫分析法(Fluorescence enzyme immunoassay, FEIA)","rv":"＜0.35 kU/L；參考值備註：0.35~0.69 kU/L(Class I)、0.70~3.49 kU/L(Class II)、3.50~17.49 kU/L(Class III)、17.5~52.49 kU/L(Class IV)、52.5~99.99 kU/L(Class V)、≧100 kU/L(Class VI)。","i":"定量分析特異性過敏原IgE之濃度，協助診斷IgE媒介之過敏疾病。","cl":"過敏性疾病大約佔全世界人口30%。過敏反應主要分為四型，其中過敏原引起主要為第一型過敏反應，為外因性氣喘、花粉熱或異位性濕疹的病人，當第一次接觸過敏原，症狀會立即發作，免疫系統會產生對應過敏原之過敏原特異性IgE抗體，其會循環於血液中並接合於mast cell上，當第二次接觸相同過敏原時，會使mast cell產生去顆粒作用，使細胞內之發炎性物質，例如：histamine、serotonin等，釋放至細胞外，造成流鼻水、打噴嚏等臨床症狀產生，嚴重者甚至產生休克。可藉由檢測血液中之引起過敏相關之特異性抗體IgE(如花粉、動物毛屑、塵?及家塵等)，此可輔助了解引起過敏之過敏原種類，仍需配合其它臨床證據一起判斷。","tags":["過敏"]},{"n":"Lupus anticoagulant","c":"FHELUP","p":"08126B(700點)","r":"是","ct":"10號1.8 mL淺藍頭管(3.2% buffer","d":"(A)患者Hct≦55％：上述採血試管建議採血量之±10％(","g":"血液及組織相容組","t":"其他","m":"本檢驗涵蓋以下2種檢驗\n(1)diluted Russell’s viper venom test(dRVVT) (integrated test)\n(2)Silica Clotting Time(SCT)","rv":"(1)Normalized dRVVT Ratio：小於等於1.20\n(2)Normalized SCT Ratio：小於等於1.16\n(3)Interpretation：Not detected","i":"(1)Mixing APTT無法矯正(Correction)\n(2)臨床疑似抗磷脂症(Anti-phospholipid syndrome)\n(3)反覆性動脈或靜脈不明原因栓塞\n(4)習慣性流產（非器質性因素）、死胎或胎兒發展遲緩","cl":"(1)陽性結果代表患者血液中含有Lupus Anticoagulant，建議12週後再追蹤一次，以確認符合ISTH抗磷脂症之診斷標準。\n(2)當檢測結果為Not detected時，無法排除低抗體效價LAC。","tags":["自體免疫"]},{"n":"Lymphocyte subset analysis (Others,Tumor/cancer,Infectious disease,Immunological disease)","c":"FCMCO1、FCMCO2、FCMCO3、FCMCO4","p":"12071B (400點);12072B (1000點);12073B (800點);12074B (1747點)","r":"是","ct":"04-紫頭管","d":"3 mL","g":"血液及組織相容組","t":"其他","m":"Immunophenotyping by flow cytometry","rv":"(1)CD3+ T-cell：58.7-85.2%\n(2)CD19+ B-cell：6.2-25.8%\n(3)CD4+ T-cell：22.5-54.1%\n(4)CD8+ T-cell：20.6-39.9%\n(5)CD3-/CD56+ NK-cell：3.0-41.1%\n(6)CD4+ T / CD8+ T ratio：0.6-2.3\n(7)CD4 count：350-1,305/uL","i":"淋巴球細胞標記常用來作為愛滋病患者之疾病監控指標，其他表面抗原分析，也可用來協助了解人體相關之免疫功能。","cl":"淋巴球細胞標記最常用來作為愛滋病患者之疾病監控指標，因為Helper T cell（CD3+/CD4+）陽性的細胞為HIV 外套蛋白組成中 gp120之受器，故愛滋病患者Helper T cells數目會明顯降低，CD4陽性與CD8陽性細胞（CD4/CD8）之比例也較正常人低了許多；除此之外，淋巴球之表面抗原分析，也可用來協助了解人體相關之免疫功能。","tags":["其他"]},{"n":"Magnesium","c":"FBIMG,FBIMGR,FBIMGU,FRCMG","p":"09046C(40點)","r":"是","ct":"03號綠頭管(Lithium Heparin)；","d":"全血3.5 mL；尿液3.0 mL，白頭塑膠管五分滿。","g":"生化免疫組","t":"急診可","m":"呈色法(Xylidyl Blue)","rv":"血液：1.9~2.7 mg/dL;\n24小時尿液：24~255 mg/ day; \nRandom urine：Not applicable.","i":"定量血清、血漿或尿液中鎂的濃度，協助臨床鎂離子濃度之監控。","cl":"測量鎂可用來評估不同疾病與狀況。利用測量鎂的量可用來治療和診斷低血鎂〈hypomagnesemia〉和高血鎂症。鎂為一種細胞內主要陽離子，僅次於鉀濃度。血中含有高的鎂濃度與尿毒症、腎衰竭、脫水、糖尿病性酸毒症、愛迪生氏症，及醫療行為增加的額外吸收鎂離子如子癇前症(因為懷孕造成的高血壓)的治療等有關。低鎂血症的原因與吸收不良徵候群、急性胰臟炎、甲狀腺亢進、副甲狀腺功能低下症、糖尿病、慢性酒精中毒、震顫性譫妄、慢性腎小球腎炎、醛類酯醇過多症、毛地黃中毒以及點滴注射有關。\n調解血清中鎂含量的因素知之甚少。目前認為副甲狀腺可能有參與協調。鎂在一些重要酵素系統作為活化劑參與磷酸鹽中轉移和水解，如hexokinase, alkaline phosphatase, prostatic acid phosphatase, and creatinine kinase。","tags":["腎臟","糖尿病","甲狀腺","電解質/代謝"]},{"n":"Malassezia spp芽孢菌屬","c":"FALMAL","p":"30022C(1620點)","r":"是","ct":"03號綠頭管(Lithium heparin)","d":"全血4.5 mL","g":"生化免疫組","t":"其他","m":"螢光酵素免疫分析法(Fluorescence enzyme immunoassay, FEIA)","rv":"＜0.35 kUA/L(Class 0)；參考值備註：0.35~0.69 kUA/L(Class I)、0.70~3.49 kUA/L(Class II)、3.50~17.49 kUA/L(Class III)、17.5~52.49 kUA/L(Class IV)、52.5~99.99 kUA/L(Class V)、≧100 kUA/L(Class VI)。","i":"定量分析特異性過敏原IgE之濃度，協助診斷IgE媒介之過敏疾病。","cl":"過過敏性疾病大約佔全世界人口30%。過敏反應主要分為四型，其中過敏原引起主要為第一型過敏反應，為外因性氣喘、花粉熱或異位性濕疹的病人，當第一次接觸過敏原，症狀會立即發作，免疫系統會產生對應過敏原之過敏原特異性IgE抗體，其會循環於血液中並接合於mast cell上，當第二次接觸相同過敏原時，會使mast cell產生去顆粒作用，使細胞內之發炎性物質，例如：histamine、serotonin等，釋放至細胞外，造成流鼻水、打噴嚏等臨床症狀產生，嚴重者甚至產生休克。可藉由檢測血液中之引起過敏相關之特異性抗體IgE(如花粉、動物毛屑、塵?及家塵等)，此可輔助了解引起過敏之過敏原種類，仍需配合其它臨床證據一起判斷。","tags":["過敏"]},{"n":"Manganese to creatinine ratio (Random urine)","c":"FBIMNU","p":"10009B(320點)","r":"否","ct":"64號重金屬專用HST試管","d":"尿液5 mL","g":"生化免疫組","t":"其他","m":"感應耦合電漿質譜儀(lnductively coupled plasma-mass spectrometry, ICP-MS), NexION 300 Series, PerkinElmer.","rv":"Manganese(Mn)(Random urine): 0.0~7.9 μg/L；Creatinine(Random urine): Not available；Manganese to creatinine ratio:詳見備註。\n※參考值備註說明：特殊健檢管理分級建議指引之異常結果為\n≧3.0 μg/g Creatinine。","i":"檢測尿中錳濃度，可以反映體內代謝出的量，用以監控是否有異常暴露或是過度攝取情形。","cl":"錳是人體必需的微量元素，並可善動脈粥狀硬化者的脂質代謝、促進鐵質吸收以及參與骨骼合成，此外可以幫助抗氧化並消除自由基。我們日常生活中所攝取的食物與保健食品都含有錳，像是穀類、豆類、堅果類食物及綜合維他命。\n世界衛生組織(WHO)指出成人每天應攝取2~3 mg錳，至多不應超過8~9 mg，人體會自行協調錳吸收，如果食物中有較高量的錳，則吸收量會變小，相反的如果食物中含較低的錳則吸收率會增加。但是此協調是有限度的，過量的錳進入體內還是會吸收過量而造成中毒。\n錳過低造成發育遲緩、骨和生殖障礙；錳過高造成神經系統疾病、行動障礙、心智和情緒異常、不孕、類帕金森氏症。","tags":["其他"]},{"n":"Mango (芒果)","c":"FALMAN","p":"F30022A(1620點)","r":"是","ct":"03號綠頭管(Lithium heparin)","d":"全血4.5 mL","g":"生化免疫組","t":"其他","m":"螢光酵素免疫分析法(Fluorescence enzyme immunoassay, FEIA)","rv":"＜0.35 kU/L；參考值備註：0.35~0.69 kU/L(Class I)、0.70~3.49 kU/L(Class II)、3.50~17.49 kU/L(Class III)、17.5~52.49 kU/L(Class IV)、52.5~99.99 kU/L(Class V)、≧100 kU/L(Class VI)。","i":"定量分析特異性過敏原IgE之濃度，協助診斷IgE媒介之過敏疾病。","cl":"過敏性疾病大約佔全世界人口30%。過敏反應主要分為四型，其中過敏原引起主要為第一型過敏反應，為外因性氣喘、花粉熱或異位性濕疹的病人，當第一次接觸過敏原，症狀會立即發作，免疫系統會產生對應過敏原之過敏原特異性IgE抗體，其會循環於血液中並接合於mast cell上，當第二次接觸相同過敏原時，會使mast cell產生去顆粒作用，使細胞內之發炎性物質，例如：histamine、serotonin等，釋放至細胞外，造成流鼻水、打噴嚏等臨床症狀產生，嚴重者甚至產生休克。可藉由檢測血液中之引起過敏相關之特異性抗體IgE(如花粉、動物毛屑、塵?及家塵等)，此可輔助了解引起過敏之過敏原種類，仍需配合其它臨床證據一起判斷。","tags":["過敏"]},{"n":"Maternal serum prenatal screening (First trimester)(第一週產期母血產前胎兒篩檢)","c":"FSIFIR、FSIFIRT","p":"自費","r":"是","ct":"02號黃頭管(Serum separator tu","d":"全血3 mL","g":"生化免疫組","t":"其他","m":"均質式全自動螢光免疫分析法(Automated immunofluorescent assay)","rv":"(1)Free βhCG(5th percentile~95th percentile) \n11+0 week：16.68~120.47 IU/L\n12+0 week：14.63~105.69 IU/L\n13+0 week：11.28~81.49 IU/L\n14+0 week：8.29~59.89 IU/L\n(2)PAPP-A(5th percentile~95th percentile)\n11+0 week：0.790~5.620 IU/L\n12+0 week：1.140~7.720 IU/L\n13+0 week：1.650~11.080 IU/L\n14+0 week：2.310~15.560 IU/L","i":"於第一孕期(懷孕第11~14週)定量母血之Free βhCG及PAPP-A濃度，協助評估唐氏症胎兒高危險群之參考。","cl":"free β hCG結合PAPP-A及臨床資訊：可協助診斷第一周產期之染色體異常，第一周產期(11-14th)結合free β hCG、PAPP-A及頸部透帶(nuchal translucency,NT)及母親年齡，T21異常檢出率可達90%。","tags":["其他"]},{"n":"Maternal serum prenatal screening(Second trimester quadruple test)","c":"FSIQAD","p":"自費","r":"否","ct":"02-黃頭管(Serum separator tu","d":"2mL","g":"生化免疫組","t":"其他","m":"化學冷光免疫酵素分析法(chemiluminescence enzyme immunoassay)","rv":"(1)Down syndrome risk：＜1:270 for Taiwanese population(遺傳中心及婦產部醫師依國健局補助標準建議)。\n(2)α-fetoprotein MoM： 0.50~2.00；Free E3 MoM：0.50~2.00；βhCG MoM：0.50~2.00；Inhibin A MoM：0.50~2.00。\n(3)ONTD Risk: <1:1000 for Taiwanese population (遺傳中心及\n婦產部醫師建議)。\n(4)Trisomy 18 Risk：<1:100 for Taiwanese population (遺傳中心及婦產部醫師建議)。","i":"於第二周產期進行母血產前胎兒篩檢，提供Down syndrome Risk、ONTD(open neural tube defect) Risk、Trisomy 18 Risk，做為臨床評估高危險群用。","cl":"使用懷孕15~20週母血AFP、hCG、unconjugated estriol(Free E3)及Inhibin A四個血清指標計算唐氏症危險率。\n西元1996年Wald醫師發現懷有唐氏兒的母血中抑制素A(Inhibin A)濃度會較正常孕婦高出兩倍，進而發展出抽血檢測AFP、hCG、uE3與Inhibin A的四指標母血唐氏症血清篩檢，目前文獻報告四指標血清篩檢的偵測率可以大幅提高到83%。此外這項檢測包含甲型胎兒蛋白，若甲型胎兒蛋白升高，常與胎兒神經管缺損、腸胃道缺陷等問題相關，所以也可以顧及到神經管缺損的篩檢。 \nUnconjugated estriol(free E3)在正常妊娠時，血液循環中有90%的雌激素為春情素醇。檢測血清中未結合春情素醇的濃度，可作為胎兒生長和胎盤功能的良好指標。\n抑制素(Inhibin)是由女性卵巢的粒層細胞，及男性睪丸的賽托利氏細胞所分泌的異性二聚蛋白質荷爾蒙。他們會選擇性的抑制腦垂體的濾泡刺激素(FSH)並在生殖腺體中會有局部分泌作用。抑制素A是由一個α次單位和一個βA次單位所組成。測量抑制素A有助於人類生殖生理學的研究。在許多已發表的文章中顯示，量測抑制素A可作為一個監控卵巢功能的內分泌指標。\n將以上兩者與早期使用之alpha-feto Protein及beta-hCG可以提高偵測率到83%，5%的偽陽性率，同時提供Trisomy 18及神經管缺損疾病的風險值。是目前中華民國周產期醫學會推薦之篩檢方法。懷有唐氏症之母血，beta-hCG及Inhibin A會顯示比一般來的高而alpha-feto Protein及free E3濃度會比一般較低。在Trisomy 18、alpha-feto Protein、beta-hCG及free E3都同時呈現低值。","tags":["荷爾蒙/內分泌"]},{"n":"MDMA confirmation (GC/MS)","c":"FDPMDC","p":"自費","r":"否","ct":"21號10 mL尖底管","d":"10 mL","g":"生化免疫組","t":"其他","m":"氣相層析質譜儀分析方法(Gas chromatography-mass, GC-MS)","rv":"Negative","i":"MDMA篩檢陽性結果之確認試驗","cl":"協助臨床診斷搖頭丸濫用","tags":["其他"]},{"n":"MDMA screening","c":"FDPMDM","p":"10810B(250點)","r":"否","ct":"21號10 mL尖底管","d":"尿液10 mL","g":"生化免疫組","t":"其他","m":"酵素多重免疫分析方法(Enzyme Multiple Immunoassay Test, EMIT)，Dimension EXL，SIEMENS","rv":"Negative；\n檢驗備註：\n判定閾值：500 ng/mL\n(1)陽性結果代表尿液中疑似含有MDMA濃度相當或高於判定閾值500 ng/mL﹔陽性結果應進一步以氣相層析質譜儀分析法(GC-MS)確認。\n(2)陰性結果代表尿液中不含MDMA或MDMA濃度小於判定閾值500 ng/mL。\n(3)本篩檢結果僅適用於醫療用途(例如治療)；未經確認之陽性結果不可作為非醫療用途(如求職或法律用途)。","i":"定性篩檢尿液中是否存在MDMA(搖頭丸)","cl":"搖頭丸是中樞神經系統的刺激物質，具有安非他命的興奮作用及三甲氧苯乙胺(Mescaline)之迷幻作用。口服後會有愉悅、多話、情緒及活動亢奮的行為特徵。使用後與安非他命及古柯鹼有相似的副作用如精神症狀如混淆不清、抑鬱、睡眠問題、渴求藥物、嚴重焦慮、在使用期間或數週後會產生誇大妄想等，而生理症狀有食慾不振、心跳加速、精力旺盛、運動過度、肌肉緊張、不隨意牙關緊閉、噁心、嘔吐、視力模糊、眼球快速轉動、軟弱無力、寒顫或流汗、疲倦及失眠等。而中毒症狀包括體溫過高、脫水、低血鈉、急性高血壓、心律不整、凝血障礙、橫紋肌溶解及急性腎衰竭等症狀，嚴重者可能導致死亡。由於中樞神經抑制能力減弱，及易產生不會受傷害的幻想，濫用者往往對行為能力的安全性掉以輕心而易造成意外。搖頭丸主要經口服進入人體，經由消化道吸收，然後在肝臟失去活性，或以原形由尿液排出。這些排除模式相對重要，因尿液酸鹼值而定。MDMA在服用後約20~60分鐘開始作用，作用通常持續4~6小時，在正常情況下，MDMA可於24~72小時在尿液中測到其存在。當檢測結果為陰性表示無待測藥物之存在，若檢測結果高於篩檢閾值(cutoff 500 ng/mL)表示可能有待測藥物之存在。","tags":["腎臟","電解質/代謝"]},{"n":"Measles virus RNA (麻疹病毒核糖核酸)","c":"FVPMEA","p":"12183C (1200點)","r":"是","ct":"#43-病毒咽喉/直腸拭子、#81 RP拭子/保存","d":"不適用","g":"微生物組","t":"2天","m":"Real-time RT-PCR","rv":"Not detected","i":"提供檢體是否含麻疹病毒 RNA之檢測，以作為輔助診斷","cl":"正常人檢測結果為Not detected，若檢測結果為Positive 則表示檢體中含有麻疹病毒RNA。","tags":["其他"]},{"n":"Melon (哈密瓜)","c":"FALMEL","p":"F30022C(1620點)","r":"是","ct":"03號綠頭管(Lithium heparin)","d":"全血4.5 mL","g":"生化免疫組","t":"其他","m":"螢光酵素免疫分析法(Fluorescence enzyme immunoassay, FEIA)","rv":"＜0.35 kU/L；參考值備註：0.35~0.69 kU/L(Class I)、0.70~3.49 kU/L(Class II)、3.50~17.49 kU/L(Class III)、17.5~52.49 kU/L(Class IV)、52.5~99.99 kU/L(Class V)、≧100 kU/L(Class VI)。","i":"定量分析特異性過敏原IgE之濃度，協助診斷IgE媒介之過敏疾病。","cl":"過敏性疾病大約佔全世界人口30%。過敏反應主要分為四型，其中過敏原引起主要為第一型過敏反應，為外因性氣喘、花粉熱或異位性濕疹的病人，當第一次接觸過敏原，症狀會立即發作，免疫系統會產生對應過敏原之過敏原特異性IgE抗體，其會循環於血液中並接合於mast cell上，當第二次接觸相同過敏原時，會使mast cell產生去顆粒作用，使細胞內之發炎性物質，例如：histamine、serotonin等，釋放至細胞外，造成流鼻水、打噴嚏等臨床症狀產生，嚴重者甚至產生休克。可藉由檢測血液中之引起過敏相關之特異性抗體IgE(如花粉、動物毛屑、塵?及家塵等)，此可輔助了解引起過敏之過敏原種類，仍需配合其它臨床證據一起判斷。","tags":["過敏"]},{"n":"Meningitis & Encephalitis panel (腦(膜)炎病原體多標的核酸檢測)","c":"FVPMEI","p":"12212B (9689點)","r":"是","ct":"#53-螺旋綠頭管、#74-黑頭無菌玻璃管","d":"1 mL","g":"微生物組","t":"其他","m":"Nested multiplex PCR (巢式多重聚合?鏈反應)","rv":"Not detected","i":"(1)依據全民健康保險醫療服務給付項目及支付標準部分診療項目修正規定：\n(A)疑似有腦膜炎或腦炎徵兆或症狀之病人，且有實驗室檢查相關證據(含腦脊髓液)支持者。\n(B)限急診、感染科、兒科及神經內科專科醫師執行。\n(2)協助診斷引起腦膜炎/腦炎的特定微生物，但無法作為診斷或治療的唯一依據。陽性結果並未排除共同感染的可能性，也許同時感染本項目檢測物種之外的其他物種。陰性結果不代表排除中樞神經系統(CNS)感染，本項目無法檢測所有造成CNS感染的物種。\n本項目利用巢式多重聚合?鏈反應檢測有腦膜炎/腦炎徵兆或症狀的患者進行腰椎穿刺後採得的腦脊髓液(CSF)檢體，同時檢測及辨識檢體中多種細菌、病毒和酵母菌的核酸。可辨識的物種如下：\n(A)細菌\n(a)Escherichia coli K1\n(b)Haemophilus influenzae\n(c)Listeria monocytogenes\n(d)Neisseria meningitidis (encapsulated)\n(e)Streptococcus agalactiae\n(f)Streptococcus pneumoniae\n(B)病毒\n(a)Cytomegalovirus\n(b)Enterovirus\n(c)Herpes simplex virus-1\n(d)Herpes simplex virus-2\n(e)Human herpesvirus 6\n(f)Human parechovirus\n(g)Varicella zoster virus\n(C)酵母菌 Cryptococcus neoformans/gattii","cl":"中樞神經系統(CNS)感染會造成腦或腦周圍之腦膜組織的感染症狀(即腦膜炎、腦炎、腦膜腦炎；統稱為ME)。約15%的病例會致命，還有許多病例會造成長期失能，例如:四肢缺損、視力和聽力障礙；癲癇發作以及學習和記憶受到影響。","tags":["其他"]},{"n":"Mercury(Hg)(血中汞)、Mercury to creatinine ratio (尿中汞)","c":"FDPHG、FDPHGU","p":"10008B (200點)","r":"否","ct":"61號紫標籤深藍頭管(2支)；","d":"全血3 mL或隨機尿液10 mL","g":"生化免疫組","t":"其他","m":"感應耦合電漿質譜儀(lnductively coupled plasma-mass spectrometry, ICP-MS)","rv":"(1)血液＜20 μg/L，\n參考值備註說明：特殊健檢管理分級建議指引之異常結果為血中汞濃度≧100 μg/L；\n(2)尿液≦10 μg/L\n參考值備註說明：特殊健檢管理分級建議指引之異常結果為尿中汞濃度≧35 μg/g CRE。","i":"定量血中總汞量可協助評估急性汞中毒；定量尿中總汞量，協助慢性汞中毒之評估。","cl":"汞俗稱水銀，為人體非必需元素。金屬汞不易由腸胃吸收，汞蒸氣可經呼吸道大量吸收。汞在紅血球和其他組織會氧化成離子，易堆積於腎臟。少量被吸收的金屬汞及有機汞會通過血腦障壁進入腦部積存。體內汞主要是經由腎臟排出體外，但甲基汞主要由糞便排出。\n金屬汞、無機二價汞(一價汞是不溶解，不易被吸收)和甲基汞對人體都有傷害性，對生物毒害最大者為甲基汞，其次依序為汞蒸氣、無機汞和其他有機汞。\n甲基汞是一種短鏈烷基汞，易溶於脂肪，故易滲入細胞當中；甲基汞與-SH基的親和力極強，結合後會抑制體內許多酵素的活性，故其毒性比可溶性的無機汞高。自然界中的汞，常經由食物鏈進入人體，特別是魚體內常會堆積甲基汞。\n血液中的汞大於350 ug/L則具有毒性；尿中排出量24小時超過0.3mg，表示有中毒的可能。\n急性中毒:食入汞鹽會造成金屬性味道、口渴、劇烈腹痛、嘔吐、與血瀉、尿排出量減少或停止，因尿毒症而死亡。吸入高濃度汞蒸氣(>100mg/m3)，在1-2天發生口炎、流涎、金屬性味道、腹瀉、肺炎、腎損傷、腎衰竭。食入有機汞或烷基汞化合物，會傷害中樞神經系統有運動失調、舞蹈症、手足徐動症、震顫、與驚厥等症狀。\n慢性中毒:長期攝入汞鹽或有機汞化合物可產生蕁?疹，進而發生濕性皮膚炎、口炎、流涎、腹瀉、貧血、白血球減少、肝損傷、腎損傷至腎衰竭、無尿。長期吸入汞蒸氣、粉塵或有機汞蒸氣，或皮膚接觸汞或汞化合物，造成汞中毒，症狀有震顫、口炎、流涎、腹瀉、牙齒鬆動、牙齦出血現藍線、四肢痛及麻木、腎炎、腹瀉、焦慮、頭痛、食慾不振、精神抑鬱、幻覺、與精神崩潰。","tags":["肝臟/膽道","腎臟","貧血/血液疾病","結核/呼吸道"]},{"n":"Methanol","c":"FDPMTH","p":"10806B(150點)","r":"是","ct":"06號灰頭管","d":"全血4 mL(需採集2支灰頭管，每支各2 mL)","g":"生化免疫組","t":"其他","m":"氣相色層分析法(gas chromatography)","rv":"中毒濃度>20 mg/dL","i":"定量血漿中Methanol濃度，協助甲醇中毒之診斷與治療追蹤。","cl":"甲醇常被用來製造洗潔劑及燃料等產品。在工業用途中常被當作酒精的代用品，因此可能會因為誤食或喝到假酒而中毒。甲醇進入人體後，會經由alcohol dehydrogenase代謝成formaldehyde，再經由aldehyde dehydrogenase代謝成formic acid，其會造成人體嚴重的acidosis及optic neuropathy。","tags":["其他"]},{"n":"Methemoglobin (Met-Hb)","c":"FRCMET","p":"10808B(100點)","r":"是","ct":"08號A-line針筒","d":"1 mL A-line針筒為全血0.6~1.0 mL；3 m","g":"生化免疫組","t":"其他","m":"Reduced gas chromatography","rv":"0.0~1.5%","i":"測定變性血紅素在總血紅素中所佔的比例，可用來診斷「先天性氧化血紅素血症」或「變性血紅素血症」(methemoglobinemia) ，並可輔助診斷缺氧或紫紺症是否因變性血紅素增加引起。","cl":"正常人體內因為擁有「變性血紅素還原脢」(methemoglobin reductase)，能將過多的變性血紅素還原回正常的血紅素，因此變性血紅素大都維持在1 %以內。造成變性血紅素過高的情形可分為「先天性」及「後天性」二種。「先天性」多肇因於基因突變或先天缺乏變性血紅素還原脢，並在嬰兒期就開始出現無法解釋的紫紺症。「後天性」大都因藥物或化學物質引起，這些物質或藥物有sulfonamides、chlorates、nitrates、nitrites、aniline、phenacetin、benzocaine、lidocaine、prilocaine 等，多會促使血紅素二價鐵氧化成三價鐵，或是抑制變性血紅素還原脢的活性，導致變性血紅素增加。Methmoglobin無法與氧結合，若未能即時處理會造成cyanosis甚至死亡。血中含methemoglobin 3~15%時，皮膚會出現灰白或發紫(紫紺)，達20%可能造成cyanosis，含20~50%可能造成呼吸困難，大於70%可能造成死亡。","tags":["其他"]},{"n":"Methotrexate","c":"FDPMET","p":"10504B(320點)","r":"是","ct":"使用09號3 mL綠頭管(無分離膠)；得用4號紫頭","d":"全血2 mL","g":"生化免疫組","t":"其他","m":"化學冷光微粒酵素免疫分析法(One-step chemiluminescent Microparticle Immunoassay；CMIA)","rv":"Not available","i":"定量測試人類血漿中的抗腫瘤藥物Methotrexate之濃度，作為Methotrexate治療之監控。","cl":"甲氨蝶呤(Methotrexate, MTX, amethopterin)是一種葉酸(folate)抗代謝藥。它是氨基蝶呤(aminopterin)類似物，也來源於葉酸。MTX分子結構與葉酸不同，MTX蝶啶環(pteridine ring)上的4-氨基被羥基取代且N端沒有甲基(methyl group)。\nMethotrexate是一種抗腫瘤藥物，可單獨使用或與其他抗腫瘤藥物一起使用，作為治療白血病及其他疾病的抗腫瘤藥物。相對低劑量的MTX(大約每星期7.5~25 mg)已被用來治療嚴重牛皮癬、氣喘、類風濕性關節炎、類肉瘤病(sarcoidosis)及移植治療等非惡性疾病。中到高劑量之MTX(大約35 mg/m2~12 g/m2)配合leucovorin(citrovorum-factor)用來治療惡性骨肉瘤(osteogenic sarcoma)、白血病、非何杰金氏淋巴瘤、肺癌及乳癌。\n監測MTX濃度可避免藥物的過度毒性作用並確定干預反作用“rescue”療法。不良反應包括骨髓抑制、口腔炎、噁心、嘔吐、抽搐、肝腎異常、貧血、白細胞減少症、血小板減少症、骨質疏鬆症、神經毒性和白質腦病。目前沒有監測低劑量甲氨蝶呤治療的適應症。","tags":["腫瘤標記","貧血/血液疾病","過敏"]},{"n":"Milk (牛奶)","c":"FALMIL","p":"F30022C(1620點)","r":"是","ct":"03號綠頭管(Lithium heparin)","d":"全血4.5 mL","g":"生化免疫組","t":"其他","m":"螢光酵素免疫分析法(Fluorescence enzyme immunoassay, FEIA)","rv":"＜0.35 kU/L；參考值備註：0.35~0.69 kU/L(Class I)、0.70~3.49 kU/L(Class II)、3.50~17.49 kU/L(Class III)、17.5~52.49 kU/L(Class IV)、52.5~99.99 kU/L(Class V)、≧100 kU/L(Class VI)。","i":"定量分析特異性過敏原IgE之濃度，協助診斷IgE媒介之過敏疾病。","cl":"過敏性疾病大約佔全世界人口30%。過敏反應主要分為四型，其中過敏原引起主要為第一型過敏反應，為外因性氣喘、花粉熱或異位性濕疹的病人，當第一次接觸過敏原，症狀會立即發作，免疫系統會產生對應過敏原之過敏原特異性IgE抗體，其會循環於血液中並接合於mast cell上，當第二次接觸相同過敏原時，會使mast cell產生去顆粒作用，使細胞內之發炎性物質，例如：histamine、serotonin等，釋放至細胞外，造成流鼻水、打噴嚏等臨床症狀產生，嚴重者甚至產生休克。可藉由檢測血液中之引起過敏相關之特異性抗體IgE(如花粉、動物毛屑、塵?及家塵等)，此可輔助了解引起過敏之過敏原種類，仍需配合其它臨床證據一起判斷。","tags":["過敏"]},{"n":"Minimum inhibitory concentration","c":"FMIMIC","p":"自費：400元","r":"否","ct":"臨床檢體分離之菌株","d":"無","g":"微生物組","t":"其他","m":"藥物敏感性試驗：VITEK 2自動分析儀、瓊脂紙錠擴散試驗","rv":"依鑑定出的細菌之最低抑菌藥物濃度發報告\n提供臨床診斷與抗生素用藥參考","i":"提供抗生素感受性劑量，以作為臨床治療之參考。","cl":"提供抗生素感受性劑量，以作為臨床治療之參考。","tags":["其他"]},{"n":"Mixing APTT","c":"FHEMAP","p":"08092B(180點)","r":"是","ct":"10號1.8 mL淺藍頭管(3.2% buffer","d":"(A)患者Hct≦55％：上述採血試管建議採血量之±10％(","g":"血液及組織相容組","t":"2天","m":"Clotting method (Electromagnetic sensor)","rv":"Interpretation is based on Rosner index(1)Index：>15 suggests of factor inhibitor(2)Index：≦15 suggests of factor deficiency","i":"當APTT延長時，以混合試驗區分是凝固因子缺乏或是抑制物質造成之檢驗，如為凝固因子缺乏則立即混合或混合後兩小時檢測均可補正；如兩種混合任一或都不可補正時，表示檢體中有抑制物質存在。","cl":"此為APTT延長時，用以區分是凝固因子缺乏或是抑制物造成之檢驗，如為凝固因子缺乏則立即混合或混合後兩小時檢測均可補正。如兩種混合任一或都不可補正時，表示檢體中有抑制物質存在。常見造成APTT延長之抑制物為factor VIII inhibitor、factor IX inhibitor以及Lupus anticoagulant。","tags":["其他"]},{"n":"Mixing Prothrombin time","c":"FHEMPT","p":"08088B(150點)","r":"是","ct":"10號1.8 mL淺藍頭管(3.2% buffer","d":"(A)患者Hct≦55％：上述採血試管建議採血量之±10％(","g":"血液及組織相容組","t":"2天","m":"Clotting method (Electromagnetic sensor)","rv":"Interpretation is based on Rosner index(1)Index：>15 suggests of factor inhibitor(2)Index：≦15 suggests of factor deficiency.","i":"當PT延長時，以混合試驗區分是凝固因子缺乏或是抑制物質造成之檢驗，如為凝固因子缺乏則立即混合或混合後兩小時檢測均可補正；如兩種混合任一或都不可補正時，表示檢體中有抑制物質存在。","cl":"此為PT延長時，用以區分是凝固因子缺乏或是抑制物造成之檢驗，如為凝固因子缺乏則立即混合或混合後兩小時檢測均可補正。如兩種混合任一或都不可補正時，表示檢體中有抑制物質存在。一般而言，使PT延長之抑制物較少。","tags":["其他"]},{"n":"Morphine confirmation (GC/MS)","c":"FDPMOC","p":"自費","r":"否","ct":"21號10 mL尖底管","d":"10 mL","g":"生化免疫組","t":"其他","m":"氣相層析質譜儀分析方法(Gas chromatography-mass, GC-MS)","rv":"Negative(<300 ng/mL)","i":"Morphine篩檢陽性結果之確認試驗","cl":"協助臨床診斷Heroin濫用","tags":["其他"]},{"n":"Mosquito蚊子","c":"FALMOS","p":"30022C(1620點)","r":"是","ct":"03號綠頭管(Lithium heparin)","d":"全血4.5 mL","g":"生化免疫組","t":"其他","m":"螢光酵素免疫分析法(Fluorescence enzyme immunoassay, FEIA)","rv":"＜0.35 kUA/L(Class 0)；參考值備註：0.35~0.69 kUA/L(Class I)、0.70~3.49 kUA/L(Class II)、3.50~17.49 kUA/L(Class III)、17.5~52.49 kUA/L(Class IV)、52.5~99.99 kUA/L(Class V)、≧100 kUA/L(Class VI)。","i":"定量分析特異性過敏原IgE之濃度，協助診斷IgE媒介之過敏疾病。","cl":"過敏性疾病大約佔全世界人口30%。過敏反應主要分為四型，其中過敏原引起主要為第一型過敏反應，為外因性氣喘、花粉熱或異位性濕疹的病人，當第一次接觸過敏原，症狀會立即發作，免疫系統會產生對應過敏原之過敏原特異性IgE抗體，其會循環於血液中並接合於mast cell上，當第二次接觸相同過敏原時，會使mast cell產生去顆粒作用，使細胞內之發炎性物質，例如：histamine、serotonin等，釋放至細胞外，造成流鼻水、打噴嚏等臨床症狀產生，嚴重者甚至產生休克。可藉由檢測血液中之引起過敏相關之特異性抗體IgE(如花粉、動物毛屑、塵?及家塵等)，此可輔助了解引起過敏之過敏原種類，仍需配合其它臨床證據一起判斷。","tags":["過敏"]},{"n":"MRSA PCR (Methicillin抗藥金黃色葡萄球菌分子檢測)","c":"FVPMRS","p":"12182C(1000點)","r":"是","ct":"#78雙頭採檢棒。(請於採檢前跟檢驗醫學部索取專用","d":"無","g":"微生物組","t":"其他","m":"Real-time PCR","rv":"MRSA(具mecA及SCCmec基因 strain):Not detected","i":"(1)針對新入住加護病房的病人執行主動篩檢，請遵照院內感染控制規範時機送檢。\n(2)不建議重覆測試。\n(3)直接檢測Swab中是否含有Staphylococcus aureus(SA)的DNA，以及提供MRSA抗藥性菌株檢測。但不建議用於MRSA治療之依據或監控。","cl":"(1)Staphylococcus aureus 是人體皮膚、鼻腔、口腔、腸道之常在菌群，Methicillin-Resistant Staphylococcus Aureus (MRSA)係對Methicillin具抗藥性之金黃色葡萄球菌之簡稱，因它對大部分抗生素都具抵抗性，只有少數抗生素，如Vancomycin有效，但2002年已有VRSA出現。\n(2)MRSA在環境存活時間：床圍簾可達數日～數月，制服及實驗衣至少1日。因此，使用PCR執行MRSA/SA高感染發生率ICU的患者主動式篩檢，對院內感染控制具有極佳的偵測效果。\n(3)Cepheid Xpert SA Nasal Complete Assay偵測spa、mecA及SCCmec基因，spa陽性代表金黃色葡萄球菌存在，mecA及SCCmec基因陽性代表對beta-lactam類藥物具抗藥性之金黃色葡萄存在。","tags":["其他"]},{"n":"MTBC & RIF gene (add-on test for culture) (結核菌群和RIF基因(結核菌培養後續檢驗))","c":"FVPMTD","p":"12184C(2000點)","r":"否","ct":"35號50mL無菌試管","d":"Sputum 1 mL、其餘檢體3 mL","g":"微生物組","t":"其他","m":"Real-time PCR","rv":"(1)MTBC DNA：Not detected \n(2)Rif Resistance：Not detected","i":"(1)檢測是否含有結核菌群的基因，以及提供Rifampicin抗藥基因檢測。\n(2)臨床懷疑結核菌群感染，且尚未接受治療，或是近6個月內接受小於3天的治療","cl":"當MTBC結果為High、Medium、Low、Very low、Trace表示檢體可以檢測到MTBC，且在檢體中MTBC DNA含量的多寡。而Rif Resistance detected則代表有檢測到Rifampicin抗藥基因的存在。","tags":["結核/呼吸道"]},{"n":"Mycoplasma pneumoniae DNA PCR(肺炎黴漿菌聚合酵素鏈鎖反應檢測)","c":"FVPMPD","p":"12182C(1000)","r":"否","ct":"#49病毒專用採檢管 (含傳送培養液)","d":"無","g":"微生物組","t":"1週以上","m":"Real-time PCR","rv":"Negative","i":"臨床懷疑Mycoplasma pneumoniae","cl":"肺炎黴漿菌不具細胞壁，細胞形狀不定，體型極小可通過0.4 mm濾膜；感染後主要引起呼吸道症狀，如咽喉炎、支氣管炎與肺炎。臨床上，徽漿菌性肺炎又稱為原發性非典型肺炎，可經由飛沫傳染，少數菌落即可致病，一年四季皆會出現，潛伏期約為2~3週。一般肺炎常用的第一線抗生素對治療肺炎黴漿菌無效，通常使用macrolides或azalides治療，例如erythromycin與azithromycin。因此，早期快速診斷，釐清非典型肺炎致病原因是否為肺炎黴漿菌，對於臨床治療是非常重要的。 本檢驗使用Real-time PCR 原理進行檢驗，可以快速偵測臨床檢體中的肺炎黴漿菌 DNA。","tags":["結核/呼吸道"]},{"n":"Myoglobin","c":"FRCMYO","p":"12061B(100點)","r":"是","ct":"03號綠頭管（Lithium heparin）","d":"全血3.5 mL","g":"生化免疫組","t":"急診可","m":"雙向免疫酵素冷光分析法(two-site immunoenzymatic assay , sandwich)","rv":"Female：14.3~65.8 μg/L\nMale：17.4~105.7 μg/L","i":"定量偵測人類血液與尿液中肌球蛋白(Myoglobin)的含量。","cl":"肌球蛋白是目前所知當心肌壞死時，最早出現的生化標記。它的小分子量(17,800道爾頓)，比起如CK (分子量為 80,000道爾頓)或 LDH (分子量為130,000道爾頓)等酵素更容易釋放到血液循環中。肌球蛋白在出現胸痛症狀2~3小時後即可出現在週邊血液中，比CK-MB早3~6小時達到病理濃度。肌球蛋白的高峰值在疾病發生6~9小時後出現，而其他心肌酵素的高峰值要在12~19小時後才會出現。\nMyoglobin亦可協助診斷肌肉方面的疾病，在橫紋肌溶解症發生時，患者的血液及尿液中都會出現大量的myoglobin。其他會讓血液中myoglobin上升的還有外傷、嚴重的休克、局部缺血、肌肉過度使用、皮肌炎及肌肉萎縮症等。","tags":["其他"]},{"n":"Myoglobin (Urine)","c":"FRCMYU","p":"12061B(100點)","r":"是","ct":"28號Myoglobin專用試管(加200mg s","d":"10mL","g":"生化免疫組","t":"急診可","m":"雙向免疫酵素冷光分析法(two-site immunoenzymatic assay , sandwich)","rv":"<25 μg/L","i":"協助診斷橫紋肌溶解症","cl":"肌肉損傷會導致尿液中my
