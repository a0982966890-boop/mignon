測結果不可互換使用。目前本院使用的檢測試劑為Abbott Architect SCC試劑套組。","tags":["腫瘤標記"]},{"n":"Staphylococcal enterotoxin A金黃色葡萄球菌腸毒素A","c":"FALSTA","p":"30022C(1620點)","r":"是","ct":"03號綠頭管(Lithium heparin)","d":"全血4.5 mL","g":"生化免疫組","t":"其他","m":"螢光酵素免疫分析法(Fluorescence enzyme immunoassay, FEIA)","rv":"＜0.35 kUA/L(Class 0)；參考值備註：0.35~0.69 kUA/L(Class I)、0.70~3.49 kUA/L(Class II)、3.50~17.49 kUA/L(Class III)、17.5~52.49 kUA/L(Class IV)、52.5~99.99 kUA/L(Class V)、≧100 kUA/L(Class VI)。","i":"定量分析特異性過敏原IgE之濃度，協助診斷IgE媒介之過敏疾病。","cl":"過敏性疾病大約佔全世界人口30%。過敏反應主要分為四型，其中過敏原引起主要為第一型過敏反應，為外因性氣喘、花粉熱或異位性濕疹的病人，當第一次接觸過敏原，症狀會立即發作，免疫系統會產生對應過敏原之過敏原特異性IgE抗體，其會循環於血液中並接合於mast cell上，當第二次接觸相同過敏原時，會使mast cell產生去顆粒作用，使細胞內之發炎性物質，例如：histamine、serotonin等，釋放至細胞外，造成流鼻水、打噴嚏等臨床症狀產生，嚴重者甚至產生休克。可藉由檢測血液中之引起過敏相關之特異性抗體IgE(如花粉、動物毛屑、塵?及家塵等)，此可輔助了解引起過敏之過敏原種類，仍需配合其它臨床證據一起判斷。","tags":["過敏"]},{"n":"Staphylococcal enterotoxin B金黃色葡萄球菌腸毒素B","c":"FALSTB","p":"30022C(1620點)","r":"是","ct":"03號綠頭管(Lithium heparin)","d":"全血4.5 mL","g":"生化免疫組","t":"其他","m":"螢光酵素免疫分析法(Fluorescence enzyme immunoassay, FEIA)","rv":"＜0.35 kUA/L(Class 0)；參考值備註：0.35~0.69 kUA/L(Class I)、0.70~3.49 kUA/L(Class II)、3.50~17.49 kUA/L(Class III)、17.5~52.49 kUA/L(Class IV)、52.5~99.99 kUA/L(Class V)、≧100 kUA/L(Class VI)。","i":"定量分析特異性過敏原IgE之濃度，協助診斷IgE媒介之過敏疾病。","cl":"過敏性疾病大約佔全世界人口30%。過敏反應主要分為四型，其中過敏原引起主要為第一型過敏反應，為外因性氣喘、花粉熱或異位性濕疹的病人，當第一次接觸過敏原，症狀會立即發作，免疫系統會產生對應過敏原之過敏原特異性IgE抗體，其會循環於血液中並接合於mast cell上，當第二次接觸相同過敏原時，會使mast cell產生去顆粒作用，使細胞內之發炎性物質，例如：histamine、serotonin等，釋放至細胞外，造成流鼻水、打噴嚏等臨床症狀產生，嚴重者甚至產生休克。可藉由檢測血液中之引起過敏相關之特異性抗體IgE(如花粉、動物毛屑、塵?及家塵等)，此可輔助了解引起過敏之過敏原種類，仍需配合其它臨床證據一起判斷。","tags":["過敏"]},{"n":"Stone analysis","c":"FENSTO","p":"09078B(500點)","r":"是","ct":"26號萬用收集盒","d":"結石檢體體積必需大於半顆米粒","g":"臨床服務組","t":"其他","m":"傅立葉紅外線吸收光譜分析(ATR-FTIR)","rv":"Not available","i":"定性分析肝膽道、泌尿道結石成分分析","cl":"藉由分析結石成分，控制飲食避免復發。腎結石主要成分是Calcium Oxalate、Calcium Phosphate、Ammonium Mg Phosphate、Uric Acid、Sodium Urate、Ammonium Urate、Cystine、Calcium Carbonate，與經濟衛生情況、地域、飲食習慣、遺傳有關。其中草酸鈣佔70％以上，1/3的腎結石起始成因來自於感染。瞭解結石成份後，可以經由處方或飲食控制避免復發。","tags":["肝臟/膽道"]},{"n":"Stool culture for Salmonella and Shigella、Stool culture for Vibrio,Aeromonas and Plesiomonas、Stool culture for Pathogenic E coli O157、Stool culture for Campylobacter","c":"FMISSS、FMISVA、FMI157、FMICC","p":"13009(350點)(限用於檢驗醫令FMICC)；13007C(200點)、13023C(300點)、12130B (90點)、12131B (90點) (適用於檢驗醫令FMISSS FMISVA、FMI157)","r":"是","ct":"(A)糞便(Stool)、直腸拭子(Rectal","d":"檢體量未限定，但建議採集有血液或有化膿的部位為佳","g":"微生物組","t":"其他","m":"(1)菌名鑑定：VITEK MS微生物鑑定質譜儀\n(2)血清分型：Salmonella、 Shigella及E coli菌名確認後會操作血清分型。\n(3)藥物敏感性試驗：VITEK 2自動分析儀、瓊脂紙錠擴散試驗(Campylobacter spp.不需操作藥物敏感性試驗)","rv":"Not isolated","i":"懷疑感染Salmonella spp.、Shigella spp.、Vibrio spp.、Aeromonas spp.、Plesiomonas spp.及Pathogen E. coli O157或Campylobacter spp.等致病菌時，以協助臨床診斷細菌性腸胃炎。","cl":"(1)\tSalmonella spp.與Shigella spp.是引起細菌性腸胃炎最常見之病原菌。\n(A)Salmonella typhi會引起傷寒；Salmonella paratyphi A引起副傷寒。\n(B)Shigella spp.可引起細菌性痢疾。\n(2)Vibrio spp.、Aeromonas spp. 、Plesiomona spp.會引起人類腹瀉\n(A)Vibrio cholerae能引起霍亂，國人至東南亞旅遊偶爾會感染此病。Vibrio parahaemolyticus 能引起較溫和的腸胃炎，為台灣食物中毒最常見之菌株。 \n(B)Aeromonas spp.在淡水及海水中非常普通，在兒童所造成的腸胃道疾病常屬嚴重急性疾病，在成人通常會造成長期性腹瀉。 \n(C)Plesiomonas spp.在淡水或河水水域中可發現，造成的主要疾病均屬於腸胃炎。\n(3)感染E. coli O157的病人會出現出血性腹瀉，併發溶血性尿毒症候群（hemolytic uremic syndrome；HUS）\n(4)Campylobacter jejuni除了引起各種動物的疾病外，也常造成人類的腸炎，並且此菌也可能從健康的動物及人類身上分離出。","tags":["貧血/血液疾病"]},{"n":"Stool OB(Immuno-quantitative)糞便潛血免疫分析","c":"FSTFOBI、FSTFOB2","p":"85 (200點);09134C (80點)","r":"是","ct":"30號免疫法採便容器","d":"以專用採便棒採檢，需適量填滿採便棒溝槽，約取芝麻粒大小之糞便","g":"生化免疫組","t":"24小時","m":"多株抗體乳膠凝集免疫比濁法","rv":"<30ng/mL（依國民健康署公告，陽性cut-off值為≧30 ng/mL）","i":"可用於篩檢消化道出血之疾病，如大腸癌或其他之腸胃道出血。","cl":"主要用於檢測糞便中的人體血紅素濃度，以供大腸直腸癌之篩檢、診斷和治療追蹤。","tags":["其他"]},{"n":"Streptococcus pneumoniae Ag","c":"FCSSPA","p":"12172B(320點)","r":"是","ct":"75號立寶紅蓋檢體瓶","d":"1 mL以上","g":"微生物組","t":"其他","m":"免疫螢光法(Immunofluorescence Assay, FIA)","rv":"Negative","i":"尿液檢體可以檢測Streptococcus pneumoniae引起之肺炎。","cl":"可協助診斷pneumococcal pneumonia，但此檢驗無法區分viable或non-viable Streptococcus pneumoniae。檢測結果與檢體中的抗原量有關，須結合臨床診斷合併評估。","tags":["結核/呼吸道"]},{"n":"Synovial Crystal","c":"FCSCST","p":"16013C(131點)","r":"是","ct":"、36號15 mL無菌試管、47號針筒","d":"3 mL","g":"血液及組織相容組","t":"2天","m":"以偏光顯微鏡鏡檢結晶之雙折射性(Birefringence)進行鑑定","rv":"Negative","i":"Synovial Crystal鑑定適用於診斷各種結晶引起的關節炎","cl":"關節液中，若可直接看到結晶體，是診斷結晶性關節炎最直接有效的方法。臨床上急性痛風（gout）患者約90%可於關節液中發現Monosodium Urate(MSU)。而假性痛風（pseudogout）患者可於關節液中發現Calcium Pyrophosphate dihydrate(CPPD)。","tags":["其他"]},{"n":"Synovial fluid examination","c":"FCSSYN、FRBSYN","p":"16008C(168點)","r":"是","ct":"36號-15 mL無菌試管、47號-針筒、53號螺","d":"5 mL","g":"血液及組織相容組","t":"急診可","m":"(1)Appearance：以肉眼判讀\n(2)Cell count：以Hemocytometer進行細胞計數 \n(3)細胞分類以抹片進行判讀","rv":"(A)RBC count：0~2000（/μL）\n(B)Nucleated cell count：13~180（/μL）\n(C)Neutrophil：0~25%\n(D)Lymphocyte：0~78%\n(E)Monocyte：0~71%\n(F)Histiocyte：0~26%","i":"懷疑患者體內有積水感染或不明出血時，可執行此項檢驗。","cl":"(A)關節液嗜中性球增加（＞80%）與細菌性關節炎、尿酸痛風及類風濕性關節炎有關。\n(B)淋巴球增加見於類風濕性關節炎早期、慢性感染及膠原性疾病。\n(C)嗜伊紅白血球增加見於類風濕性關節炎、風濕熱、轉移型癌、寄生蟲感染等。\n(D)單核球增加見於病毒性關節炎、血清病或紅斑性狼瘡。","tags":["其他"]},{"n":"T. pallidum Ab confirmation","c":"FSITPH、FSITPA、FSITPHA、FSITPPN、FSITPHH、FSITPH1","p":"12018C(300點)","r":"是","ct":"02號黃頭管(Serum separator tu","d":"全血2.0 mL","g":"生化免疫組","t":"其他","m":"化學冷光微粒酵素免疫分析法(Chemiluminescent Microparticle Immunoassay, CMIA), Abbott Alinity i","rv":"Nonreactive(S/CO <1.0)","i":"檢測血清中梅毒螺旋抗體，協助梅毒感染之診斷。","cl":"Syphilis TP可作為RPR陽性結果之確認試驗或是判定是否曾有感染。","tags":["其他"]},{"n":"T3","c":"FENT3","p":"09117B(250點)","r":"是","ct":"03號綠頭管(Lithium heparin)。","d":"全血3.5 mL","g":"生化免疫組","t":"2天","m":"競爭型免疫酵素冷光分析法(competitive binding immunoenzymatic assay)","rv":"0.87~1.78 ng/mL","i":"定量偵測人類血清中總三碘甲狀腺素(triiodothyronine, T3)的含量，協助臨床診斷甲狀腺疾病。","cl":"甲狀腺機能正常的個體血清中，只有一小部份(20%)的總三碘甲狀腺素由甲狀腺合成分泌到血清中。總三碘甲狀腺素是由周邊組織進行四碘甲狀腺素的酵素去碘反應而來，是甲狀腺激素中唯一具有活性的，而四碘甲狀腺素的生物活性也是去碘作用後形成總三碘甲狀腺素才有。周邊血液的去碘作用受到嚴格控制。為了補償低總三碘甲狀腺素血症，增成總三碘甲狀腺素的正常活性濃度，四碘甲狀腺素轉化成總三碘甲狀腺素的比例增加，而形成甲狀腺素低能症。在甲狀腺誘發性免疫球蛋白的長期刺激下（格雷夫斯氏症Grave’s disease），甲狀腺會大量分泌總三碘甲狀腺素，使總三碘甲狀腺素/四碘甲狀腺素比例比起正常人有顯著的增加。\n臨床上血清總三碘甲狀腺素檢測是為了診斷甲狀腺疾病，在格雷夫斯氏症和其他常引起甲狀腺亢進的疾病中常見總三碘甲狀腺素升高。由於總三碘甲狀腺素濃度降低原發性甲狀腺疾病，例如毒性甲狀腺腫(Hashimoto’s thyroiditis)、新生兒甲狀腺低能症、或由下丘腦-垂體所導致繼發性甲狀腺功能低能症。","tags":["甲狀腺"]},{"n":"T4","c":"FENT4","p":"09010C(280點)","r":"是","ct":"03號綠頭管(Lithium heparin)","d":"全血3.5 mL","g":"生化免疫組","t":"其他","m":"競爭結合免疫酵素分析法(competitive binding immunoenzymatic assay)","rv":"6.09~12.23 μg/dL；\n※報告備註：Reference range, for adult use only.","i":"定量偵測人類血清或血漿中總四碘甲狀腺素（Thyroxine，T4）的含量，協助診斷及確認甲狀腺疾病。","cl":"T4和T3用來調節正常的生長和發育。它們維持體溫、刺激熱能產生以及影響所有碳水化合物的代謝和部分脂肪和維生素的代謝。在胎兒和新生兒的生長過程中也需要甲狀腺荷爾蒙。\n甲狀腺素像T4，是常在人類血清中偵測的項目，偵測包含結合型及游離型的T4。它通常用於單獨檢查甲狀腺功能或與其他甲狀腺檢測一起合併使用。在結合沒有不正常的情況之下，測量總四碘甲狀腺素可以可信地反映甲狀腺的狀態。然而，甲狀腺素結合蛋白(thyroxine-binding proteins, TBP)的改變會影響總四碘甲狀腺素的濃度，但不會改變未結合甲狀腺素的濃度。因此，T4的量可能會隨著TBG (thyroxine- binding globulin)的濃度增加而升高，例如懷孕、服用口服避孕藥或雌激素、先天性TBG增加、膽道性肝硬化(biliary cirrhosis)或感染性或慢性活動性肝炎。反之，當TBG的濃度減少時，例如腎病症候群、雄性素治療、糖皮質類固醇(glucocorticoid)治療、嚴重的全身性疾病或先天性TBG減少等，T4可能便會減少。新生兒血清中的TBG濃度較高，所以新生兒和嬰兒血清中的T4量比正常成年人的值高。\n臨床上測定T4的重要性，是在於診斷和確認甲狀腺疾病。升高的總T4濃度會發生在格雷氏疾病(Graves’ disease)、亞急性甲狀腺炎、毒性甲狀腺結或繼發性(垂體性)甲狀腺亢進中。相反地，在初發性甲狀腺疾病如Hashimoto’s疾病、新生兒甲狀腺低下，或是下丘腦-垂體缺陷所導致的繼發性甲狀腺低下中，常見到T4濃度低下。","tags":["肝臟/膽道","腎臟","甲狀腺","荷爾蒙/內分泌"]},{"n":"Tacrolimus","c":"FDPTAC、FRDTAC","p":"10536B(1080點)","r":"是","ct":"4號紫頭管(K2EDTA tube)","d":"全血2 mL","g":"生化免疫組","t":"急診可","m":"化學冷光微粒酵素免疫分析法(chemiluminescent Microparticle Immunoassay；CMIA), Abbott Alinity i","rv":"4.0~20.0 ng/mL；\n備註說明：\nVary with organ transplantation, patient risk factors, concomitant immunosuppression, and time post-transplant)\n1. liver transplant: early post-trasnplant 7-10; over one year 4-6;\n2. kidney transplant: < 6 months 5-15; > 6 months: 5-10;\n3. Prevention of graft-versus-host disease: 10-20.","i":"定量全血中tacrolimus濃度，協助腎臟及肝臟移植患者治療及追蹤。","cl":"Tacrolimus已被證實可有效治療移植後之排斥反應，常用於肝臟及腎臟移植患者。\nTacrolimus及cyclosporine同屬calcineurin inhibitor家族，為最常用之calcineurin inhibitor，但移植中心建議tacrolimus及cyclosporine同時並用。在體外，tacrolimus對抑制淋巴細胞活化能力較cyclosporine強50~100倍，研究證實tacrolimus為抗排斥之首選藥物。\nTacrolimus的安全有效治療範圍很窄，不適當的劑量可能造成排斥反應；toxic level可能造成腎毒性、神經毒性、移植後糖尿病、對感染之耐受性、惡性腫瘤、高血壓及腸胃道疾病等。監控血中tacrolimus 濃度可協助臨床控制移植後排斥，Tacrolimus可經由靜脈注射或口服進入人體，但胃腸道的吸收不定且不規律。Tacrolimus的藥動學研究已證實，其動力學在器官移植病人中有很大的個體間及個體內差異。因此臨床表現可能與tacrolimus之治療劑量無相關性，影響之原因包括年齡、移植類別、健康狀況及tacrolimus與其他藥物之交互作用。\nTacrolimus一般於肝臟代謝，血液中tacrolimus濃度會受到肝臟微粒體的藥物影響，尤其是影響cytochrome P450 enzyme的藥物，這些會抑制酵素而降低肝臟代謝能力的藥物，會使血液中tacrolimus濃度上升。若使用會誘發cytochrome P450 enzyme的藥物時，會使血液中tacrolimus濃度下降。\n許多最新研究結果指出，於腎臟移植時，搭配Mycophenolate(MMF)與IL-2 mAb誘發療法時，降低tacrolimus濃度即可產生足夠的免疫抑制效果，因此治療濃度可於3~7 ng/mL。","tags":["糖尿病","腫瘤標記","移植/免疫"]},{"n":"Testosterone","c":"FENTES","p":"09121B(150點)","r":"是","ct":"03號綠頭管(Lithium heparin)。","d":"全血3.5 mL","g":"生化免疫組","t":"2天","m":"競爭型免疫酵素分析法（competitive binding immunoenzymatic assay）","rv":"Females:<0.10-0.75 ng/mL；Males:1.75-7.81 ng/mL","i":"定量偵測人類血清與血漿中Testosterone的含量，以輔助性腺功能不足、腦下腺功能低下、泌乳激素過高症、腎臟功能衰竭、肝硬化、Kleinfelter’s syndrome, 腎上腺及睪丸腫瘤、先天性腎上腺增生症或下視丘-腦下腺-性腺軸相關疾病之診斷。","cl":"Testosterone主要以球蛋白結合性激素形式存在（sex hormone binding globulin, SHBG），也有一部份與由白蛋白鬆弛結合以及游離形式存在。男性Testosterone濃度的異常低下顯示性腺功能低下症，垂體功能減退、高泌乳素血症、腎功能衰竭、肝硬化或柯林菲特氏症（Klinefelter's syndrome）。腎上腺與睪丸腫瘤，先天性腎上腺增生或下丘腦-垂體-睪丸軸異常可導致男性Testosterone濃度升高。\n在女性，Testosterone由卵巢、腎上腺和周圍脂肪細胞產生，在血清中的濃度大約為男性的十分之一，和男性一樣，血清Testosterone的主要形式為結合SHBG，白蛋白結合和少量游離狀態存在。女性Testosterone濃度的持續升高，可預測多囊性卵巢綜合症的發生（polycystic ovary syndrome, PCOS）、卵巢莢膜細胞過度增殖（stromal hyperthecosis）、腎上腺和卵巢腫瘤，先天性腎上腺增生，和其他一些下丘腦-垂體-睪丸軸功能異常。","tags":["肝臟/膽道","腎臟","腫瘤標記","荷爾蒙/內分泌"]},{"n":"Theophylline","c":"FDPTHE、FRDTHE","p":"10509B(320點)","r":"是","ct":"3號綠頭管(Lithium heparin tub","d":"全血3.5 mL","g":"生化免疫組","t":"急診可","m":"同質性的酵素免疫分析法(Homogenous enzyme immunoassay method)","rv":"5.0~20.0 μg/mL(therapeutic range)；\n備註：\nChildren：5.0~15.0 μg/mL；Adults：10.0~20.0μg/mL","i":"定量血漿中Theophylline之濃度作為臨床治療藥物Theophylline血中藥物濃度監控之依據。","cl":"茶鹼是一抗氣喘藥物，比起劑量其作用與血清中的濃度更為相關。而嚴重的茶鹼毒性作用與血清的濃度相關但不常顯現出症狀，監測茶鹼的濃度可以避免嚴重的毒性作用。\n當茶鹼做為治療急性症狀時，監測血清濃度可幫助醫師調正給藥計畫以補償病患對茶鹼的清除率。對氣喘及其他氣管疾病的慢性治療也同樣的需要個人化的茶鹼劑量以維持血清中治療濃度。一般而言，茶鹼的劑量在快速成長的孩童體內可維持6個月，在其他病患體內可維持12個月。藥物使用的改變、藥物清除率改變時可能會需要測量血清茶鹼的濃度。\n過去用來監測血清中茶鹼濃度的方法包含氣液層析法、高效能液態層析法及免疫分析法。","tags":["藥物/毒物監測","過敏"]},{"n":"Thrombin time","c":"FHETT","p":"08025B(100點)","r":"是","ct":"10號1.8 mL淺藍頭管(3.2% buffer","d":"(A)患者Hct≦55％：上述採血試管建議採血量之±10％(","g":"血液及組織相容組","t":"其他","m":"Clotting method (Electromagnetic sensor)","rv":"15.5-17.9 sec.","i":"評估纖維蛋白的形成，當Factor XIII缺乏時，Thrombin time仍維持正常。當無法解釋PT、APT延長的原因時，應先進行Thrombin time測定，然後再進行其他進一步的檢測。\n此檢驗用於篩檢fibrinogen轉換為fibrin功能的缺陷，可用於篩檢或監控以下狀況\n(1)監控unfractionated heparin的治療\n(2)Fibrin形成異常或懷疑有嚴重fibrinogen缺損（如：dysfibrinogenemia）\n(3)DIC\n(4)Liver disease\n(5)監控纖維蛋白溶解的治療","cl":"以下狀況會導致thrombin time延長\n(1)纖維蛋白原異常，如dysfibrinogenaemia、severe hypofibrinogenaemia或先天性無纖維蛋白原血症congenital afibrinogenaemia)\n(2)後天性hypofibrinogenaemia，如DIC、fibrinolysis、liver diseases\n(3)使用治療藥物，如：heparin, hirudin, argatroban\n(4)Myeloma\n(5)異常高值的fibrin degradation products\n(6)檢體中含微量heparin、纖維蛋白溶解藥物或direct thrombin inhibitors","tags":["凝血/血栓"]},{"n":"Thyroglobulin","c":"FENTHG","p":"09111B(90點)","r":"是","ct":"03號綠頭管(Lithium heparin)代替","d":"全血3.5 mL","g":"生化免疫組","t":"2天","m":"單步驟免疫酵素冷光分析法(one step immunoenzymatic assay , sandwich)，Beckman Coulter","rv":"≦50.0 ng/mL","i":"定量偵測血液中無抗甲狀腺球蛋白抗體個體之甲狀腺球蛋白的含量，以協助甲狀腺切除患者之術後追蹤。","cl":"甲狀腺球蛋白(Thyroglobulin)為分子量660,000 Da之糖蛋白，為甲狀腺組織活動性增加時之一種十分敏感的血清標記物。缺乏時甲狀腺組織會作反應性增殖，因此血清中甲狀腺球蛋白的濃度會增加。Thyroglobulin是由甲狀腺濾泡細胞合成，且為T4, T3的前驅蛋白質。Thyroglobulin上升於甲狀腺機能亢進、Hashimotos’s disease, Grave’s disease甲狀腺腺瘤，乳頭狀癌，滋胚層(Trophoblastic)疾病或腎衰竭。Thyroglobulin下降於Thyrotoxicosis factitia、甲狀腺退化、手術切除、甲狀腺荷爾蒙治療。由於有多種疾病都會引起Thyroglobulin上升，所以懷疑癌症的病人在手術前的測定並沒有太大的意義。但是甲狀腺癌的病人手術切除後，Thyroglobulin是一個相當敏感的檢查，完全清除時表現低值，濃度上升時，代表癌細胞的轉移。甲狀腺炎表示有白血球的浸潤或者纖維化，也會測到Thyroglobulin在血液中升高的結果，但是如果在產生Thyroglobulin抗體的情況下，例如Hashimoto's thyroiditis，抗體會干擾此項檢查。\nThyroglobulin檢測結果會因試劑廠商之檢測方法和試劑特異性不同而有所差異，因此不同廠商檢測方法的檢測結果不可互換使用。目前本院使用的檢測試劑為Beckman Coulter Access Thyroglobulin試劑套組。","tags":["腎臟","甲狀腺","腫瘤標記","荷爾蒙/內分泌"]},{"n":"Thyroglobulin Ab","c":"FENTHY","p":"12068B(200點)","r":"是","ct":"03號綠頭管(Heparin)","d":"全血3 mL","g":"生化免疫組","t":"2天","m":"免疫酵素冷光分析法(Two-step immunoenzymatic assay, sandwich)","rv":"<4.0 IU/mL","i":"定量偵測人類血清與血漿中甲狀腺球蛋白抗體（Thyroglobulin Ab, TgAb）的含量，協助臨床診斷Autoimmune thyroid disease如Hashimoto’s disease, nontoxic goiter 及Grave’s disease。","cl":"甲狀腺球蛋白是一種分子量為660,000 daltons的醣蛋白，由兩個相同的次單位所組成，為甲狀腺中最主要的蛋白質。甲狀腺球蛋白分子中有140個酪胺酸殘基（tyrosine residue），其中40個可在甲狀腺素（T4）及三碘甲狀腺素（T3）生物合成過程中進行碘化作用，因此，為負責甲狀腺堆積碘的蛋白質。\n自體免疫甲狀腺疾病的病人常會出現Anti-Tg，Graves’ disease約有30%會出現anit-Tg，Hashimoto’s甲狀腺炎約有85%會出現anit-Tg，anti-Tg會與anti-TPO大多同時出現。約有10%健康人亦會偵測到anit-Tg，有將近1%的甲狀腺機能低下病患只有anti-Tg。Anti-Tg和輕微甲狀腺機能低下或甲狀腺機能亢進病例有關，且通常出現在其他自體免疫疾病患者中，例如類風溼性關節炎、惡性貧血及第一型糖尿病。30-60%的甲狀腺癌病患可測到anti-Tg。 在這類病患中，所測得之Tg抗原必須考慮是否可能存在顯著濃度的anti-Tg，因為Tg抗原之偵測可能會受到anti-Tg的存在所影響。\n此外，少量的anti-Tg也出現在將近20%的無症狀個體，尤其是老年人，且女性出現的情形多於男性，但這些自體抗體的臨床意義仍不明。\n血清中含有anti-Tg也許會干擾thyroglobulin檢測。","tags":["糖尿病","甲狀腺","腫瘤標記","貧血/血液疾病","自體免疫"]},{"n":"Total cell count and differentiation in BAL fluid","c":"FCSBAL","p":"16010C(170點)","r":"是","ct":"36號-15 mL無菌試管、47號-針筒、53號螺","d":"5 mL","g":"血液及組織相容組","t":"急診可","m":"(1)Appearance：以肉眼判讀\n(2)Cell count：以Hemocytometer進行細胞計數 \n(3)細胞分類以抹片進行判讀","rv":"(A)RBC count：The reference interval(s) and other method performance specifications are unavailable for this body fluid. Comparison of the result with concentration in the blood, serum, or plasma is recommended.\n(B)Nucleated cell count：The reference interval(s) and other method performance specifications are unavailable for this body fluid. Comparison of the result with concentration in the blood, serum, or plasma is recommended.\n(C)Neutrophil：0-2%\n(D)Lymphocyte：Non-smoker：4-10%、smoker：1-5%\n(E)Histiocyte：Non-smoker：88-96%、smoker：93-99%","i":"BAL檢查常用於協助診斷下呼吸道感染疾病","cl":"當檢體中Epithelial cell大於5/100 WBC時，代表檢體採集過程可能受到Bronchial cells污染。Lymphocyte增加可能發生在以下疾病：Extr. Allerg. Alveolitis、Sarcoidosis、Berylliosis、Tuberculosis、Alveolar proteinosis、Lymphage. carcinomatosis、Pneumoconiosis、Collagen disease、Drug induced disorder等，Neutrophil增加可能發生在以下疾病：Idiop. Pulm. fibrosis、ARDS、Collagen vascular disease、Pn、Infection。Eosinophils增加可能發生在以下疾病：Eosinophilic pneumonia、Churg-Strauss-Syndrome、Drugs、Asthma等。","tags":["結核/呼吸道"]},{"n":"Total Cholesterol","c":"FBILES","p":"09001C(70點)","r":"是","ct":"3號綠頭管(Lithium Heparin)可用0","d":"血液：3.5 mL，體液：3.5 mL","g":"生化免疫組","t":"急診可","m":"酵素反應法(Cholesterol oxidase method)","rv":"Total Cholesterol：＜200 mg/dL；T-cholesterol/HDL＜5。\n檢驗備註：\n(1)血液：Total Cholesterol依據美國國家膽固醇教育專案對罹患心血管疾病風險建議：\n高度風險≧240 mg/dL；\n中度風險200-239 mg/dL；\n低度風險＜200 mg/dL；\n(2)Ascites、Body fluid、Pleural Effusion: \n(A)Transudate: ≦45 mg/dL；\n(B)Exudate: >45 mg/dL or cholesterol (body fluid) to cholesterol (serum) ratio >0.3","i":"定量血清或血漿中總膽固醇的濃度，協助冠狀動脈疾病之診斷及治療追蹤。定量體液中膽固醇濃度分析可協助區分滲出液及漏出液。","cl":"總膽固醇的量測主要是用於診斷與治療血液中與膽固醇過量相關的疾病，以及脂質(lipid)和脂蛋白(lipoprotein)代謝障礙。\n血清總膽固醇分析，其被證明乃有助於高脂蛋白血症(hyperlipoproteinemia)、動脈粥狀硬化症(atherosclerosis)、肝臟疾病與甲狀腺疾病的診斷。總膽固醇和高密度膽固醇，再加以中性脂肪(triglyceride)的測定，對於冠狀動脈心臟病(coronary heart disease)的預測，能提供有用的資訊。","tags":["肝臟/膽道","心臟/心血管","甲狀腺"]},{"n":"Total P1NP","c":"FENPNP","p":"自費","r":"否","ct":"02號黃頭管(Serum separator tu","d":"全血3.5 mL","g":"生化免疫組","t":"其他","m":"電子化學冷光免疫分析法(Electrochemiluminescence immunoassay, ECLIA)","rv":"Pre-menopause停經前：15.13~58.59 ng/mL；\nPost-menopause All停經後：16.27~73.87 ng/mL；\nPost-menopause With HRT：14.28~58.92 ng/mL；\nPost-menopauseWithout HRT：20.25~76.31 ng/mL；\n(HRT荷爾蒙補充療法：Hormone Relpacement Therapy)","i":"定量血液中Total P1NP濃度，可使用於停經後婦女和Paget’s disease病人之骨質疏鬆症治療之監測。","cl":"第一型膠原蛋白(type 1 collagen)於骨骼中優先被生成的，佔有機骨基質中大於90%。第一型膠原蛋白(type 1 collagen)是由纖維母細胞(fibroblasts)和成骨細胞(osteoblasts)的第一型前膠原蛋白(type 1 procollagen)衍生而來，其含有氮端N-(amino)和碳端C-(carboxy)的延伸(extensions)。在procollagen轉換成collagen時，這些延伸部份(extensions)(前胜鏈(pro-peptides)會被特異性的蛋白?(specific proteases)移除，然後併入骨基質中。因檢測氮端N-(amino)延伸的部份，因此稱作第一型前膠原蛋白氮端前胜鏈(type 1 procollagen amino-terminal-propeptide, P1NP)。此標記P1NP是第一型膠原蛋白(type 1 collagen)沉積的特異性指標，因而可以訂為骨骼生成速度指標。P1NP在type 1 collagen形成期間會釋放到細胞內腔(intracellular space)，最後進入血流中。P1NP似乎是以三聚結構釋(源於三聚結構的膠原蛋白)，但快地會因熱退化效應而崩解成單體狀態，在Roche Elecsys檢測試劑是可偵測血液中這兩種片斷，因此稱total P1NP。\n對骨鬆病人施以Anti-resorption治療時(如使用bisphosphonate)，P1NP濃度會下降，若施以Anabolic藥物(如teriparatide)治療時，P1NP濃度會上升。治療骨鬆後若出現P1NP顯著濃度改變，代表治療有反應(effect)。因測定骨質密度(BMD)通常需在起始治療後12個月追蹤才可能反應BMD變化，但P1NP濃度的監測在治療起始後3~6個月即可見到變化，一般建議Anti-resorption開始治療後3個月，而Anabolic藥物開始治療後6個月即可監測。如果在治療前P1NP濃度是上升的，此時Anti-resorption治療目標為P1NP濃度能下降至停經前婦女的參考區間濃度，最好是低於此區間的平均值。當改變之幅度(治療前後濃度差值)高於1.81xCV(90%信賴區間)或1.19xCV(80%信賴區間)。\n[註：單尾檢定，CV為檢測方法的量測不確定度](參考文獻Lee J et al. Ann Lab Med 2012; 32: 105~112.)","tags":["其他"]},{"n":"Total protein","c":"FBITP)","p":"09040C(40點)","r":"是","ct":"03號綠頭管(Lithium Heparin)","d":"全血3.5mL","g":"生化免疫組","t":"急診可","m":"雙縮?法(Biuret method)","rv":"6.4~8.3 g/dL","i":"定量血液中總蛋白質的濃度，協助診斷和評估肝臟、腎臟或骨髓相關疾病，以及其他新陳代謝或營養的失調。","cl":"總蛋白(total protein)，主要為白蛋白(albumin)和球蛋白(globulin)之總和，albumin約佔血中蛋白總量的60%，當albumin過低時，常因肝臟細胞受損或是腎臟疾病等，albumin還可負責維持血液的滲透壓，若滲透壓不足時，就容易造成水腫。而globulin則是負責身體的免疫系統。白蛋白和球蛋白的比值(A/G ratio)，也常用於幫助慢性肝病病情的了解，是另一個肝功能的指標。\nTotal protein常增加於多源性或單源性gamma病變、脫水、藥物等；降低於肝臟疾病、腎病症候群、急性燒傷、蛋白質嚴重流失或缺乏、營養不良、急性發炎等。","tags":["肝臟/膽道","腎臟","電解質/代謝"]},{"n":"Transcutaneous bilirubin (TcB) 經皮測量膽紅素","c":"FRCNEBT","p":"09029C(50點)","r":"否","ct":"無需採檢","d":"無需採檢","g":"臨床服務組","t":"其他","m":"光學法","rv":"(1)Transcutaneous bilirubin(TcB)<15 mg/dL：與血漿bilirubin有良好之相關性，請密切追蹤。\n(2)Transcutaneous bilirubin(TcB)≧15 mg/dL：建議採血確認血漿bilirubin濃度。","i":"BiliChek會採集由新生兒皮膚所反射的光線，並以精密的專屬演算法進行分析以推算出血清膽紅素測量值。協助判定新生兒黃疸指數。","cl":"黃疸為血液中膽紅素過多所造成，其特徵為皮膚和眼睛泛黃。膽紅素為紅血球細胞分解的正常代謝產物，會由肝臟代謝出身體。出生前，嬰兒的膽紅素由母親的肝臟進行處理並排出體外。出生後，嬰兒無法仰賴母親的協助，必須自行清除膽紅素。嬰兒的身體系統可能需要花幾天的時間，才能使清除膽紅素的速度比血液產生膽紅素的速度快。早產、未飽足、或是特定種族的嬰兒會有較高的黃疸風險。黃疸的初步篩選為膚色泛黃。此種主觀的判斷很可能因膚色和懷孕期不同而有誤差。足月嬰兒的膽紅素含量一般在出生後 4 至 5 天達到最高，而早產兒的最高值可能會較晚出現。若嬰兒的血清膽紅素含量持續上升，則將會有核黃疸 (腦部膽紅素積存至有毒含量而造成永久的神經功能缺損) 的風險。","tags":["肝臟/膽道"]},{"n":"Transferrin","c":"FBITRA","p":"12048B(275點)","r":"是","ct":"03號綠頭管(Lithium heparin)。","d":"全血3.5mL","g":"生化免疫組","t":"急診可","m":"比濁法 (Turbidimetric method)","rv":"203~362 mg/dL","i":"定量血清中運鐵蛋白(transferrin)濃度，協助評估營養狀況及協助貧血之診斷及治療。","cl":"血漿中的鐵主要被運鐵蛋白攜帶著。血清中有50-70%的鐵結合在運鐵蛋白上。運鐵蛋白有兩個鐵結合部位。運鐵蛋白主要由肝臟合成，但不是僅由肝臟合成。在缺鐵時，血漿運鐵蛋白濃度會升高；在鐵過多時，運鐵蛋白濃度會降低。在缺鐵性貧血中，血漿運鐵蛋白濃度會升高。在妊娠後期和服用避孕藥時，運鐵蛋白的濃度會升高。在與蛋白流失增加有關的情況，例如腎病綜合症、慢性腎疾病、嚴重燒傷、蛋白缺乏狀態、慢性肝病中，運鐵蛋白濃度會降低。運鐵蛋白在發炎狀態或重大疾病期間，它會減少。Transferrin 在營養學上被視為一項很好的營養指標。","tags":["肝臟/膽道","腎臟","貧血/血液疾病"]},{"n":"Transfusion reaction work-up","c":"FBBITR","p":"11011B(500點)","r":"否","ct":"(A)血液07號6.0 mL紫頭管(K2 EDTA","d":"(A)紫頭管：全血6 mL \r\n(B)尿液：10 mL","g":"血庫組","t":"3天","m":"(1)血袋血型測定：立即離心法；輸血前後血型測定：管柱凝集法或立即離心法。\n(2)交叉試驗：立即離心法或管柱凝集法或間接抗球蛋白試驗。\n(3)紅血球不規則抗體篩檢：管柱凝集法或間接抗球蛋白試驗。","rv":"不適用","i":"患者輸血後發生不良反應之調查","cl":"血液或其成份畢竟是一項外來移植物輸入病人之後，可能受血液細胞性或非細胞性的免疫作用而有發生不良反應的危險，可能在輸血中、數小時後甚至數月不等時間後發生，其發生原因包括有文書作業疏失、捐血者與受血者間抗原抗體反應等，輸血反應調查即是藉由文書資料有再檢視、血型與抗體再測定以確認無人為疏失，並以各項檢驗協助調查輸血反應的發生原因。應針對每次輸血反應進行原因探討及調查，並盡可能找出原因以防止輸血反應的再次發生。","tags":["輸血/血型"]},{"n":"Triglyceride","c":"FBITRI","p":"09004C(120點)","r":"是","ct":"03號綠頭管(Lithium heparin)，得","d":"全血3.5 mL；體液檢體5 mL。","g":"生化免疫組","t":"急診可","m":"時間終點反應法(Timed-endpoint method)","rv":"(1)血液：＜150 mg/dL；檢驗備註：Borderline high_150-199 mg/dL；High_200–499 mg/dL；Very high_>500 mg/dL。\n(2)體液:\n  Chylous effusion：≧110 mg/dL\n  Pseudochylous effusion：＜50 mg/dL\n  50-110 mg/dL：equivocal","i":"定量血清、血漿中的三酸甘油脂濃度，協助臨床診斷代謝相關疾病。體液中三酸甘油脂濃度定量可協助區分乳糜液。","cl":"三酸甘油脂是自然界中脂肪的主要成分，主要功能是提供細胞的能量來源。三酸甘油脂的測定用於糖尿病、腎病、肝阻塞和其他涉及脂類代謝的疾病或者各種內分泌疾病的診斷和治療。\n三酸甘油脂分析在臨床上用於幫助分類各種遺傳性和代謝性脂蛋白失調，以及評估動脈粥樣硬化和冠心病的危險因素。\n測量三酸甘油脂的測量是用來診斷和治療有糖尿病、腎臟疾病、肝阻塞、與脂肪代謝有關的疾病、各種不同的內分泌失調。\n體液檢體檢測三酸甘油脂可協助區分乳糜液。體液檢體檢測有助於區分乳糜積液(chylous effusion)和假性乳糜積液(pseudochylous effusion)，乳糜由乳糜微粒和高濃度的三酸甘油脂組成，滲出液通常呈乳白色和渾濁，乳糜積液(chylous effusion)定義為由於乳糜從胸膜導尿管或其主要部位之一漏出而引起的漿液在漿液腔中的積聚。\n外傷可能由創傷破壞引起，因腫瘤或纖維化或肝硬化而阻塞。","tags":["肝臟/膽道","腎臟","糖尿病","腫瘤標記","荷爾蒙/內分泌"]},{"n":"Tryptase","c":"FSITRY","p":"12209B(1147點)","r":"是","ct":"採檢容器：血液／04號紫頭管(K2 EDTA tu","d":"3 mL全血","g":"生化免疫組","t":"其他","m":"螢光酵素免疫分析法(Fluorescence enzyme immunoassay, FEIA)","rv":"≦11.0 μg/L；※備註：依據EAAC(The European Academy of Allergy and Clinical Immunology)之國際共識判定有意義的上升為第一套Tryptase＞1.2×第二套Trptase + 2 μg/L。\n(參考資料Allergy. 2019;74:1157–1165)","i":"定量檢測血清中Tryptase，適用於診斷不明原因之急性嚴重過敏反應。","cl":"Tryptase會儲存於肥大細胞顆粒，於IgE媒介的過敏反應，肥大細胞會被活化並釋放發言媒介物質，包含tryptase，因此血液循環中tryptase含量可反應mast cells的數量。Tryptase也可作為嚴重昆蟲毒液過敏反應的臨床標記。昆蟲叮咬引發的全身性過敏反應平均盛行率約為3 %，高達25 %嚴重的毒液過敏反應病患的Tryptase濃度會升高。Tryptase也可作為手術時嚴重過敏反應的風險因子，當Tryptase濃度暫時性升高可作為確認嚴重全身性過敏反應(過敏性休克)的臨床標記。\nTryptase分析所有型態之α tryptase和β tryptase的總量。發生過敏反應時，β tryptase會瞬間上升。Tryptase的量往往在過敏反應啟動後的15~120分鐘達到最大量，其後在3~6小時緩緩下降。通常大約在反應的24小時後回復之基礎值(baseline)，因此建議採檢二次，第一次於病患休克發生的15~120分鐘採檢，此時Tryptase濃度會達到最高值，第二次於24~48小時採檢，確認Tryptase是否回到基準值。有全身性過敏的人體內的Tryptase濃度通常會持續大於20 μg/L；Tryptase的基準值範圍大約在10~20 ug/L，其數值上升反應了有嚴重過敏病史的病人體內肥大細胞的負荷及風險程度。結果需配合臨床醫師判讀。","tags":["過敏"]},{"n":"TSH","c":"FENTSH","p":"09112B(240點)","r":"是","ct":"03號綠頭管(Lithium heparin)。","d":"全血3.5 mL","g":"生化免疫組","t":"其他","m":"雙向免疫酵素冷光分析法(two-site immunoenzymatic assay , sandwich)(第三代試劑，最低偵測濃度0.005 μIU/mL)","rv":"0.38~5.33 μIU/mL(生物參考區間族群：男性和非懷孕女性，年齡18~88歲。)","i":"診斷自體甲狀腺疾病及區分非自體免疫性甲狀腺腫大或甲狀腺功能低下","cl":"由垂體前葉分泌分泌的人類甲狀腺刺激素(hTSH)是甲狀腺功能的主要調節因子，下丘腦分泌的促甲狀腺素釋放激素(thyrotropin-releasing horomones, TRH或TRF)，控制著人類甲狀腺刺激素的分泌。接著，該系統調節了三碘甲狀腺素(T3)和四碘甲狀腺素(T4)的合成和分泌。人類甲狀腺刺激素(hTSH)藉著其細胞表現的接受器與腺甘環狀?(Adenylate cyclase)的活化，來影響甲狀腺大量的代謝過程。Adenylate cyclase接著促進Cyclic AMP的產生，Cyclic AMP又被稱為人類甲狀腺刺激素的第二訊息傳遞者，可以引起一連串的細胞內代謝反應。此刺激導致增加T3和T4的合成和釋放，維持甲狀腺物理性和功能性的完整。\n人類甲狀腺刺激素測定的臨床應用，在於評估甲狀腺狀態。在下丘腦-垂體功能正常的病人，人類甲狀腺刺激素檢測被用來︰(1) 排除甲狀腺低能症(人類甲狀腺刺激素濃度升高)或甲狀腺亢進(人類甲狀腺刺激素濃度下降或不可檢測)；(2) 監測初發性甲狀腺低能症中，利用T4替代治療，或是甲狀腺亢進時的抗甲狀腺治療；(3) 甲狀腺冷結節(cold nodules)和非毒性甲狀腺腫(non-toxic goiter)中，追蹤檢測營養影響四碘甲狀腺素抑制療法後的人類甲狀腺刺激素；(4) 經過TRH刺激後的反應。由於敏感度和精確度的改進，人類甲狀腺刺激素檢測越來越被用來區分亞臨床或潛伏的甲狀腺亢進或低能症。\n根據檢驗方法不同，TSH生物參考區間可能會有所不同，不一定等於診斷甲狀腺功能障礙的臨界值。隨著第三代靈敏度的TSH檢驗方法的問世，TSH檢驗也被用於識別亞臨床或隱性甲狀腺功能低下或甲狀腺功能亢進。第三代TSH檢驗方法定義為功能靈敏度須達0.01~0.02 μIU/mL(mIU/L)，且CV?20％；臨床實驗室可能會使用更敏感、更精確的第三代TSH檢驗方法協助臨床區分Grave’s disease和亞臨床甲狀腺功能亢進有關的不同水平的TSH抑制，並有助於診斷妊娠和產後甲狀腺疾病。","tags":["甲狀腺","自體免疫"]},{"n":"UGT1A1 genotyping/UGT1A1 genotyping (專案計畫)","c":"FHPUGT/FHPUGT1","p":"自費，2000點","r":"是","ct":"07號6mL 紫頭管（K2 EDTA tube）","d":"6 mL","g":"血液及組織相容組","t":"1週以上","m":"PCR and Sanger Sequencing","rv":"UGT1A1*1(TA)6","i":"針對欲使用Irinotecan藥物治療之患者，檢驗UGT1A1基因型以調整用藥之劑量，也可運用於協助Gilbert Syndrome之偵測。","cl":"(1)Irinotecan（抗癌妥;CPT-11）是一種治療大腸癌的前驅藥物，機制是在體內經催化成有活性的SN-38之後，進而抑制癌細胞DNA topoisomerase I 而達到治療效果。SN-38 需要經UDP- glucuronosyltransferase (UGT1A1) 基因代謝成SN-38G後，才能經膽汁及尿液排出。根據研究顯示UGT1A1啟動子基因型（promoter）的多型性與UGT1A1蛋白質表現量有關，通常有5到8個 TA重複，最常見的是6個，重複的數量越多，UGT1A1蛋白質表現量越低，SN-38被代謝排出的效率就越差，副作用毒性也越強。5個TA重複(TA)5 被命名為*36 allele ; 6個TA重複(TA)6 被命名為*1 allele ; 7個TA重複(TA)7 被命名為*28 allele ; 8個TA重複(TA)8 被命名為*37 allele。一般正常人帶有6個TA重複(*1/*1)。文獻報導UGT1A1 * 36 allele和UGT1A1 * 37 allele幾乎完全發生在非洲裔人種。\n(2)根據研究顯示UGT1A1基因型若為Homozygous (*28/*28)的病患，使用高劑量Irinotecan後產生腹瀉或骨髓造血抑制等副作用的機率，是(*1/*1)的病患的7倍。若UGT1A1*28為Heterozygous(*1/*28)，部份病患也會有發生嗜中性球減少的情形。故美國食品藥物管理局建議，凡是具有Homozygous (*28/*28)或Heterozygous (*1/*28)基因型之病患，應考慮降低Irinotecan使用劑量。(reference: The Pharmacogenomics Journal (2011) 11, 61–71)\n(3)本檢驗項目除了運用於精準醫療(Irinotecan藥物選擇)外，也與Gilbert Syndrome (benign family hyperbilirubinemia)及Crigler-Najjar syndrome (rare form of nonhemolytic jaundice)有相關。","tags":["肝臟/膽道","腫瘤標記","貧血/血液疾病"]},{"n":"Urea Nitrogen(random urine)、Urea Nitrogen(24 hr urine)","c":"FBIUNU、FBIUNR","p":"09002C(40點)","r":"是","ct":"66號白頭塑膠管。","d":"尿液3 mL，白頭塑膠管約五分滿。","g":"生化免疫組","t":"急診可","m":"Urease GLDH (Rate method)","rv":"尿液(24小時)：7~16 g/day \nRandom urine：Not applicable","i":"定量尿液中尿素氮濃度，協助臨床診斷腎臟疾病。","cl":"尿素氮組成血液中75%的總非蛋白氮(NPN)。尿素氮是氨在肝臟代謝而合成，是蛋白質經脫胺作用而形成。經由腎絲球將血液中的尿素過濾到尿中，是體內排除過多的氨的主要方法。\n血中尿素氮的高低可以用來評估腎功能，包含腎前和腎後的功能狀態。尿素上升的腎前因素包括心臟代償失調、蛋白質代謝增加以及水份減少，腎中因素則有急性腎絲球腎炎、慢性腎炎、多囊腎、腎小管壞死以及腎硬化，腎後因素包括任何形式的尿道阻塞。尿素和肌肝酸都會被腎絲球過濾掉，但部分尿素又會在腎小管再次被吸收，而肌肝酸並不會被再吸收。因此在腎功能的鑑別診斷中，血清尿素氮和肌肝酸的測定經常一起執行。","tags":["腎臟"]},{"n":"Urea Nitrogen(血液、體液)","c":"FBIURE、FRCBUN","p":"09002C(40點)","r":"是","ct":"03號綠頭管(Lithium heparin)；","d":"(A)血液檢體—全血3.5 mL；\r\n(B)體液檢體—體液1","g":"生化免疫組","t":"急診可","m":"Urease GLDH (Rate method)","rv":"血液：7~25 mg/dL\nBody Fluid：Not applicable","i":"定量血液及體液中尿素氮濃度，協助臨床診斷腎臟疾病。","cl":"尿素氮組成血液中75%的總非蛋白氮(NPN)。尿素氮是氨在肝臟代謝而合成，是蛋白質經脫胺作用而形成。經由腎絲球將血液中的尿素過濾到尿中，是體內排除過多的氨的主要方法。\n血中尿素氮的高低可以用來評估腎功能，包含腎前和腎後的功能狀態。尿素上升的腎前因素包括心臟代償失調、蛋白質代謝增加以及水份減少，腎中因素則有急性腎絲球腎炎、慢性腎炎、多囊腎、腎小管壞死以及腎硬化，腎後因素包括任何形式的尿道阻塞。尿素和肌肝酸都會被腎絲球過濾掉，但部分尿素又會在腎小管再次被吸收，而肌肝酸並不會被再吸收。因此在腎功能的鑑別診斷中，血清尿素氮和肌肝酸的測定經常一起執行。","tags":["腎臟"]},{"n":"Urease test","c":"FMICLO","p":"13018C(200點)","r":"否","ct":"44號CLO培養皿(Strong Helicote","d":"該項目不適用","g":"微生物組","t":"其他","m":"呈色法","rv":"Negative","i":"本檢驗用以定性檢測胃黏膜上之幽門螺旋桿菌所產生的尿素酵素，以確定幽門螺旋桿菌之感染。","cl":"幽門螺旋桿菌會製造大量的尿素?，可水解尿素產生高濃度的ammonia，使幽門螺旋桿菌能夠在低的pH值環境中生存，減弱胃黏膜的防禦力和胃酸，並使胃上皮細胞分裂，造成急慢性胃炎、十二指腸潰瘍、胃潰瘍及非潰瘍性的消化不良。","tags":["其他"]},{"n":"Urine chemistry (Strip)","c":"FURROU、FRUROU、FURBIL、FURGLU、FURKET、FURPH、FURPRO、FURSP、FCCROU","p":"06013C(75點)","r":"是","ct":"21號10 mL尖底管","d":"10 mL","g":"血液及組織相容組","t":"急診可","m":"比重採折射儀原理，其他則是以光學法進行偵測。","rv":"(1)Glucose：≦50 mg/dL\n(2)Bilirubin：Negative\n(3)Ketone：<1+\n(4)Specific Gravity：1.003-1.035\n(5)Occult Blood：<1+\n(6)pH：5.0-8.0\n(7)Protein：≦20 mg/dL\n(8)Urobilinogen：Negative (mg/dL)\n(9)Nitrite：Negative\n(10)WBC esterase：≦25 Leu/uL\n(11)Color：Light-yellow、Yellow\n(12)Clarity：Clear","i":"可協助以下疾病之診斷：\n(1)泌尿系統疾病，如急慢性腎小球腎炎、急慢性腎盂腎炎、急慢性腎功能衰竭、腎病綜合征、膀胱炎、尿道炎、泌尿系結石、泌尿系腫瘤等。\n(2)全身性疾病伴繼發性腎損害，如糖尿病腎病，狼瘡性腎病，高血壓和動脈硬化腎損害，多發性骨髓瘤腎損害等。\n(3)其他系統或器官的疾病，如糖尿病、溶血性貧血、黃疸性肝炎、水與電解質或酸堿平衡失調等。","cl":"(1)Urine glucose\n(A)升高於葡萄糖代謝異常、腎小管功能低下等。正常尿糖應小於100 mg/dL，因此任何陽性反應都應做進一步的檢查，DM患者的尿糖常可見大於1000mg/dL以上。(B)高血糖症（Hyperglycemia）之相關疾病：糖尿病（Diabetes mellitus），胰臟炎（Pancreatitis），胰臟癌（Pancreatic cancer），肢端肥大症（Acromegaly），Cushing’s syndrome，甲狀腺機能亢進（Hyperthyroidism），嗜鉻性細胞瘤（Pheochromocytoma），中樞神經系統受損（CNS damage），壓力、緊張，妊娠性糖尿（Gestational diabetes）等。\n(2)Urine bilirubin\n(A)Direct bilirubin為水溶性，可由腎排至尿中，因此正常人尿中約有0.02 mg/dL，其值低於測試敏感度。當膽道阻塞時，肝臟無法將Direct bilirubin排到膽汁裡，血及尿中bilirubin便增加。溶血性貧血者，雖然血中Indirect bilirubin濃度會上升，但肝可將轉換成Direct bilirubin並排至膽汁中，因此尿中會增加urobilinogen，而bilirubin仍維持正常。\n(B)尿液中出現Conjugated bilirubin的情形可能為：膽管的堵塞（膽囊癌）導致Hemoglobin degradation cycle損壞；肝炎或肝硬化所引起而導致肝臟受損而使Conjugated bilirubin進入體循環內。\n(3)Urine ketone\n(A)一般人尿中並無 ketone bodies存在，但在醣類代謝發生障礙時，會由脂肪代謝產生能量供給身體所需，於是脂肪的代謝物 ketone bodies便在體內堆積，進而排至尿液中。因此，在糖尿病酮酸中毒、外科手術後，腸胃障礙、饑餓、嘔吐等情況，均容易檢出尿酮體。\n(4)Urine specific gravity\n(A)尿中大部分的溶質為氯化鈉和尿素，測定尿比重可以用來評估腎臟的濃縮與稀釋的能力，並可提供有關溶解於總檢體量中固態成份比率的情報。尿的濃度會因正常和病理性的理由而有所改變，有可能出現異常的濃縮或稀釋的情況，通常早晨的尿較為濃縮，此為正常的現象。\n(B)比重降低：表示腎臟的濃縮能力降低，發生在尿崩症、腎絲球腎炎、腎盂腎炎和其他疾病。\n(C)比重上升：發生在嚴重脫水（流汗、發燒、嘔吐、下痢）、腎上腺功能缺損、肝臟疾病、鬱血性心衰竭。\n(5)Urine occult blood\n(A)正常尿液中可能出現少量RBC，造成尿液潛血陽性反應主要有血尿（hematuria）、血色素尿（hemoglobinuria）、肌紅素尿（myoglobinuria）等。臨床上在尿液鏡檢下發現大於5 RBCs / HPF即具有臨床意義。\n(B)血尿：當腎生殖泌尿道出血、外傷或器官損傷時，尿中出現大量RBC稱為血尿（hematuria）如腎結石腎絲球疾病、腫瘤、外傷、腎孟腎炎、曝露在化學毒性中、激烈運動、月經等。\n(C)血紅素尿（Hemoglobinuria）：尿中並無完整的RBC，僅出現大量血色素，如溶血性貧血、輸血反應、嚴重燒傷、感染、激烈運動。\n(D)肌紅蛋白尿（Myoglobinuria）：肌肉組織的蛋白質由於肌肉組織受破壞造成，如外傷、長時間昏迷、抽筋、肌肉代謝疾病。\n(6)Urine pH\n(A)腎臟維持血漿和細胞外液之氫離子濃度的能力，並反應體內酸鹼狀態；呼吸性或代謝性酸中毒時，酸性尿將會產生；呼吸性或代謝性鹼中毒時，鹼性尿將會產生。造成這些現象可能如下：\n(B)腎功能障礙導致腎臟沒有能力分泌或再吸收酸或鹼而成為腎小管腎性酸中毒（renal tubular acidosis），病患無法正常代謝而尿液相對為鹼性；Hyperkaleminalkalosis病患則為paradoxial aciduria。\n(C)高蛋白食物、肉類產生酸性尿；蔬菜水果含較多bicarbonate產生鹼性尿，小紅莓、梅子或李子是例外的，會產生酸性尿。\n(D)結晶&結石尿結晶和腎結石的形成是溶解在尿液中的無機化學物沉澱，觀查尿結晶時，參考尿液的pH值是很重要的。\n(E)泌尿道感染某些分解尿素的細菌（特別是proteus sp.）產生的氨，會使尿液變為鹼性，維持酸性尿可以治療尿道感染，因他們不能在酸性環境下繁殖。\n(7)Urine protein\n(A)蛋白尿是指尿中蛋白過多，蛋白尿的患者可能沒有症狀，也可能有其他的症狀，例如腎臟相關症狀。依照蛋白尿出現的時間可區分為：\n(B)間歇性蛋白尿：偶而在尿中會含有過量的蛋白質，通常屬於良性。\n(C)持續性蛋白尿：腎前蛋白尿（Bence Jones protein）腎性蛋白尿（腎絲球、腎小管）腎後蛋白尿（腎盂、輸尿管、膀胱、尿道、生殖道）。\n(D)當尿蛋白增加時，表示腎臟可能有問題，如腎絲球膜的損傷、腎小管再吸收障礙。此外，泌尿道結石、全身性紅斑性狼瘡、多發性骨髓瘤、初期子癩症等疾病亦會出現蛋自尿。\n(E)有些蛋白尿與姿勢有關，如長時間的站立。\n(8)Urine urobilinogen\n(A)Urobilinogen的測定有助於肝臟疾病、溶血性疾病及膽道阻塞等疾病的確認，若與bilirubin一起判讀，更有利於診斷。\n(B)肝臟受損、（病毒、藥物、毒物）肝炎、肝硬化、肝癌或肝功能低下時從腎臟排出的urobilinogen增多；溶血性貧血也會造成尿液中urobilinogen增多。\n(9)Urine nitrite\n(A)健康人尿中不會有Nitrite，陽性反應表示尿中有超過105/mL的微生物，可作為UTI的指標（膀胱炎上行到輸尿管、腎盂和腎臟，會造成腎臟組織損傷、腎功能減少、高血壓、敗血症等），亦可作為抗生素治療的監測指標、反覆性感染的定期檢查與UTI高危險群（如糖尿病、懷孕婦人等）的監測。\n(B)臨床上出現Nitrite陽性的可能原因如下：\ni.Cystitis\nii.Pyelonephritis\niii.Evaluation of antibiotic therapy\niv.Monitoring of patients at high risk for urinary tract infection\nv.Screening of urine culture specimen\n(10)Urine WBC easterase：正常人尿液中的少量白血球不會呈陽性反應，如陽性反應發生，表示有大量Neutrophils於尿液中，可作為泌尿道感染的指標。\n(11)Color\n(A)紅色（Red）：血尿（hematuria）或血色素尿（hemoglobinuria）等的尿液外觀顏色為紅色；肌紅蛋白尿（myoglobinuria）的尿液外觀顏色為澄清（透明），紅色，紅褐色或深褐色。紫質病（porphyria）的尿液顏色為正常，紅色或紫色。\n(B)琥珀（Amber）、棕色（Brown）或橙色（Orange）：正常之高濃縮尿或含少量膽紅素（Bilirubin）其尿液外觀會呈琥珀色或棕色；而若尿中含有大量膽紅素者，則呈現橙色或深褐色。\n(C)綠色（Green）：尿液遭到Pseudomonas感染會呈現綠色尿\n(D)深褐色（Dark-Brown）：含血紅素的酸性尿液，放置一段時間後會形成含變性血紅素的深褐色尿；黑尿病（alkaptonuria）患者因尿液中含尿黑酸（homogentisic acid）或黑色素瘤（melanoma）的尿液中含黑色素（melanin），尿液靜置後會變深褐色或黑色。\n(12)Clarity：臨床上造成尿液濁度上升的原因有RBCs, WBCs, Bacteria, Yeast, Nonsquamous epithelial cells, Abnormal crystals, Lymph fluid, Lipids等。\n(13)Ascorbic Acid：許多食物和膳食補充劑(如維他命C或綜合維他命)中都含有抗壞血酸","tags":["肝臟/膽道","腎臟","心臟/心血管","糖尿病","甲狀腺","感染/敗血症","腫瘤標記","貧血/血液疾病","藥物/毒物監測","電解質/代謝","輸血/血型","荷爾蒙/內分泌"]},{"n":"Urine chemistry（Strip）","c":"FCCROU","p":"06013C（75點）","r":"是","ct":"21號10 mL尖底管","d":"10 mL","g":"臨床服務組","t":"其他","m":"試紙比色法(人工判讀)","rv":"(1)Glucose：Negative\n(2)Bilirubin：Negative\n(3)Ketone：Negative\n(4)Specific Gravity：1.003 - 1.035\n(5)Occult Blood：Negative\n(6)pH：5-8\n(7)Protein：Negative\n(8)Urobilinogen：Negative\n(9)Nitrite：Negative\n(10)WBC easterase：Negative\n(11)Color：Pale yellow－Yellow\n(12)Clarity：Clear","i":"可協助以下疾病之診斷：\n(1)泌尿系統疾病，如急慢性腎小球腎炎、急慢性腎盂腎炎、急慢性腎功能衰竭、腎病綜合征、膀胱炎、尿道炎、泌尿系結石、泌尿系腫瘤等。\n(2)全身性疾病伴繼發性腎損害，如糖尿病腎病，狼瘡性腎病，高血壓和動脈硬化腎損害，多發性骨髓瘤腎損害等。\n(3)其他系統或器官的疾病，如糖尿病、溶血性貧血、黃疸性肝炎、水與電解質或酸堿平衡失調等。","cl":"(1)Urine glucose\n(A)升高於葡萄糖代謝異常、腎小管功能低下等。正常尿糖應小於0.1 g/dL，因此任何陽性反應都應做進一步的檢查，DM患者的尿糖常可見大於1.0 g/dL以上。\n(B)高血糖症（Hyperglycemia）之相關疾病：糖尿病（Diabetes mellitus），胰臟炎（Pancreatitis），胰臟癌（Pancreatic cancer），肢端肥大症（Acromegaly），Cushing’s syndrome，甲狀腺機能亢進（Hyperthyroidism），嗜鉻性細胞瘤（Pheochromocytoma），中樞神經系統受損（CNS damage），壓力、緊張，妊娠性糖尿（Gestational diabetes）等。\n(2)Urine bilirubin\n(A)Direct bilirubin為水溶性，可由腎排至尿中，因此正常人尿中約有0.02 mg/dL，其值低於測試敏感度。當膽道阻塞時，肝臟無法將Direct bilirubin排到膽汁裡，血及尿中bilirubin便增加。溶血性貧血者，雖然血中Indirect bilirubin濃度會上升，但肝可將轉換成Direct bilirubin並排至膽汁中，因此尿中會增加urobilinogen，而bilirubin仍維持正常。\n(B)尿液中出現Conjugated bilirubin的情形可能為：膽管的堵塞（膽囊癌）導致Hemoglobin degradation cycle損壞；肝炎或肝硬化所引起而導致肝臟受損而使Conjugated bilirubin進入體循環內。\n(3)Urine ketone\n(A)一般人尿中並無 ketone bodies存在，但在醣類代謝發生障礙時，會由脂肪代謝產生能量供給身體所需，於是脂肪的代謝物 ketone bodies便在體內堆積，進而排至尿液中。因此，在糖尿病酮酸中毒、外科手術後，腸胃障礙、饑餓、嘔吐等情況，均容易檢出尿酮體。\n(4)Urine specific gravity\n(A)尿中大部分的溶質為氯化鈉和尿素，測定尿比重可以用來評估腎臟的濃縮與稀釋的能力，並可提供有關溶解於總檢體量中固態成份比率的情報。尿的濃度會因正常和病理性的理由而有所改變，有可能出現異常的濃縮或稀釋的情況，通常早晨的尿較為濃縮，此為正常的現象。\n(B)比重降低：表示腎臟的濃縮能力降低，發生在尿崩症、腎絲球腎炎、腎盂腎炎和其他疾病。\n(C)比重上升：發生在嚴重脫水（流汗、發燒、嘔吐、下痢）、腎上腺功能缺損、肝臟疾病、鬱血性心衰竭。\n(5)Urine occult blood\n(A)正常尿液中可能出現少量RBC，造成尿液潛血陽性反應主要有血尿（hematuria）、血色素尿（hemoglobinuria）、肌紅素尿（myoglobinuria）等。臨床上在尿液鏡檢下發現大於5 RBCs / HPF即具有臨床意義。\n(B)血尿：當腎生殖泌尿道出血、外傷或器官損傷時，尿中出現大量RBC稱為血尿（hematuria）如腎結石腎絲球疾病、腫瘤、外傷、腎孟腎炎、曝露在化學毒性中、激烈運動、月經等。\n(C)血紅素尿（Hemoglobinuria）：尿中並無完整的RBC，僅出現大量血色素，如溶血性貧血、輸血反應、嚴重燒傷、感染、激烈運動。\n(D)肌紅蛋白尿（Myoglobinuria）：肌肉組織的蛋白質由於肌肉組織受破壞造成，如外傷、長時間昏迷、抽筋、肌肉代謝疾病。\n(6)Urine pH\n(A)腎臟維持血漿和細胞外液之氫離子濃度的能力，並反應體內酸鹼狀態；呼吸性或代謝性酸中毒時，酸性尿將會產生；呼吸性或代謝性鹼中毒時，鹼性尿將會產生。造成這些現象可能如下：\n(B)腎功能障礙導致腎臟沒有能力分泌或再吸收酸或鹼而成為腎小管腎性酸中毒（renal tubular acidosis），病患無法正常代謝而尿液相對為鹼性；Hyperkaleminalkalosis病患則為paradoxial aciduria。\n(C)高蛋白食物、肉類產生酸性尿；蔬菜水果含較多bicarbonate產生鹼性尿，小紅莓、梅子或李子是例外的，會產生酸性尿。\n(D)結晶&結石尿結晶和腎結石的形成是溶解在尿液中的無機化學物沉澱，觀查尿結晶時，參考尿液的pH值是很重要的。\n(E)泌尿道感染某些分解尿素的細菌（特別是proteus sp.）產生的氨，會使尿液變為鹼性，維持酸性尿可以治療尿道感染，因他們不能在酸性環境下繁殖。\n(7)Urine protein\n(A)蛋白尿是指尿中蛋白過多，蛋白尿的患者可能沒有症狀，也可能有其他的症狀，例如腎臟相關症狀。依照蛋白尿出現的時間可區分為：\n(B)間歇性蛋白尿：偶而在尿中會含有過量的蛋白質，通常屬於良性。\n(C)持續性蛋白尿：腎前蛋白尿（Bence Jones protein）腎性蛋白尿（腎絲球、腎小管）腎後蛋白尿（腎盂、輸尿管、膀胱、尿道、生殖道）。\n(D)當尿蛋白增加時，表示腎臟可能有問題，如腎絲球膜的損傷、腎小管再吸收障礙。此外，泌尿道結石、全身性紅斑性狼瘡、多發性骨髓瘤、初期子癩症等疾病亦會出現蛋自尿。\n(E)有些蛋白尿與姿勢有關，如長時間的站立。\n(8)Urine urobilinogen\n(A)Urobilinogen的測定有助於肝臟疾病、溶血性疾病及膽道阻塞等疾病的確認，若與bilirubin一起判讀，更有利於診斷。\n(B)肝臟受損、（病毒、藥物、毒物）肝炎、肝硬化、肝癌或肝功能低下時從腎臟排出的urobilinogen增多；溶血性貧血也會造成尿液中urobilinogen增多。\n(9)Urine nitrite\n(A)健康人尿中不會有Nitrite，陽性反應表示尿中有超過105/mL的微生物，可作為UTI的指標（膀胱炎上行到輸尿管、腎盂和腎臟，會造成腎臟組織損傷、腎功能減少、高血壓、敗血症等），亦可作為抗生素治療的監測指標、反覆性感染的定期檢查與UTI高危險群（如糖尿病、懷孕婦人等）的監測。\n(B)臨床上出現Nitrite陽性的可能原因如下：\n(a)Cystitis\n(b)Pyelonephritis\n(c)Evaluation of antibiotic therapy\n(d)Monitoring of patients at high risk for urinary tract infection\n(e)Screening of urine culture specimen\n(10)Urine WBC easterase：正常人尿液中的少量白血球不會呈陽性反應，如陽性反應發生，表示有大量Neutrophils於尿液中，可作為泌尿道感染的指標。\n(11)Color\n(A)紅色（Red）：血尿（hematuria）或血色素尿（hemoglobinuria）等的尿液外觀顏色為紅色；肌紅蛋白尿（myoglobinuria）的尿液外觀顏色為澄清（透明），紅色，紅褐色或深褐色。紫質病（porphyria）的尿液顏色為正常，紅色或紫色。\n(B)琥珀（Amber）、棕色（Brown）或橙色（Orange）：正常之高濃縮尿或含少量膽紅素（Bilirubin）其尿液外觀會呈琥珀色或棕色；而若尿中含有大量膽紅素者，則呈現橙色或深褐色。\n(C)綠色（Green）：尿液遭到Pseudomonas感染會呈現綠色尿\n(D)深褐色（Dark-Brown）：含血紅素的酸性尿液，放置一段時間後會形成含變性血紅素的深褐色尿；黑尿病（alkaptonuria）患者因尿液中含尿黑酸（homogentisic acid）或黑色素瘤（melanoma）的尿液中含黑色素（melanin），尿液靜置後會變深褐色或黑色。\n(12)Clarity：臨床上造成尿液濁度上升的原因有RBCs, WBCs, Bacteria, Yeast, Nonsquamous epithelial cells, Abnormal crystals, Lymph fluid, Lipids等。\n(13)Ascorbic Acid：許多食物和膳食補充劑(如維他命C或綜合維他命)中都含有抗壞血酸","tags":["肝臟/膽道","腎臟","心臟/心血管","糖尿病","甲狀腺","感染/敗血症","腫瘤標記","貧血/血液疾病","藥物/毒物監測","電解質/代謝","輸血/血型","荷爾蒙/內分泌"]},{"n":"Urine Drug Abuse screening tests Panel","c":"FRDDAT1、FRDDAT2、FRDDAT3","p":"見”其他”欄位","r":"是","ct":"66號白頭塑膠管(2支)，得用21號10 mL尖底","d":"尿液3.0 mL尿液(白頭塑膠管五分滿)","g":"生化免疫組","t":"其他","m":"競爭性螢光免疫法(competitive fluorescence immunoassay)","rv":"Negative (Cutoff請見”其他”欄位說明)","i":"協助濫用藥物TCA、Amphetamines、Methamphetamines、Opiates、Cocaine、Benzodiazepines、Barbiturate、Tetrahydrocannabinol(THC)、Methadone Metabolite(EDDP)篩檢","cl":"陽性或陰性檢測結果表示待測物濫用藥物或其代謝產物是否存在尿液檢體，此為篩檢結果僅適用於醫療用途(如治療)，對於未經確認之篩檢結果不可使用於非醫療用途(如勞工檢查、法律要求檢查)，陽性結果應進一步以確認方法確認。","tags":["其他"]},{"n":"Urine for Trichomonas vaginalis","c":"FURTRI","p":"06009C(25點)","r":"否","ct":"21號10 mL尖底管","d":"10 mL","g":"微生物組","t":"急診可","m":"顯微鏡鏡檢法","rv":"Not found","i":"懷疑患者受陰道滴蟲感染時可執行此項檢驗","cl":"檢驗患者是否感染Trichomonas vaginalis","tags":["其他"]},{"n":"Urine pregnancy test (hCG)","c":"FURLLH,FRULLH","p":"06505C(100點)","r":"是","ct":"21號10 mL尖底管","d":"10 mL","g":"血液及組織相容組","t":"急診可","m":"免疫層析法（Chromatographic-immunoassay）","rv":"懷孕或其它會造成人類絨毛膜性腺激素(human chorionic gonadotropin)分泌增加的異常情況會呈現陽性反應。","i":"用於定性檢測懷孕早期尿液中的人類絨毛膜促性腺激素（hCG），提供醫師診斷是否懷孕之指標。","cl":"(1)此項目為懷孕提供初步診斷，但最終確認須由臨床醫師執行診斷。\n(2)Trophoblastic disease、testicular tumor、prostate cancer、breast cancer及lung cancer等疾病也會造成尿液hCG上升。\n(3)以正常28天月經週期，第14天為排卵日，如有懷孕，則最快可在上次月經後之第23天測得hCG。此hCG荷爾蒙濃度，約每兩天呈倍數上升，並在最後一次月經後之第7~12週達到最高濃度。\n(4)已生產或流產數週之病人，仍可測得陽性之hCG反應。","tags":["荷爾蒙/內分泌"]},{"n":"Urine Sediment","c":"FURSED、FRUSED、FCCSED","p":"06009C(25點)","r":"否","ct":"21-10mL尖底管","d":"10 mL","g":"血液及組織相容組","t":"急診可","m":"(1)全自動數位影像顯微攝影技術\n(2)替代方法：光學顯微鏡鏡檢","rv":"(1)RBC：＜3/HPF（＜16.5/μL） (2)WBC：＜5/HPF（＜27.5/μL） (3)Squamous Epithelial Cell：＜5/HPF（＜27.5/μL） (4)Other Epithelial Cell：Negative (5)Cast：Negative (6)Crystal：Negative (7)Bacteria：Absent (8)Yeast：Negative (9)Spermatozoa：Negative","i":"藉影像顯微攝影技術檢測尿液中之細胞、結晶等物質藉以協助診斷泌尿系統或代謝異常之疾病，也可用來作為健康檢查篩檢項目。","cl":"尿沉渣用於檢查泌尿道系統之有形成分，提供醫師在診斷泌尿道疾病時之判斷參考。RBC：代表泌尿道系統有出血現象。WBC：尿液出現白血球常與泌尿道系統發炎或感染有關，此外，自體免疫疾病、化學物質危害也會出現白血球。Squamous Epithelial Cell：數量過多可能為採檢時未確實留取中段尿。","tags":["自體免疫"]},{"n":"Urine sediment","c":"FCCSED","p":"06009C（25點）","r":"否","ct":"21號10mL尖底管","d":"10mL","g":"臨床服務組","t":"其他","m":"光學顯微鏡鏡檢","rv":"(1)RBC：0-3/HPF（＜16.5/μL）\n(2)WBC：0-5/HPF（＜27.5/μL）\n(3)Squamous Epithelial Cell：0-5/HPF（＜27.5/μL）\n(4)Transitional Epithelial Cell：Negative\n(5)Renal Tubular Epithelial Cell：Negative\n(6)Unclassified Epithelial Cell：Negative\n(7)Hyaline Cast：Negative\n(8)Granular Cast：Negative \n(9)Epithelial Cast：Negative \n(10)White Blood Cell Cast：Negative\n(11)Red Blood Cell Cast：Negative\n(12)Waxy Cast：Negative\n(13)Cellular Cast：Negative\n(14)Broad Cast：Negative\n(15)Fatty Cast：Negative\n(16)Unclassified Cast：Negative\n(17)Amorphous Crystal：Negative\n(18)Calcium Oxalate Crystal：Negative\n(19)Triple Phosphate Crystal：Negative\n(20)Uric Acid Crystal：Negative\n(21)Calcium Phosphate Crystal：Negative\n(22)Calcium Carbonate Crystal：Negative\n(23)Leucine Crystal：Negative\n(24)Tryosine Crystal：Negative\n(25)Cystine Crystal：Negative\n(26)Unclassified Crystal：Negative\n(27)Bacteria：Absent\n(28)Yeast：Negative\n(29)Spermatozoa：Negative","i":"藉由顯微鏡鏡檢檢測尿液中之細胞、結晶等物質藉以協助診斷泌尿系統或代謝異常之疾病，也可用來作為健康檢查篩檢項目。","cl":"尿沉渣用於檢查泌尿道系統之有形成分，提供醫師在診斷泌尿道疾病時之判斷參考。RBC：代表泌尿道系統有出血現象。WBC：尿液出現白血球常與泌尿道系統發炎或感染有關，此外，自體免疫疾病、化學物質危害也會出現白血球。Squamous Epithelial Cell：數量過多可能為採檢時未確實留取中段尿。","tags":["自體免疫"]},{"n":"Valproic acid","c":"FDPVAL、FRDVAL","p":"10510B(320點)","r":"是","ct":"3號綠頭管(Lithium heparin tub","d":"全血2.0 mL","g":"生化免疫組","t":"急診可","m":"同質性的酵素免疫分析法(Homogenous enzyme immunoassay method)","rv":"50.0~100.0 μg/mL (therapeutic range)／\n備註說明：\nMania: Clinical response seen with trough levels between 50.0~125.0 μg/mL","i":"定量血漿中Valproic acid之濃度作為臨床治療藥物Valproic acid血中藥物濃度監控之依據","cl":"Valproic acid是一種用途廣泛的抗癲癇藥物，可單獨或與其他抗癲癇藥物配合使用，以治療突然的發作。Valproic acid已被證實可有效的治療一般強直性癲癇、肌陣攣性癲癇和突發單一或複合式的大癲癇及局部小癲癇，特別是針對兒童的強直性癲癇和肌陣攣性癲癇最為普遍。Valproic acid對大部分癲癇病患的療效都不會產生抗藥性，已被證實可有效的運用於對其他抗癲癇藥物產生抗藥性的病患。\n要達到且維持Valproic acid的血清治療濃度是有困難的，由於病患與病患之間在藥物動力學的差異。藥物動力學差異可能因年齡、妊娠、腎衰竭、肝功能衰退、其他藥物、低白蛋白及其他因素影響。\nValproic acid的藥動參數使其可能會產生藥物交互作用。Valproic acid會廣泛的被肝臟代謝。其他共同使用的藥物，包含抗癲癇藥物可能會促進或是抑制肝臟內的藥物代謝酵素。當這些藥物加入或由病患的治療計畫中移除，Valproic acid的清除率以及濃度可能會受影響，而需要劑量的調整。\n高濃度的Valproic acid副作用包含中央神經系統的抑制、顫抖、血小板低下及肝指數的上升。高濃度的Valproic acid可能會造成胎兒的肝毒性、木僵、昏迷及腦水腫。\n過去用來監測Valproic acid的方法有非同位素免疫分析及氣相層析。","tags":["肝臟/膽道","腎臟","藥物/毒物監測"]},{"n":"Vancomycin","c":"FDPVAN、FRDVAN","p":"10531B(320點)","r":"是","ct":"3號綠頭管(Lithium heparin tub","d":"全血3.5 mL","g":"生化免疫組","t":"急診可","m":"同質性的酵素免疫分析法(Homogenous enzyme immunoassay method)","rv":"(1)治療最高濃度：20.0~40.0 μg/mL\n(2)治療最低濃度：\n備註說明Therapeutic levels: Trough10~20 μg/mL. \n(A)For complicated infections, trough concentrations of 15 to 20 μg/mL are recommended to improve penetration and improve clinical outcome; \n(B)For patients with nonsevere infection (such as soft tissue infection), a target trough of 10 to 15 μg/mL is warranted.","i":"定量血漿中Vancomycin濃度，作為臨床治療藥物血中藥物濃度監控之依據。","cl":"Vancomycin是一種醣?鍵(glycopeptide)類抗生素。Vancomycin可作為治療-lactam或methronidazole-resistant的革蘭氏陽性細菌感染時之治療藥物，尤其是對methicillin或cephalosporin具抗藥性之嚴重革蘭氏陽性菌感染。其為其他抗生素治療無效後之後線藥物，主要由腎臟排出，血漿中半衰期因個體年齡及腎臟功能而異。\n監控血液中vancomycin之peak及trough濃度可避免劑量過量產生之副作用，包括影響聽覺神經和腎臟功能。當病人與aminoglycosides一起使用常造成耳毒性(聽力損失)，此往往是永久性的傷害；單獨使用vancomycin造成腎毒性的情形不常見，但這損傷是可回復的。當循環中的藥物濃度非常高時，主要的中毒反應包括\"red-man syndrome\"、腎中毒與耳中毒。\n對於腎功能受損、肝功能受損、血液透析治療或是病態肥胖的病患、正在使用aminoglycoside治療的病患、小兒或是年長的病患而言，在使用Vancomycin時應謹慎仔細的監測其濃度。\n過去曾經使用的Vancomycin濃度監測方式有微生物的方法，免疫分析法及層析法。","tags":["肝臟/膽道","腎臟","藥物/毒物監測"]},{"n":"VDRL (Neurosyphilis screening)","c":"FSICSF","p":"12001C(70點)","r":"否","ct":"53號螺旋綠頭管","d":"0.5 ml CSF","g":"生化免疫組","t":"其他","m":"Agglutination，BD / BBL VDRL Antigen","rv":"Non-Reactive","i":"協助臨床神經梅毒之診斷","cl":"在懷疑中樞神經系統受到梅毒侵犯時，可以使用VDRL檢測CSF。並不瞭解是否RPR對IgM的敏感度，或試劑使用carbon carrier的干擾，對於CSF的檢體應作適當的標示，指定古老的VDRL檢驗，不應使用目前通用的RPR檢驗試劑。\n(1)梅毒感染後空窗期14-21天，之後，FTA-Abs第一個測得到，STS次之，TPHA在這一時期敏感度不足，這是FTA-Abs與TPHA唯一的差異。\n(2)嬰兒STS血清濃度上昇帶代表先天性梅毒(congenital syphilis)。\n(3)STS偽陽性約1％，通常與暫時性的發熱疾病、長期的自體免疫及慢性感染性疾病有關，TPHA偽陽性也會發生在上列的疾病，但通常STS、TPHA兩者同時偽陽性發生在同一病人的機會不高。TPHA對Lyme、leptospirosis、Borrelia spp.也會造偽陽性。\n(4)FTA-Abs是因為實驗室過有用到 Reiter treponema吸收掉非Treponema Pallidum的非特異性抗體，但是SLE、生殖道皰疹、高值或異常球蛋白也會產弱偽陽性，其他非梅毒Treponema感染的pinta(南美熱帶地方的螺旋體性皮膚病)、yaws(熱帶莓疹)、bejel(中東兒童非花柳性螺旋體病)也會得到陽性結果。\n(5)偽陰性的病人可能發生在AIDS的病人，最好重複序列血清方式證實之。碰到IV藥物濫用者偽陽性可能高達10％。血清TPHA/FTA-Abs不在早期感染侵犯神經的機會是30-40％，如果取得此一階段的CSF lymphocyte count、CSF protein上升、CSF VDRL上升，但臨床症狀並不明顯。梅毒未經治療產生慢性神經性梅毒的機會大約50％。\n(7)慢性神經性梅毒可能無症狀，或有典型的症狀：瞳孔對調節有反應對光無反應(Argyll Robertson pupil)，脊髓癆(tabes dorsalis)。\n(8)潛伏性的梅毒，STS、TPHA陽性；末期梅毒(侵犯心臟血管及梅毒腫gummatosis)，應該進一步測試慢性神經性梅毒的可能性。這是測定CSF的VDRL及FTA-Abs/TPHA，VDRL的陽性率80-95％，其中至少有50％，CSF lymphocyte count 、CSF protein上升。RPR的檢查數據CSF的檢體不可性。\nVDRL測試檢體必需先將檢體經過56℃、30分鐘。CSF的檢體與Serum的檢體唯一的不同點是，血清效價可作為治療指標，CSF效價有可能經過治療還是陽性，但唯一被證實可以作為神經性梅毒檢查者，只有VDRL。","tags":["感染/敗血症","自體免疫","藥物/毒物監測"]},{"n":"Viral panel (special body fluid)(特殊體液病毒多標的核酸檢測)","c":"FVPVIR","p":"12182C*5+12183C*1 (6200點)","r":"否","ct":"#47-針筒","d":"0.2 mL","g":"微生物組","t":"其他","m":"Nested multiplex PCR (巢式多重聚合?鏈反應)","rv":"Not detected","i":"懷疑眼球有下列病毒感染時：\n(1)Cytomegalovirus\n(2)Enterovirus\n(3)Herpes simplex virus-1\n(4)Herpes simplex virus-2\n(5)Human herpesvirus 6\n(6)Varicella zoster virus","cl":"(1)協助診斷特定病毒感染，但無法作為診斷或治療的唯一依據。\n(2)陽性結果並未排除共同感染的可能性，也許同時感染本項目檢測物種之外的其他物種。\n(3)陰性結果可能是由於此試驗沒有檢測的病原體所導致的感染、病原體濃度低於最低檢測極限。","tags":["感染/敗血症"]},{"n":"Vitamin B12","c":"FSIB12","p":"09129B(180點)","r":"是","ct":"03號綠頭管(Lithium heparin)","d":"全血3.5 mL","g":"生化免疫組","t":"2天","m":"競爭性免疫酵素冷光分析法( Competitive binding immunoenzymatic assay)","rv":"180-914 pg/mL","i":"定量偵測人類血清及血漿(肝素)中維生素B12 (Vitamin B12)的量，以評估B12缺乏症。","cl":"維生素B12是指鈷胺素群(cobalamins)中之ㄧ。鈷胺素可從動物製品如肉類、雞蛋、牛奶和其他乳製品中得到。在攝入的過程中，鈷胺素與一種在胃液內被稱為內源因子(intrinsic factor)的蛋白質相結合，之後會在迴腸內被吸收。內源因子是吸收過程中所必須的。一旦進入血液循環，鈷胺素會被吸收並儲存於肝臟中，之後再視需要經由B12結合蛋白(transcobalamins，鈷胺素轉運蛋白)的攜帶而釋放入血漿中。\n維生素B12是一種參與正常細胞生長和DNA合成，缺少維生素B12將導致巨母紅血球性貧血，且最終將導致嚴重的神經疾病。巨母紅血球性貧血的定義是在體內所有快速增生的細胞會有細胞增大以及數量下降的情形出現，包括骨髓細胞在內，而其最初的成因是由於DNA合成能力的下降。因為葉酸和維生素B12在蛋氨酸合成的反應途徑中是會共同參與的，所以兩者中任何一種的缺乏都會影響該代謝途徑並導致相同的臨床症狀。因此在臨床工作中一般應同時檢測這兩種維生素，而治療的方法則是視哪一種維生素的缺乏而定。","tags":["貧血/血液疾病"]},{"n":"VMA (24 hr urine)","c":"FENVMA","p":"09052B(300點)","r":"否","ct":"21號10 mL尖底管","d":"10 mL尿液(最少檢體量1 mL)","g":"生化免疫組","t":"其他","m":"高效液相層析法(High Performance Liquid Chromatography, HPLC)、UV及還原氧化電化學法(Electrochemical Detector, ECD)","rv":"1.90-9.80 mg/day；備註：The reference interval is only for Adult.","i":"定量尿液中VMA協助篩檢嗜鉻細胞瘤(pheochromocytoma)之診斷。","cl":"VMA是Epinephrine、Norepinephrine最主要終代謝物，主要用\n在診斷Catecholamine分泌性腫瘤。上升於75%神經母細胞\n瘤，通常數據在參考區間上限的兩倍以上，如果與Homovanillic Acid(HVA)或Catecholamine同時分析，敏感度可達95%-100%。VMA也上升於82%的嗜鉻細胞瘤。","tags":["腫瘤標記"]},{"n":"von Willebrand factor activity","c":"FHEVWA","p":"08111B(800點)","r":"是","ct":"10號1.8 mL淺藍頭管(3.2% buffer","d":"(A)患者Hct≦55％：上述採血試管建議採血量之±10％(","g":"血液及組織相容組","t":"1週以上","m":"Latex enhanced immunoturbidimetric assays (platelet-binding \nactivity of VWF (VWF:GPIbR))","rv":">50%","i":"藉偵測 Factor VIII activity、vWF activity與vWF antigen三者可用來協助診斷及分類 von Willebrand Disease（VWD）","cl":"(1)依據國際指引建議生物參考區間無須再區分ABO血型\n(2)von Willebrand factor activity>50%可排除von Willebrand Disease(VWD)\n(3)下列狀況可診斷Type 1 VWD\n(A)VWF activity：<30%\n(B)VWF activity：30-50%且有不正常出血\n(4)Factor VIII activity、vWF level (vWF antigen與vWF activity)可用來協助診斷及分類VWD\n(A)當vWF level檢測結果極低甚至無法測得時，可能為Type 3 VWD。\n(B)當Factor VIII activity、vWF level檢測結果均正常時，可排除VWD與Hemophilia A的可能性。\n(C)當vWF activity / vWF Antigen < 0.7時，病患可能是VWD Type 2A, 2B, 2M，可使用vWF multimer analysis 或VWF:CB/Ag (ratio of VWF collagen binding to antigen)及Genetic Testing進行鑑別診斷。\n(D)當vWF activity / vWF Antigen > 0.7時，病患可能是type 1 VWD。\n(E)當Factor VIII activity/ vWF level <1.0時，病患可能是Hemophilia A或Type 2N，可使用VWF:FVIIIB (VWF FVIII binding)與genetic testing進行鑑別診斷。\n(5)Unit Conversion：1 IU/mL=100%\n※參考來源：ASH ISTH NHF WFH 2021 guidelines on the diagnosis of von Willebrand disease, Blood Adv (2021) 5 (1): 280–300.","tags":["其他"]},{"n":"von Willebrand factor antigen","c":"FHEVWF","p":"08118B(400點)","r":"是","ct":"10號1.8 mL淺藍頭管(3.2% buffer","d":"(A)患者Hct≦55％：上述採血試管建議採血量之±10％(","g":"血液及組織相容組","t":"1週以上","m":"免疫比濁法(immuno-turbidimetric method)","rv":">50%","i":"藉偵測Factor VIII activity、vWF activity與vWF antigen三者可用來協助診斷及分類 von Willebrand Disease（vWD）","cl":"(1)血管性血友病因子 (Von Willebrand factor ，VWF) 是一種多聚血漿糖蛋白(multimeric plasma glycoprotein)，分子量達 15,000 kDa，是由「n」個相同的原聚體構成，每個原聚體包含兩個sub-units。\n(2)VWF由內皮細胞和巨核細胞合成，一旦從內皮細胞釋放到血流中，其中一部份被纖溶?消化，另一部份則可以透過吞噬作用(endocytosis)併入血小板顆粒中。\n(3)VWF參與初級止血和凝固，利用血小板黏附到血管內皮下層及透過與糖蛋白(GP)複合物Ib/IX和IIb/IIIa的連接參與血栓的形成，在凝血過程中，VWF作為factor VIII（抗血友病因子A）的載體並保護其免於降解。\n(4)von Willebrand Disease (VWD)是最常見的遺傳性出血疾病，臨床上常表現為黏膜皮膚出血，VWD可分為三種：：\n(A)I型為VWF數量的缺乏，最常見的型別，佔 VWD 70% ~80%，以體染色體顯性遺傳最常見\n(B)II型為VWF品質的缺陷；缺陷處位於多聚體結構中，是體染色體顯性或隱性遺傳\n(C)III型是血漿和細胞腔室中幾乎完全不存在VWF，是體染色體隱性遺傳\n(5)當下列情況，VWF濃度可能會降低：Myeloma、淋巴瘤、系統性紅斑狼瘡、甲狀腺功能低下\n(6)當下列情況，VWF濃度可能會增加：術後、感染、癌症、腎臟或肝臟疾病、心肌梗塞、懷孕、使用避孕藥、體能活動、壓力期間\n(7)依據國際指引建議生物參考區間無須再區分ABO血型\n(A)vWF antigen>50%可排除VWD(von Willebrand disease)\n(B)下列狀況可診斷Type 1 VWD\n(a)vWF antigen：<30%\n(b)vWF antigen：30-50%且有不正常出血\n(C)Factor VIII activity、vWF level (vWF antigen與vWF activity)可用來協助診斷及分類VWD\n(a)當vWF level檢測結果極低甚至無法測得時，可能為Type 3 VWD。\n(b)當Factor VIII activity、vWF level檢測結果均正常時，可排除VWD與Hemophilia A的可能性。\n(c)當vWF activity/vWF Antigen < 0.7時，病患可能是VWD Type 2A, 2B, 2M，可使用vWF multimer analysis 或VWF:CB/Ag (ratio of VWF collagen binding to antigen)及Genetic Testing進行鑑別診斷。\n(d)當vWF activity/vWF Antigen>0.7時，病患可能是type 1 VWD。\n(e)當Factor VIII activity/vWF level<1.0時，病患可能是Hemophilia A或Type 2N，可使用VWF:FVIIIB (VWF FVIII binding)與genetic testing進行鑑別診斷。\n(D)Unit Conversion：1 IU/mL=100%\n※參考來源：ASH ISTH NHF WFH 2021 guidelines on the diagnosis of von Willebrand disease, Blood Adv (2021) 5 (1): 280–300.","tags":["肝臟/膽道","心臟/心血管","甲狀腺","腫瘤標記","貧血/血液疾病","自體免疫","凝血/血栓"]},{"n":"VZV viral load (水痘帶泡疹病毒負荷量)","c":"FVPVZQ","p":"自費2000元","r":"否","ct":"採檢容器：","d":"(A)血液：3 mL(可分離血漿至少1 mL) \r\n(B)其","g":"微生物組","t":"其他","m":"Real-time PCR","rv":"Not detected","i":"提供檢體是否含VZV DNA之檢測","cl":"水痘帶狀泡疹病毒(Varicella-zoster virus，VZV)屬於DNA病毒，根據統計15歲之前即有90%以上的人感染過水痘，好發年齡為3-6歲，主要是經由人與人之間皮膚接觸；飛沫或空氣傳染，是傳染性極高的病毒。\n初次感染會出現全身性搔癢的水?疹，復原後病毒會潛伏在神經節中，當宿主免疫力減弱時，病毒會再活化沿著神經節散布，在皮膚出現帶狀?疹的臨床症狀，常發生在年紀大或是免疫功能失調者身上，非典型的帶狀?疹常與皮疹、?疹或是疥瘡混淆，較不容易由臨床表徵看出，藉由Real-Time PCR可協助VZV病毒活化複製的診斷。","tags":["其他"]},{"n":"WBC classification","c":"FHEWCL、FRHWCL、FHEEOS","p":"08013C(70點)","r":"是","ct":"04號-紫頭管；小兒科患者可採用13號-微量紫頭管","d":"(A)04號-紫頭管：3 mL\r\n(B)13號-微量紫頭管(","g":"血液及組織相容組","t":"急診可","m":"(1)自動血球計數儀:以半導體鐳射流式細胞技術\n(2)數位形態分析系統:計數血液抹片120顆白血球\n(3)人工鏡檢分類(血液抹片):計數血液抹片100顆白血球","rv":"(1)自動化白血球六項分類\n(A)Neutrophil：37.9-76.8 % \n(B)Lymphocyte：15.4-50.9 % \n(C)Monocyte：3.9-10.5 % \n(D)Eosinophil：0.3-7.9 % \n(E)Basophil：<1.4 % \n(F)\tImmature Granulocyte:0.2-1.1 %\n(G)\tMetamyelocyte：<1%\n(H)\tMyelocyte：0 %\n(I)\tPromyelocyte：0 %\n(J)\tReactive lymphocyte：≦5 %\n(K)\tLymphoma cell：0 %\n(L)\tBlast：0 %\n(M)\tPromonocyte：0 %\n(N)\tPlasma cell：0 %\n(O)\tAbnormal cell：0 %\n(P)\tLarge granular lymphocyte：≦10 %\n(Q)\tHairy cell：0 %\n(R)\tSezary cell：0 %\n(2)Normoblas
