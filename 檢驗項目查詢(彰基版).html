度上升的情形；其他情形如惡性腫瘤、敗血症、懷孕(晚期)、Hodgkin’s Disease、充血性心衰竭等，亦會呈現上升。血液ALP濃度下降於甲狀腺功能低下、惡性貧血和遺傳性鹼性磷酸?減少症等。","tags":["肝臟/膽道","心臟/心血管","甲狀腺","感染/敗血症","腫瘤標記","貧血/血液疾病"]},{"n":"Alpha-fetoprotein","c":"FSIFET、FRCFET","p":"12007C(200點)","r":"是","ct":"02號黃頭管(Serum separator tu","d":"全血3.5 mL","g":"生化免疫組","t":"急診可","m":"雙向免疫酵素冷光分析法(two-site immunoenzymatic assay , sandwich)，Beckman Coulter","rv":"≦9.0 ng/mL","i":"定量偵測人類血清中甲型胎兒蛋白(Alpha–fetoprotein, AFP)的量，協助臨床產AFP的腫瘤疾病之治療與追蹤。","cl":"α-胎兒蛋白(AFP)是一種單鏈醣蛋白，分子量為70,000 daltons。AFP與白蛋白高度相似，兩種蛋白質共同構成胎兒循環中的兩種主要蛋白質種主要蛋白質，AFP的產生主要發生在胎兒肝臟和卵黃囊中，其他器官的產生程度較低，因此在胎兒13週時AFP濃度會達到高峰，之後會逐漸下降，值至出生，到2歲時，正常狀況下還可檢測到微量的AFP。但當某些惡性腫瘤或懷孕時，會再次出現高濃度AFP。\nTatarinov最早證明甲型胎兒蛋白是一種腫瘤相關蛋白。隨後的研究證實了原發性肝癌中甲型胎兒蛋白濃度的升高，並將這種研究拓展到其他的惡性腫瘤研究，特別是睪丸非精原細胞瘤。\n此項睪丸非精原細胞瘤中甲型胎兒蛋白升高的發現，使得鑑別診斷胚胎細胞腫瘤變得更為容易。因為單純的精原細胞瘤是不會引起甲型胎兒蛋白的升高。在睪丸非精原細胞瘤病人中改變的甲型胎兒蛋白濃度有助於疾病的預測及診斷。例如甲型胎兒蛋白與人類絨毛膜性腺激素的結合，可作為預測罹患睪丸非精原細胞瘤病人存活的良好指標。此外，治療後病人血清中濃度的下降表示著成功的治療，而濃度上升則通常表示腫瘤的殘留或復發。\n甲型胎兒蛋白濃度升高也可在毛細管擴張運動失調症、遺傳性高酪胺酸血症、新生兒高膽紅素血症、急性與慢性病毒性肝炎、肝硬化以及其他惡性腫瘤中發現。因此，甲型胎兒蛋白不推薦做為一般人腫瘤檢測的篩檢工具。\nα-fetoprotein(AFP)檢測結果會因試劑廠商之檢測方法和試劑特異性不同而有所差異，因此不同廠商檢測方法的檢測結果不可互換使用。目前本院使用的檢測試劑為Beckman Coulter Access Access AFP試劑套組。","tags":["肝臟/膽道","腫瘤標記"]},{"n":"Alternaria tenuis ( 交錯黴菌)","c":"FALALT","p":"F30022C(1620點)","r":"是","ct":"03號綠頭管(Lithium heparin)","d":"全血4.5 mL","g":"生化免疫組","t":"其他","m":"螢光酵素免疫分析法(Fluorescence enzyme immunoassay, FEIA)","rv":"<0.35 KUA/L；參考值備註：0.35~0.69 kUA/L(Class I)、0.70~3.49 kUA/L(Class II)、3.50~17.49 kUA/L(Class III)、17.5~52.49 kUA/L(Class IV)、52.5~99.99 kUA/L(Class V)、≧100 kUA/L(Class VI)。","i":"定量分析特異性過敏原IgE之濃度，協助診斷IgE媒介之過敏疾病。","cl":"過敏性疾病大約佔全世界人口30%。過敏反應主要分為四型，其中過敏原引起主要為第一型過敏反應，為外因性氣喘、花粉熱或異位性濕疹的病人，當第一次接觸過敏原，症狀會立即發作，免疫系統會產生對應過敏原之過敏原特異性IgE抗體，其會循環於血液中並接合於mast cell上，當第二次接觸相同過敏原時，會使mast cell產生去顆粒作用，使細胞內之發炎性物質，例如：histamine、serotonin等，釋放至細胞外，造成流鼻水、打噴嚏等臨床症狀產生，嚴重者甚至產生休克。可藉由檢測血液中之引起過敏相關之特異性抗體IgE(如花粉、動物毛屑、塵?及家塵等)，此可輔助了解引起過敏之過敏原種類，仍需配合其它臨床證據一起判斷。","tags":["過敏"]},{"n":"Aluminum (Al)","c":"FBIAL","p":"10002B(400點)","r":"是","ct":"65號紅標籤深藍頭管","d":"全血5 mL","g":"生化免疫組","t":"其他","m":"感應耦合電漿質譜儀(Inductively coupled plasma-mass spectrometry，ICP-MS)","rv":"(1)非洗腎病人：<10 μg/L；(2)洗腎病人：<20 μg/L","i":"檢測血液鋁濃度以評估因鋁含量增加的相關疾病，如失智症及血液透析腦病變等","cl":"鋁是自然界含量相當多的金屬元素，鋁金屬元素一般人每天的攝取是約20~30毫克，這些攝取的鋁大多直接排出體外，很少累積在體內器官造成中毒，但如每天攝取量超過1公克，就可能造成體內器官累積鋁金屬而造成中毒。另外，腎功能欠佳、慢性尿毒症的病人無法透過腎臟正常代謝將鋁排出體外，也很容易導致鋁中毒。尤其是長期使用含鋁的制酸劑胃藥以治療尿毒所引起的上腸胃道不適，或是洗腎液含鋁太高，都是造成鋁中毒的原因，如洗腎患者有時會出現意識清楚卻整天不說話、肌肉力量正常但無法正常行走的現象，經電腦斷層、腦波檢查也沒有異常病變或老化，經抽血檢驗後才發現有鋁中毒的現象。正常人血中鋁濃度小於10 μg/L，而鋁中毒一般則定義為血中鋁濃度超過50 μg/L，易產生的症狀為鋁沉積在骨骼中，會導致軟骨症、骨質疏鬆、彎曲變形、骨折、關節疼痛等；鋁會影響腸道對磷、鐵、鍶、鈣等的吸收；對紅血球生成激素沒有反應而引起貧血等；攝入過量的鋁會在人體的神經細胞中積聚，損害神經細胞的功能，擾亂中樞神經系統引致精神紊亂，促發老人癡呆症(老人癡呆症病人腦含鋁量是正常人的10~30倍)。\n對於血液透析病人，因為腎臟功能受損對於鋁的代謝變差，容易造成鋁在身體的堆積，鋁容易沉積在腸、胃器官內，不易排出體外，容易引起腸、胃疾病、貧血與骨骼疾病。","tags":["腎臟","貧血/血液疾病"]},{"n":"Amikacin","c":"FDPAMI","p":"10512B(320點)","r":"否","ct":"04號紫頭管(K2EDTA)","d":"全血2 mL","g":"生化免疫組","t":"2天","m":"Enzyme Multiple Immunoassay (EMIT)","rv":"(1)Therapeutic range- Peak: 20.0-25.0 μg/mL；Trough：1.0-4.0 μg/mL\n(2)嚴重感染- Peak：25.0-30.0 μg/mL；Trough：5.0-8.0 μg/mL","i":"定量血漿中Amikacin之濃度作為臨床治療藥物Amikacin血中藥物濃度監控之依據","cl":"Amikacin是一種半合成的氨基糖甘類抗生素(aminoglycoside)\n，對很多病源體具有殺菌的活性，包括許多對其他氧基糖甘類抗生素產生抗藥性的細菌。Amikacin在體外具有對抗格蘭氏陰性菌、產青?素?及非產青?素?的葡萄球菌之活性。其藥效主要是在對氧基糖甘類失活酵素(aminoglycoside-inactivating enzymes)有高程度的抗性。針對格蘭氏陰性菌及格蘭氏陽性菌，半衰期為1.9-2.8小時，服藥後10~15小時濃度最穩定。一般用治療與氣管有關的肺炎及小孩格蘭氏陽性菌血症。\nAmikacin具腎臟、聽覺、前庭毒性、發熱發疹等副作用。","tags":["感染/敗血症","藥物/毒物監測","結核/呼吸道"]},{"n":"Amphetamine confirmation (GC/MS)","c":"FDPAMC","p":"自費","r":"否","ct":"21號10 mL尖底管","d":"10 mL","g":"生化免疫組","t":"其他","m":"氣相層析質譜儀分析方法(Gas chromatography-mass, GC-MS)","rv":"Negative(<500 ng/mL)","i":"陽性Amphetamines篩檢結果之確認試驗","cl":"(1)陰性(<500 ng/mL)：無待測藥物之存在\n(2)高於閾值(500 ng/mL)：有安非他命存在","tags":["其他"]},{"n":"Amylase","c":"FBIAMY、FRCAMY、FBIAMR","p":"09017C(50點)","r":"是","ct":"3號綠頭管(Lithium Heparin)，得用","d":"(A)全血：3.5 mL；\r\n(B)體液或尿液：1.5 mL","g":"生化免疫組","t":"急診可","m":"酵素速率法(Enzymatic rate method)","rv":"(1)血液：29~103 U/L； \n(2)尿液：男性16~491 U/L、女性21~447 U/L或Urine amylase to creatinine ratio≦310。\n(3)腹水：腹水澱粉?濃度平均約40 IU/L，於肝硬化無併發症的腹水之澱粉?與血清澱粉?比值約為0.4。","i":"定量血清、血漿及體液的澱粉?的活性，協助胰臟炎之診斷。","cl":"Alpha-澱粉?(Amylase)是一種消化澱粉的酵素，大量存在唾液和胰臟中，血液中含量不多。在胰臟疾病發生時，血液、體液及尿液澱粉?會快速增加，尤其是急性胰臟炎，血液活性於24小時達到最高峰，72小時恢復正常，因此可用來協助診斷胰臟病變。澱粉?增加於急性胰臟炎(70-95%)、胰臟假性囊腫(pancreatic pseudocyst)、胰管阻塞(膽囊炎、總膽管結石、胰臟癌、胰臟結石、狹窄、胰管括約肌痙攣)、腸道阻塞或梗塞、流行性腮腺炎(mumps)、腮腺炎(parotitis)、糖尿病性酮酸中毒、穿孔性消化性潰瘍、腹膜炎、巨澱粉酵素血症(macroamylasemia)；降低於胰臟功能不足、囊性纖維腫(cystic fibrosis)。慢性胰臟炎澱粉?可能正常或降低。","tags":["肝臟/膽道","糖尿病"]},{"n":"ANA(IFA) (抗細胞核抗體)( 間接免疫螢光法)","c":"FSIANA","p":"12053B(330點)","r":"是","ct":"03號綠頭管(Lithium heparin)。","d":"全血2 mL","g":"生化免疫組","t":"其他","m":"HEp-2間接免疫螢光法(HEp-2 indirect immunoflourescence, HEp-2 IIFA)","rv":"Negative at 1:80","i":"測量血清中的免疫球蛋白IgG 抗核抗體(ANA)，藉以診斷多種自體免疫疾病，如風濕類疾病。","cl":"抗核抗體(Auto-nuclear antibody, ANA)對很多自體免疫性疾病有診斷價值。ANA的目標抗原為細胞核內的不同成份，包括核酸、細胞核蛋白和核糖體蛋白。依據抗核抗體(ANA)螢光型態國際共識(ICAP)進行型態判讀，依據染色型態分為30型，為AC0~AC-29，分別為Negative(AC0)、Nuclear Homogeneous (AC1)、Nuclear dense fine speckled (AC2)、Centromere (AC3)、Nuclear fine speckled (AC4)、Nuclear large/coarse speckled (AC5)、Multiple nuclear dots (AC6)、Few nuclear dots (AC7)、Homogeneous nucleolar (AC8)、Clumpy nucleolar (AC9)、Punctate nucleolar (AC10)、Smooth nuclear envelope (AC11)、Punctate nuclear envelope (AC12)、PCNA-like (AC13)、CENP-F-like (AC14)、Cytoplasmic fibrilliar linear (AC15)、Cytoplasmic fibrilliar filamentous (AC16)、Cytoplasmic fibrillar segmental (AC17)、Cytoplasmic discrete dots/GW-body like (AC18)、Cytoplasmic dense fine speckled (AC19)、Cytoplasmic fine speckled (AC20)、Cytoplasmic reticular/AMA (AC21)、Polar/Golgi-like (AC22)、Rods and rings (AC23)、Centrosome (AC24)、Spindle fiber (AC25)、Spindle fiber (AC25)、Intercellular bridge (AC27)、Mitotic chromosomal envelope (AC28)、Mitotic chromosomal envelope (AC28)、Topo I-like (AC29)。","tags":["自體免疫"]},{"n":"Androstanedione","c":"FENASD","p":"27081B(290點)","r":"否","ct":"血液/ 02-黃頭管(Serum separat","d":"全血2 mL","g":"生化免疫組","t":"其他","m":"固相競爭性放射免疫分析法(Radioimmunoassay)","rv":"Males: Age (year)_\n20-67: 0.64-2.97 ng/mL；\n20-30: 0.65-2.20 ng/mL；\n31-40: 0.67-2.56 ng/mL；\n41-50: 0.74-2.61 ng/mL；\n51-67: 0.64-2.97 ng/mL。\nFemale: Age (year)_\n19-62: 0.35-2.78 ng/mL；\n19-30: 0.67-3.05 ng/mL；\n31-40: 0.48-2.55 ng/mL；\n41-49: 0.72-2.28 ng/mL；\n51-62: 0.26-1.31 ng/mL。\nPostmenopause(停經後)_\n0.30-2.07ng/mL。","i":"協助診斷先天性腎上腺肥大、腎上腺瘤和卵巢瘤。","cl":"(1)醇賀爾蒙，主要由腎上腺分泌。是睪固酮和雌酮的前驅物，而睪固酮和雌酮能轉化為雌二醇。功能類似稍為緩和的雄性素。女性即使雄二酮轉變為睪固酮的速率加快，雄二酮與運送球蛋白的結合力差於睪固酮，但血液中雄二酮量仍大於睪固酮量。\n(2)胎兒與新生兒時血液中雄二酮含量較高，孩童時則降低，青春期再升高。青春期與成年男性雄二酮主要來自於睪丸。成年女性雄二酮則來自於腎上腺、卵巢，與女性青春期的第二性徵性毛發育有關。卵巢分泌雄二酮受黃體激素的調節，隨月經週期而變化，更年期時分泌量亦減弱。腎上腺分泌雄二酮，無論男女性皆隨年齡增長而減低。\n(3)檢測血液中雄二酮量，可作為分析雄性素的有效指標。雄二酮量升高，可用來臆測是否先天的腎上腺肥大，或是腎上腺瘤和卵巢瘤。檢測雄二酮量，亦可用以偵測類皮質醣的治療效果。多囊性卵巢瘤、卵巢內膜增生、3β-hydroxysteroid dehydrogenase 不足、其他多毛症之女性，雄二酮量亦會高。原發性多毛症，則雄二酮量正常。","tags":["荷爾蒙/內分泌"]},{"n":"Anti- Rubella virus IgG","c":"FVPRUG、FVPARG","p":"14044B(240點)、健保專案64(200點)","r":"是","ct":"02號黃頭管((Serum separator t","d":"全血3.5 mL","g":"生化免疫組","t":"其他","m":"免疫酵素冷光分析法(immunoenzymatic assay, sandwich)","rv":"(1)Rubella IgG Interpretation：Negative；\n(2)Rubella IgG Concentation：< 10 IU/mL。","i":"定量測定德國麻疹病毒抗體IgG，協助診斷德國痲疹病毒感染以及免疫力參考。","cl":"Rubella感染在小孩和成人通常是一個輕微和短暫感染可以自癒的疾病。Rubella可以引起胎兒很嚴重的先天性缺陷，尤其是在懷孕的前三個月。因為先天的Rubella感染會導致嚴重的併發症，所以在評估生育年齡的婦女、孕婦或曾經近距離接觸感染患者的健康照顧工作人員的免疫情形是非常重要。","tags":["感染/敗血症"]},{"n":"Anti -SSA, Anti-SSB (可抽出的核抗體- SSA/SSB)","c":"FSIEN2","p":"12064B(561點)","r":"是","ct":"03號綠頭(Lithium heparin)管","d":"全血3.5 mL","g":"生化免疫組","t":"其他","m":"螢光酵素免疫分析法(Fluorescence enzyme immunoassay, FEIA)","rv":"Negative (＜7 EliA U/mL)","i":"定量血清中SSA,SSB，協助各種自體免疫疾病之診斷。","cl":"ANA抗核抗體篩檢試劑可偵測血清或血漿中具臨床相關性的循環自體抗體，這些自體抗體可協助診斷全身性自體免疫疾病，例如：系統性紅斑狼瘡、混和性結締組織疾病(MCTD)、未分化型結締組織疾病(UCTD)、修格連氏症候群、硬皮症(系統性硬化症, SSc)、皮肌炎、多發性肌炎(Polymyocytis, PM)、類風濕性關節炎(RA)、CREST症候群與雷諾氏症候群。(1)Anti-SSA Ab：檢測SS-A/Ro抗體對於全身紅斑性狼瘡 (systemic lupus erythematosus, SLE) (盛行率40-50 %)和修格蘭氏症候群(Sjogren's syndrome) (對於原發性修格蘭氏症候群的盛行率為60~75 %)的臨床診斷有其重要性及意義。(2)Anti-SSB Ab：陽性主要發生於Sjogren syndrome。SS-A及SS-B抗體也可能表現在ANA陰性 lupus、neonatal lupus。","tags":["自體免疫"]},{"n":"Anti- Toxoplasma IgG","c":"FVPTOX","p":"14042B(200點)","r":"是","ct":"02號黃頭管(Serum separator tu","d":"全血3 mL","g":"生化免疫組","t":"3天","m":"Indirect chemiluminescence immunoassay(間接化學冷光免疫分析法)(CLIA)","rv":"Negative","i":"協助判斷個體對弓漿蟲體之免疫狀態","cl":"Toxoplasmosis是相當普遍的傳染疾病，由寄生於細胞內的原生寄生蟲弓漿蟲(Toxoplasma gondii)造成。此疾病可以影響人類及溫血動物，能夠經由食用被蟲卵汙染的食物; 直接由家中飼養的寵物感染; 或是經由胎盤感染。文獻中也報導過可透過輸血或是器官移植造成感染。\n在正常的健康人族群，Toxoplasmosis的症狀通常為良性的，大部分為無症狀的; 有的時候會有溫和的症狀，例如:頭痛、喉嚨疼痛、無力; 少部分會伴隨著淋巴結炎。異常的情況下，可能造成較嚴重的症狀，包含心肌炎、肝炎、肺炎、腦膜炎和視網膜脈絡膜炎。陽性的血清學試驗結果會伴隨著年紀的增加而機率增加，指出為過去所造成的曝露感染。\n細胞性的免疫反應可保護宿主由寄生蟲感染造成的感染。因此當病人正接受免疫抑制的治療時，例如阻止器官移植後的排斥或是抗腫瘤的治療時，感染Toxoplasma gondii會更容易產生症狀。弓漿蟲腦炎已經被證明為後天免疫缺乏症候群病人死亡的主因。\n當感染發生在懷孕的婦女時，病原體會經由胎盤傳染給胎兒，Toxoplasmosis會造成對於胎兒的威脅，像是自發性的流產、早熟或是死胎等。當媽媽於懷孕的第一個妊娠期時感染弓漿蟲，對於胎兒會造成中樞神經系統的嚴重症狀，通常會造成胎兒死亡。於懷孕的第二妊娠孕期感染時，可能會造成胎兒水腦、心智及運動的發展遲緩、失明和大腦的鈣化。弓漿蟲的感染，最常發生於孕婦的第三妊娠孕期，造成胎兒視網膜脈絡膜炎和其他的眼睛疾病、中樞神經系統疾病或是潛在的無症狀感染。\n感染弓漿蟲後，在臨床症狀發生之後，會產生專一性的IgM抗體約2至4週，在3至9個月後會慢慢消失。因此，偵測到IgM或IgA的存在，而沒有IgG，或是低濃度的IgG時，可能是急性弓漿蟲感染的證據。相反的，如果可偵測到IgM及減少的或持續存在的IgG，為亞急性的感染。\n對於急性弓漿蟲感染的鑑別診斷，可透過專一性的IgM分析，即時給予適當的治療，減少免疫缺乏的病人及懷孕婦女的疾病風險。\n弓漿蟲的專一性IgG抗體在臨床症狀出現後，會逐漸上升，並在2至5個月達到高峰。因此，IgG抗體的存在對於診斷病人是否有感染弓漿蟲是很好的診斷標誌，特別是對於懷孕婦女的預防感染是很重要的。單次檢測不可診斷弓漿蟲感染，建議結合臨床表現和其他診檢查作為醫療處置依據。","tags":["肝臟/膽道","心臟/心血管","輸血/血型","結核/呼吸道","移植/免疫"]},{"n":"Anti-amoeba Ab","c":"FSIAMO","p":"13002B(320點)","r":"否","ct":"02號黃頭管(Serum separator tu","d":"全血2 mL","g":"生化免疫組","t":"其他","m":"酵素連結免疫分析法( enzyme-linked immunosorbent assay, ELISA), NOVATEC","rv":"Negative(<9.0 NTU)","i":"定性血清中Entamoeba histolytica IgG抗體，協助侵襲性阿米巴感染之病因診斷。","cl":"阿米巴病(Amebiasis)是由原生動物寄生蟲Entamoeba histolytica引起的疾病。這種生物在世界各地的發展中國家流行，可以在來自這些地區的移民和旅行者體內找到，這疾病通常表現出腸道症狀。在少數情況下，微生物會變成腸道外並導致不同器官形成膿腫。在可能受影響的器官中，肝臟是最常見的部位。通常，一旦疾病轉移到腸道外，便無法再在糞便中發現該生物體。如果有機體進入腸外，血清學測試可用於檢測Entamoeba histolytica的感染，並將有機體排除在其他疾病的診斷之外(如慢性肝病、潰瘍性結腸炎等)該血清學檢測無法檢測寄生蟲卵和寄生蟲之腸道感染，E. histolytica 糞便抗原檢測是腸道感染的正確檢測方式。\n由於抗體在臨床治癒後可能會持續數年，因此血清學抗體檢測結果陽性表示可能感染E. histolytica，但無法說明疾病活動性之感染；檢測結果陰性可說明無E. histolytica感染或病人免疫力低影響抗體產生。Entamoeba histolytica血清學檢驗結果可助臨床診斷，但不能作為唯一的診斷方法。","tags":["肝臟/膽道"]},{"n":"Anti-aquaporin-4 (AQP4) antibody; 水通道蛋白4抗體","c":"FSIAQP","p":"12210B(1781點)","r":"是","ct":"03號綠頭管(Lithium heparin)","d":"全血3.5 mL","g":"生化免疫組","t":"其他","m":"螢光免疫分析法( indirect fluorescent antibody assay, IFA )","rv":"Negative","i":"定性血清中Anti-aquaporin-4 (AQP-4) antibodies濃度，協助視神經脊髓炎(NMO , Opticospinal encephalomyelitis, Devices syndrome)之診斷及治療追蹤。","cl":"NMO是中樞神經系統後天性脫髓鞘病中較為罕見的一種（1%），這種病會伴隨著至少一側視神經（視神經神經炎）和脊髓(脊髓炎)的退化，後者大約發生在發病時或發病後幾個月。1870年Clifford Albut首次介紹了NMO，1894年Eugene Devic和學生Fernand Gault將其系統歸類為視神經脊髓炎綜合症。 \n在NMO患者中經常會發現具有極高特異性的血清自體抗體標誌物，而且這些標誌物不會在MS患者及健康個體中檢測到。依據最初的描述，被稱為NMO-IgG的抗體在間接免疫螢光實驗中引發中樞神經系統組織的白質與灰質中小動脈的Virchow-Robin間隙中出現特徵性螢光。AQP-4後來也被確定為目標抗原，AQP-4是一種水通道蛋白，調節中樞神經系統中的水和電解質的平衡。它在星形細胞中被表達，特別是在星形細胞終板區域。有趣的是，NMO患者中樞神經系統（也就是視神經和脊髓）的水通道被攻擊的頻率特別高，抗AQP-4自體抗體由周邊漿細胞產生，結合到中樞神經系統中的目標抗原之後，會導致補體的啟動並引發炎症性髓鞘脫失和壞死。疾病形式主要是視神經炎和3個以上脊柱節（主要位於血腦屏障內/上的區域）的局部脊髓炎。 \nNMO以前被認為是MS的一種局部形態。但目前的研究已經認識到它其實是一種單獨的病症，並有其相應的致病因。MS仍被認為主要是T細胞介導的疾病，而NMO病症的發展似乎是由體液機制所引起的。除了自體抗體的檢測之外，對於NMO的診斷還包括組織形態學檢測（血管抗體與補體的沉積）、以及從血漿中去除免疫球蛋白、減少B淋巴細胞治療策略（血漿置換術、抗CD20單株抗體rituximab等）的良好效果。一方面，NMO的症狀可以表現為在數小時至數天內發展為單眼或者雙眼的急性視覺障礙甚至是失明。另一方面，在1到14天內，有時在伴有一些急性的、較為嚴重的疾病情況下，患者可能出現截癱綜合症、肌無力、四肢癱瘓以及機體對腸道、膀胱等臟器控制的喪失。還發現患者出現組織學上的脫髓鞘病變（類似於MS），預後較好，但是由於組織損傷、壞死，因此這些損傷是持續存在的（壞死）。 \n與MS相比，亞洲人與黑人的NMO發生率高於白種人。因此，在亞洲與非洲國家，NMO的發病率遠遠高於傳統MS，然而NMO在歐洲與北美卻很少出現。“亞洲”與“西方”形式的NMO 其基因特徵是不同的。發病的平均年齡是35歲（5-55歲），但是成人與兒童的病程是沒有區別的。女性與男性的發病比例為1.5:1-9:1(因作者而異)。半數患者由於治療不良，導致一隻眼睛或者雙眼失明，或者5年內不能自己行走。在起初的2年，可通過發病的次數與嚴重程度估計病情。患病5年的存活率為70%，死因往往是神經呼吸不足。 \n病情預測往往基於既往病史，神經以及神經生理檢查（EMG，NLG，激發性電位），中樞神經系統 MRT與腰椎穿刺。腦脊液中有時出現多分葉核與單分葉核等細胞異常增多；只在15-30%的病例中檢測到寡克隆IgG（MS中可達90%）。 \n抗APQ4自體抗體的檢測有助於NMO的診斷。此外，在部分孤立長節段橫貫性脊髓炎（三個或者更多片斷LETM）以及孤立的復發性視神經炎（ON）患者中也可檢測到這些自體抗體。由於NMO高特異性的NMO-IgG以及AQP-4自體抗體，因此根據推測以及治療結果，認為血清陽性的LETM與ON病例是NMO的不完整形式。 \nNMO-IgG可能與其它自體抗體有關，像那些抗核抗體（ANA）、SS-A（Ro）或 甲狀腺過氧化物?（TPO）。這說明NMO可能與其它自體免疫性疾病併發，像系統性紅斑狼瘡（SLE），乾燥綜合症等等。 \n自體抗體檢測的最重要的特點是抗APQ4自體抗體（NMO-IgG）檢測能夠從血清學區分無預兆的NMO 與傳統MS，從而選擇合適的治療方案。MS需要採用免疫調節劑像β-干擾素（IFN-β） 與醋酸格拉替雷治療，而NMO需要採用免疫抑制性藥物，例如硫唑嘌呤，環磷醯胺，針對B細胞的抗-CD20單株抗體rituximab。","tags":["甲狀腺","自體免疫","電解質/代謝"]},{"n":"Anti-basement membrane zone Ab(Skin)","c":"FSIBMZ","p":"12066B(300點)","r":"是","ct":"02號黃頭管(Serum separator tu","d":"全血2 mL","g":"生化免疫組","t":"其他","m":"間接免疫螢光法(Indirect immunofluorescence assay, IFA)","rv":"Negative","i":"協助臨床診斷慢性vesicular-bullous disease，包括天皰瘡(pemphigus)、類天皰瘡(pemphigoid)、膿皰(vesicular pemphigoid)和epidermolysis bullosa acquisita(EBA)。","cl":"抗細胞間質抗體(Anti-Intercellular substance antibody, IC)屬於抗皮膚性抗體，表現在上皮細胞的細胞間質，用於幫助天皰瘡(pemphigus)的診斷。抗體出現在＞90%活化型血清，anti-intercellular substrance antibody之效價與疾病活動性相關。","tags":["其他"]},{"n":"Antibody identification","c":"FBBAI","p":"11005B (400)","r":"是","ct":"07號6 mL紫頭管(K2 EDTA tube)","d":"全血6 mL","g":"血庫組","t":"24小時","m":"(1)常規方法：管柱凝集法Column Agglutination Test (CAT gel card)\n(2)輔助試驗：間接抗球蛋白試驗(Indirect antiglobulin test)","rv":"Negative","i":"懷疑存在或潛在的抗體引起的下列狀況時，可執行此項檢驗\n(1)ABO discrepancy\n(2)抗體篩檢陽性\n(3)DAT陽性\n(4)交叉試驗不相合\n(5)非預期的新生兒黃疸\n(6)疑似輸血反應","cl":"具臨床意義的抗體可能會導致溶血性輸血反應，嚴重程度視抗體種類而定，有些抗體能導致不相合的紅血球在數小時或數分鐘內被破壞，有些則會使紅血球的存活減短到只有幾天，輸血前完成抗體鑑定並選擇相對應抗原陰性血袋進行輸血，是可增進輸血安全的。","tags":["肝臟/膽道","貧血/血液疾病","輸血/血型"]},{"n":"Anti-cardiolipin IgG","c":"FSIACA","p":"30020B(385點)","r":"是","ct":"03號綠頭管(Lithium heparin)。","d":"全血3.5 mL","g":"生化免疫組","t":"其他","m":"螢光酵素連結免疫分析法(Fluorescence enzyme immunoassay, FEIA)","rv":"Negative／＜10.0 GPL-U/mL\n備註說明：\n(A)Negative: ＜10.0 GPL-U/mL; \n(B)Low Positive: 10.0~40.0 GPL-U/mL; \n(C)Medium Positive: 40.1~80.0 GPL-U/mL;\n(D)High Positive: ≧80.1 GPL-U/mL.","i":"定量測定血清中Anti- cardiolipin IgG濃度，輔助診斷primary antiphospholipid syndrome (APS)及評估紅斑性狼瘡(SLE)病人發生血栓的風險(thrombotic risk)。","cl":"抗牛心脂質抗體(Anti-Cardiolipin Ab, ACA)是屬於抗磷脂抗體(aPL)族群。出現antiphospholipid antibodies但無其他自體免疫病者為primary APS，此類抗體出現在APS機率高達80~90%，因此可協助APS之診斷；但無特異性，因其他自體免疫疾病、特定藥物治療後或感染某些傳染性疾病後(例如HCV, Syphilis及Infectious mononucleosis)也可能產生此類抗體。\n抗磷脂症候群，亦是我們所稱的”Hughes syndrome”，是以典型的臨床症狀為特徵，例如動脈或靜脈的血栓形成，或者是持續的抗磷脂抗體測試陽性的習慣性流產。與繼發性的抗磷脂症候群對照之下，抗磷脂症候群是與系統性紅斑狼瘡或其他風濕性疾病有關聯，於原生抗磷脂症候群，沒有證據顯示有其他相關的疾病。在傳染疾病以及抗磷脂症候群中的抗牛心脂質抗體可藉由它們的輔因子而加以區分：從帶有傳染性疾病患者身上的抗牛心脂質抗體識別的為純磷脂的抗原，患有APS患者的抗牛心脂質抗體所結合的，需要β2-glycoprotein I作為輔因子。\n抗牛心脂質抗體/狼瘡性抗凝固素在診斷中被視為有重大的關聯性，因發現在這些抗體與血栓形成傾向具有相關性。這造成下列關聯性的增強：靜脈/動脈的血栓形成(包括中風)，血小板減少症，網狀斑，習慣性流產，以及在陽性抗牛心脂質抗體/狼瘡性抗凝固素(ACA/LA-positive)患者中神經學上的表現。抗牛心脂質抗體/狼瘡性抗凝固素的提高亦可能在罹患腦血管疾病或心臟衰弱梗塞的患者身上發現。抗磷脂抗體在抗磷脂症候群發病時扮演一個第一線的角色","tags":["貧血/血液疾病","自體免疫","凝血/血栓"]},{"n":"Anti-cardiolipin IgM","c":"FSIACM","p":"30028B(392點)","r":"是","ct":"03號綠頭管(Lithium heparin)","d":"血液3.5 mL","g":"生化免疫組","t":"其他","m":"螢光酵素連結免疫分析法(Fluorescence enzyme immunoassay, FEIA)","rv":"Negative／＜10.0 MPL-U/mL\n備註說明：\n(A)Negative: ＜10.0 MPL-U/mL; \n(B)Low Positive: 10.0~40.0 MPL-U/mL; \n(C)Medium Positive: 40.1~80.0 MPL-U/mL;\n(D)High Positive: ≧80.1 MPL-U/mL.","i":"定量測定血清中Anti- cardiolipin IgM濃度，輔助診斷primary antiphospholipid syndrome(APS)及評估紅斑性狼瘡(SLE)病人發生血栓的風險(thrombotic risk)。","cl":"抗牛心脂質抗體(Anti-Cardiolipin Ab, ACA)是屬於抗磷脂抗體(aPL)族群。出現antiphospholipid antibodies但無其他自體免疫病者為primary APS，此類抗體出現在APS機率高達80-90%，因此可協助APS之診斷；但無特異性，因其他自體免疫疾病、特定藥物治療後或感染某些傳染性疾病後(例如HCV, Syphilis及Infectious mononucleosis)也可能產生此類抗體。\n抗磷脂症候群，亦是我們所稱的”Hughes syndrome”，是以典型的臨床症狀為特徵，例如動脈或靜脈的血栓形成，或者是持續的抗磷脂抗體測試陽性的習慣性流產。與繼發性的抗磷脂症候群對照之下，抗磷脂症候群是與系統性紅斑狼瘡或其他風濕性疾病有關聯，於原生抗磷脂症候群，沒有證據顯示有其他相關的疾病。在傳染疾病以及抗磷脂症候群中的抗牛心脂質抗體可藉由它們的輔因子而加以區分：從帶有傳染性疾病患者身上的抗心磷脂抗體識別的為純磷脂的抗原，患有APS患者的抗心磷脂抗體所結合的，需要β2-glycoprotein I作為輔因子。\n抗牛心脂質抗體/狼瘡性抗凝固素在診斷中被視為有重大的關聯性，因發現在這些抗體與血栓形成傾向具有相關性。這造成下列關聯性的增強：靜脈/動脈的血栓形成(包括中風)，血小板減少症，網狀斑，習慣性流產，以及在陽性抗牛心脂質抗體/狼瘡性抗凝固素(ACA/LA-positive)患者中神經學上的表現。抗牛心脂質抗體/狼瘡性抗凝固素的提高亦可能在罹患腦血管疾病或心臟衰弱梗塞的患者身上發現。抗牛心脂質抗體在抗磷脂症候群發病時扮演一個第一線的角色","tags":["貧血/血液疾病","自體免疫","凝血/血栓"]},{"n":"Anti-CCP Ab","c":"FSICCP、FSICCPZ","p":"12201B (700點)","r":"是","ct":"03號綠頭管(Lithium heparin)。","d":"全血3.5 mL","g":"生化免疫組","t":"其他","m":"螢光酵素連結免疫分析法( Fluorescence enzyme immunoassay, FEIA）","rv":"＜7 EliA U/mL；\n※檢檢驗報告備註：Positive＞10 EliA U/mL、Borderline 7~10 EliA U/mL、Negative＜7 EliA U/mL)","i":"定量血清中Anti-CCP之IgG濃度，協助類風濕性關節炎的早期及鑑別診斷、追蹤評估治療效果。","cl":"Rheumatoid arthritis (RA)為常見之系統性自體免疫疾病，盛行率約1~2%，主要症狀為關節之發炎反應及進行性侵蝕及破壞。早期主要依賴血清學之rheumatoid factor (RF)作為診斷RA之參考依據，其對RA之sensitivity為50-90%、specificity為70-90%，但在其他自體免疫疾病患者甚至健康個體之RF皆可能出現陽性反應。1998年，首度發現針對RA高度特異性自體抗體(Anti-CCP)之對應抗原為citrullinated peptides。第二代之Anti-CCP 試劑對RA之sensitivity為68%、但specificity高達96%，因此，臨床上常用Anti-CCP作為早期診斷RA之依據，同時也可做為臨床對於監控關節破壞程度之監控指標。","tags":["自體免疫"]},{"n":"Anti-centromere B Ab (抗centromere B抗體)","c":"FSICEN","p":"自費","r":"是","ct":"03號綠頭(Lithium heparin)管","d":"全血3.5 mL","g":"生化免疫組","t":"其他","m":"螢光酵素免疫分析法(Fluorescence enzyme immunoassay, FEIA)","rv":"Negative (＜7 EliA U/mL)","i":"定量血清中Centromere B，協助各種自體免疫疾病之診斷。","cl":"ANA抗核抗體篩檢試劑可偵測血清或血漿中具臨床相關性的循環自體抗體，這些自體抗體可協助診斷全身性自體免疫疾病，例如：系統性紅斑狼瘡、混和性結締組織疾病(MCTD)、未分化型結締組織疾病(UCTD)、修格連氏症候群、硬皮症(系統性硬化症, SSc)、皮肌炎、多發性肌炎(Polymyocytis, PM)、類風濕性關節炎(RA)、CREST症候群與雷諾氏症候群。(7)\tAnti-Centromere Ab：出現於系統性硬化症(10%)、混和性結締組織疾病。","tags":["自體免疫"]},{"n":"Anti-chlamydia pneumoniae IgG","c":"FSICPG","p":"12190C(300點)","r":"是","ct":"02號黃頭管(Serum separator tu","d":"全血2 mL","g":"生化免疫組","t":"其他","m":"酵素連結免疫分析法( enzyme-linked immunosorbent assay, ELISA)","rv":"Negative","i":"半定量檢測血液中Anti-Chlamydia pneumoniae IgG，輔助診斷Chlamydia pneumonia之感染。","cl":"Chlamydia spp.是革蘭氏陰性細菌，具有強制性細胞內高寄生。肺炎披衣菌(Chlamydia pneumoniae)披衣菌肺炎(TWAR)在會造成急性的臨床表現，包含上下呼吸道症狀。大部分披衣菌肺炎感染是溫和且無症狀的，但可能造成嚴重的疾病，如咽喉炎、鼻竇炎、急性支氣管炎和社區型的肺炎。沒有檢查與治療會導致病情延長與持續。最近資料顯示披衣菌肺炎感染與一些慢性疾病相關，在兒童族群間披衣菌肺炎的血清學感染盛行率較低，隨著年齡增加而顯著提高，且仍然維持高比率於年長者(>50％)。血清學的試驗是常規性且無侵犯性的工具用來測定包括深部與慢性披衣菌感染。初次披衣菌感染其特性是IgM抗體在2~4週內有明顯的反應，然後IgG與IgA抗體在6~8週內隨後反應。急性披衣菌肺炎感染之後，IgM抗體通常在2~6個月內消失，IgG抗體的效價則慢慢降低，然而IgA抗體則會迅速的消失，當被懷疑是初次感染，IgM具有高度的診斷價值，然而，再感染或慢性感染IgM的出現率是較慢的，因此IgM抗體沒有出現並不能排除現在沒有感染，再感染時，IgG與IgA的效價通常1~2週內快速上升。","tags":["結核/呼吸道"]},{"n":"Anti-chlamydia pneumoniae IgM","c":"FSICPM","p":"12190C(300點)","r":"是","ct":"02號黃頭管(Serum separator tu","d":"全血2 mL","g":"生化免疫組","t":"其他","m":"酵素連結免疫分析法( enzyme-linked immunosorbent assay, ELISA)，Automation","rv":"Negative\n※生物參考區間說明：\nNegative：Index＜0.9, Equivocal：Index 0.9~1.1, Positive：Index＞1.1","i":"定性檢測血清中之Chlamydia pneumonia IgM抗體，協助診斷Chlamydia pneumonia感染之早期診斷","cl":"Chlamydia spp.是革蘭氏陰性細菌，具有強制性細胞內高寄生。肺炎披衣菌(Chlamydia pneumoniae)披衣菌肺炎(TWAR)在會造成急性的臨床表現，包含上下呼吸道症狀。大部分披衣菌肺炎感染是溫和且無症狀的，但可能造成嚴重的疾病，如咽喉炎、鼻竇炎、急性支氣管炎和社區型的肺炎。沒有檢查與治療會導致病情延長與持續。最近資料顯示披衣菌肺炎感染與一些慢性疾病相關，在兒童族群間披衣菌肺炎的血清學感染盛行率較低，隨著年齡增加而顯著提高，且仍然維持高比率於年長者(>50%)。血清學的試驗是常規性且無侵犯性的工具用來測定包括深部與慢性披衣菌感染。初次披衣菌感染其特性是IgM抗體在2~4週內有明顯的反應，然後IgG與IgA抗體在6~8週內隨後反應。急性披衣菌肺炎感染之後，IgM抗體通常在2~6個月內消失，IgG抗體的效價則慢慢降低，然而IgA抗體則會迅速的消失，當被懷疑是初次感染，IgM具有高度的診斷價值，然而，再感染或慢性感染IgM的出現率是較慢的，因此IgM抗體沒有出現並不能排除現在沒有感染，再感染時，IgG與IgA的效價通常1~2週內快速上升。","tags":["結核/呼吸道"]},{"n":"Anti-Chlamydia trachomatis IgA","c":"FSICHA","p":"12107C(315點)","r":"否","ct":"02號黃頭管(Serum separator tu","d":"全血2 mL(血漿量最少須0.5 mL)","g":"生化免疫組","t":"其他","m":"Chemiluminescence immunoassay (CLIA), DiasorinXL，LIAISON","rv":"Negative\n報告備註：\n(1)Negative：＜5.0 Index；Equivocal：≧5.0~＜6.0 Index；Positive：≧6.0 Index。\n(2)當檢測結果為「Equivocal」，建議於1~2週後再抽血檢測。","i":"定性檢測Anti-Chlamydia trachomatis IgA抗體，協助臨床診斷Chlamydia trachomatis感染。","cl":"Chlamydia trachomatis包含三種人類變異菌種，有砂眼型、淋巴肉腫、及性行為傳染的子宮頸、子宮內膜、輸卵管、尿道等生殖器型。砂眼披衣菌為歐洲及美國最廣泛的性行為傳染病，全球每年約有50萬人被感染。\n雖然砂眼披衣菌造成的感染主要影響女性生殖系統較為嚴重，但它也會造成男人與小孩感染。有性行為之女性青少年被認為是最易感染砂眼披衣菌的危險族群，流行率超過10%，在某些女性青少年和臨床上有性病的女性族群中甚至可達40%，而砂眼披衣菌再無感染症之男性流行率約4~10%，有趣性病診所的男性約15~20%，新生兒感染砂眼披衣菌則是因為產期前後感染(約65%嬰兒的母親為感染者)。70~80%被感染的女性以及約50%被感染的男性為無症狀，感染後的免疫只對特定行有保護力並且只有部份有保護力，重複感染很常發生。最常感染砂眼披衣菌族群為年輕女性(<20歲)。\nChlamydia trachomatis IgA檢測對於正感染砂眼披衣菌是一項極為重要的指標，IgA存在的周期很短，只有在病原刺激下才會存在，因此IgA抗體適合用於偵測治療後的追蹤評估，IgG抗體則為被動免疫系統的指標，代表正在感染、慢性感染或是曾經感染。","tags":["其他"]},{"n":"Anti-Chlamydia trachomatis IgG","c":"FSICHL","p":"12107C(315點)","r":"是","ct":"03號綠頭管(Lithium Heparin)","d":"全血2 mL","g":"生化免疫組","t":"其他","m":"酵素連結免疫分析法( enzyme-linked immunosorbent assay, ELISA)","rv":"Negative (Reactivity＜16.0 RU/mL)；檢驗報告備註：\n(1)Negative (Reactivity＜16.0 RU/mL): A negative serological result does not exclude an infection.\n(2)Borderline (Reactivity≧16.0,＜22.0 RU/mL): An additional patient sample should be taken 7 to 10 days and retested in paralled with the first sample.\n(3)Positive (Reactivity≧22.0 RU/mL): A positive result indicates that there has been contact with the pathogen.","i":"定量檢測血中之Chlamydia trachomatis IgG抗體，協助診斷非淋病尿道炎；淋巴肉芽腫，砂眼，結膜炎，新生兒肺炎及Reiter's症候群。","cl":"披衣菌屬(Chlamydia)是絕對細胞內寄生菌，可分為三個菌種即鸚鵡病披衣菌(C. psittaci)、砂眼披衣菌(C. trachomatis)及肺炎披衣菌(C. pneumoniae)。披衣菌屬含15種血清型，砂眼及泌尿道感染則是由砂眼披衣菌血清型A, B或C引起；血清型D~K常見於新生兒肺炎。人類結膜上皮細胞會感染砂眼披衣菌，多經由手指或洗臉用具或患者之眼分泌物接觸而感染。花柳性淋巴肉芽腫─花柳性淋巴肉芽腫，主要由砂眼披衣菌血清型L1~L3所引起，多經由直接性接觸而感染，此病常見於亞熱帶地區。並非所有局部之感染皆會誘使IgG抗體產生或使IgG抗體效價上升，因此，建議不要依賴IgG之有無作為診斷之依據；若臨床懷疑Chlamydia感染時，最好是採取感染部位之分泌物以間接免疫螢光法或PCR測定，抗體之測定通常僅作為Chlamydia感染之參考。","tags":["結核/呼吸道"]},{"n":"Anti-Chlamydia trachomatis IgM","c":"FSICHM","p":"12107C(315點)","r":"是","ct":"03號綠頭管(Lithium Heparin)","d":"全血2 mL","g":"生化免疫組","t":"其他","m":"酵素連結免疫分析法( enzyme-linked immunosorbent assay, ELISA)","rv":"Negative (Ratio＜0.8)；檢驗報告備註：\n(1)Negative (Ratio＜0.8): A negative serological result does not exclude an infection.\n(2)Borderline (Ratio≧0.8,＜1.1): An additional patient sample should be taken 7 to 10 days and retested in paralled with the first sample.\n(3)Positive (Ratio≧1.1): A positive result indicates that there has been contact with the pathogen.","i":"半定量檢測血清中之Chlamydia trachomatis IgM抗體，協助\n診斷非淋病尿道炎；淋巴肉芽腫，砂眼，結膜炎，新\n生兒肺炎及Reiter's症候群之診斷。","cl":"披衣菌屬(Chlamydia)是絕對細胞內寄生菌，可分為三個菌種即鸚鵡病披衣菌(C. psittaci)、砂眼披衣菌(C. trachomatis)及肺炎披衣菌(C. pneumoniae)。披衣菌屬含15種血清型，砂眼及泌尿道感染則是由砂眼披衣菌血清型A, B或C引起；血清型D~K常見於新生兒肺炎。人類結膜上皮細胞會感染砂眼披衣菌，多經由手指或洗臉用具或患者之眼分泌物接觸而感染。花柳性淋巴肉芽腫─花柳性淋巴肉芽腫，主要由砂眼披衣菌血清型L1~L3所引起，多經由直接性接觸而感染，此病常見於亞熱帶地區。\n並非所有局部之感染皆會誘使IgG抗體產生或使IgG抗體效價上升，因此，建議不要依賴IgG之有無作為診斷之依據；若臨床懷疑Chlamydia感染時，最好是採取感染部位之分泌物以間接免疫螢光法或PCR測定，抗體之測定通常僅作為Chlamydia感染之參考。","tags":["結核/呼吸道"]},{"n":"Anti-dsDNA Ab","c":"FSIDSD","p":"12060B(300點)","r":"是","ct":"03號綠頭管(Lithium heparin)","d":"2 mL全血","g":"生化免疫組","t":"3天","m":"螢光酵素連結免疫分析法(Fluorescence enzyme immunoassay, FEIA)","rv":"Negative(＜10.00 IU/mL)；\n參考值備註_\n(1)Negative：＜10 IU/mL; \n(2)Equivocal：10~15 IU/mL;\n(3)Positive：＞15 IU/mL.","i":"定量血清中Anti-dsDNA之IgG抗體濃度，可用於輔助診斷及監控紅斑性狼瘡(Systemic Lupus Erythematosus, SLE)。","cl":"SLE患者約有60-70%會出現高效價dsDNA抗體；約55%硬皮症患者也會出現dsDNA抗體，不過效價通常較低。當SLE疾病惡化時，anti-dsDNA抗體的效價會升高。","tags":["其他"]},{"n":"Anti-dsDNA Ab(IFA)","c":"FSIDNA","p":"12060B(300點)","r":"是","ct":"03號綠頭管(Lithium heparin)","d":"全血2 mL","g":"生化免疫組","t":"其他","m":"間接螢光免疫分析法( indirect fluorescent antibody assay )","rv":"No reactive at 1:10","i":"以ELISA檢測血清中Anti-dsDNA IgG抗體結果為陽性但與臨床表現不一致之追加檢驗。","cl":"抗去氧核醣核酸(DNA)自體抗體檢測對全身性紅斑狼瘡(Systemic Lupus Erythematosus,SLE)的診斷十分重要。抗DNA自體抗體分為2類:抗天然雙鏈DNA(dsDNA,nDNA)抗體與抗變性的單鏈(ssDNA)DNA抗體。SLE患者約有60-70%會出現高效價dsDNA抗體；約55%硬皮症患者也會出現dsDNA抗體，不過效價通常較低。當SLE疾病惡化時，anti-dsDNA抗體的效價會昇高。","tags":["自體免疫"]},{"n":"Anti-EBEA IgG","c":"FSIEBE","p":"自費","r":"是","ct":"02號黃頭管(Serum separator tu","d":"2 mL全血","g":"生化免疫組","t":"其他","m":"酵素連結免疫分析法( enzyme-linked immunosorbent assay, ELISA), Euroimmun","rv":"Negative (<0.8 Ratio)；\n檢驗報告備註：\nRatio<0.8: Negative; Ratio≧0.8~<1.1: Borderline; \nRatio?1.1: Positive","i":"檢測血清中EBEA抗體，協助診斷EBV感染。","cl":"EB病毒(EBV)是傳染性單合球增多症的病原體，也與伯氏淋巴瘤(Burkitt’s lymphoma)，鼻咽癌(NPC)和性聯淋巴增生疾病(X-linked lymphoproliferative syndrome)密切相關。EB病毒是一種人類?疹病毒，它分布廣泛，接近95%的成人都被感染過。EBV主要傳播途徑為經口傳播。絕大多數感染單核球增多症的人都是在青春期至成人期期間感染EBV的。初次感染後，EBV 可終生潛伏。\n確診EBV引起的傳染性單核球增多症通常是利用異嗜性抗體凝集實驗(患者血清與馬或羊紅細胞凝集實驗)的方法，陽性結果確診為感染傳染性單核球增多症。但是當凝集實驗檢測結果為陰性，且患者臨床表現為非典型性症狀時診斷此疾病很困難。\n急性傳染性單核球增多症患者中有10%到20%的成人呈異嗜性抗體凝集實驗檢測為陰性，兒童中的比例甚至更高。對於這類個體患者，傳染性單核球增多症的診斷可以通過EB病毒的VCA和EA(D)的特異性抗體檢測的方法進行診斷。檢測VCA IgM抗體作為急性傳染性單核球增多症的診斷手段。但是，確證診斷也應結合其他相關抗體的檢測，例如EA(D) IgG或佔優勢的EBNA-1 IgG或EBNA-1 IgM抗體 – 同時結合臨床資訊。血清學異嗜性凝集實驗陰性結果的檢體可通過檢測EBV VCA IgM 和短期存在的EA(D)IgG抗體來診斷傳染性單核球增多症。\n最初感染EBV的患者血清中可檢測到VCA IgM，之後IgM 抗體逐漸減少到無法檢出的水準。幾乎同時，VCA IgG逐漸增加。大部分(＞80%)有症狀的傳染性單核球增多症患者初次檢查時VCA IgG 和IgM抗體效價都在近峰值處。VCA IgM抗體通常在疾病發作後2 到3個月後消失，同時IgG抗體可在正常人體內終生存在。\n大部分的患者短時間內出現EA(D)，但是EB病毒核殼抗體IgG(EBNA-1)在疾病發作數周或數月後才會出現並可持續存在數年直至終生。在有症狀的傳染性單核球增多症患者中，檢測EBNA-1 IgG抗體，同時結合檢測VCA IgM和IgG抗體可判斷出患者是處於急性期或是康復期。EBNA-1 IgG抗體效價的增高預示傳染性單核球增多症患者正處於逐步康復期。\nVCA IgG抗體效價的增高預示患者處於感染的急性期，同時 VCA IgM抗體效價的增高可以預示患者處於從最初感染到急性期的進程之中。同樣地，VCA IgM抗體效價的下降可以預示患者處於從急性期到逐步減弱期的進程之中。EBNA IgG抗體在健康個體的存在預示過往EBV感染;健康個體中存在VCA IgG抗體預示過往感染EBV或輕度初次感染。\n由於宿主與EBV之間作用及臨床表現的複雜性，追蹤EBV抗體組成結構有益於對EBV感染的診斷。各個特異性抗體效價並非都是預示疾病狀態所必需的，但是跟蹤抗體效價具有診斷意義。通過檢測EBV抗原產生的不同抗體可判斷是否輕微初次感染或持續性的隱性EBV感染，或是EBV關聯疾病。","tags":["感染/敗血症","貧血/血液疾病"]},{"n":"Anti-EBV EA+EBNA-1 IgA (EB抗體早期抗原+核抗原抗體IgA)","c":"FSIEBA","p":"12065B(180點)","r":"是","ct":"2號黃頭管(Serum separator tub","d":"全血2 mL","g":"生化免疫組","t":"其他","m":"酵素連結免疫分析法( enzyme-linked immunosorbent assay, ELISA)","rv":"Negative","i":"輔助Epstein-Barr病毒感染相關疾病之追蹤","cl":"EB病毒會引起單核球增多症，Burkitt's lymphoma鼻咽癌及B-cell lymphoma。90-95%的感染性單核球增多症和EBV有關，大部份病人感染EB病毒後會產生EBEA IgG抗體，可持續數個月至數年。所有攜帶有EB virus 基因的細胞都會表現出EBV核抗原(EBNA)，B細胞被EBV感染後，最早(約12-14小時)表現出的抗原是EBNA。\n鼻咽癌是惡性腫瘤的一種，好發於包括廣西、廣東、台灣、香港及新加坡、馬來西亞等地的華人。跟其他的癌症一樣，初期鼻咽癌的治療效果很好，因此，開發可於鼻咽癌初期檢測的檢驗試劑即為相當重要的工作。由文獻上已知大部分鼻咽癌病患的血清中，具有高效價的抗EB病毒相關抗原之IgA或IgG抗體。其他研究中也指出血清中抗EB病毒的VCA抗原和EA抗原的 IgA效價提供與鼻咽癌的發生有關(Henle et al., 1976)。而在鼻咽癌的患者血清之中也可以偵測到抗EB 病毒MA抗原的IgA和IgG抗體的存在(Zhu et al., 1986)。\n雖然以免疫螢光染色法檢測抗VCA的 IgA抗體的方式已經被廣泛採用來作為篩檢鼻咽癌的方法，但經研究指出以酵素免疫檢驗法檢測抗EA抗原和EBNA-1抗原的IgA方式，其專一性和敏感度都較免疫螢光染色法為高( Fones-Tan et al., 1994)。\n依原廠試劑說明書資料顯示本試劑檢測48名鼻咽癌患者之敏感度為95.8%，對48名正常人檢驗特異性為95.8%。","tags":["感染/敗血症","腫瘤標記"]},{"n":"Anti-GAD Ab","c":"FENGAD","p":"自費","r":"否","ct":"02號黃頭管(Serum separator tu","d":"2 mL全血","g":"生化免疫組","t":"其他","m":"酵素連結免疫分析法( enzyme-linked immunosorbent assay, ELISA)","rv":"＜5.00 U/mL；\n檢驗備註：\n＜5.00 U/mL：Negative；≧5.00 U/mL：Positive","i":"定量分析人類血清中的抗麩胺酸去羧基酵素抗體(GADAb)，協助第一型糖尿病之診斷。","cl":"胰臟β細胞抗原之自體抗體為第一型糖尿病之血清學重要標\n記，此類抗體包括抗insulin，抗glutamic acid decarboxylase \n(GAD65 kDa isoform)及抗islet cell antigen IA2或ICA512。","tags":["糖尿病"]},{"n":"Anti-Glomerular basement membrane antibody","c":"FSIGBM","p":"12138B(300點)","r":"是","ct":"03號綠頭管(Lithium heparin)。","d":"全血2.0 mL","g":"生化免疫組","t":"其他","m":"螢光酵素連結免疫分析法( Fluorescence enzyme immunoassay, FEIA）","rv":"＜7.0 EliA U/mL\n生物參考區間說明：\nNegative：＜7.0 EliA U/mL；Equivocal：7.0~10.0 EliA U/mL；Positive：＞10.0 EliA U/mL","i":"定量分析人類血清及血漿中之膠原蛋白IV的α3鏈IgG抗體，在臨床上作為輔助診斷肺出血-腎炎綜合症(Goodpasture syndrome)和抗GBM病(anti-GBM disease)","cl":"Anti-Glomerular basement membrane antibody(Anti-GBM)可出現於Goodpasture syndrome，Anti-GBM疾病及與Antineutrophil\ncytoplasmic antibody(ANCA)相關血管炎相關。\nGoodpasture syndrome為結合進行性腎絲球腎炎、肺部出血及出現anti-GBM抗體(15%)。診斷Goodpasture syndrom及anti-GBM疾病，血液中是否出現anti-GBM，為診斷之參考依據。ANCA陽性患者中，10%為anti-GBM陽性反應，此類患者腎臟破壞情形相較於anti-GBM陰性者更為嚴重。","tags":["腎臟"]},{"n":"Anti-Glutamate receptor (type NMDA);抗麩胺酸抗體受體 (NMDA型)","c":"FSINMD","p":"自費","r":"是","ct":"02號黃頭管(Serum separator tu","d":"全血2.0 mL；CSF 0.5 mL","g":"生化免疫組","t":"其他","m":"螢光免疫分析法(Indirect fluorescent antibody assay, IFA )","rv":"血清：No reaction at 1:10；腦脊髓液：No reaction at 1:1","i":"定性測定血清或腦脊髓液中Anti-Glutamate receptor (type NMDA)，輔助診斷Anti-Glutamate receptor (type NMDA)自體免疫性腦炎","cl":"抗麩胺酸受體(NMDA型)自體抗體為抗NMDA受體腦炎特異性標誌物，這種腦炎是一種於2007年首次被報導之炎症性自體免疫性腦病，目前仍有廣泛病例被漏診。抗體識別之靶抗原為受體NR1亞單位之胞外上突元，可用免疫組織化學方法或重組抗原檢測患者血清及腦脊髓液中之抗體。\n特異性抗體之檢出、免疫病理表現及免疫調節干預措施有效等證據均提示抗NMDA受體腦炎存在免疫介導發病機制。抗體介導之麩胺酸能(NMDA型)突觸功能失調也支援上述免疫病因假說。海馬神經元培養實驗表明抗體結合可誘導神經元細胞表面之麩胺酸受體(NMDA型)之可逆性、效價依賴性之減少。此外，NMDA受體拮抗劑藥物性地阻斷受體而出現之臨床症狀與抗麩胺酸受體(NMDA型)腦炎相近，尤其是精神症狀。\n抗NMDA受體腦炎臨床病程呈現特殊之分期：70%之受累病例出現感冒樣前驅期(低熱、頭痛、疲乏)，隨後進展至精神期，100%之病例會出現嚴重行為及性格變化、幻視、思維錯亂及譫妄。以上諸症狀導致大部分患者接受精神治療，許多病例初診時被診斷為藥物誘導性精神病。隨後之病程會出現意識紊亂、低通氣、癲癇發作、自主神經不穩定及運動障礙。重症病例(昏迷、癲癇發作狀態等)通常需要長期在重症監護室接受治療。\n約一半患者腦部MRT檢查顯示異常，超過90%之患者出現腦電圖(EEG)之病理性改變。腦脊髓液分析顯示90%病例出現輕度腦脊髓液淋巴細胞之增多，33%病例出現鞘內蛋白濃度之升高，25%病例出現寡克隆帶。大部分年輕女性患者可檢出卵巢腫瘤(畸胎瘤)，畸胎瘤內包含有神經細胞。抗NMDA受體腦炎常合併副瘤性神經綜合症(PNS)，相關腫瘤出現之概率依年齡及性別有差異，平均為60%。抗NMDA受體腦炎不僅在年青女性中確診之病例數量增加，而且在老年女性、不伴畸胎瘤之女性、男性(部分為睾丸畸胎瘤)及兒童中診斷數量增加。\n採取適當之免疫調節療法、伴副瘤性神經綜合症患者儘早診斷和腫瘤切除等，可大大改善患者之疾病預後。恢復期可持續較長時間(長達數年)，導致顳前葉萎縮及灌注不足。即使是在妊娠期之抗NMDA受體腦炎重症患者，只要採取及時之治療措施，對於母親和胎兒均可獲得有利之結果。通常，約有75%之患者之症狀可獲得緩解，而另25%之患者死亡或出現嚴重之神經系統受損。存活者在病程中可出現記憶力喪失，腦炎綜合症有復發之風險，尤其是在腫瘤很晚切除或未切除或未發現腫瘤時。\n通常，抗麩胺酸受體(NMDA型；NR1)抗體可見於所有腦炎但並無致病性病原體檢出之患者及疑似邊緣葉腦炎或精神分裂患者。10%之急性精神分裂患者表現為抗NMDA受體抗體IgA和或IgM陽性。在一些特殊疾病如緊張型或未分型精神分裂症患者中還可檢出抗NMDA受體抗體IgG。若血清學檢測結果為陽性，應對患者進行完全之畸胎瘤檢查。除了血清學分析之外，平行檢測腦脊髓液也具有重要意義，因為多數患者鞘內合成抗麩胺酸抗體更顯著。如已經進行免疫調節療法，抗體之效價可明顯下降，甚至於檢測不出。臨床症狀之改善伴隨著抗體效價之下降。","tags":["腫瘤標記","自體免疫"]},{"n":"Anti-HAV IgG","c":"FSIAHA","p":"14040C(225點)","r":"是","ct":"2號黃頭管(Serum separator tub","d":"全血3.5 mL","g":"生化免疫組","t":"2天","m":"化學冷光微粒酵素免疫分析法(Chemiluminescent Microparticle Immunoassay, CMIA), Abbott Alinity i","rv":"Nonreactive","i":"定性檢測血清中Anti-HAV IgG，協助臨床診斷A型肝炎感染或偵測Anti-HAV IgG。","cl":"A型肝炎病毒的感染是引起疾病的原因之一，並且也是世界許多地方社會經濟損失的起因。傳染的典型途徑是經過被污染的水或食物的糞口途徑而傳染。在衛生較差的區域，傳染經常發生在幼年時期中。在童年，HAV傳染一般是溫和或無症狀且為終身免疫。\n在急性發作期，anti-HAV IgM即可偵測得到，而anti-HAV IgG可在恢復期以後數年仍可在血液中偵測的到。anti-HAV 的存在(IgG 或IgM)是表示過去或現在曾被HAV感染或曾接種過HAV疫苗。因此anti-HAV的測試結果主要是使用是否感染過HAV 或者疫苗注射。","tags":["肝臟/膽道","肝炎病毒"]},{"n":"Anti-HAV IgM","c":"FSIHAV","p":"14039C(240點)","r":"是","ct":"2號黃頭管(Serum separator tub","d":"全血3.5 mL","g":"生化免疫組","t":"2天","m":"化學冷光微粒酵素免疫分析法(Chemiluminescent Microparticle Immunoassay, CMIA), Abbott Alinity i","rv":"Nonreactive","i":"定性分析血清中”Anti-HAV IgM”，協助臨床診斷急性A型肝炎感染。","cl":"A型肝炎為self-limiting disease，且感染後症狀通常不明顯特別是在小孩族群。因感染後臨床症狀不明顯，因此A型肝炎之血清學檢驗有助於診斷。急性A型肝炎感染，血液出可測得Anti-HAV IgM且幾乎與臨床症狀同時間出現，大部分患者在感染1個月時Anti-HAV IgM量達到最高峰，且可持續6個月。","tags":["肝臟/膽道","肝炎病毒"]},{"n":"Anti-HBc IgG","c":"FSIANG、FOTANG、FSIANGZ","p":"FSIANG/FOTANG：14037C(250點)；FSIANGZ：自費","r":"是","ct":"2號黃頭管(Serum separator tub","d":"全血3.5 mL","g":"生化免疫組","t":"2天","m":"化學冷光微粒酵素免疫分析法(Chemiluminescent Microparticle Immunoassay, CMIA), Abbott Alinity i","rv":"Nonreactive","i":"定性檢測血清中之B型肝炎病毒核心抗原之抗體(anti-HBc)，協助臨床診斷B型肝炎感染之篩檢。","cl":"Anti-HBc IgG可用來偵測長期接觸具感染性之B型肝炎病毒後，其血清或血漿B型肝炎病毒核心抗原之抗體(anti-HBc)，Anti-HBc在HBsAg出現後被偵測。由於anti-HBs於體內常延遲至HBsAg清除後才出現，anti-HBc有時為B型肝炎病毒感染或 疑具感染力之血液的唯一血清指標。急性或慢性B型肝炎患者體內可發現anti-HBc，且其亦為過去曾感染之指標。","tags":["肝臟/膽道","感染/敗血症","肝炎病毒"]},{"n":"Anti-HBc IgM","c":"FSIANM、FOTANM","p":"14038C(315點)","r":"是","ct":"2號黃頭管(Serum separator tub","d":"全血3.5 mL","g":"生化免疫組","t":"急診可","m":"化學冷光微粒酵素免疫分析法(Chemiluminescent Microparticle Immunoassay, CMIA), Abbott Alinity i","rv":"Nonreactive (S/CO＜1.0)","i":"定性檢測血清中”Anti-HBc IgM”，可用於輔助診斷急性或近期感染之B型肝炎。","cl":"B型肝炎核心抗原(HBc Ag)的IgM抗體在大多數之急性期感染後可迅速被檢測，因此可作為急性期之指標急性期感染anti-HBc IgM之濃度快速上升，急性感染可測得高濃度之anti-HBc IgM。HBsAg可作為急性期感染之血清學標記，但但於急性期也可能測不到，恢復期anti-HBc IgM仍可能持續存在，此時HBsAg可能已消失。Anti-HBc IgM可能出現於慢性B型肝炎感染但其抗體濃度較急性期低。區分急性或慢性感染可參照其它血清標記如HBsAg, anti-HBs, HBeAg,anti-HBe及anti-HBc，因急性期感染可能出現高濃度anti-HBc IgM，因此可作為區分A型C型及δ型感染之肝炎標記。","tags":["肝臟/膽道","肝炎病毒"]},{"n":"Anti-HBe","c":"FSIABE","p":"14036C(250點)","r":"是","ct":"2號黃頭管(Serum separator tub","d":"全血3.5 mL","g":"生化免疫組","t":"其他","m":"化學冷光微粒酵素免疫分析法(Chemiluminescent Microparticle Immunoassay, CMIA), Abbott Alinity i","rv":"Nonreactive","i":"定性分析血清或血漿中Hepatitis B e antigen (HBeAg) 抗體，協助臨床監控B型肝炎之感染。","cl":"HBeAg及Anti-HBe可於感染B型肝炎病毒病人血清中測得。感染B型肝炎病毒後，血液中最早可測得HBsAg，其次為HBeAg，此2種抗原於感染急性期濃度快速上升。B型肝炎病毒感染急性期若測得Anti-HBe，代表感染已緩解且傳染力降低。HBeAg陰性反應可能為感染早期(未達病毒複製高峰)或回復早期(低於可偵測濃度)，此時測定Anti-HBe出現與否即可區分。部分慢性帶原者之血液測不到HBeAg，取而代之出現anti-HBe，此類患者血液中可能測得hepatitis B virus DNA。慢性B型肝炎患者可依HBe antigen/antibody血清轉換(serconversion)做為治療效果之指標。","tags":["肝臟/膽道","感染/敗血症","肝炎病毒"]},{"n":"Anti-HBs","c":"FSIABS、FSIABSZ","p":"14033C(200點)","r":"是","ct":"2號黃頭管(Serum separator tub","d":"全血3.5 mL","g":"生化免疫組","t":"2天","m":"化學冷光微粒酵素免疫分析法(Chemiluminescent Microparticle Immunoassay；CMIA), Abbott Alinity i","rv":"WHO recommendation, an anti-HBs concentration≧10 mIU/mL is regarded as being protective against HBV infection","i":"定量分析血清中Anti-hepatitis B surface antigen (anti-HBs)，協助臨床B型肝炎疫苗之使用追蹤。","cl":"Anti-HBs分析通常用來監測B型肝炎疫苗是否有效。B型肝炎表面抗原之抗體的存在可保護人體不受B型肝炎病毒（HBV）感染，許多研究已證實B型肝炎疫苗可有效刺激免疫系統產生B型肝炎表面抗原之抗體，並預防B型肝炎病毒的感染。\nAnti-HBs分析亦可用於監測B型肝炎感染患者之病程進展及恢復情形。急性B型肝炎病毒感染後出現的B型肝炎表面抗原之抗體及B型肝炎表面抗原（HBsAg）消失可用來作為疾病消退的指標。未施打疫苗的人如偵測到anti-HBs可能表示以前曾感染過B型肝炎病毒。\n世界衛生組織(WHO)建議Anti-HBs≧10 mIU/mL，可視為對HBV感染有保護力。","tags":["肝臟/膽道","感染/敗血症","肝炎病毒"]},{"n":"Anti-HCV","c":"FSIHCV、FOTHCV、FSIHCVC、FSIHCVA","p":"14051C(250點)","r":"是","ct":"2號5 mL黃頭管(Serum separator","d":"全血3.5 mL","g":"生化免疫組","t":"急診可","m":"化學冷光微粒酵素免疫分析法(Chemiluminescent Microparticle Immunoassay；CMIA), Abbott Alinity i","rv":"Nonreactive","i":"定性測試人類血清及血漿中之C型肝炎病毒抗體，協助C型肝炎病毒感染之診斷。","cl":"C型肝炎病毒是目前造成非A非B型肝炎的主因。目前全世界的研究指出，HCV的傳染途徑主要是由血液或血液製品，經由輸血或其他個人的親密接觸行?所傳染。當有抗HCV抗體?生即顯示個人曾經感染過HCV，並且可能具有感染力。受C型肝炎病毒感染的個體，雖然為無症狀表現，但HCV感染也會發展成慢性肝炎，肝硬化和增加肝細胞癌的風險。初驗陽性(Reactive)如與臨床表現不符時viral load檢驗作為輔導判讀。應以HCV viral load監測HCV感染之病程及治療效果。","tags":["肝臟/膽道","感染/敗血症","輸血/血型","肝炎病毒"]},{"n":"Anti-HCV (needlestick, Source)","c":"FSIHCVN","p":"14051C(250點)","r":"是","ct":"2號5 mL黃頭管(Serum separator","d":"全血3.5 mL","g":"生化免疫組","t":"其他","m":"化學冷光微粒酵素免疫分析法(Chemiluminescent Microparticle Immunoassay；CMIA), Abbott Alinity i","rv":"Nonreactive","i":"定性測試人類血清及血漿中之C型肝炎病毒抗體，協助C型肝炎病毒感染之診斷。限感染科專用","cl":"C型肝炎病毒是目前造成非A非B型肝炎的主因。目前全世界的研究指出，HCV的傳染途徑主要是由血液或血液製品，經由輸血或其他個人的親密接觸行?所傳染。當有抗HCV抗體?生即顯示個人曾經感染過HCV，並且可能具有感染力。受C型肝炎病毒感染的個體，雖然為無症狀表現，但HCV感染也會發展成慢性肝炎，肝硬化和增加肝細胞癌的風險。以ARCHITECT Anti-HCV測試無反應性之樣本視為Anti-HCV陰性，毋須再進一步測試；有反應性之樣本應再以ARCHITECT Anti-HCV重複測試(duplicate)，以決定是否為重複有反應性","tags":["肝臟/膽道","感染/敗血症","輸血/血型","肝炎病毒"]},{"n":"Anti-HDV (D型肝炎抗體)","c":"FSIHDV","p":"14041B (320點)","r":"否","ct":"02號黃頭管(Serum separator tu","d":"2 mL全血","g":"生化免疫組","t":"其他","m":"酵素免疫分析法(Enzyme immunosorbent assay, ELISA)","rv":"Nonreactive","i":"協助臨床醫師診斷D型肝炎。","cl":"D型肝炎病毒顆粒直徑35-37 nm，由B型肝炎病毒表面抗原(hepatitis B surface antigen, HBsAg)、D型肝炎病毒抗原(hepatitis delta antigen, HDAg)以及HDV RNA所組成。HDV基因體有1672-1697核酸，為目前目前所發現最小的動物病毒。HDV 必須伴隨B型肝炎病毒(HBV)才能造成寄主的感染，進而引發慢性肝炎或猛暴型肝炎(chronic or fulminant hepatitis)等疾病。依序列分析HDV基因型可分為8型，台灣主要為1, 2及4型，因各基因型監(尤其是第3型)核酸序列有20-40%之差異，造成目前HDV PCR技術對不同基因型RNA偵測能力不一。利用ELISA技術可偵測檢體ˋ中的HDV抗原或anti-HDV抗體，anti-HDV抗體為感染HDV的血清標記，可輔助HDV感染之診斷。","tags":["肝臟/膽道","肝炎病毒"]},{"n":"Anti-Helicobacter pylori IgG","c":"FSIHEL","p":"自費","r":"否","ct":"02號黃頭管(Serum separator tu","d":"2 mL全血；0.5 mL血清","g":"生化免疫組","t":"其他","m":"化學冷光免疫分析法(Chemiluminescent immunometric assay, CLIA)","rv":"Negative: <0.90 U/mL；Indeterminate: 0.90-1.09 U/mL；Positive: ≧ 1.10 U/mL","i":"定性檢測Helicobacter pylori IgG，以協助診斷無症狀族群是否曾感染Helicobacter pylori。","cl":"幽門螺旋桿菌發現於慢性胃炎的病人，與胃潰瘍、十二指腸潰瘍的生理病理變化相關性證據充足，也與胃癌、胃淋巴腫瘤有關。血清檢驗幽門螺旋桿菌抗體，可以確認是否感染過，抗體陽性率超過60%。高抗體代表最近或活動中的感染，可以使用抗生素治療，治療1-2週有效時，可以看到抗體下降，也有可能抗體轉陰性。\n三合一或四合一用藥有些病人不適應，如果抗體濃度下降不明顯，臨床上治療也可以胃鏡、尿素呼吸試驗(13C-Urea pylori)作為療效偵檢。","tags":["腫瘤標記"]},{"n":"Anti-histone Ab","c":"FSIHIS","p":"30019B(368點)","r":"否","ct":"02號黃頭管(Serum separator tu","d":"2 mL全血","g":"生化免疫組","t":"其他","m":"酵素免疫分析法(Enzyme immunosorbent assay, ELISA)","rv":"Negative: <1.0 Units, Weak Positive: 1.0-1.5 Units, Moderate Positive: 1.6-2.5 Units, Strong Positive: >2.5 Units","i":"半定量檢測血清中Anti-histone IgG抗體，協助診斷紅斑性狼瘡或因藥物引起之紅斑性狼瘡。","cl":"抗組織蛋白抗體可在67%-100% (平均92%) drug-inducedlupus，17-95%(平均51%)SLE患者血中發現。但此自體抗體並不具專一性，在其他疾病如RA、vasculitis、Sjogrensyndrome和PBC等自體免疫疾病與腫瘤疾病也可能測得，必須參考臨床症狀綜合判斷。","tags":["腫瘤標記","自體免疫"]},{"n":"Anti-HIV-I & II Ab confirmation(HIV-I & II抗體確認檢驗)","c":"FSIH1W／FSIHWP／FSIH1B／FSIHWP1","p":"14083C (2011點)(FSIHWP及FSIHWP1自費)","r":"是","ct":"07號6mL紫頭管(K2EDTA)；","d":"全血5.0 mL","g":"生化免疫組","t":"其他","m":"Rapid immunochromatographic test","rv":"HIV-1 Ab confirmation: Negative；HIV-2 Ab confirmation: Negative","i":"HIV抗原/抗體篩檢陽性反應之HIV-1及HIV-2抗體確認","cl":"(1)HIV抗體篩檢陽性時應以HIV抗體確認試驗檢測以確認是否有HIV抗體。本檢測試劑針對HIV-1及HIV-2抗體執行篩檢陽性血清(漿)之確認。當判讀結果為Indeterminate時無法排除血清陽轉現象、或與其他反轉錄病毒的交叉反應。HIV 1與 HIV 2之間的同源性會造成抗 HIV-1及 抗 HIV-2抗體與 HIV-2及 HIV-1病毒之間的交叉反應性。\n(2)本試驗以HIV不同組成蛋白檢測HIV-1及HIV-2抗體，HIV1蛋白分屬不同基因轉錄：ENV基因(gp160, gp41)；GAG基因(P24)；POL基因(P31)。HIV-2蛋白為ENV基因(gp140, pg36) 轉錄。","tags":["其他"]},{"n":"Anti-HSV 1&2 IgG","c":"FSIHER","p":"14069B(180點)","r":"是","ct":"02號黃頭管(Serum separator tu","d":"全血2 mL","g":"生化免疫組","t":"3天","m":"化學冷光免疫分析法(Chemiluminescence immunoassay, CLIA)","rv":"(1)Anti-HSV-1 IgG：Negative；\n(2)Anti-HSV-2 IgG：Negative。","i":"輔助推定診斷(presumptive diagnosis)性生活活躍者以及準媽媽是否感染HSV-1 或 HSV-2","cl":"單純皰疹病毒（HSV）屬皰疹病毒科，形態上與皰疹病毒科的其它成員相似，具有衣殼、DNA核。用限制性內切核酸?或抗原分析可發現HSV 有兩個自然分型，分型的生物特徵和流行病學各有不同。\n這兩種病毒都可引起人類較為嚴重的感染，如感冒及腦炎。通常HSV-1主要引起黏膜感染，如眼、口腔及嘴角黏膜處的感染，它也是引起成人嚴重散發性腦炎的重要原因之一。HSV-2 主要引起生殖器部位的皮膚及粘膜的損傷：如生殖器皰疹是常見的性接觸傳播疾病之一。但HSV病毒的種類與感染部位的關係並不是絕對的。一旦發生HSV病毒感染，病毒將潛伏在人體的感官神經中樞，多種刺激都會導致病毒週期性復發，可能會帶來臨床損傷。免疫抑制性病人更容易出現反復感染，這說明血清抗體及病毒特異性細胞介質免疫有助於疾病康復。\n感染生殖道皰疹的孕婦流產或早產的概率是正常孕婦的2～3倍。孕婦生殖道病毒活躍可導致生產時嬰兒與感染的生殖道接觸而引起嚴重的HSV病毒感染,若孕婦生產時感染了HSV，40-60%的嬰兒也會被感染，如果不及時治療，會引發嬰兒的高發病率和高死亡率。\n35%的兒童到5歲時具有HSV-1型病毒的抗體，80%的成人到25歲時具有HSV-1型病毒的特異性抗體。\n由於HSV-1和HSV-2具有相同的抗原決定位，這兩種病毒的抗體可能會發生交叉反應。儘管體內有抗病毒抗體，這兩種類型的病毒也會經常復發。\n快速準確地診斷HSV感染有助於及早採用抗病毒治療，減少感染傳播。感染HSV後，人體免疫系統會馬上合成特異性抗HSV-IgM抗體，一周後即可被檢測到。一般HSV IgM抗體的存在表示近期感染或複發感染。原發性感染病人2-3周後，體內一般會出現特異性IgG抗體，但幾個月後其效價會下降，而復發感染的病人效價不會增高。\n通過對IgG的檢測可評估患者的免疫狀態並且提供HSV既往感染的血清學證據。結合HSV-1或HSV-2抗體血清轉化的結果可幫助診斷近期（原發性或繼發性）HSV 感染。","tags":["感染/敗血症"]},{"n":"Anti-HSV Type I & II IgM","c":"FSIHSM","p":"14052B(750點)","r":"是","ct":"02號黃頭管(Serum separator tu","d":"全血2 mL","g":"生化免疫組","t":"其他","m":"酵素連結免疫分析法( enzyme-linked immunosorbent assay, ELISA)","rv":"Negative","i":"定性檢測Anti-HSV Type I &II IgM，輔助診斷急性期Herpes simplex Type I &II virus之感染。","cl":"單純皰疹病毒(Herpes simplex virus; HSV)是屬皰疹病毒科家族成員，其中已知第一型及第二型兩種，第一型單純皰疹病毒(HSV-1)及第二型單純皰疹病毒(HSV-2)具有輕微抗原差異。HSV-1感染主要造成口腔顏面病變，而HSV-2感染主要為生殖器損傷，但這區分並不一定，兩種類型偶爾會在解剖部位引起感染。HSV也可能引起眼球炎和中樞神經系統病變的形式。\n單純皰疹感染的皮膚病灶可能會有疼痛感，外觀上令人難堪，因此可能會影響個人的群體生活。原發性感染通常是亞臨床形式，很少被診斷出來。於婦女懷孕期間感染HSV，會經由胎盤感染到胎兒，易造成胎兒的死亡或流產，或引起胎兒長期性發展的異常，造成胎兒在子宮內生長異常或出生後引起嚴重疾病，因此檢測HSV IgM，對於新生兒感染的診斷是重要的。雖然HSV IgM無法區分原發性感染或是病毒再活化，但HSV IgM的存在表示病毒活性正在進行中。\n診斷單純皰疹病毒最近感染或是病毒再活化，通常感染後14天，可以測到IgM抗體陽性，約維持一個月。相當於兩次IgG抗體檢驗間隔14天，看到IG抗體上升兩倍以上，當病毒潛伏再活化時 IgM骯體不一定可以測得到。","tags":["感染/敗血症"]},{"n":"Anti-HTLV 1/2","c":"FSIHTL","p":"12163B(400點)","r":"是","ct":"2號黃頭管(Serum separator tub","d":"全血2 mL","g":"生化免疫組","t":"其他","m":"化學冷光微粒免疫分析法 (Chemiluminescent Micropraticle Immunoassay；CMIA), Abbott Alinity i","rv":"Nonreactive","i":"定性偵測血清中人類抗T-Lymphotropic Virus I 及 II抗體，協助成人T-cell白血病及其他髓鞘神經相關疾病之診斷。","cl":"反轉錄病毒科(Retrovirus)的病毒特徵為其基因組是雙股(+)RNA，病毒含有NA-DNA聚合脢亦即反轉錄脢作為複製之用，反轉錄病毒具有二十面體對稱核心，內含核醣蛋白，外有包膜一般研究認為反轉錄病毒具有活化致癌基因的潛力。由反轉錄病毒所引起的RNA腫瘤病毒歸入腫瘤病毒(Oncovirinase)亞科，如人類T淋巴性病毒1，2，5(HTLV-1，HTLV-2，及HTLV-5)其中HTLV-1為人類T淋巴性反轉錄病毒被發現引起成人某些表皮T細胞淋巴瘤，HTLV-2，及HTLV-5則尚未確定與人類的哪一特定疾病有關。\nHTLV-I及 HTLV-II是人類C型反轉錄病毒，HTLV-I曾經被認為是成人T細胞血症、名為熱帶痙性下半身麻痺的一種腦神經病變、HTLV-I伴隨脊髓病變、以及HTLV-葡萄膜炎的成因有關。HTLV-II也有一些證據顯示和類似HAM/TSP的神經退化性疾病有關，偶爾與淋巴球異常增生也有關係。\nHTLV-I感染的流行區分布在加勒比海地區、日本西南岸，和非洲的某些地區。HTLV-II則在美國的印地安人中流行。而HTLV-I和 HTLV-II對於遍佈在全世界的靜脈毒癮者、性行為複雜者以及性病患者有極高的感染力，其傳染可經由性行為、血液成分的傳輸、靜脈毒品注射或新生兒與母親間垂直感染而來。","tags":["腫瘤標記","貧血/血液疾病"]},{"n":"Anti-intercellular substance Ab","c":"FSIICS","p":"12067B(300點)","r":"是","ct":"02號黃頭管(Serum separator tu","d":"全血2 mL","g":"生化免疫組","t":"其他","m":"間接免疫螢光法(Indirect immunofluorescence assay, IFA)","rv":"Negative","i":"協助臨床診斷慢性vesicular-bullous disease，包括天皰瘡(pemphigus)、類天皰瘡(pemphigoid)、膿皰(vesicular pemphigoid)和epidermolysis bullosa acquisita(EBA)。","cl":"抗細胞間質抗體(Anti-Intercellular substance antibody, IC)屬於抗皮膚性抗體，表現在上皮細胞的細胞間質，用於幫助天皰瘡(pemphigus)的診斷。抗體出現在＞90%活化型血清，anti-intercellular substance antibody之效價與疾病活動性相關。","tags":["其他"]},{"n":"Anti-Jo-1 Ab","c":"FSIJO1","p":"12154B(600點)","r":"是","ct":"03號綠頭(Lithium heparin)管","d":"全血3.5 mL","g":"生化免疫組","t":"其他","m":"螢光酵素免疫分析法(Fluorescence enzyme immunoassay, FEIA)","rv":"Negative (＜7 EliA U/mL)","i":"定量血清中Anti-Jo-1，協助各種自體免疫疾病之診斷。","cl":"ANA抗核抗體篩檢試劑可偵測血清或血漿中具臨床相關性的循環自體抗體，這些自體抗體可協助診斷全身性自體免疫疾病，例如：系統性紅斑狼瘡、混和性結締組織疾病(MCTD)、未分化型結締組織疾病(UCTD)、修格連氏症候群、硬皮症(系統性硬化症, SSc)、皮肌炎、多發性肌炎(Polymyocytis, PM)、類風濕性關節炎(RA)、CREST症候群與雷諾氏症候群。\nJo-1(histidyl-transfer RNA synthetase)，與自體免疫破壞肌肉細胞有關，陽性發生於多發性肌炎。","tags":["自體免疫"]},{"n":"Anti-Legionella Ab","c":"FSILEG","p":"12118B(250點)","r":"是","ct":"02號黃頭管(Serum separator tu","d":"全血2 mL","g":"生化免疫組","t":"其他","m":"間接免疫螢光法(Indirect immunofluorescence assay, IFA)","rv":"Non-reactive；1. Single titers of less than 256 are not considered evidence of infection.\n2. A four-fold rise in titers≧128 form the acute to the convalescent，plase provides evidence of recent infection with Legionella.","i":"測定病人血清中是否存在Legionella抗體，協助Legionella感染之診斷。","cl":"退伍軍人菌種約有三十幾種，與一般細菌不同在於必須以特殊培養基方能培養出來。退伍軍人菌廣泛存在，尤其是在水中環境，而人工的冷熱水處理系統則是提供了退伍軍人菌良好的繁殖增生環境，冷熱空調噴霧系統則是把退伍軍人菌散播使人致病的元凶。退伍軍人症的確定診斷在能從人體檢體中培養出致病菌種、退伍軍人菌種雖有三十幾種，但約只有一半菌種會使人類致病。臨床上一般則使用血清抗體檢查來輔助診斷。若是急性期間隔二週之血清抗體有四倍增加，而且後一次抗體之效價大於1:128則認為是退伍軍人菌感染。","tags":["其他"]},{"n":"Anti-measles virus IgG","c":"FVPMIG","p":"14070B(240點)","r":"是","ct":"02號黃頭管(Serum separator tu","d":"2 mL全血","g":"生化免疫組","t":"3天","m":"化學冷光免疫分析法(indirect sandwich chemiluminescence immunoassay, CLIA)","rv":"Negative","i":"協助確認個體對麻疹病毒之免疫狀態","cl":"麻疹是由副粘液病毒家族的麻疹病毒引起的急性病毒性疾病，是最容易傳播疾病。傳播主要是通過大液滴擴散或與鼻或喉分泌物的直接接觸感染者。\n感染後，麻疹病毒侵入鼻咽的呼吸上皮並擴散到局部淋巴節點。在這些位點複製兩至三天后，原發性病毒血症擴大至網狀內皮系統。進一步複製後，原發性病毒血症發生在感染後5至7天，持續4至7天。在這種病毒血症期間，感染和進一步的病毒複製可能發生在皮膚，結膜，呼吸道等器官，包括脾，胸腺，肺，肝和腎。病毒量在感染後11-14天達到峰值，然後接下來幾天內迅速下降。\n在疫苗問世之前，麻疹主要是兒童期疾病，但麻疹疫苗接種計劃（麻疹，腮腺炎，風疹[MMR]疫苗接種）對疾病和並發症的發生率具有顯著的影響相關聯。在發達國家長期接種高疫苗後，現在麻疹傳播主要發生在從未接種過疫苗的人群以及沒有接種疫苗的大齡兒童中接種。麻疹疫情仍然可能發生在免疫覆蓋率高的國家。這種爆發證明在所涉及的人口中的免疫缺陷。\n臨床上，如果檢測到Koplik's spots，並且如果皮疹從頭到軀幹或到四肢，則支持麻疹的診斷軀幹。前驅症狀的非特異性和輕度病例的存在，使臨床無法作為麻疹疾病的唯一診斷標準。隨著疾病流行率下降，許多醫生沒有經驗來識別麻疹，增加了實驗室血清學方法的需要以區分麻疹和其他臨床相似的疾病。\nIgM和IgG抗體都在初次免疫反應期間合成，並且在皮疹開始的數天後可以在其中的血清中檢測到。 IgM抗體水平在約七至十天后達到峰值，然後迅速下降，很少在六至八週後可檢測。在再次暴露於麻疹後，免疫個體通常不檢測IgM病毒。再暴露於麻疹病毒誘導強烈的記憶性免疫反應，IgG抗體快速增加，預防臨床疾病。","tags":["其他"]},{"n":"Anti-measles virus IgM","c":"FSIMEM","p":"14007B(750點)","r":"是","ct":"02號黃頭管(Serum separator tu","d":"全血2 mL","g":"生化免疫組","t":"2天","m":"酵素連結免疫分析法( enzyme-linked immunosorbent assay, ELISA)","rv":"Negative","i":"定性檢測Anti-measles virus IgM，輔助診斷急性期measles virus之感染。","cl":"麻疹病毒屬於副黏液病毒(Paramyxoviruses)中麻疹病毒屬(Morbilillivirus)，會引起孩童全身性疾病，是經由呼吸道感染，通常至發燒時之潛伏期約9~12天，在這期間病毒在呼吸到的上皮細胞繁殖；感染的前驅症狀為發高燒、鼻炎、結膜炎、咳嗽，發燒3~4天後病人兩頰內側黏膜亦會出現白色斑點，稱為Koplik’s spot，可作為麻疹的臨床診斷依據。前驅症狀3~4天柯氏斑點出現後，還會繼續發燒，並且再過24~48小時後典型的斑丘疹出現於耳後，再擴散至整個臉面，然後在第2天至第3天會慢慢向下移至軀幹和四肢，皮疹在3~4天的時間內會覆蓋全身，並持續4~7天；病人出疹時病情最嚴重，且發燒至最高溫；皮疹出現3~4天後，熱度與皮疹即開始消退，皮疹退了以後，會出現鱗屑性脫皮及留下褐色沉著。約5~10%之患者因細菌或病毒重覆感染而產生併發症，併發症包括中耳炎、肺炎與腦炎。\n麻疹病毒感染性極高，因此近幾年開始麻疹疫苗施打的推行，因此近已年兒童疾病已大幅減少，感染趨勢已漸轉至年輕成年人，若感染成年人可能引起嚴重感染情形；若為孕婦受到感染，可能引起小產或早產。","tags":["感染/敗血症","結核/呼吸道"]},{"n":"Anti-mitochondrial Ab","c":"FSIAMA","p":"12056B(200點)","r":"是","ct":"是，代檢費用請洽轉介中心(聯絡電話：04-7238","d":"血液／03號綠頭管(Lithium Heparin)。","g":"生化免疫組","t":"其他","m":"間接免疫螢光法(Indirect immunofluorescence assay, IFA)","rv":"Nonreactive","i":"協助臨床診斷原發性膽汁性肝硬化、慢性活動性肝炎","cl":"陽性anti-mitochondrial antibody常見於Primary biliary cirrhosis，也可見於Chronic active hepatitis及Cryptogenic cirrhosis，效價介於1:160~1:6000；anti-mitochondrial antibody效價與疾病嚴重程度及免疫抑制療法無關。Chronic active hepatitis, extra-hepatic biliary obstruction, non-obstructive tract disease, hepatic malignancy及collagen disease可能出現低效價的反應。","tags":["肝臟/膽道"]},{"n":"Anti-mullerian hormone(AMH)","c":"FENAMH","p":"自費","r":"是","ct":"03號綠頭管(Lithium heparin)代替","d":"3.5 mL全血","g":"生化免疫組","t":"2天","m":"單步驟免疫酵素冷光分析法(one step immunoenzymatic assay , sandwich)","rv":"(1)Adult reference group(Age, Median(95% RI)): Females 18~25 years,  3.71 (0.96~13.34)ng/mL; Females 26~30 years, 2.27 (0.17~7.37)ng/mL; Females 31~35 years, 1.88 (0.07~7.35)ng/mL; Females 36~40 years, 1.62 (0.03~7.15)ng/mL; Females 41~45 years, 0.29 (0.00~3.27)ng/mL; Females ≧46 years 0.01 (0.00~1.15)ng/mL; Males >18 years 4.87 (0.73~16.05)ng/mL. (2)Pediatric reference group(Age, Median(95% RI)): Females ≦60 days 0.16 (0.01~3.39)ng/mL; Males ≦60 days 46.94 (15.11~266.59)ng/mL; Male Tanner stage-1 8~13 years 56.58 (4.95~144.48)ng/mL; Male Tanner stage-2 8~17 years 26.55 (5.02~140.06)ng/mL; Male Tanner stage-3 10~19 years 8.64 (2.61~75.90)ng/mL; Male Tanner stage-4 12~18 years 7.15 (0.43~20.14)ng/mL; Male Tanner stage-5 11~19 years 7.00 (1.95~21.20)ng/mL.","i":"預測卵巢庫存量(Ovarian reserve)之參考","cl":"Anti-Mullerian hormone(抗穆勒氏管荷爾蒙)簡稱AMH，是一種醣蛋白，由卵巢小卵泡分泌，小卵泡數目越多，血清濃度越高，是預測卵巢功能的工具，對於卵巢庫存具有指標性的意義。檢驗數值與取卵數、懷孕率、卵巢過度刺激症候群發生率、多囊性卵巢症候群成正相關。\nAMH是以其第一個被描述的功能即胎兒性別分化來命名：\n於男性體內，胚胎發育早期過程中，抑制雌性生殖組織(Mullerian duct)。於男性體內，AMH經由睪丸的塞托利細胞(Sertoli cells)分泌，AMH濃度持續高至青春期，隨後逐漸降低至後青春期濃度。青春期間AMH生產下降與青春期發育階段有關。AMH濃度最顯著下降發生於Tanner階段II與III之間，同時睪丸中的睪固酮濃度增加，較血液中睪固酮濃度上升早。\n女性胚胎發育早期，缺乏AMH使得Mullerian duct可進一步發育成女性內生殖系統。於女性，約於妊娠36週可於卵巢腔前濾泡之顆粒細胞觀測到AMH，並且持續由這些細胞生成至更年期。\n成年女性體內AMH濃度反應進入生命週期中的生長期的小濾泡數目，與餘留卵巢中的原始濾泡(primordial follicles)或卵巢儲量(ovarian reserve)成比例。AMH在女性的生育年限逐漸降低，反映隨年齡增長卵巢老化造成卵母細胞/濾泡池的持續下降。雖然AMH濃度隨年齡降低，研究顯示其濃度於女性生理週期的日間變化很低，因此可於生理週期的任何一天測量AMH。\nAMH被用來評估卵巢儲量主要預測不孕婦女對控制性卵巢刺激的反應。研究也證明AMH可用來評估個別婦女更年期時間，因為AMH被發現為生殖老化(reproductive aging)的良好指標。此外，研究顯示AMH可用來診斷監控多囊性卵巢症候群(PCOS)婦女且患有多囊性卵巢症候群婦女的AMH上升於正常性腺激素的無排卵。PCOS病人血清AMH濃度是正常女性參考值得2~3倍，AMH濃度與PCOS的嚴重程度相關。\n研究顯示卵巢顆粒細胞瘤病患的AMH濃度會上升，且AMH為卵巢摘除術患者術後追蹤的敏感且專一指標，由於顆粒細胞瘤具有高度復發的特性，AMH早期量測很重要。\n研究顯示測量AMH輔助區分青春前期女性性腺與非性腺導致的輕微男性化。青春前期XX男性化女孩無法測得AMH；而睪固酮分泌異常、雄性激素不敏感、睪丸發育不全及卵巢睪丸並存的孩童，其AMH水平高於平均女性AMH濃度。雄性化Sertoli-Leydig細胞卵巢瘤女孩具有極高的AMH濃度。\n隱睪症的發病率在足月男嬰兒的發病率約3-6%，由於自發性的睪丸下降，3個月齡的發病率降至1-2%。研究顯示AMH濃度可區別具有正常男性AMH濃度之隱睪症(睪丸未降)與具有極低或量測不到AMH濃度之無睪症。針對雙性狀況孩童之研究證明AMH濃度反映塞托利細胞(Sertoli cells)功能，且通常同時測量睪固酮濃度，睪丸發育不全的特點是AMH及睪固酮濃度與正常男性相比皆較低。早熟症和青春期延遲男孩的研究會同時測量AMH、FSH、LH和睪固酮。\nAMH在卵巢儲備評估中的幾個主要應用，(1)卵巢儲備評估：AMH 是由卵巢中的小濾泡分泌的，其濃度與卵巢中的原始濾泡數量相關，因此可以反映卵巢儲備，AMH濃度會隨著年齡增加而降低，這和卵濾泡庫的逐漸減少以及卵巢老化相關；(2)預測卵巢反應： 在進行體外受精(IVF)時，AMH的濃度可以幫助預測女性對控制性卵巢刺激的反應，研究指出，低AMH濃度與較差的卵巢反應(即採集的卵母細胞數量較少)相關；(3)多囊卵巢綜合症(PCOS)的診斷和監測：AMH濃度在患有PCOS的女性中通常較高，因此AMH可以用於診斷和監測PCOS；(4)評估更年期的時間：AMH還可用於估算個體女性到達更年期的時間，因為AMH水平與生殖衰老有密切相關；(5)卵巢腫瘤標誌物：AMH 濃度在卵巢顆粒細胞腫瘤中增加，因此亦可作為切除卵巢病人的重要標誌物。\n此AMH Advanced 試劑可協助在人工受孕計畫中接受控制性排卵刺激來促使多個濾泡發育的女性，可透過搭配體重與檢測AMH來協助確認人類重組促卵泡激素(rFSH)(follitropin delta，Ferring)的個人每日劑量。","tags":["腫瘤標記","荷爾蒙/內分泌"]},{"n":"Anti-mumps virus IgG","c":"FSIMVG","p":"14009C(200點)","r":"是","ct":"02號黃頭管(Serum separator tu","d":"全血2 mL","g":"生化免疫組","t":"3天","m":"化學冷光免疫分析法(indirect sandwich chemiluminescence immunoassay, CLIA)","rv":"Negative","i":"協助確認個體對腮腺炎病毒之免疫狀態","cl":"腮腺炎是由副粘病毒家族的成員引起的病毒性疾病，並且由飛沫傳播。其具有14-25天的潛伏期，在此之後，前驅症狀發生並且持續3至5天。在前驅症狀發生後，病毒感染的症狀取決於哪個器官受到影響。最常見的表現是腮腺炎，其發生在30-40%的患者中。其他報告的感染部位是睾丸，胰腺，眼睛，卵巢，中樞神經系統，關節和腎臟。患者在症狀發作前約三天和活動性腮腺炎開始後四天被認為是感染性的。感染在多達20%的人中是無症狀的。\n在獲得疫苗之前，約50%的兒童患上腮腺炎;但是腮腺炎疫苗接種計劃(麻疹，腮腺炎，風疹(MMR)接種的一部分)對該疾病的發病率和與其相關的並發症具有顯著的影響。當腮腺炎是兒童的常見疾病時，診斷主要基於臨床症狀。隨著腮腺炎發病率的降低，許多醫生不再容易識別症狀。典型的臨床體徵和症狀可能在未免疫的或免疫低下的個體中不存在；大約20％至30％的感染是亞臨床的。\n腮腺炎，臨床診斷的標誌，現在也已知存在於其他病毒和非病毒性疾病之狀況。曾接受MMR疫苗的急性病患兒的類似腮腺炎之症狀可能與EB病毒，人類副流感病毒(HPIV)，腺病毒和第6型人類皰疹病毒有關。因此，腮腺炎病毒感染的實驗室確認近來在建立診斷的過程中扮演重要的角色。","tags":["感染/敗血症"]},{"n":"Anti-mumps virus IgM","c":"FSIMVM","p":"14054B(400點)","r":"是","ct":"02號黃頭管(Serum separator tu","d":"全血2 mL","g":"生化免疫組","t":"2天","m":"酵素連結免疫分析法( enzyme-linked immunosorbent assay, ELISA)","rv":"Negative","i":"檢測Anti-mumps virus IgM，輔助診斷急性期mumps virus之感染。","cl":"腮腺炎是一種常見的兒童期疾病，通常造成唾液腺腫大，因此可藉此做為基礎診斷，但臨床上也常見的併發睾丸炎、腦膜炎或腦膜腦炎，但沒有唾液腺腫脹情形，此時可能需要通過血清學方法確認感染。\n腮腺炎病毒感染會引發急性發熱性且具高傳染力之疾病，發熱的感染並具有高傳染性，幾乎所有病人在發病後，血清都可以測到腮腺炎病毒抗體，且會發展成長期免疫力，建議對血清陰性的孩童施打疫苗，但其效價比感染後產生之抗體低8~10倍。\n腮腺炎病毒好發於冬天及春天。如果孕婦在懷孕的first trimester感染，有較高的危險機率，引起胎兒先天的異常，不過，只要在懷孕前有打過疫苗，就不會有這些問題。","tags":["感染/敗血症"]},{"n":"Anti-Mycoplasma pneumoniae IgG","c":"FSIMYG","p":"12020B(225點)","r":"是","ct":"02號黃頭管(Serum separator tu","d":"全血2 mL","g":"生化免疫組","t":"其他","m":"Chemiluminescence immunoassay (CLIA)","rv":"Negative (<10 AU/mL)","i":"半定量檢測Anti-Mycoplasma pneumoniae IgG，協助臨床診斷肺炎黴漿菌的感染。","cl":"肺炎黴漿菌為引起孩童及學齡兒童非典型肺炎主因，診斷主要依據血清學檢驗。IgM抗體出現於感染早期且在IgG出現前即消失，因此可協助急性期之診斷。\n檢測肺炎黴漿菌特異性抗體是急性肺炎黴漿菌感染之呼吸系統疾病的主要診斷工具，建議IgM及IgG應同時檢測。在初次感染後，正常的免疫系統會迅速產生抗體，這種抗體會在三到六週後達到峰值，然後在數月至數年內逐漸下降。\n肺炎黴漿菌IgG檢測結果陰性，通常表示病人尚未被感染，但並未排除急性肺炎黴漿菌感染的可能性，因非常早期感染階段，病人尚未形成IgG抗體或是IgG抗體上未達測得之濃度，因此初次檢測結果為陰性，仍懷疑臨床暴露肺炎黴漿菌時，建議應在2~4週後再次抽血檢測，以區分是否感染或急性感染。\n肺炎黴漿菌IgG檢測結果陽性，通常表示病人急性感染或過去已感染，單次檢測IgG只能了解病人目前體內肺炎黴漿菌抗體情形，建議應在2~4週後再次抽血檢測，比對兩套血清抗體結果；兩套之間的IgG顯著增加(三倍或更多倍)，即使沒有檢測出IgM，也視為急性感染或再次感染。","tags":["結核/呼吸道"]},{"n":"Anti-Mycoplasma pneumoniae IgM","c":"FSIMYM、FRCMYM","p":"12020B(225點)","r":"是","ct":"一般件-02號黃頭管(Serum separato","d":"全血1 mL","g":"生化免疫組","t":"急診可","m":"快速免疫層析法(Rapid immunochromatographic test)","rv":"(1)Negative表示血液沒有Anti-Mycoplasma pneumoniae IgM抗體存在，可能是沒有受到Mycoplasma pneumoniae的感染或非處於急性期的感染。\n(2)Positive表示血液有Anti-Mycoplasma pneumoniae IgM抗體存在，顯示正處於Mycoplasma pneumoniae的急性感染。","i":"定性檢測Anti-Mycoplasma pneumoniae IgM，協助臨床診斷肺炎黴漿菌急性期感染。","cl":"肺炎黴漿菌(Mycoplasma pneumoniae)為引起非典型肺炎主要病源菌之一，亦為引起孩童及學齡兒童非典型肺炎主因，診斷主要依據血清學檢驗。IgM抗體出現於感染早期且在 IgM出現前即消失，因此可協助急性期之診斷。Mycoplasma pneumoniae重複感染，IgM抗體可能不存在。\n檢測結果陽性，表示血液中含有Anti-Mycoplasma pneumoniae IgM，可能為急性Mycoplasma pneumoniae感染。\n檢測結果陰性，表示血液中不含有Anti-Mycoplasma pneumoniae IgM，表示無Mycoplasma pneumoniae感染或是非急性期感染。","tags":["結核/呼吸道"]},{"n":"Anti-neutrophil cytoplasmic Ab (quantitative)","c":"FSIANE","p":"12171B(380點)","r":"是","ct":"02號黃頭管(Serum separator tu","d":"全血3.5 mL","g":"生化免疫組","t":"其他","m":"螢光酵素連結免疫分析法(Fluorescence enzyme immunoassay, FEIA)","rv":"(1)Anti-myeloperoxidase Ab(Anti-MPO Ab)：<3.5 IU/mL\n(Negative <3.5 IU/mL、 Borderline 3.5-5.0 IU/mL、 Positive >5.0 IU/mL)；\n(2)Anti-protease 3 Ab(Anti-PR3 Ab)：<2.0 IU/mL\n(Negative <2.0 IU/mL、Borderline 2.0-3.0 IU/mL、Positive >3.0 IU/mL)。","i":"(1) Anti-MPO：輔助診斷necrotizing crescentic glomerulonephritis (NCGN)、Churg-Strauss syndrome、Wegener's granulomatosis (WG)、microscopic polyangiitis (MPA)。\n(2)Anti-PR3：輔助診斷Wegener’s granulomatosis (WG)、microscopic polyangitis、Churg-Strauss syndrome、necrotizing glomerulonephritis","cl":"在65% necrotizing crescentic glomerulonephritis (NCGN)及60%之Churg-Strauss syndrome患者中會出現Anti-MPO Ab，甚至在20~30% Wegener's granulomatosis (WG) 及45% microscopic polyangiitis (MPA)患者血清中亦可測得Anti-MPO Ab。\nAnti-PR3 Ab對診斷Wegener’s granulomatosis (WG)之sensitivity及specificity高達81%及97%。在小部份之microscopic polyangitis患者30%、Churg-Strauss syndrome患者及20%~30% necrotizing glomerulonephritis患者且無明顯之小血管炎患者亦可能出現Anti-PR3 Ab。","tags":["其他"]},{"n":"Anti-neutrophil cytoplasmic Ab(Qualitative)","c":"FSIANC","p":"12171B(380點)","r":"是","ct":"03號綠頭管(Lithium Heparin)","d":"全血2 mL","g":"生化免疫組","t":"其他","m":"間接免疫螢光法(Indirect immunofluorescence assay, IIFA)","rv":"Non-reactive (1:10)","i":"定性檢測血液中抗嗜中性球細胞質IgG抗體(granulocyte cytoplasm, ANCA)，協助ANCA相關血管炎之診斷，如Glomerulonephritis、Pulmonary haemorrhage、Cutaneous vasculitis with systemic features、Multiple lung nodules、Chronic destructive disease of the upper airways、Long-stranding sinusitis or otitis、Subglottic tracheal stenosis、Mononeuritis multiplex or other peripheral neuropathy、Retro-orbital mass、Scleritis。","cl":"抗嗜中性白血球細胞質抗體(ANCA)的目標抗原位於嗜中性白血球和單核細胞的細胞質顆粒。藉由件皆免疫螢光法可區分出ANCA兩種螢光型態，一為嗜中性白血球細胞質呈現彌漫性分佈的顆粒型螢光染色、細胞核內無螢光的細胞質型ANCA (cANCA)，二為環繞細胞核周圍平滑的帶狀細顆粒型螢光核的周邊型ANCA (pANCA)；有時也可能會出現非典型的cANCA和pANCA螢光模型。\nANCA相應的目標抗原包括：\n－MPO(髓過氧化物?)，是pANCA主要的目標抗原；\n－PR3(蛋白?3)，cANCA主要的目標抗原；\n－IV型膠原(腎小球基底膜細胞外基質蛋白(GBM))。\nANCA相關自體免疫性疾病／小血管炎包括：\n肉芽腫性血管炎(GPA)(既往稱為韋格納肉芽腫)，顯微鏡下多動脈炎(MPA)，嗜酸細胞性肉芽腫性多血管炎(EGPA)(既往稱為變應性肉芽腫性血管炎(CSS))、免疫複合物性血管炎，抗腎小球基底膜腎小球腎炎(抗GBM腎小球腎炎)，肺出血-腎炎綜合征(急性進行性抗GBM腎小球腎炎伴有肺部出血)。","tags":["腎臟","自體免疫"]},{"n":"Anti-parietal cell Ab","c":"FSIAPC","p":"12058B(200點)","r":"否","ct":"02號黃頭管(Serum separator tu","d":"全血2.0 mL","g":"生化免疫組","t":"其他","m":"間接免疫螢光法(Indirect immunofluorescence assay, IFA)","rv":"1:10X(-)","i":"協助臨床診斷惡性貧血","cl":"Gastric parietal cell是胃壁表皮細胞，分泌胃酸來消化蛋白質，在惡性貧血及其他胃部疾病的病人產生自體免疫抗體。\n抗胃壁細胞抗體(Anti-parietal cell antibody, APCA)常與惡性貧血(pernicious anemia)及慢性萎縮性胃炎(chronic atrophic gastritis)有關，大約分別發生於90%及50%的病患中，胃壁細胞抗體呈陰性反應則可以排除惡性貧血的可能。抗胃壁細胞抗體Anti-parietal cell antibody也出現於Hashimoto’s thyroiditis、myxedema、thyrotoxicosis、iron deficiency anemia、adrenal insufficiency及diabetes mellitus。","tags":["腫瘤標記","貧血/血液疾病","自體免疫"]},{"n":"Anti-PLA2R(IgG) (Anti-Phospholipase A2 receptor antibodies(IgG))","c":"FSIPLA","p":"自費","r":"否","ct":"02號黃頭管(Serum separator tu","d":"全血3.0 mL","g":"生化免疫組","t":"其他","m":"Enzyme-linked immunosorbent assay(ELISA)","rv":"Negative , <14 RU/mL；\n檢驗報告備註：Negative <14.0 RU/mL, Borderline 14.0~19.9 RU/ml, Positive ≧20 RU/mL。","i":"定量或半定量檢測血液中Anti-Phospholipase A2 receptor antibodies效價，輔助診斷原發性膜性腎小球腎炎的(MGN，pMGN)。","cl":"Anti-Phospholipase A2 receptor antibodies(Anti-PLA2R)是診斷原發性膜性腎小球腎炎(primary membranous nephropathy, PMN)的高度特異性的血清學標記物，在病人血清中的檢出率可達70%~75%，檢測Anti-PLA2R的濃度與疾病活性正相關，因此PLA2R抗體的濃度可以用來監控治療效果，研究亦發現高效價的PLA2R抗體的病人預後較差，進入自發性緩解(spontaneous response)的機會較低。由於PMN是成人最常見的腎病症候群之一，且容易進展為慢性腎病甚至腎衰竭，因此PLA2R抗體檢測在診斷、病程監測及治療評估方面具有重要臨床價值。","tags":["腎臟"]},{"n":"Anti-Ribosomal P IgG (抗Ribosomal P抗體)","c":"FSIRIB","p":"12156B(600點)","r":"是","ct":"03號綠頭(Lithium heparin)管","d":"全血3.5 mL","g":"生化免疫組","t":"其他","m":"螢光酵素免疫分析法(Fluorescence enzyme immunoassay, FEIA)","rv":"Negative (＜7 EliA U/mL)","i":"定量血清中Anti-Ribosomal P，協助各種自體免疫疾病之診斷。","cl":"ANA抗核抗體篩檢試劑可偵測血清或血漿中具臨床相關性的循環自體抗體，這些自體抗體可協助診斷全身性自體免疫疾病，例如：系統性紅斑狼瘡、混和性結締組織疾病(MCTD)、未分化型結締組織疾病(UCTD)、修格連氏症候群、硬皮症(系統性硬化症, SSc)、皮肌炎、多發性肌炎(Polymyocytis, PM)、類風濕性關節炎(RA)、CREST症候群與雷諾氏症候群。\nAnti-Ribosomal P Ab：研究發現此抗體與紅斑性狼瘡中樞神經症狀有關，抗體是抗細胞質內的抗原ribosomal RNP，曾有報告顯示有psychosis的狼瘡病人約90%陽性，而沒有psychosis的病人有12%陽性。","tags":["自體免疫"]},{"n":"Anti-Rubella IgM","c":"FVPRUM","p":"14045B(400點)","r":"是","ct":"02號黃頭管(Serum separator tu","d":"全血2 mL","g":"生化免疫組","t":"3天","m":"抗體捕捉化學冷光免疫分析法(antibody capture chemiluminescence immunoassay, CLIA)","rv":"Negative","i":"協助判斷個體是否為急性或近期德國麻疹病毒感染。","cl":"德國麻疹是屬於單股RNA披膜病毒科的德國麻疹病毒導致的?疹性傳染病。此疾病通常伴隨著淋巴結腫，感染後會終身免疫。\n如果在第一次懷孕四個月被德國麻疹病毒感染，將會造成胎兒嚴重的併發症。如果沒有免疫保護的女性，在懷孕期間會有高風險造成胚胎損傷。先天性麻疹會引起大範圍且是永久性的嚴重損傷，且會不利地影響往後的發展（包含白內障、耳聾、肝脾腫大、精神運動遲緩、骨頭病變、心臟病、神經病變）。\n感染後胎兒或新生兒的病理學結果，取決於病毒造成的致畸性和懷孕時感染的時間點。母親感染時的孕齡被認為是在子宮內傳染和胎兒損傷最重要的因素。一般普遍認為風險會隨著孕齡增加而降低：在懷孕的第一、二個月期間導致胎兒感染的機率最高（40~60%），在第四、第五個月逐漸降低（10~20%）。在新生兒與病毒分離研究的臨床發現已顯示胎兒感染在妊娠中期以後是罕見的。麻疹病毒在初期母親感染時在子宮內傳播，無論明顯或不明顯，當病毒經血液感染胎盤時，隨後就會感染胎兒。\n對於感染的首次體液性免疫反應是合成對德國麻疹病毒特異性的 IgM抗體，在感染後兩週內血清中IgM抗體達到最高值，並循環維持一至兩個月。特異性 IgG抗體通常在疹子出現後幾天，跟IgM發生後一週出現。其症狀發生後六至十週會迅速達致一個平穩期，然後逐漸降低至一個水平。完全無症狀的感染會伴隨著特異性IgG適度的增加。\n對於德國麻疹病毒IgM和IgG抗體正確的檢測，提供了診斷跟追蹤急性感染的必要工具。用於評估生育年齡婦女的對於德國麻疹病毒的免疫狀態，且可根據結果建議生育年齡的易感婦女採取合適的預防。自從疫苗問世後，對於德國麻疹病毒的IgG測定，已經廣泛用於接種疫苗後，測定血清中是否有有效抗體形成的工具。","tags":["感染/敗血症"]},{"n":"Anti-Scl-70 Ab (可抽出的核抗體- Scl-70)","c":"FSIEN3","p":"12174B(507點)","r":"是","ct":"03號綠頭(Lithium heparin)管","d":"全血3.5 mL","g":"生化免疫組","t":"其他","m":"螢光酵素免疫分析法(Fluorescence enzyme immunoassay, FEIA)","rv":"Negative (＜7 EliA U/mL)","i":"定量血清中Anti-Scl-70，協助各種自體免疫疾病之診斷。","cl":"ANA抗核抗體篩檢試劑可偵測血清或血漿中具臨床相關性的循環自體抗體，這些自體抗體可協助診斷全身性自體免疫疾病，例如：系統性紅斑狼瘡、混和性結締組織疾病(MCTD)、未分化型結締組織疾病(UCTD)、修格連氏症候群、硬皮症(系統性硬化症, SSc)、皮肌炎、多發性肌炎(Polymyocytis, PM)、類風濕性關節炎(RA)、CREST症候群與雷諾氏症候群。\nAnti-Scl-70 Ab陽性出現於limited and diffuse systemic sclerosis，diffuse SSc病人的Scl-70抗體陽性率約30%，RNP、SSA抗體陽性率各約20%；CREST是SSc內的一個小族群，屬於limited SSc，Scl-70抗體陽性率約10%。","tags":["自體免疫"]},{"n":"Anti-Smooth muscle Ab (ASMA)","c":"FSIASA","p":"12057B(200點)","r":"是","ct":"02號黃頭管(Serum separator tu","d":"全血2.0 mL","g":"生化免疫組","t":"其他","m":"間接免疫螢光法(Indirect immunofluorescence assay, IFA)","rv":"Nonreactive","i":"協助臨床診斷慢性活動性肝炎、自體免疫肝臟疾病。","cl":"陽性anti-smooth muscle antibody可見於Primary biliary cirrhosis及chronic active hepatitis，效價可能大於1:100；在病毒性肝炎、Cyptogenic cirrhosis、Primary biliary cirrhosis可能出現低效價陽性結果。","tags":["肝臟/膽道","自體免疫"]},{"n":"Antithrombin activity","c":"FHEATH","p":"08072B(300點)","r":"是","ct":"10號1.8 mL淺藍頭管(3.2% buffer","d":"(A)(患者Hct≦55％：上述採血試管建議採血量之±10％","g":"血液及組織相容組","t":"1週以上","m":"Chromogenic anti-factor Xa method","rv":"80-120%","i":"(1)可協助診斷先天性或後天性antithrombin缺乏造成之栓塞\n(2)懷疑出現heparin resistance","cl":"(1)作為Thrombin的抑制物，Antithrombin的活性可透過肝素有顯著的提升，除了遺傳性的Antithrombin缺乏，在DIC、腎病症候群、肝臟疾病或L-asparaginase treatments等患者出現後天性的Antithrombin缺乏。Antithrombin缺乏病人，以heparin治療時可能出現heparin resistance現象。\n(2)先天性的Antithrombin缺乏可分為4類，出現頻率較低的先天性缺乏為Type II :qualitative deficiency，通常與基因突變相關。與Antithrombin-heparin binding有關之基因缺陷如為heterozygous表現時，患者血栓形成風險較低，但近期研究發現當此基因缺陷與其他的止血異常(如Factor V Leiden突變)並存時，血栓形成之危險性則會增高。","tags":["肝臟/膽道","腎臟","凝血/血栓"]},{"n":"Antithrombin assay with INNOVANCE","c":"FHEATI","p":"08072B(300點)","r":"否","ct":"10號1.8 mL淺藍頭管(3.2% buffer","d":"(A)患者Hct≦55％：上述採血試管建議採血量之±10％(","g":"血液及組織相容組","t":"1週以上","m":"Chromogenic anti-factor Xa method","rv":"79-119.8 %","i":"(1)可協助診斷先天性或後天性antithrombin缺乏造成之栓塞\n(2)懷疑出現heparin resistance時","cl":"(1)作為Thrombin的抑制物，Antithrombin的活性可透過肝素有顯著的提升，除了遺傳性的Antithrombin缺乏，在DIC、腎病症候群、肝臟疾病或L-asparaginase treatments等患者出現後天性的Antithrombin缺乏。Antithrombin缺乏病人，以heparin治療時可能出現heparin resistance現象。\n(2)先天性的Antithrombin缺乏可分為4類，出現頻率較低的先天性缺乏為Type II :qualitative deficiency，通常與基因突變相關。與Antithrombin-heparin binding有關之基因缺陷如為heterozygous表現時，患者血栓形成風險較低，但近期研究發現當此基因缺陷與其他的止血異常(如Factor V Leiden突變)並存時，血栓形成之危險性則會增高。\n(3)依據 FDA 核准資訊，Fitusiran（QFITLIA）治療期間之 antithrombin activity monitoring，建議使用FDA 許可之 INNOVANCE Antithrombin assay 進行檢測。","tags":["肝臟/膽道","腎臟","凝血/血栓"]},{"n":"Antithrombin assay with INNOVANCE","c":"FHEATI","p":"08072B(300點)","r":"否","ct":"10號1.8 mL淺藍頭管(3.2% buffer","d":"(A)患者Hct≦55％：上述採血試管建議採血量之±10％(","g":"血液及組織相容組","t":"1週以上","m":"Chromogenic anti-factor Xa method","rv":"79-119.8 %","i":"(1)可協助診斷先天性或後天性antithrombin缺乏造成之栓塞\n(2)懷疑出現heparin resistance時","cl":"(1)作為Thrombin的抑制物，Antithrombin的活性可透過肝素有顯著的提升，除了遺傳性的Antithrombin缺乏，在DIC、腎病症候群、肝臟疾病或L-asparaginase treatments等患者出現後天性的Antithrombin缺乏。Antithrombin缺乏病人，以heparin治療時可能出現heparin resistance現象。\n(2)先天性的Antithrombin缺乏可分為4類，出現頻率較低的先天性缺乏為Type II :qualitative deficiency，通常與基因突變相關。與Antithrombin-heparin binding有關之基因缺陷如為heterozygous表現時，患者血栓形成風險較低，但近期研究發現當此基因缺陷與其他的止血異常(如Factor V Leiden突變)並存時，血栓形成之危險性則會增高。\n(3)依據 FDA 核准資訊，Fitusiran（QFITLIA）治療期間之 antithrombin activity monitoring，建議使用FDA 許可之 INNOVANCE Antithrombin assay 進行檢測。","tags":["肝臟/膽道","腎臟","凝血/血栓"]},{"n":"Anti-Toxoplasma IgM","c":"FVPTOM","p":"14071B(700點)","r":"是","ct":"02號黃頭管(Serum separator tu","d":"3 mL全血","g":"生化免疫組","t":"3天","m":"化學冷光免疫分析法(antibody capture chemiluminescence immunoassay, CLIA)","rv":"Negative","i":"協助判斷個體對弓漿蟲體之免疫狀態；本試劑不適用於血液或捐血者篩檢。","cl":"弓漿蟲病是一種很常見的感染性疾病，是由一種細胞內寄生的原生動物-弓漿蟲引起的。這種感染人類及溫血動物的疾病可由食入了感染或污染了囊合子的食物、直接接觸牲畜或經胎盤感染而傳播；也有文獻報導輸血或器官移植也可引起弓漿蟲屬的傳播。 \n對於正常成人而言，弓形蟲感染通常為良性病程，多數無症狀；有時為輕度症狀(頭痛、喉痛、無力)；或者極少數情況下伴發淋巴結炎。但也可出現嚴重症狀，如心肌炎、肝炎、肺炎、腦膜腦炎和視網膜脈絡膜炎。血清學檢測陽性的患病率隨年齡增高而增高，提示既往接觸史。宿主對寄生蟲感染的保護防禦主要是通過細胞介導的免疫反應。因此，在接受免疫抑制治療(預防器官排斥反應或抗腫瘤治療)的患者中經常會出現感染症狀。現已證明，弓漿蟲腦炎是造成獲得性免疫缺陷綜合症的患者死亡重要原因之一。 \n如果孕婦感染弓漿蟲，則弓漿蟲可以通過胎盤而感染胎兒，可造成自發性流產、早產或死產。妊娠早期感染弓漿蟲會嚴重損傷胎兒的中樞神經系統而導致胎兒死亡。妊娠中期感染則可能引起腦水腫、智力與發育遲緩、失明及腦鈣化。弓漿蟲感染最常見於妊娠晚期，可導致視網膜脈絡膜炎及其他視覺損害、中樞神經系統損害和潛伏性無症狀性感染，而最終發展至典型疾病。\n單次檢測不可診斷弓漿蟲感染，建議結合臨床表現和其他診檢查作為醫療處置依據。","tags":["肝臟/膽道","心臟/心血管","感染/敗血症","輸血/血型","結核/呼吸道","移植/免疫"]},{"n":"Anti-TPO","c":"FENTPO","p":"12134B(200點)","r":"是","ct":"03號綠頭管(Lithium heparin)","d":"全血3.5 mL","g":"生化免疫組","t":"2天","m":"雙向免疫酵素冷光分析法(Two-site Immunoenzymatic assay, sandwich)","rv":"＜9.0 IU/mL","i":"定量偵測人類血清與血漿中甲狀腺過氧化酵素自體抗體（Thyroperoxidase antibody, TPOAb）的含量，協助診斷自體甲狀腺疾病及區分非自體免疫性甲狀腺腫大或甲狀腺功能低下。","cl":"甲狀腺微粒體抗原即甲狀腺過氧化?Thyroid Peroxidase (TPO)，TPO為結合於細胞膜上的一種醣化分子，這種酵素能夠催化T3和T4合成過程中Thyroglobulin上tyrosin的碘化作用(Iodination)。以往這些抗體被認為屬於Antimicrosomal Antibody (AMA)的一種，因為抗體會和甲狀腺細胞上的微粒體(microsome)部分結合。\n近來的研究已經確定甲狀腺過氧化?是微粒體的抗原成分。大部分的橋本氏甲狀腺炎、原發性黏液水腫（Primary Myxoedema）及葛雷芙氏症(Grave's disease)案例通常可同時發現到甲狀腺過氧化?抗體及甲狀腺球蛋白抗體。甲狀腺過氧化?抗體明顯可見於大部分的產後甲狀腺炎( post-partum thyroiditis )，同時已有人發現懷孕早期若有自體抗體的存在，發生無症狀性產後甲狀腺功能低下的危險性很高。\n在缺乏甲狀腺球蛋白抗體時出現甲狀腺過氧化?抗體是很常見的，尤其是患有小甲狀腺腫及高達64%的自體免疫甲狀腺功能低下的病人已被報告只有甲狀腺過氧化?抗體而已。此外，甲狀腺過氧化?抗體經常可發現於其他自體免疫疾病之患者，例如類風濕性關節炎、Addison’s疾病及第一型糖尿病等。雖然這些自體抗體的臨床意義仍不明，但有20%的無症狀個體也可偵測到少量，尤其是老年人，而且女性多過於男性。\n非甲狀腺自體免疫疾病患者，也可發現 TPO 抗體中度升高，例如如惡性貧血、其他免疫激活系統的疾病。","tags":["糖尿病","甲狀腺","腫瘤標記","貧血/血液疾病","自體免疫"]},{"n":"Anti-TSH receptor Ab","c":"FENTBI","p":"12121B(360點)","r":"是","ct":"02號黃頭管(Serum separator tu","d":"全血3.5mL","g":"生化免疫組","t":"其他","m":"電子化學冷光免疫分析法(Electrochemiluminescence immunoassay, ECLIA)","rv":"(1)Healthy population: 1.22 IU/L(97.5th percentile)；\n(2)Cutoff for Grave’s disease: 1.75 IU/L(Sensitivity 96%, Specificity 99%)。","i":"定量檢測血清中Anti-TSH receptorantibody，輔助Graves' disease的鑑別診斷。","cl":"一種自體免疫性甲狀腺機能亢進疾病，主要由對抗促甲狀腺素受體(TSH receptor, TSHR)的自體抗體所引起。檢測Anti-TSH Receptor Ab(TRAb)對疾病的診斷和治療是有幫助的。\n大部份促甲狀腺素受體抗體模擬促甲狀腺素的作用。由於這些抗體不受負回饋系統所調控，甲狀腺受刺激後常常會造成Graves’ disease的臨床甲狀腺毒性狀態。\n測定促甲狀腺素受體抗體的適應症包括：\n(1)偵測或排除自體免疫性甲狀腺機能亢進，並將其與甲狀腺的瀰漫性功能自主(disseminated autonomy)區分。TRAb的存在表示病患的甲狀腺毒症是屬於自體免疫性的病因，而不是由毒性結節型甲狀腺腫所引起。\n(2)監控Graves’ disease病患的治療及復發的預測，從而對治療的管理構成一個重要的決策輔助。對Graves’ disease進行抗甲狀腺藥物治療時,，TRAb的水平會有下降的趨向。在服用一個藥物治療的療程後有低水平的TRAb或TRAb消失是表示疾病緩解，因而可以考慮停止治療。\n(3)在懷孕第三期時測量TRAb。由於TRAb是屬於IgG類型的抗體，它們可以通過胎盤並造成新生兒的甲狀腺疾病。因此， 有甲狀腺疾病病史的病患在懷孕時測量TRAb對於評估新生兒的甲狀腺疾病風險是重要的。","tags":["甲狀腺","自體免疫"]},{"n":"Anti-Varicella Zoster IgG","c":"FVPVAR","p":"14068B(200點)","r":"是","ct":"02號黃頭管(Serum separator tu","d":"2 mL全血","g":"生化免疫組","t":"其他","m":"化學冷光免疫分析法(indirect sandwich chemiluminescence immunoassay, CLIA)","rv":"Negative","i":"協助評估個體對水痘-帶狀?疹病毒之免疫狀態","cl":"水痘(varicella，chickenpox)是一種VZV病毒引起的高傳染性疾病，此病毒對易感性家居接觸者(susceptible household contact)的二次侵襲率(Secondary attack rate)可達90%。VZV引起之全身性感染通常可產生終身免疫，就一般健康人而言，再次暴露於致病原後極少出現臨床症狀。免疫功能低下者較可能表現此類症狀。然而，與其他病毒感染症相同，再次暴露於野生株(wild-type)VZV常導致再次感染。其會在不引起臨床症狀或血中可測得病毒的情況下促使抗體效價升高。VZV可潛伏於感覺神經節內，隔一段時間後有可能再度活化而引起帶狀皰疹(herpes zoster，shingles)。這是一種常沿著單或雙側感覺神經根皮節分布的疼痛水皰疹(vesicular rash)。在兒童身上，水痘通常是一種持續4至5天的自限性疾病(self-limited disease)，其症狀為發燒、無力，一般會出現250至500個廣泛性水皰疹病灶。青少年、成人及免疫功能低下者的病情通常較嚴重，發生併發症的風險亦較高。各年齡層皆極少發生VZV原發性亞臨床感染。","tags":["感染/敗血症"]},{"n":"Anti-Varicella zoster IgM","c":"FSIVAM","p":"14013B(1080點)","r":"是","ct":"02號黃頭管(Serum separator tu","d":"全血2mL","g":"生化免疫組","t":"其他","m":"酵素連結免疫分析法( enzyme-linked immunosorbent assay, ELISA)","rv":"Negative","i":"定性檢測Varicella zoster IgM，輔助診斷帶狀皰疹病毒(Varicella zoster)之近期感染。","cl":"Varicella zoster病毒(VZV)，也稱為human herpesvirus 3，是造成水痘及帶狀皰疹(chickenpox、shingles)的病原體。水痘是一種高度傳染性疾病，經由上呼吸道黏膜而進入體內，隨血液循環而居落在皮膚，病毒的增殖引起上皮細胞膨大及退化病毒因組織液之聚集而形成水皰，水皰液中含有病毒顆粒。\n水痘初次感染主要是發生於小孩，妊娠期間VZV感染會引起胎兒疾病或畸形，如果發生在妊娠末期，可能導致新生兒死亡。\n初次感染後，病毒會於神經節長時間潛伏，直到個體老化或免疫力降低時再度活化，造成神經路徑的疼痛性皮疹。Varicella zoster病毒初次感染或再活化皆可測得IgM抗體。","tags":["其他"]},{"n":"Anti-β2 glycoprotein I IgG","c":"FSIGPI","p":"12133B(300點)","r":"是","ct":"02號黃頭管(Serum separator tu","d":"全血3.5 mL","g":"生化免疫組","t":"其他","m":"螢光酵素連結免疫分析法(Fluorescence enzyme immunoassay, FEIA)","rv":"Negative／＜7.0 U/mL。\n備註說明：\n(A)Negative: ＜7.0 U/mL; \n(B)Equivocal: 7.0~10.0 U/mL; \n(D)Positive: ＞10.0 U/mL.","i":"定量測定血清中Anti-β2 glycoprotein I IgG濃度，輔助診斷primary antiphospholipid syndrome (APS)及評估紅斑性狼瘡(SLE)病人發生血栓的風險(thrombotic risk)。","cl":"抗心磷脂抗體(Anti-Cardiolipid Ab, ACA)是屬於抗磷脂抗體(aPL)族群。出現antiphopholipid antibodies但無其他自體免疫病者為primary APS，此類抗體出現在APS機率高達80-90%，因此可協助APS之診斷；但無特異性，因其他自體免疫疾病、特定藥物治療後或感染某些傳染性疾病後(例如HCV, Syphilis及Infectious mononucleosis)也可能產生此類抗體。\n抗磷脂症候群，亦是我們所稱的”Hughes syndrome”，是以典型的臨床症狀為特徵，例如動脈或靜脈的血栓形成，或者是持續的抗磷脂抗體測試陽性的習慣性流產。與繼發性的抗磷脂症候群對照之下，抗磷脂症候群是與系統性紅斑狼瘡或其他風濕性疾病有關聯，於原生抗磷脂症候群，沒有證據顯示有其他相關的疾病。在傳染疾病以及抗磷脂症候群中的抗心磷脂抗體可藉由它們的輔因子而加以區分：從帶有傳染性疾病患者身上的抗心磷脂抗體識別的為純磷脂的抗原，患有APS患者的抗心磷脂抗體所結合的，需要β2-glycoprotein I作為輔因子。\n抗心磷脂抗體/狼瘡性抗凝固素在診斷中被視為有重大的關聯性，因發現在這些抗體與血栓形成傾向具有相關性。這造成下列關聯性的增強：靜脈/動脈的血栓形成(包括中風)，血小板減少症，網狀斑，習慣性流產，以及在陽性抗心磷脂抗體/狼瘡性抗凝固素(ACA/LA-positive)患者中神經學上的表現。抗心磷脂抗體/狼瘡性抗凝固素的提高亦可能在罹患腦血管疾病或心臟衰弱梗塞的患者身上發現。抗磷脂抗體在抗磷脂症候群發病時扮演一個第一線的角色\nβ2-GP I即apolipoprotein H，分子量54kDa之血清輔助蛋白(cofactor)，為血液凝固過程中內在性凝固路徑反應之抑制因子。對於抗磷脂症候群(APS)的診斷，2-GP I 抗體檢測比抗心磷脂的測定具有較高的特異性2。於3-10%的APS患者，β2 醣蛋白 I 抗體可能為唯一呈現陽性的檢測3。β2-GP I抗體與未經選擇的抗心磷脂抗體檢測陰性具子癇前症和/或子癲症於的懷孕婦女之間的相關性，其結果意味著β2-GPI抗體的檢測或許也能幫助分辨此種妊娠病的發病率。\nAPS診斷依據至少需包含1種臨床表徵及1種陽性之實驗室檢查。臨床表徵包含thrombosis、懷孕中下列3種情況中任1種症狀：懷孕10周後流產或多次流產；懷孕未滿34週因嚴重子?前症(pre-eclampsia)或嚴重胎盤不足(severe placentl insufficiency)、大於或等於3次懷孕未滿10週即流產紀錄。實驗室診斷包含間隔12週2次測定acL IgG或IgM或 aβ2GP I持續中度或高度效價、間隔12週2次測定LA皆為陽性反應。\n基於aCL抗體結構特性，同時測定aCL及aβ2GP I較單獨測定此2項抗體可提供較高之敏感度。","tags":["貧血/血液疾病","自體免疫","凝血/血栓"]},{"n":"Anti-β2 glycoprotein I IgM","c":"FSIGPM","p":"12133B(300點)","r":"是","ct":"02號黃頭管(Serum separator tu","d":"血液3.5 mL","g":"生化免疫組","t":"其他","m":"螢光酵素連結免疫分析法(Fluorescence enzyme immunoassay, FEIA)","rv":"Negative／＜7.0 U/mL。\n備註說明：\n(A)Negative: ＜7.0 U/mL; \n(B)Equivocal: 7.0~10.0 U/mL; \n(D)Positive: ＞10.0 U/mL.","i":"定量測定血清中Anti- cardiolipin IgM及Anti-β2 glycoprotein I IgM濃度，輔助診斷primary antiphospholipid syndrome (APS)及評估紅斑性狼瘡(SLE)病人發生血栓的風險(thrombotic risk)。","cl":"抗心磷脂抗體(Anti-Cardiolipid Ab, ACA)是屬於抗磷脂抗體(aPL)族群。出現antiphopholipid antibodies但無其他自體免疫病者為primary APS，此類抗體出現在APS機率高達80-90%，因此可協助APS之診斷；但無特異性，因其他自體免疫疾病、特定藥物治療後或感染某些傳染性疾病後(例如HCV, Syphilis及Infectious mononucleosis)也可能產生此類抗體。\n抗磷脂症候群，亦是我們所稱的”Hughes syndrome”，是以典型的臨床症狀為特徵，例如動脈或靜脈的血栓形成，或者是持續的抗磷脂抗體測試陽性的習慣性流產。與繼發性的抗磷脂症候群對照之下，抗磷脂症候群是與系統性紅斑狼瘡或其他風濕性疾病有關聯，於原生抗磷脂症候群，沒有證據顯示有其他相關的疾病。在傳染疾病以及抗磷脂症候群中的抗心磷脂抗體可藉由它們的輔因子而加以區分：從帶有傳染性疾病患者身上的抗心磷脂抗體識別的為純磷脂的抗原，患有APS患者的抗心磷脂抗體所結合的，需要β2-glycoprotein I作為輔因子。\n抗心磷脂抗體/狼瘡性抗凝固素在診斷中被視為有重大的關聯性，因發現在這些抗體與血栓形成傾向具有相關性。這造成下列關聯性的增強：靜脈/動脈的血栓形成(包括中風)，血小板減少症，網狀斑，習慣性流產，以及在陽性抗心磷脂抗體/狼瘡性抗凝固素(ACA/LA-
