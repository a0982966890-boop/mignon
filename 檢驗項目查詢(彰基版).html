al cell：0 %\n(14)Large granular lymphocyte：≦10 %\n(15)Absolute neutrophil count(ANC)：1.3-5.6×10^3/μL","i":"(1)評估感染、發炎之程度\n(2)協助血液相關疾病（如：白血病）之診斷","cl":"Neutrophil-Seg增加常見於細菌感染、發炎，Neutrophil-Seg\n降低則常見於病毒感染、化學中毒、肝硬化。Lymphocyte增\n加常見於感染性單核球增多症、CLL。Lymphocyte降低則常\n見於急性傳染病、細菌感染、發炎。Monocyte增加常見於單\n核球性白血病、結核病，Monocyt降低則常見於惡性貧血、敗\n血病。Eosinophil增加常見於寄生蟲感染、過敏症、氣喘。\nBasophil增加常見於慢性顆粒性白血病。Neutrophil-band增加\n常見於細菌感染、發炎。","tags":["肝臟/膽道","感染/敗血症","腫瘤標記","貧血/血液疾病","結核/呼吸道","過敏"]},{"n":"Wheat (小麥)","c":"FALWHE","p":"F30022A(1620點)","r":"是","ct":"03號綠頭管(Lithium heparin)","d":"全血4.5 mL","g":"生化免疫組","t":"其他","m":"螢光酵素免疫分析法(Fluorescence enzyme immunoassay, FEIA)","rv":"＜0.35 kU/L；參考值備註：0.35~0.69 kU/L(Class I)、0.70~3.49 kU/L(Class II)、3.50~17.49 kU/L(Class III)、17.5~52.49 kU/L(Class IV)、52.5~99.99 kU/L(Class V)、≧100 kU/L(Class VI)。","i":"定量分析特異性過敏原IgE之濃度，協助診斷IgE媒介之過敏疾病。","cl":"過敏性疾病大約佔全世界人口30%。過敏反應主要分為四型，其中過敏原引起主要為第一型過敏反應，為外因性氣喘、花粉熱或異位性濕疹的病人，當第一次接觸過敏原，症狀會立即發作，免疫系統會產生對應過敏原之過敏原特異性IgE抗體，其會循環於血液中並接合於mast cell上，當第二次接觸相同過敏原時，會使mast cell產生去顆粒作用，使細胞內之發炎性物質，例如：histamine、serotonin等，釋放至細胞外，造成流鼻水、打噴嚏等臨床症狀產生，嚴重者甚至產生休克。可藉由檢測血液中之引起過敏相關之特異性抗體IgE(如花粉、動物毛屑、塵?及家塵等)，此可輔助了解引起過敏之過敏原種類，仍需配合其它臨床證據一起判斷。","tags":["過敏"]},{"n":"Widal and Weil-Felix test","c":"FSIWEI","p":"12002B(100點)","r":"否","ct":"2號黃頭管(Serum separator tub","d":"全血2 mL","g":"生化免疫組","t":"其他","m":"凝集法(Agglutination)，PULSE","rv":"(1)Salmonella typhi O：≦1：80 (+)；\n(2)Salmonella typhi H：≦1：80 (+)；\n(3)Salmonella paratyphi A：≦1：80 (+)；\n(4)Salmonella paratyphi B：≦1：80 (+)；\n(5)Proteus OX2：≦1：80 (+)；\n(6)Proteus OX19：≦1：80 (+)；\n(7) Proteus OXK：≦1：80 (+)","i":"協助診斷傷寒(Typhoid)、副傷寒(Paratyphoid)或立克次體感染所造成的斑疹傷寒、斑疹熱、叢林斑疹傷寒、恙蟲病、Q熱等疾病。","cl":"發熱疾病檢查，抗體陽性代表反覆暴露到抗原、感染或最近使用疫苗。\n可間接診斷沙門氏菌及副沙門氏菌所引起的感染性腸內熱。當傷寒熱出現臨床症狀的初期，就能測得高效價抗體。O與H在感染後一個星期開始上升，上升3-6個星期，O凝集素在6-12個月間會降到很低的量，若O凝集素呈現4倍增加，往往表示是活動性感染；而H凝集素的上升較無特異性，可以維持數年。\nAnti-O，somatic抗原，敏感度低於50%，anti-H，flagellar抗原，鑑定過去感染，敏感度達75%。\n立克次體感染在感染後6-12天，抗體開始上升，最高峰在一個月，通常5-6個月後就回到陰性。OX19、OX2及OX-K在Proteus感染會造成陽性。\nWeil-Felix測定是利用立克次體和某些Proteus菌體具有相似抗原的特性，使感染立克次體的患者血清與某些Proteus菌株行凝集反應。流行性傷寒(Epidemic typhus fever)、地方性流行性斑疹傷寒(鼠斑疹傷寒)和洛磯山斑點熱的患者血清對OX19和OX2皆有凝集反應，對OXK則無凝集反應；叢林斑疹傷寒(Scrub typhus)及恙蟲病(Tsutsugamushi disease)的患者血清對OXK有凝集反應，對OX19和OX2皆無凝集反應；立克次氏痘疹(Rickettisioa)的患者血清對OX19可能有凝集反應，對OX2和OXK皆無凝集反應；戰壕熱(Trench fever)及Q熱(Q fever)的患者血清對OX19、OX2和OXK皆無凝集反應。","tags":["其他"]},{"n":"Widal test","c":"FSIWID","p":"12002B(100點)","r":"否","ct":"2號黃頭管(Serum separator tub","d":"全血3 mL","g":"生化免疫組","t":"其他","m":"凝集法(Agglutination)，PULSE","rv":"(1)Salmonella typhi O：≦1：80 (+)；\n(2)Salmonella typhi H：≦1：80 (+)；\n(3)Salmonella paratyphi A：≦1：80 (+)；\n(4)Salmonella paratyphi B：≦1：80 (+)","i":"檢測血清中Salmonella antibodies協助診斷傷寒(Typhoid)及副傷寒(Paratyphoid)。","cl":"發熱疾病檢查，抗體陽性代表反覆暴露到抗原、感染或最近使用疫苗。\n可間接診斷沙門氏菌及副沙門氏菌所引起的感染性腸內熱。當傷寒熱出現臨床症狀的初期，就能測得高效價抗體。O與H在感染後一個星期開始上升，上升3-6個星期，O凝集素在6-12個月間會降到很低的量，若O凝集素呈現4倍增加，往往表示是活動性感染；而H凝集素的上升較無特異性，可以維持數年。\nAnti-O，somatic抗原，敏感度低於50%，anti-H，flagellar抗原，鑑定過去感染，敏感度達75%。","tags":["其他"]},{"n":"Yeast (酵母菌)","c":"FALYEA","p":"F30022C(1620點)","r":"是","ct":"03號綠頭管(Lithium heparin)","d":"全血4.5 mL","g":"生化免疫組","t":"其他","m":"螢光酵素免疫分析法(Fluorescence enzyme immunoassay, FEIA)","rv":"＜0.35 kU/L；參考值備註：0.35~0.69 kU/L(Class I)、0.70~3.49 kU/L(Class II)、3.50~17.49 kU/L(Class III)、17.5~52.49 kU/L(Class IV)、52.5~99.99 kU/L(Class V)、≧100 kU/L(Class VI)。","i":"定量分析特異性過敏原IgE之濃度，協助診斷IgE媒介之過敏疾病。","cl":"過敏性疾病大約佔全世界人口30%。過敏反應主要分為四型，其中過敏原引起主要為第一型過敏反應，為外因性氣喘、花粉熱或異位性濕疹的病人，當第一次接觸過敏原，症狀會立即發作，免疫系統會產生對應過敏原之過敏原特異性IgE抗體，其會循環於血液中並接合於mast cell上，當第二次接觸相同過敏原時，會使mast cell產生去顆粒作用，使細胞內之發炎性物質，例如：histamine、serotonin等，釋放至細胞外，造成流鼻水、打噴嚏等臨床症狀產生，嚴重者甚至產生休克。可藉由檢測血液中之引起過敏相關之特異性抗體IgE(如花粉、動物毛屑、塵?及家塵等)，此可輔助了解引起過敏之過敏原種類，仍需配合其它臨床證據一起判斷。","tags":["過敏"]},{"n":"Zinc (Zn)","c":"FBIZN","p":"10012B (400點)","r":"是","ct":"65號紅標深藍頭管","d":"全血5 mL","g":"生化免疫組","t":"其他","m":"感應耦合電漿質譜法(lnductively coupled plasma-mass spectrometry, ICP-MS)","rv":"(1)成年人614~1179 μg/L(95% Central interval)；\n(2)0~1天650~810 μg/L，2天~1歲650~1300 μg/L，1~5歲670~1180 μg/L，6~9歲770~1070 μg/L，10~14歲(男) 760~1010 μg/L，10~14歲(女)790-1180μg/L，15~19歲(男)640-1170μg/L，15~19歲(女)600-1010 μg/L(參考資料來源：CLSI C38-A: Control of Preanalytical Variation in Trace Element Determinations; Approved Guideline)","i":"定量血清中鋅濃度，協助鋅缺乏或中毒之診斷。","cl":"鋅(Zinc, Zn)是身體必需的微量金屬之一，是許多酵素反應的輔?，並在多種生理過程中扮演重要角色，包括免疫功能、傷口癒合、蛋白質合成等。因此，當鋅缺乏時，會出現一系列臨床表現，如皮膚炎、脫髮、傷口癒合不良、免疫功能低下、食慾不振、味覺或嗅覺喪失等。鋅缺乏的原因可能包括食物攝取不足、腸道吸收問題（如腸道吸收不良症）、慢性疾病、或是營養不良等。血中鋅濃度低於300 μg/L表示鋅缺乏。\n鋅中毒相對少見，但在某些情況下也可能發生，特別是在長期大量攝入鋅或飲用儲存在鍍鋅容器中的水時。鋅過量可能會干擾銅的吸收，導致銅缺乏。高鋅血症可能與某些急性炎症反應相關。過量鋅的症狀包括腹瀉、嘔吐、疲勞、頭痛等。\n鋅濃度在急性或慢性疾病中常會發生變化，特別是在感染、創傷、手術、燒傷或其他炎症狀態下，這些情況通常會引起血中鋅濃度下降，稱為“急性鋅耗竭”。因此，血鋅測定可以作為疾病狀態下的監測指標，協助臨床醫師評估鋅的狀態。\n在接受全靜脈營養(TPN)治療的患者中，鋅缺乏是常見的問題之一，因為靜脈營養可能無法充分提供鋅或因為腸道吸收問題，鋅的生物利用度較低。因此，鋅濃度的監測有助於評估患者營養狀況，確保適當的鋅補充。血中鋅濃度的變化可能會受到血漿蛋白濃度變化的影響，尤其是白蛋白或α2-macroglobulin濃度變動。鋅主要與這些蛋白質結合，因此在解釋血鋅測定結果時，應考慮這些因素的干擾，尤其是在急性或慢性炎症狀態下。","tags":["其他"]},{"n":"25-OH Vitamin D Total","c":"FEN25D","p":"自費","r":"是","ct":"03號綠頭管(Lithium Heparin)","d":"全血3.5 mL","g":"生化免疫組","t":"其他","m":"Electrochemiluminescence immunoassay, ECLIA, (電子化學冷光免疫分析法)","rv":"≧30ng/mL；\n檢驗報告備註說明：\n(1) Vitamin D deficiency, ≦20 ng/mL、\n(2) Vitamin D insufficiency 21~29 ng/mL。","i":"定量血清中Total 25-OH Vitamin D(D2及D3)，協助臨床診斷Vitamin D缺乏。","cl":"Vitamin D為脂溶性固醇類荷爾蒙之前驅物，主要由皮膚經日光照射後製造或經由特定食物中獲取如蛋黃、魚油等，在肝臟經由水解作用轉換為具生理功能之活化型\n25 dihydroxyvitamin D(25-OH vitamin D)，因此測定血漿中之Vitamin D total為評估Vitamin D營養狀況之最佳檢驗標記。\nVitamin D主要有2種型態：D3(cholecalciferol)及D2(ergocalciferol)，Vitamin D3主要由皮膚將7-dehydrocholesterol經日光照射後製造而得，食物中之主要來源為鮭魚及青花魚；Vitamin D2較易由食物中之蔬菜及酵母菌中獲得。人體血漿中Vitamin D3及D2皆與vitamin D-binding protein結合，運送至肝臟後水解轉換成25-OH vitamin D，因此人體中vitamin D之儲存型式即為人體中vitamin D狀況循環中vitamin D之生物活性約為25-OH vitamin D的1000倍，25-OH vitamin D的半衰期約2~3週。血清中95%以上可被測量到之vitamin D是vitamin D3(25-OH)，然而vitamin D2(25-OH)只有攝取補充劑時才可能達到可測量濃度，vitamin D2(25-OH)一般認為不是那麼有效。\nVitamin D是健康骨骼所必需的物質。在兒童中，嚴重缺乏導致骨畸形，被稱為佝僂病；中度缺乏被認為會降低飲食中鈣之利用。Vitamin D缺乏會導致肌肉無力，因此在老年人，vitamin D於肌肉之功能效用與跌倒風險有關。Vitamin D缺乏可造成次發性副甲狀腺機能亢進，PTH值上升特是在年齡較大之族群可能造成軟化、骨骼代謝增加、骨質疏鬆、降低骨質密度及增加骨折機率。因此低vitamin D(25-OH)濃度、骨密度降低及結合其他臨床數據，可作為評估骨代謝的一種輔助具。到目前為止，已被證明維生素D影響200種以上不同的表現基因，缺乏已被證實與糖尿病、癌症、心血管疾病、自身免疫性疾病和先天免疫系統疾病相關。","tags":["糖尿病","甲狀腺","腫瘤標記","自體免疫","荷爾蒙/內分泌"]},{"n":"5-HIAA ( 24 hr urine)","c":"FENHIA","p":"09056B(200點)","r":"否","ct":"21號10 mL尖底管","d":"10 mL尿液；最少採檢量5 mL。","g":"生化免疫組","t":"其他","m":"液相層析法(High Performance Liquid Chromatography，HPLC)、ECD還原氧化電化學法","rv":"2.00~8.00 mg/day","i":"以HPLC液相層析法(High Performance Liquid Chromatography)定量尿液中5-HIAA，協助Carcinoid腫瘤，出血，栓塞，坐骨神經肌肉劇痛之診斷。","cl":"5-HIAA為Serotonin代謝產物，診斷類癌瘤(嗜銀細胞瘤 ，內分泌細胞瘤，Carcinoid)。類癌瘤可於多處發病，但以腸道最多。","tags":["腫瘤標記"]},{"n":"α1-antitrypsin","c":"FBITRY","p":"12041B(275點)","r":"否","ct":"02-黃頭管(Serum separator t","d":"2 mL全血；血清/血漿量最少須0.5 mL","g":"生化免疫組","t":"其他","m":"散射比濁法(Nephelometry)","rv":"90.00-200.00 mg/dL","i":"以免疫散射比濁法(immunonephelometry)定量血清中α1-Antitrypsin濃度","cl":"α1-antitrypsin主要功能在於保護體液成份，讓正在被處理掉的老舊細胞不要釋出蛋白質分解酵素。α1-antitrypsin是一種專門抑制絲胺酸蛋白?的蛋白?抑制劑。α1-antitrypsin缺乏症通常與遺傳因素有關。明顯的臨床表徵，特別是與肝臟和肺臟有關的疾病，通常在α1-antitrypsin濃度降至正常值的30-40%以下才會出現。兒童主要發生肝臟疾病，而成人主要發生肺臟疾病。成年吸菸者罹患同合子遺傳性α1-抗胰蛋白?缺乏症而引發呼吸困難或肺氣腫的年齡，比吸菸者提早20年。因遺傳性α1-抗胰蛋白?缺乏症而造成肝病之病人的血清濃度有時是正常的，原因是肝實質發炎急性期反應。大多數α1-抗胰蛋白?升高的原因並非遺傳缺陷，而是感染和發炎的急性期反應，此時濃度會上升為正常值的3倍。懷孕或服用口服避孕藥後，數值也會上升。用來篩檢肺氣腫、肝臟疾病的高危險群，亦即先天性缺乏此一蛋白質的個案。也可以用來觀察非特異性的反應：發炎、感染、與壞死。α1-antitrypsin上升於膽管癌、肝炎、hyaline membrane、感染、發炎、新生贅瘤、SLE、潰瘍性結腸炎。下降於先天性α1-antitrypsin缺乏，肺氣腫，慢性肝臟疾病，以及新生兒暫時性的不足。","tags":["肝臟/膽道"]},{"n":"β-hydroxybutyrate (β-Ketone)","c":"FRCKET","p":"09137B(150點)","r":"否","ct":"9號3 mL綠頭管(Lithium Heparin","d":"全血0.5 mL","g":"生化免疫組","t":"其他","m":"電極法(Electrode)","rv":"< 0.6 mmol/L","i":"定量血液中-hydroxybutyrate (-Ketone)，評估追蹤糖尿病酮酸中毒(DKA)之程度，適於血糖高於250 mg/dL時監測。","cl":"當血糖高於250 mg/dL時，建議監測血酮含量。本檢驗僅提供評估糖尿病相關之酮酸中毒程度(degree of ketoacidosis)，不可用於酮酸中毒之診斷(≧3 mmol/L)。新生兒及血容積比超出65%或低於20%者不可使用。\n空腹期間、劇烈運動過後或因患有糖尿病，該值可能會升高。\n若病人嚴重脫水或嚴重低血壓、處於休克或高血糖高滲透壓時，測試結果可能會低估。","tags":["糖尿病","電解質/代謝"]},{"n":"β2-microglobulin","c":"FSIBMG","p":"27051B(360點)","r":"是","ct":"02號黃頭管(Serum separator tu","d":"全血3.5 mL","g":"生化免疫組","t":"3天","m":"免疫比濁法(Immunoturbidimetric assay), BECKMAN COULTER AU system","rv":"0.86~1.84 mg/L(Adults)","i":"定量血清中β2-microglobulin濃度，協助腎絲球功能下降之腎臟疾病及活動性類風濕性關節炎之診斷。","cl":"β2-microglobulin會出現於正常人的血清及尿液中，其易通過腎絲球膜，並於近端腎小管再吸收及分解，故若近端腎小管功能異常會導致尿液中β2-microglobulin濃度增加，血清中β2-microglobulin濃度可作為腎絲球過濾率指標，特別是幼童族群，尿液中β2-microglobulin濃度增加代表腎小管受損。而血清中β2-microglobulin濃度與其合成、清除釋放及代謝之速率有關，所以其濃度於發炎疾病(如類風濕性關節炎、SLE、等自體免疫性疾病)及淋巴球增生疾病(如多發性骨髓瘤、β細胞骨髓瘤及慢性淋巴性白血病)，經常有升高之情形，因合成速率增加。\n極高的血清β2-microglobulin濃度在透析病人可導致β2微球蛋白澱粉樣變性。\n感染HIV患者的β2-microglobulin濃度可能會增加。","tags":["腎臟","貧血/血液疾病","自體免疫"]},{"n":"β2-microglobulin (Urine)","c":"FSIBMU","p":"27051B(360點)","r":"是","ct":"66號白頭塑膠管","d":"尿液5 mL","g":"生化免疫組","t":"2天","m":"比濁法(turbidimetric methods), Optilite.","rv":"≦0.202 mg/L","i":"定量尿液中β2-microglobulin濃度，協助multiple myloma、lymphatic neoplasia、活躍性類風濕性關節炎和腎臟疾病診斷及治療追蹤。","cl":"β2-microglobulin會出現於正常人的血清及尿液中，其易通過腎絲球膜，並於近端腎小管再吸收及分解，故若近端腎小管功能異常會導致尿液中β2-microglobulin濃度增加，血清中β2-microglobulin濃度可作為腎絲球過濾率指標，特別是幼童族群，尿液中β2-microglobulin濃度增加代表腎小管受損。而血清中β2-microglobulin濃度與其合成、清除釋放及代謝之速率有關，所以其濃度於發炎疾病(如類風濕性關節炎、SLE、等自體免疫性疾病)及淋巴球增生疾病(如多發性骨髓瘤、β細胞骨髓瘤及慢性淋巴性白血病)，因合成速率增加，而有升高之情形。在腎小管間質失調的病患有顯著增加的情況。","tags":["腎臟","貧血/血液疾病","自體免疫"]},{"n":"特殊抗原檢測","c":"FBBSBG","p":"11008B(300)","r":"否","ct":"07號 6 mL紫頭管(K2 EDTA tube)","d":"紫頭管6 mL","g":"血庫組","t":"其他","m":"依不同抗原選用以下方法：1.立即離心法2.間接抗球蛋白試驗3.手工凝聚胺試驗","rv":"該項目不適用","i":"懷疑存在或潛在的抗體引起的下列狀況時，可執行此項檢驗\n(1)ABO discrepancy\n(2)抗體鑑定患者紅血球抗原確認(E、C、e、c、M、N、Lea、Leb、S、s、JKa、JKb、Fyb、Dia、Mia)\n(3)含紅血球血品抗原排除","cl":"紅血球表面各種血型抗原表現","tags":["其他"]},{"n":"17-OHCS (24 hr urine)","c":"FENOHC","p":"09054B(200點)","r":"否","ct":"21號10 mL尖底管。","d":"15 mL；最少採檢量須10 mL。","g":"生化免疫組","t":"其他","m":"Column and colorimetrics , Biosystems","rv":"Males：3.00~10.00 mg/day；Females：2.00~8.00 mg/day. \n0-1歲：0.50-1.00 mg/day，12歲以下：1.00-4.50 mg/day.","i":"定量24小時尿液中17-OHCS濃度，評估腎上腺皮質功能。","cl":"使用於評估腎上腺皮質功能，腎上腺皮質糖類固醇上昇於疾病急性期及庫辛氏症候群，多毛症，肥胖，嚴重高血壓。 \n 下降於功能不全或酵素缺損如Addison’s disease、hypopituitarism、congenital adrenal hyperplasia。 一些處方用藥，會上升或者下降檢驗數據，採檢前3天請停藥。 可以使用血清cortisol或尿液free cortisol取代檢驗，敏感度及特異性更好。","tags":["荷爾蒙/內分泌"]},{"n":"17-Ketosteroids (17- KS) (24 hr urine)","c":"FENKS","p":"09053B(270點)","r":"否","ct":"21號-10 mL尖底管；得用35號50 mL無","d":"15 mL尿液；最少採檢量須10 mL。","g":"生化免疫組","t":"其他","m":"Column and Colorimetric, Biosystems","rv":"Male：10.00~25.00 mg/day；Female：6.00~14.00 mg/day；\n0~10歲：0.10~3.00 mg/day；11-14歲：2.00~7.00 mg/day","i":"定量24小時尿液中17-KS濃度，評估腎上腺及睪丸產生類固醇之功能。","cl":"17-KS檢測可作為腎上腺及睪丸產生類固醇之評估。在初步的實驗結果顯示，尿液中17-KS與血液中DHEA-S相關性良好，17-KS易受情緒及藥物影響，而DHEA-S為直接反應腎上腺或性腺的製造。17-KS上升於相關腫瘤或功能亢進，如adrenal carcinoma，adrenal tumor of ovary，granulosa、lutein、theca cell tumor of ovary，可能上升於interstitial cell tumor of testes，Cushing’ syndrome、先天性副腎酵素缺乏症、睪丸腫瘤、甲狀腺功能亢進；17-KS下降低於Addison症、續發性副腎皮質機能低下症、急性副腎功能不全、性腺功能低下症、腦下垂體前葉機能低下症、神經性食慾不振症、Turner syndrome、Klinefelter syndrome。","tags":["腎臟","甲狀腺","腫瘤標記","荷爾蒙/內分泌"]},{"n":"17-OH progesterone (17-OHP)","c":"FENOHP","p":"27057B (260點)","r":"否","ct":"02號黃頭管(Serum separator tu","d":"2 mL全血","g":"生化免疫組","t":"其他","m":"放射免疫分析法(RIA)","rv":"(1)男性：0.55~1.99 ng/mL；\n(2)女性：\n濾泡期_0.21~1.45 ng/mL, \n黃體期_0.61~2.88 ng/mL, \n排卵前期_0.55~2.01 ng/mL, \n避孕期_0.18~1.47 ng/mL, \n停經期_0.16~0.79 ng/mL, \n懷孕第一孕期_0.93-3.82 ng/mL, \n懷孕第二孕期_1.23-3.70 ng/mL； \n(3)兒童族群：\n  6-23個月_0.14~2.35 ng/mL, \n2-11歲(男)_0.14~1.41 ng/mL, \n12-15歲(男)_0.32~2.10 ng/mL, \n2-9歲(女)_0.19~1.63 ng/mL, \n10-15歲(女)_0.42~2.64 ng/mL.","i":"定量血清中17α-OH Progesterone協助診斷21-hydroxylase deficiency及治療先天性腎上腺增生、多毛症、不孕症。","cl":"(1)17α-hydroxy Progesterone17-氫氧基黃體素是類固醇荷爾蒙，主要是由腎上腺所分泌，而卵巢、睪丸、胎盤也少量分泌。血液循環中之17α-OH Progesterone如同Cortisol，早上的血中濃度較下午的血中濃度為高，因此抽血時，必須有一致性的抽血時間。在女性生理週期的黃體期及懷孕之婦女，17α-OH progesterone 與Progesterone相同有上昇的現象。\n(2)它的檢測可用於診斷及治療先天性腎上腺增生、多毛症、不孕症。先天性腎上腺增生病人，由於體內缺乏17α-氫氧基酵素(17α-hydroxylase)，造成無法合成Cortisol，對腦下腺負回饋的結果，增加ACTH 分泌，導致醛固酮大量合成，形成腎上腺增生症狀。21α-氫氧基酵素(21α- hydroxylase)的缺乏，使得合成過多的睪固酮，造成女性男性化、快速的骨骼成長、及男童青春期提早的假象。它的檢測也可以使用於新生兒的先天性腎上腺增生的篩檢。","tags":["荷爾蒙/內分泌"]},{"n":"Ammonia","c":"FRCAMM","p":"09037C(200點)","r":"是","ct":"14號珍珠白蓋頭管(K2EDTA)","d":"全血3.5 mL","g":"生化免疫組","t":"急診可","m":"酵素反應法(Enzymatic Glutamate Dehydrogenase)","rv":"31~123 μg/dL","i":"協助臨床診斷肝臟疾病，肝性腦病變(Hepatic encephalopathy)、肝硬化、末期之肝昏迷、肝衰竭、急慢性肝壞死及Reye’s syndrome。嬰兒之高血氨可協助診斷Urea cycle代謝異常。","cl":"氨來自於氨基酸的分解代謝和腸道細菌對膳食蛋白質的分解作用，它在肝細胞中轉換為尿素，變為非毒性物質。在正常情況下，循環系統中的氨濃度很低，一般低於50 μmol/L(85 μg/dL)。有研究表明，過量的氨會對中樞神經系統產生毒性作用，臨床表現通常為神經系統紊亂。\n氨濃度升高可能是由於：(i)先天性代謝缺陷，或者(ii)其他病症的繼發症狀。先天性代謝缺陷是嬰兒氨濃度升高的主要原因，通常是尿素循環的?缺乏所致。影響二元氨基酸(賴氨酸和鳥氨酸)代謝和涉及有機酸代謝的遺傳性疾病也可能導致循環系統氨濃度升高。在嚴重肝衰竭時也可能會出現氨濃度升 高，比如在雷氏綜合症、病毒性肝炎或肝硬化的情況下。","tags":["肝臟/膽道"]},{"n":"Amphetamines Screening","c":"FDPAMP, FRDAMP,FDPAMPA","p":"10810B(250點)","r":"是","ct":"66號白頭塑膠管(2支)","d":"3.0 mL尿液(白頭塑膠管五分滿)","g":"生化免疫組","t":"急診可","m":"同質性的酵素免疫法分析(Homogenous enzyme immunoassay method)","rv":"Negative","i":"定性測定尿液中是否存在Amphetamines (cutoff為500 ng/mL)，協助臨床診斷及治療Amphetamines濫用。","cl":"最常見的安非他命包括了d-amphetamine(d-安非他命)，d,l-amphetamine(d,l-安非他命)和d-methamphetamine(d-甲基安非他命)。尿液檢體所含的安非他命、甲基安非他命及其代謝產物的濃度在500.0 ng/mL或以上(cutoff)，便會被報告為疑似陽性。安非他命類藥物(安非他命和甲基安非他命)是中央神經系統興奮劑，在化學上和藥理上都和人體的兒茶酚胺(天然存在的腎上腺素及正腎上腺素)相關。安非他命類藥物透過中央神經系統的興奮作用可增加清醒性及抑制食慾，同時會有增加能量、自信心、滿足、興奮和快感。心血管的影響為血壓升高和心律不整。在口服安非他命類藥物後，會迅速地由胃被吸收，並且很快進入血液。安非他命作為中央神經系統興奮劑，其作用包括睡不著、厭食、失眠、興奮、震顫及提高運動神經的活躍度。甲基安非他命部分會代謝為安非他命。安非他命是由ephedrine(麻黃素)所合成而來。在醫療行為上，安非他命通常用來治療麻醉分析法(於輕麻醉之下，進行精神分析)、外因性肥胖以及孩童的注意力不足症。由於它會造成情緒上揚的特性，因此造成全球性的濫用，特別是工業界。當攝取安非他命之後，它會快速的被腸胃吸收並且在體內持續作用4~24小時。在口服3小時後可在尿液中檢測出安非他命。尿道排泄物是酸鹼度依賴性，它會在酸性的酸鹼度下被增強。\n「安非他命」藥物包含很多種藥物，如d-amphetamine、d-methamphetamine(N-methyl derivative of amphetamine)、d,l-amphetamine、methylenedioxyamphetamine (MDA)、methylenedioxymethamphetamine (MDMA)。一般常用來偵測生物體液中含有安非他命的方法，包括液相層析、氣液層析儀、螢光檢測法和酵素免疫分析法。雖然其他種藥物濫用可能以GC/MS以外的檢測法作為確認方式，但一般而言GC/MS可作為所有藥物的確認方式，因為其結果的可信度最高。","tags":["藥物/毒物監測"]},{"n":"Anti-CMV IgG","c":"FVPCMV, FOTCMV","p":"14004B(240點)","r":"是","ct":"02號黃頭管(Serum separator tu","d":"全血3 mL","g":"生化免疫組","t":"2天","m":"化學冷光免疫分析法(chemiluminescence immunoassay, CLIA)","rv":"Negative","i":"協助判斷個體對巨細胞病毒之免疫狀態","cl":"人類巨細胞病毒（hCMV）是皰疹病毒科的一員，為人類致病性皰疹病毒的其中一種。它無所不在，並通過密切的人類接觸傳播。具有DNA核心，病毒外殼是二十面體且由162個衣殼形成。\nhCMV感染可以是原發性或繼發性。初次感染可以通過不同的傳播途徑和在不同的生命週期（即先天性和出生後感染）。在初次感染後，hCMV進入潛伏期，在此期間可在B淋巴細胞中發現病毒。隨著病毒複製（二次感染）的再活化可伴隨宿主和病毒之間的關係的變化而發生，例如懷孕，嚴重疾病，免疫抑制治療或壓力。\n即使孕婦已使用針對hCMV的抗體，經胎盤或生產時的先天性感染也可能會發生。如果血清陰性的婦女在懷孕期間初次感染hCMV，會造成流產、死胎或新生兒畸形的後遺症。先天性hCMV感染的臨床症狀是嚴重的，包括精神運動性延遲，耳聾，視網膜脈絡膜炎，小頭症，腦積水，心臟病，肝炎，肝脾腫大，血小板減少，其死亡率相當高。\n對hCMV的免疫反應包含在感染後幾週IgM類抗體的生成，之後IgG類抗體的也會合成。IgM抗體對hCMV通常會在幾周內增加，然後在四至六個月內逐漸降低。IgM有時也會存在體內多年。\n特異性IgM測定有助於診斷急性hCMV感染，其仍然難以從單獨的症狀中被識別。在免疫不全的患者體內，病毒的再活化可能誘導IgM合成，故並非皆可以依此區分初次或二次感染。特異性IgG的測定可以用於區分是否曾經感染該疾病，這對於在高風險個體中採取合適的預防是特別重要的。\n測定對hCMV的免疫狀態是相當重要的，包含：（a）在免疫功能低下的患者中，此疾病可能具有嚴重的後果；（b）在年輕的適合生育年齡的女性或孕婦，以避免病毒傳播到胎兒；（c）在器官移植受體和捐助者和（d）捐血者。\n檢測病人hCMV的IgM，臨床可根據需要施用足夠的治療。可通過施用高病毒力價的特異性免疫球蛋白製劑來預防hCMV的感染。此外，可以用特定的抗病毒劑治療明顯症狀。","tags":["肝臟/膽道","貧血/血液疾病","移植/免疫"]},{"n":"Anti-CMV IgM","c":"FVPCMM, FOTCMM","p":"14048B(700點)","r":"是","ct":"02號黃頭管(Serum separator tu","d":"全血3 mL","g":"生化免疫組","t":"2天","m":"化學冷光免疫分析法(chemiluminescence immunoassay, CLIA)","rv":"Negative","i":"協助判斷個體是否為急性或近期巨細胞病毒感染。","cl":"人類巨細胞病毒(hCMV)是皰疹病毒科的一員，為人類致病性皰疹病毒的其中一種。它無所不在，並通過密切的人類接觸傳播。具有DNA核心，病毒外殼是二十面體且由162個衣殼形成。\nhCMV感染可以是原發性或繼發性。初次感染可以通過不同的傳播途徑和在不同的生命週期(即先天性和出生後感染)。在初次感染後，hCMV進入潛伏期，在此期間可在B淋巴細胞中發現病毒。隨著病毒複製(二次感染)的再活化可伴隨宿主和病毒之間的關係的變化而發生，例如懷孕，嚴重疾病，免疫抑制治療或壓力。\n即使孕婦已使用針對hCMV的抗體，經胎盤或生產時的先天性感染也可能會發生。如果血清陰性的婦女在懷孕期間初次感染hCMV，會造成流產、死胎或新生兒畸形的後遺症。先天性hCMV感染的臨床症狀是嚴重的，包括精神運動性延遲，耳聾，視網膜脈絡膜炎，小頭症，腦積水，心臟病，肝炎，肝脾腫大，血小板減少，其死亡率相當高。\n對hCMV的免疫反應包含在感染後幾週IgM抗體類抗體的生成，之後IgG類抗體的也會合成。IgM抗體對hCMV通常會在幾周內增加，然後在四至六個月內逐漸降低。IgM抗體有時也會存在體內多年。\n特異性IgM抗體測定有助於診斷急性hCMV感染，其仍然難以從單獨的症狀中被識別。在免疫不全的患者體內，病毒的再活化可能誘導IgM合成，故並非皆可以依此區分初次或二次感染。特異性IgG的測定可以用於區分是否曾經感染該疾病，這對於在高風險個體中採取合適的預防是特別重要的\n測定對hCMV的免疫狀態是相當重要的，包含：(a)在免疫功能低下的患者中，此疾病可能具有嚴重的後果；(b)在年輕的適合生育年齡的女性或孕婦，以避免病毒傳播到胎兒；(c)在器官移植受體和捐助者和(d)捐血者。\n檢測病人hCMV的IgM抗體，臨床可根據需要施用足夠的治療。可通過施用高病毒力價的特異性免疫球蛋白製劑來預防hCMV的感染。此外，可以用特定的抗病毒劑治療明顯症狀。","tags":["肝臟/膽道","感染/敗血症","貧血/血液疾病","移植/免疫"]},{"n":"Anti-Sm, Anti-RNP (可抽出的核抗體- Sm/RNP) Anti -SSA, Anti-SSB (可抽出的核抗體- SSA/SSB) Anti-Scl-70 Ab (可抽出的核抗體- Scl-70) Anti-Jo-1 Ab (可抽出的核抗體- Jo-1) Anti-centromere B Ab (抗centromere B抗體) Anti-Ribosomal P IgG (抗Ribosomal P抗體)","c":"FSIEN1 FSIEN2 FSIEN3 FSIJO1 FSICEN FSIRIB","p":"12173B(561點) 12064B(561點) 12174B(507點) 12154B(600點) 12156B(600點) 自費(Anti-centromere B Ab)","r":"是","ct":"03號綠頭(Lithium heparin)管","d":"全血3.5 mL","g":"生化免疫組","t":"3天","m":"螢光酵素免疫分析法(Fluorescence enzyme immunoassay, FEIA)","rv":"(1) Anti-Sm：Negative (＜7 EliA U/mL)；\n(2) Anti-RNP：Negative(＜5 EliA U/mL).","i":"定量血清中Anti-Sm及Anti-RNP，協助各種自體免疫疾病之診斷。","cl":"ANA抗核抗體篩檢試劑可偵測血清或血漿中具臨床相關性的循環自體抗體，這些自體抗體可協助診斷全身性自體免疫疾病，例如：系統性紅斑狼瘡、混和性結締組織疾病、未分化型結締組織疾病(UCTD)、修格連氏症候群、硬皮症（系統性硬化症, SSc）、皮肌炎、多發性肌炎(Polymyositis, PM)、類風濕性關節炎(RA)、CREST症候群與雷諾氏症候群。\n(1)Anti-RNP Ab：anti-ribonucleoprotein，陽性發生於混合性結締組織病(MCTD)，其他如Scleroderma、SLE的病人也可能出現陽性數據，但MCTD的病人RNP抗體常為高效價。\n(2)Anti-Sm Ab：約1/3 SLE的病人為陽性反應，部份關節炎及雷諾氏症候群也可能出現陽性反應。因為Sm抗原與RNP抗原形成spliceosome，當Anti-Sm Ab呈現陽性時，Anti-RNP常常也是陽性反應。","tags":["自體免疫"]},{"n":"BK viral load-Blood (BK病毒量(血液適用)), BK viral load-Urine (BK病毒量(尿液適用))","c":"FVPBKV(血液), FVPBKV1(尿液)","p":"12184C (2000點)","r":"是","ct":"(A)\t血液：#14_珍珠白蓋管(K2EDTA t","d":"(A)\t血液：3 mL(可分離血漿至少1 mL)\r\n(B)\t","g":"微生物組","t":"其他","m":"Real-time PCR，Abbott Alinity m","rv":"Not detected","i":"臨床懷疑BK virus感染，特別是腎臟移植族群及血液細胞移植患者出現出血性膀胱炎(Hematopoietic cell transplant (HCT) patient with hemorrhagic cystitis)。","cl":"人類BK病毒(BKV)為乳頭多瘤空泡病毒科多瘤病毒家族的一種亞型，是1971年自腎臟移植病人身上分離出來，genome sequence 與JCV及SV40分別有75%及70%之homology。人類受BKV感染大都無明顯症狀，或只是輕微呼吸道症狀及發燒，經初次感染後病毒會散布到腎臟及泌尿道中隱藏，約80%的人都曾經感染過並以潛伏狀態存在於體內；在腎臟及多重器官移植之病人易造成嚴重之腎功能障礙。BKV多藉由呼吸道為傳染途徑，也可藉由尿液傳染，在某些腎臟移植病人，因使用免疫抑制藥物造成BKV之再刺激活化與複製，形成所謂Polyomavirus相關性腎病(Polyomavirus-associated nephropathy, PVAN)，約有10%-50％之腎臟移植病人會發生PVAN，其中40%-60%會造成移植失敗；在骨髓移植病人身上也有出現ureteral stenosis(輸尿管狹窄)及interstitial nephritis (間質性腎炎)之報導。\n本檢測項目可偵測BK病毒在血液及尿液內之病毒量，主要可用來做PVAN之鑑別診斷，或用來監控PVAN病人對藥物治療之效果。根據2005年國際會議之共識，在腎移植後2年內每3個月一次，或是移植失敗時都建議要偵測BK在尿液內之病毒量，以提供臨床醫師對於監控腎移植患者BKV感染之參考，進而對病患給予適當醫療處置。\nAlinity m BKV 不適用於血液、血液製品或人類細胞、組織以及細胞和組織產品的篩檢。","tags":["腎臟","移植/免疫"]},{"n":"Blood culture identification panel- Gram-negative bacteria (血液革蘭氏陰性菌鑑定及抗藥基因檢測) Blood culture identification panel- Gram-positive bacteria/yeast (血液革蘭氏陽性菌/酵母菌鑑定及抗藥基因檢測)","c":"FVPBCGN (革蘭氏陰性菌) FVPBCGP (革蘭氏陽性菌/酵母菌)","p":"12182Cx7 (7000點)","r":"否","ct":"#31-1-需氧培養血瓶(藍)、#31-2-厭氧","d":"陽性血瓶培養液0.5 mL","g":"微生物組","t":"其他","m":"Nested multiplex PCR (巢式多重聚合?鏈反應)","rv":"Not detected","i":"血液培養陽性，即早協助診斷引起菌血症之特定微生物及提供抗藥基因檢測檢果。\n(2)       可偵測的病原如下：\n(A)     革蘭氏陰性菌：A.calcoaecticus-baumannii complex、B.fragilis、Enterobacterales、E.cloacae complex、E.coli、K.aerogenes、K.oxytoca、K.pneumoniae group、Proteus spp.、Salmonella spp.、S.marcescens、H.influenzae、N.meningitidis (encapsulated)、P.aeruginosa、S.maltophilia\n(B)      革蘭氏陽性菌：E.faecalis、E.faecium、L.monocytogenes、Staphylococcus spp.、S.aureus、S.epidermidis、S.lugdunensis、Streptococcus spp.、S.agalactiae、S.pneumoniae、S.pyogenes\n(C)      酵母菌：C.albicans、C.auris、C.glabrata、C.krusei、C.parapsilosis、C.tropicalis、C.neoformans/gattii\n(D)     抗藥基因：CTX-M、IMP、KPC、mcr-1、mecA/C、mecA/C and MREJ (MRSA)、NDM、OXA-48-like、vanA/B、VIM","cl":"辨識血液培養中的(多種)微生物，再加上特定微生物的抗生素抗性基因狀態相關資訊，有助於醫師做出適當的治療決定。","tags":["感染/敗血症"]},{"n":"Cardiac CRP(hsCRP) (心臟型C反應蛋白, 高敏感度C反應蛋白)","c":"FBICCRP, FRCCCRP","p":"12015C(275點)","r":"是","ct":"03號綠頭管(Lithium Heparin)。","d":"全血3.5 mL","g":"生化免疫組","t":"急診可","m":"免疫比濁法(Immunoturbidimetric assay)","rv":"Recommended Cardiac risk assessment categories: Low risk＜0.10 mg/dL; Average risk 0.10~0.30 mg/dL; High risk＞0.30 mg/dL.","i":"定量人體血液中低濃度C反應蛋白(CRP)的濃度，協助心血管疾病風險評估。","cl":"C-反應蛋白(C reactive protein, CRP)是一種急性期反應蛋白，一般血液中CRP濃度檢測可協助評估感染、組織損傷、炎症性疾病和相關疾病，若使用更低偵測極限之高敏感度CRP(high sensitive CRP, hs-CRP)，可協助評估心血管疾病風險，因此又被稱為Cardiac CRP (心臟型C反應蛋白)，可作為穩定型冠脈疾病或急性冠脈綜合症復發病人之預後評估的獨立標記。\n健康成人的典型CRP濃度(依據個體會有差異)為<0.1 mg/dL，在無症狀病人CRP值稍高時，可能增加冠狀動脈心臟疾病的風險；住院病人CRP濃度>0.3 mg /dL時，預測可能發生心肌梗塞風險。依據平均CRP濃度所建議的相對風險分級：<0.1 mg/dL屬低風險、平均風險0.1~0.3 mg/dL、高風險>0.3 mg/dL。對於心臟風險分析，必須搭配其他心臟疾病的專一性檢驗，例如總膽固醇、高密度脂蛋白膽固醇(HDL)和低密度脂蛋白膽固醇(LDL)。當使用hs-CRP於心血管風險評估時，若CRP濃度>1.0 mg/dL，則應評估是否其他非心血管因素造成，因此當病人有感染、全身發炎症狀或創傷跡象時，不應利用hs-CRP檢測結果進行任何心血管風險評估。 \n美國心臟協會(American Heart Association, AHA)建議，對於沒有感染或急性疾病的病人以hs-CRP評估心血管風險時，最好間隔兩週重複檢測hs-CRP，計算其平均值濃度。除了cardiac Troponin外，hsCRP被認為是第IIa型急性冠狀動脈綜合症之生物標記之一；建議評估心血管風險時應合併其他檢驗(如LDL-c、Triglycerides、Apo B等)或其他檢查結果，一併評估。","tags":["心臟/心血管"]},{"n":"CRP (Acute phase reactant) (急性期C-反應性蛋白試驗)","c":"FBICRPN, FRCCRPN","p":"12015C (275點)","r":"是","ct":"03號綠頭管(Lithium Heparin)。","d":"全血3.5 mL","g":"生化免疫組","t":"急診可","m":"免疫比濁法(Immunoturbidimetric assay)","rv":"<1.0 mg/dL；\n參考值備註：\n1.0~5.0 mg/dL表示有輕度發炎情形，5.0~10.0 mg/dL表示有較嚴重的發炎情形，>10.0 mg/dL表示應該有嚴重細菌感染的情形。","i":"定量人體血液中C反應蛋白的濃度，協助感染、發炎性疾病之診斷","cl":"C-反應蛋白(CRP)是最敏感的急性期反應物之一，檢測血液中CRP可以有效偵測和評估感染、發炎、組織損傷和其他相關疾病，在嚴重感染或主要組織損傷的急性反應期間，血液中CRP濃度可升高10000~50000倍，通常在48小時內達到峰值。CRP濃度增加並不具有特異性，可能因其他發炎症而使得非特異性升高，因此需結合其他臨床病史及相關檢查結果一起解釋。CRP濃度不可單獨使用在早期停止抗生素治療的依據。\n在對新生兒若每隔24小時可獲得兩個低的CRP濃度，則細菌感染的可能性非常低。因此，CRP乳膠試劑是早產兒和新生兒感染的早期診斷的一個有價值的工具。亦可用於抗生素治療與有效性的評估，但是，CRP值不能單獨用作為提早終止抗生素治療的依據。","tags":["其他"]},{"n":"Gastrointestinal panel – Adult (腸胃道病原體多標的核酸檢測-成人)；Gastrointestinal panel – Child (腸胃道病原體多標的核酸檢測-兒童)","c":"FVPGIA (成人)；FVPGIC (兒童)","p":"12182C*7+12183C (8200點；成人)；12182C*4+12183C*3 (7600點；兒童)","r":"是","ct":"#77立寶糞便採檢瓶","d":"(A)固態糞便：約花生米大小\r\n(B)液態糞便：至少5 mL","g":"微生物組","t":"其他","m":"Nested multiplex PCR (巢式多重聚合酵素鏈反應)","rv":"Not detected","i":"協助診斷引起腸胃道疾病的特定微生物，但無法作為診斷與治療的唯一依據。陽性結果無法排除共同感染的可能性，可能同時感染了本項目檢測病原以外的其他病原。陰性結果也不排除腸胃道的感染，可能是受到本項目無法偵測的病原感染，或者是發炎的原因並非感染，例如：潰瘍性結腸炎、大腸激躁症或克隆氏症。\n本檢驗利用巢式多重聚合?鏈反應檢測有腸胃道感染徵兆/或症狀的糞便檢體，可同時檢測鑑定多種細菌、寄生蟲和病毒，包括:\n(1)細菌\n(A)Campylobacter (C. jejuni/C. coli/C. upsaliensis)\n(B)Clostridioides difficile (C. difficile) toxin A/B\n(C)Plesiomonas shigelloides\n(D)Salmonella\n(E)Vibrio (V. parahaemolyticus/V. vulnificus/V. cholerae), including specific identification of Vibrio cholera\n(F)Yersinia enterocolitica\n(G)Enteroaggregative Escherichia coli (EAEC)\n(H)Enteropathogenic Escherichia coli(EPEC)\n(I)Enterotoxigenic Escherichia coli(ETEC) lt/st\n(J)Shiga-like toxin-producing Escherichia coli (STEC) stx1/stx2 (including specific identification of theE. coli O157 serogroup within STEC)\n(K)Shigella/ Enteroinvasive Escherichia coli(EIEC)\n(2)寄生蟲\n(A)Cryptosporidium\n(B)Cyclospora cayetanensis\n(C)Entamoeba histolytica\n(D)Giardia lamblia (also known as G. intestinalis and G. duodenalis)\n(3)病毒\n(A)Adenovirus F 40/41\n(B)Astrovirus\n(C)Norovirus GI/GII\n(D)Rotavirus A\n(E)Sapovirus (Genogroups I, II, IV, and V)","cl":"(1)隨著食物安全、公共衛生和醫療的進步，感染性腸胃炎仍是工業化國家所有年齡層人口的重大問題。在全球各地，感染性腹瀉疾病對於5歲以下兒童有明顯的發病率和死亡率，兒童腹瀉也可能導致營養失調、增加其他感染的易感性，以及可能造成生長及智力發展遲緩。\n(2)並非表現型認定為EAEC的所有菌株都具有pAA質體，也不是所有pAA質體都帶有aggR和attR基因，因此檢驗方法無法完全檢測出所有EAEC，但可偵測出大多數的致病性菌株(含造成歐洲大流行的E.coli O104:H4)。\n(3)當STEC stx1/stx2及EIEC為陽性結果時，表示檢體中可能含有Shigella dysenteriae。\n(4)過去8周無症狀，而有症狀時Clostridioides difficile結果為陽性時，視為新的案例。\n(5)如在有症狀的2-8周內，複驗Clostridioides difficile結果仍為陽性時，視為復發。\n(6)Clostridioides difficile陽性且住院天數大於3天者，才可視為院內感染。","tags":["其他"]},{"n":"GDM (Gestational diabetes mellitus) Test","c":"FBIGDM、FBIOGS、FBIOGS2、FBIOGS3、 FBIGTT、FBIGTT2、FBIGTT3、FBIGTT4","p":"09005C(50點)","r":"是","ct":"03號綠頭管(Lithium Heparin)，得","d":"全血2.0 mL","g":"生化免疫組","t":"24小時","m":"Hexokinase-UV/NAD (End reaction)","rv":"(1)50公克葡萄糖刺激試驗：＜140 mg/dL；\n(2)懷孕葡萄糖耐受性試驗Gestational OGTT (75 g, 0’、60’、120’)：0分鐘＜92 mg/dL，60分鐘＜180 mg/dL，120分鐘＜153 mg/dL。\n(3)懷孕葡萄糖耐受性試驗Gestational OGTT (100 g, 0’、60’、120’、180’)：0分鐘＜95 mg/dL，60分鐘＜180 mg/dL，120分鐘＜155 mg/dL，180分鐘＜140 mg/dL。","i":"定量血液葡萄糖濃度，協助妊娠糖尿病之診斷。","cl":"妊娠期糖尿病(gestational diabetes mellitus, GDM)指懷孕前無糖尿病，而在懷孕期間(尤其在孕晚期)出現高血糖的形情。一般於懷孕24~28週進行妊娠期糖尿病篩檢。\n美國糖尿病學會(ADA)對GDM診斷建議兩種方式：一為one-step，進行75 g葡萄糖耐受性試驗；二為two-step，先進行50 g葡萄糖刺激試驗，若口服葡萄糖後60分鐘血中葡萄糖濃度高於140 mg/dL，需再進行100 g葡萄糖耐受性試驗。","tags":["糖尿病"]},{"n":"HCV genotyping(C型肝炎病毒核糖核酸基因型)","c":"FVPHCG、 FVPHCGR(C肝治療計畫專用)、FVPHCGS (搭配C肝抗體篩檢使用)","p":"12202C (2450點)","r":"否","ct":"14-珍珠白蓋管(K2EDTA)","d":"5 mL","g":"微生物組","t":"2天","m":"Real-time PCR","rv":"不適用","i":"用來分析感染病患的檢體中C型肝炎病毒之亞型。非用於C型肝炎病毒篩檢，或是作為確認C型肝炎病毒感染的診斷依據。","cl":"(1)C型肝炎病毒是一種含外套膜之單股RNA病毒，基因約由9500個核甘酸組成。在全世界，它已經被鑑定為輸血後的主要非A和非B的傳染病源。基於遺傳學的相似性，C型肝炎病毒被分類為6種主要基因型(Type 1～6)以及許多亞型。\n(2)由於得知C型肝炎病毒基因型，可預測感染HCV病患對於干擾素/雷巴威林(Interferon/ribavirin)混合治療的反應，在啟動結合治療以前，建議作C型肝炎病毒基因分型，使病患能接受到最適當的治療。\n(3)C型肝炎分型檢驗試劑套組使用RT-PCR的方法，使用基因型特異的螢光標幟之寡核?酸探針來偵測1、2、3、4、5和6基因型，以及1a和1b亞型。在台灣主要是以1b型較常見。其中基因型1為毒性較強者，建議治療期間為一年，治癒率只有約30%。基因型2及3毒性較弱，建議治療期間為半年，可達到80%以上的治癒率。","tags":["肝臟/膽道","感染/敗血症","輸血/血型","肝炎病毒"]},{"n":"HCV viral load","c":"FVPHCA、FVPHCVR( C肝治療計畫專用)、FVPHCAZ (生物製劑廠商補助專用)、FVPHCAS (C肝篩檢專用)","p":"12185C(2229點)","r":"是","ct":"14.珍珠白蓋管(K2EDTA tube)","d":"5 mL","g":"微生物組","t":"其他","m":"Real-time PCR","rv":"Not detected","i":"提供HCV感染相關病情變化及療效追蹤，不適合作為診斷HCV感染狀態使用。","cl":"Abbott的設計是用以幫助正在進行抗病毒藥劑治療的HCV患者之追蹤。其檢驗方法非用於提供者之血液、血漿、血清、或組織之HCV病毒篩檢，或是作為確認HCV感染之診斷依據。","tags":["其他"]},{"n":"HIV-1 viral load, HIV-1 viral load (衛生局委託專用)","c":"FVPHVL, FVPHVL1","p":"14074C(4000點);自費4000元","r":"是","ct":"14.珍珠白蓋管(K2EDTA tube)","d":"血液：5mL","g":"微生物組","t":"其他","m":"Real-time PCR","rv":"Not detected","i":"提供HIV-1感染相關病情變化及療效追蹤，不適合作為篩檢或確認HIV-1感染之診斷依據。","cl":"(1)\t人類免疫不全病毒( Human Immunodeficiency Virus, HIV)是後天性免疫不全症候群(Acquired Immunodeficiency Syndrome, AIDS)的致病原。急性HIV的症狀特徵為：初始感染後3到5周出現類似感冒症狀，並伴隨著高血液病毒量。症狀開始4到6周內，即可偵測到HIV特異性的免疫反應。抗體陽轉後，周邊血液的病毒量下降，大部分患者進入無症狀期，可達數年的時間。周邊血液HIV病毒的定量檢測可幫助了解HIV感染的發病，並可以作為預後以及管理病患的重要依據。監測血漿中的HIV病毒RNA量(病毒負荷量)，CD4+T細胞數目，以及病人的臨床狀況會用以決定抗病毒治療的開始或是療程改變。抗病毒治療的主要目標在於降低血漿中的病毒量，達到現有病毒量檢測可偵測到的最小值以下。\n(2)\t不建議於使用Lentiviral vectors作為載體之基因治療患者使用此HIV-1 assay進行HIV感染篩檢，造成偽陽性結果。","tags":["其他"]},{"n":"HLA- DR、DQ、DP Typing","c":"FOTHA2(HLA- DR、DQ、DP Typing), FOTHDP(HLA-DP Typing)","p":"HLA-DR、DQ:12177B(2849點)x2，HLA-DP:12182C(1000點)","r":"是","ct":"07 6 mL紫頭管(K2 EDTA tube)","d":"血液（全血）：6 mL","g":"血液及組織相容組","t":"急診可","m":"Reverse SSO（Reverse Sequence Specific Oligonucleotide Probes）","rv":"Not applicable (可參考國人HLA typing Allele Frequency)","i":"器官移植、一等親之間的骨髓移植或親子鑑定","cl":"(1)HLA為位於chromosome 6短臂的許多loci上，衍製成許多不同構造之分子。HLA-A，-B，-C，屬於class I分子；HLA-DR，-DQ，-DP屬於HLA-D，為class II分子。\n(2)HLA typing於臨床主要應用於器官移植，受贈者及捐贈者均需執行HLA typing以期找到最適合的移植配對。此外，HLA也可以應用在親子鑑定上。\n(3)最近更在主動免疫導致疾病上發現種族上的關聯性，可見HLA是多變異性及多樣性（polymorphism）的基因系統，為研究族群關係很好之材料。","tags":["移植/免疫"]},{"n":"Lactate","c":"FRCLAC","p":"09059B(270點)","r":"是","ct":"06號灰頭管，CSF／06號灰頭管","d":"全血2mL／CSF 0.5 mL","g":"生化免疫組","t":"急診可","m":"酵素反應法(Enzymatic method)","rv":"(1)Blood：0.5~2.2 mmol/L；\n(2)CSF (Adult)：1.1~2.4 mmol/L, Neonate: 1.1~6.7 mmol/L, 3~10 days old: 11.1~4.4 mmol/L, ＞10 days old: 1.1~2.8 mmol/L.","i":"定量血漿或腦脊髓液中乳酸的濃度，協助乳酸中毒之診斷及治療","cl":"L-乳酸是無氧糖分解的最終產物。主要是由白色骨骼肌、腦部、皮膚、腎髓質和紅細胞所產生的。乳酸脫氫?(Lactate dehyrdrogenase)會催化丙酮酸(pyruvate)還原至乳酸。\n乳酸中毒(lactic acidosis)有主要兩種臨床症狀：\n1.組織缺氧相關情況，如休克、充血性心臟衰竭、心肌梗塞、失血和肺水腫。\n2.代謝或藥物/毒素相關的疾病。代謝病症的實例包括糖尿病、肝臟疾病和腫瘤。\n先天性代謝性疾病包括I型糖原貯積症(glycogen storage disease)。引起乳酸升高的藥物/毒素包含甲醇，乙醇，腎上腺素和對乙?氨基酚 (Acetaminophen)等。\n腦脊髓液中的L-乳酸水平一般將反應那些在血液/血漿中的L-乳酸。也有報告指出，在細菌性腦膜炎、腦缺氧、缺血和某些先天代謝的缺陷的狀況如丙酮酸脫氫?缺乏症(pyruvate dehydrogenase deficiency)、線粒體肌病(mitochondrial myopathies)和生物素酵素缺乏症(biotinidase deficiency)中發現腦脊髓液中的L-乳酸有增加但血液/血漿中的乳酸量未增加。","tags":["肝臟/膽道","心臟/心血管","糖尿病","腫瘤標記"]},{"n":"MTBC & RIF gene (direct test)(結核菌群和RIF基因(直接檢體檢測))","c":"FVPMTD1, FVPMTD2(消弭原鄉健康不平等計畫)","p":"12184C(2000點), E4011C (180點)","r":"否","ct":"#35_50 mL無菌試管","d":"至少2 mL","g":"微生物組","t":"其他","m":"Real-time PCR","rv":"(1)MTBC DNA：Not detected\n(2)Rif Resistance：Not detected","i":"(1)\t檢測是否含有結核菌群的基因，以及提供Rifampicin抗藥基因檢測。\n(2)\t臨床懷疑結核菌群感染，且尚未接受治療，或是近6個月內接受小於3天的治療","cl":"當MTBC結果為High、Medium、Low、Very low、Trace表示檢體可以檢測到MTBC，且在檢體中MTBC菌量的多寡。而Rif Resistance detected則代表有檢測到Rifampicin抗藥基因的存在。","tags":["結核/呼吸道"]},{"n":"Mycobacterium culture and Acid-fast stain(分枝桿菌培養及抗酸菌染色)","c":"FMITBF FMITBQ (痰液檢體)","p":"13025C抗酸性濃縮抹片染色檢查 (74點)、13026C抗酸菌培養(304點)、13013C抗酸菌鑑定檢查(200點)、13015C抗酸菌藥物敏感性試驗-四種藥物以上(350點)","r":"否","ct":"35號50mL無菌試管","d":"3mL","g":"微生物組","t":"其他","m":"(1)抗酸菌染色：Acid-fast stain\n(2)鑑定：快速抗原檢測(免疫色層分析法)\n(3)藥物感受性試驗：瓊脂比例法","rv":"No growth","i":"診斷疑似分枝桿菌感染","cl":"抗酸菌染色抹片為提供初步篩檢結核菌的方式，因抹片敏感性不佳抹片陰性不代表沒有結核菌存在，需配合培養結果一起做診斷。結核菌為人類絕對致病菌，多感染於肺部，引發浸潤、空洞及結核。非結核分枝桿菌感染也可出現於免疫不全病人，屬伺機性感染。","tags":["結核/呼吸道"]},{"n":"Parasite and ova (MIF stain)(寄生蟲及蟲卵 (MIF染色))、Protozoa (PVA/Trichrome stain)(原蟲 (PVA/Trichrome染色))","c":"FSTPAR (Parasite and ova)、FSTPRO (Protozoa)","p":"07012C(50點；Parasite and ova)、07003C(20點；Protozoa)","r":"否","ct":"(A)Parasite and ova","d":"(A)一般糞便2 g（約一顆帶殼花生大小）\r\n(B)其他檢體","g":"微生物組","t":"3天","m":"(1)MIF (Merthiolate-iodine-formaldehyde)染色或MIF濃縮集卵鏡檢法 \n(2)PVA-Trichrome stain永久染色法\n(3)Cryptosporidium：Modified Acid-fast stain改良抗酸染色法","rv":"Not found","i":"寄生蟲篩檢(不含Malaria)，協助檢測檢體中是否含寄生蟲及蟲卵。如高度懷疑阿米巴原蟲感染者，請增加開立Protozoa。","cl":"(1)鏡檢時發現糞便中有蟲卵時，即代表可能感染該寄生蟲。\n(2)腸道原蟲對人體有致病性者：痢疾阿米巴(Entamoeba histolytica)、梨形鞭毛蟲(Giardia lamblia)、貝氏球蟲(Isospora belli)、隱抱子蟲(Cryptosporidium species)、大腸纖毛蟲(Balantidium coli)等；腸道原蟲對人體無致病性者：大腸阿米巴(Entamoeba coli)、哈氏阿米巴(Entamoeba hartmanni)、微小阿米巴(Endolimax nana)、嗜碘阿米巴(Iodamoeba buetschlii)、雙核阿米巴(Dientamoeba fragilis)、唇形鞭毛蟲(Chilomastix mesnili)等。","tags":["其他"]},{"n":"Uric Acid","c":"FBIURI ,FBIUAU,FBIUAR,FRCUAT","p":"09013C(40點)","r":"是","ct":"3號綠頭管(Lithium Heparin)。","d":"全血3.5 mL ; 尿液3.5mL","g":"生化免疫組","t":"急診可","m":"時間終點比色法(Timed-endpoint method)","rv":"(1)Blood：Female: 2.3~6.6 mg/dL、Male: 4.4~7.6 mg/dL;\n(2)Urine：Urine uric acid to creatinine ratio: 0.25-0.75; \n(3) 24 hr urine: Female:250~750 mg/24 hours、Male: 250~800 mg/24 hours;\n(4)For Rasburicase treatment：Not applicable (for tumor lysis syndrome monitoring).","i":"定量血液或尿液中尿酸的濃度，協助臨床診斷痛風及腎臟相關疾病。","cl":"尿酸的測量是用來診斷或治療一些腎臟和代謝失調所產生的疾病，包括腎臟衰竭，痛風，白血病，牛皮癬，飢餓或其他虛弱症狀，以及病人接受細胞毒性藥物治療等。白血病患者開始化療後，體內會因細胞大量破壞而產生大量uric acid，因此定量血清中uric acid含量可協助腫瘤患者之治療監控。","tags":["腫瘤標記","貧血/血液疾病"]},{"n":"Urine Albumin/creatinine (A/C) ratio","c":"FBIACR, FBIACRA","p":"12111C(275點)、09016C(40點)","r":"是","ct":"66號白頭塑膠管","d":"尿液3 mL，(白頭塑膠管約五分滿)","g":"生化免疫組","t":"其他","m":"Immunoturbidimetric (End method)","rv":"＜30.0 ug/mg creatinine; \n檢驗報告備註：\nNormal: ＜30.0 ug/mg creatinine; \nMicroalbuminuria: 30~300 ug/mg creatinine; \nClinical albuminuria: >300 ug/mg creatinine","i":"定量尿液白蛋白濃度，協助糖尿病腎病變早期之診斷及微蛋白尿之篩檢。","cl":"尿蛋白可區分為兩類：腎小球的(glomerular)及腎小管(tubular)。腎小球蛋白尿(glomerular proteinuria)：是由於腎小球微細血管壁之穿透力改變 , 使大分子物質由腎小球濾出，其中以白蛋白為主要成份，其他如IgG, IgA亦會不正常升高；若超過腎小管對這些分子的再吸收能力。\n腎病的早期臨床證據是尿液中出現濃度較低但異常（> 30 mg/day或 20 μg/min）的白蛋白，尿白蛋白中度增高的患者被指患有早期腎病。傳統的蛋白尿定性試驗（化學試條或試紙）並不能檢測出腎病早期階段中尿白蛋白排泄量的輕微增加。因此使用了針對尿白蛋白中度增高的檢測，尿白蛋白中度增高定義為3次尿液採集中有 2 次白蛋白排泄率介於30～300 mg/24h之間。\n尿白蛋白流失增加被認為是糖尿病受試者腎功能惡化的一個重要臨床指標，定期篩檢尿白蛋白流失對於監測 1 型和 2 型糖尿病非常重要。前瞻性研究已表明尿白蛋白排泄增加會先出現，並可高度預測糖尿病性腎病、終末期腎病、心血管病死亡率以及糖尿病患者的總死亡率。此外，尿白蛋白排泄增加也可用於確定冠狀動脈疾病風險增加的非糖尿病受試者群體。","tags":["腎臟","心臟/心血管","糖尿病"]},{"n":"VRE isolation、CRAB isolation、CRKP isolation、CREC isolation、CRPA isolation","c":"FMIVRE、FMICRAB、FMICRKP、FMICREC、 FMICRPA","p":"13007C、13023C (共500點)","r":"是","ct":"close）、表淺開放性膿瘍（Abscess, s","d":"(A)膿瘍：膿瘍檢體量多且可抽取時：1 mL以上；其他檢體量","g":"微生物組","t":"其他","m":"(1)菌名鑑定：VITEK MS微生物鑑定質譜儀、VITEK 2自動分析儀\n(2)藥物敏感性試驗： VITEK 2自動分析儀、瓊脂紙錠擴散試驗","rv":"Not isolated","i":"監測帶菌者治療成效或者帶菌者篩檢請依院內感染管制規範或者感染科醫師建議執行","cl":"鑑定是否含有特定抗藥性菌株的存在","tags":["其他"]},{"n":"Neonatal Screen(21 tests) 新生兒篩檢(21項)、2nd Neonatal Screen(21 tests) 新生兒篩檢複檢(21項)","c":"初檢：FIENST/FIE002，複檢：FIENSTR/FIE002","p":"初檢：患者自費350元+處理費用220元；複檢：檢驗自費0元+處理費用220元","r":"否","ct":"73號 新生兒篩檢專用濾紙","d":"篩檢濾紙6小格；採檢時不可使用碘酒消毒","g":"臨床服務組","t":"其他","m":"(1)苯酮尿症(PKU)、高胱胺酸尿症(HCU)、楓漿尿症(MSUD)、中鏈醯輔酵素A去氫酵素缺乏症(MCAD)、戊二酸血症第一型(GAI)、異戊酸血症(IVA)、甲基丙二酸血症(MMA)、瓜胺酸血症第一型(CIT I)、瓜胺酸血症第二型(CIT II)、3羥基3甲基戊二酸尿症(HMG)、全羧化酵素合成酵素缺乏症(HCSD)、丙酸血症(PA)、原發性肉鹼缺乏症(PCD)、肉鹼棕櫚醯基轉移酵素缺乏症第一型(CPT I)、肉鹼棕櫚醯基轉移酵素缺乏症第二型(CPT II)、極長鏈醯輔酵素Α去氫酵素缺乏症(VLCAD)、戊二酸血症第二型(GA II)：Tandem Mass串聯質譜儀\n(2)半乳糖血症(GAL)：酵素反應螢光定量法\n(3)先天性甲狀腺低能症(TSH)：酵素免疫分析法\n(4)葡萄糖六磷酸鹽去氫酵素缺乏症(G6PD)：酵素活性螢光分析法\n(5)先天性腎上腺增生症(CAH)：Time-resolved FIA(時差式螢光免疫分析法)","rv":"(1)葡萄糖六磷酸鹽去氫酵素缺乏症(G6PD)：無異常\n(2)先天性甲狀腺低能症(TSH)：無異常\n(3)先天性腎上腺增生症(CAH)：無異常\n(4)半乳糖血症(GAL)：無異常\n(5)苯酮尿症(PKU)：無異常\n(6)高胱胺酸尿症(HCU)：無異常\n(7)楓漿尿症(MSUD)\n楓漿尿症(Leucine) ：無異常\n楓漿尿症(Valine) ：無異常\n(8)中鏈醯輔酵素A去氫酵素缺乏症(MCAD)\n中鏈醯輔酵素A去氫酵素缺乏症(C6) ：無異常\n中鏈醯輔酵素A去氫酵素缺乏症(C8) ：無異常\n中鏈醯輔酵素A去氫酵素缺乏症(C10) ：無異常\n(9)戊二酸血症第一型(GAI)：無異常\n(10)異戊酸血症(IVA)：無異常\n(11)甲基丙二酸血症(MMA)\n甲基丙二酸血症(C3)：無異常\n甲基丙二酸血症(C3/C2)：無異常\n(12)瓜胺酸血症第一型(CIT I)：無異常\n(13)瓜胺酸血症第二型(CIT II)：無異常\n(14)3羥基3甲基戊二酸尿症(HMG)：無異常\n(15)全羧化酵素合成酵素缺乏症(HCSD)：無異常\n(16)丙酸血症(PA)：無異常\n(17)原發性肉鹼缺乏症(PCD)：無異常\n(18)肉鹼棕櫚醯基轉移酵素缺乏症第一型(CPT I)：無異常\n(19)肉鹼棕櫚醯基轉移酵素缺乏症第二型(CPT II)\n肉鹼棕櫚醯基轉移酵素缺乏症第二型(C16)：無異常\n肉鹼棕櫚醯基轉移酵素缺乏症第二型(C18)：無異常\n肉鹼棕櫚醯基轉移酵素缺乏症第二型(C18:1)：無異常\n(20)極長鏈醯輔酵素Α去氫酵素缺乏症(VLCAD)\n極長鏈醯輔酵素Α去氫酵素缺乏症(C14)：無異常\n極長鏈醯輔酵素Α去氫酵素缺乏症(C14:1)：無異常\n(21)戊二酸血症第二型(GA II)\n戊二酸血症第二型(C4)：無異常\n戊二酸血症第二型(C5)：無異常\n戊二酸血症第二型(C5DC)：無異常\n戊二酸血症第二型(C8)：無異常\n戊二酸血症第二型(C12)：無異常\n戊二酸血症第二型(C14)：無異常\n戊二酸血症第二型(C16)：無異常\n戊二酸血症第二型(Score)：無異常","i":"幫助新生兒早期發現先天性代謝異常疾病，早期接受妥善治療，減少疾病造成身體或智能上的損害。","cl":"(1)葡萄糖六磷酸鹽去氫酵素缺乏症（G-6-P-D缺乏症，俗稱蠶豆症）：最常見的一種遺傳性疾病，即紅血球內葡萄糖新陳代謝異常的疾病，此種患者在出生時亦發生「核黃疸」而造成智能障礙。\n(2)先天性甲狀腺低能症(TSH)：體內缺乏甲狀腺荷爾蒙，會嚴重影響腦及體格發育。\n(3)先天性腎上腺增生症(CAH)：因21-OH酵素缺乏，造成鹽分流失、低血鈉、高血鉀、嘔吐、體重不增、死亡等現象。\n(4)半乳糖血症(GAL)：無法將乳糖正常代謝，餵奶後發生嘔吐昏睡，造成眼、肝、腦的損害。\n(5)苯酮尿症(PKU)：無法將苯丙胺酸(phenylalanine)代謝成酪胺酸 (Tyrosine)，造成腦部傷害及嚴重的智力障礙。\n(6)高胱胺酸尿症(HCU)：無法有效利用食物中之蛋白質，會導致嚴重智能不足或死亡。\n(7)楓漿尿症(MSUD)：支鏈胺基酸代謝異常，使得支鏈胺基酸（擷胺酸、白胺酸、異白胺酸）代謝無法進行順利。\n(8)中鏈醯輔酵素A去氫酵素缺乏症(MCAD)：缺乏酵素使得脂肪代謝無法順利進行，對大腦和神經系統造成傷害。\n(9)戊二酸血症第一型(GAI)：缺乏此酵素無法正常分解離胺酸及色胺酸，造成漸進的神經症狀及急性的代謝異常。\n(10)異戊酸血症(IVA)：異戊酸過量堆積進而侵犯神經與造血系統。\n(11)甲基丙二酸血症(MMA)：甲基丙二酸輔酵素A變位酵素功能異常或鈷胺素代謝異常，導致有機酸蓄積造成神經系統損害。\n(12)瓜胺酸血症第一型(CIT I)、瓜胺酸血症第二型(CIT II)：因瓜胺酸(Citrulline)無法被正常代謝所引起。瓜胺酸是尿素循環中的一個胺基酸。瓜胺酸代謝不良導致連鎖循環功能障礙而引發高血氨。臨床表現可分新生兒型及成人型兩種，我們都曾遇到過。新生兒型患者發病時呈現高血氨昏迷，可能因診斷時間過晚，救治不及而死亡。成人型則屬再發性高血氨症。\n(13)3羥基3甲基戊二酸尿症(HMG)：此疾病起因為體內3-羥基-3-甲基戊二醯輔酵素裂解酵素 ( 3-Hydroxy-3-Methylglutaryl CoA Lyase ) 活性缺乏，造成白胺酸 ( Leucine ) 代謝的機制發生障礙 ，有的患者在2-5天內發病，大都在3-11個月時發病，發病症狀包括:嘔吐、盜汗、四肢無力、臉色蒼白、昏睡或昏迷的現象發生。當攝食蛋白質後，會導致患者體內的有機酸不斷堆積而造成酸中毒、血氨值上升等現象。如果未及早診斷，並給予藥物治療與飲食控制，患者最後將因酸中毒與血氨過高而導致智障或死亡。此外，此症患者因無法製造酮體 ( Ketone Body )，因而有可能發生低血糖現象，若無法及時補充葡萄糖，將可能導致死亡。\n(14)全羧化酵素合成酵素缺乏症(HCSD)：因為體內某一群酵素仰賴Biotin才能作用，無法有效地運用維他命。發病時間通常在出生後數個月，新生兒若有此疾病時，會出現餵食困難、呼吸問題、皮膚紅疹、禿頭、昏睡等症狀。及時的治療與供給Biotin可以避免併發症的發生，倘若沒有治療，可能會導致發育生長遲緩、昏迷的情況發生，嚴重的話可能會致死。\n(15)丙酸血症(PA)：丙酸血症是蛋白質分解途徑障礙所引起的症病，患者會有進食不良、嘔吐、呼吸急促、昏迷等症狀，血液分析則呈現重度酸血症，可伴隨高血氨症發生。 丙酸血症是有機酸血症中較嚴重的一型、通常發病時間很早，若不能及時診斷常常很快會死亡，因此國內還沒有長期存活的例子。\n(16)(16)\t原發性肉鹼缺乏症(PCD)：由於缺乏細胞膜上的肉鹼運輸裝置(carnitine transporter)，導致肉鹼由尿中流失，造成體內肉鹼缺乏。當細胞內的肉鹼缺乏，將使得長鏈脂肪酸進入粒線體的步驟出問題，因此沒有足夠的長鏈脂肪酸進行β-氧化作用與產生能量，也無法提供足夠的酮體供腦部使用。因此，患者通常會有三方面會受到影響：(1)心肌：造成漸進性的心肌病變，此亦為最常表現的病變；(2)中樞神經系統：因低酮體性低血糖，造成腦神經病變；(3)肌肉骨骼系統：造成肌肉病變。若患者為新生兒，多以低酮體性低血糖表現；若患者為較大兒童，則多以骨骼及心肌病變表現。\n(17)肉鹼棕櫚醯基轉移酵素缺乏症第一型(CPT I)：由於CPT基因變異導致長鏈脂肪酸無法分解產生能量造成低血糖低酮酸血症(hypoketotichypoglycemia)、抽搐、昏迷、肝腫大、中樞神經受損或甚至是死亡。晚發型CPT2缺乏者有運動不耐、肌肉疼痛、間歇性橫紋肌溶解症\n(18)(18)\t極長鏈醯輔酵素Α去氫酵素缺乏症(VLCAD)：國內發生率尚在評估中，歐美地區約4萬到12萬的新生兒有一個。因為負責分解極長鏈脂肪酸的酵素缺乏，身體無法將脂肪分解轉成能量供細胞使用。症狀通常在幼兒時期晚期和青少年時期，造成患者有低酮性低血糖、肌肉衰弱、肝臟和心臟病變等症狀，嚴重的話甚至會有致命性的可能。目前飲食控制是相當重要的，以少量多餐避免飢餓為原則，並限制長鏈脂肪酸的攝取和補充肉鹼。及早診斷治療，以減少對患者的傷害。\n(19)(19)\t戊二酸血症第二型(GA II)：第二型戊二酸尿症(GAII)是非常罕見的遺傳疾病，屬於體染色體隱性遺傳，是指父母都是帶原者，各帶有一份有缺陷的基因，當兩個缺陷基因結合在一起就會生出患病的新生兒，這樣父母的新生兒有25%患病機率，父母可以透過特殊的產前檢查及早知道他們未出生的小孩是否患病。","tags":["肝臟/膽道","甲狀腺","電解質/代謝","荷爾蒙/內分泌"]},{"n":"Neonatal Screen(Lysosomal Storage Disease)新生兒篩檢(溶小體儲積症)、2nd Neonatal Screen(Lysosomal Storage Disease)新生兒篩檢複檢(溶小體儲積症)","c":"初檢：FIELSD/FIE002、複檢：FIELSDR/FIE002","p":"初檢費用600元+處理費用220元, 複檢費用0元+處理費用220元","r":"否","ct":"73號 新生兒篩檢專用濾紙","d":"篩檢濾紙6小格","g":"臨床服務組","t":"其他","m":"Tandem Mass串聯質譜儀","rv":"(1)Acid alpha-glucosidase(GAA)：無異常\n(2)Alpha-galactosidase(α-GLA)：無異常\n(3)Acid beta-glucosidase(ABG)：無異常\n(4)Iduronidase, alpha-L-(IDUA) gene：無異常","i":"幫助新生兒早期發現先天性溶小體儲積症代謝異常疾病(包含龐貝氏症(Pompe Disease，POMPE)、法布瑞氏症(Fabry Disease, FABRY)、高雪氏症(Gaucher Disease, GAUCHER)、黏多醣症 (Mucopolysaccharidosis, MPS) (第Ⅰ型)。","cl":"(1)龐貝氏症(Pompe Disease，POMPE)：是一種溶小體肝醣儲積症，常被稱為肝醣儲積症第二型，在一般情況下，溶小體可以消化、溶解體內廢物，但是龐貝氏症患者因為溶小體缺乏一種酸性麥芽糖酵素，使得進入溶小體的肝醣無法被分解而持續堆積，進而影響細胞的功能。造成龐貝氏症的原因，在於肝醣不能轉化葡萄糖而無法產生能量，進而導致患者四肢無力，因而又稱為「軟寶寶」，並有呼吸困難和心臟衰竭的症狀；患者看起來舌頭突出，心臟肥大。\n(2)法布瑞氏症(Fabry Disease, FABRY)：由於負責製造α-半乳糖?酵素(α-galactosidase , α-GAL)酵素的基因缺陷，導致一些脂質，尤其是globotriaosylceramide (GL-3)無法被代謝，堆積在全身許多細胞內的溶小體(lysosome)中。由於本病的基因位於X染色體上，因此對男性的影響會較大（因為男性只有一個X染色體，女性則有二個X染色體）。GL-3堆積於血管內皮細胞上時，容易傷害到週邊神經，此外還會造成心臟、腎臟、腦血管病變。法布瑞氏症造成之周邊神經病變，會引起四肢劇烈疼痛，為此患者還曾自以為是患了「痛痛病」。傳統臨床症狀，多在兒童或青少年時期出現，腳部或手部有間歇性疼痛或感覺異常，病人有時會描述痛起來像是「燒灼」的感覺，持續時間從數分鐘到幾天都有，有時會重複性出現，通常在溫度較高或季節變化時病發，也有許多人是在運動或上完體育課後嚴重疼痛。\n(3)高雪氏症(Gaucher Disease, GAUCHER)：是一種溶小體肝醣儲積症，在一般情況下，溶小體可以消化、溶解體內廢物，但是高雪氏症患者因為溶小體缺乏一種葡萄糖腦?脂酵素(glucocerebrosidase)，使得進入溶小體的葡萄糖腦?脂(glucosylceramide)無法被分解而持續堆積，逐漸堆積在骨髓細胞及各器官進而影響到器官的功能，有的患者會堆積在腦部或神經系統，患者一般會有肝脾腫大、貧血、出血傾向及骨骼發育障礙等症狀。高雪氏症患者症狀可分為三型 最常見是第一型。第一型症狀有肝脾腫大、骨骼變形、貧血、血小板缺乏、出血傾向，但不會波及中樞神經系統。第二型又稱急性神經元病變型，大多在嬰兒期會出現症狀，病程迅速惡化而夭折。第三型又稱慢性神經元病變型，約在兩歲之後發病，症狀以脾臟腫大及肌陣攣性抽筋為主，之後智能慢慢退化，並慢慢失去運動能力，有時合併骨骼與肺部侵犯。\n(4)黏多醣症(Mucopolysaccharidosis，MPS)：是一種先天性代謝異常疾病，其致病的原因是病患身體內缺乏能將黏多醣分解的某一種酵素，導致黏多醣分子逐漸堆積在細胞中無法代謝，進而傷害到許多器官的功能。黏多醣症目前可分為七種類型，由於致病基因不同，因此疾病嚴重程度與預後亦不相同。此疾病的遺傳模式大多為體染色體隱性遺傳，只有黏多醣症第二型屬於性連隱性遺傳。黏多醣症病患，甚至有智能障礙或過動的傾向。大多數在出生時並無明顯異狀，但隨著黏多醣的日漸累積，病患的皮膚、骨骼、關節、角膜、氣管與大腦等部位開始出現異常，並逐漸表現特殊的外觀與各種症狀。外觀上的改變包括:濃眉、鼻樑塌陷、嘴唇厚實、臉部多毛、頭顱變大、爪狀手、短下肢、膝內翻、身材矮小等。其他身體症狀尚有：關節變形僵硬、肝脾腫大、肚臍或腹股溝疝氣、眼角膜混濁。","tags":["貧血/血液疾病","凝血/血栓"]},{"n":"Neonatal Screen(MPS+MPS4A +ALD)新生兒篩檢(黏多醣症第二型、第六型及第四A型+腎上腺腦白質失養症)、2nd Neonatal Screen(MPS+MPS4A+ ALD)新生兒篩檢複檢(黏多醣症第二型、第六型及第四A型+腎上腺腦白質失養症)","c":"初檢(FIEMPA/FIE002)、複檢(FIEMPAR/FIE002)","p":"初檢費用300元+處理費用220元, 複檢費用0元+處理費用220元","r":"否","ct":"73號 新生兒篩檢專用濾紙","d":"篩檢濾紙6小格","g":"臨床服務組","t":"其他","m":"Tandem Mass串聯質譜儀","rv":"(1)Iduronate-2-sulfatase (ID2S)：無異常\n(2)GALNS gene：無異常\n(3)Arylsulfatase B (ARSB) gene：無異常\n(4)C26LPC：無異常","i":"幫助新生兒早期發現先天性異常疾病-黏多醣症第二型及第六型及第四A型、腎上腺腦白質失養症異常疾病","cl":"(1)黏多醣症(Mucopolysaccharidosis，MPS)：是一種先天性代謝異常疾病，其致病的原因是患者身體內缺乏能將黏多醣分解的某一種酵素，導致黏多醣分子逐漸堆積在細胞中無法代謝，進而傷害到許多器官的功能。黏多醣症目前可分為七種類型，由於致病基因不同，因此疾病嚴重程度與預後亦不相同。此疾病的遺傳模式大多為體染色體隱性遺傳，只有黏多醣症第二型屬於性連隱性遺傳。黏多醣症第二型是台灣及亞洲地區最常見的類型，其致病的基因位於X染色體上，因此本型的病患通常為男性，對女性而言較無影響。黏多醣症患者，甚至有智能障礙或過動的傾向。大多數在出生時並無明顯異狀，但隨著黏多醣的日漸累積，病患的皮膚、骨骼、關節、角膜、氣管與大腦等部位開始出現異常，並逐漸表現特殊的外觀與各種症狀。外觀上的改變包括:濃眉、鼻樑塌陷、嘴唇厚實、臉部多毛、頭顱變大、爪狀手、短下肢、膝內翻、身材矮小等。其他身體症狀尚有：關節變形僵硬、肝脾腫大、肚臍或腹股溝疝氣、眼角膜混濁。\n(2)(2)\t腎上腺腦白質失養症(Adrenoleukodystrophy，ALD)是由於X染色體長臂Xq28位置ABCD1 (ATP-binding cassette, sub-family D)基因上的缺損，導致患者細胞中的過氧化小體(peroxisome)異常，無法代謝非常長鏈飽和性脂肪酸(very long-chain fatty acids; VLCFA)，特別是C24、C26，因此會使體內非常長鏈脂肪酸異常堆積而沈積在大腦白質和腎上腺皮質，進而侵害腦神經系統的髓鞘質(Myelin)，妨礙神經傳導。這是一種性聯隱性遺傳疾病，百分之八十五是由女性帶因，而母親帶因傳給下一代的機率；女兒有1/2的機率成為與母親情況相同的致病基因的帶因者，兒子也有1/2的機會遺傳到致病基因，但不同的是--兒子的X染色體帶有此致病基因就會發病。ALD的發生率約為兩萬至五萬分之一。ALD可能在不同年齡發病，典型的兒童大腦型(Childhood Cerebral Form; 約佔所有ALD患者的35-40%)，此型通常在4至8歲發病，之後語言及其他自主能力會逐漸喪失，於診斷後一、二年內成為植物人狀態，通常會在診斷後數年內死亡。而成年型則可能於10到21歲發病。因髓鞘質損傷所導致的神經退化症狀，患者是以中樞神經發展遲滯退化最明顯，臨床表徵相當多樣化，初期症狀為注意力不集中、個性退縮、記憶減退、功課退步、活動過度。隨著病程進展，則會有步伐不穩、漸進性痴呆、認知性聽覺喪失、失明、吞嚥困難、失聲、癲癇、昏迷。","tags":["荷爾蒙/內分泌"]},{"n":"Severe combined immunodeficiency (SCID) screening嚴重複合型免疫缺乏症篩檢及複檢(SCID)","c":"初檢：FIESCI；複檢：FIESCIR","p":"初檢費用SCID 250元；複檢費用0元","r":"否","ct":"73號 新生兒篩檢專用濾紙","d":"篩檢濾紙6小格","g":"臨床服務組","t":"其他","m":"嚴重複合型免疫缺乏症：EnLiteTM Neonatal TREC(Real-Time PCR)","rv":"無異常","i":"幫助新生兒早期發現是否罹患嚴重複合型免疫缺乏症，並提供患童及早診斷與治療的機會。","cl":"嚴重複合型免疫缺乏症(SCID)：為一群罕見的先天性遺傳疾病，為免疫系統中T細胞的數目低下或功能缺陷所引起的免疫缺陷疾病。患者因為缺乏免疫功能而導致細菌、病毒及黴菌的嚴重重複性感染，亦會以慢性腹瀉或生長遲緩來表現，若未加以治療，多數會在出生後一年內死亡。病人因不能和外界接觸，需生活於無菌艙中，因此又稱為泡泡寶寶。","tags":["其他"]}];
const TAGS=["肝臟/膽道", "腎臟", "心臟/心血管", "糖尿病", "甲狀腺", "感染/敗血症", "腫瘤標記", "貧血/血液疾病", "自體免疫", "藥物/毒物監測", "電解質/代謝", "輸血/血型", "結核/呼吸道", "肝炎病毒", "荷爾蒙/內分泌", "過敏", "凝血/血栓", "移植/免疫"];
const ICONS={"肝臟/膽道": "🫀", "腎臟": "🫘", "心臟/心血管": "❤️", "糖尿病": "🩸", "甲狀腺": "🦋", "感染/敗血症": "🦠", "腫瘤標記": "🔬", "貧血/血液疾病": "💉", "自體免疫": "🛡️", "藥物/毒物監測": "💊", "電解質/代謝": "⚗️", "輸血/血型": "🩸", "結核/呼吸道": "🫁", "肝炎病毒": "🧬", "荷爾蒙/內分泌": "⚖️", "過敏": "🌿", "凝血/血栓": "🩺", "移植/免疫": "🏥"};
let activeTags=new Set(),sortBy='rel',pg=0;
const PS=24;
const tagCounts={};
TAGS.forEach(t=>{tagCounts[t]=ALL.filter(d=>d.tags&&d.tags.includes(t)).length;});
const tb=document.getElementById('tagbar');
TAGS.forEach(t=>{
  const el=document.createElement('span');
  el.className='tag';
  el.innerHTML=`${ICONS[t]||''} ${t} <span class="cnt">${tagCounts[t]}</span>`;
  el.onclick=()=>toggleTag(t,el);
  el.id='tag-'+t;
  tb.appendChild(el);
});
function toggleTag(t,el){
  if(activeTags.has(t)){activeTags.delete(t);el.classList.remove('on');}
  else{activeTags.add(t);el.classList.add('on');}
  pg=0;render();
}
function clearAll(){
  document.getElementById('q').value='';
  activeTags.forEach(t=>document.getElementById('tag-'+t)?.classList.remove('on'));
  activeTags.clear();pg=0;render();
}
function onSearch(){pg=0;render();}
function setSortBy(s){
  sortBy=s;
  document.getElementById('sb-rel').classList.toggle('on',s==='rel');
  document.getElementById('sb-name').classList.toggle('on',s==='name');
  pg=0;render();
}
function score(d,q){
  if(!q)return 1;
  let s=0;const lq=q.toLowerCase();
  if(d.n.toLowerCase().includes(lq))s+=6;
  if(d.c.toLowerCase().includes(lq))s+=3;
  if((d.i||'').includes(q))s+=5;
  if((d.cl||'').includes(q))s+=4;
  if((d.m||'').includes(q))s+=1;
  return s;
}
function hi(s,q){
  if(!q)return s;
  try{
    const safe=q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    return s.replace(new RegExp(safe,'gi'),m=>`<mark style="background:#FFF3CD;border-radius:2px">${m}</mark>`);
  }catch(e){return s;}
}
function render(){
  const q=(document.getElementById('q').value||'').trim();
  let fil=ALL.filter(d=>{
    if(activeTags.size&&!d.tags?.some(t=>activeTags.has(t)))return false;
    if(!q)return true;
    return score(d,q)>0;
  });
  if(sortBy==='rel'&&q)fil.sort((a,b)=>score(b,q)-score(a,q));
  else fil.sort((a,b)=>a.n.localeCompare(b.n,'zh-TW'));
  const total=fil.length;
  document.getElementById('sc').textContent=total;
  document.getElementById('rc').textContent=total?`找到 ${total} 項`:'';
  const slice=fil.slice(pg*PS,(pg+1)*PS);
  const el=document.getElementById('cards');
  if(!slice.length){
    el.innerHTML='<div class="no-result">沒有符合的檢驗項目<br><span style="font-size:12px">請嘗試其他關鍵詞</span></div>';
    document.getElementById('pg').innerHTML='';return;
  }
  el.innerHTML=slice.map(d=>{
    const tagsHtml=(d.tags||[]).slice(0,3).map(t=>`<span class="ctag">${t}</span>`).join('');
    const rangeShort=d.rv?d.rv.replace(/\r\n|\n/g,' ').substring(0,60)+(d.rv.length>60?'…':''):'';
    const ind=d.i?hi(esc(d.i.substring(0,100))+(d.i.length>100?'…':''),q):'';
    const mng=d.cl?`<div class="card-meaning">${hi(esc(d.cl.substring(0,80))+(d.cl.length>80?'…':''),q)}</div>`:'';
    return `<div class="card" onclick="showDetail(${ALL.indexOf(d)})">
      <div class="card-name">${hi(esc(d.n),q)}</div>
      ${ind?`<div class="card-indication">${ind}</div>`:''}
      ${mng}
      <div class="card-tags">${tagsHtml}</div>
      ${rangeShort?`<div class="card-range">參考值：${rangeShort}</div>`:''}
    </div>`;
  }).join('');
  renderPg(total);
  window._fil=fil;
}
function renderPg(total){
  const tot=Math.ceil(total/PS);
  if(tot<=1){document.getElementById('pg').innerHTML='';return;}
  let h=`<span class="pg-info">第${pg*PS+1}–${Math.min((pg+1)*PS,total)}筆，共${total}筆</span>`;
  h+=`<button onclick="goPg(${pg-1})" ${!pg?'disabled':''}>‹</button>`;
  const s=Math.max(0,pg-2),e=Math.min(tot-1,pg+2);
  for(let i=s;i<=e;i++)h+=`<button onclick="goPg(${i})" class="${i===pg?'cur':''}">${i+1}</button>`;
  h+=`<button onclick="goPg(${pg+1})" ${pg===tot-1?'disabled':''}>›</button>`;
  document.getElementById('pg').innerHTML=h;
}
function goPg(p){pg=p;render();window.scrollTo(0,0);}
function showDetail(idx){
  const d=ALL[idx];if(!d)return;
  document.getElementById('mn').textContent=d.n;
  document.getElementById('mc').textContent=`健保碼：${d.p||'—'}`;
  let html='';
  if(d.rv){
    const rv=d.rv.replace(/\r\n|\r/g,'\n');
    html+=`<div class="range-box"><div class="range-label">⚖ 生物參考區間</div><div class="range-val">${esc(rv)}</div></div>`;
  }
  html+=`<div class="meta-grid">
    <div class="meta-item"><div class="meta-label">採檢容器</div><div class="meta-value">${esc(d.ct)||'—'}</div></div>
    <div class="meta-item"><div class="meta-label">採檢量</div><div class="meta-value">${esc(d.d)||'—'}</div></div>
    <div class="meta-item"><div class="meta-label">報告時效</div><div class="meta-value">${esc(d.t)}</div></div>
    <div class="meta-item"><div class="meta-label">檢驗方法</div><div class="meta-value">${esc(d.m)||'—'}</div></div>
  </div>`;
  if(d.i)html+=`<div class="section"><div class="section-title">適應症</div><div class="section-content">${esc(d.i.replace(/\r\n|\r/g,'\n'))}</div></div>`;
  if(d.cl)html+=`<div class="section"><div class="section-title">臨床意義</div><div class="section-content">${esc(d.cl.replace(/\r\n|\r/g,'\n'))}</div></div>`;
  document.getElementById('mb').innerHTML=html;
  document.getElementById('ov').classList.add('open');
}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function closeModal(){document.getElementById('ov').classList.remove('open');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
render();
function toggleTheme(){
  const isDark=document.documentElement.getAttribute('data-theme')==='dark';
  document.documentElement.setAttribute('data-theme',isDark?'light':'dark');
  document.getElementById('theme-btn').textContent=isDark?'☀️':'🌙';
  localStorage.setItem('theme',isDark?'light':'dark');
}
(function(){
  const saved=localStorage.getItem('theme');
  if(saved==='dark'){
    document.documentElement.setAttribute('data-theme','dark');
    document.getElementById('theme-btn').textContent='🌙';
  }
})();
</script>
</body>
