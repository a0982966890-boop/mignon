,{"n":"EBV serology","c":"FSIEBV","p":"12065B(180點)+14047B (960點)+12065B(180點)+12059B(80點)","r":"是","ct":"02號黃頭管(Serum separator tu","d":"全血2 mL","g":"生化免疫組","t":"3天","m":"化學冷光免疫分析法(chemiluminescence immunoassay, CLIA)","rv":"Negative","i":"協助診斷EBV相關之infectious mononucleosis","cl":"?利用EBV viral capsid antigen (VCA) p18合成胜?檢測血清中EBV VCA IgG抗體，協助診斷EBV感染。\nEB病毒(EBV)是傳染性單合球增多症的病原體，也與伯氏淋巴瘤(Burkitt’s lymphoma)，鼻咽癌(NPC)和性聯淋巴增生疾病(X-linked lymphoproliferative syndrome)密切相關。EB病毒是一種人類?疹病毒，它分布廣泛，接近95%的成人都被感染過。\nEBV主要傳播途徑為經口傳播。EBV 在口咽上皮細胞內進行複製並從感染的B淋巴細胞中釋放病毒顆粒，從而釋放至唾液中。孩童時期，初次感染EBV通常是無症狀的。絕大多數感染單核球增多症的人都是在青春期至成人期期間感染EBV 的。初次感染後，EBV 可終生潛伏。\n傳染性單核球增多症是基於臨床症狀(通常包括喉嚨痛、發熱、淋巴結病及身體不適)結合血象學表現出的淋巴球增多和血清學表現出的異嗜性抗體或EBV特異性抗體的存在進行診斷。\n許多其他病原體也可引起與傳染性單核球增多症相似的臨床症狀，例如巨細胞病毒、剛地弓形蟲、肝炎病毒、人類免疫缺陷病毒毒及其他病毒。通常直到特異性的病原體確定後才能確診為單核球增多症。\n確診EBV 引起的傳染性單核球增多症通常是利用異嗜性抗體凝集實驗（患者血清與馬或羊紅細胞凝集實驗）的方法，陽性結果確診為感染傳染性單核球增多症。但是當凝集實驗檢測結果為陰性，且患者臨床表現為非典型性症狀時診斷此疾病很困難。\n急性傳染性單核球增多症患者中有10%到20%的成人呈異嗜性抗體凝集實驗檢測為陰性，兒童中的比例甚至更高。對於這類個體患者，傳染性單核球增多症的診斷可以通過EB 病毒的VCA 和EA(D)的特異性抗體檢測的方法進行診斷。檢測VCA IgM 抗體作為急性傳染性單核球增多症的診斷手段。但是，確證診斷也應結合其他相關抗體的檢測 – 例如 EA(D) IgG 或佔優勢的EBNA-1 IgG或EBNA-1 IgM抗體 – 同時結合臨床資訊。血清學異嗜性凝集實驗陰性結果的檢體可通過檢測 EBV VCA IgM 和短期存在的EA(D) IgG 抗體來診斷傳染性單核球增多症。\n由於特定時間可出現特定抗體，因而通過血清學方法診斷EBV 感染是可能的。最初感染EBV 的患者血清中可檢測到VCA IgM，之後IgM抗體逐漸減少到無法檢出的水準。幾乎同時，VCA IgG逐漸增加。大部分(>80%)有症狀的傳染性單核球增多症患者初次檢查時VCA IgG 和IgM 抗體效價都在近峰值處。VCA IgM抗體通常在疾病發作後2到3個月後消失，同時IgG 抗體可在正常人體內終生存在。","tags":["肝臟/膽道","貧血/血液疾病","肝炎病毒"]},{"n":"EBV VCA IgG","c":"FSIEB、FOTEB、FSIEBV","p":"12065B (180點)","r":"是","ct":"02號黃頭管(Serum separator tu","d":"全血2 mL","g":"生化免疫組","t":"急診可","m":"化學冷光免疫分析法(chemiluminescence immunoassay, CLIA)","rv":"Negative","i":"利用EBV viral capsid antigen (VCA) p18合成胜?檢測血清中EBV VCA IgG抗體，協助診斷EBV感染。","cl":"EB病毒(EBV)是傳染性單合球增多症(infectious mononucleosis, IM)的病原體，也與伯氏淋巴瘤(Burkitt’s lymphoma)，鼻?癌(NPC)和性聯淋巴增生疾病(X-linked lymphoproliferative syndrome)密切相關。EB病毒是一種人類?疹病毒，它分布廣泛，接近95%的成人都被感染過。\nEBV主要傳播途徑為經口傳播。EBV在口咽上皮細胞內進行複製並從感染的B淋巴細胞中釋放病毒顆粒，從而釋放至唾液中。孩童時期，初次感染EBV通常是無症狀的。絕大多數感染單核球增多症的人都是在青春期至成人期期間感染EBV的。初次感染後，EBV可終生潛伏。\n傳染性單核球增多症是基於臨床症狀(通常包括喉嚨痛、發熱、淋巴結病及身體不適)結合血液學表現出的淋巴球增多和血清學表現出的異嗜性抗體或EBV特異性抗體的存在進行診斷。\n許多其他病原體也可引起與傳染性單核球增多症相似的臨床症狀，例如巨細胞病毒、剛地弓形蟲、肝炎病毒、人類免疫缺陷病毒毒及其他病毒。通常直到特異性的病原體確定後才能確診為單核球增多症。\n確診EBV引起的傳染性單核球增多症通常是利用異嗜性抗體凝集實驗(患者血清與馬或羊紅細胞凝集實驗)的方法，陽性結果確診為感染傳染性單核球增多症。但是當凝集實驗檢測結果為陰性，且患者臨床表現為非典型性症狀時診斷此疾病很困難。\n急性傳染性單核球增多症患者中有10%到20%的成人呈異嗜性抗體凝集實驗檢測為陰性，兒童中的比例甚至更高。對於這類個體患者，傳染性單核球增多症的診斷可以通過EB病毒的VCA和EA(D)的特異性抗體檢測的方法進行診斷。檢測VCA IgM抗體作為急性傳染性單核球增多症的診斷手段。但是，確證診斷也應結合其他相關抗體的檢測–例如EA(D) IgG或佔優勢的EBNA-1 IgG或EBNA-1 IgM抗體–同時結合臨床資訊。血清學異嗜性凝集實驗陰性結果的檢體可通過檢測 EBV VCA IgM和短期存在的EA(D) IgG抗體來診斷傳染性單核球增多症。\n由於特定時間可出現特定抗體，因而通過血清學方法診斷EBV 感染是可能的。最初感染EBV 的患者血清中可檢測到VCA IgM，之後IgM抗體逐漸減少到無法檢出的水準。幾乎同時，VCA IgG逐漸增加。大部分(> 80%)有症狀的傳染性單核球增多症患者初次檢查時VCA IgG和IgM抗體效價都在近峰值處。VCA IgM 抗體通常在疾病發作後2到3個月後消失，同時IgG抗體可在正常人體內終生存在。\n大部分的患者短時間內出現EA(D)，但是EB病毒核殼抗體IgG(EBNA-1)在疾病發作數周或數月後才會出現並可持續存在數年直至終生。在有症狀的傳染性單核球增多症患者中，檢測EBNA-1 IgG抗體，同時結合檢測 VCA IgM和IgG抗體可判斷出患者是處於急性期或是康復期。EBNA-1 IgG抗體效價的增高預示傳染性單核球增多症患者正處於逐步康復期。\nVCA IgG抗體效價的增高預示患者處於感染的急性期，同時VCA IgM抗體效價的增高可以預示患者處於從最初感染到急性期的進程之中。同樣地，VCA IgM抗體效價的下降可以預示患者處於從急性期到逐步減弱期的進程之中。EBNA IgG 抗體在健康個體的存在預示過往EBV感染；健康個體中存在VCA IgG抗體預示過往感染EBV或輕度初次感染。\n由於宿主與EBV之間作用及臨床表現的複雜性，追蹤EBV抗體組成結構有益於對EBV感染的診斷。各個特異性抗體效價並非都是預示疾病狀態所必需的，但是跟蹤抗體效價具有診斷意義。通過檢測EBV抗原產生的不同抗體可判斷是否輕微初次感染或持續性的隱性EBV感染，或是EBV關聯疾病。","tags":["肝臟/膽道","感染/敗血症","貧血/血液疾病","肝炎病毒"]},{"n":"EBV Viral load（EBV 病毒量）","c":"FVPEBD","p":"12184C(2000點)","r":"是","ct":"14.珍珠白蓋管(K2EDTA tube)","d":"5 mL","g":"微生物組","t":"其他","m":"Real-time PCR","rv":"Not detected","i":"定量血漿中Epstein-Barr Virus (EBV) DNA，輔助移植患者及其他免疫低下患者的診斷與管理。連續監測可用於評估是否改變治療方式或是治療後病毒量的變化。不適用於血液、血品、組織或器官捐贈者之篩檢。","cl":"Epstein-Barr virus（EBV）是一種普遍存在的病毒，世界上的成年人大約95%被感染，且終身帶原。兒童期的初次感染通常無症狀，但可導致青少年和年輕人罹患傳染性單核細胞增多症。初次感染後，病毒會終身存活於B細胞中。其他EBV相關感染包括chronic active EBV infection。移植後淋巴增生性疾病（PTLD）是一種嚴重的疾病，90% 的病例與 EBV 相關，可發生在免疫抑制的移植受贈者。除 PTLD 外，EBV感染與全世界約1％腫瘤有關，並可能發展成鼻咽癌（NPC）。","tags":["腫瘤標記"]},{"n":"Egg white (蛋白)","c":"FALEGW","p":"F30022A(1620點)","r":"是","ct":"03號綠頭管(Lithium heparin)","d":"全血4.5 mL", everse Transcription polymerase chain reaction","rv":"Not detected","i":"提供檢體是否含腸病毒71型核糖核酸之檢測，作為輔助診斷腸病毒71型感染用，建議同時送檢腸病毒培養。","cl":"正常人為Not detected。結果為Positive則代表檢體內含有Enterovirus 71 RNA，需配合臨床症狀判讀。","tags":["其他"]},{"n":"Enterovirus culture (腸病毒培養)","c":"FVPISO2","p":"14001B(350點)","r":"是","ct":"#35-50mL無菌試管","d":"(A)腦脊髓液Pleural fluid、Pericardi","g":"微生物組","t":"其他","m":"利用細胞株接種檢體，觀察細胞株是否有受感染而產生細胞病變，然後再以免疫螢光抗體染色的方式加以鑑定。","rv":"No virus isolated","i":"協助臨床醫師診斷腸道病毒的感染或疾病","cl":"由檢體中分離出的病毒，表示患者可能有該病毒的感染。此檢驗醫令僅針對懷疑腸病毒感染進行培養與鑑定，可以培養鑑定出的病毒種類，請見其他資訊。","tags":["感染/敗血症"]},{"n":"Erythropoietin","c":"FENEPO","p":"自費","r":"否","ct":"02號黃頭管(Serum separator tu","d":"1.5mL","g":"生化免疫組","t":"其他","m":"化學冷光免疫分析法, Siemens Immulite 2000\n(Chemiluminescent immunometric assay,CLIA)","rv":"4.3-29.0 mIU/mL","i":"定量檢測erythropoietin，以協助診斷貧血及真性紅血球增多症(polycythemia vera, PV)，及監控使用重組erythropoietin治療貧血患者之療效。","cl":"EPO由165個胺基酸組成之糖蛋白荷爾蒙。其功能主要為調控紅血球生成，刺激骨髓內紅血球前驅細胞之生長及分化。90% EPO由腎臟生成，10%由肝臟合成。\nEPO上升於再生性不良貧血、異位性產生EPO腫瘤、ALL及肝癌、腎癌、renal cysts、懷孕、缺氧等。下降於慢性腎衰竭、自體免疫疾病、Hodgkin’s、polycythemia rubra vera。\nEPO是腎皮質peritubular cell產生的糖蛋白，當腎臟缺氧時釋出來刺激骨髓新生紅血球。早上的數據比下午高，晝間節率diurnal rhythm。","tags":["肝臟/膽道","腎臟","腫瘤標記","貧血/血液疾病","自體免疫","荷爾蒙/內分泌","過敏"]},{"n":"ESR;紅血球沈降速度測定","c":"FHEESR","p":"08005C(30點)","r":"是","ct":"04號-紫頭管;小兒科患者可採用13號-微量紫頭管","d":"(A)04號-紫頭管﹕3mL\r\n(B)13號-微量紫頭管（m","g":"血液及組織相容組","t":"急診可","m":"自動光學測定法","rv":"男性(≦50歲)：0-15 mm/hr;女性(≦50歲)：0-25 mm/hr\n男性(>50歲)：0-20 mm/hr;女性(>50歲)：0-30 mm/hr","i":"此檢驗主要利用透光率變化來觀察紅血球凝集能力，偵測紅血球之沉降速率。ESR增加常見於類風濕性關節炎、SLE、感染性疾病、癌症、急性心肌梗塞，ESR降低則發生於多血症、球型細胞症、低纖維蛋白原血症、過敏症。","cl":"(1)增加：類風濕性關節炎；SLE；感染性疾病；癌症；急性心肌梗塞\n(2)降低：多血症；球型細胞症；低纖維蛋白原血症；過敏症","tags":["心臟/心血管","感染/敗血症","腫瘤標記","凝血/血栓"]},{"n":"Estradiol","c":"FENERA","p":"09127B(180點)","r":"是","ct":"03號綠頭管(Lithium heparin)","d":"全血3.5 mL","g":"生化免疫組","t":"急診可","m":"(1)競爭型免疫酵素冷光分析法(competitive binding immunoenzymatic assay) (Beckman Coulter Access Sensitive Estradiol檢驗試劑)\n(2)競爭型電子化學冷光免疫分析法(Electrochemiluminescence Competitive immunoassay)(Roche Elecsys Estradiol檢驗試劑)","rv":"(1)Males(≧19 years old)(95% confidence interval)：\n＜15.0~31.5 pg/mL；\n(2)Post-menopausal females(not on hormone therapy)(95th Percentile Limit)：≦25.1 pg/mL；\n(3)Non-pregnant females(95% confidence interval)\n(A)Early-follicular phase：22.4~115.0 pg/mL\n(B)Mid-follicular phase：25.0~115.0 pg/mL\n(C)Mid-luteal phase：36.5~246.0 pg/mL\n(D)Ovulatory peak：32.1~517.0 pg/mL\n(4)Pediatric(95% confidence interval)\n(A)Pediatric(male and female) (<1 year) 32.6~43.7 pg/mL\n(B)Pre-puberty(female)(1~<12 years)＜15.0~20.3 pg/mL\n(C)Pre-puberty(male)(1~<12 years)＜15.0 pg/mL\n(D)Puberty(female)(12~<19 years) 162.0~230.0 pg/mL\n(E)Puberty(male)(12~<19 years) 30.8~38.7 pg/mL","i":"定量偵測人類血清與血漿中Estradiol的含量，以供輔助監測排卵狀況。","cl":"血液循環中，大多數的estradiol與蛋白質結合，大約有1-3%的estradiol以游離(未結合)形式存在。在非懷孕期的女性中，estradiol由卵巢和黃體分泌。腎上腺和男性睾丸也能分泌少量的estradiol。月經期的estradiol濃度最低，在卵囊期的早期開始上升，並在卵囊期晚期，在人體黃體生成素(hLH)出現之前，estradiol就出現第一個高峰，促使進入排卵期。當人體黃體生成素(hLH)進入高峰時，estradiol也隨之降低。estradiol和黃體產生的孕激素(progesterone)一起刺激子宮內膜增生，為受精卵著床而做準備。如果未受孕，黃體分泌的estradiol和孕激素會逐漸減少，開始進入月經期。\nEestradiol可用來監測卵巢狀態，因為estradiol的濃度反映卵泡的成熟，可評估性功能成熟、閉經的病因、不孕和停經。男性estradiol的升高，顯示有女性化性徵的出現，例如男性乳房發育。\n雌二醇(17β-雌二醇)是天然雌激素，其分子量為272.4 Da。多數循環的雌二醇與性激素結合蛋白強力結合，並與白蛋白結合鬆散。估計僅1-5% 的雌二醇是游離的(未結合)。非懷孕婦女中，由卵巢和黃體分泌雌二醇。腎上腺與睪丸(男性)也被認為會分泌微量的雌二醇。經期和進入早期濾泡期時雌二醇濃度最低，於晚期濾泡期上升，並正好在hLH Surge(人類黃體化激素高峰)之前至峰值，開始排卵。當hLH 到達峰值，雌二醇的濃度在黃體期再次上升之前下降。雌二醇和黃體脂酮(由黃體分泌)刺激子宮內膜的生長，準備受精卵著床。如果未發生受精，黃體所分泌的雌二醇和黃體脂酮將減少，並開始月經週期。使用雌二醇濃度來監測排卵狀態。由於雌二醇濃度會反映濾泡成熟，已將科學文獻中所引用的雌二醇測量用作評估兒童性發育、不排卵和/或無月經症、多囊性卵巢症候群以及不孕和停經之原因之寶貴的工具。體外受精期間，促性腺激素刺激後常規測定雌二醇濃度，以確定濾泡狀態。雌二醇也影響生殖組織之外的區域，例如心血管、免疫和中樞神經系統。因此，雌激素已被用於心血管疾病、激素依賴型癌症與骨質疏鬆性骨折的發病機制研究中。男性若出現異常高的濃度，表明存在女性化症候群，例如男性女乳症。","tags":["腫瘤標記"]},{"n":"Estradiol (for infertility)","c":"FREERA","p":"09127B(180點)","r":"是","ct":"03號綠頭管(Lithium heparin)","d":"全血2.0 mL","g":"生化免疫組","t":"24小時","m":"競爭型電子化學冷光免疫分析法(Electrochemiluminescence Competitive immunoassay)","rv":"Healthy women(90% confidence interval)\nFollicular phase: 12.5~166.0 pg/mL,\nOvulation phase: 85.4~498.0 pg/mL, \nLuteal phase: 43.8~211.0 pg/mL,\nPostmenopause: <5.00~54.7 pg/mL","i":"定量偵測人類血清與血漿中Estradiol的含量，以供輔助監測排卵狀況及不孕症患者之治療監控。","cl":"雌性激素(Estrogens)負責女性第二性徵的發展和助孕素(gestagens)一起控制女性所有重要的生殖程序。最具有生物活性的雌激素是17-estradiol，是一種類固醇荷爾蒙，分子量272 daltons。雌激素主要由卵巢(濾泡、黃體)，但也有少量是形成於睪丸及腎上腺皮質。懷孕期間，雌激素主要在胎盤形成。大約98%的雌激素是和運輸蛋白結合再一起(SHBG=sex hormone binding globulin)。\n在月經週期中，雌激素為雙向(biphasic)的分泌。在estradiol的測定於臨床上用於釐清發生於下視丘─腦垂體─生殖腺之間的障礙、男性乳房增殖(gynecomastia)、雌激素所造成卵巢和睪丸腫瘤以及腎上腺皮質增生。更進一步的臨床用途是監控生殖治療以及為了進行體外受精(IVF)而偵測的排卵時間。\nEstradiol亦可協助臨床診斷性早熟及區分疾病狀態及後續之治療方針。女性隨機採集FSH、LH及Estradiol，男性採集FSH、LH及Testosterone，可協助臨床區分原發性及次發性性腺功能低下。青春期時，原發性性腺功能低下患者之促性腺激素如FSH、LH濃度會上升。反之，青春期期延遲或先天性GnRH缺乏患者則濃度偏低。","tags":["腫瘤標記","荷爾蒙/內分泌"]},{"n":"Eucalyptus(桉樹)","c":"FALEUC","p":"F30022C(1620點)","r":"是","ct":"03號綠頭管(Lithium heparin)","d":"全血4.5 mL","g":"生化免疫組","t":"其他","m":"螢光酵素免疫分析法(Fluorescence enzyme immunoassay, FEIA)","rv":"＜0.35 kU/L；參考值備註：0.35~0.69 kU/L(Class I)、0.70~3.49 kU/L(Class II)、3.50~17.49 kU/L(Class III)、17.5~52.49 kU/L(Class IV)、52.5~99.99 kU/L(Class V)、≧100 kU/L(Class VI)。","i":"定量分析特異性過敏原IgE之濃度，協助診斷IgE媒介之過敏疾病。","cl":"過敏性疾病大約佔全世界人口30%。過敏反應主要分為四型，其中過敏原引起主要為第一型過敏反應，為外因性氣喘、花粉熱或異位性濕疹的病人，當第一次接觸過敏原，症狀會立即發作，免疫系統會產生對應過敏原之過敏原特異性IgE抗體，其會循環於血液中並接合於mast cell上，當第二次接觸相同過敏原時，會使mast cell產生去顆粒作用，使細胞內之發炎性物質，例如：histamine、serotonin等，釋放至細胞外，造成流鼻水、打噴嚏等臨床症狀產生，嚴重者甚至產生休克。可藉由檢測血液中之引起過敏相關之特異性抗體IgE(如花粉、動物毛屑、塵?及家塵等)，此可輔助了解引起過敏之過敏原種類，仍需配合其它臨床證據一起判斷。","tags":["過敏"]},{"n":"Everolimus (Certican)","c":"FDPCER","p":"12197B(1500點)","r":"是","ct":"4號紫頭管(K2 EDTA tube)","d":"全血2 mL","g":"生化免疫組","t":"其他","m":"均質化顆粒增強比濁免疫分析法（Homogeneous particle-enhanced turbidimetric immunoassay）","rv":"Therapeutic range: 3-8 ng/mL (Trough).","i":"定量全血中Everolimus濃度，協助肝臟、腎臟及心臟移植患者追蹤及治療。","cl":"Everolimus(Certican)是由天然產物rapamycin經由化學方式改變之免疫抑制劑；而rapamycin是由某種streptomyces hygroscopicus分泌而得。免疫抑制劑之功能乃是預防T細胞活化增生。Certican為一種增生抑制劑，抑制由生長因子所刺激的細胞增生過程，此抑制作用為可逆的；且Certican並非據有細胞毒性的化合物。Certican抑制T細胞對生長因子反應，而使活化的T細胞生長停止在G1至S階段。Calcineurin抑制劑Cyclosporine(CsA)與Tacrolimus則是使活化的T細胞生長停止在G0至G1階段。故Certican與Cyclosporine個別提供不同原理來解釋其個別藥物動力學方式。在臨床上使用Certican時，並行CsA之使用(包含低劑量之使用)可觀察到可預期與良好的臨床表現，此包括急性排斥發生率較低、病人與移植器官存活率增加、降低CMV之感染機率、改善脂質組成與較好的腎臟功能。一些文獻證明，Certican之代謝過程是由肝臟中之微粒體以氧化與去甲基化之方式產生至少11個代謝物。主要的代謝物為hydroxyl ring-open化合物與40-phosphatidylcholine-RAD7。Certican代謝過程是由大量存在於肝藏與小腸之cytochrome-p450中進行，此處亦是CsA與sirolimus之代謝處。在臨床上使用Certican/CsA於病人身上時，強烈建議必須非常小心控制血液中之濃度。最適合的基質為全血，因為在醫療上所使用的濃度上，此兩種化合物會嵌入紅血球中。此藥物半衰期為30小時。","tags":["移植/免疫"]},{"n":"Factor Ⅱ activity；Factor V activity；Factor VII activity；Factor X activity","c":"FHEF2；FHEF5；FHEF7；FHEF10","p":"08057B(400點)、08058B(400點)、08059B(400點)、08062B(400點)","r":"是","ct":"10號1.8 mL淺藍頭管(3.2% buffer","d":"上述採血試管建議採血量之±10％(請勿將檢體蓋打開，以真空採","g":"血液及組織相容組","t":"1週以上","m":"One-stage PT assay(Electromagnetic sensor)","rv":"(1)Factor II activity：70-120%\n(2)Factor V activity：82-159%\n(3)Factor VII activity：55-170 %\n(4)Factor X activity：70-120 %","i":"當PT延長懷疑為外因性外在路徑凝固因子缺乏時，可檢測factor II、factor V、factor VII與factor X活性。","cl":"外在路徑血因子缺乏症，可分為先天性或後天性。","tags":["其他"]},{"n":"Factor VIII inhibitor、Factor IX inhibitor","c":"FHEF8I、FHEF9I","p":"08067B(700點)、08103B(700點)","r":"是","ct":"10號1.8 mL淺藍頭管(3.2% buffer","d":"(A)患者Hct≦55％：上述採血試管建議採血量之±10％(","g":"血液及組織相容組","t":"其他","m":"(1)Factor VIII inhibitor\n(A)常規方法：反應原理為Nijmegen-modified Bethesda Assay(NBA)，儀器偵測原理採One-stage APTT assay(Electromagnetic sensor)。\n(B)針對接受Hemlibra治療或Factor VIII activity以One-stage APTT assay有干擾須以chromogenic method偵測的病人，以Chromogenic Bethesda Assay(CBA)操作，儀器偵測原理採Chromogenic Assay。\n(2)Factor IX inhibitor：反應原理為Nijmegen-modified Bethesda Assay，儀器偵測原理採One-stage APTT assay(Electromagnetic sensor)。","rv":"(1)Factor VIII inhibitor\n(A)NBA：Negative(<0.5 NBU/mL)\n(B)CBA：Negative(<0.5 CBU/mL)\n(2)Factor IX inhibitor：Negative(<0.5 NBU/mL)","i":"當執行APTT混合試驗無法矯正或懷疑檢體中存在第八或第九因子抑制物質時可進行此檢測。1NBU(CBU)/mL指抑制物具使第八或第九因子由100%降低為50%之活性。","cl":"(1)陽性代表檢體中存在第八因子或第九因子inhibitor，可能是輸注凝血因子誘發抗體或是自體免疫抗體。\n(2)當Factor inhibitor<2.0 NBU/mL時，建議以chromogenic assay檢測。","tags":["自體免疫","凝血/血栓"]},{"n":"Factor XIII antigen","c":"FHEF13A","p":"08099B(400點)","r":"否","ct":"10號1.8 mL淺藍頭管(3.2% buffer","d":"(A)患者Hct≦55％：上述採血試管建議採血量之±10％(","g":"血液及組織相容組","t":"1週以上","m":"免疫比濁法(Latex enhanced immunoassay)","rv":"50 ~ 220%","i":"此檢驗主要為第十三因子抗原的檢測，第十三因子主要為將fibrin monomer轉為fibrin polymer，缺乏時無法形成穩定的fibrin。","cl":"(1)Factor XIII被凝血?裂解後活化，會改變其結構，從而暴露出可以與纖維蛋白結合導致交聯的活性位點，這種交聯對血塊的結構完整性有很大貢獻。因此，XIII因子的缺乏不會干擾凝塊形成，但產生的凝塊異常脆弱，因此在維持止血方面效果較差\n(2)患有遺傳性 Factor XIII缺陷的患者表現出嚴重的出血素質，在大多數情況下，需要終身補充治療。除了維持正常止血之外，XIII因子在動脈粥狀硬化、傷口癒合、發炎和懷孕中也發揮作用。\n(3)XIII因子缺乏症是一種罕見的體染色體隱性遺傳性出血性疾病，發生率為 1-300 萬分之一，大多數 XIII因子缺乏症患者的 XIII-A subunits基因 (F13A) 存在突變。 大多數突變是錯義突變，導致改變的蛋白質不規則折疊和不穩定，而 XIII-B subunits (F13B) 的突變則很少。\n(4)由於XIII因子的合成減少或消耗增加，導致多種疾病出現後天XIII因子缺乏症。肝臟疾病是 XIII因子產生減少的主要原因，而發炎性疾病（例如發炎性腸道疾病或敗血症）可導致XIII因子的局部蛋白水解降解增加，以及白血病。某些藥物（isoniazid, penicillin, and phenytoin）與 XIII因子抑制劑的產生有關。","tags":["肝臟/膽道","感染/敗血症","貧血/血液疾病","凝血/血栓"]},{"n":"Factor XIII screen","c":"FHEF13","p":"08063B(100點)","r":"是","ct":"10號1.8 mL淺藍頭管(3.2% buffer","d":"(A)患者Hct≦55％：上述採血試管建議採血量之±10％(","g":"血液及組織相容組","t":"其他","m":"Acetic acid solubility test","rv":"Normal","i":"此檢驗主要為第十三因子功能的篩檢，第十三因子主要為將fibrin monomer轉為fibrin polymer，缺乏時無法形成穩定的fibrin。","cl":"Factor XIII功能不佳時(abnormal)表示可能Factor XIII缺乏或是結構有變異","tags":["其他"]},{"n":"Fe","c":"FBIFE","p":"09020C(90點)","r":"是","ct":"03號綠頭管(Lithium Heparin)。","d":"全血3.5 mL","g":"生化免疫組","t":"急診可","m":"呈色法(TPTZ [2,4,6-Tri-(2-pyridyl)-5-triazine])","rv":"50-212 μg/dL","i":"定量血清或Heparinized血漿中鐵的濃度，協助貧血之診斷及治療。","cl":"鐵(非血紅素)檢測用在診斷如缺鐵貧血、血色素沉著症(一種與廣泛存有兩個鐵色素的組織相關疾病，含鐵血黃素和脂褐素，其特徵在皮膚的色素沉澱)，和慢性腎臟病。轉鐵蛋白使是血清中主要攜帶鐵離子的蛋白。","tags":["腎臟","貧血/血液疾病"]},{"n":"Fe & TIBC","c":"FBITIB","p":"09035C (270點)","r":"是","ct":"03號綠頭管(Lithium Heparin)","d":"全血3.5mL","g":"生化免疫組","t":"急診可","m":"(1)UIBC: Nitroso-PSAP method；\n(2)Estimated TIBC等於Fe＋UIBC","rv":"UIBC: 155-355 μg/dL；\nTIBC：205~567 μg/dL","i":"定量血漿中鐵的濃度、不飽和鐵結合能力及總鐵結合能力，協助評估營養狀況及協助貧血之診斷及治療。","cl":"鐵(非血紅素)的測定可用於疾病的診斷和治療，例如缺鐵性貧血、血鐵沉積症(為血鐵質和血棕色素兩種含鐵色素大量沉積在組織中的一種疾病，特徵為皮膚的色素沉澱)和慢性腎臟疾病。運鐵蛋白是血清中主要負責運送鐵的蛋白質。\n血清中鐵的濃度主要是與血清運鐵蛋白結合的鐵 (III)，而不包括血清中含有的游離血紅蛋白形式的鐵。由於運鐵蛋白通常僅有三分之一左右的鐵結合部位被鐵 (III)佔據，因而血清運鐵蛋白儲備了相當大的鐵結合能力。這稱作血清不飽和或潛在鐵結合能力。\n不飽和鐵結合能力濃度上升於缺鐵症、真性紅血球增多症；下降於再生不良性貧血、慢性感染、惡性腫瘤、肝硬化以及急性肝炎。\nTIBC是檢測體內總鐵結合能力之結果，結合能力之改變皆與鐵的攝取、吸收、儲存、以及釋放的機制所造成的。這些改變顯示著身體有很大範圍的功能不良，例如貧血、腎病徵候群、肝硬化以及肝炎。鐵與總鐵結合能兩者的測量是一種重要作為明確診斷的工具，因為鐵與總鐵結合能兩者的關係是相互關聯的。濃度下降於Hemochromatosis、Sideroblastic Anemia、Hemolytic Anemias等疾病，濃度上升於缺鐵性貧血等疾病。","tags":["肝臟/膽道","腎臟","腫瘤標記","貧血/血液疾病"]},{"n":"Fecal Calprotectin","c":"FSTCAL","p":"自費","r":"否","ct":"77號立寶糞便採檢瓶","d":"固態糞便約約一隻大拇指的量、水便約 1~2 ml","g":"生化免疫組","t":"2天","m":"螢光酵素免疫分析法(Fluorescence enzyme immunoassay, FEIA)，ImmunoCAP250","rv":"≦50 mg/kg；\n報告備註：≦50 mg/kg表示無腸道發炎及相關疾病的可能；>50 mg/kg表示腸道發炎的可能，需進一步的複測和專業的檢查。","i":"定量糞便中Calprotectin濃度，協助診斷。","cl":"糞便鈣衛蛋白(Calprotectin)是一種鈣和鋅離子結合蛋白，主要存在於涉及抵禦致病原的細胞質中，如嗜中性球、單核球與巨噬細胞。嗜中性球細胞質的蛋白中約60%左右皆為此類。\n腸道發炎的情況下，嗜中性球穿越腸壁遷移到腸道內並導致糞便中鈣衛蛋白的含量升高。糞便鈣衛蛋白濃度和腸道內嗜中性球的數量有直接相關性，因此特別是在發炎性腸道疾病，如克隆氏氏症(Crohn’s disease)和潰瘍性大腸炎中有濃度升高的現象。\n糞便鈣衛蛋白濃度會因服用非類固醇消炎藥物(NSAID)、100 mL以上的出血和惡性腫瘤而受到影響。糞便鈣衛蛋白檢測是一種簡易且非侵入式的第一線測試能明確區分發炎性腸道疾病(inflammatory bowel disease, IBD)和腸躁症(irritable bowel syndrome, IBS)及其他腸胃功能性疾病。糞便鈣衛蛋白和疾病活性有關並能預測發炎性腸道疾病的復發，使得糞便鈣衛蛋白成為診斷和監控發炎性腸道疾病患者的有效工具。","tags":["腫瘤標記"]},{"n":"Ferritin","c":"FSIFER","p":"12116C(300點)","r":"是","ct":"03號綠頭管(Lithium heparin)","d":"全血3.5 mL","g":"生化免疫組","t":"2天","m":"雙向免疫酵素冷光分析法(two-site immunoenzymatic assay , sandwich)","rv":"Males: 23.9-336.2 ng/mL\nFemales: 11.0-306.8 ng/mL","i":"定量偵測人類血清及血漿(肝素)中鐵蛋白(Ferritin )的量，以評估組織鐵含量供臨床鑑別與鐵質代謝或缺鐵相關疾病。","cl":"Ferritin的濃度可直接反應身體內鐵的儲存，因此血清Ferritin濃度的測定成為一個用來評估體內鐵的狀態的一個常用的診斷工具。大多數正常成人血清中Ferritin的濃度範圍為10–300 ng/ml，但是濃度會隨年齡和性別的不同而變化。在出生的頭一個月內，血清Ferritin的濃度會急劇升高，恰好與骨髓紅血球生成的下降一致。在兩到三個月內，紅血球的生成變得活躍，而血清中鐵蛋白的濃度會開始降低。在6個月時，Ferritin的濃度下降到了一個相當低的濃度，並會維持整個兒童期。青春期前鐵蛋白的表現並沒有性別的差異，當進入青春期後，Ferritin濃度會開始升高，特別在男性的升高會更明顯。在女性的年齡和血清Ferritin濃度之間有明顯的正相關關係，但在男性卻沒有。Ferritin濃度可直接代表體內鐵之儲存狀況。缺鐵性貧血的病人體內，其血清Ferritin的濃度是正常個體的十分之一，而在鐵過量的病人(血色素沈著症、血鐵質沈著症)中，血清Ferritin的濃度比正常個體高很多。在成人與小孩的慢性發炎中，都會因為鐵的儲存而導致Ferritin濃度的上升。在急性與慢性肝臟疾病、慢性腎衰竭及某些類型的腫瘤疾病中，也可見到Ferritin濃度的升高。","tags":["肝臟/膽道","腎臟","腫瘤標記","貧血/血液疾病"]},{"n":"Fetal Hb test（APT test）","c":"FSTAPT","p":"07017B(40點)","r":"是","ct":"採檢容器：21號10 mL尖底管、36號15 mL","d":"糞便：1g（約一顆花生米大小），可參考收集瓶外袋標示。消化道","g":"血液及組織相容組","t":"其他","m":"鹼性變性法（Alkaline denaturation method）","rv":"Negative","i":"用於協助鑑別診斷新生兒Swallowed blood syndrome(吞嚥母血)或是Gastrointestinal hemorrhage。","cl":"APT Test陽性可能出現於新生兒腸胃道或呼吸道出血，但要排除母血不會有高HbF。","tags":["其他"]},{"n":"Fetal RBC detection","c":"FHEELU","p":"08052B(150點)","r":"否","ct":"04號-紫頭管","d":"3 mL","g":"血液及組織相容組","t":"2天","m":"Immunophenotyping by flow cytometry","rv":"Fetal RBC：＜0.07%","i":"(1)此檢驗主要用於檢驗Rh D陰性婦女產後血液中是否有胎兒的血液自胎盤流入母體內，藉以評估胎兒與母體間之出血( fetal to maternal hemorrhage )及計算母體與胎兒間出血的量。\n(2)當Rh D陰性婦女出現胎兒與母體間之出血時，可以依據Fetal RBC detection檢測結果，給予適量的RhIG作為預防性注射，以減少母親產生致敏化反應。","cl":"(1)此檢驗主要用於檢驗Rh D陰性婦女產後血液中是否有胎兒的血液自胎盤流入母體內，藉以評估胎兒與母體間之出血( fetal to maternal hemorrhage )及計算母體與胎兒間出血的量。當Rh D陰性婦女出現胎兒與母體間之出血時，可以依據Fetal RBC detection檢測結果，給予適量的RhIG作為預防性注射，以減少母親產生致敏化反應。\n(2)依據AABB technical manual 19th RhIG建議劑量如下:(1)Fetal cell 0.3~0.8%：2 vials RhIG，(2)Fetal cell 0.9~1.4%：3 vials RhIG，(3)Fetal cell 1.5~2.0%：4 vials RhIG，(4)Fetal cell 2.1~2.6%：5 vials RhIG。(1 vail RhIG=300μg或1,500IU)\n(3)Quantification of fetal bleeding＝Fetal RBC count (%)×maternal blood volume (mL)。舉例Fetal RBC count：0.3%，maternal blood volume：5000 mL，則fetal bleeding為5,000×0.3%＝15 mL fetal RBC（相當於30 mL fetal whole blood）。","tags":["其他"]},{"n":"Fibrin degradation product (D-dimer)","c":"FHEDD、FRHDD","p":"08038B(600點)","r":"是","ct":"10號1.8 mL淺藍頭管(3.2% buffer","d":"(A)患者Hct≦55％：上述採血管建議採血量之±10％\r\n","g":"血液及組織相容組","t":"急診可","m":"免疫比濁法(Latex enhanced immunoassay)","rv":"(1)生物參考區間:＜0.34 μg/mL (FEU)\n(2)Cut-off value for deep vein thrombosis (DVT) or pulmonary embolism (PE) exclusion：＜0.50 μg/mL (FEU)\n(3)The negative predictive value for deep vein thrombosis (DVT) exclusion using the cut-off value of 0.50 μg/mL (FEU) when patients have low or moderate pretest probability (PTP) assessed by the Wells model is 99.3%-100.0%(95% CI).\n(4)\tThe negative predictive value for pulmonary embolism (PE) exclusion using the cut-off value of 0.50 μg/mL (FEU) when patients have low or moderate pretest probability (PTP) assessed by the Wells model is 99.2%-100.0%(95% CI).","i":"(1)結合Wells model臨床可能性(clinical pretest probability)評估，用於排除門診病人罹患深部靜脈栓塞(DVT)或肺栓塞(PE)之可能性。\n(2)輔助Disseminated intravascular coagulation(DIC)診斷","cl":"(1)當D-dimer濃度低於Cut-off value，且病人臨床可能性評估結果為低度(low)時，此檢驗結果效能具備非常好之陰性預測值(negative predictive value)。\n(2)當D-dimer濃度低於Cut-off value，而病人臨床可能性評估結果為中度(moderate)時，建議由醫師評估是否需後續追蹤或接受進一步之診察。\n(3)當D-dimer濃度高於Cut-off value或病人臨床可能性評估結果為高度(high)時，建議直接接受進一步之影像檢查。\n(4)D-dimer於DIC、嚴重感染、癌症、出血、重傷或大手術患者均可能會上升。\n(5)臨床效能：排除肺栓塞及深部靜脈栓塞(依據試劑仿單資料)\n(A)肺栓塞(pulmonary embolism)：在低及中等程度的pretest probability(PTP)分數時，肺栓塞的陰性預測率(NPV)為99.7%(99.2-100%)\n(B)深部靜脈栓塞(deep vein thrombosis):在低及中等程度的pretest probability(PTP)分數時，DVT的陰性預測率(NPV)為100%(99.3-100%)\n(C)上述之PTP使用Well’s model評估","tags":["腫瘤標記","凝血/血栓"]},{"n":"Fibrinogen","c":"FHEFIB、FRHFIB","p":"08023B(120點)","r":"是","ct":"10號1.8 mL淺藍頭管(3.2% buffer","d":"(A)患者Hct≦55％：上述採血管建議採血量之±10％\r\n","g":"血液及組織相容組","t":"急診可","m":"Clauss method","rv":"244-465mg/dL","i":"Fibrinogen為一種acute phase reactant，所以妊娠、炎症或手術後，都有可能會上升。先天性低纖維蛋白原血症、嚴重肝病或DIC病人則會下降。","cl":"Fibrinogen是一種糖蛋白，分子量約340,000 daltons，血漿中的濃度範圍為 2 ~ 4 g/l (200-400 mg/dL) ，在肝臟中合成（1.7 至 5 g/day），半衰期約為 3-5 天。\n(1)因為fibrinogen為一種acute phase reactant，所以妊娠、炎症、糖尿病、手術後及肥胖症患者，都有可能會上升。\n(2)Fibrinogen濃度過高可能導致動脈或靜脈栓塞，因此fibrinogen近來也被用來作為做為評估栓塞發生危險因子之使用。\n(3)當下述情形，fibrinogen濃度可能會下降：\n(A)先天性低纖維蛋白原血症\n(B)嚴重肝病\n(C)DIC\n(D)AML患者〈尤其是M3, M4〉\n(E)Systemic hyperfibrinolysis之患者","tags":["肝臟/膽道","糖尿病","凝血/血栓"]},{"n":"Folate","c":"FSIFOL","p":"09130B(180點)","r":"是","ct":"03號綠頭管（Lithium heparin）","d":"3.5 mL","g":"生化免疫組","t":"2天","m":"競爭型免疫酵素分析法（competitive binding immunoenzymatic assay）","rv":"Cutoff for folate deficiency: ＜4.0 ng/mL (WHO Recommendation)","i":"定量偵測人類血漿（heparin）中葉酸（Folate）的含量，以評估人體葉酸濃度鑑別相關疾病。","cl":"葉酸是一種必須維生素，由多種食物提供，如深葉蔬菜、柑橘類水果、酵母菌類、大豆、雞蛋和牛奶。由小腸吸收，於肝臟儲存。天然葉酸可存在多種形式，其生物學功能多以同功?的形式存在—運輸單個的碳單位。葉酸對於正常細胞的生長和DNA的合成非常重要。葉酸的缺乏可導致據細胞貧血，和最終導致多種神經症狀。葉酸缺乏是由於食物攝取過少，無法有效吸收或過度葉酸利用等原因引起。過度利用在懷孕時非常普遍，其他例如酗酒、肝炎或其他肝臟損害疾病，均可導致葉酸的過度利用。血清和紅血球內葉酸的濃度監測均可反應體內的葉酸狀態，血清中葉酸的濃度則顯示近期的葉酸攝入情況，而紅血球內葉酸濃度代表生長期葉酸儲存的最佳指標。紅血球內葉酸濃度過低提示長期的葉酸缺乏。葉酸和維生素B12，是由甲硫胺酸(methionine)合成反應途徑相關連，兩者中任何一種的缺失都將影響該途徑，導致相似的臨床症狀。另一個普遍代謝途徑，是缺乏維生素B12阻止葉酸進入紅血球，會導致紅血球內葉酸濃度的下降，影響葉酸的攝入正常。由於上述原因，在臨床工作一般應同時檢測兩種維生素，治療的方法該視哪一種維生素缺乏而定。","tags":["肝臟/膽道","貧血/血液疾病"]},{"n":"Free cortisol (24 hr urine)","c":"FENFCO","p":"09113C (240點)","r":"否","ct":"35號50mL無菌試管","d":"15 mL尿液；最少採檢量須10 mL尿液(採檢過程中檢體須","g":"生化免疫組","t":"其他","m":"HPLC，UV","rv":"<60 μg/day","i":"定量24小時Urine free cortisol，協助腎上腺相關疾病之診斷","cl":"上升於無月經，庫辛氏症候群，甲狀腺機能亢進，腦下垂體腫瘤，小細胞肺癌，懷孕，壓力，以及使用親皮質素。下降於甲狀腺機能低下，腎絲球過濾不足，以及使用類固醇、葡萄柚汁。\n委託代檢單位使用HPLC方法檢測，其優點是能明確的分離測定Urinary free cortisol，避免免疫法抗體非特異性結合產生的偽高值。","tags":["甲狀腺","腫瘤標記"]},{"n":"Free Protein S Antigen","c":"FHEFPS","p":"08124B(367點)","r":"是","ct":"10號1.8 mL淺藍頭管(3.2% buffer","d":"(A)患者Hct≦55％：上述採血試管建議採血量之±10％(","g":"血液及組織相容組","t":"其他","m":"免疫比濁法","rv":"男：70-148%；女：50-134%","i":"(1)當Protein S功能異常時，測試Free Protein S antigen可以輔助鑑別Protein S功能異常的原因。\n(2)因血液中的Protein S會跟C4b binding protein (C4bBP)結合在一起，只有未結合的Free protein S antigen才具有功能，依據美國病理醫師學會(CAP)參考文獻，建議應先檢測Free protein S antigen作為初步之篩檢或同時檢測Free protein S antigen以及Protein S function。","cl":"(1)Protein S是一種維生素K依賴性蛋白質，不具有任何esterase功能，在人體中的分子量為70,000，由單一多?鏈組成，它含有約7%的碳水化合物，在血漿中的濃度為25mg/L。Protein S在肝臟中以無活性前體合成，活性態則是透過維生素K依賴性羧化?對谷氨酸殘基(glutamic residues)進行羧化後獲得的，並含有γ-羧基谷氨酸殘基(γ-carboxyglutamic residues)，使分子能固定鈣。\n(2)Protein S具有重要的抗凝血功能，並作為activated protein C的cofactor，與activated protein C形成化學計量複合物(stoichiometric complex)。在鈣存在的情況下，該複合物強烈結合到磷脂表面，並透過蛋白水解由thrombin激活的凝血因子V和VIII，使其失去活性。Protein S能顯著增強Protein C的抗凝功能，可能是透過增加蛋白C對磷脂膜的親和力。\n(3)Protein S的凝血?敏感區可以因受到thrombin有限的蛋白水解作用，使protein S保留其對磷脂的親和力，但失去其作為activated protein C的cofactor的抗凝血功能。\n(4)當Protein S與補體C4b的蛋白質，即C4b-binding protein (C4b-BP)結合時會形成動態平衡，此時C4b-BP會以兩種不同的形式存在於血漿中：一種為低分子量形式（約佔總重量的20%），對Protein S沒有任何親和力；另一種是高分子量形式（約佔總重量的80%），它可以與Protein S以1:1的比例形成複合物。在生理條件下，達到平衡狀態，其中存在兩種不同形式的Protein S：\n(A)Free Protein S form，作為activated Protein C的cofactor約佔total Protein S的40%\n(B)High molecular weight C4b-BP 結合protein S(protein S–C4b-BP)，不具有activated protein C cofactor的活性，約佔總protein S的60%\n(5)後天Protein S 缺乏症包含:C4b-BP升高導致的發炎症候群、肝臟疾病、腎病症候群、口服抗凝血劑、口服避孕藥及L-asparaginase治療。\n(6)先天性Protein S缺乏可分為三種類型\n(A)Type I deficiencies：Total Protein S及Free Protein S antigen均下降，可能是Protein S生產有問題。\n(B)Type II deficiencies：Protein S function下降但Total Protein S及Free Protein S均正常，可能是protein S有蛋白變異。\n(C)Type III deficiencies：Protein S function及Free Protein S antigen下降，但Total Protein S Ag正常，可能是發炎造成結合型Protein S增加。\n(7)先天性或後天性Protein S缺乏會因血液抗凝血能力降低而增加血栓栓塞的風險，可能會產生復發性血栓形成。\n(8)診斷protein S缺乏應考量肝功能、consumptive coagulopathy、維他命K狀況以及是否處於急性栓塞期。當free protein S antigen下降，而導致Protein S function下降時，應排除是否因慢性或急性發炎導致C4bBP上升之影響。","tags":["肝臟/膽道","腎臟","凝血/血栓"]},{"n":"Free PSA (Percentage)","c":"FSIFPA","p":"12198C(400點)及12081B(400點)","r":"是","ct":"2號5 mL黃頭管(Serum separator","d":"全血3.5 mL","g":"生化免疫組","t":"2天","m":"雙向免疫酵素冷光分析法(two-site immunoenzymatic assay , sandwich)，Beckman Coulter Access Hybritech free PSA","rv":"Free PSA：Not applicable；\nTotal PSA：<4.0 ng/mL。\nFree PSA/ Total PSA ratio：詳見備註(如下)；\n當Total PSA濃度於4~10 ng/mL時，% free PSA vs. 攝護腺癌機率：0-10% vs. 56%、10-15% vs. 28%、15-20% vs.  20%、20-25% vs. 16%、＞25% vs. 8%。","i":"定量偵測人類血清游離攝護腺特異抗原( Free Prostatic specific antigen)的含量。利用Access Hybritech (total) PSA測得PSA濃度，可計算free PSA/ Total PSA比例，協助診斷Total PSA濃度介於4.000~10.00 ng/mL且年齡大於等於50歲男性病人之良性攝護腺肥大或攝護腺癌診斷。","cl":"攝護腺癌發生率好發於男性，於台灣男性癌症中已為前五名，死亡率亦於男性癌症中前十名。攝護腺特異抗原(Prostate-specific antigen, PSA)以三種型態存在於血清中，第一種型式為被蛋白?抑制物(如alpha-2 macroglobulin)包覆型式，此缺乏免疫反應；第二種型式與另一個蛋白?抑制物(如alpha-1 antichymotrypsin(ACT))形成複合物；第三種不與任何蛋白?抑制物形成複合物的游離態存在，此即為游離型攝護腺特異抗原(free PSA)。血清中PSA濃度只可估測攝護腺癌存在風險比率，對於攝護腺癌診斷仍需由切片(prostatic biopsy)檢查結果證實。\n可能因為良性攝護腺細胞增生或攝護腺鄰近細胞有發炎反應，使得血清中PSA濃度增加，在PSA濃度增加的病人中，可以相同檢體檢測free PSA及total PSA濃度，並以free PSA與total PSA相除計算游離攝護腺特異抗原的百分比(free PSA%)，在攝護腺癌病人的free PSA%值往往低於良性攝護腺疾病病人。free PSA%可用來協助評估病人罹患攝護腺癌的機率，當free PSA%值比較低時，罹患攝護腺癌的風險機率越高。\nPSA及free PSA檢測試劑為Beckman Coulter Access Hybritech PSA及Access Hybritech free PSA，校正追溯廠商Hybritech校正參考物質，因試劑廠商之檢測方法和試劑特異性隨校正追溯參考物質不同而有所差異，因此不同廠商試劑及檢測方法的檢測結果不可互換使用；且free PSA%值對於罹患攝護腺癌的風險機率亦會有不同，因此須對應試劑廠商提供之建議罹癌風險機率。","tags":["腫瘤標記"]},{"n":"Free T3","c":"FENFT3","p":"09107C(200點)","r":"是","ct":"03號綠頭管(Lithium heparin)。","d":"全血3.5 mL","g":"生化免疫組","t":"其他","m":"競爭型免疫酵素冷光分析法(competitive binding immunoenzymatic assay)","rv":"2.50~3.90 pg/mL","i":"定量偵測人類血清中游離三碘甲狀腺素(Free T3)的含量，以協助\n區分三碘甲狀腺( total T3)上升原因：thyriod hormone binding protein(TBG)改變(例如TBG增加或是Albumin減少)，或甲狀腺功能亢進。","cl":"促甲狀腺素釋放激素(Thyrotropin-releasing hormone, TRH)會刺激合成和分泌促甲狀腺素(Thyrotropin)或甲狀腺刺激激素(hTSH)。甲狀腺刺激激素接著刺激四碘甲狀腺素(Thyroxine, T4)和三碘甲狀腺素(Triiodothyronine, T3)的合成、儲存、分泌和代謝作用。\n三碘甲狀腺素是主要的生物活性甲狀腺激素，循環中的三碘甲狀腺素有80%來自於周邊血中四碘甲狀腺素的去碘化作用，有20%直接由甲狀腺分泌。在循環中的四碘甲狀腺素和三碘甲狀腺素會與甲狀腺結合球蛋白(TBG)、甲狀腺結合前白蛋白(TPBA)和白蛋白結合及攜帶。大約有0.2~0.4%的總三碘甲狀腺素和0.03%的總四碘甲狀腺素在循環中是以游離、未結合的方式存在。對大多數人而言，游離的激素與甲狀腺的功能狀態有關。\n游離四碘甲狀腺素和三碘甲狀腺素藉由保持體溫和刺激產熱，來調節正常生長發育功能。另外，游離四碘甲狀腺素和三碘甲狀腺素影響所有碳水化合物的代謝，也影響部份脂肪和維他命的代謝。在胎兒和幼兒發育時，也需要甲狀腺激素。\n在甲狀腺結合蛋白正常濃度下，游離三碘甲狀腺素的濃度與總三碘甲狀腺素的濃度相關。當甲狀腺結合蛋白改變而使總三碘甲狀腺素的濃度改變時，測量游離三碘甲狀腺素對臨床很有幫助，特別是在甲狀腺結合球蛋白變化或白蛋白濃度低下時。在甲狀腺功能亢進時，有5%的比例會出現游離三碘甲狀腺素的濃度單獨升高的情況(三碘甲狀腺素中毒，T3 toxicosis)。\n非甲狀腺代謝方面的疾病也有可能造成不正常的游離三碘甲狀腺素的濃度。在非甲狀腺疾病的病人檢測甲狀腺狀態時，應該要謹慎解釋其結果。舉例來說，抗癲癇藥物治療[特別是苯妥英(phenytoin)]可能會使游離三碘甲狀腺素的濃度下降，這是因為肝臟的代謝增加，促使激素從結合位置被替換出來。抗發炎的藥物例如水楊酸鹽(salicylate)或苯基丁氮酮(phenylbutazone)，也會競爭荷爾蒙的結合位置，但是它們對於游離三碘甲狀腺素濃度的影響仍然不是非常清楚。在肝素治療的病人體內會有游離三碘甲狀腺素濃度上升的情況，這是因為非酯化脂肪酸(non esterified fatty acids，NEFA)會改變游離型與結合型荷爾蒙間的關係。","tags":["甲狀腺","荷爾蒙/內分泌"]},{"n":"Free T4","c":"FENFT4","p":"09106C(200點)","r":"是","ct":"03號綠頭管(Lithium heparin)","d":"全血 3.5 mL","g":"生化免疫組","t":"其他","m":"競爭型免疫酵素冷光分析法(competitive binding immunoenzymatic assay)","rv":"0.59~1.43 ng/dL；\n※生物參考區間來源建立於台灣族群(男性年齡分佈為17~76歲、女性年齡分佈18~72歲。","i":"定量偵測人類血清血清中游離甲狀腺素(Free T4)的含量，以評估甲狀腺功能。","cl":"下丘腦垂體-甲狀腺軸控制著甲狀腺激素合成、釋放和功能。從下丘腦分泌的促甲狀腺素釋放激素(Thyrotropin-releasing hormone, TRH)會刺激合成和分泌促甲狀腺素(Thyrotropin)或甲狀腺刺激激素(hTSH)。hTSH接著刺激四碘甲狀腺素(Thyroxine, T4)和三碘甲狀腺素(Triiodo- thyronine, T3)的合成、儲存、分泌和代謝作用。游離型和結合型的甲狀腺素和T3都在血液中存在。超過99%的甲狀腺素和T3在血液中以結合攜帶蛋白的方式循環於血液中，少於1%是未結合型。對大多人而言，游離型激素與甲狀腺功能的功能狀態相關。\nFree T4和T3藉由保持體溫和刺激產熱，來調節正常生長發育功能。另外，游離型甲狀腺素和三碘甲狀腺素影響所有碳水化合物、脂肪和維他命的代謝，胎兒和幼兒的發育也需要甲狀腺激素。\nFree T4濃度的升高有助於臨床發現和診斷甲狀腺功能亢進，而濃度降低和配合相關的臨床表現，則有助於診斷甲狀腺功能低下。測定Free T4配合其他甲狀腺測試和臨床表現，可建立甲狀腺功能亢進和低下的分界標準。","tags":["甲狀腺"]},{"n":"FSH, FSH (for infertility)","c":"FENFSH、FREFSH","p":"09125C(180點)","r":"是","ct":"03號綠頭管(Lithium heparin)","d":"全血3.5 mL","g":"生化免疫組","t":"急診可","m":"雙向免疫酵素冷光分析法(two-site immunoenzymatic assay , sandwich)","rv":"Males: 1.27~19.26 mIU/mL\nFemales:Mid-Follicular phase: 3.85~8.78 mIU/mL，Mid-Cycle Peak: 4.54~22.51 mIU/mL，Mid-Luteal phase: 1.79~5.12 mIU/mL，Postmenopausal: 16.74~113.59 mIU/mL","i":"定量偵測人類血漿中濾泡激素（follicle stimulating hormone, FSH）的含量，以供輔助診斷月經、生育及青春期發展異常疾病。","cl":"在女性，人類濾泡刺激素可刺激濾泡成熟，並且與人類黃體化激素共同刺激Estrogen的分泌和排卵。排卵之後，人類濾泡刺激素與人類黃體化激素被認為會造成濾泡破裂進入黃體期，並且影響黃體細胞分泌黃體脂酮。人類濾泡刺激素是由下視丘腦中體所分泌的性腺分泌激素(gonadotropin releasing hormone，GnRH)來刺激腦下垂體前葉的促性腺細胞所分泌。人類濾泡刺激素以及人類黃體化激素都是有自然的週期性，然而因為人類濾泡刺激素在血液循環中的半衰期很長，所以較少被注意。血液循環中的人類濾泡刺激素的濃度會受到Estrogen與黃體脂酮的影響。在正常的月經週期，黃體期末期可觀察到人類濾泡刺激素有輕微的上升(比較像是因為受到Estrogen與黃體脂酮濃度的下降所影響，排除了負回饋的作用)。這開始了卵巢中濾泡的生長與成熟。之後人類濾泡刺激素會下降，並且在濾泡期一直維持較低的濃度（因為受到生長中的濾泡所產生的Estrogen與黃體脂酮所造成的負回饋作用）。而在月經中期，性腺分泌激素會刺激人類濾泡刺激素的上升，但在月經中期的人類濾泡刺激素上升的功能仍未知。隨著這個上升，人類濾泡刺激素在黃體期又會受到Estrogen負回饋的影響而被抑制。接近月經週期末期，人類濾泡刺激素又會小幅上升，然後開始下一次月經週期的濾泡成熟。\n 在正常成熟的女性中，經期長短的不同是因為濾泡期的長短不同所造成的。在更年期的女性，因為卵巢的Estrogen及黃體脂酮的分泌量下降，排除了腦下垂體的負回饋機制，導致人類濾泡刺激素的濃度上升。最後，排卵與月經周期減少，最後完全終止。\n在男性中，人類濾泡刺激素會透過在睪丸細精管上的Sertoli細胞上的受器，來刺激精子生成。在正常精子成熟的過程中，人類黃體化激素與人類濾泡刺激素都需要，而人類濾泡刺激素對於睪固酮所造成的負回饋抑制作用較不敏感。一般認為，部分的人類濾泡刺激素會受到男性的Sertoli細胞或女性的granulosa細胞所產生的?鏈所調控。\n測量人類黃體化激素及人類濾泡刺激素的濃度通常是用來研究月經週期、生殖能力以及青春期發育的不正常，例如：不成熟的卵巢障礙、更年期、排卵疾病及腦下垂體障礙。人類黃體化激素與人類濾泡刺激素的比例常被用來診斷多囊性卵巢的疾病。人類黃體化激素與人類濾泡刺激素濃度偏低時，可能是腦下垂體有缺失；而人類黃體化激素與人類濾泡刺激素濃度偏高，且伴隨性腺類固醇濃度的下降，可能是因為性腺的缺失(更年期、卵巢切除手術、卵巢不成熟症候群、Turner’s症候群)。促性腺激素的濃度偏低，通常是由於女性服用口服避孕藥所造成的。男性的人類濾泡刺激素及人類黃體化激素濃度偏高，且伴隨性腺類固醇濃度的下降，可能是因為睪丸有異常或缺乏。在Klinefelter’s 症候群中，人類濾泡刺激素濃度可能會上升，這是因為Sertoli細胞的異常所造成。","tags":["荷爾蒙/內分泌"]},{"n":"Fungus culture (黴菌培養)","c":"FMIFUN、FMIFUN1(移植專用)","p":"13007C(200點)","r":"是","ct":"36號15 mL無菌試管","d":"(A)體液及血液檢體1 mL 以上\r\n(B)Tissue至少","g":"微生物組","t":"1週以上","m":"VITEK MS微生物鑑定質譜儀；VITEK 2 MIC藥物敏感性試驗","rv":"No growth","i":"黴菌感染之培養鑑定","cl":"真菌 (fungi) 可分成酵母菌 (yeast) 與黴菌 (mold)，依感染部位可將真菌分為幾類：\n(1)淺部真菌病(Superficial mycoses)：感染的部位緊僅限於皮膚和毛髮最外層之角質層(stratum corneum)。常見的真菌包括：Exophiala werneckii、Piedraia hortai、Trichosporum beigelii。\n(2)表皮真菌病(Cutaneous mycoses)：感染已侵入表皮層(epidermis)，常見會侵入毛髮和指甲造成真菌病。常見的真菌包括：Microsporum spp.、Trichophyton spp.、Epidermophyton spp.。\n(3)皮下真菌病(Subcutaneous mycoses)：感染已侵入真皮層(dermis)、皮下組織(Subcutaneous tissues)、肌肉及筋膜(fascia)。常見的真菌包括：Sporothrix schenckii、 Fonsecaea pedrosoi、Fonsecaea compacta、Exophiala dermatitidis、Pseudallescheria boydii、Madurella spp.。\n(4)全身性真菌病(Systemic mycoses)：感染已擴及全身許多器官。常見的真菌包括：Candida spp.、Aspergillus spp.、Cryptococcus neoformans。\n(5)伺機性真菌病(Opportunistic mycoses)：在免疫缺陷的病人會造成伺機性感染。常見的真菌包括：Candida albicans、Aspergillus fumigatus、Rhizopus spp.、Absidia spp.、Mucor spp.。","tags":["感染/敗血症"]},{"n":"Gastrin","c":"FENGAS","p":"09132B(180點)","r":"是","ct":"02號黃頭管(Serum separator tu","d":"2 mL全血；血清至少1.0 mL","g":"生化免疫組","t":"其他","m":"化學冷光免疫分析法(Chemiluminescent immunometric assay,CLIA)","rv":"13.0-115.0 pg/mL","i":"作為胃潰瘍、十二指腸潰瘍、Zollinger Ellison syndrome、惡性貧血、腫瘤引起過多胃泌激素分泌之臨床診斷應用。","cl":"Gartrin是胃室G-cell及胰島(Langerhans)分泌的荷爾蒙，以三種主要形式G-17，G-34和G-14以含有的氨基酸數命名。\n經由鹼性、胃室膨脹、咬嚼、味覺、嗅覺、蛋白質進食刺激而分泌，吸收到血液回到胃部時刺激胃酸的分泌，當胃酸過多時，gastrin受到胃酸的負回饋抑制。Gastrin上升於缺乏胃酸，惡性貧血，萎縮性胃炎，胃癌，潰瘍，G-cell增生，高血鈣，甲狀腺機能亢進，胰臟神經內分泌腫瘤，腎衰竭，迷走神經切除，胃脹阻滯，類肉瘤病(sarcoidosis)，Zollinger-Ellison syndrome，以及使用藥物：acetylcholine、calcium、cholinergic、insulin。Gastrin下降於使用藥物：anticholinergics and tricyclic antidepressant.","tags":["腎臟","甲狀腺","腫瘤標記","貧血/血液疾病","電解質/代謝","荷爾蒙/內分泌"]},{"n":"Gentamicin","c":"FDPGEN、FRDGEN","p":"10518B(320點)","r":"是","ct":"3號綠頭管(Lithium heparin tub","d":"全血2.0 mL","g":"生化免疫組","t":"急診可","m":"同質性的酵素免疫分析法(Homogenous enzyme immunoassay method)","rv":"備註說明:\n※Trough\nAdult：< 2 μg/mL (ideal target <1 μg/mL)\nNeonates and pediatrics：\nTraditional dosing：<2 μg/mL\nOnce-daily dosing：<1 μg/mL\n※Peak\nAdult :4-6 μg/mL (serious infection：7-10 μg/mL)\nNeonates and pediatrics:\nTraditional dosing：>5-12 μg/mL\nOnce-daily dosing：8-13 μg/mL (neonates), 15-20 μg/mL (pediatrics)","i":"定量血清中Gentamicin之濃度作為臨床治療藥物Gentamicin血中藥物濃度監控之依據。","cl":"Gentamicin為胺基甘類(aminoglycoside)的抗生素，主要用於革蘭氏陰性菌的生長，廣泛被使用且毒性較低。使用方式可為肌肉或靜脈注射，肌肉注射後或靜脈注射完全後60分鐘可達藥物最高濃度(Peak)。\n因Gentamicin安全和有效血清濃度範圍很窄，長時間暴露於高濃度可能導致腎功能損害或耳毒性，又因Gentamicin藥物濃度取決於患者體積和藥物的代謝效率，因此為確保病人安全且有效的治療，必須監測血清中Gentamicin濃度。","tags":["腎臟","藥物/毒物監測"]},{"n":"Glucose (Blood)","c":"FBIGAC、FRCGAC、FBIGPC、FRCGPC、FBIGSP、FRCGSP、FRCPOC、FCCGAC、FCCGPC、FCCGLU、FBIGACFBIGACA","p":"09005C(50點)或09140C(50點)","r":"是","ct":"03號綠頭管(Lithium Heparin)；","d":"全血2.0 mL","g":"生化免疫組","t":"急診可","m":"Hexokinase-UV/NAD (End reaction)","rv":"(1)飯前血糖：70~100 mg/dL；正常空腹血糖＜100 mg/dL，疾病性空腹血糖100~125 mg/dL，糖尿病診斷≧126 mg/dL。\n(2)飯後血糖：70~140 mg/dL。\n(3)隨機血糖：＜140 mg/dL。","i":"定量血清或血漿葡萄糖濃度，協助診斷高血糖症(hyperglycemia)或低血糖症(hypoglycemia)以及糖尿病(diabetes mellitus)之診斷與治療追蹤。","cl":"血液中主要的醣類為葡萄糖(Glucose)，Glucose為人體主要能量來源，進行代謝於肝臟、肌肉中，有些細胞也有自行代謝的功能。血液中葡萄糖不正常高即稱為高血糖(hyperglycemia)，不正常低即稱為低血糖(hypoglycemia)，因此葡萄糖的測量可以用來診斷和治療監測碳水化合物代謝異常，包括糖尿病(diabetes mellitus, DM)、新生兒低血糖症(neonatal hypoglycemia)、原發性的低血糖症(idiopathic hypoglycemia)和胰島細胞癌(pancreatic islet cell carcinoma)。\n糖尿病(DM)是國人位居十大死因之ㄧ，每年近萬人因糖尿病死亡，根據國民健康署統計，全國約有200多萬名糖尿病的病友，且每年以25,000名的速度持續增加。American Diabetes Association對於糖尿病(diabetes mellitus)診斷標準空腹血漿血糖≧126 mg/dL、口服葡萄糖耐受試驗第2小時血漿血糖≧200 mg/dL或典型的高血糖症狀(多吃、多喝、多尿與體重減輕)且隨機血漿血糖≧200 mg/dL。\n新生兒低血糖症(neonatal hypoglycemia)是因新生兒肝醣存量較少，且腎上腺未成熟，因此剛出生時血糖濃度較低。","tags":["糖尿病"]},{"n":"Glucose (Body fluid)","c":"FBIGLU、FCSGLU、FRBGLU","p":"09140C(50點)","r":"是","ct":"36號15mL無菌試管，得以42號紅頭塑膠管或21","d":"體液或CSF 1.5 mL","g":"生化免疫組","t":"急診可","m":"Hexokinase-UV/NAD (End reaction)","rv":"(1)CSF40~70 mg/dL (Adults)、60~80 mg/dL (Child)；\n(2)Pleural Effusion: Glucose (pleural eff.) to glucose (serum) ratio <0.5 for rheumatoid pleuritis and grossly purulent parapneumonic exudate Pericardial：＜40.00 mg/dL for exudate(exudate) \n(3)Synovial fluid：(A)Serum-Synovia differentia: Normal and noninflammatory disease difference, ＜10.00 mg/dL (B)Septic arthritis, difference ranges from 20-60 mg/dL Pleural fluid： Glucose (pleural eff.) to glucose (serum) ratio ＜0.5 for rheumatoid pleuritis and grossly purulent parapneumonic exudates.","i":"定量體液或腦脊髓液中葡萄糖的濃度，協助臨床區分是否為細菌性感染及滲出液或漏出液。","cl":"正常腦脊髓液的葡萄糖與血清葡萄糖比值約為0.6，腦脊髓液的葡萄糖下降常見於細菌性腦膜炎、分支桿菌或黴菌感染CNS腦膜炎，但於腦膜腫瘤、蛛網膜下腔出血和CNS結節疾病亦會下降。於病毒性感染CNS，CSF glucose濃度於正常範圍區間。\n於胸水(Pleural Effusion)或腹水(Ascites)，可利用胸水或腹水的Glucose來區分滲出液(Exudate)或漏出液(Transudate)，滲出液glucose略低於血清glucose，漏出液glucose約等於血清glucose，且主要下降於細菌感染、惡性腫瘤、細菌性、結核性滲出液等。\n於關節液(synovial fluid)，正常關節液glucose略低於血清glucose 10 mg/dL，明顯下降於發炎、膿毒性關節炎(septic joint)。","tags":["感染/敗血症","腫瘤標記","結核/呼吸道"]},{"n":"Glucose(Random, Pre-operation)","c":"FRCPOP","p":"09005C(50點)","r":"否","ct":"03號綠頭管(Lithium Heparin)，得","d":"全血2.0 mL","g":"生化免疫組","t":"急診可","m":"Hexokinase-UV/NAD (End reaction)","rv":"＜140 mg/dL","i":"(1)定量血清或血漿葡萄糖濃度，協助糖尿病患者之診斷及治療監控；\n(2)本檢驗醫令限開刀前病人之高血糖症(hyperglycemia)篩檢用。","cl":"血液中主要的醣類為葡萄糖(Glucose)，Glucose為人體主要能量來源，進行代謝於肝臟、肌肉中，有些細胞也有自行代謝的功能。所以一般所指的血糖即指Glucose葡萄糖的測量是用來診斷和治療碳水化合物代謝異常，包括糖尿病、新生兒的低血糖症、原發性的低血糖症和胰島細胞癌。American Diabetes Association指引說明空腹血漿血糖大於126 mg/dL可作為糖尿病之診斷。\n新生兒肝醣存量較少，且腎上腺未成熟，因此血糖濃度較低。","tags":["糖尿病"]},{"n":"Glucose-6-phosphate dehydrogenase","c":"FBIG6P","p":"09097B(250點)","r":"是","ct":"04號紫頭管(K2EDTA tube)、13號微量","d":"全血2 mL；新生兒最少採足13號微量紫頭管(K2EDTA ","g":"生化免疫組","t":"其他","m":"Enzymatic method","rv":"Neonate (age＜7 days)：12.5-21.6 U/gHb; Children (3 m -12 yrs)：8.8-18.4 U/gHb; Adults：6.4-12.9 U/gHb; Reference range for infants (Age, 7 days~3 months) is not available. Please follow up after the age of 3 months.","i":"輔助診斷G6PD缺乏症及帶因子檢查。","cl":"新生兒期之臨床上的重要性，主要與高膽紅素血症有關。依台灣過去的研究顯示，新生兒高膽紅素血症的患者中，約有 三分之一為G6PD缺乏症之患者。而這其中約有百分之三十的患者因發生核黃疸，而導致聽力障礙、手足徐動症或嚴重之心智障礙等後遺症，甚至死亡。葡萄糖-6-磷酸去氫?缺乏症(G6PD deficiency)，俗稱蠶豆症，此酵素之基因位於X染色體上，為一性聯遺傳的疾病，男性發病率高於女性。統計顯示，台灣每百名男性新生兒中，就有三人具有蠶豆症體質。此類病人在接觸某些藥物或感染時，易引起溶血性貧血，出現虛弱、黑尿、鞏膜黃膽等現象。但患者之臨床表現（含預後）非常不一致，國內外專家學者都一致認定此種缺乏症其臨床表現之不一致是因為導致此病之分子缺損不一樣有關。是否患有蠶豆症，可直接檢驗紅血球的葡萄糖-6-磷酸去氫?的活性得知，但此檢驗並不能檢查出婦女是否為隱性帶基因者？除非是作基因型的檢查或生過有蠶豆症的小孩才會知道自己為隱性帶基因者。婦女若確定自己是隱性帶基因者，在懷孕時應該避免食用或接觸引起急性溶血的物品，因其所懷的男性胎兒會有一半的機會為蠶豆症體質。","tags":["肝臟/膽道","貧血/血液疾病"]},{"n":"Gluten麩質/麵筋","c":"FALGLU","p":"30022C(1620點)","r":"是","ct":"03號綠頭管(Lithium heparin)","d":"全血4.5 mL","g":"生化免疫組","t":"其他","m":"螢光酵素免疫分析法(Fluorescence enzyme immunoassay, FEIA","rv":"＜0.35 kUA/L(Class 0)；參考值備註：0.35~0.69 kUA/L(Class I)、0.70~3.49 kUA/L(Class II)、3.50~17.49 kUA/L(Class III)、17.5~52.49 kUA/L(Class IV)、52.5~99.99 kUA/L(Class V)、≧100 kUA/L(Class VI)。","i":"定量分析特異性過敏原IgE之濃度，協助診斷IgE媒介之過敏疾病。","cl":"過敏性疾病大約佔全世界人口30%。過敏反應主要分為四型，其中過敏原引起主要為第一型過敏反應，為外因性氣喘、花粉熱或異位性濕疹的病人，當第一次接觸過敏原，症狀會立即發作，免疫系統會產生對應過敏原之過敏原特異性IgE抗體，其會循環於血液中並接合於mast cell上，當第二次接觸相同過敏原時，會使mast cell產生去顆粒作用，使細胞內之發炎性物質，例如：histamine、serotonin等，釋放至細胞外，造成流鼻水、打噴嚏等臨床症狀產生，嚴重者甚至產生休克。可藉由檢測血液中之引起過敏相關之特異性抗體IgE(如花粉、動物毛屑、塵?及家塵等)，此可輔助了解引起過敏之過敏原種類，仍需配合其它臨床證據一起判斷。","tags":["過敏"]},{"n":"Glycated albumin (醣化白蛋白)","c":"FBIGAL","p":"09139C(200點)","r":"否","ct":"02黃頭管(Serum separator tub","d":"3.0 mL全血","g":"生化免疫組","t":"1週以上","m":"酵素法Ketoamine oxidase(KAOD)","rv":"11.0-16.0%","i":"(1)糖尿病合併慢性腎病變。\n(2)因血液疾病導致HbA1c無法反映血糖控制者。\n(3)懷孕糖尿病患及妊娠糖尿病患。\n(4)血糖數值顯示控制不良，但HbA1c數值仍於良好範圍者。\n(5)禁忌症：血中白蛋白濃度<3g/dL。","cl":"醣化白蛋白(Glycated albumin, GA)為葡萄糖與白蛋白結合。醣化白蛋白及醣化血色素(HbA1c)均可作為糖尿病治療之監控指標。醣化血色素可協助評估評估過去3個月內血糖值變化；醣化白蛋白濃度治療後1星期即可看到改變。\n以下疾病會明顯影響白蛋白和血紅素的半衰期，可能影響檢測值：醣化白蛋白-腎病、肝硬化和甲狀腺功能障礙；醣化血色素：貧血、腎衰竭和肝硬化。\n目前臨床較常使用醣化血色素協助躺療併治療監控，但當患者具有變異血紅素或其他血液病導致紅血球半衰期變短，影響血紅素糖化過程時，可能造成醣化血色素偽低；變異血紅素也可能干擾特定醣化血色素檢驗方法。此類患者建議改用醣化白蛋白監控糖尿病治療療效。","tags":["肝臟/膽道","腎臟","糖尿病","甲狀腺","貧血/血液疾病"]},{"n":"Gonococcus culture (淋病奈瑟氏菌培養)","c":"FMIGON","p":"13007C(200點)","r":"是","ct":"35號50mL無菌試管","d":"(A)\t液體檢體：1mL以上\r\n(B)\t無法抽取之檢體：不限","g":"微生物組","t":"其他","m":"菌名鑑定：VITEK MS微生物鑑定質譜儀、VITEK 2自動分析儀","rv":"Not isolated","i":"分離與檢測檢體中的細菌","cl":"(1)\t淋病奈瑟氏菌為生殖道檢體致病菌\n(2)\t在男性會引起急性尿道炎、副睪炎、前列腺炎、尿道周圍腫瘤等疾病。\n(3)\t在女性會引起輸卵管炎、子宮內頸感染、子宮外孕、骨盆炎及不孕等。\n(4)\t若孕婦感染淋病奈瑟氏菌，在生產過程可能會垂直感染給新生兒，造成新生兒眼炎。\n(5)\t在同性戀或雙性戀者，可能同時會有咽喉及直腸淋病奈瑟氏菌感染。","tags":["腫瘤標記"]},{"n":"GOT (AST)","c":"FBIGOT、FRCGOT","p":"09025C(50點)","r":"是","ct":"03號綠頭管(Lithium Heparin)","d":"全血3.5 mL","g":"生化免疫組","t":"急診可","m":"UV/NADH (Rate method)","rv":"15~41 U/L","i":"定量血清或血漿中GOT(AST)的活性，協助肝臟及心臟等疾病之診斷。","cl":"血清AST係為催化胺基酸與酮酸兩者間胺基轉移的酵素之一。大量存在於肝臟、心臟組織，肌肉、腎臟、胰臟也存在中等量的 AST， 當這些器官受損時，AST 會釋放於血液，而造成血液的 AST 上升，於肝臟疾病診斷AST較ALT不具專一性。AST於心肌梗塞後6~8小時血清AST會開始上升，48小時開始降低至正常範圍，AST對心肌梗塞不具專一性。\nAST顯著增加於急性病毒肝炎、中毒性肝炎，中度增加於肝外膽道阻塞、肝內膽阻塞、慢性活動性肝炎、心肌梗塞，輕度上升酒精性脂肪肝、肝硬化、膽管性硬化、胰臟炎、降低於尿毒症等。","tags":["肝臟/膽道","心臟/心血管"]},{"n":"GPT (ALT)","c":"FBIGPT、FRCGPT","p":"09026C(50點)","r":"是","ct":"03號綠頭管(Lithium Heparin)得用","d":"全血3.5 mL","g":"生化免疫組","t":"急診可","m":"UV/NADH (Rate method)","rv":"11~40 U/L","i":"定量血清或血漿中ALT的活性，協助肝臟疾病之診斷。","cl":"ALT 是一種轉氨?，藉由轉氨作用催化α-酮酸逆轉化成氨基酸。ALT在肝臟中的活性是心臟和骨骼肌的10倍左右，因此血清中ALT活性升高將被視為是肝實質病變的指標。ALT存於肝臟細胞之細胞質中，血清ALT升高表示肝細胞膜將被破壞。ALT於臨床對肝臟疾病的診斷其敏感性比AST好。若活性高於參考值上限範圍50倍時，一般表示為急性病毒性肝炎。由於毒性侵入(包括乙?氨基酚和四氯化碳)將會導致急性肝浸潤和急性肝臟壞損。在各種臟疾病中包含肝炎、單核細胞增多症和肝硬化中可見血清中顯著的ALT升高。病毒性肝炎和其他肝臟疾病未發展出明顯臨床徵狀時(如黃疸)其血清ALT可能已升高。若高於參考值上限15倍時，表示可能因病毒或中毒或循環方面引起的急性肝細胞壞死。而肝硬化或 肝外膽阻塞其ALT也可能會升高。在攝入酒精或藥物…等(包括青黴素、水楊酸或鴉片製劑) 也將可能觀察到ALT輕微或中度升高。","tags":["肝臟/膽道"]},{"n":"Gram stain","c":"FCSGRA、FRBGRA、FMIGRA","p":"13006C(45點)","r":"是","ct":"36號15 mL無菌試管","d":"檢體量未限定","g":"微生物組","t":"急診可","m":"鏡檢","rv":"Not found","i":"作為細菌感染之診斷","cl":"從無菌檢體中抹片發現有微生物，表示由該菌引起之感染。","tags":["其他"]},{"n":"Group A Streptococcus DNA (A型鏈球菌核酸擴增試驗)","c":"FVPSTA","p":"12182C(1000點)","r":"是","ct":"# 40 Strepto-A專用拭子，(採檢前請","d":"不適用","g":"微生物組","t":"其他","m":"恆溫核酸擴增技術(Isothermal nucleic acid amplification technology)","rv":"Not detected","i":"A 型鏈球菌是引發咽喉炎最重要的病原體。利用恆溫核酸擴增技術(Isothermal nucleic acid amplification technology)檢測A 型鏈球菌(化膿性鏈球菌)，咽拭子樣本中的A型鏈球菌核酸，有助於快速區別A型鏈球菌感染。","cl":"(1)不能區分活的及死的細菌。\n(2)未被證實其性能可用於監測治療A型鏈球菌後的效果。\n(3)無法區別是否為A型鏈球菌感染或無症狀帶原。\n(4)如果結果為陰性並且臨床症狀持續存在，或者有急性風濕熱 (ARF）的症狀，則需要進一步執行培養。","tags":["其他"]},{"n":"Group B streptococcus culture(cervical & vaginal swabs）","c":"FMISTB、FMISTBT","p":"66(國健署補助碼)","r":"是","ct":"#37.嗜氧拭子","d":"陰道拭子一支，肛門拭子一支","g":"微生物組","t":"其他","m":"VITEK MS微生物鑑定質譜儀","rv":"No growth","i":"針對懷孕35-37週之孕婦進行B型鏈球菌篩檢，以即早治療，避免帶有B型鏈球菌的母親於生產時，胎兒經過產道而被感染。","cl":"對新生兒而言，Group B streptococcus是敗血症和腦膜炎最常見的原因，也是新生兒肺炎常見的病因。通常寶寶受到感染的來源來自於媽媽的產道，GBS也會引起早產、死產或是流產的問題。","tags":["感染/敗血症","結核/呼吸道"]},{"n":"Growth hormone","c":"FENGRO","p":"09108C(200點)","r":"是","ct":"03號綠頭管(Lithium Heparin)。","d":"全血3.5 mL","g":"生化免疫組","t":"2天","m":"免疫酵素冷光分析法(immunoenzymatic assay, sandwich, one step)","rv":"Female：0.010-3.607 ng/mL(年齡21~73歲，95% Reference interval)；\nMale：0.003-0.971 ng/mL(年齡18~66歲，95% Reference interval)。","i":"定量偵測人類血清生長激素的含量，以輔助診斷及治療腦下垂體前葉的疾病。","cl":"血清中人類生長激素的濃度在24小時內會有顯著的不同，這是因為人類生長激素分泌的短暫增加或規律性，以及顯著的24小時週期及睡眠相關的改變，都會影響人類生長激素的分泌。此外，許多的環境因素以及代謝因素(不限於這些)例如：營養的攝取、運動、生理壓力、心理沮喪、外傷以及年齡等，都會影響人類生長激素的分泌及清除，進而影響到人類生長激素在血清中的濃度。利用傳統的RIA或是IRMA免疫分析，來測定基礎的血清人類生長激素濃度，經常是無法測得的。Ultrasensitive hGH檢測的敏感度可測得低至0.005 ng/mL，可用來區分不同族群間的差異，這是之前的方法無法測得的。超敏感的人類生長激素的測定，可在研究生長激素體內流程中，提供有用的幫助。\n由於低濃度及顫動式的分泌人類生長激素，刺激性的檢測是最常用來評估人類生長激素缺乏的方法。刺激性的檢測包含利用藥物來刺激腦下垂體生長激素細胞，使其分泌人類生長激素。胰島素、clonidine、arginine、L-多巴胺、生長激素分泌荷爾蒙以及propranolol都可用來刺激人類生長激素的分泌。人類生長激素的分泌若無法達到高峰值，就表示人類生長激素是缺乏的。\n生長激素的過量(肢端肥大症)，可在人類生長激素上升的個體中，利用抑制測驗來測定。抑制測驗是先建立一個高血糖的狀態，然後測量人類生長激素濃度的改變。在高血糖時若無法抑制人類生長激素，就表示人類生長激素的分泌過量。人類生長激素的偵測可用來診斷及治療腦下垂體前葉的疾病。","tags":["荷爾蒙/內分泌"]},{"n":"Haptoglobin","c":"FBIHAP","p":"12046B(275點)","r":"是","ct":"02號5 mL黃頭管(Serum separato","d":"全血2 mL","g":"生化免疫組","t":"24小時","m":"免疫比濁法(Immunoturbidimetric assay)","rv":"44.0~215.0 mg/dL (Adults)","i":"定量血清中haptoglobin，協助血管內溶血之診斷；小孩在正常生理haptoglobin濃度較低，因此不適用於血管內溶血疾病之診斷。","cl":"當紅血球溶解時會釋放hemoglobin，Haptoglobin會與hemoglobin形成haptoglobin –hemoglobin complex (Hp-Hb)，此複合物快速自血液中被移除並會在肝細胞中沉澱，其半衰期低於10分鐘。血色素被酵素代謝後約三天會釋放出haptoglobin。當發生血管內溶血時，大量釋放出hemoglobin造成血液中haptolobin濃度下降，嚴重溶血時，haptoglobin快速被消耗殆盡。小孩血液中haptoglobin濃度較低，因此不適用於評估溶血。游離haptoglobin濃度降低表示血管內溶血的發生，故測定haptoglobin可以評估血管內溶血的嚴重程度。\n結合球蛋白是一種急性期反應物。出現急性炎性、手術、心肌梗塞、感染或惡性腫瘤，血清濃度會升高。結合球蛋白與游離血紅蛋白在血漿中結合。血紅蛋白/結合球蛋白複合物由網狀內皮系統循環除去。結合球蛋白濃度降低普遍顯示紅血球的破壞。當大量體液流失或低分子重量血漿蛋白流失時，結合球蛋白濃度可能在燒傷和腎病綜合症的情況出現時大量增加。","tags":["心臟/心血管","腫瘤標記","貧血/血液疾病"]},{"n":"Hazelnut榛果","c":"FALHAZ","p":"30022C(1620點)","r":"是","ct":"03號綠頭管(Lithium heparin)","d":"全血4.5 mL","g":"生化免疫組","t":"其他","m":"螢光酵素免疫分析法(Fluorescence enzyme immunoassay, FEIA)","rv":"＜0.35 kUA/L(Class 0)；參考值備註：0.35~0.69 kUA/L(Class I)、0.70~3.49 kUA/L(Class II)、3.50~17.49 kUA/L(Class III)、17.5~52.49 kUA/L(Class IV)、52.5~99.99 kUA/L(Class V)、≧100 kUA/L(Class VI)。","i":"定量分析特異性過敏原IgE之濃度，協助診斷IgE媒介之過敏疾病。","cl":"過敏性疾病大約佔全世界人口30%。過敏反應主要分為四型，其中過敏原引起主要為第一型過敏反應，為外因性氣喘、花粉熱或異位性濕疹的病人，當第一次接觸過敏原，症狀會立即發作，免疫系統會產生對應過敏原之過敏原特異性IgE抗體，其會循環於血液中並接合於mast cell上，當第二次接觸相同過敏原時，會使mast cell產生去顆粒作用，使細胞內之發炎性物質，例如：histamine、serotonin等，釋放至細胞外，造成流鼻水、打噴嚏等臨床症狀產生，嚴重者甚至產生休克。可藉由檢測血液中之引起過敏相關之特異性抗體IgE(如花粉、動物毛屑、塵?及家塵等)，此可輔助了解引起過敏之過敏原種類，仍需配合其它臨床證據一起判斷。","tags":["過敏"]},{"n":"HbA1c","c":"FBIGLY、FRCGLY、FBIGLYA","p":"09006C(200點)","r":"是","ct":"Blood／04號紫頭管(K2 EDTA tube","d":"(A)非兒童門診患者，需靜脈血2 mL；\r\n(B)兒童門診患","g":"生化免疫組","t":"2天","m":"(1)非兒童門診：離子交換高效液相層析法(Ion-exchange High Pressure Liquid Chromatography, HPLC)(檢驗測儀器為Bio-Rad D-100 Analyzer)；\n(2)兒童門診：硼酸親合性試驗(Boronate affinity assay)(檢測儀器為Alere Afinion AS100 Analyzer)","rv":"＜6.5%；\n檢驗報告備註：\n(1)糖尿病, ≧6.5%；\n(2)罹患糖尿病風險增加, 5.7～6.4%；\n(3)非懷孕成人糖尿病應控制在＜7%。","i":"(1)醣化血色素與血糖平均濃度及紅血球生命週期相關，因此可作為血糖治療之長期監控指標或是輔助診斷糖尿病。\n(2)醣化血色素不適用於新生兒。\n(3)醣化血色素無法取代血糖監控第一型糖尿病、兒童患者及孕婦之血糖變化。","cl":"血糖分子可自由通透紅血球，與血色素結合，此即為醣化血色素(glycated hemoglobin, HbA1c)。血色素醣化的程度和血糖濃度成正比；因此，醣化血色素的量，可做為血糖控制的指標。紅血球平均壽命為120天，故醣化血色素可視為過去2至3個月血液中葡萄糖濃度的平均指標。對糖尿病的控制而言，應每2至3個月作一次醣化血色素的測量。\n美國糖尿病學會(American Diabetes Association, ADA)及世界衛生組織(WHO)建議HbA1c≧6.5%診斷為糖尿病，HbA1c 5.7-6.4%為糖尿病前期。早期發現及治療可降低發展為第二型糖尿病機率及降低併發症機率。\n下列患者不適用以醣化血色素診斷糖尿病：任何紅血球半衰期縮短的疾病、輸血、顯著的缺鐵性貧血、溶血性貧血(包含遺傳性紅血球增多症)或其他溶血疾病、變異血紅素或地中海型貧血及其他會影響改變紅血球與葡萄糖之代謝速率及鍵結關係的疾病。惡性腫瘤、嚴重肝臟或腎臟疾病。\n兒童門診以Alere Afinion AS100 Analyzer檢測之醣化血色素不可用於下列診斷：\n(1)在懷孕期間以此檢驗診斷糖尿病；\n(2)患者有fetal hemoglobin(HbF>11%)，例如胎兒血紅素遺傳性的永久保存(Hereditary persistence of fetal hemoglobin, HPFH)；\n(4)患有血紅素異常症但紅血球轉換率正常的患者(如鐮刀型貧血徵狀)；\n(5)過去3週內曾接受輸血的患者；\n(6)過去3週內曾接受癌症化療的患者。","tags":["腎臟","糖尿病","腫瘤標記","貧血/血液疾病","輸血/血型"]},{"n":"HbA1c(monitoring)","c":"FRCA1C","p":"09006C(200點)","r":"否","ct":"該項目不適用","d":"(A)有其它採檢項目者，以蝴蝶針完成其它檢驗項目採血後，直接","g":"臨床服務組","t":"其他","m":"硼酸親和性試驗 (Boronate affinity assay)","rv":"(1)糖尿病, ≧6.5%\n(2)罹患糖尿病風險增加, 5.7～6.4%\n(3)非懷孕成人糖尿病應控制在＜7%","i":"(1)醣化血色素與血糖平均濃度及紅血球生命週期相關，因此可作為血糖治療後之長期監控指標。\n(2)本檢驗方法無法做為診斷糖尿病依據，僅可使用於治療後之監測。\n(3)醣化血色素不適用於新生兒。\n(4)醣化血色素無法取代血糖監控第一型糖尿病、兒童患者及孕婦之血糖變化。","cl":"(1)血糖分子可自由通透紅血球，與血色素結合，此即為醣化血色素(glycated hemoglobin, HbA1c)。血色素醣化的程度和血糖濃度成正比；因此，醣化血色素的量，可做為血糖控制的指標。紅血球平均壽命為120天，故醣化血色素可視為過去2至3個月血液中葡萄糖濃度的平均指標。對糖尿病的控制而言，應每2至3個月作一次醣化血色素的測量。\n(2)美國糖尿病學會(American Diabetes Association, ADA)及世界衛生組織(WHO)建議HbA1c≧6.5%診斷為糖尿病，HbA1c 5.7-6.4%為糖尿病前期。早期發現及治療可降低發展為第二型糖尿病機率及降低併發症機率。\n(3)下列患者不適用以醣化血色素診斷糖尿病：任何紅血球半衰期縮短的疾病、輸血、顯著的缺鐵性貧血、溶血性貧血(包含遺傳性紅血球增多症)或其他溶血疾病、變異血紅素或地中海型貧血及其他會影響改變紅血球與葡萄糖之代謝速率及鍵結關係的疾病。惡性腫瘤、嚴重肝臟或腎臟疾病。\n(4)此項檢測不應用來進行下列診斷\n(A)在懷孕期間以此檢驗診斷糖尿病。\n(B)患者有fetal hemoglobin(HbF>11%)，例如胎兒血紅素遺傳性的永久保存(Hereditary persistence of fetal hemoglobin, HPFH)\n(C)患有血紅素異常症但紅血球轉換率正常的患者（如鐮刀型貧血徵狀）\n(D)過去 3 週內曾接受輸血的患者\n(E)過去 3 週內曾接受癌症化療的患者","tags":["腎臟","糖尿病","腫瘤標記","貧血/血液疾病","輸血/血型"]},{"n":"HBcrAg/ HBsAg(Quant.) B型肝炎病毒核心關連抗原(HBcrAg)合併表面抗原(HBsAg)定量檢驗","c":"FSIBCR","p":"14085C (1800點)","r":"否","ct":"02號黃頭管(Serum separator tu","d":"全血3.0 mL","g":"生化免疫組","t":"2天","m":"化學冷光酵素免疫分析法(Chemiluminescent enzyme immunoassay, CLEIA)，Fujirebio Lumipulse G1200","rv":"HBcrAg: <3.0 LogU/mL／<1.0 kU/mL;\nHBsAg(Quant.): <0.0050 IU/mL","i":"定量血清中HBcrAg及HBsAg濃度，協助B型肝炎感染輔助診斷與治療效果監控。","cl":"目前已知在感染慢性B型肝炎過程中，HBV病毒數量會產生改變，且其病毒量與B肝的感染力及治療後的預後(prognosis)是有相關性的。依據研究指出，血清中HBV核心關連抗原(Hepatitis B core-related antigen, HBcrAg)檢測可用來作為HBV感染的標記，且不易受抗病毒藥物及免疫複合體的影響。HBcrAg則有HBeAg、 HBcAg(HBV核心抗原)及具有分子量22Kd的p22cr之稱的HBV前核心蛋白三種。HBeAg、HBcAg與p22cr核心蛋白即使在使用抗病毒藥物(如Lamivudine、Entecavir)抑制HBV DNA合成時，仍能檢測肝內殘存病毒，協助判斷治療效果及停藥時機，並可為慢性肝炎病程提供訊息。HBcrAg測定以血清為檢體，因此比侵入性的肝臟活檢更易於操作且具臨床可行性。\n一般會檢測血液中之HBeAg或血液中之HBV-DNA，然而這些方法具有限制因素，當HBeAg與HBeAb形成免疫複合體時，則無法檢測HBeAg。如在服用lamivudine干安能、adefovir干適能或entecavir貝樂克等抗病毒藥物時，使用諸如PCR(聚合?連鎖反應)和TMA(轉錄介導的擴增)的基因擴增方法，因用藥DNA合成會受到抑制，並會抑制包含HBV DNA的病毒顆粒的釋放，因此，即使肝臟?HBV還存在，使用上述基因擴增法進行的HBV DNA檢測結果有可能呈偽陰性。\nHBsAg定量則能反應HBV DNA及肝內cccDNA濃度，與慢性B型肝炎感染階段高度相關。研究顯示HBsAg可區分不同期的慢性B型肝炎感染，並作為非活動性帶原者的血清標記。此外，HBsAg廣泛應用於B型肝炎病毒感染的輔助診斷及監測，包括判斷患者是否康復或成為慢性帶原者。其定量結果能輔助評估治療反應，監控病程進展，並為治療策略提供依據。\n整體而言，HBcrAg與HBsAg定量檢測結合使用，有助於提升B型肝炎的診療精準度，包括病情評估、治療監控及停藥決策，為臨床醫師提供可靠的參考依據。","tags":["肝臟/膽道","感染/敗血症","肝炎病毒"]},{"n":"HBeAg","c":"FSIHBE、FSIHBEZ","p":"FSIHBE：14035C(250點)；FSIHBEZ：自費","r":"是","ct":"2號黃頭管(Serum separator tub","d":"全血3.5 mL","g":"生化免疫組","t":"其他","m":"化學冷光微粒酵素免疫分析法(Chemiluminescent Microparticle Immunoassay；CMIA), Abbott Alinity i","rv":"S/CO＜1.0(Nonreactive)","i":"定性分析血清中HBeAg，協助B型肝炎之診斷及治療追蹤。","cl":"HBeAg是在感染B型肝炎病毒病人血清中發現的一種小段游離形式peptide。當體內HBsAg昇高之後它會短暫的出現。HBeAg的出現與Dane particles數量(具傳染力之B型肝炎病毒顆粒)呈相關性。血清中出現HBeAg是一種高傳染性的強力指標，包括母親胎兒間及水平之B型肝炎傳染。在早期急性B型肝炎感染和一些慢性帶原者的檢體可被檢測；部分慢性帶原者之血液測不到HBeAg，取而代之出現anti-HBe，此類患者血液中可能測得hepatitis B virus DNA。","tags":["肝臟/膽道","肝炎病毒"]},{"n":"HbH (BCB test)","c":"FHEBCB","p":"08029B(40點)","r":"是","ct":"04-紫頭管","d":"3 mL","g":"血液及組織相容組","t":"其他","m":"Brilliant Cresyl Blue染色法","rv":"0％","i":"觀察是否有Hemoglobin H inclusion，可作為α-thalassemia疾病診斷之參考。","cl":"(1)可協助診斷alpha-0 thalassemia trait (alpha 1及alpha 2 globin基因均有deletion)，alpha-0 thalassemia trait包括HbH disease。\n(2)若alpha-0 thalassemia同時有beta-thalassemia trait或是Hb E時，Hb H inclusion會減少。\n(3)Hb H disease相關之基因缺陷，可為(1 atic assay, sandwich)","rv":"男性：≦0.6 mIU/mL；\n女性：＜5.0 mIU/mL。","i":"協助懷孕之評估或子宮外孕患者之術後追蹤。","cl":"受精卵於子宮壁著床不久後，胚胎滋養層就開始分泌人類絨毛膜促性腺激素。此荷爾蒙可維持黃體釋放類固醇激素，直到胎盤可釋放類固醇激素為止。在正常妊娠過程中，著床後便可測到人類絨毛膜促性腺，於最初六週內每隔1.5~3天呈雙倍上升，人類絨毛膜促性腺激素濃度持續升高至第一孕期(前三個月)，之後於懷孕的剩餘階段慢慢下降。在生產之後，人類絨毛膜促性腺激素的濃度回復到＜5 mIU/mL，通常在生產幾天後，濃度幾乎無法測得。\n人類絨毛膜促性腺激素(hCG)是懷孕的最佳標記，健康未懷孕個體的血液中通常＜5 mIU/mL甚至不可測得。然而，於近停經期及停經後期(peri- and post?menopausal)的婦女，可測得來自於腦垂體的人類絨毛膜促性腺激素。懷孕期間，及低濃度或快速下降代表異常懷孕，如子宮外孕或自發性流產。","tags":["荷爾蒙/內分泌"]},{"n":"HDL-cholesterol","c":"FBIHDL","p":"09043C(200點)","r":"是","ct":"03號綠頭管(Lithium Heparin) 。","d":"全血3.5 mL","g":"生化免疫組","t":"急診可","m":"時間終點反應法(Timed-endpoint method)","rv":"＞40 mg/dL\n檢驗備註：依據美國國家膽固醇教育專案對罹患心血管疾病風險建議：高度風險＜40 mg/dL；低度風險：≧60 mg/dL。","i":"定量血清或血漿中高密度脂蛋白膽固醇的濃度，協助脂質代謝相關疾病之診斷及治療。","cl":"許多流行病學的研究證實，高密度脂蛋白膽固醇與心臟冠狀動脈疾病(coronary artery disease)的危險性之間具有強大、獨立的負相關(inverse association)。目前已發表的報告指出，高密度脂蛋白粒子可藉由攝取和運輸周邊組織的膽固醇至肝臟（反向膽固醇運輸）而使身體免於產生動脈粥狀硬化斑 (atheromatous plaque)。\n美國國家膽固醇教育計畫成人治療第二版(National Cholesterol Education Program Adult Treatment Panel 2；NCEP ATP 2)發行的準則中建議，在高膽固醇血症(hypercholesterolemia)的早期篩檢上應同時量測高密度脂蛋白膽固醇和總膽固醇。\n2001年時NCEP已增加高風險的醫學判斷指數(high-risk medical decision point)至＜40 mg／dL。\n該準則將高密度脂蛋白膽固醇標準分成下列兩種：\n1.＜40 mg／dL，表示有冠狀動脈心臟病的風險。\n2.＞60 mg／dL，表示無冠狀動脈心臟病的風險。","tags":["心臟/心血管"]},{"n":"Helicobacter pylori antigen test (幽門桿菌抗原檢查)","c":"FSTHEP、FSTHEPR(國健署專案)、FSTHEPR1(國健署專案-複檢)","p":"30522C / 376","r":"是","ct":"#89幽門桿菌抗原採便容器","d":"以專用採便棒採檢，約取1/4顆豌豆大小之糞便。","g":"微生物組","t":"其他","m":"免疫層析法（Immunochromatographic assay）","rv":"Negative","i":"(1)出血、幼兒、孕婦、衰老等不適合做胃鏡檢查之消化性潰瘍患者治療前之幽門螺旋桿菌感染鑑定檢查。\n(2)證實為潰瘍併幽門螺旋桿菌感染患者為除菌治療後之療效確認與追蹤，第一次於潰瘍治療(含PPI藥物)停藥後一個月施行一次\n(3)健保支付規範:\n(A)不得同時申報13007C、13018C、28016C、28030C及30512C。\n(B)限試劑抗原屬台灣本土菌株者申報。\n(C)本項檢查採包裹式給付，不論方法皆不得另行申請材料費用。","cl":"(1)幽門螺旋桿菌 (Helicobacter pylori) 是一種存在於胃部及十二指腸的革蘭氏陰性桿菌。全世界一半人口的胃中都有幽門螺旋桿菌的存在，大多數人沒有明顯病徵，但胃壁都有發炎的情形，此症狀稱之為胃炎。潛在性胃炎可引起潰瘍、胃部不適甚至是胃癌。目前已知幽門螺旋桿菌是引發及加重B型胃炎 (慢性活動性胃炎) 的主要致病原。許多研究數據顯示幽門螺旋桿菌在慢性胃炎、胃潰瘍及十二指腸潰瘍及其相關胃部症狀扮演相當重要的角色。\n(2)本檢驗以非侵入性的方式，利用糞便測試幽門螺旋桿菌抗原，可大量快速篩檢患者且能做為早期診斷幽門螺旋桿菌感染的工具。\n(3)本檢驗可快速定性檢測人類糞便檢體中的幽門螺旋桿菌抗原，輔助診斷有腸胃症狀的幽門螺旋桿菌感染患者。","tags":["其他"]},{"n":"Helicobacter pylori C13 breath test(幽門桿菌碳-13呼氣試驗)","c":"FSIC13","p":"30512C (1160點)","r":"是","ct":"80號 幽門螺旋桿菌採集套組","d":"氣體收集管4支(服藥前後各2支)","g":"臨床服務組","t":"3天","m":"Mass Spectrometer","rv":"Negative","i":"協助臨床醫師診斷Helicobacter pylori(幽門螺旋桿菌)感染","cl":"(1)幽門螺旋桿菌(Helicobacter pylori)是一種存在於胃部及十二指腸的革蘭氏陰性桿菌。全世界一半人口的胃中都有幽門螺旋桿菌的存在，大多數人沒有明顯病徵，但胃壁都有發炎的情形，此症狀稱之為胃炎。潛在性胃炎可引起潰瘍、胃部不適甚至是胃癌。目前已知幽門螺旋桿菌是引發及加重B型胃炎(慢性活動性胃炎)的主要致病原。許多研究數據顯示幽門螺旋桿菌在慢性胃炎、胃潰瘍及十二指腸潰瘍及其相關胃部症狀扮演相當重要的角色。 \n(2)PROTO Pylori kit含75mg的碳-13尿素粉末，與檸檬酸、甘露醇、調味料等添加物。是一種非侵襲性檢驗，提供對胃疾患者檢測幽門螺旋桿菌及癒後追蹤，用不具放射性的UBT對病人提供安全的檢測。提供出血、幼兒、孕婦、衰老等不適合做胃鏡檢查之消化性潰瘍患者治療前之幽門螺旋桿菌感染鑑定檢查。為證實潰瘍併幽門螺旋桿菌感染患者為除菌治療後之療效確認與追蹤，建議治療停藥後一個月再施行一次。\n(3)不得同時申報健保碼13018C、28016C、28030C及13007C。","tags":["其他"]},{"n":"Helminthosporium halodes (長蠕孢屬)","c":"FALHEL","p":"30022C(1620點)","r":"是","ct":"03號綠頭管(Lithium heparin)","d":"(A)1~3項：全血3 mL；\r\n(B)3項以上：全血4.5","g":"生化免疫組","t":"其他","m":"螢光酵素免疫分析法(Fluorescence enzyme immunoassay, FEIA)","rv":"＜0.35 kUA/L(Class 0)；參考值備註：0.35~0.69 kUA/L(Class I)、0.70~3.49 kUA/L(Class II)、3.50~17.49 kUA/L(Class III)、17.5~52.49 kUA/L(Class IV)、52.5~99.99 kUA/L(Class V)、≧100 kUA/L(Class VI)。","i":"定量分析特異性過敏原IgE之濃度，協助診斷IgE媒介之過敏疾病。","cl":"過敏性疾病大約佔全世界人口30%。過敏反應主要分為四型，其中過敏原引起主要為第一型過敏反應，為外因性氣喘、花粉熱或異位性濕疹的病人，當第一次接觸過敏原，症狀會立即發作，免疫系統會產生對應過敏原之過敏原特異性IgE抗體，其會循環於血液中並接合於mast cell上，當第二次接觸相同過敏原時，會使mast cell產生去顆粒作用，使細胞內之發炎性物質，例如：histamine、serotonin等，釋放至細胞外，造成流鼻水、打噴嚏等臨床症狀產生，嚴重者甚至產生休克。可藉由檢測血液中之引起過敏相關之特異性抗體IgE(如花粉、動物毛屑、塵?及家塵等)，此可輔助了解引起過敏之過敏原種類，仍需配合其它臨床證據一起判斷。","tags":["過敏"]},{"n":"Hematopoietic stem cell count","c":"FCMSTM","p":"12075B(2000點)","r":"是","ct":"04-紫頭管","d":"3 mL","g":"血液及組織相容組","t":"3天","m":"Immunophenotyping by flow cytometry (ISHAGE protocol)","rv":"Blood\n(1)CD45+ Leukocyte Absolute Count：6469.2+/-1635.2 /μL (Mean+/-SD)\n(2)%CD34+ HPC：0.052+/-0.056％(Mean+/-SD)\n(3)CD34+HPC Absolute Count：2.36+/-1.14 /μL (Mean+/-SD) Apheresis products:N.A.(由血液腫瘤科醫師判讀)","i":"本檢驗可協助執行血液前驅幹細胞(hematopoietic progenitor cells (HPC))之定量分析，凡對於周邊血液或自體分離術之檢體，均可執行此檢驗。","cl":"利用螢光抗體偵測周邊血液或自體分離術檢體內之CD34+幹細胞，使用流式細胞儀可提供精確的定量分析；可應用於自體、異體間之骨髓移植或血液前驅幹細胞之臨床研究。","tags":["移植/免疫"]},{"n":"Hemoglobinopathy and thalassemia screen","c":"FHEHBP","p":"含08028B (Hb F定量)、08029B (Hb H inclusion body)、08030C (Hb EP)、08054B (Hb A2定量)四項，共680點。","r":"是","ct":"04號-紫頭管","d":"3 mL","g":"血液及組織相容組","t":"其他","m":"(1)Hemoglobin electrophoresis: Capillary electrophoresis\n(2)Hb H(BCB test)：supravital staining\n(3)Hb A2及Hb F定量：Capillary electrophoresis","rv":"(1)Hemoglobin electrophoresis:HbH, Bart’s and Hb variant not detected\n(2)HbA2(資料來源:Wong ECC, et al. 2009 meeting of ISLH)\n(A)0-6 days:0.0-0.0%\n(B)7-14 days:0.0-0.4%\n(C)15-45 days:0.0-1.8%\n(D)45days-3months:0.3-2.4%\n(E)3-6 months:1.7-2.7%\n(F)6-9 months:2.0-3.0%\n(G)9-15 months:2.2-3.2%\n(H)15 months-2 years:2.4-3.1%\n(I)2-6 years:2.2-3.2%\n(J)6-17 years:1.9-3.3%\n(K)≧18 years:2.4-2.9%\n(L)beta thalassemia:HbA2>3.0%(相當HPLC>3.5%)\n(3)Hb F(資料來源:Wong ECC, et al. 2009 meeting of ISLH)\n(A)0-6 days:79.4-97.9%\n(B)7-14 days:66.0-98.4%\n(C)15-45 days:49.9-98.4%\n(D)45days-3months:10.3-64.6%\n(E)3-6 months:5.2-34.5%\n(F)6-9 months:1.1-28.5%\n(G)9-15 months:0.2-9.9%\n(H)15 months-2 years:0.0-5.5%\n(I)2-6 years:0.0-1.6%\n(J)6-17 years:0.0-0.0%\n(K)≧18 years:0.0-0.0%\n(4)Hb H(BCB test)：0%","i":"地中海型貧血之篩檢，變異血色素及貧血症診斷。","cl":"正常成人血色素在電泳主要表現為HbA, HbA2, HbF。小孩在出生後HbF逐漸下降而由HbA取代。當HbA2上升時，要考慮beta-thalassemia，但是gamma-delta-beta-thalassemia則除外，HbA2可以下降而HbF上升。Alpha-thalassemia不會有HbA2及HbF異常，但若出現三個alpha-globin基因缺陷時，會使HbH增加，稱HbH disease，甚至可見Hb Bart’s。輕型之alpha-thalassemia只能靠基因檢測確認診斷。國人常見之變異血色素包括:HbE、Hb G-Taichung、Hb G-Chinese、Hb J-meinung及Hb Constant spring等。HbF增加則可能為beta-thalassemia major或HPFH（Hereditary persistence of fetal hemoglobin）。","tags":["貧血/血液疾病"]},{"n":"Herpes simplex virus culture","c":"FVPISO4","p":"14001B(350點)","r":"是","ct":"#35-50mL無菌試管","d":"(A)血液、腦脊髓液、鼻咽抽取液、氣管沖洗液：至少2 mL\r","g":"微生物組","t":"其他","m":"利用細胞株接種檢體，觀察細胞株是否有受感染而產生細胞病變，然後再以免疫螢光抗體染色的方式加以鑑定。","rv":"No virus isolated","i":"協助臨床醫師診斷Herpes simplex virus的感染或疾病","cl":"由檢由檢體中分離出的病毒，表示患者可能有該病毒的感染。此檢驗醫令僅針對懷疑呼吸道病毒感染進行培養與鑑定，可以培養鑑定出的病毒種類，請見其他資訊。","tags":["感染/敗血症"]},{"n":"HIV Ag/Ab combo test(screening test)","c":"FSIHIV、FOTHIV、FSIPRE、FSIAHI、FSIHIVA、FSIHIVN、FSISTD、FSIDRA、FSIHIVH","p":"14082B(320點)、E3046C(280點)、自費","r":"是","ct":"2號黃頭管(Serum separator tub","d":"全血3.5 mL","g":"生化免疫組","t":"2天","m":"化學冷光微粒酵素免疫分析法(Chemiluminescent Microparticle Immunoassay；CMIA)(Combo test), Abbott Alinity i","rv":"Nonreactive(S/CO＜1.0)","i":"定性測試人體血清或血漿中的HIV p24抗原及人類免疫缺乏病毒第一型及/或第二型(HIV-1/HIV-2)之抗體。可用於輔助診斷HIV-1/HIV-2感染及作為捐贈血液及血漿之篩檢試驗。檢測結果無法區別HIV p24抗原、HIV-1抗體或HIV-2抗體之個別反應結果。","cl":"後天免疫缺乏症候群(AIDS)是由兩型人類免疫缺乏病毒引起，統稱為HIV。\nHIV為引起AIDS之致病因，HIV-1可經由性接觸、暴露於血液或血液產品而感染、或由受感染之母親於產前傳染給胎兒或於生產前後傳染給新生兒。AIDS患者及感染HIV但無症狀的人幾乎都可偵測出對抗HIV之抗體，而AIDS患者及血清陽性的人往往可藉由培養或放大病毒RNA及/或前病毒(proviral)DNA來偵測出病毒感染。\nHIV-1依病毒演化分析分為M(major) group、N(non-M, non-O) group及O(outlier) group。M group病毒已蔓延全世界，造成AIDS全球性流行。相反地，N group和O group則相當罕見且流行於中西非；不過，歐洲和美國已鑑定出有O group感染。HIV-1 M group由基因亞型(A, B, C, D, F, G, H, J, 和 K)及流行重組型(circulating recombinant forms，CRFs)組成。HIV-1亞型和流行重組型之地理分布和地區性各不相同。所有亞型和許多重組型皆存在於非洲，其中西非和中西非以CRF02_AG病毒株為主，中東非以A、C和D亞型為主，而南非則以C亞型為最多。HIV-1 B亞型在美國、歐洲、日本、和澳洲最多。不過在歐洲，新型HIV感染有顯著比例是由非B亞型所引起。在亞洲，C亞型出現於印度，CRF01_AE（過去稱為E亞型）和B亞型出現於泰國和東南亞；南美洲則以B和F亞型為主。\n第二型人類免疫缺乏病毒(HIV-2)在結構形態學、基因結構、細胞感染趨性、體外細胞病變作用、傳染途徑傳播途徑及引起AIDS之能力與第一型人類免疫缺乏病毒(HIV-1)類似，但HIV-2的致病力比HIV-1小，且HIV-2感染的潛伏期較長、疾病進行較慢、病毒效價較低及水平和垂直感染的比率較低。HIV-2流行於西非，但感染率較HIV-1低，在美國、歐洲、亞洲及非洲其他地區都已被鑑定出來。HIV-2分為A到G七種基因亞型，其中A及B亞型造成最多感染。\nHIV感染血清檢測的主要免疫性蛋白質及抗原標的為HIV病毒穿膜蛋白(TMP)。對抗TMP的抗體(anti-TMP)都是在HIV感染個體血清轉換時最先出現的；由HIV感染之無症狀期及症狀期幾乎都有抗TMP之抗體存在可證明抗TMP反應在整個病程當中一直都相當強。ARCHITECT HIV Ag/Ab Combo試劑以5種重組抗原及2段衍生自原始TMP序列之合成胜?代表來自HIV-1 M及O group及HIV-2之TMP，其中包含三對TMP是因為HIV-1當中及HIV-1與HIV-2之間具有基因多樣性。\n血清學研究顯示，雖然HIV-1與HIV-2之核心抗原有許多共同的抗原決定位置，但套膜醣蛋白較少發生交叉反應。同一group或同一型內的病毒株所誘發之抗TMP（或部分TMP）抗體與來自不同group或不同型的病毒株之TMP（或部分TMP）可能發生良好或不良的反應，或甚至完全無反應，但HIV-1 N group所誘發之抗體例外。\n    在HIV感染不久後、血清轉換前，血清或血漿檢體中便可測得HIV抗原。最常被用來作為抗原血症指標的HIV結構蛋白為核心蛋白p24，ARCHITECT HIV Ag/Ab Combo分析利用試劑中的抗HIV p24抗體來偵測血清轉換前之HIV p24抗原，以藉此減少血清轉換之空窗期，並提高HIV感染之早期偵測力。","tags":["感染/敗血症"]},{"n":"HLA- A、B、C Typing","c":"FOTHA1","p":"HLA-AB:12087B(5053點)，HLA-C:12176B(3285點)","r":"是","ct":"07 6 mL紫頭管(K2 EDTA tube)","d":"血液（全血）：6 mL","g":"血液及組織相容組","t":"急診可","m":"Reverse SSO（Reverse Sequence Specific Oligonucleotide Probes）","rv":"Not applicable (可參考國人HLA typing Allele Frequency)","i":"器官移植、一等親之間的骨髓移植或親子鑑定","cl":"(1)HLA為位於chromosome 6短臂的許多loci上，衍製成許多不同構造之分子。HLA-A，-B，-C，屬於class I分子；HLA-DR，-DQ，-DP屬於HLA-D，為class II分子。\n(2)HLA typing於臨床主要應用於器官移植，受贈者及捐贈者均需執行HLA typing以期找到最適合的移植配對。此外，HLA也可以應用在親子鑑定上。\n(3)最近更在主動免疫導致疾病上發現種族上的關聯性，可見HLA是多變異性及多樣性（polymorphism）的基因系統，為研究族群關係很好之材料。","tags":["移植/免疫"]},{"n":"HLA antibody Identification","c":"FOTSHA","p":"自費：31,000","r":"是","ct":"2號5mL黃頭管（Serum Separator","d":"5 mL全血","g":"血液及組織相容組","t":"1週以上","m":"HLA antigen-coated fluorescent bead assay(Luminex platform)","rv":"Not detected","i":"(1)移植前：提供捐贈者選擇參考，檢測受贈者preexisting(移植前)Donor specific antibody (DSA)。\n(2)移植後：監測受贈者移植後產生捐贈者DSA情形，以判定器官發生rejection原因，建議執行時機如下：\n(A)Positive HLA antibody screen\n(B)Pre-transplant sensitization\n(C)Antibody mediated allograft rejection\n(D)Pre-transplant desensitization","cl":"(1)Donor specific antibody (DSA)常見於產生移植後排斥反應之患者，且與移植失敗有顯著之相關。\n(2)本檢驗MFI cut-off值引用之參考文獻為\n(A)MFI cutoff of 1000：Clin Kidney J 6: 283–286, 2013\n(B)MFI cutoff of 2000：Transplantation 87: 563-569, 2009","tags":["移植/免疫"]},{"n":"HLA typing (high resolution)","c":"FOTHHT","p":"HLA-AB-high resolution：12087B (5053點)、HLA-C-high resolution：12176B (3285點)、HLA-DRB1-high resolution：12177B (2849點)、HLA-DQB1-high resolution：12177B (2849點)","r":"否","ct":"07號-6 mL紫頭管(K2 EDTA tube)","d":"兩支全血6 mL","g":"血液及組織相容組","t":"其他","m":"sequenced based typing (SBT) and polymerase chain reaction (PCR)","rv":"Not available (可參考國人HLA typing Allele Frequency)","i":"器官移植、一等親之間的骨髓移植","cl":"(1)HLA為位於chromosome 6短臂的許多loci上，衍製成許多不同構造之分子。HLA-A，-B，-C，屬於class I分子；HLA-DR，-DQ，-DP屬於HLA-D，為class II分子。\n(2)HLA typing於臨床主要應用於器官移植，受贈者及捐贈者均需執行HLA typing以期找到最適合的移植配對。此外，HLA也可以應用在親子鑑定上。\n(3)最近更在主動免疫導致疾病上發現種族上的關聯性，可見HLA是多變異性及多樣性（polymorphism）的基因系統，為研究族群關係很好之材料。","tags":["移植/免疫"]},{"n":"HLA-A*31:01 allele","c":"FOT3101","p":"12176 B(3285)","r":"是","ct":"07號6 mL紫頭管(K2 EDTA tube)","d":"6 mL","g":"血液及組織相容組","t":"其他","m":"(1)Method 1：Reverse Sequence Specific Oligonucleotide Probe(SSO)\n(2)Method 2：Sequencing based typing(SBT)","rv":"HLA-A*31：01 allele frequency: 1.8% (Reference：Taiwan Tzu Chi Cord Blood Bank)","i":"用於檢測病人是否具HLA-A*31：01，此HLA型別與carbamazepine引發之藥物過敏不良反應有高度相關性。","cl":"(1)在對病患開立 carbamazepine 前，建議進行HLA-A*31：01的基因篩檢，若病患為HLA-A*31：01陽性，醫師需謹慎評估是否需使用替代藥物，避免病患發生藥物不良反應症狀。\n(2)少數HLA-A*31：01陰性患者服用carbamazepine後，仍會產生輕度至重度不等的藥物過敏反應。\n(3)無論病患藥物過敏相關基因為何，醫護人員均需謹慎評估病人服藥後的反應，觀察病患是否發生藥物不良反應症狀。","tags":["過敏"]},{"n":"HLA-B*13:01 allele","c":"FOT1301","p":"12176 B(3285)","r":"是","ct":"07號6mL 紫頭管（K2 EDTA tube）","d":"6 mL","g":"血液及組織相容組","t":"其他","m":"(1)Method 1：Reverse Sequence Specific Oligonucleotide Probe(SSO)\n(2)Method 2：Sequencing based typing(SBT)","rv":"HLA-B*13:01 allele frequency: 5.3% (Reference：Taiwan Tzu Chi Cord Blood Bank)","i":"用於檢測病人是否具HLA- B*13:01，此HLA型別與抗菌製劑(Dapsone)引發之藥物過敏不良反應有高度相關性。","cl":"抗菌製劑(Dapsone)是治療漢生病、?疹性皮炎等疾病的藥物，少數病人服用後可能發生嚴重的藥物過敏反應如：斑丘疹性皮炎、Steven-Johnson Syndrome(SJS)、Toxic Epidermal Necrolysis(TEN)和Drug Reaction with Eosinophilia and Systemic Symptoms(DRESS)。因此藥而發生嚴重過敏的病人多帶有人類白血球抗原基因型HLA-B*13:01。故可於病人服用此藥物前，為病人執行HLA-B*13:01基因檢測，預先進行篩選，若病患為B*13:01 positive則應避免使用Dapsone，並更換為其他適合之藥物，降低病患產生藥物過敏不良反應之機率。","tags":["過敏"]},{"n":"HLA-B*15:02 allele","c":"FOT1502","p":"12196B(2648點) ，每人限申報一次。","r":"是","ct":"07號6 mL紫頭管(K2 EDTA tube)","d":"6 mL","g":"血液及組織相容組","t":"其他","m":"(1)Method 1：Reverse Sequence Specific Oligonucleotide Probe(SSO)\n(2)Method 2：Sequencing based typing(SBT)","rv":"HLA-B*15:02 allele frequency: 8% (Reference: Nature 2004; 428: 486)","i":"(1)癲癇症、三叉神經痛、腎原性尿崩症及雙極性之精神疾患初次需使用含醯胺咪?（Carbamazepine）成份藥物前，應檢測病患之HLA-*15:02 allele，以降低發生史蒂文斯–強生症候群（Stevens-Johnson syndrome, SJS）或毒性上皮溶解（Toxic Epidermal necrolysis, TEN）等嚴重皮膚不良反應（Severe cutaneous adverse reactions）之風險。\n(2)已發生史蒂文斯–強生症候群（Stevens-Johnson syndrome, SJS）或毒性上皮溶解（Toxic Epidermal necrolysis, TEN）之患者，有服用醯胺咪?（Carbamazepine）成份藥物，但未曾檢測過HLA-*15:02 allele時。","cl":"(1)HLA-B*15:02基因被發現對於漢族血統者（Han Chinese）因使用抗癲癇藥物－醯胺咪?（Carbamazepine）藥物而引起的史蒂芬強生症候群（Steven-Johnson Syndrome, SJS）及毒性上皮溶解（Toxic Epidermal necrolysis, TEN）有很強關聯性，但與高加索人種族（Caucasian）使用此藥物後引起之SJS與TEN或漢族血統者因使用此藥物引起的皮膚過敏則不相關。而台灣約有8%的人口帶有carbamazepine的過敏基因HLA-B*15:02。\n(2)由文獻指出普遍用來治療癲癇或三叉神經痛的藥物醯胺咪?（carbamazepine）所引起的SJS（下文簡稱CBZ-SJS）佔台灣SJS的20~25%。從病人基因檢測比對的結果顯示，這個危險基因標記具有98.4%的專一性，以及高達99%的檢測靈敏度，可以用來做為用藥前的篩檢標記，避免此嚴重不良反應發生。\n(3)SJS患者皮膚會起水泡、黏膜潰爛，嚴重時全身皮膚黏膜脫落，死亡率達3~15%；即使病人存活了下來，也經常會有眼角膜沾黏受損或其他器官受損的後遺症。在台灣地區，預估每年每百萬人會有八人發生SJS，平均每兩天就會增加一個不幸的病人，相較於歐美地區每年每百萬人的二至三人，台灣SJS的發生率高的驚人，也往往淪為無法解決的醫療糾紛。在長庚醫院治療的SJS患者中，有26%的病例是由抗癲癇藥物醯胺咪?所引起，這個情形也不同於歐美各國主要是由磺胺劑所造成。","tags":["其他"]},{"n":"HLA-B*27","c":"FVPHLA","p":"12086B(1351點)","r":"是","ct":"07 6 mL紫頭管(K2 EDTA tube)","d":"6 mL","g":"血液及組織相容組","t":"1週以上","m":"Reverse SSO（Reverse Sequence Specific Oligonucleotide Probes）","rv":"Absent","i":"臨床症狀疑似僵直性脊椎炎者，可執行此項檢驗。","cl":"HLA-B*27基因與僵直性脊髓炎及類風溼性關節炎具有強烈的相關性，90%僵直性脊椎炎病人會表現HLA-B*27基因。","tags":["自體免疫"]},{"n":"HLA-B*57:01 allele","c":"FOT5701","p":"12176 B(3285)","r":"是","ct":"07號6mL 紫頭管（K2 EDTA tube）","d":"6 mL","g":"血液及組織相容組","t":"1週以上","m":"(1)Method 1：Reverse Sequence Specific Oligonucleotide Probe(SSO)\n(2)Method 2：Sequencing based typing(SBT)","rv":"HLA-B*57:01 allele frequency: 0.3% (Reference：Taiwan Tzu Chi Cord Blood Bank)","i":"用於檢測病人是否具HLA- B*57:01，此HLA型別與抗病毒藥(abacavir)引發之藥物過敏不良反應有高度相關性。","cl":"抗病毒藥(abacavir)是抗HIV-1的藥物，少數病人服用後可能發生嚴重的藥物過敏反應。因此藥而發生嚴重過敏的病人多帶有人類白血球抗原基因型HLA-B*57:01。故可於病人服用此藥物前，為病人執行HLA-B*57:01基因檢測，預先進行篩選，若病患為B*57:01 positive則應避免使用abacavir，並更換為其他適合之藥物，降低病患產生藥物過敏不良反應之機率。","tags":["過敏"]},{"n":"HLA-B*58:01 allele","c":"FOT5801","p":"12213B B(2343點)","r":"是","ct":"07號6mL 紫頭管（K2 EDTA tube）","d":"6 mL","g":"血液及組織相容組","t":"其他","m":"(1)Method 1：Reverse Sequence Specific Oligonucleotide Probe(SSO)\n(2)Method 2：Sequencing based typing(SBT)","rv":"HLA-B*58:01 allele frequency: 20% (PNAS March 15 2005, vol. 102, no.11, 4134-4139 )","i":"(1)HLA-B*58:01為位於第六號染色體上的人類白血球抗原基因。根據研究顯示HLA-B*58:01基因與使用Allopurinol（安樂普利諾）藥物而引起的嚴重皮膚不良反應（Severe cutaneous adverse reactions），包括：史蒂芬強生症候群（Steven-Johnson Syndrome；SJS）及毒性上皮溶解症（Toxic Epidermal Necrolysis；TEN）有高度的相關性。\n(2)經衛生署核准之含Allopurinol（安樂普利諾）成分之藥品，其適應症為：痛風、痛風性關節炎、尿酸結石、癌症或經化學治療產生之高尿酸血症。而台灣族群的HLA-B*58:01基因的盛行率比歐洲族群及日本族群高，故臨床醫師使用此類藥物前，宜考慮檢測患者是否帶有HLA-B*58:01基因，以加強用藥安全。","cl":"(1)Allopurinol為治療痛風及高尿酸的常見用藥，但此藥物有一個相當嚴重的藥物不良反應，就是可能引起Sever cutaneous adverse reaction（SCAR），其中包括：allopurinol hypersensitivity syndrome (AHS)，甚至更罕見的 Steven-Johnson Syndrome (SJS)（死亡率達3-15%）或臨床致死率高達30%的Toxic Epidermal Necrolysis (TEN)。\n(2)在台灣，約有15-20%的人口帶有HLA-B*58:01這個基因，而SJS/TEN 的發生率為每年每百萬人口8例，相較於歐美地區每年每百萬人的二至三人，台灣SJS的發生率高的驚人，為確保用藥安全，首次使用Allopurinol治療之患者建議執行HLA-B*58:01 allele檢驗，以避免其嚴重藥物過敏之風險的發生。","tags":["腫瘤標記"]},{"n":"Homocysteine","c":"FSIHCY","p":"12151B(400點)","r":"是","ct":"血液14號珍珠白蓋頭管(K2EDTA)或02號黃頭","d":"全血2 mL","g":"生化免疫組","t":"其他","m":"競爭性化學冷光微粒酵素免疫分析法(Competitive One-step chemiluminescent Microparticle Immunoassay；CMIA), Abbott Alinity i","rv":"Male: 5.46-16.20 μmol/L (95% central interval)；Female: 4.44-13.56 μmol/L (95% central interval)","i":"定量血漿中之total L-homocysteine，協助臨床診斷及治療hyperhomocysteinemia及homocystinuria。","cl":"Homocysteine會代謝成cysteine或methionine。在依賴維生素B6的轉硫作用（trans-sulphuration）途徑中，homocysteine會不可逆地被代謝為cysteine。大部分的homocysteine藉由葉酸及維生素B12（cobalamin）依賴性酵素methionine合成?催化進行再甲基化作用而形成methionine。當這些反應發生障礙時，homocysteine便會堆積並分泌至血液中。營養和遺傳缺陷是引起Hyperhomocysteinemia之主因。\n高胱胺酸尿症(homocystinuria)是一種罕見的homocysteine代謝酵素遺傳疾病，患者的總homocysteine濃度會有嚴重上升的情形。高胱胺酸尿症病患會出現心智遲緩、早期粥狀動脈硬化及動脈和靜脈血栓栓塞。其他較輕微之遺傳缺陷也會引起總homocysteine濃度中度上升。Homocysteine量升高之高同半胱胺酸血症(hyperhomocysteinemia)和發生心血管疾病的風險增加有關。亦有許多已發表之預測性研究報告探討高同半胱胺酸血症和原本健康的男性和女性發生心血管疾病之間的關聯性，評估指標為急性心肌梗塞、中風、冠狀動脈疾病或死亡率等心血管事件。\n慢性腎病患者由於粥狀動脈性心血管疾病而有很高的罹病率及死亡率，這類病患的血液中經常可發現總homocysteine濃度升高。雖然他們可能缺乏一些參與homocysteine代謝之維生素，但腎臟無法將血液中的homocysteine清除是引起總homocysteine濃度升高的主要原因。","tags":["腎臟","心臟/心血管","凝血/血栓"]},{"n":"HPV genotyping (人類乳突瘤病毒基因分型)","c":"FVPHPG，FVPHPGR(國健署專案)","p":"12182C*2(2000點)","r":"是","ct":"(41) 細胞採檢刷及保存液","d":"無","g":"微生物組","t":"其他","m":"Real-time PCR","rv":"(1)HPV type16：Not detected\n(2)HPV type18：Not detected\n(3)HPV type 45：Not detected\n(4)Other High Risk HPV A：Not detected\n(5)Other High Risk HPV B：Not detected","i":"用以偵測臨床檢體中高風險人類乳突瘤病毒(HPV) DNA(包括14種基因亞型：16、18、31、33、35、39、45、51、52、56、58、59、66和68)。","cl":"人類乳突瘤病毒Human Papillomavirus（HPV）是小型、不具外套膜之雙股DNA病毒（約8000個鹼基對)，於鱗狀上皮細胞的細胞核複製，並引起高度增生損害。HPV感染在性傳染疾病中非常普遍，大多數HPV感染臨床結果為良性且能自發性清除。然而，持續的HPV感染會導致子宮頸癌的發生。已有超過100種不同的HPV基因型被鑑定出來，其中超過40種會感染黏膜及生殖器上皮細胞。感染生殖器的HPV基因型依照其致癌之潛力，一般分為高風險（HR）及低風險（LR）。HR HPV基因型與侵略性的子宮頸癌或者其前兆（高度鱗狀內表皮損害或子宮頸的內上皮贅瘤或原位癌）有關，而LR HPV則引起良性的損害，且與子宮頸癌沒有關聯性。全世界大約有70%侵略性的子宮頸癌是由HPV 16及HPV 18所引起。相較於其他HR HPV基因型，感染HPV 16或HPV 18與更高風險的疾病發展有關聯性。\n與鑑定子宮頸細胞學突變的篩選方法相比，分子檢驗的方法能特異性偵測子宮頸細胞中HR HPV DNA的存在，能潛在地增加子宮頸癌症篩檢項目的靈敏度和效益。且在治療後追蹤和監控疫苗效力方面，使用HPV DNA試驗可有效地將細胞學模稜兩可的病患做分類。\n本檢驗使用體外定性檢測試劑，可放大並偵測由檢體保存液收集之子宮頸細胞中的HPV DNA。14種HPV基因型（HPV 16、18、31、33、35、39、45、51、52、56、58、59、66及68）的偵測方法是透過一組混合引子（針對HPV保留區域之L1基因區段）和單股DNA探針，能區分HPV 16、HPV 18、HPV 45和非HPV 16/18/45的HPV基因型(其他HR HPV)。\nHPV陰性結果不代表不需進行陰道鏡檢查。陰性結果表示HPV DNA的濃度無法測得或是低於偵測的閾值。陽性結果表示任一型高危險度HPV存在或多型同時存在，但是因為病人常同時感染低危險度的HPV，病人若有混合感染的情況，這樣的結果是無法將低危險度的型別排除。此項檢測結果應該只能和病人臨床評估和病史取得的資訊一起解釋。","tags":["腫瘤標記"]},{"n":"hs-Troponin I(高敏度心肌旋轉蛋白-I)","c":"FRCHSI","p":"09099B(450點)","r":"是","ct":"03號綠頭管(Lithium heparin)。","d":"全血3.5 mL","g":"生化免疫組","t":"急診可","m":"雙向免疫酵素冷光分析法(two-site immunoenzymatic assay , sandwich)","rv":"Male≦19.8 ng/L；Female≦11.6 ng/L。\n檢驗備註：\n1.以健康族群第99百分位為閾值(年齡區間21~99歲)時，不分性別為17.5 ng/L，男性為19.8 ng/L，女性為11.6 ng/L，此閾值依據廠商試劑說明書且經實驗室查證。\n2.到院時cTnI基礎值超過17.5 ng/L之病人，經3-6小時再檢測，若差異值大於3 ng/L之AMI臨床診斷效能為敏感性87%、特異性92%、陽性預測值62%、陰性預測值98%。","i":"用來輔助診斷及治療心肌梗塞和心肌受損的疾病。協助不穩定心絞痛(unstable angina )或S-T波段上升之急性冠狀動脈疾病、急性梗塞之評估參考。","cl":"Troponin (I、C和T)是蛋白質複合物的成員，可調節肌肉細胞內肌動蛋白(actin)和肌球蛋白(myosin)之間的鈣介導的相互作用。肌鈣蛋白複合物的這些不同蛋白質的命名源自它們在肌肉中的各自功能收縮。Troponin T將肌鈣蛋白複合物錨定在細絲的原肌球蛋白上，而Troponin Inhibits actomyosin ATPase，而Troponin C是calcium-binding subunit。已鑑定出三種Troponin I (TnI) isoform：一種與快肌骨骼肌相關、一種與慢肌骨骼肌相關及一種與心肌相關。慢速和快速抽動異構體具有相似的分子量每個大約20,000 Da。心臟特異性TnI異構體的分子量約為24,000 Da，在分子的N端含有31個氨基酸的翻譯後尾部。該序列以及與其他兩種isoform序列的42%和45%的不同使得產生高度特異性的單克隆抗體成為可能，而不會與其他非心臟TnI形式發生交叉反應。由於其高組織特異性，cTnI是一種心臟特異性、高度敏感的心肌損傷標誌物。\n診斷急性心肌梗塞 (AMI)：傳統使用的CK-MB，對於偵測心肌損傷的特異性，在很多發炎性肌肉病變，也常會導致CK-MB上升。但Cardiac Troponin I卻不會因肌肉病變而上升，它只存在於心肌當中，所以對於心肌的特異性很高。Cardiac Troponin I在血清中的濃度大約是在胸痛發生後4小時左右開始上升peak在12-16小時；而血清中此種變化至少可維持4-9天。\n偵測梗塞的冠狀動脈重新獲得血液灌溉(Reperfusion)：如果只用胸痛是否緩解、EKG變化、或是病人是否發生再灌心律失常(reperfusion arrhythmia)來偵測冠狀動脈再通作用(coronary recanalization)，敏感度並不高。根據統計，大約只有15 %左右的病人，可以同時看到這些變化。根據最近的研究顯示，比較Cardiac Troponin I、CK-MB及Myoglobin等三者對於偵測reperfusion之用，其敏感度分別為82.4 %、76.5 %、及64.7 %。 所以一般建議在做完thrombolytic therapy後的60 - 90分鐘，測Cardiac troponin I，是目前敏感度最高，又可以早期、不具侵襲性地偵測到病人是否有coronary reperfusion的實驗室檢查。\n危險因子的分層(Risk Stratification)：心肌壞死的程度，和病人預後有很大的關聯。若以CK-MB來評估，由於它在心肌梗塞的急性期變化很快，且若病人來得太晚，也會錯過CK-MB的最高值，因此CK-MB在這方面的應用不很理想。根據最近的研究顯示，在心肌梗塞的病人，如果其Cardiac Troponin I值大於0.4 mg/mL，則病人在42天內的死亡率明顯較高，且Cardiac Troponin I值越高，死亡率較高。其他有人證實可利用Troponin (T)來預測心肌梗塞病人30天或150天之內死亡率或證實6天或五週LMW heparin治療可有效減低死亡率。由於Cardiac Troponin I本身對於偵測心肌損傷的敏感度及特異性很好，所以一般建議在病人住院後24小時內，測Cardiac Troponin I，以給病人Risk Stratification，並對於高危險群的病人，而給予更積極的治療。\n其他Cardiac Troponin I被報告過的臨床應用，還包括有：偵測Perioperative MI、應用於做完PTCA後，看病人是否有infarctlets產生、以及診斷Myocarditis，都比傳統的CK-MB，更具優越的心臟特異性及高敏感度。\n一些非缺血性心臟疾病也可能導致Troponing上升，例如：充血性心臟衰竭、急性或慢性創傷、高血壓、低血壓、心悸、肺栓塞、嚴重氣喘、敗血症、心肌炎、中風、劇烈運動、藥物中毒(adriamycin, 5-fluorouracil, herceptin, snake venoms)、末期腎臟病、涉及心臟的橫紋肌溶解症等。","tags":["腎臟","心臟/心血管","感染/敗血症","過敏"]},{"n":"hs-Troponin T(High sensitive Troponin T)","c":"FRCTNT","p":"09098B(450點)","r":"是","ct":"03號綠頭管(Lithium heparin)。","d":"全血3.5 mL","g":"生化免疫組","t":"急診可","m":"電子化學冷光免疫分析法(Electrochemiluminescence immunoassay, ECLIA)","rv":"＜14 ng/L\n檢驗備註：\n(1)以健康者(533位)第99百分位為參考值上限為14 ng/L(依照試劑廠商資料)。\n(2)【0小時/1小時】診斷/排除無ST上升之急性心肌梗塞(NSTEMI)流程(2020歐洲心臟協會指引, European Heart Journal (2021) 42, 1289-1367)：\n(A)可排除時機有下列二種：\n(i)0小時＜5 ng/L；\n(ii)0小時＜12 ng/L且與1小時之差異＜3 ng/L。\n(B)可納入診斷時機有下列二種：\n(i)0小時≧52 ng/L；\n(ii)0及1小時之差異≧5 ng/L。\n(C)其他不符合上述(A)及(B)時，建議觀察。\n(3)不同心肌梗塞生物標記不建議交互監測或混用作為判定心肌梗塞是否發生。參考值或差異閾值依不同廠牌試劑而不同。","i":"(1)可輔助【0小時/1小時】診斷及排除急性心肌梗塞流程(間隔一小時再測)。\n(2)可輔助診斷及治療心肌梗塞和心肌受損、不穩定心絞痛(unstable angina)或S-T波段上升之急性冠狀動脈疾病、急性梗塞(AMI)疾病之評估參考。","cl":"(1)心肌旋轉蛋白T(Cardiac troponin T, TnT)是心肌細胞內專有的收縮蛋白，分子量為39.7KD，TnT是一個對於心肌損傷具高敏感度之標記，其在急性心肌梗塞(AMI)後約3-4小時增加，可持續約2週。相對於ST段抬高型心肌梗塞(STEMI)，TnT在非ST段上升之心肌梗塞(NSTEMI)之診斷是相當重要的。\n(2)TnT也可以預測病人近期、中期、長期罹患急性冠心症(Acute coronary syndrome; ACS)的一個預測指標。\n(3)在臨床上，當病人具有缺血性或非缺血性心臟衰竭、心肌相關疾病、腎衰竭、敗血症和糖尿病，可於血液中穩定偵測到低濃度TnT。\n(4)嚴重冠狀動脈疾病會使TnT上升，但與BNP或NT-pro BNP並無相關性。低濃度TnT可預測心血管問題，如動脈纖維化發生或復發。\n(5)TnT除了心肌細胞損傷時會上升外，還有心肌炎、心臟挫傷、肺栓塞、藥物引起之心臟毒性等情形亦會上升。於橫紋肌溶解症(Rabdomyolysis)及多發性肌炎(Polymyositis)病人，cTnT也有上升的表現。\n(6)高敏(high-snesitive) TnT檢驗是指在檢測極低濃度TnT時之重複檢測變異係數(CV)或精密度＜10%，表示檢驗性能在低濃度時相當穩定。因此歐洲已將高敏cTnT列入急性心肌梗塞診斷之檢驗標記。","tags":["腎臟","心臟/心血管","糖尿病","感染/敗血症","自體免疫"]},{"n":"Human leukocyte panel reactive antibodies percentage screening test","c":"FOTPR1","p":"12200B(2949點)","r":"是","ct":"02-黃頭管(Serum seperator tu","d":"3 mL","g":"血液及組織相容組","t":"其他","m":"Immunophenotyping by flow cytometry(panel reactive\nantibodies percentage)","rv":"PRA values greater than 10% indicate significant alloimmunization to HLA antigens and correlate with an increased risk for rejection (群組反應抗體PRA(Panel reactive antibody)數值大於10%代表有顯著異體人類白血球抗原(HLA antigen)之致敏化免疫反應，與排斥反應發生的增加率有正相關。)","i":"(1)臟器移植接受者術前評估，每六個月內限申報一次\n(2)臟器移植接受者術後產生排斥反應時可進行檢測","cl":"(1)在本試驗的分析結果中，陽性反應代表著HLA抗原的致敏化。有多次輸血經驗或曾接受移植的病人陽性反應的機率相當大。\n(2)有多次分娩經驗的婦女血清可能會有陽性反應。\n(3)受捐贈者preformed antibody之檢測結果與接受移植後產生之風險度具相關性。如果preformed antibody強度增加，可能代表受捐贈者有持續性或短期內有致敏化（sensitization）的現象，而產生HLA 抗體，進而增加在接受移植後產生超急性排斥（hyperacute rejection）的機率。","tags":["輸血/血型","移植/免疫"]},{"n":"IFE for cryoglobulin(冷凝球蛋白免疫固定電泳分析)","c":"FSIIFG","p":"12103B(900點)","r":"是","ct":"02號黃頭管(Serum separator tu","d":"全血9.0 mL","g":"生化免疫組","t":"其他","m":"免疫固定電泳分析法(Immunofixation Electrophoresis , IFE)","rv":"No band present","i":"Cryoglobulin分型可協助臨床診斷相關疾病，如Monoclonal cryoglobulins可能與myeloma及其它lymphoproliferative disorder，如Waldenstrom disease相關。","cl":"冷凝球蛋白為過冷會沈澱，且在37℃回溶之免疫球蛋白，冷凝球蛋白症依據出現型態為monoclonal或polyclonal，區分為Type I、Type II及Type III冷凝球蛋白症。冷凝球蛋白與臨床表徵可協助相關疾病之診斷。Type I通常與lyphoma,Waldenstrom’s macroglobulinemia及multiple myeloma相關，因Type I冷凝球蛋白通常不會活化補體，因此通常不會有症狀，除非量達到一定濃度產生hyperviscoisity syndrome。第II型及第III型冷凝球蛋白皆為Rheumatoid factors結合到IgG Fc片段，因此2型稱之為mixed cryoglobulins。Type II通常與lymphoproliferative disease相關，Type II及Type III常見於風濕性及慢性感染疾病，近期研究發現Type II及Type III冷凝球蛋白中可測得HCV Ab及HCV RNA。C型肝炎患者使用抗病毒藥治療時，可能會同時改善冷凝球蛋白血症。","tags":["肝臟/膽道","肝炎病毒"]},{"n":"IgA","c":"FBIIGA","p":"12027B(275點)","r":"是","ct":"2號5 mL黃頭管(Serum separator","d":"全血3.5mL","g":"生化免疫組","t":"其他","m":"免疫比濁法(Immunoturbidimetric assay)","rv":"成人: 66.0~433.0 mg/dL; \n1~3個月: 1.3~53.0 mg/dL;\n4-6個月: 4.4~84.0 mg/dL;\n7個月~1歲: 11.0~106.0 mg/dL;\n2~5歲: 14.0~159.0 mg/dL;\n6~10歲: 33.0~236.0 mg/dL.","i":"定量血清中IgA濃度，協助臨床評估個體之免疫狀況。","cl":"免疫球蛋白由漿細胞(plasma cell)製造，在免疫系統中扮演與抗原反應之角色，當抗原與抗體反應後，IgM抗體濃度最早上升，其次為IgG及IgA抗體。定量免疫球蛋白抗體可協助臨床評估個體之免疫狀況。\n血清中免疫球蛋白減少常見於原發性免疫球蛋白缺乏、次發性免疫球蛋白缺乏如惡性腫瘤、淋巴性白血球增多症、多發性骨髓瘤及Waldenstrom’s disease。血清中免疫球蛋白增加於多株或單株免疫球蛋白增生，例如肝炎及肝硬化、急慢性感染、自體免疫疾病、臍帶血中因子宮內感染及heavy-chain disease等。單株免疫球蛋白增生需進一步分型及定量分析。\n異常的血清免疫球蛋白濃度範圍是寬廣多樣化的。免疫球蛋白濃度範圍從單一種或結合多種免疫球蛋白(IgG抗體，IgA和IgM的)的缺乏到增加皆屬於異常濃度範圍。檢測免疫球蛋白濃度可以幫助診斷蛋白代謝異常疾病和缺乏抵抗傳染性病原體能力的身體。","tags":["肝臟/膽道","腫瘤標記","貧血/血液疾病","自體免疫"]},{"n":"IgE(免疫球蛋白E)","c":"FSIIGE","p":"12031C(250點)","r":"是","ct":"03號綠頭管(Heprin tube)","d":"全血2.0 mL","g":"生化免疫組","t":"其他","m":"螢光酵素免疫分析法Fluorescence enzyme immunoassay, FEIA)","rv":"兒童(＜18歲)：≦77.7 kU/L；成人(≧18歲)：≦114 kU/L。\n參考值備註說明：\n0~1歲＜13.0 kU/L; 1~2歲＜23.0 kU/L; 2~3歲＜32.0 kU/L; 3~4歲＜40.0 kU/L; 4~5歲＜48.0 kU/L; 5~6歲＜56.0 kU/L; 6~7歲＜63.0 kU/L; 7~8歲＜71.0 kU/L.","i":"定量血清中IgE抗體濃度，協助過敏疾病之診斷。","cl":"一般過敏反應是因IgE免疫球蛋白所引起。IgE接在mast cell或basophil表面，當其相對應之特異性過敏原與細胞上的IgE結合，會引起組織胺或其他物質的釋放，而造成一般所謂之過敏反應，因此血清的Total IgE濃度可協助評估過敏疾病(如氣喘、過敏性鼻炎、蕁麻疹、異位性皮膚炎、過敏性腹瀉等)。經常發生過敏症狀的人或體內有寄生蟲的人，其體內IgE濃度會上升。新生兒血中的 IgE 濃度很低(幾乎是零)，但隨著年齡的增長 IgE 濃度逐漸增高，到約10-20歲時達到成人的濃度。\n一般而言，IgE濃度會因接觸到過敏原而上升，因此測量血中IgE濃度，可作為醫師治療時的參考。","tags":["過敏"]},{"n":"IGF-1","c":"FENIGF","p":"24023B(480點)","r":"是","ct":"02號黃頭管(Serum separator tu","d":"全血2.0mL","g":"生化免疫組","t":"其他","m":"化學冷光免疫分析法(chemiluminescence immunoassay, CLIA)","rv":"(1)男性(5th percentile~95th percentile)：0歲11.0~100.0 ng/mL、1歲12.0~120.0 ng/mL、2歲13.0~143.0 ng/mL、3歲14.0~169.0 ng/mL、4歲15.0~200.0 ng/mL、5歲16.0~233.0 ng/mL、6歲17.0~269.0 ng/mL、7歲18.0~307.0 ng/mL、8歲20.0~347.0 ng/mL、9歲23.0~386.0 ng/mL、10歲29.0~424.0 ng/mL、11歲37.0~459.0 ng/mL、12歲19.0~487.0 ng/mL、13歲64.0~508.0 ng/mL、14歲83.0~519.0 ng/mL、15歲102.0~520.0 ng/mL、16歲119.0~511.0 ng/mL、17歲131.0~490.0 ng/mL、18歲137.0~461.0 ng/mL、19歲137.0~428.0 ng/mL、20歲133.0~395.0 ng/mL、21歲127.0~364.0 ng/mL、22歲120.0~338.0 ng/mL、23歲112.0~316.0 ng/mL、24歲105.0~298.0 ng/mL、25歲99.0~283.0 ng/mL、26歲94.0~271.0 ng/mL、27歲90.0~262.0 ng/mL、28歲87.0~255.0 ng/mL、29歲84.0~250.0 ng/mL、30歲83.0~246.0 ng/mL、31歲82.0~244.0 ng/mL、32歲82.0~243.0 ng/mL、33歲82.0~242.0 ng/mL、34歲82.0~242.0 ng/mL、35歲83.0~241.0 ng/mL、36歲83.0~240.0 ng/mL、37歲83.0~239.0 ng/mL、38歲83.0~238.0 ng/mL、39歲83.0~238.0 ng/mL、40歲82.0~237.0 ng/mL、41歲81.0~236.0 ng/mL、42歲80.0~235.0 ng/mL、43歲78.0~233.0 ng/mL、44歲76.0~230.0 ng/mL、45歲74.0~227.0 ng/mL、46歲72.0~225.0 ng/mL、47歲71.0~224.0 ng/mL、48歲69.0~224.0 ng/mL、49歲68.0~225.0 ng/mL、50歲67.0~225.0 ng/mL、51歲66.0~225.0 ng/mL、52歲65.0~222.0 ng/mL、53歲64.0~218.0 ng/mL、54歲62.0~214.0 ng/mL、55歲61.0~210.0 ng/mL、56歲59.0~206.0 ng/mL、57歲58.0~204.0 ng/mL、58歲56.0~203.0 ng/mL、59歲55.0~203.0 ng/mL、60歲53.0~206.0 ng/mL、61歲51.0~209.0 ng/mL、62歲49.0~214.0 ng/mL、63歲46.0~219.0 ng/mL、64歲43.0~225.0 ng/mL、65歲40.0~231.0 ng/mL、66歲37.0~236.0 ng/mL、67歲34.0~240.0 ng/mL、68歲31.0~243.
