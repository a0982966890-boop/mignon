tic range:100.1-180.0sec. (equivalent to plasma heparin concentration of 0.3～0.7 U/mL by the anti-Xa assay )","i":"(1)使用於常規的血液凝固功能篩檢，APTT延長可能為內在路徑或共同路徑凝固因子缺乏或凝固因子抑制物所造成。\n(2)懷疑病人有出血傾向時的檢查\n(3)使用heparin治療病人監控使用\n(4)APTT不能作為Direct thrombin inhibitor(如：Dabigatran)及Anti-Xa inhibitor (如：Rivaroxaban、Apixaban、Edoxaban)療效之監測檢驗，因病人的APTT可以是正常表現，而且無法反映其體內(in vivo)凝血功能是否為正常，對不清楚藥物使用史之病人，APTT無法可靠地篩檢出是否有使用這些抗凝藥物。","cl":"(1)檢測APTT用於常規的血液篩檢（因先天性或後天性的內在因子或共有路徑的因子缺損所造成的疾病，包含：Factor XII、XI、X、IX、VIII、V、II或fibrinogen）或懷疑病人有出血性傾向時的檢查。如上述因子皆正常可考慮prekallikrein (Fletcher factor)、HMW kininogen (Fitzgerald factor)缺乏可能性\n(2)主要用於heparin治療監控使用\n(3)可用於肝臟疾病（如: Vit.K的缺乏），造成II, VII, IX, X等因子活性下降之篩檢。\n(4)可檢測是否含heparin、lupus anticoagulant(LA)或存在其他inhibitor如臨床懷疑LA時，請開立醫令(Lupus anticoagulant：FHELUP)，以提升檢測率。","tags":["肝臟/膽道","凝血/血栓"]},{"n":"Arsenic (As, blood)","c":"FDPAS","p":"10003B(400點)","r":"否","ct":"61號紫標籤深藍頭管(K2EDTA)","d":"全血3 mL","g":"生化免疫組","t":"1週以上","m":"誘發偶合電漿質譜儀 ( Inductively Coupled Plasma – Mass \nSpectrometry)","rv":"<20 μg/L","i":"定量血中砷濃度，協助急性砷中毒。","cl":"一般在電子半導體、染料、殺蟲劑、陶瓷及顯影劑等產業，常使用砷作為生產的原料，因此其工作人員較常接觸砷的化學試劑，而主要攝入人體的途徑為吸入揮發性氣態的砷及吃入含砷的食物，暴露在這些危險環境中的作業人員，應定期作砷的檢測。 自然界中的砷可分成有機砷及無機砷兩大類，一般海產類的食物都含有有機砷(Arsenobetain) 的成分，有機\n砷對人體的毒性很低，且在人體中1-2天內會被代謝掉，然後經由尿液排出體外，因此若是吃海產類會造成尿液總砷的假性上升，而無機砷主要是指arsenite (AsIII)及arsenate (AsV)的砷化合物，對人體頗具毒性，人體攝入後會在體內被代謝成dimethylarsinic acid (DMA)及monomethylarsonic acid(MMA)，亦經由尿液排出體外。 尿液總砷包含了有機砷及無機砷，因此若尿液總砷濃度超出參考值時，有必要再確認其無機砷的比例，才能作為慢性中毒的指標 (本科有提供尿液無機砷分類檢驗項目L72-354)。血液中砷的濃度主要與無機砷有關，但其往往在數小時內即被代謝，因此只能作為急性砷中毒的指標。 急性的砷中毒常會導致全身性的破壞，包括：hepatic toxicity，electrocardiographic changes，rhabdomylosis，pulmonary edema，encephalopathy，renal dysfunction，及bone marrow toxicity，神經性病常為其主要特徵。而慢性砷中毒通\n常會有明顯的皮膚上的病變(例如：hyperkeratosis，hyperpigmentation，alopecia，squamous cell carcinoma)及肝臟性病變(如：cirrhosis，hepatocellular carcinoma)。","tags":["其他"]},{"n":"Arsenic to creatinine ratio (尿中砷)","c":"FDPASR","p":"10003B (400點)","r":"否","ct":"64-15 mL無重金屬殘留離心管","d":"10 mL","g":"生化免疫組","t":"1週以上","m":"誘發偶合電漿質譜儀 ( Inductively Coupled Plasma – Mass \nSpectrometry)","rv":"< 100 μg /g CRE","i":"定量尿液中總砷濃度，協助篩選慢性中毒的病人。若尿液總砷濃度超出參考值時，有必要再確認其無機砷的比例，才能作為慢性中毒的指標。","cl":"砷(As)是普遍存在於人體組織的微量金屬，As污染來自於環境(殺蟲劑添加、井水)，職業(油漆、化妝品、砷化物製造、使用的電子工廠)，食入(海鮮、海產植物、草藥、自然療法植物性某些處方)。\n在生物體內砷價數可互相轉變，無機砷化物會堆積在肝、腎及膽中，造成人體的傷害。有機砷對人體的毒性很低，且在人體中1-2 天內會被代謝掉，然後經由尿液排出體外，因此若是吃海產類會造成尿液總砷的假性上升。\n長期飲用含砷量高的地下水或曝露於砷的製造及生產、電子半導體，農藥的製造及噴灑等的相關行業，可能會造成長期砷的生物性累積，慢性中毒引發身體許多的病變。暴露在這些危險環境中的工作人員，應定期作砷的檢測。\n血液中砷的濃度主要與無機砷有關，但其往往在數小時內即被代謝，因此只能作為急性砷中毒的指標。急性的砷中毒常會導致全身性的破壞，包括：肝毒性，影響心肺功能，橫紋肌溶解症，肺水腫，性腦病，腎功能不全及骨髓毒性，神經性病變為其常見主要特徵，嚴重則會痙攣、昏迷或死亡。\n尿液總砷是快速篩選慢性中毒的病人，尿液總砷包含了有機砷及無機砷，因此若尿液總砷濃度超出參考值時，有必要再確認其無機砷的比例，才能作為慢性中毒的指標。\n砷慢性中毒會有明顯的皮膚上的病變如溼疹、角質化、皮膚癌、Boween’s disease。會引起中樞及周邊神經病變與周邊血管病變如貧血、白血球下降、白血病、四肢壞死(烏腳病Black foot disease)及肝功能異常Bilirubin、Alk-P上升。肺癌、肝癌及膀胱癌與皮膚癌的機率大幅上升。","tags":["肝臟/膽道","腎臟","貧血/血液疾病"]},{"n":"Ascites examination","c":"FCSACI、FRBACI","p":"16002C（170點）","r":"是","ct":"42號-36號-15 mL無菌試管、47號-針筒、","d":"5 mL","g":"血液及組織相容組","t":"急診可","m":"(1)Appearance：以肉眼判讀\n(2)Cell count：以自動血球分析儀（體液模式）進行細胞計數。\n(3)細胞分類以抹片進行判讀","rv":"(A)RBC count：The reference interval(s) and other method performance specifications are unavailable for this body fluid. Comparison of the result with concentration in the blood is recommended.\n(B)Nucleated cell count：0-562/μL\n(C)Leukocyte count：The reference interval(s) and other method performance specifications are unavailable for this body fluid. Comparison of the result with concentration in the blood is recommended.\n(D)Myelocyte：0 %\n(E)Promyelocyte：0 %\n(F)Blast：0 %","i":"懷疑患者體內有積水感染或不明出血時，可執行此項檢驗。","cl":"(A)外觀與可能之相關疾病\n(1)Clear, pale yellow: Normal\n(2)Turbid, white: Microbial infection (tuberculosis)\n(3)Bloody: Hemothorax；Hemorrhagic effusion\n(4)Milky: Chylous material from thoracic duct leakage或Pseudochylous material from chronic inflammation\n(B)細胞數目上升與其臨床意義\n(1)Neutrophils: Pneumonia；Pancreatitis；Pulmonary infraction\n(2)Lymphocytes: Viral infection；Tuberculosis；Autoimmune disorders\n(3)Mesothelial cells: Normal and reactive forms have no clinical significance. Decreased mesothelial cells are associated with tuberculosis\n(4)Plasma cells:Tuberculosis\n(5)Malignant cells:Primary adenocarcinoma and small-cell carcinoma, Metastatic carcinoma","tags":["其他"]},{"n":"ASLO","c":"FSIASL","p":"12004C(275點)","r":"是","ct":"2號黃頭管(Serum separator tub","d":"全血3.5 mL","g":"生化免疫組","t":"其他","m":"免疫比濁法(Immunoturbidimetric assay)","rv":"≦250.0 IU/mL","i":"定量血清中之antistreptolysin O (ASLO)，協助臨床診斷streptococcus感染及此病流行病學之參考依據。","cl":"A型鏈球菌會產生鏈球菌素O溶血素。在患者體內，鏈球菌素O會作為一個蛋白抗原來引發抗體反應。抗體效價於感染後一週開始上升，2~4周達到高峰。在沒有併發症或重複感染情況下，6~12個月內ASO效價將降低至感染前的標準。臨床和實驗室的發現應同時分析來達到診斷。於風濕熱、急性腎絲球腎炎、結節性紅斑、猩紅熱、急性扁桃腺炎等ASLO明顯升高。少數肝炎、腎病症候群、結締組織病、結核病及多發性骨髓瘤亦可使ASLO增高。","tags":["肝臟/膽道","腎臟","貧血/血液疾病","結核/呼吸道"]},{"n":"Aspergillus (煙色趜菌)","c":"FALASP","p":"F30022C(1620點)","r":"是","ct":"03號綠頭管(Lithium heparin)","d":"全血4.5 mL","g":"生化免疫組","t":"其他","m":"螢光酵素免疫分析法(Fluorescence enzyme immunoassay, FEIA)","rv":"＜0.35 kUA/L；參考值備註：0.35~0.69 kUA/L(Class I)、0.70~3.49 kUA/L(Class II)、3.50~17.49 kUA/L(Class III)、17.5~52.49 kUA/L(Class IV)、52.5~99.99 kUA/L(Class V)、≧100 kUA/L(Class VI)。","i":"定量分析特異性過敏原IgE之濃度，協助診斷IgE媒介之過敏疾病。","cl":"過敏性疾病大約佔全世界人口30%。過敏反應主要分為四型，其中過敏原引起主要為第一型過敏反應，為外因性氣喘、花粉熱或異位性濕疹的病人，當第一次接觸過敏原，症狀會立即發作，免疫系統會產生對應過敏原之過敏原特異性IgE抗體，其會循環於血液中並接合於mast cell上，當第二次接觸相同過敏原時，會使mast cell產生去顆粒作用，使細胞內之發炎性物質，例如：histamine、serotonin等，釋放至細胞外，造成流鼻水、打噴嚏等臨床症狀產生，嚴重者甚至產生休克。可藉由檢測血液中之引起過敏相關之特異性抗體IgE(如花粉、動物毛屑、塵?及家塵等)，此可輔助了解引起過敏之過敏原種類，仍需配合其它臨床證據一起判斷。","tags":["過敏"]},{"n":"Aspergillus fumigatus IgG 煙麴黴菌IgG","c":"FSIASF","p":"12170B (200點)","r":"是","ct":"02號5 mL黃頭管(Serum separato","d":"全血3 mL","g":"生化免疫組","t":"其他","m":"螢光酵素免疫分析法(Fluorescence enzyme immunoassay, FEIA)","rv":"≦40.0 mgA/L","i":"輔助診斷慢性肺麴菌症(Chronic Pulmonary Aspergillosis, CPA)","cl":"Aspergillus fumigatus IgG主要用於評估慢性肺麴菌症(Chronic Pulmonary Aspergillosis, CPA)、麴菌瘤(Aspergilloma)及其他麴菌相關感染的診斷及追蹤。這些麴菌感染，尤其是侵入性肺麴菌症(Invasive Pulmonary Aspergillosis, IPA)和慢性肺麴菌症(CPA)，對於免疫功能低下者、慢性阻塞性肺疾病(COPD)患者及重症患者來說，具有較高的發病率與致病風險。\n慢性肺麴菌症(CPA)是一種罕見且嚴重的肺部疾病，經常在先前患有肺結核或其他呼吸系統疾病的患者中出現，會進一步複雜化其原有的病情。根據歐洲臨床微生物學和傳染病學會(ESCMID)及歐洲呼吸學會(ERS)的指南，約90%的CPA患者在血清學檢測中呈現麴菌IgG抗體陽性。另外，慢性空洞化肺麴菌症(Chronic Cavitary Pulmonary Aspergillosis, CCPA)，未經治療易發展為慢性纖維化肺麴菌症，導致不可逆的肺部損傷。因此，Aspergillus fumigatus IgG檢測在診斷中扮演關鍵角色，除了影像學檢查(如X-ray或CT掃描)以及真菌培養之外，血清學檢測的IgG抗體結果可以輔助確診CPA及CCPA，提升診斷的準確性。\n麴菌瘤(Aspergilloma)通常形成於既有肺部空洞中，儘管大多數患者無明顯症狀，但咳血是其最常見的臨床表現。影像學檢查有助於確診，而Aspergillus-specific IgG檢測則可輔助臨床評估患者是否受到麴菌感染，進一步確認病因。此外，在抗真菌藥物治療後，Aspergillus fumigatus IgG抗體檢測可用於追蹤患者的治療效果，經抗真菌治療後病人血清中Aspergillus fumigatus IgG濃度的變化可以反應治療的成效。高濃度IgG抗體顯示患者體內存在針對Aspergillus fumigatus的持續免疫反應，表示潛在的麴菌感染或長期的抗體反應；而低濃度IgG抗體顯示Aspergillus fumigatus的免疫反應較低，可能說明患者感染風險較低或未受到麴菌侵染。\n總而言之，Aspergillus fumigatus IgG檢驗對於麴菌感染的診斷、治療追蹤及預後評估具有重要的臨床價值，特別是對於慢性肺麴菌症(CPA)及麴菌瘤(Aspergilloma)的管理。","tags":["感染/敗血症","結核/呼吸道"]},{"n":"Aspergillus galactomannan Ag","c":"FSIASP","p":"12179C(250點)","r":"是","ct":"02號黃頭管(Serum separator tu","d":"全血或肺泡灌洗液3 mL","g":"生化免疫組","t":"其他","m":"酵素連結免疫分析法(immunoenzymatic sandwich microplate assay, EIA)","rv":"Negative (Index＜0.5)","i":"(1)測定血清中之Aspergillus galactomannan抗原，協助診斷侵襲性Aspergillosis的感染，高危險族群建議每週抽2次血監測。\n(2)測定Bronchoalveolar lavage (BAL) 中之Aspergillus galactomannan抗原，可協助診斷器官移植患者是否感染aspergillus。","cl":"Aspergillus感染通常發生在吸入存在環境中的Aspergillus spore後。過去10年中，Aspergillus之侵襲性感染為嚴重感染之主因。這些感染常見於白血球缺少患者(使用抗癌藥後)及使用免疫抑制劑及corticosteroids治療之患者。Aspergillus不易自blood culture培養，診斷主要依據非特異性之診斷或X-ray, CT scan及臨床症狀。測試血液中之soluble galactomannan antigen，可做為是否感染Aspergillus之診斷依據。\n使用PLASMA-LYTE輸液，可能會造成偽陽性反應。","tags":["移植/免疫"]},{"n":"Aspergillus niger IgG黑麴黴菌 IgG","c":"FSIASN","p":"12170B (200點)","r":"是","ct":"02號5 mL黃頭管(Serum separato","d":"全血3 mL","g":"生化免疫組","t":"其他","m":"螢光酵素免疫分析法(Fluorescence enzyme immunoassay, FEIA)","rv":"≦24.0 mgA/L","i":"輔助診斷慢性肺麴菌症(Chronic Pulmonary Aspergillosis, CPA)","cl":"麴菌瘤(Aspergilloma)通常形成於既有肺部空洞中，儘管大多數患者無明顯症狀，但咳血是其最常見的臨床表現。影像學檢查有助於確診，而Aspergillus-specific IgG檢測則可輔助臨床評估患者是否受到麴菌感染，進一步確認病因。此外，在抗真菌藥物治療後，Aspergillus niger IgG抗體檢測可用於追蹤患者的治療效果，經抗真菌治療後病人血清中Aspergillus niger IgG濃度的變化可以反應治療的成效。高濃度IgG抗體顯示患者體內存在針對Aspergillus niger的持續免疫反應，表示潛在的麴菌感染或長期的抗體反應；而低濃度IgG抗體顯示Aspergillus niger的免疫反應較低，可能說明患者感染風險較低或未受到麴菌侵染。\n總而言之，Aspergillus niger IgG檢驗對於麴菌感染的診斷、治療追蹤及預後評估具有重要的臨床價值，特別是對於慢性肺麴菌症(CPA)及麴菌瘤(Aspergilloma)的管理。","tags":["感染/敗血症"]},{"n":"Benzodiazepines","c":"FDPBEU、FRDBEU、FDPBEN","p":"10526B(320點)","r":"是","ct":"66號白頭塑膠管","d":"尿液6.0 mL尿液(2支白頭塑膠管五分滿)","g":"生化免疫組","t":"急診可","m":"同質性的酵素免疫法分析(Homogenous enzyme immunoassay method)","rv":"Negative","i":"定性篩檢尿液中是否存在Benzodiazepines。","cl":"Benzodiazepines構成一組多用途且開立廣泛的中樞神經抑制劑，具有抗焦慮、鎮靜、肌肉鬆弛以及抗痙攣的活性。Benzodiazepines結構包括chlordiazepoxide(氯二氮平)、diazepam(地西泮)、oxazepam(?沙西泮)、flurazepam(氟西泮)和nitrazepam(硝西泮)。結構不同之benzodiazepines代謝速率不同，鎮靜效果因而有差異。通常以口服方式用藥且由肝臟代謝，部分benzodiazepines代謝物具活性，其對中樞神經系統之作用與alcohol類似。臨床上大受歡迎的原因可歸因於治標指標(therapeutic index)的安全範圍很廣、嚴重副作用最少以及造成生理依賴性的可能性低。單獨服用，甚至增加劑量都不會導致嚴重的中樞神經抑制及時間延長。\n此檢測可檢測人尿液中的Benzodiazepines類藥物及其代謝物，以閾值200 ng/mL判定陰性或陽性報告。若篩檢結果為陽性時，建議須進行確認試驗，如氣相色譜/質譜法(GC/MS)法。","tags":["其他"]},{"n":"Bermuda grass (狗牙根草)","c":"FALBER","p":"F30022C(1620點)","r":"是","ct":"03號綠頭管(Lithium heparin)","d":"全血4.5 mL","g":"生化免疫組","t":"其他","m":"螢光酵素免疫分析法(Fluorescence enzyme immunoassay, FEIA)","rv":"＜0.35 kUA/L；參考值備註：0.35~0.69 kUA/L(Class I)、0.70~3.49 kUA/L(Class II)、3.50~17.49 kUA/L(Class III)、17.5~52.49 kUA/L(Class IV)、52.5~99.99 kUA/L(Class V)、≧100 kUA/L(Class VI)。","i":"定量分析特異性過敏原IgE之濃度，協助診斷IgE媒介之過敏疾病。","cl":"過敏性疾病大約佔全世界人口30%。過敏反應主要分為四型，其中過敏原引起主要為第一型過敏反應，為外因性氣喘、花粉熱或異位性濕疹的病人，當第一次接觸過敏原，症狀會立即發作，免疫系統會產生對應過敏原之過敏原特異性IgE抗體，其會循環於血液中並接合於mast cell上，當第二次接觸相同過敏原時，會使mast cell產生去顆粒作用，使細胞內之發炎性物質，例如：histamine、serotonin等，釋放至細胞外，造成流鼻水、打噴嚏等臨床症狀產生，嚴重者甚至產生休克。可藉由檢測血液中之引起過敏相關之特異性抗體IgE(如花粉、動物毛屑、塵?及家塵等)，此可輔助了解引起過敏之過敏原種類，仍需配合其它臨床證據一起判斷。","tags":["過敏"]},{"n":"Bilirubin-D","c":"FBIBID、FRCBID","p":"09030C(40點)","r":"是","ct":"03號綠頭管或12號微量綠頭管(小兒)","d":"全血3.5 mL(03號綠頭管)或0.5 mL(12號微量綠","g":"生化免疫組","t":"急診可","m":"呈色法 (Diazo method)","rv":"0.03~0.18 mg/dL","i":"定量血清或血漿中的直接膽紅素的濃度，協助診斷和治療肝臟及溶血性疾病。","cl":"膽紅素是血紅素代謝分解的最終產物。在肝臟與葡萄糖醛酸(Glucuronic acid)形成共軛形式，而在分泌膽汁循環中被分解形成非結合態。膽紅素的共軛(直接)和非共軛(間接)形式鬆散循環地與白蛋白結合。\n直接膽紅素有助於肝功能障礙的診斷。梗阻性黃疸的總膽紅素增加是因為直接膽紅素的增加。肝炎血清的直接和間接膽紅素會同時上升。在新生兒溶血性黃疸和新生兒黃疸的患者，總膽紅素的增加是因為間接膽紅素的增加。黃疸可能起因於Rh、ABO或其他血型不兼容、肝不成熟或遺傳性缺陷的膽紅素共軛異常。","tags":["肝臟/膽道","貧血/血液疾病"]},{"n":"Bilirubin-D／Bilirubin-T Ratio","c":"FRCBIR","p":"09138C(90點)","r":"是","ct":"03號綠頭管或12號微量綠頭管(小兒)","d":"全血3.5 mL(03號綠頭管)或0.5 mL(微量綠頭管)","g":"生化免疫組","t":"急診可","m":"呈色法(Diazo method)","rv":"(1)Bilirubin-D：0.03~0.18 mg/dL；\n(2)Bilirubin-T：0.3~1.0 mg/dL；\n(3)Bilirubin-D／Bilirubin-T Ratio：＜20%","i":"協助篩檢嬰兒因膽道閉鎖造成嬰兒膽汁滯留所產生之延遲性黃疸","cl":"新生兒黃疸常見於出生後新生兒，新生兒延長性黃疸有部分是因膽道閉鎖引起肝外膽汁滯留症。膽道閉鎖之肝外膽汁滯留症是兒童常見肝病之一，延遲治療會導致死亡或需換肝。\n新生兒延長性黃疸之總膽紅素(bilirubin-T)，一般多會隨時間或照光治療而下降，但在膽道閉鎖之嬰兒總膽紅素不會下降，是因直接膽紅素(bilirubin-D)的上升因素，直接膽紅素占總膽紅素20%以上，因此Bilirubin-D／Bilirubin-T Ratio＞20%是判定是否為膽汁滯留症之重要指標。","tags":["肝臟/膽道"]},{"n":"Bilirubin-T、Neonatal bilirubin","c":"FBIBIT、FRCBIT、FRCNEB","p":"09029C(50點)","r":"是","ct":"03號綠頭管或12號微量綠頭管(小兒)。","d":"全血3.5 mL(03號綠頭管)或0.5 mL(12號微量綠","g":"生化免疫組","t":"急診可","m":"呈色法 (Diazo method)","rv":"0.3~1.0 mg/dL；Neonatal bilirubin：Cutoff:15 mg/dL。","i":"定量血清或血漿中的總膽紅素的濃度，協助診斷和治療肝臟及溶血性性疾病。於新生兒協助判定新生兒黃疸指數。","cl":"總膽紅素是正常和異常的紅血球在破壞過程中所形成的有機化合物之一。總膽紅素的檢測有助於肝臟、溶血性、血液與肝炎等代謝性疾病的診斷與治療。","tags":["肝臟/膽道","貧血/血液疾病"]},{"n":"Blomia tropicalis (熱帶無爪璊)","c":"FALBTR","p":"F30022C(1620點)","r":"是","ct":"03號綠頭管(Lithium heparin)","d":"全血4.5 mL","g":"生化免疫組","t":"其他","m":"螢光酵素免疫分析法(Fluorescence enzyme immunoassay, FEIA)","rv":"＜0.35 kUA/L；參考值備註：0.35~0.69 kUA/L(Class I)、0.70~3.49 kUA/L(Class II)、3.50~17.49 kUA/L(Class III)、17.5~52.49 kUA/L(Class IV)、52.5~99.99 kUA/L(Class V)、≧100 kUA/L(Class VI)。","i":"定量分析特異性過敏原IgE之濃度，協助診斷IgE媒介之過敏疾病。","cl":"過敏性疾病大約佔全世界人口30%。過敏反應主要分為四型，其中過敏原引起主要為第一型過敏反應，為外因性氣喘、花粉熱或異位性濕疹的病人，當第一次接觸過敏原，症狀會立即發作，免疫系統會產生對應過敏原之過敏原特異性IgE抗體，其會循環於血液中並接合於mast cell上，當第二次接觸相同過敏原時，會使mast cell產生去顆粒作用，使細胞內之發炎性物質，例如：histamine、serotonin等，釋放至細胞外，造成流鼻水、打噴嚏等臨床症狀產生，嚴重者甚至產生休克。可藉由檢測血液中之引起過敏相關之特異性抗體IgE(如花粉、動物毛屑、塵?及家塵等)，此可輔助了解引起過敏之過敏原種類，仍需配合其它臨床證據一起判斷。","tags":["過敏"]},{"n":"Blood culture/Common aerobic culture (限血小板血袋)","c":"FMIBLO/FMIAER","p":"13016B(需氧+厭氧瓶380點)、13023C(300點)","r":"是","ct":"體液，採檢容器/培養液外觀(備註)/適用時機如下:","d":"(A)血瓶種類對應建議採檢量：\r\n(a)#31-1藍蓋(SA","g":"微生物組","t":"其他","m":"(1)自動化血瓶培養偵測儀BacT/ALERT VirtuO。\n(2)陽性菌液以人工執行相關染色與鏡檢。","rv":"陰性 (No growth)","i":"(1)懷疑感染相關敗血症\n(2)懷疑敗血症與血管內放置導管相關\n(3)疑似輸血引發敗血症(以血袋內血液成分送檢)","cl":"(1)血液或體液培養出微生物可以確認病人之症狀與感染診斷與預後有關。\n(2)抗生素使用前已採集多套血瓶，不建議於同一發燒病程且使用抗生素後再額外採檢血瓶培養，因極少為陽性。\n(3)骨髓檢體依照美國ASM指引僅需培養與鑑定是否有 Brucella、Salmonella、Listeria、Fungi與Mycobacteria (因骨髓抽吸步驟複雜，比較容易受到汙染)。不建議常規採檢。\n(4)大部分細菌血症或黴菌血症病人可以臨床症狀進行後續追蹤，但感染性心內膜炎可能需後續追蹤培養以了解療效。非心內膜炎性之Staphylococcus aureus感染病人也建議在48-96小時追蹤培養以預知是否出現併發症。\n(5)當分離出皮膚常在菌時，若兩套中僅一套生長(一套中之任一瓶)生長時，可能是汙染菌。其他情形(如僅送單套)請醫師依據臨床狀況謹慎判定臨床意義。\n(6)抗生素停用後，並無足夠的證據可使用血液培養作為常規監控用。","tags":["感染/敗血症","輸血/血型"]},{"n":"Blood gas & Whole blood chemistry item","c":"FRCGA5","p":"Blood gas：09041B(200點) Hb：08003C(20點) Na：09021C(40點) K：09022C(40點) Ionized Ca：24007B(400點) Glucose：09005C (50點) Lactate：09059B (270點)","r":"否","ct":"88號毛細管(Capillary)、動脈血(Art","d":"(A)毛細管血(Capillary blood)採120μL","g":"生化免疫組","t":"其他","m":"(1)電位計量法(Potentiometry)：pH、pCO2；電流計量(Amperometry)-氧化還原法：pO2；光學計量(Multi-wavelength Photometry)：MetHb, COHb；計算值：HCO3－、Base Excess(B.E.)、Total Carbon Dioxide (tCO2)、SO2。\n(2) Na, K、Ionized Ca：離子選擇電極法(Ion Selective Electrodes)。\n(3)Hemoglobin：光學計量(Multi-wavelength Photometry)。\n(4)Glucose：葡萄糖氧化?(Glucose oxidase)。\n(5)Lactate：乳酸氧化?(Lactate oxidase)。","rv":"(1)動脈血：pH_7.35~7.45, PCO2_35.0~45.0 mmHg, PO2_83.0~108.0 mmHg, Base Excess_(-2)~(+3)mmol/L, HCO3_21~28 mmol/L, O2 Saturation_95~98 %, Total Carbon Dioxide(tCO2)：22~29 mmol/L；\n(2)Glucose：65~95 mg/dL；\n(3)Lactate：0.7~2.5 mmol/L；\n(4)Ionized Ca：1.15~1.33 mmol/L；\n(5)Na：136~146 mmol/L；\n(6)K：3.4~5.1 mmol/L；\n(7)Hb(Hemoglobin)：Male(男) 13.2-17.3、Female(女) 11.7-15.5；\n(8)Hct(Hematocrit)：Male(男) 39~49%、Female(女)35~45%。","i":"(1)Blood gas：協助臨床診斷病人體內血液循環中氧氣量或是酸鹼中毒的情形。\n(2)Hemoglobin：協助評估急性或慢性貧血，及紅血球攜帶氧氣能力。\n(3)Sodium：協助評估aldosteronism、diabetes insipidus、adrenal hypertension、Addison’s disease、脫水電解質不平衡相關疾病。\n(4)Potassium：協助評估高血鉀或低血鉀。\n(5)Ionized calcium：測定血液中游離鈣濃度。\n(6)Glucose：協助糖尿病、新生兒低血糖、原發性低血糖及胰臟蘭氏小島腫瘤之治療監控。\n(7)Lactate：協助評估乳酸血症患者之酸鹼狀態。","cl":"(1)pH：血液中pH增加，稱為鹼血症。臨床上形成代謝性鹼中毒，原因大部分為HCO3-增加，如服用過量鹼劑、嘔吐引起胃酸流失及鉀離子的流失。血液中pH減少，稱為酸血症。臨床上形成代謝性酸中毒，原因大部分為有機酸形成過多所引起。如：糖尿病酸中毒、細胞缺氧之乳酸中毒、腎病或服用過多的水楊酸、高鉀血症、鹼流失。緩慢呼吸引起呼吸性酸中毒。急促呼吸則引起呼吸性鹼中毒。 \n(2)pCO2：增加時稱為高碳酸血症，多為呼吸性酸中毒所引起。原因為氣管或肺臟疾病引起之呼吸道阻塞，導致肺泡換氣量減少、抑制中樞神經之藥物、吸入大量 CO2及代償性鹼中毒。減少稱為低碳酸血症，多為呼吸性鹼中毒所引起。大多發生於呼吸中樞受刺激，導致過度呼吸。 \n(3)pO2：動脈血的氧分壓增加於吸入大量氧氣或運動後。減少稱為低血氧症，主要因高地、暴露於一氧化碳環境、肺泡擴散能力減少、心肺系統的換氣及擴散不當。 \n(4)Base Excess(B.E.)：增加：表示相對性的非碳酸化合物減少，鹼中毒的情況下發生。減少：表示相對性的非碳酸化合物增加，酸中毒的情況下發生。 \n(5)O2 Saturation：O2 Saturation降低，表示pO2降低或血色素攜帶氧氣有問題。\n(6)Hb、Hct：增加於真性紅血球增多症，降低於貧血、出血、白血病、腎衰竭。\n(7)Sodium：協助評估aldosteronism, diabetes insipidus, adrenal hypertension, Addison’s disease, 脫水, 或電解質不平衡相關疾病。\n(8)Potassium：協助評估高血鉀或低血鉀。血清鉀上升於酸中毒、腎上腺皮質功能不全、溶血性貧血、氣喘、燒傷、心率不整、急性感染、白血球增多症、惡性腫瘤初期體溫上升、大量輸血、酮酸中毒、肌肉壞死、腸阻塞、腎衰竭、腎性高血壓、敗血病、休克、抗利尿激素分泌失調綜合症( SIADHS)、血小板增多症、組織創傷。血清鉀下降於乙狀結腸鏡後、急性腎小管壞死、酗酒、primary aldosteronism、鹼中毒、心速過緩、大腸癌、霍亂、大腦性癱瘓、心臟衰竭、庫辛氏病(Cushing's syndrome)、脫水、尿崩症、下瀉、糖尿病、心率不整、發燒、葉酸缺乏、高血壓、低鎂、體溫過低、血容過低、酮酸中毒、水楊酸中毒、瀉藥、吸收不良、代謝性鹼中毒、腎炎、饑餓、壓力、嘔吐。\n(9)Ionized calcium：Ionized Ca於體內具有生理功能，正常情況下Ionized Ca佔總鈣46-50 %，其它大部份與蛋白質結合，白蛋白下降時總鈣下降，但Ionized Ca不變。Ionized Ca濃度異常時會影響酵素活性、神經傳導、肌肉收縮、腺體分泌等正常功能。副甲狀腺素 (PTH)、維生素D及抑鈣素(calcitonin)三者的平衡亦取決於血中Ionized Calcium的變動；Ionized Ca上升於酸中毒，原發副甲狀腺功能亢進，惡性腫瘤，Vit D過量，下降於鹼中毒，輸血後(citrate)，副甲狀腺功能不足，鎂缺乏，Vit D缺乏，手術後，燒傷，敗血症。其容易受到pH值改變的影響，pH增高時，Ionized Ca降低。pH值降低時，Ionized Ca上升。\n(10)Glucose：協助糖尿病、新生兒低血糖、原發性低血糖及胰臟蘭氏小島腫瘤之治療監控。\n(11)Lactate：乳酸的測量是用來診斷與治療乳酸中毒最強而有力的工具。乳酸是厭氧糖解的終末產物，血中乳酸濃度之測試有助於乳酸中毒的診斷與治療。充血性心臟衰竭或嚴重之貧血伴隨之乳酸中毒顯示組織發生缺氧的情形，其他於糖尿病患、腎臟衰竭及肝臟疾病亦會造成乳酸增加。乳酸測試可適用於腦脊髓液檢體，通常腦脊髓液中的乳酸含量大約與血中的乳酸含量相當。增加於腦脊髓受傷、顱內出血、癲癇及其他中樞神經系統疾病，並可分成細菌性或病毒性腦膜炎。","tags":["肝臟/膽道","腎臟","心臟/心血管","糖尿病","甲狀腺","感染/敗血症","腫瘤標記","貧血/血液疾病","電解質/代謝","輸血/血型","荷爾蒙/內分泌","過敏"]},{"n":"Blood gas analysis","c":"FRCBLO、FRCBLOA","p":"09041B(200點)","r":"否","ct":"08號A-line針筒；","d":"1 mL A-line針筒為全血0.6~1.0 mL；3 m","g":"生化免疫組","t":"其他","m":"電位計量法(Potentiometry)：pH、pCO2；電流計量(Amperometry)-氧化還原法：pO2；光學計量(Multi-wavelength Photometry)：MetHb, COHb；計算值：HCO3－、Base Excess(B.E.)、Total Carbon Dioxide (tCO2)、SO2。","rv":"(1)動脈血(Arterial) & 毛細管血(Capillary blood)：pH_7.32~7.45；pCO2_32.0~48.0 mmHg；pO2_83.0~108.0 mmHg；Base Excess_(-2)~(+3) mmol/L；HCO3_21~26 mmol/L；Total Carbon Dioxide_19~24 mmol/L；O2 Saturation_94~98 %。\n(2)靜脈血(Vein)：pH_7.31~7.39；pCO2_42.0~59.0 mmHg；pO2_15.0~50.0 mmHg；HCO3_24.0~31.0 mmol/L。","i":"協助臨床診斷病人體內血液循環中氧氣量或是酸鹼中毒的情形。","cl":"(1) pH：血液中pH增加，稱為鹼血症。臨床上形成代謝性鹼中毒，原因大部分為HCO3-增加，如服用過量鹼劑、嘔吐引起胃酸流失及鉀離子的流失。血液中pH減少，稱為酸血症。臨床上形成代謝性酸中毒，原因大部分為有機酸形成過多所引起。如：糖尿病酸中毒、細胞缺氧之乳酸中毒、腎病或服用過多的水楊酸、高鉀血症、鹼流失。緩慢呼吸引起呼吸性酸中毒。急促呼吸則引起呼吸性鹼中毒。 \n(2) pCO2：增加時稱為高碳酸血症，多為呼吸性酸中毒所引起。原因為氣管或肺臟疾病引起之呼吸道阻塞，導致肺泡換氣量減少、抑制中樞神經之藥物、吸入大量 CO2及代償性鹼中毒。減少稱為低碳酸血症，多為呼吸性鹼中毒所引起。大多發生於呼吸中樞受刺激，導致過度呼吸。 \n(3) pO2：動脈血的氧分壓增加於吸入大量氧氣或運動後。減少稱為低血氧症，主要因高地、暴露於一氧化碳環境、肺泡擴散能力減少、心肺系統的換氣及擴散不當。 \n(4) Base Excess(B.E.)：增加：表示相對性的非碳酸化合物減少，鹼中毒的情況下發生。減少：表示相對性的非碳酸化合物增加，酸中毒的情況下發生。 \n(5) O2 Sat：O2 Sat降低，表示pO2降低或血色素攜帶氧氣有問題。","tags":["糖尿病"]},{"n":"Blood gas analysis","c":"FCCBLO","p":"09041C(200點)","r":"否","ct":"08號A-line針筒；","d":"全血1 mL","g":"臨床服務組","t":"其他","m":"pH：電極法(Direct potentiometry)；pO2：電流法(Amperometry)；pCO2：電極法(Direct potentiometry)","rv":"(1)動脈血(參考資料來源：i- STAT試劑說明書)\n(A)pH：7.35~7.45\n(B)PCO2：35~45 mmHg\n(C)PO2：80~105 mmHg\n(D)Base Excess：(-2)~(+3) mmol/L\n(E)HCO3：22~26 mmol/L\n(F)Total Carbon Dioxide：23~27 mmol/L\n(G)O2 Saturation：95~98 %\n(2)靜脈血(參考資料來源：i- STAT試劑說明書)\n(A)pH：7.31~7.41\n(B)PCO2：41~51 mmHg\n(C)PO2：Not applicable\n(D)Base Excess：(-2)~(+3) mmol/L\n(E)HCO3：23~28 mmol/L\n(F)O2 Saturation：Not applicable\n(3)動脈血(總院檢驗醫學部操作)\n(A)pH：7.32~7.45\n(B)PCO2：32.0-48.0 mmHg\n(C)PO2：83.0~108.0 mmHg\n(D)Base Excess：(-2)~(+3) mmol/L\n(E)HCO3：21~26 mmol/L\n(F)Total Carbon Dioxide：19~24 mmol/L\n(G)O2 Saturation：94~98 %\n(4)靜脈血(總院檢驗醫學部操作)\n(A)pH：7.31~7.39\n(B)PCO2：42.0~59.0 mmHg\n(C)PO2：15.0~50.0 mmHg\n(D)Base Excess：(-1.5)~(+3.1) mmol/L\n(E)HCO3：24.0~31.0 mmol/L","i":"協助臨床診斷病人體內血液循環中氧氣量或是酸鹼中毒的情形","cl":"(1)pH：血液中pH >7.45(增加)，稱為鹼血症。臨床上形成代謝性鹼中毒，原因大部分為HCO3-增加，如服用過量鹼劑、嘔吐引起胃酸流失及鉀離子的流失。血液中pH<7.35(減少)，稱為酸血症。臨床上形成代謝性酸中毒，原因大部分為有機酸形成過多所引起。如：糖尿病酸中毒、細胞缺氧之乳酸中毒、腎病或服用過多的水楊酸、高鉀血症、鹼流失。緩慢呼吸引起呼吸性酸中毒。急促呼吸則引起呼吸性鹼中毒。\n(2)pCO2：PCO2與pH一起用於評估酸鹼平衡。主要呼吸性酸中毒（PCO2增加）的原因是氣道阻塞，鎮靜劑和麻醉劑，呼吸窘迫綜合徵和慢性阻塞性肺病。 原發性呼吸性鹼中毒（PCO2降低）的原因是由於慢性心力衰竭，水腫和神經系統疾病以及機械過度通氣導致的缺氧（導致過度通氣）。\n(3)pO2：測量溶解在血液中的氧的張力或壓力。動脈血的氧分壓增加於吸入大量氧氣或運動後。減少稱為低血氧症，主要因高地、暴露於一氧化碳環境。引起PO 2值降低的一些原因包括肺通氣減少（例如，氣道阻塞或腦創傷），肺泡空氣和肺毛細血管血液之間的氣體交換受損（例如支氣管炎，肺氣腫或肺水腫）和流量改變 心臟或肺內的血液（例如，心臟的先天性缺陷或靜脈血分流到動脈系統未在肺中氧合）。\n(4)HCO3 (bicarbonate)：碳酸氫鹽；血漿中最豐富的緩衝液，是血液緩衝能力的指標。主要由腎臟調節，HCO3是酸鹼平衡的代謝成分。原發性代謝性酸中毒（HCO3降低）的原因是酮酸中毒，乳酸酸中毒（缺氧）和腹瀉。 原發性代謝性鹼中毒（HCO3升高）的原因是嘔吐和抗酸治療。\n(5)Base Excess(B.E.)：定義為在37℃下在40mmHg的PCO 2分壓下將平均細胞內流體（血漿加間質液）滴定至動脈血漿pH 7.40時可滴定鹼的濃度減去可滴定酸的濃度。增加：表示相對性的非碳酸化合物減少，鹼中毒的情況下發生。減少：表示相對性的非碳酸化合物增加，酸中毒的情況下發生。\n(6)TCO2：酸鹼不平衡和電解質不平衡的評估。\n(7)O2 Sat（氧飽和度）：\n是氧合血紅素(oxyhemoglobin)的量，其表示為能夠結合氧的血紅素的總量的一部分（氧合血紅蛋白加去氧血紅素）。O2 Sat是可用於組織灌流的氧含量有效預測器。O2 Sat降低，表示pO2降低或血色素攜帶氧氣有問題。","tags":["糖尿病","電解質/代謝"]},{"n":"Blood parasite (血液寄生蟲鏡檢)","c":"FHEPAR","p":"08007C(50點)","r":"否","ct":"04號-紫頭管","d":"3 mL","g":"微生物組","t":"24小時","m":"Giemsa stain/microscope","rv":"Not found","i":"懷疑血液寄生蟲感染時之檢查","cl":"除報告”Not found”外，其他結果均表示感染blood parasite。","tags":["其他"]},{"n":"Blood smear interpretation/血液抹片檢查","c":"FHEBSI","p":"15022C (360點)","r":"否","ct":"04號-紫頭管；小兒科患者可採用13號-微量紫頭管","d":"(A)04號-紫頭管：3 mL\r\n(B)13號-微量紫頭管(","g":"血液及組織相容組","t":"其他","m":"人工血液抹片鏡檢 WBC/RBC/Platelet","rv":"請參照臨床病理醫師/Technical supervisor判讀結果","i":"(1)血球完全計數（CBC）異常：當患者的CBC顯示異常結果時，例如紅血球計數偏低或偏高（貧血或多血症），白血球計數偏低或偏高，或血小板減少或增多，血液抹片檢查可以幫助進一步調查潛在原因。\n(2)貧血調查：協助診斷貧血類型（例如缺鐵性貧血、溶血性貧血、巨球細胞性貧血）以及識別異常的紅血球形態。\n(3)白血球增多或減少調查：幫助診斷白血球計數增多或減少的原因，並鑑別不成熟或非典型細胞等異常細胞類型。\n(4)血小板減少或增多：藉血小板形態的判讀，協助診斷異常血小板計數的原因或出血/凝血的障礙。\n(5)感染或炎症：顯示與細菌、病毒或寄生蟲感染和炎症過程相關的白血球細胞變化。\n(6)溶血性疾病：有助於診斷溶血性貧血，並鑑別與溶血有關的特定紅血球變化。\n(7)骨髓疾病：提供關於骨髓疾病（如白血病、骨髓增生異常症候群和骨髓增生性腫瘤）的診斷參考。\n(8)瘧疾和其他寄生蟲感染：協助診斷瘧疾和其他血液寄生蟲感染。\n(9)治療監測：可用於監測接受某些血液疾病治療的患者，以評估治療的有效性(如是否達到緩解標準)。","cl":"以血液抹片鏡檢紅血球、白血球和血小板的形態，並識別任何異常或非典型特徵，以協助醫師於相關疾病的診斷與鑑別。","tags":["腫瘤標記","貧血/血液疾病"]},{"n":"Blood type (ABO)","c":"FBBBLO","p":"11001C(30點)","r":"是","ct":"採檢容器：血液（全血）/07號6 mL紫頭管(K2","d":"(A)血型檢測：6 mL；新生兒科(<120天)：0.5 m","g":"血庫組","t":"其他","m":"(1)管柱凝集法Column Agglutination test (CAT gel card)為主要檢驗方法\n(2)立即離心法(人工法)為輔助檢驗方法","rv":"分佈頻率:A 型25%；B型25%；O型42%；AB型6%","i":"血型檢測或患者待接受輸血時之輸血前檢驗","cl":"定義患者血球表面A&B抗原表現型態。以ABO血型不合的紅血球輸血是極端危險的，因紅血球的破壞是在血管內，而且是立即性的，即使少量都可能致命。","tags":["輸血/血型"]},{"n":"Bone marrow smear細胞分類計數","c":"FBMASP","p":"08128B(946點)","r":"否","ct":"72-骨髓抹片袋","d":"骨髓抹片至少6片及週邊血液抹片至少各兩片","g":"血液及組織相容組","t":"其他","m":"細胞化學染色法(Liu's stain)及人工鏡檢細胞分類","rv":"1.Erythroblasts：18-24%\n2.Myeloblasts, type I：0-1%\n3.Myeloblasts, type II：0-2%\n4.Promyelocytes：1-4%\n5.Neutrophils and precursors：53-63%\n6.Monocytes and precursors：0-2%\n7.Eosinophils and precursors：1-3%\n8.Basophils and precursors：0-1%\n9.Lymphocytes：8-12%\n10.Plasma cells：0-2%\n11.Megakaryocyte：≧1/LPF","i":"調查造血功能異常及評估骨髓造血功能，評估癌症轉移，診斷血液相關疾病。","cl":"藉由骨髓細胞表現及分佈，輔助臨床診斷相關疾病。","tags":["腫瘤標記","貧血/血液疾病"]},{"n":"Bone-Alkaline phosphatase(BAP)","c":"FBIBAP","p":"08130C(325點)","r":"否","ct":"02-黃頭管(Serum separator tu","d":"2 mL全血","g":"生化免疫組","t":"1週以上","m":"化學冷光免疫分析法( Chemiluminescence  immunoassay, CLIA)","rv":"5.1~20.2ug/L","i":"可監控Paget’s disease病人接受biophosphates之治療成效或是停經後婦女接受biophosphates或動情激素(estrogen)的療效。","cl":"BAP或稱Ostase是骨質代謝中之生物指標。骨質是一個不斷在進行新陳代謝活動的組織，其造骨與噬骨細胞交替進行造骨與噬骨的動作以達到新陳代謝的作用，BAP是一種醣蛋白(tetrameric glycoprotein)與Carboxy-terminal glycan-phosatidyl-inosital anchor附著於骨細胞膜上。血清中的BAP是造骨細胞再進行造骨活動時所分泌出來的一種酵素，經磷酯酵素作用釋出於血液循環中，其濃度可反應造骨細胞的代謝狀況、了解代謝骨骼疾病的嚴重程度及對治療的反應。可供監測的疾病包括有Paget’s disease、成骨不全症、骨質疏鬆症、原發性副甲狀腺亢進症及癌正骨轉移。荷爾蒙補充治療(HRT)後，血清BAP濃度會下降。大部分的骨質疏鬆患者發生於停經後女人雌激素E2的缺乏，以及卵巢切除的病人。大量骨質流失乃在於合成與流失作用之失調，停經後缺乏雌激素分泌。幾個研究報告顯示，Ostase濃度可於3~6個月內降低25%作為治療效果之判斷，此比一般X光及超音波檢查需要長達兩年以上才測得出骨質±3%的差異，更有效的追蹤治療效果；Critical difference: 25%。","tags":["甲狀腺","荷爾蒙/內分泌"]},{"n":"B-type natriuretic peptide(BNP) (B型鈉尿縮氨酸)","c":"FRCBNP","p":"12193B (800點)","r":"是","ct":"14號珍珠白蓋頭管(K2EDTA)。","d":"全血3 mL","g":"生化免疫組","t":"急診可","m":"雙向免疫酵素冷光分析法(two-site immunoenzymatic assay , sandwich)","rv":"≦100 pg/mL；檢驗備註：\n廠商試劑說明書說明以健康族群第95百分位為閾值，男性為56.9 pg/mL，女性為84.2 pg/mL。","i":"用來輔助診斷充血性心衰竭，有助於評估充血性心衰竭的嚴重程度，用於急性冠狀動脈綜合徵患者的風險分級，用於心衰竭患者的風險分級。","cl":"心臟衰竭是一種臨床綜合徵，其特徵在於心臟結構和功能性異常造成全身灌注不足以滿足身體的代謝需求，導致心輸出量降低和/或心室壓力升高；因此左心室功能障礙是導致心臟衰竭的前驅因素之一，部份的冠心病、動脈性高血壓、瓣膜疾病、及原發性心肌疾病中, 都可以出現左心室功能障礙。如果左心室功能障礙沒有治療而且是繼續呈進行性的話，潛在的死亡率是高的，例如，死於突發性心因性猝死。\nB型利鈉蛋白鏈(Brain natriuretic peptide, BNP)和氮端原生B型利鈉蛋白鏈(N-terminal pro-brain natriuretic peptide, NT-pro-BNP)是心臟衰竭很重要的生化指標，紐約心臟學會[NYHA]依據心臟機能不全出現症狀嚴重性分為I – IV等級(NYHA stage I~IV)，已證實利尿鈉?對心血管功能的監控有著重要性。有數項研究顯示利尿鈉?可用於診斷與左心室功能障礙有關的臨床問題。利尿鈉?分為心房利尿鈉?(ANP)、B型利尿鈉?(BNP)、和C型利尿鈉?(CNP)。\nANP和BNP(兩者為腎素-血管收縮素-醛固酮系統的拮抗物)藉著它們的利鈉和利尿的特性，能影響人體內電解質與體液的平衡。在左心室功能障礙的病人中，他們血清或血漿BNP濃度會上升，不具活性的氨基端片段—NT-proBNP—之濃度也會上升。\n於急性期，BNP或NT-proBNP可協助分辨病人呼吸困難為心因性或非心因性，及幫助確認左心室功能障礙的病人。歐洲心臟學會的慢性心臟衰竭診斷與治療工作小組在他們的指引中建議了利尿鈉?(包括NT-proBNP)“基於一致的及非常高的陰性預測值，因此可能是臨床上最有用的排除性測試。\nBNP及NT-proBNP濃度受年齡及性別影響，年齡與其濃度呈正相關，女性濃度較男性高；亦受到腎功能影響，其部份經由腎臟代謝，因此當腎功能不佳時，濃度液會隨之升高；其他像慢性阻塞性肺病、心房顫動、急性冠心症、瓣膜性心臟病等，皆可見BNP及NT-proBNP有升高情形。","tags":["腎臟","心臟/心血管","電解質/代謝"]},{"n":"C1 esterase inhibitor","c":"FBIC1E","p":"30013B (317點)","r":"否","ct":"2號黃頭管(Serum separator tub","d":"3 mL全血","g":"臨床服務組","t":"其他","m":"免疫散射法(Immunonephelometry assay)","rv":"0.21~0.39 g/L","i":"協助診斷遺傳性血管性水腫(hereditaryangioedema)","cl":"C1脂化脢抑制劑缺乏與遺傳性血管性水腫(hereditaryangioedema)有關。另其他自體免疫疾病也可能引起C1脂化脢抑制劑低下。建議加測C4以評估免疫系統補體系統之狀況。","tags":["自體免疫"]},{"n":"Ca","c":"FBICA、FRCCA、FBICAU、FBICAR","p":"09011C(40點)","r":"是","ct":"03號綠頭管(Lithium Heparin)，得","d":"(A)血液檢體--全血3.5 mL；\r\n(B)尿液檢體—尿液","g":"生化免疫組","t":"急診可","m":"ArsenazoⅢ呈色法","rv":"(1) Serum or Plasma：8.6~10.3 mg/dL；\n(2) Urine：100~300 mg/day；\n(3) Random urine:\n年齡小於7個月：尿鈣/肌肝酸比值為<0.86；\n年齡7~18個月：尿鈣/肌肝酸比值為<0.6；\n年齡19個月~ 6歲：尿鈣/肌肝酸比值為<0.41\n成人：尿鈣/肌肝酸比值為0.05~0.25。","i":"定量血清、血漿鈣及尿液鈣的濃度，診斷或治療副甲狀腺疾病、骨骼疾病及慢性腎臟疾病","cl":"鈣的測量是用來診斷或治療副甲狀腺疾病、一些骨骼疾病、慢性腎臟疾病和手足搐搦(閒歇的肌肉收縮或抽筋)。尿液中鈣濃度測量主要作為區分吸收性高尿鈣症或由甲狀腺、副甲狀腺亢進引起之高尿鈣症、Paget’s disease或腎小管性酸中毒腎漏型尿鈣之鑑別診斷。\n即便大多99%的鈣是存在於骨骼和牙齒中，在血液中的鈣是臨床上最受關注的部份。骨骼作為一個調節機制用來維持血清鈣的相對恆定性，以阻止過量的血清鈣釋出和預防低血鈣的發生。骨骼中鈣的吸收與釋出是由副甲狀腺激素所調控。\n當飲食中鈣的含量增加時，攝入鈣的百分比吸收會減少以維持相對恆定。高鈣飲食下的吸收輕微增加，反映出腎臟排出的增加。總血清鈣由三部分組成：游離鈣占50%；蛋白結合鈣占45%；複合物結合鈣，主要為檸檬酸鹽占5%。離子鈣在生理上最為重要，但已證實難以進行直接分析。不過，利用可知的蛋白質含量和血液pH值(這兩者對離子鈣濃度存在強烈影響)，可以通過總鈣估計離子鈣。鈣的濃度與磷濃度成反比。\n鈣離子在神經衝動的傳遞中是重要的，在幾種?反應中作為輔助因子，在維持正常肌肉收縮性和凝血過程中都很重要。鈣離子濃度顯著降低會引起肌肉手足抽搐。高於正常濃度的鈣離子會導致神經肌肉興奮性降低、肌肉無力和其他更複雜的症狀。\n在疾病中，鈣濃度可能高於或低於正常值。在小孩時期濃度可達最高值，並隨著年齡而下降。血清鈣的變化，可能是由於副甲狀腺疾病、各種骨病、腸道內吸收鈣的功能缺乏、腎臟疾病、多發性骨髓瘤和其他各種異常。","tags":["腎臟","甲狀腺","貧血/血液疾病"]},{"n":"CA 125","c":"FSI125","p":"12078B(400點)","r":"是","ct":"採檢容器：Blood／02號黃頭管(Serum s","d":"全血3.5 mL","g":"生化免疫組","t":"2天","m":"雙向免疫酵素冷光分析法(two-site immunoenzymatic assay, sandwich)，Beckman Coulter","rv":"97.6%健康女性為≦35.0 U/mL；100%健康男性為≦35.0 U/mL。","i":"定量偵測人類血清與血漿中CA 125抗原的含量，協助卵巢癌之治療追蹤。","cl":"血清中CA 125抗原的量可用來幫助監控上皮卵巢癌病人治療的反應。CA 125抗原的量若持續升高可能與疾病的進程有關。CA 125抗原的量若持續升高表示對於治療的反應很差，而CA 125抗原的量下降可能表示對於治療有正向的反應。CA 125抗原的量在許多上皮卵巢癌的病人體內都會上升，而在其他非上皮卵巢癌的疾病中，也有可能會上升，包括其他良性或惡性的卵巢疾病例如子宮內膜異位、肺癌、或是非癌症狀況例如懷孕。\nCA 125檢測結果會因試劑廠商之檢測方法和試劑特異性不同而有所差異，因此不同廠商檢測方法的檢測結果不可互換使用。目前本院使用的檢測試劑為Beckman Coulter Access OV Monitor試劑套組。","tags":["腫瘤標記"]},{"n":"CA 19-9","c":"FSI199","p":"12079B(400點)","r":"是","ct":"02號黃頭管(Serum separator tu","d":"全血3.5 mL","g":"生化免疫組","t":"2天","m":"雙向免疫酵素冷光分析法(two-site immunoenzymatic assay, sandwich)","rv":"≦35.0 U/mL","i":"定量在人類血清中CA19-9抗原的含量，協助胰臟癌患者之治療追蹤。","cl":"一般而言，只有少量的CA 19-9抗原會表現在正常人或是有良性腫瘤病人的血液循環中。大部分罹患胰臟癌的病人，血液中CA 19-9抗原的濃度會有上升的現象。\nCA 19-9抗原起初是在大腸直腸癌的病人中被發現的，之後陸續發現在胰臟癌、膽管癌、肝癌、胃癌還有食道炎的病人中也有CA 19-9抗原存在。但在沒有罹患癌症的病人體內也有CA 19-9抗原上升的現象，例如：肝硬化、膽道炎、肝炎、胰臟炎以及非惡性的胃腸疾病。\n胰臟癌在西方國家以及工業城市發生率較高，而在未開發的國家則較低。目前胰臟癌的發生率在歐洲有上升的現象。在美國，胰臟癌的發生率已持續25年保持不變，而胰臟癌的死亡率為第四位。\nCA 19-9抗原的濃度可用來作為胰臟癌病人治療時的監測，在胰臟癌病人的體內，高濃度的CA 19-9抗原可促進病人病程的發展。當CA 19-9抗原濃度持續不斷上升，則表示癌症有惡化的情形。 CA 19-9抗原濃度持續不斷上升，表示治療的情形比較不好；若CA 19-9抗原濃度有下降的情況，則表示有良好的治療效果。\nAccess GI Monitor檢測並不建議作為篩選的工具，因為數值若在範圍值之下也不能表示沒有胰臟癌發生，仍有其他臨床上可使用的方法來做為監測胰臟癌的進程以及病人的治療情況。\nCA 19-9抗原結果應依據病人症狀、臨床病史及其他檢驗檢查數據等臨床表現進行解釋。在一些良性腫瘤、胰腺癌、其他惡性疾病或其他非癌症疾病的血清或血漿中也可觀察到升高的濃度，所以CA 19-9不應用作癌症篩查檢測。\n本院使用Access GI Monitor檢驗試劑檢測CA 19-9，不同平台檢驗報告不可互相比較使用。","tags":["肝臟/膽道","腫瘤標記"]},{"n":"CA153","c":"FSI153","p":"12078B(400點)","r":"是","ct":"02號黃頭管(Serum separator tu","d":"全血3.5 mL","g":"生化免疫組","t":"2天","m":"雙向免疫酵素冷光分析法(two-site immunoenzymatic assay, sandwich)","rv":"≦23.5 U/mL (95th Upper reference limit)","i":"定量偵測人類血清中CA 15-3抗原的含量，輔助乳癌病人的疾病管理。","cl":"在上皮乳房細胞腫瘤的病人中，很多都有CA 15-3抗原上升的現象。但是，CA 15-3抗原上升也會表現在肺癌、卵巢癌、胰臟癌、大腸直腸癌以及一些非惡性疾病的病人中，如良性的乳房疾病、肝病、肝硬化及肝炎。在美國，乳癌是導致女性癌症死亡的第一位，其次為肺癌。全世界的統計資料顯示，乳癌發生的頻率頻繁，每十位女性即有一位患有乳癌。CA 15-3抗原已被廣泛使用為乳癌診斷的標誌，並且對於偵測乳癌的復發比CEA更加敏感。當CA 15-3抗原上升代表乳癌的發生，若CA 15-3抗原下降則表示乳癌的消退。\nCA153檢驗不適用於篩檢癌症，當檢測數值低於cutoff值時，不代表沒有乳癌存在，因此CA 153抗原濃度不應被當作癌症存在與否的絕對證據，應依病人整體臨床表現來解釋，包括症狀、臨床病史、檢驗資料以及其他箱關資訊。\n本院使用Access BR Monitor檢驗試劑檢測CA 15-3，不同平台檢驗報告不可互相比較使用。","tags":["肝臟/膽道","腫瘤標記"]},{"n":"Cadmium to creatinine ratio","c":"FDPCDR","p":"Cd: 10005B (400點)、 creatinine: 09015C (40點)","r":"是","ct":"64號15mL無重金屬殘留離心管","d":"尿液45 mL","g":"生化免疫組","t":"其他","m":"感應耦合電漿質譜儀(lnductively coupled plasma-mass spectrometry, ICP-MS)","rv":"(1)Cadmium(urine)：≦2.6 μg/L；\n(2)Cadmium to creatinine ratio：詳見備註\n參考值備註說明：\n(i)＞3.0 μg/g CRE表示有顯著暴露鎘情形；\n(ii)＞15.0 μg/g CRE表示嚴重暴露鎘情形；\n(iii)特殊健檢管理分級建議指引之異常結果為尿中鎘濃度≧5.0 μg/g CRE。","i":"檢測尿中鎘濃度，可以反映最近幾個月的暴露情形。","cl":"鎘主要通過呼吸道、消化道吸收至人體，鎘的生物半衰期非常的長，於血中的半衰期大約是2.5個月，於肝臟中大約是10年，於腎臟大約是20年，鎘主要對肝臟及腎臟產生傷害。鎘進入身體後會停留在肝臟和腎臟，從尿和糞便慢慢排出身體，因此尿中鎘為一良好生物指標，可以反映最近幾個月的暴露情形。Random urine常作為職業曝露之篩檢項目。\n鎘會抑制Sulfhydryl group酵素及鋅的吸收，堆積於腎臟中破壞腎小管；\"痛痛病\"是一種慢性鎘中毒，其會導致骨骼軟化(骨質疏鬆症)及腎功能衰竭，病人之關節和脊骨會出現極度痛楚。\n隨機尿液(Random urine)鎘檢測常作為職業曝露之篩檢項目。","tags":["腎臟"]},{"n":"Cadmium(Blood)血中鎘","c":"FDPCD","p":"10005B(400點)","r":"是","ct":"61號紫標籤深藍頭管。","d":"全血3 mL","g":"生化免疫組","t":"其他","m":"感應耦合電漿質譜儀(Inductively coupled plasma-mass spectrometry，ICP-MS)","rv":"抽菸者：＜4.0 μg/L、非抽菸者：＜1.2 μg/L；\n特殊健檢管理分級建議指引之異常結果為血中鎘濃度＞5.0 μg/L。","i":"測量血中鎘，可以反映最近幾個月的暴露情形。","cl":"鎘主要通過呼吸道、消化道吸收至人體，鎘的生物半衰期非常的長，於血中的半衰期大約是2.5個月，於肝臟中大約是10年，於腎臟大約是20年，鎘主要對肝臟及腎臟產生傷害。鎘進入身體後會停留在肝臟和腎臟，從尿和糞便慢慢排出身體，因此尿中鎘為一良好生物指標，可以反映最近幾個月的暴露情形；建議以24小時尿液送檢，Random urine常作為職業曝露之篩檢項目。\n鎘會抑制Sulfhydryl group酵素及鋅的吸收，堆積於腎臟中破壞腎小管。\"痛痛病\"(Itai-Itai disease)是一種慢性鎘中毒，其會導致骨骼軟化(骨質疏鬆症)及腎功能衰竭，病人之關節和脊骨會出現極度痛楚。\n測量血中鎘可以反映最近幾個月的暴露情形，因此對作業員工而言是一個良好的衛生改善指標。","tags":["腎臟"]},{"n":"Calcitonin","c":"FENCAL","p":"09115B(240點)","r":"否","ct":"02號黃頭管(Serum separator tu","d":"全血2 mL；血清量最少須0.5 mL","g":"生化免疫組","t":"其他","m":"化學冷光免疫分析法(Chemiluminescent immunoassay)","rv":"Males:≦18.2 pg/mL；Females:≦11.5 pg/mL","i":"定量血清中Calcitionin濃度，協助甲狀腺髓質癌及副甲狀腺機能亢進之診斷及治療追蹤。","cl":"降血鈣素主要是在甲狀腺的濾泡旁C細胞內以pre-pro hormone (前導物質)型態生成(分子量=17kDa)，在切出一小段N-terminal peptide後，降血鈣素分子被包入分泌顆粒中。Calcitonin在血液中之半衰期為10分鐘，主要經由腎臟代謝；採檢後迅速被plasma factor降解，因此須立即分裝冷凍。降血鈣素的主要功能是降低血漿中的鈣濃度。根據報導健康成人在禁食下，Calcitonin範圍是：3-19 pg/mL。\n降血鈣素濃度異常上升是甲狀腺C細胞增生及髓質型甲狀腺癌的特徵(Calcitonin超過100 pg/mL)。降血鈣素血清濃度上升也可能發生副甲狀腺機能亢進、惡性腫瘤(甲狀腺髓質癌，乳癌占20%，肺癌(oak cell、small cell)，甲狀腺癌，胰島細胞腫瘤)、腎臟功能衰竭、惡性貧血及慢性發炎疾病。下降於副甲狀腺機能亢進。","tags":["甲狀腺","腫瘤標記","貧血/血液疾病"]},{"n":"Candida albicans (白色念珠菌)","c":"FALCAN","p":"F30022C(1620點)","r":"是","ct":"03號綠頭管(Lithium heparin)","d":"全血4.5 mL","g":"生化免疫組","t":"其他","m":"螢光酵素免疫分析法(Fluorescence enzyme immunoassay, FEIA)","rv":"＜0.35 kUA/L；參考值備註：0.35~0.69 kUA/L(Class I)、0.70~3.49 kUA/L(Class II)、3.50~17.49 kUA/L(Class III)、17.5~52.49 kUA/L(Class IV)、52.5~99.99 kUA/L(Class V)、≧100 kUA/L(Class VI)。","i":"定量分析特異性過敏原IgE之濃度，協助診斷IgE媒介之過敏疾病。","cl":"過敏性疾病大約佔全世界人口30%。過敏反應主要分為四型，其中過敏原引起主要為第一型過敏反應，為外因性氣喘、花粉熱或異位性濕疹的病人，當第一次接觸過敏原，症狀會立即發作，免疫系統會產生對應過敏原之過敏原特異性IgE抗體，其會循環於血液中並接合於mast cell上，當第二次接觸相同過敏原時，會使mast cell產生去顆粒作用，使細胞內之發炎性物質，例如：histamine、serotonin等，釋放至細胞外，造成流鼻水、打噴嚏等臨床症狀產生，嚴重者甚至產生休克。可藉由檢測血液中之引起過敏相關之特異性抗體IgE(如花粉、動物毛屑、塵?及家塵等)，此可輔助了解引起過敏之過敏原種類，仍需配合其它臨床證據一起判斷。","tags":["過敏"]},{"n":"Cannabinoid confirmation (GC/MS) (大麻確認試驗(尿液))","c":"FDPCANU","p":"自費","r":"否","ct":"21號10 mL尖底管","d":"10 mL","g":"生化免疫組","t":"其他","m":"氣相層析質譜儀分析方法(Gas chromatography-mass, GC-MS)","rv":"Negative(<15 ng/mL)","i":"Cannabinoid篩檢陽性結果之確認試驗","cl":"協助臨床診斷大麻濫用","tags":["其他"]},{"n":"Cannabinoids screening","c":"FDPCAN","p":"10813B(250點)","r":"否","ct":"21號10 mL尖底管","d":"10 mL尿液","g":"生化免疫組","t":"其他","m":"酵素多重免疫分析方法(Enzyme Multiple Immunoassay Test, EMIT)，Dimension EXL，SIEMENS","rv":"Negative；\n檢驗備註：\n判定閾值：50 ng/mL。\n(1)陽性結果代表尿液中疑似含有Cannabinoids，陽性結果應進一步以氣相層析質譜儀分析法(GC-MS)確認。\n(2)陰性結果代表尿液中不含Cannabinoids或Cannabinoids濃度小於cutoff 50 ng/mL。\n(3)本篩檢結果僅適用於醫療用途(例如治療)；未經確認之陽性結果不可作為非醫療用途(如求職或法律用途)。","i":"定性篩檢尿液中是否存在大麻(Cannabinoids)","cl":"大麻(Cannabinoid，Marijuana，Tetrahydro cannabinoids, THC)是植物性刺激神經的化學成份，使用後會產生引起幻覺和其他生物效果的主要活性成份9-tetrahydrocannabinol(9-THC)可被快速吸收，9-THC幾乎可藉吸入或經由消化道被完全的代謝。9-THC的主要代謝產物即11-正-9-THC-9-羧酸(11-9-THC-9-carboxylic acid)在曝露後數小時內，可在血漿、排泄物和尿液中測得。因此檢測尿液中大麻，可測知近期是否有吸食大麻，但無法測知遠期吸食。大麻的檢驗可分為篩檢法(酵素免疫分析法)與確認法(氣相層析質譜儀法)兩階段的檢驗。尿液檢體含大麻濃度在50 ng/mL(cutoff)或以上，即會檢測為陽性(Positive)。","tags":["其他"]},{"n":"Carbamazepine","c":"FDPCAR、FRDCAR","p":"10501B(320點)","r":"是","ct":"3號綠頭管(Lithium heparin tub","d":"全血3.5 mL","g":"生化免疫組","t":"急診可","m":"同質性的酵素免疫分析法(Homogenous enzyme immunoassay method)","rv":"4.0~12.0 μg/mL (therapeutic range)","i":"定量血漿中Carbamazepine之濃度作為臨床治療藥物carbamazepine血中藥物濃度監控之依據","cl":"Carbamazepine為anticonvulsants，治療心理性肌肉運動和重癲癇症發作及三叉神經痛的指標。大部份經由肝臟代謝成為穩定的10,11-epoxide。長期治療患者血液中之Carbamazepine及epoxycarbamazepine比值約7:1，顯示存在於血液中之carbamazepine主要為原始形態。Carbamazepine及其代謝物皆具極性，且不會分泌到尿液或膽汁中，進一步代謝後產生dihydrodihydroxycarbamazepine，且部分以此形式排出，剩餘65%之藥物產物仍未被鑑定出。半衰期在不同個體間甚至相同個體有極大差異，低濃度之carbamazepine可排除中毒狀態。","tags":["肝臟/膽道","藥物/毒物監測"]},{"n":"Carboxyhemoglobin (CO-Hb)","c":"FRCCO","p":"10804B(150點)","r":"是","ct":"08號A-line針筒","d":"1 mL A-line針筒為全血0.6~1.0 mL；3 m","g":"生化免疫組","t":"其他","m":"Reduced gas chromatography","rv":"0.5~1.5%(參考值建立於無抽菸族群)","i":"協助臨床診斷一氧化碳中毒","cl":"一氧化化碳(carbon monoxide，CO)為無色氣體、有微弱的臭味，CO是一種常見的嚴重危害人體健康的窒息性化學毒物，其主要因CO與血液中的Hb結合，形成carboxy-hemoglobin(CO-Hb)，CO與Hb的親和力大於氧之200倍，因此暴露在CO的環境下會導致Hb與CO結合而失去Hb攜O2能力，致組織缺氧及死亡。對中毒的患者而言，一氧化碳血紅素在 10 ~ 20% 之間會出現頭痛、呼吸困難等症狀。超過 20% 會出現意識模糊、暴戾易怒。超過 50% 會失去知覺，持續過久可能死亡。超過 70% 會立即死亡。一氧化碳血紅素在體內的半衰期大約5小時。","tags":["藥物/毒物監測"]},{"n":"Cat epithelium (貓毛屑)","c":"FALCAT","p":"F30022C(1620點)","r":"是","ct":"03號綠頭管(Lithium heparin)","d":"全血4.5 mL","g":"生化免疫組","t":"其他","m":"螢光酵素免疫分析法(Fluorescence enzyme immunoassay, FEIA)","rv":"＜0.35 kUA/L；參考值備註：0.35~0.69 kUA/L(Class I)、0.70~3.49 kUA/L(Class II)、3.50~17.49 kUA/L(Class III)、17.5~52.49 kUA/L(Class IV)、52.5~99.99 kUA/L(Class V)、≧100 kUA/L(Class VI)。","i":"定量分析特異性過敏原IgE之濃度，協助診斷IgE媒介之過敏疾病。","cl":"過敏性疾病大約佔全世界人口30%。過敏反應主要分為四型，其中過敏原引起主要為第一型過敏反應，為外因性氣喘、花粉熱或異位性濕疹的病人，當第一次接觸過敏原，症狀會立即發作，免疫系統會產生對應過敏原之過敏原特異性IgE抗體，其會循環於血液中並接合於mast cell上，當第二次接觸相同過敏原時，會使mast cell產生去顆粒作用，使細胞內之發炎性物質，例如：histamine、serotonin等，釋放至細胞外，造成流鼻水、打噴嚏等臨床症狀產生，嚴重者甚至產生休克。可藉由檢測血液中之引起過敏相關之特異性抗體IgE(如花粉、動物毛屑、塵?及家塵等)，此可輔助了解引起過敏之過敏原種類，仍需配合其它臨床證據一起判斷。","tags":["過敏"]},{"n":"Catecholamines (24 hr urine)","c":"FENCAT","p":"09077B(1000點)","r":"否","ct":"35號50 mL無菌管","d":"尿液20 mL","g":"生化免疫組","t":"其他","m":"高效液相層析法(High Performance Liquid Chromatography)及\n還原氧化電化學法(Electrochemical Detector, ECD)","rv":"Norepinephrine: ＜97.0 μg/day、Epinephrine:＜27.0 μg/day、Dopamine: ＜500.0 μg/day","i":"協助診斷Ctecholamines上升於嗜鉻細胞瘤(pheochromocytoma)、神經母細胞瘤(neuroblatoma)及carcinoids。","cl":"Catecholamines，尿液分劃NEP、EP、Dopamine，前兩者來自腎上腺，而這三個成份都可以由神經末稍分泌，作用在血液流動及血壓控制。\n上昇於嗜鉻細胞瘤，神經母細胞瘤，腎上腺皮質瘤，Carcinoid syndrome (類癌症候群)，燒傷、激烈運動、壓力(憤怒焦慮)、咖啡因、大量酒精。Dopamine在癌症轉移時，上升的幅度與腫瘤負擔成正比。下降於神經性厭食、長期服用phenothiazines、resrpine。","tags":["腫瘤標記","荷爾蒙/內分泌"]},{"n":"CBC、WBC count、Hb、Hct、Platelet count","c":"FHECBC、FRHCBC、FHEWBC、FRHWBC、FHEHB、FHEHT、FRHHT、FHEPLA、FRHPLA","p":"CBC:08011C(200點)、WBC count:08002C(20點)、Hb:08003C(20點)、Hct:08004C(20點)、Platelet count:08006C(40點)","r":"是","ct":"04號-紫頭管；小兒科患者可採用13號-微量紫頭管","d":"(A)04號-紫頭管：3 mL\r\n(B)13號-微量紫頭管(","g":"血液及組織相容組","t":"急診可","m":"自動血球計數儀，流體細胞計數法 (Flow Cytometry Detection Method)直接測量。","rv":"WBC count：3.92-9.24×10^3/μL\nRBC count：4.16~6.05×10^6/μL(M)；3.98~5.43×10^6/μL(F)\nHb：13.1~17.9 g/dL(M)；11.8~15.9 g/dL(F)\nHCT：39.9~54.5 %(M)；36.2~49.3 %(F)\nMCV：85~99 fL\nMCH：27.3~32.5 pg\nMCHC：31.4~34.5 g/dL\nRDW：11.6~13.9 %\nPlatelet count：171-400×10^3/μL\nMPV：9.1-12.4 fL","i":"(1)WBC count:白血球增加常見於白血病、發炎、細菌或病毒感染，降低則常見\n於白血病、接受化學治療或免疫功能不全患者。\n(2)RBC count、Hb、Hct、MCV、MCH、MCHC及RDW常用於貧血之評估與診斷及血液流失之評估\n(3)Platelet count:用以檢測血小板數目，增加常見於溶血性貧血、脾切除、CML，而降低則常發生於白血病、再生不良性貧血、DIC病人。\n(4)MPV：代表檢測血小板大小分佈之平均值，增加常見於inflammatory bowel disease、免疫血小板紫斑症(ITP)、MDS等；而降低則常發生於由再生不良性貧血所導致的血小板低下。","cl":"(1)RBC count升高：主要可見於缺氧如阻塞性肺氣腫、肺源性心臟病、紫紺型先天性心臟病或慢性組織缺氧，另真性紅血球增多症、脫水或休克氧也會造成RBC count 升高。 凡是RBC count、Hb及Hct過高者即稱為紅血球增多症，簡稱「多血症」，可分為相對性與絕對性多血症： (A)相對性多血症：為末梢血之RBC count、Hb、Hct增加，而循環紅血球量未增加，常見於血漿量減少，如水分攝取不足、大量流汗或長期下痢所引起之脫水。 (B)絕對性多血症：為末梢血之RBC count、Hb、Hct和循環紅血球量均增加，生理性原因如高山居民或呼吸器疾病等，異常血色素症如一氧化碳血紅素或EPO製造異常均會造成多血症產生。\n(2)RBC count降低：常見於各種病因所致的貧血，如出血缺鐵性貧血、再生不良性貧血或溶血性貧血，另外還可見於妊娠中後期、某些老年人或進行化學治療者等。\n(3)Hb、Hct升高：真性紅血球增多症\n(4)Hb、Hct降低：貧血、出血、白血病或腎衰竭\n(5)MCV增加：分為非巨芽球性貧血症及巨芽球大球性貧血症兩種 (A)非巨芽球大球性貧血症：如急性出血、急性溶血、酒精中毒、肝病、再生不良性貧血或某些癌症。(B)巨芽球性貧血症：常見於維他命B12及葉酸缺乏、核酸代謝之遺傳障礙或骨髓障礙，如：白血病、骨髓纖維症或多發性骨髓癌。(C)吸煙也會使MCV增加。\n(6)MCV降低：為最常見之貧血，MCV及MCHC均低於正常值，主要原因為血色素合成缺陷。第一種為血色素蛋白合成障礙，如：海洋性貧血、血色素病變。第二種為血基質合成障礙，如慢性病、缺鐵性貧血及鐵芽球性貧血。第三種為正球性貧血：可能為出血性或溶血性貧血、骨髓功能低下 （hypoplasia）或再生不良(aplasia)所致。\n(7)MCH：MCH需與MCV結果進行校正，因為大球性貧血紅血球體積較大，相對的含有的血色素也會較多，而小球性貧血則反之（除非有球狀紅血球時），因此MCH比較少用於貧血的診斷。\n(8)MCHC大於35%時稱之為高色性，常因紅血球形狀改變而引起（如球狀）。低於33%時則稱為低色性，常發生在缺鐵性貧血或地中海型貧血。\n(9)RDW上升通常代表檢體中有紅血球碎片、大小一致性欠佳、營養不良的癒後、輸血或冷凝集素所致。\n(10)RDW可用來作為貧血分類的判讀依據 (A)在Hypoproliferative anemia（RPI＜2.0；Normocytic；Normochromic）中，紅血球形態與RDW正常時通常傾向為bone marrow failure（bone marrow hypoplastic）、因慢性肝、腎疾病或內分泌失調引起之貧血；紅血球形態異常並伴隨RDW上升時，則可能為bone marrow hyperplastic/ dysplastic；megaloblastoid（紅血球形態有oval macrocytes時）或是bone marrow fibrotic/ neoplastic（紅血球形態有tear drops cell時） (B)在maturation disorders anemia（RPI＜2.0；Microcytic）貧血中，RDW上升時，傾向為sideroblastic anemia或iron deficiency anemia；RDW正常時則傾向為Heterozygous thalassemia syndrome或慢性疾病引起的貧血。 (C)在maturation disorders anemia（RPI＜2.0；Macrocytic）貧血中，則傾向為liver disease、hemolytic anemia；當MCV＞115 fL時，則可能為Folate或Vitamin B 12 deficiency。","tags":["肝臟/膽道","腎臟","感染/敗血症","腫瘤標記","貧血/血液疾病","輸血/血型","凝血/血栓"]},{"n":"CBC、WBC count、Hb、Hct、Platelet count","c":"FCCCBC、FCCWBC、FCCHB、FCCHT、FCCPLA","p":"CBC:08011C(200點)、WBC count:08002C(20點)、Hb:08003C(20點)、Hct:08004C(20點)、Platelet count:08006C(40點)","r":"否","ct":"04號-紫頭管","d":"04號-紫頭管：3 mL","g":"臨床服務組","t":"其他","m":"自動血球計數儀","rv":"WBC count:3.5-9.1×10^3/μL\nRBC count：4.3~5.7×10^6/μL(M)；3.8~4.9×10^6/μL (F)\nHb：14.0~17.0 g/dL(M)；12.0~15.0 g/dL(F)\nHct：40~50 %(M)；35~44 %(F)\nMCV：86.7～102.3 fL\nMCH：27.1～32.4 pg\nMCHC：29.7～33.1 g/dL\nRDW-CV%：12.2～14.8 %\nPlatelet count：157-377×10^3/μL\nMPV：9.2-12.0 fL","i":"(1)WBC count：白血球增加常見於白血病、發炎、細菌或病毒感染，降低則常見於白血病、接受化學治療或免疫功能不全患者。\n(2)RBC count、Hb、Hct、MCV、MCH、MCHC及RDW：貧血之評估與診斷血液流失之評估\n(3)Platelet count：用以檢測血小板數目，增加常見於溶血性貧血、脾切除、CML，而降低則常發生於白血病、再生不良性貧血、DIC病人。\n(4)MPV：代表檢測血小板大小分佈之平均值，增加常見於inflammatory bowel disease、免疫血小板紫斑症(ITP)、MDS等；而降低則常發生於由再生不良性貧血所導致的血小板低下。","cl":"(1)WBC count增加:常見於細菌性感染特別是化膿性細菌感染，如膿腫、敗血症、化膿性闌尾炎、膿胸、大葉性肺炎；身體急性狀態：如急性出血、手術、組織損傷、燒傷；某些白血病、轉移性癌等疾病。\n(2)WBC count降低:桿菌感染、病毒感染及原蟲感染時，如傷寒、瘧疾、流行性感染、麻疹、病毒性肝炎；再生障礙性貧血、脾功能亢進；某些藥物的副作用，如阿斯匹林、氯黴素及化學治療藥物使用後等。\n(3)RBC count增加：主要可見於缺氧如阻塞性肺氣腫，肺源性心臟病及紫紺型先天性心臟病的相對性增加和真性紅血球增多症的絕對增高，脫水、休克、慢性組織缺氧。凡是RBC count、Hb及Hct過高者即稱為紅血球增多症簡稱「多血症」，可分為相對性與絕對性多血症兩種：(A)相對性多血症為末梢血之RBC count、Hb、Hct增加，而循環紅血球量未增加，常見於血漿量減少如因水分攝取不足或大量流汗、長期下痢所引起之脫水。(B)絕對性多血症則是RBC count、Hb、Hct和循環紅血球量均增加，生理性原因如高山居民、呼吸器疾病等。異常血色素症如：一氧化碳血紅素及EPO製造異常，均會造成多血症產生。\n(4)RBC count降低：常見於各種病因所致的貧血如出血缺鐵性貧血、再生不良性貧血、溶血性貧血，另外還可見於妊娠中後期以及某些老年人，化學治療等。\n(5)Hb、Hct增加：真性紅血球增多症\n(6)Hb、Hct降低：貧血、出血、白血病、腎衰竭\n(7)MCV增加：分為巨芽球性貧血症及非巨芽球大球性貧血症兩種 (A)非巨芽球大球性貧血症：如急性出血、急性溶血、酒精中毒、肝病、再生不良性貧血或某些癌症。(B)巨芽球性貧血症：常見於維他命B12及葉酸缺乏、核酸代謝之遺傳障礙及骨髓障礙，如：白血病、骨髓纖維症、多發性骨髓癌。(C)吸煙也會使MCV增加。\n(8)MCV降低：為最常見之貧血，MCV及MCHC均低於正常值，主要原因為血色素合成缺陷。第一種為血色素蛋白合成障礙，如：海洋性貧血、血色素病變。第二種為血基質合成障礙，如慢性病、缺鐵性貧血及鐵芽球性貧血。第三種為正球性貧血：可能為出血性或溶血性貧血，或骨髓低能（hypoplasia）或再生不良所致（aplasia）。\n(9)MCH與MCHC：MCH需與MCV結果進行校正，因為大球性貧血紅血球體積較大，相對的含有的血色素也會較多，而小球性貧血則反之（除非有球狀紅血球時），因此MCH比較少用於貧血的診斷。\n(10)MCHC：大於35﹪時稱之為高色性，常由於紅血球形狀改變所引起（如球狀）。低於33﹪時則稱為低色性，常發生在缺鐵性貧血、地中海型貧血。\n(11)RDW上升:通常代表檢體中有紅血球碎片，大小一致性欠佳，營養不良的癒後，輸血或冷凝集素。\n(12)RDW可用來作為貧血分類的判讀依據 (A)在Hypoproliferative anemia（RPI＜2.0；Normocytic；Normochromic）貧血中，紅血球形態與RDW正常時通常傾向為bone marrow failure（bone marrow hypoplastic）或因慢性肝、腎疾病、內分泌失調引起之貧血；紅血球形態異常伴隨RDW上升時，則可能為bone marrow hyperplastic/ dysplastic；megaloblastoid（紅血球形態有oval macrocytes時）或是bone marrow fibrotic/ neoplastic（紅血球形態有tear drops cell時） (B)在maturation disorders anemia（RPI＜2.0；Microcytic）貧血中，RDW上升時，傾向為sideroblastic anemia或iron deficiency anrmia；RDW正常時則傾向為Heterozygous thalassemia syndrome或慢性疾病引起的貧血。 (C)在maturation disorders anemia（RPI＜2.0；Macrocytic）貧血中，則傾向為liver disease、hemolytic anemia；當MCV＞115 fL時，則可能為Folate或Vitamin B 12 deficiency。\n(13)Platelet count下降: Idiopathic thrombocytopenia (ITP)、病毒感染、Heparin-induced thrombocytopenia (HIT)、白血病或淋巴癌、再生不良性貧血、敗血病、肝硬化、自體免疫疾病。\n(14)Platelet count上升:癌症、缺鐵性貧血或溶血性貧血、發炎、感染、脾切除。\n(15)MPV下降：再生不良性貧血\n(16)MPV上升：Inflammatory bowel disease、免疫血小板紫斑症(ITP)、MDS、Bernard-Soulier syndrome。","tags":["肝臟/膽道","腎臟","感染/敗血症","腫瘤標記","貧血/血液疾病","自體免疫","輸血/血型","結核/呼吸道","凝血/血栓"]},{"n":"CEA","c":"FSICEA","p":"12021C(400點)","r":"是","ct":"02號黃頭管(Serum separator tu","d":"血液：3.5 mL、Body fluid：3.5 mL","g":"生化免疫組","t":"2天","m":"雙向免疫酵素冷光分析法(two-site immunoenzymatic assay , sandwich)","rv":"Blood: <5.0 ng/mL；Body fluid: Not available","i":"定量偵測人類血清與血漿中癌胚胎抗原（Carcinoembryonic antigen, CEA）的含量，協助臨床之癌症治療追蹤。","cl":"癌胚抗原(CEA)血清中癌胚胎抗原的測定對於惡性疾病病人的預後和控制方面有著很多的益處，尤其是結腸直腸的癌症。連續的測定可以用來監控病人治療後其癌症的發展、復原或是復發，伴隨著治療或是外科手術後的後遺症，會看到癌胚胎抗原的持續上升，反之，癌胚胎抗原的數值降低至正常範圍表示成功的治療或是手術。\n非惡性疾病的病人和煙癮重的人血清中的癌胚胎抗原也會上升，因此，癌胚胎抗原不應該用於癌症的診斷或是篩檢無症狀的病人。Non-Small Cell Lung Cancer (NSCLC)的指標；cut off value為 5 ng/ml。研究指出測量胸腔灌洗液(Pleural Lavage Fluid)中的CEA濃度，可作為手術後總生存期 (overall survival) 的預後標記。\nCEA檢測結果會因試劑廠商之檢測方法和試劑特異性不同而有所差異，因此不同廠商檢測方法的檢測結果不可互換使用。目前本院使用的檢測試劑為Beckman Coulter Access CEA試劑套組。","tags":["腫瘤標記"]},{"n":"Ceruloplasmin","c":"FBICER","p":"12050B(275點)","r":"是","ct":"03號綠頭管(Lithium heparin)","d":"全血3.5 mL","g":"生化免疫組","t":"24小時","m":"免疫比濁法(Immunoturbidimetric assay)","rv":"15.0~25.1 mg/dL","i":"定量血漿中ceruloplasmin濃度，協助Wilson，s Disease，Menke’s syndrome及肝臟疾病之診斷。","cl":"藍胞漿素合成於肝臟為血液中之主要運銅蛋白，其次具有氧化?的活性；患有原發性膽道硬化、原發性膽道閉鎖及其他嚴重肝炎時，血液中之濃度會降低，其降低的原因來自於肝臟的總代謝量有所限制，而不是藍胞漿素的合成量不足。在某些先天異常如威爾森氏症(Wilson，s Disease)、Menke’s syndrome(遺傳性銅代謝疾病)其濃度亦會降低，而可透析的銅濃度升高，在營養不良、吸收不良、腎病和嚴重肝臟疾病（特別是膽汁性肝硬化）中可發現血漿藍胞漿素濃度降低的現象。當藍胞漿素亦是急性蛋白，在急性反應期濃度亦會增加，指的是因手術、心肌梗塞、感染和腫瘤等因素，在急性炎症期間引起血清濃度顯著升高的蛋白，通常所有發炎的疾病都會測得濃度上升；此外，在網狀內皮細胞瘤、膽道阻塞、雌激素治療、懷孕，使用避孕藥等情況中，藍胞漿素也會增加。","tags":["肝臟/膽道","心臟/心血管","腫瘤標記"]},{"n":"CH50","c":"FSICH5","p":"12104B(529點)","r":"否","ct":"02號黃頭管(Serum separator tu","d":"全血5 mL","g":"生化免疫組","t":"2天","m":"免疫比濁法(Immunoturbidimetric assay)","rv":"41.68~95.06 U/mL","i":"定量檢測血液中總典型補體活性(CH50)，以協助診斷免疫性疾病，尤其是一些因補體成分缺乏引起的相關疾病。","cl":"補體一連串反應過程有超過20種血清蛋白參與，其天然免疫系統(innate immune system)的一部分。補體以多種方式清除入侵的外來物，其主要功能是通過形成膜攻擊複合物(MAC)來裂解細菌。CH50測定在臨床用途包括：(1)評估補體系統功能的完整性，例如補體缺乏或功能不良。(2)監控體內產生免疫反應時補體的消耗狀況，例如紅斑性狼瘡(SLE)、血管炎(Vasculitis)等，這些疾病會因自體免疫反應而消耗大量補體，導致補體的整體功能變差。若先天性缺乏C1~C9及其控制蛋白，或是補體活性不足時，CH50的測定結果皆偏低。補體活性與系統性紅斑狼瘡、類風濕性關節炎、某些形式的腎炎及補體系統的遺傳缺陷的活躍期有相關性。","tags":["腎臟","自體免疫"]},{"n":"Chlamydia trachomatis and Neisseria gonorrhoeae PCR (砂眼披衣菌與淋病雙球菌分子檢測)","c":"FVPCTNG","p":"12182C+12183C (2200點)","r":"否","ct":"75號立寶紅蓋檢體瓶","d":"(A)Urine 20 mL\r\n(B)Endocervica","g":"微生物組","t":"其他","m":"Real-time PCR","rv":"Chlamydia trachomatis：Negative\nNeisseria gonorrhoeae：Negative","i":"輔助診斷砂眼披衣菌和淋病雙球菌引起的泌尿生殖系統疾病。","cl":"(1)披衣菌門(Chlamydiae) 是一種非運動性、革蘭氏陰性的真核細胞內絕對寄生菌。而砂眼披衣菌(CT)則是性傳播疾病(sexually transmitted disease, STD)中的致病披衣菌。對女性而言，泌尿生殖道受披衣菌感染可能與引發輸卵管炎、子宮外孕及輸卵管性不孕症有關聯；而對於男性則可能與引發非淋菌性尿道炎與附睪炎有關聯。其中最常受到影響的女性生殖部位為子宮頸，然而感染後可能無出現症狀，若不加以治療，可能會向上擴散到子宮、輸卵管和卵巢，進而導致骨盆腔發炎(pelvic inflammatory disease, PID)。此外，受感染的孕婦於分娩時可能會將CT傳染給新生兒而引起包涵體性結膜炎(inclusion conjunctivitis)、鼻咽感染(nasopharyngeal infections)以及肺炎(pneumonia)。男性感染者也經常是無症狀感染，若不加以治療，可能引起的主要併發症為附睪炎(epididymitis)。\n(2)淋病雙球菌(NG)是一種革蘭氏陰性、氧化?陽性的無鞭毛雙球菌，為淋病(Gonorrhea)的致病菌。淋病是美國最常見的性傳播疾病(sexually transmitted diseases, STDs)之一，每年估計新增加超過700,000名的NG感染者。男性淋病雙球菌感染者通常會導致伴隨著膿狀分泌物的急性前段尿道炎。而女性最容易感染的部位則是子宮頸，但陰道與子宮亦可能遭受感染。NG感染者尤其是女性，通常沒有症狀出現。如果不加以治療恐進而引發淋病雙球菌感染的局部併發症，包含女性的骨盆腔發炎(pelvic inflammatory disease, PID)或急性輸卵管炎以及男性的附睪炎。少數未治療患者甚至可能發生瀰漫性淋病雙球菌感染(disseminated gonococcal infection, DGI)。透過PCR早期診斷及治療相當重要。","tags":["結核/呼吸道","荷爾蒙/內分泌"]},{"n":"Chromium to creatinine ratio (尿中鉻)","c":"FDPCHR","p":"10007B (400點)","r":"否","ct":"64號15 mL無重金屬殘留離心管","d":"10 mL (最低採檢量5 mL)","g":"生化免疫組","t":"2天","m":"誘發偶合電漿質譜儀 ( Inductively Coupled Plasma – Mass \nSpectrometry)","rv":"≦ 0.4 μg/g CRE，勞工干預值：?30 μg/g CRE","i":"定量尿液中鉻濃度，協助近期鉻暴露的監控。","cl":"鉻是人體必需的微量元素，在人體的糖代謝和脂代謝中發揮特殊作用。三價的鉻是對人體有益的元素，而六價鉻為有毒物質且與癌化有關。人體中六價鉻很快會轉化成三價鉻，所以在體液內以三價鉻為主。\n因此鉻中毒通常與職業暴露有關，電鍍、焊接、皮革製造、攝影、染業及化學製造工作者有較高的暴露機會。對皮膚傷害為皮膚炎及潰瘍，食入傷害為暈眩、腹痛、嘔吐、無尿症、痙孿、休克及昏迷。人體對無機鉻的吸收利用率極低，不到1%；人體對有機鉻的利用率可達10-25%。鉻在天然食品中的含量較低、均以三價的形式存在，是與其它控制代謝的物質一起配合起作用，如激素、胰島素、各種?類、細胞的基因物質(DNA和RNA)等。\n鉻為葡萄糖耐量因子的組成部分，對調節體內糖代謝、維持體內正常的葡萄糖發揮重要作用。影響脂質代謝，降低血中膽固醇和甘油三酯的含量，預防心血管疾病。是核酸類(DNA和RNA)的穩定劑，可防止細胞內某些基因物質的突變並預防癌症。","tags":["腫瘤標記","藥物/毒物監測"]},{"n":"Chromogenic Factor VIII activity","c":"FHEF8C","p":"08060B (400點)","r":"是","ct":"10號1.8 mL淺藍頭管(3.2% buffer","d":"(A)患者Hct≦55％：上述採血試管建議採血量之±10％(","g":"血液及組織相容組","t":"其他","m":"Chromogenic Assay","rv":"Factor VIII activity：70-150%","i":"(1)使用範圍包括第八因子缺乏的檢測、使用替代性療法的A型血友病患者的監控及評估第八因子濃縮製劑的效力\n(2)本方法使用試劑中Factor IXa及Factor X均是bovine reagent，可用於監控使用Emicizumab治療病人血液中殘餘之Factor VIII活性。","cl":"(1)當APTT延長且患者有明顯出血症狀時，可懷疑為第八因子缺乏，先天性的缺乏即是所謂的A型血友病。\n(2)以Chromogenic Factor VIII 方法不受Lupus anticoagulant，heparin或其它non-specific inhibitor of coagulation之干擾\n(3)本試劑Factor IXa及Factor X之來源均為bovine reagent，故不會受到病人體內Emicizumab之干擾","tags":["其他"]},{"n":"Chromogranin A(嗜鉻粒蛋白A)","c":"FSICGA","p":"自費","r":"否","ct":"採檢容器：血液/ 02-黃頭管(Serum sep","d":"建議採檢量：2 mL全血","g":"生化免疫組","t":"其他","m":"自動化免疫螢光法(automated immunofluorescent assay; KRYPTOR Gold, Brahms)","rv":"< 101.9 ng/mL","i":"協助臨床醫師診斷神經內分泌腫瘤血清標誌(Neuroendocrine Tumor，NET)及治療追蹤。","cl":"Chromogranin A(CgA)是神經內分泌細胞內的主要蛋白，可作神經內分泌腫瘤血清標誌(Neuroendocrine Tumor，NET)，如神經母細胞瘤(Neuroblastoma)及嗜鉻細胞瘤(Pheochromocytoma)。CgA為酸性、驗水性49 kD存在神經內分泌細胞的chromaffin顆粒內。高濃度的CgA可出現在良性疾病，如腸胃道疾病、腎臟衰竭及心臟血管疾病。約50-100%的神經內分泌瘤病人可出現上升的嗜鉻粒蛋白A(CgA)，上升的程度與腫瘤的負荷量有關。以血中CgA值升高來診斷神經內分泌瘤的準確性，其特異性在71.3-85.3%，靈敏性在77.8-84%。在患有實質性腎臟病，或肝衰竭的病人血清中，會有非專一性的升高。\n接受氫離子幫浦抑制劑治療的病人會導致CgA的濃度上升。\n神經內分泌腫瘤危險因子：目前仍不確定原因；年齡：好發於40~60 歲、性別：女性比男性多、種族：黑人發生比例較高、家族史：有些與遺傳有關、免疫功能抑制：愛滋病人由於免疫系統降低，有較高風險、砷：長期暴露在砷的環境，可能會增加罹患風險。","tags":["腎臟","腫瘤標記"]},{"n":"Cl","c":"FRCCL、FBICL、FBICLU、FBICLR","p":"09023C(40點)","r":"是","ct":"03號綠頭管(Lithium Heparin)。","d":"(A)血液檢體--全血3.5 mL；\r\n(B)尿液檢體—尿液","g":"生化免疫組","t":"急診可","m":"離子選擇電極法 (ISE method)","rv":"(1)Serum or Plasma：101-109 mmol/L\n(2)Urine：110-250 mmol/ day","i":"定量血清、血漿、尿液或腦脊髓液中氯的濃度，協助診斷和治療電解質和代謝異常疾病。","cl":"氯的測量是用來診斷和治療電解質和代謝異常疾病，例如囊纖維化(Cystic Fibrosis)和糖尿病性酸中毒。","tags":["糖尿病","電解質/代謝"]},{"n":"Cladosporium herbarum(交叉黴菌)","c":"FALCLA","p":"F30022C(1620點)","r":"是","ct":"03號綠頭管(Lithium heparin)","d":"全血4.5 mL","g":"生化免疫組","t":"其他","m":"螢光酵素免疫分析法(Fluorescence enzyme immunoassay, FEIA)","rv":"＜0.35 kUA/L；參考值備註：0.35~0.69 kUA/L(Class I)、0.70~3.49 kUA/L(Class II)、3.50~17.49 kUA/L(Class III)、17.5~52.49 kUA/L(Class IV)、52.5~99.99 kUA/L(Class V)、≧100 kUA/L(Class VI)。","i":"定量分析特異性過敏原IgE之濃度，協助診斷IgE媒介之過敏疾病。","cl":"過敏性疾病大約佔全世界人口30%。過敏反應主要分為四型，其中過敏原引起主要為第一型過敏反應，為外因性氣喘、花粉熱或異位性濕疹的病人，當第一次接觸過敏原，症狀會立即發作，免疫系統會產生對應過敏原之過敏原特異性IgE抗體，其會循環於血液中並接合於mast cell上，當第二次接觸相同過敏原時，會使mast cell產生去顆粒作用，使細胞內之發炎性物質，例如：histamine、serotonin等，釋放至細胞外，造成流鼻水、打噴嚏等臨床症狀產生，嚴重者甚至產生休克。可藉由檢測血液中之引起過敏相關之特異性抗體IgE(如花粉、動物毛屑、塵?及家塵等)，此可輔助了解引起過敏之過敏原種類，仍需配合其它臨床證據一起判斷。","tags":["過敏"]},{"n":"Clostridioides difficile PCR (困難梭狀芽孢桿菌分子檢測)","c":"FVPCDP","p":"12182C (1000)","r":"是","ct":"#77立寶糞便採檢瓶","d":"非固態糞便約5 mL。","g":"微生物組","t":"其他","m":"Real-time PCR","rv":"Toxigenic strain :Not detected","i":"(1)疑似Clostridioides difficile 感染且有腹瀉病人才需檢測，請遵照院內感染控制規範時機送檢。\n(2)7天內不得重複送檢。\n(3)不得做為追蹤療效使用。","cl":"(1)Clostridioides difficile為厭氧革蘭氏陽性產孢桿菌，廣泛分佈於一般環境中。在健康的成人中C. difficile是很難進行繁殖，經常是因為過量投予廣效性抗生素治療後，造成腸道正常菌叢環境改變，使得Clostridioides difficile過度生長產生大量外毒素，此毒素會引起不明原因的嚴重腹瀉，甚至會引發危及生命的「偽膜性大腸炎」(Pseudomembranous colitis)。\n(2)C. difficile會產生兩種毒素：毒素A (tcdA; enterotoxin)和毒素B(tcdB; 外毒素)是主要造成致病的因素。大多數致病的菌株為毒素A和B均為陽性(A+B+);而毒素A陰性毒素B陽性(A-B+)的變異株被確認為具有高致病性。某些菌株會產生第三種毒素actin-specific ADP-ribosyltransferase(稱為CDT或binary toxin)，binary toxin含有兩個基因cdtA和cdtB。\n(3)近幾年，C. difficile感染出現了強毒性菌株，群聚感染對fluoroquinolone有抗藥性，這些菌型包括：North American Pulsed Field type 1 (NAP1)、restrictionendonuclease analysis (REA) type BI、polymerase-chain-reaction ribotype 027，這三種統稱為027/NAP1/BI菌株。027/NAP1/BI菌株其毒素分型也同為第三型(toxintype III)，其在毒素負調節基因tcdC上有點突變(point mutation)，增加tcdA及tcdB的毒素產生導致其毒性增強。\n(4)此項檢驗可快速偵測糞便中是否有Toxin B毒素存在，當有測到Toxigenic strain時，會同時檢測是否為027/NAP1/BI高產毒變異株型別，毒素的產生與否，可能與臨床處置及病人死亡率相關。","tags":["其他"]},{"n":"Clostridioides difficile toxin A /B (困難梭狀桿菌毒素A、B)","c":"FCSCDT","p":"13029B(402點)","r":"是","ct":"糞便(stool)：#77立寶糞便採檢瓶","d":"非固態糞便1mL","g":"微生物組","t":"其他","m":"快速免疫酵素分析法( Rapid enzyme Immunoassay)","rv":"Negative","i":"(1)針對Clostridioides difficile毒素基因檢測陽性個案確認是否有毒素釋出\n(2)不建議重覆測試(相同腹瀉病程)\n(3)不得做為追蹤療效使用","cl":"(1)在使用抗生素治療後，許多病患出現胃腸道問題，從輕度腹瀉到嚴重的偽膜性大腸炎(pseudomembranous colitis)。許多較輕微形式的胃腸道疾病和大多數偽膜性大腸炎病例，均由困難梭狀桿菌的產毒菌株引起。此微生物是一種伺機性厭氧細菌，在正常菌群被抗生素改變之後，它就會在腸道中生長。帶有毒性的基因的困難梭狀桿菌會表現出來，當沒有帶有毒性的基因不會表現出來。相關於疾病的臨床的症狀證實是由初期產生的毒素A所造成的，毒素A是一種會傷害組織的內毒素(enterotoxin)。困難梭狀桿菌也會產生出第二種毒素，毒素B。毒素B被認為是一種微生物細胞毒素(cytotoxin)，目前很多實驗室可以利用組織培養分析法偵測出來。毒性困難梭狀桿菌可以產生出這兩種毒素或是只產生毒素B。\n(2)已有報告指出Clostridioides difficile於嬰幼兒(infants)有高達50%之移生率(colonization rates)；另外在纖維性囊腫(cystic fibrosis)患者也有很高的移生率。\n(3)依感染科指引，為提升檢出率，應先檢驗Clostridioides difficile PCR (醫令碼：FVPCDP)，確認Clostridioides difficile毒素基因陽性後，再開立本檢驗確認有毒素釋放。","tags":["其他"]},{"n":"Closure time (PFA)","c":"FHEPFA","p":"08131C、08132C(734點)","r":"否","ct":"01號淺藍頭管*2管+04號紫頭管*1","d":"(A)淺藍頭管單管採檢量2.7 mL，採集兩支共5.4 mL","g":"血液及組織相容組","t":"其他","m":"Closure time by PFA-100","rv":"Col/EPI：87-169 second；Col/ADP：67-112 second","i":"此檢驗可用於輔助診斷或監控因先天性疾病、後天性疾病或是治療所導致之初級止血(Primary hemostasis) 功能，包括von Willebrand factor(VWF) dependent deficiencies及懷疑有初級止血功能異常之狀況。","cl":"(1)當Closure time檢測結果高於參考值，且患者檢測目的為評估血小板功能時，需結合以下項目進一步評估：臨床病史、診斷、出血史、用藥史、其他檢驗結果（如：CBC、platelet aggregation）。\n(2)如果closure time報告與患者臨床表現不符，需進一步執行其他檢查。\n(3)如果Collagen/Epinephrine closure time延長，而Collagen/ADP closure time正常，則代表受測者血小板功能可能受阿斯匹靈(Acetylsalicylic acid ; ASA)或含阿斯匹靈藥物影響。\n(4)當有使用ASA治療之病人Collagen/Epinephrine未延長時，較容易發生血管內栓塞之狀況。\n(5)如果Collagen/Epinephrine及Collagen/ADP closure time同時延長，則代表受測者血小板內部功能異常(如：Glanzmann thrombasthenia)、或為von Willebrand disease(VWD)患者或受非aspirin藥物影響。\n(6)針對VWD的診斷，此檢驗之Sensitivity及negative predictive value均為98%。\n(7)此檢驗之性能特徵未被建立於1歲以下之幼兒","tags":["其他"]},{"n":"CMV DNA (定性)","c":"FVPCMD","p":"12182C(1000點)","r":"否","ct":"#35_50mL無菌試管","d":"1 mL","g":"微生物組","t":"1週以上","m":"Real-time PCR","rv":"Not detected","i":"提供檢體是否含Cytomegalovirus DNA之檢測，不適合作為診斷Cytomegalovirus感染狀態使用。","cl":"檢驗結果為Positive則表示檢體中含有Cytomegalovirus DNA。","tags":["其他"]},{"n":"CMV viral load (巨細胞病毒負荷量)","c":"FVPCMQ","p":"12184C (2000點)","r":"是","ct":"#14_珍珠白蓋管(K2EDTA tube)","d":"血液：5mL","g":"微生物組","t":"3天","m":"Real-time PCR","rv":"Not detected","i":"定量血漿中Cytomegalovirus DNA，提供與CMV感染相關之病情變化及療效追蹤，不適合作為CMV篩檢或是診斷CMV感染。","cl":"巨細胞病毒(Cytomegalovirus)屬於人類?疹病毒(HHV)的第5 型，因此又稱為HHV-5，屬於人類皰疹病毒(herpes virus)群的β皰疹病毒亞群，具有典型的皰疹病毒樣結構。\n一種廣泛存在於人類之間的一種病原，一旦感染CMV之後，無法完全清除病毒，會終身潛伏在體內。新生兒CMV傳染是導致聽力損失和精神傷殘的主要病毒起因。當病毒在免疫活性的個體，導致輕度和臨床症狀不明顯的疾病；在免疫功能不足或缺損的個體，如移植接受者和AIDS的病人，它可能會導致嚴重威脅生命的併發症。在造血的幹細胞和器官移植接受者的CMV感染依然是發病率和死亡率的重大起因。CMV會直接造成組織侵入性感染，並間接引起急性和慢性移植排斥及次發性細菌、真菌和病毒感染，最終降低同種異體移植的成功率和病人的存活率。","tags":["感染/敗血症","移植/免疫"]},{"n":"Cockroach (蟑螂)","c":"FALCOC","p":"F30022C(1620點)","r":"是","ct":"02號黃頭管(Serum separator tu","d":"全血4.5 mL","g":"生化免疫組","t":"其他","m":"螢光酵素免疫分析法(Fluorescence enzyme immunoassay, FEIA)","rv":"＜0.35 kUA/L；參考值備註：0.35~0.69 kUA/L(Class I)、0.70~3.49 kUA/L(Class II)、3.50~17.49 kUA/L(Class III)、17.5~52.49 kUA/L(Class IV)、52.5~99.99 kUA/L(Class V)、≧100 kUA/L(Class VI)。","i":"定量分析特異性過敏原IgE之濃度，協助診斷IgE媒介之過敏疾病。","cl":"過敏性疾病大約佔全世界人口30%。過敏反應主要分為四型，其中過敏原引起主要為第一型過敏反應，為外因性氣喘、花粉熱或異位性濕疹的病人，當第一次接觸過敏原，症狀會立即發作，免疫系統會產生對應過敏原之過敏原特異性IgE抗體，其會循環於血液中並接合於mast cell上，當第二次接觸相同過敏原時，會使mast cell產生去顆粒作用，使細胞內之發炎性物質，例如：histamine、serotonin等，釋放至細胞外，造成流鼻水、打噴嚏等臨床症狀產生，嚴重者甚至產生休克。可藉由檢測血液中之引起過敏相關之特異性抗體IgE(如花粉、動物毛屑、塵?及家塵等)，此可輔助了解引起過敏之過敏原種類，仍需配合其它臨床證據一起判斷。","tags":["過敏"]},{"n":"Codfish (鱈魚)","c":"FALCOD","p":"F30022C(1620點)","r":"是","ct":"03號綠頭管(Lithium heparin)","d":"全血4.5 mL","g":"生化免疫組","t":"其他","m":"螢光酵素免疫分析法(Fluorescence enzyme immunoassay, FEIA)","rv":"＜0.35 kUA/L；參考值備註：0.35~0.69 kUA/L(Class I)、0.70~3.49 kUA/L(Class II)、3.50~17.49 kUA/L(Class III)、17.5~52.49 kUA/L(Class IV)、52.5~99.99 kUA/L(Class V)、≧100 kUA/L(Class VI)。","i":"定量分析特異性過敏原IgE之濃度，協助診斷IgE媒介之過敏疾病。","cl":"過敏性疾病大約佔全世界人口30%。過敏反應主要分為四型，其中過敏原引起主要為第一型過敏反應，為外因性氣喘、花粉熱或異位性濕疹的病人，當第一次接觸過敏原，症狀會立即發作，免疫系統會產生對應過敏原之過敏原特異性IgE抗體，其會循環於血液中並接合於mast cell上，當第二次接觸相同過敏原時，會使mast cell產生去顆粒作用，使細胞內之發炎性物質，例如：histamine、serotonin等，釋放至細胞外，造成流鼻水、打噴嚏等臨床症狀產生，嚴重者甚至產生休克。可藉由檢測血液中之引起過敏相關之特異性抗體IgE(如花粉、動物毛屑、塵?及家塵等)，此可輔助了解引起過敏之過敏原種類，仍需配合其它臨床證據一起判斷。","tags":["過敏"]},{"n":"Cold agglutinin","c":"FSICOL","p":"12008B(70點)","r":"否","ct":"2號黃頭管(Serum separator tub","d":"全血3.0 mL","g":"生化免疫組","t":"其他","m":"血球凝集法 (hemagglutination)","rv":"＜1:32(+)；生物參考區間備註：單次效價＞1:64(+)或連續2次結果上升4倍以上，可視為M.pneumoniae之急性感染","i":"作為感染Mycoplasma pneumoniae、Cold agglutinin disease之臨床輔助診斷。","cl":"感染M.pneumoniae的患者血清通常會出現冷凝集素，但是冷凝集素也會在其他的疾病出現：例如：Raynaud’s徵候群、肝硬化、流行性感冒、溶血性貧血或是其他急性呼吸道感染。感染M.pneumoniae的患者約33%~76%會出現冷凝集抗體(≧1：32X)，約感染7天後開始出現冷凝集抗體；於發病後第三週或第四週，抗體效價達到最高值，約2~3個月後消失","tags":["肝臟/膽道","貧血/血液疾病","結核/呼吸道"]},{"n":"Common aerobic culture (一般嗜氧培養)","c":"FMIAER、FMIAER1(移植專用)","p":"13007C(200點)、13023C(300點)","r":"是","ct":"35號50 mL無菌試管、32-1號樹脂顆粒需氧","d":"(A)\t體液(不包含膽汁、腦脊髓液及尿液)\r\n最佳檢體量:5","g":"微生物組","t":"其他","m":"(1)菌名鑑定：VITEK MS微生物鑑定質譜儀\n(2)藥物敏感性試驗： VITEK 2自動分析儀、瓊脂紙錠擴散試驗","rv":"(1)\t體液、組織、腦脊髓液、Foreign bodies：No growth\n(2)\t尿液：No growth of ≧103 CFU/mL、No growth of ≧102CFU/mL\n(3)\t生殖道\n(A)\t子宮頸、女性尿道、男性尿道、陰道：Normal flora \n(B)\t巴氏腺囊腫、子宮內膜、前列腺：No growth\n(4)\t眼部：No growth、Normal flora (僅用於結膜檢體)\n(5) 咽喉：No β-streptococcus group A isolated\n(6)\t耳朵、膿瘍：No growth、Normal flora","i":"分離與檢測檢體中的細菌，以提供臨床診斷與抗生素用藥參考，特別是無菌體液的感染其致死率高，快速且正確的報告可成功提高病人治療照顧的品質。","cl":"(1)\t腦脊髓液培養\n用以診斷或懷疑細菌性腦膜炎。對於一歲以下之嬰兒，腦膜炎的症狀不清楚，若嬰兒引起不明原因的發熱，表現腦部神經現象如煩躁不安，活動力降低，應懷疑是否為腦膜炎。\n(2)\t體液與組織培養\n檢體採集於無菌區域，有細菌生長即有意義。\n(3)\t尿液培養\n(C)\t一般尿液檢體生長菌量?105 CFU/mL時，具有臨床意義。\n(D)\t在門診患者，尿液檢體混合生長細菌時，應判定可能為汙染。\n(E)\t在門診患者之中段尿液，生長菌量<105 CFU/mL，但患者臨床出現膿尿與泌尿道感染的症狀時，具有臨床意義。\n(F)\t少量細菌(<104 CFU /mL)生長時，常見為皮膚與內外生殖器的汙染。但是在某些狀況下，例如：腸內菌的細菌量為102 CFU/mL或更高，特別生長菌為Salmonella時，是具有臨床意義。\n(G)\t不可直接由尿液檢體執行抗生素藥敏試驗，因為目前的操作方法未經FDA認可與標準化。\n(H)\t尿液一般為無菌檢體，常因尿液檢體收集、傳送或處理過程中受污染。膿尿或急性尿道炎症狀之尿液，細菌量≧102CFU/mL可能有意義。嬰兒、單導尿液或恥骨穿刺取得之尿液菌量數少皆有意義。\n(4)\t膿瘍培養\n採檢時應避免皮膚表面常在菌叢的污染，常在菌如Coagulase-negative staphylococci ，Micrococcus sp，Corynebacterium spp.，α，γ-Streptococcus spp.，Bacillus spp.，Propionibacterium spp.等。若採集深層或較有意義的部位且傳送過程適當，則大多檢體可找到致病原。\n(5)\t生殖道培養\nCervix discharge, Vagina, Female urethra discharge此部位之檢體均為非無菌區域，正常情況下即有正常細菌存在。生殖道之致病菌Neisseria gonorrhoeae, Streptococcus pyogenes, Streptococcus agalactiae, Listeria monocytogenes及Candida albicans，均會造成生殖道感染。Endometrium, Bartholin cyst, Prostate：此類檢體因較深層取得，培養出之細菌，均可能造成感染。\n(6)\t眼部培養\n眼睛部位發炎的原因可能為各種疾病所引起，主要原因是微生物感染，可能會造成結膜炎(conjunctivitis)、淚腺炎(dacryoadenitis/ dacryocystitis)、淚小管炎(canaliculitis)、細菌性角膜炎(bacterial keratitis)、細菌性眼內炎(bacterial endophthalmitis)、隔膜前蜂窩性組織炎(preseptal cellulitis)、眶隔蜂窩性組織炎(orbital cellulitis)。\n(7)咽喉培養\n咽喉含有許多正常菌群，Throat swab culture主要目的在診斷β-haemolytic group A streptococcus 之咽炎或猩紅熱，培養結果必須配合臨床表現才能確定是否感染。\n(8)\t耳朵培養\n外耳部檢體之非病源菌為Coagulase-negative Staphylococci ，Micrococcus spp.，Corynebacterium spp.，α-、γ-Streptococcus spp.，Bacillus spp.，腐生性黴菌等。若為內耳檢體採檢及傳送過程適當，則大多檢體可找到致病原。\n(9)\tForeign bodies培養\n(資料來源：Clinical practice guidelines for the diagnosis and management of intravascular catheter-related infection (ICRI): 2009 update by the Infectious Diseases Society of America)\n(A)\t若臨床懷疑為Catheter-related bloodstream infection(CRBSI)，於導管移除後須執行Catheter cultures；但Catheter cultures不應列入常規培養。\n(B)\t中央靜脈導管(CVCs)應採導管尖端送驗，而非皮下的導管部位。\n(C)\t實驗室採半定量之滾動平板接種法(semiquantitative(roll-plate) culture)，若細菌生長量≧15 CFU，表示導管有細菌移生(colonization)\n(D)\t若懷疑Catheter感染且Catheter出口滲出液(exudate)，可使用採檢拭子收集滲出液進行培養與革蘭氏染色。\n(E)\t短期導管(<14天)，包含動脈導管\n(a)\t短期Catheter tip培養，建議使用roll plate technique。\n(b)\t懷疑肺動脈導管感染，應以introducer tip送驗培養。\n(F)\t長期導管(＞14天)\n(a)\t導管插入部位與導管hub生長相同細菌，但菌落數<15CFU，強烈懷疑導管並非是造成血流感染的來源。\n(b)\t若懷疑CRBSI需移除皮下埋置靜脈輸液港(venous access subcutaneous port)時，應將該輸液港內容物與Catheter tip一起送驗培養。\n(10)\tCeftazidime/Avibactam MIC≧16μg/m呈抗藥性時，可能出現major error，結果僅供參考。","tags":["感染/敗血症"]},{"n":"Common anaerobic culture (一般厭氧培養)","c":"FMIANA、FMIANA1(移植專用)","p":"13008B、13009B(350點)","r":"是","ct":"50 mL無菌試管","d":"(A)體液：至少1mL\r\n(B)其他檢體未限定，建議採集有血","g":"微生物組","t":"其他","m":"(1)菌名鑑定：VITEK MS微生物鑑定質譜儀。\n(2)藥物敏感性試驗：瓊脂稀釋法","rv":"No growth","i":"厭氧細菌感染之鑑定","cl":"(1)檢體含有厭氧菌之特徵：深部創傷帶有惡臭氣味或有氣體之檢體，人類或動物咬傷，或使用過aminoglycosides後感染之檢體。\n(2)檢體革蘭氏染色為多樣性混合細菌、嗜氧培養無生長但是革蘭氏染色可以看到細菌可懷疑厭氧菌生長。","tags":["其他"]},{"n":"Common ragweed (豬草)","c":"FALCOM","p":"F30022C(1620點)","r":"是","ct":"03號綠頭管(Lithium heparin)","d":"全血4.5 mL","g":"生化免疫組","t":"其他","m":"螢光酵素免疫分析法(Fluorescence enzyme immunoassay, FEIA)","rv":"＜0.35 kUA/L；參考值備註：0.35~0.69 kUA/L(Class I)、0.70~3.49 kUA/L(Class II)、3.50~17.49 kUA/L(Class III)、17.5~52.49 kUA/L(Class IV)、52.5~99.99 kUA/L(Class V)、≧100 kUA/L(Class VI)。","i":"定量分析特異性過敏原IgE之濃度，協助診斷IgE媒介之過敏疾病。","cl":"過敏性疾病大約佔全世界人口30%。過敏反應主要分為四型，其中過敏原引起主要為第一型過敏反應，為外因性氣喘、花粉熱或異位性濕疹的病人，當第一次接觸過敏原，症狀會立即發作，免疫系統會產生對應過敏原之過敏原特異性IgE抗體，其會循環於血液中並接合於mast cell上，當第二次接觸相同過敏原時，會使mast cell產生去顆粒作用，使細胞內之發炎性物質，例如：histamine、serotonin等，釋放至細胞外，造成流鼻水、打噴嚏等臨床症狀產生，嚴重者甚至產生休克。可藉由檢測血液中之引起過敏相關之特異性抗體IgE(如花粉、動物毛屑、塵?及家塵等)，此可輔助了解引起過敏之過敏原種類，仍需配合其它臨床證據一起判斷。","tags":["過敏"]},{"n":"Complement C3c","c":"FBIC3","p":"12034B(275點)","r":"是","ct":"02號5 mL黃頭管(Serum separato","d":"全血3.5mL","g":"生化免疫組","t":"24小時","m":"免疫比濁法(Immunoturbidimetric assay)","rv":"87.0~200.0 mg/dL","i":"定量血清中C3/C3c濃度協助臨床診斷與補體相關之免疫疾病。","cl":"補體?一群蛋值且為發炎反應的媒介，C3c占補體70%，參與傳統路徑和替代路徑，檢測C3c可協助診斷免疫疾病，特別是與補體缺乏相關的疾病。","tags":["其他"]},{"n":"Complement C4 (C4)","c":"FBIC4","p":"12038B(275點)","r":"是","ct":"02號5 mL黃頭管(Serum separato","d":"全血3.5 mL","g":"生化免疫組","t":"24小時","m":"免疫比濁法(Immunoturbidimetric assay)","rv":"13.1~50.2 mg/dL","i":"定量血清中C4濃度協助臨床診斷與補體相關之免疫疾病。","cl":"補體?一群蛋值且為發炎反應的媒介，C4占補體70%，參與傳統路徑和替代路徑，檢測C4可協助診斷免疫疾病，特別是與補體缺乏相關的疾病。","tags":["其他"]},{"n":"Congenital spherocytosis screen","c":"FHERBF","p":"08031B(400點)","r":"否","ct":"09-綠頭管(無分離膠) (Lithium he","d":"綠頭管(無分離膠)3mL*2支；紫頭管3mL*1支","g":"血液及組織相容組","t":"其他","m":"(1)血球滲透脆性試驗法(Osmotic fragility test)\n(2)Flow cytometry(EMA binding test)","rv":"(1)Osmotic fragility test:\n(A)Initial Lysis：around 0.45% NaCl\n(B)Complete Lysis：0.3-0.35% NaCl\n(2)EMA binding test:\n(A)EMA-labelled RBCs Mean Channel fluorescence(MCF)：cut-off：45.5 MCF unit\n(B)Interpretation：Negative","i":"可協助診斷先天性球狀紅血球增多症(Hereditary spherocytosis；HS)","cl":"(1)滲透脆性增加之疾病：先天性球狀紅血球增多症，新生兒溶血性貧血，嚴重燙傷，免疫性溶血貧血之急性期。\n(2)滲透脆性減少之疾病：海洋性貧血及血紅素異常症，缺鐵性貧血，嚴重肝性黃疸，摘脾手術後。","tags":["肝臟/膽道","貧血/血液疾病"]},{"n":"Connective tissue disease(CTD) Autoantibody Screen tests (結締組織疾病自體抗體篩檢(定性))","c":"FSICTD","p":"12063B","r":"是","ct":"03號綠頭管(Lithium heparin)。","d":"全血2 mL","g":"生化免疫組","t":"其他","m":"螢光酵素連結免疫分析法(Fluorescence enzyme immunoassay, FEIA)","rv":"Negative","i":"定性測定人類血清和血漿中的抗核IgG抗體，進而協助臨床診斷全身性紅斑性狼瘡、混合性結締組織疾病、Sjogren氏症候群、硬皮症、以及多發性肌炎/皮肌炎。","cl":"對於全身紅斑性狼瘡(systemic lupus erythematosus, SLE)的診斷，dsDNA抗體被認為是一個具有高度特異性的生物標記，且作為此疾病的臨床診斷標準之一(美國風濕病學院標準, ACR criteria)。超過90%全身紅斑性狼瘡患者的血清中含有dsDNA抗體。此外，測定dsDNA抗體可作為監測全身紅斑性狼瘡患者確診之臨床病程的工具，因為dsDNA抗體的效價與疾病的活躍程度具有明確的相關性，尤其是腎臟損傷。 \nSm抗體作為SLE的臨床標記，提供了很高地特異性但相對較低的靈敏度。實際上，該抗體的存在為修訂版的美國風濕病學院(ACR)的診斷標準之一，即使其在SLE的總盛行率只有20%到30%。\nU1-snRNP抗體通常會出現在全身紅斑性狼瘡(SLE)和混合型結締組織疾病(MCTD, Sharp Syndrome)。於混合型結締組織疾病(MCTD)，需檢測到U1-snRNP抗體才能確診，然而該抗體在SLE患者出現的機率只有30~40%。\nSS-A/Ro抗體的檢測對於SLE(盛行率40~50%)和修格蘭氏症候群(於原發性修格蘭氏症候群的盛行率60-75%)於臨床診斷有其重要性及意義。研究指出其與某些疾病的次類別具有緊密的關聯性，像是亞急性皮膚紅斑狼瘡(subacute cutaneous LE)、新生兒紅斑性狼瘡(neonatal lupus erythematosus, NLE)或修格蘭氏症候群(Sjogren's syndrome)的血管炎。由於在許多SLE或修格蘭氏症候群患者體內SS-A/Ro可能是唯一會出現的抗體，若無法檢測出抗SS-A/Ro將導致其他檢測法無法彌補的無效診斷。 \nSS-B/La抗體為修格蘭氏症候群的血清學標記，但仍有少部分患者的檢測結果呈現陰性。於6~15%的SLE患者血清中可測得La抗體，此與低盛行率的dsDNA抗體和腎臟疾病相關。雖然Ro抗體先被確認與NLE具有強烈的相關性，但大多數患有NLE新生兒的母親血清中也可以檢測出La抗體。 \nCENP抗體可於70-90% CREST症候群(為相較上具有較好預後的局限型硬皮病)患者身上發現。然而，該抗體也可於雷諾氏症候群(Raynaud's phenomenon)和原發性膽汁性肝硬化(Primary Biliary Cirrhosis)的患者身上驗出(約10~20%)。 \nScl-70抗體是硬皮症特有的特異性生物標記(尤其是擴散型；出現頻率可達70%)。 \nJo-1抗體可作為多發性肌炎/皮肌炎的生物標記(其盛行率約25%)，但也會出現在皮肌炎重疊症候群(polymyositis overlap syndrome)的患者。其與間質性肺炎(interstitial pneumonitis)相關，相較於成人，僅出現於非常小部份患有肌炎的兒童。帶有Jo-1抗體的患者往往具有較嚴重的病況，較容易復發並且預後也較差。\nFibrillarin抗體在免疫螢光法中產生核仁型的型態。少於15%的硬皮症患者出現此抗體，且與肺高血壓、肌炎和腎臟疾病等內臟器官的疾病相關。除了硬皮症，Fibrillarin抗體也會出現於其他疾病，但其臨床相關性仍待進一步研究。 \nRNA polymerase III抗體對硬皮症具有很高的特異性，比起侷限型硬皮症，其在廣泛型硬皮症的病患中較常見。於廣泛型硬皮症患者的檢體中，RNA polymerase III抗體是最常被檢測出的抗體(35-45%)。 \n核醣體P蛋白的抗體會與特定的核醣體蛋白(P0, P1和P2)反應。這些自體抗體會出現於活動性(active)SLE，並且與神經精神病、腎臟和肝臟表現相關。23%的SLE患者可驗出此抗體。 \n多發性肌炎／硬皮症(PM-Scl)複合體的自體抗體是全身性硬化症患者體內最早被發現的抗核抗體。Anti-PM-Scl與特定形態的硬皮症有關聯，事實上，產生此抗體的病患族群只有2%是硬皮症，而24%的病患是肌炎-硬皮症重疊症候群。此抗體與疾病的良性進程及對類固醇治療的正向反應有關。\n增生細胞核抗原 (proliferating cell nuclear antigen, PCNA)的抗體出現於2至10%的SLE患者，但是其對SLE的特異性並不高，因為12.3%的B型肝炎患者和18.7%的C型肝炎患者也可檢測出此抗體。 \nMi-2核抗原的自體抗體為多發性肌炎／皮肌炎的血清標記之一，其診斷靈敏度和特異性分別約為4-18%和98-100%。此抗體與皮肌炎的關聯性非常高，出現頻率達31%","tags":["肝臟/膽道","腎臟","自體免疫","結核/呼吸道","肝炎病毒"]},{"n":"Copper (Cu)","c":"FBICU","p":"09047B(130點)","r":"是","ct":"65號紅標深藍頭管","d":"全血5 mL","g":"生化免疫組","t":"其他","m":"感應耦合電漿質譜法(lnductively coupled plasma-mass spectrometry, ICP-MS)","rv":"(1)成年人(男)700~1400 μg/L，成年人(女)800~1550 μg/L(參考資料來源：Henry’s Clinical Diagnosis and Management Laboratory Methods. 21Edition.)；\n(2)0~3個月90~460 μg/L，4~6個月250~1100 μg/L，7個月~1歲500-1300 μg/L，1~5歲800-1500 μg/L，6~9歲830~1360 μg/L，10~13歲(男)800~1210 μg/L，10~13歲(女)820~1200 μg/L，14~19歲(男)640-1170μg/L，14~19歲(女)720~1600 μg/L(參考資料來源：CLSI C38-A: Control of Preanalytical Variation in Trace Element Determinations; Approved Guideline)","i":"定量血清中Copper (Cu)濃度，協助診斷(1)後天銅缺乏(吸收不良，營養不良)(2)基因遺傳之銅缺乏(Menkes disease)(3)職場暴露之銅中毒(4)意外食入(5)基因遺傳之銅中毒(Wilson's disease)。","cl":"銅(Copper, Cu)是身體必需的微量金屬之一，是許多金屬?的重要成分。Cu濃度會有日夜差異，早晨Cu濃度較高。Cu增加的因素有肝疾病、感染、發炎、外傷、懷孕、白血病等；減少於Wilson's disease、腸胃道疾病、Menkes’disease、纖維性囊腫、腎病症候群、燒傷、蛋白質營養不良等。口服避孕藥藉增加ceruloplasmin濃度來提高Cu濃度。當急性期反應(如感染或組織損傷)和妊娠可導致血清銅及銅藍蛋白(ceruloplasmin)濃度上升。\n血中銅缺乏的原因，常見包括吸收不良(如乳糜瀉)、過量攝取鋅(鋅會抑制銅吸收)、營養不良和早產嬰兒缺乏銅儲存，當血漿銅濃度低於500 μg/L或嬰兒低於300 μg/L，可能表示銅缺乏。\n與銅代謝相關的疾病有Wilson's Disease及Menke's Disease。Wilson's Disease是體染色體隱性遺傳，當基因發生突變時使銅無法正常排除，最終再肝臟、腎臟、大腦和眼睛累積，血清銅濃度通澄會正常至偏低，但銅運輸蛋白(如ceruloplasmin)會下降，因此血漿游離銅明顯升高，使得尿銅排泄量增加(200 μg/天以上)，此為重要診斷指標之一；Menke's Disease是X體染色體隱性遺傳，當基因發生突變時使銅無法有效利用或分配，導致銅缺乏，血液中銅和銅藍蛋白濃度會偏低。","tags":["腎臟","貧血/血液疾病"]},{"n":"Cord blood IgE","c":"FSICOE","p":"自費","r":"否","ct":"02號黃頭管(Serum separator tu","d":"臍帶血全血3 mL；臍帶血血清/血漿量最少須0.5 mL","g":"生化免疫組","t":"其他","m":"螢光酵素連結免疫分析法( Fluorescence enzyme immunoassay, FEIA)","rv":"Cutoff：＜0.90 kU/L","i":"定量血清或血漿中之低濃度IgE，協助臨床診斷IgE-mediated過敏疾病","cl":"過敏性疾病常見血清中Total IgE濃度上升，HAMBURGER在1974第一次提出使用臍帶血IgE來預測將來過敏疾病的發生。胎兒從懷孕第十一週起即開始合成IgE，母親的IgE並不會通過胎盤。因此，臍帶血IgE曾被認為是異位性體質產生的一項預測指標。1988年後的研究顯示，臍帶血IgE對於異位性體質產生的預測具專一性，但敏感性卻不足。且即使合併其他影響因子，如性別、家族史、皮膚過敏狀態和環境因素，仍無法有意義增加臍帶血IgE的預測率。臍帶血IgE較高的新生兒，日後較易罹患過敏性鼻炎，異位性皮膚炎，蕁麻疹及氣喘等過敏性疾病。而臍帶血IgE濃度較高所引起的過敏，則與飲食所引起的過敏有極相當的關聯性(如牛奶、有殼之海鮮及堅果等)，反而和吸入性的過敏原比較無關聯性(如花粉)。","tags":["過敏"]},{"n":"Cortisol (Blood, AM)、Cortisol (Blood, PM)、Cortisol (24 hr urine)","c":"FENCOA、FENCOP、FENCOU","p":"09113B(240點)","r":"是","ct":"03號綠頭管(Lithium heparin)；(","d":"血液3.5 mL；尿液3 mL(容器5分滿)","g":"生化免疫組","t":"2天","m":"競爭結合免疫酵素分析法(competitive binding immunoenzymatic assay)","rv":"(1) Cortisol (AM)(blood)：6.7~22.6 μg/dL (> 6歲)；\n(2) Cortisol (PM)(blood)：＜10.0 μg/dL(> 6歲)；\n(3) Cortisol (24 hours urine)：58~403 μg/ day (> 6歲)","i":"(1)定量偵測人類血液cortisol濃度可以(A)輔助診斷Hypothalamic、pituitary及adrenal malfunction；(B)用於評估ACTH stimulation test；(C)用於評估Dexamethasone stimulation test。\n(2)定量偵測尿中cortisol濃度，可以反應血液中未結合型cortisol以輔助診斷adrenal hyperactivity。","cl":"Corticosteroids由腎上腺皮質的膽固醇所合成，在男性中Cortisol為最主要製造及分泌出的一種皮質類固醇。Cortisol的生理活性(a)蛋白質、脂肪和碳水化合物的代謝，(b)維持肌肉和心肌的完整性，(c)抑制發炎以及過敏的活性。促腎上腺皮質激素(Adrenocorticotropic hormone，ACTH)刺激腎上腺皮質合成和釋放皮質素，而促腎上腺皮質激素是由垂體在下丘腦釋放的促皮質素釋放激素(corticotropic-releasing hormone，CRH)刺激下所產生和釋放的。未結合的皮質素在下丘腦-垂體-腎上腺皮質軸(HPA)中的下丘腦-垂體的濃度扮演了一個負回饋的機制。另外，晝夜變化以及如致熱源引起的發燒、嚴重的精神錯亂或外傷等壓力會影響到腎上腺皮質的神經內分泌的調節。\n皮質素濃度的不正常改變可能是由於下丘腦、垂體或腎上腺的功能異常所引起，如果沒有明確診斷和治療，這些失調可以導致嚴重的代謝失衡，可能會引起生命危險。檢測血清或血漿中的皮質素(檢測早晨和夜晚的濃度和/或壓力試驗如ACTH激發試驗或dexamethasone抑制試驗)可幫助診斷腎上腺相關的疾病。過高的皮質素濃度可在庫欣氏症候群(Cushing’s syndrome)(腎上腺皮質功能亢進)中發現，而過低的皮質素濃度可在阿迪氏病(Addison’s Disease)(腎上腺皮質功能不足)中發現。Cortisol的分泌取決於下視丘-腦下腺-腎上腺(HPA)整個軸承的完整性。透過此軸承，Cortisol會對本身的分泌量施行一負向抑制回饋機制。Cortisol的量測是評估HPA軸承是否異常的一重要參數。\n血液中Cortisol的半衰期約為80分鐘，在尿液中大約以固定1%的速率進行排泄。皮質素與蛋白的結合可避免被肝臟代謝，而血清中未結合(或游離)的皮質素被肝臟代謝後會產生很多其他的形式或代謝產物。許多的代謝產物(鍵結的、糖基化的或硫基化的)是水溶性的，會很快排泄到尿液中，而一小部分的皮質素(<100 μg/24小時)和其他可萃取的代謝產物也會排泄到尿液中。尿中皮質素的檢測可經過一個萃取的步驟，即檢測前去除一些水溶性的代謝產物，或直接對尿液進行檢測。測量尿液中的皮質素可反映出血清中未結合(或游離)皮質素的量，可幫助診斷腎上腺功能亢進。尿中皮質素濃度的上升，是庫欣氏症候群(腎上腺皮質功能亢進)的可能診斷依據。","tags":["荷爾蒙/內分泌"]},{"n":"Cotinine (可丁尼, 尼古丁)","c":"FDPCOT","p":"自費","r":"否","ct":"66號白頭塑膠管","d":"尿液3 mL(白頭塑膠管約五分滿)","g":"生化免疫組","t":"其他","m":"Enzymeimmunoassay，Microgenics，ADVIA Chemistry XPT，SIEMENS","rv":"< 0.5 μg/mL","i":"半定量尿液中尼古丁(Cotinine)濃度，協助評估抽菸的量。","cl":"Cotinine 是尿液裏尼古丁(Nicotine) 的主要代謝產物，是Nicotine的特異性標幟，尼古丁在血中的半衰期只有30分鐘。可以用來區分抽菸者及非抽菸者，推測吸菸的量，是戒菸追蹤的一個重要標幟。\n抽菸者停止抽菸7~10天，其Cotinine濃度則會降到與非抽菸者的濃度一樣。","tags":["其他"]},{"n":"C-peptide","c":"FENCPA、FENCPP","p":"09128B(180點)","r":"是","ct":"02號黃頭管(Serum separator tu","d":"全血3.5 mL","g":"生化免疫組","t":"其他","m":"電子化學冷光免疫分析法(Electrochemiluminescence immunoassay, ECLIA)","rv":"(1)C-peptide (AC)：1.1~4.4 ng/mL(5th percentile~95th percentile)；\n(2)C-peptide(PC)：Please consult endocrinologist。","i":"(1)定量檢測血清中C-peptide，協助Insulin分泌異常之診斷及治療。\n(2)當臨床使用意圖為診斷目的時，應整合病人用藥，臨床檢查結果或其他臨床表現進行評估。","cl":"在胰臟之胰島細胞中先形成proinsulin，proinsulin的分子中的C-Peptide是一單鏈31氨基酸(AA 33-63) polypeptide，連結insulin A chain及insulin B chain，分子量約為3021 Da，Proinsulin經蛋白水解裂解會產生insulin和C-Peptide兩個分子，並分泌至血流中，C-Peptide半衰期約35分鐘，較胰島素(半衰期5分鐘)更長，因此C-Peptide在血液之濃度約為insulin 5~10倍，不過，兩者仍然呈現良好的對應關係。C-Peptide在循環系統經腎臟清除及降解。\n檢測C-Peptide、insulin和glucose可用於鑑別診斷低血糖症，是為人為的低血糖或高胰島素血症引起的低血糖。由於胰島素治療容易引發內源性胰島素抗體(insulin antibodies)之產生，干擾胰島素之測定，C-Peptide濃度更可反應內源性胰島素分泌情形；因此，C-Peptide的測定可有助於評估Type 1糖尿病早期階段的殘餘β細胞功能，並有助於鑑別診斷成人潛伏性自身免疫性糖尿病(LADA)和Type 2糖尿病。在腎功能不全和肥胖也可能導致C-Peptide濃度增加。Insulinoma患者之β cell活性增加會導致C-peptide濃度上升。","tags":["腎臟","糖尿病","自體免疫"]},{"n":"CPK","c":"FBICPK、FRCCPK","p":"09032C(40點)","r":"是","ct":"03號綠頭管(Lithium Heparin)。","d":"全血3.5 mL","g":"生化免疫組","t":"急診可","m":"Theoretical Extinction Cofficient of NADPH","rv":"30-223 U/L(參考值僅適用於成人)","i":"定量血漿中的肌酸磷化?的活性，協助診斷和治療心肌梗塞以及肌肉相關的疾病。","cl":"Creatine Kinase (EC 2.7.3.2) (肌酸磷化?)主要存在於骨骼肌、心肌、腦、紅血球中，因此當有心肌梗塞(myocardial infarction)、肌肉相關疾病(如裘馨氏肌肉萎縮症(Duchenne Muscular Dystrophy)等)、外傷或肌肉過度使用，皆會使血液中CPK濃度上升。\nCPK在心肌梗塞發生後4~6小時即會開始上升，24-36小時達到高峰，但因有很多非心臟因素導致濃度上升，因此使CPK協助心肌梗塞診斷的專一性降低。\n在心肌梗塞時，CK值會在胸痛發生後的4~6小時即會開始上升，24-36小時內出現高峰，且根據損壞程度其值可以高於正常值的十倍以上。如在雷氐症候群(Reyes Syndrome)，70倍CK活性的增加指出了腦病(encephalopathy)的嚴重性。\n但因有很多非心臟因素導致濃度上升，因此使CK協助心肌梗塞診斷的專一性降低。\nCPK在心肌梗塞發生後4~6小時即會開始上升，24小時達到高峰，但因有很多非心臟因素導致濃度上升，因此使CPK協助心肌梗塞診斷的專一性降低。","tags":["心臟/心血管"]},{"n":"CPK-MB mass","c":"FRCCKM","p":"09071C(150點)","r":"是","ct":"03號綠頭管(Lithium heparin)","d":"全血3.5 mL","g":"生化免疫組","t":"急診可","m":"雙向免疫酵素冷光分析法(two-site immunoenzymatic assay , sandwich)","rv":"0.6-6.3 ng/mL (95% central interval)","i":"輔助診斷Acute coronary syndrome及療效追蹤","cl":"CK-MB主要存在心肌細胞中，約佔20% CK；5% 存在攝護腺、脾臟或骨骼細胞，因此，測定CK-MB可作為追蹤肌肉細胞功能之變異。在急性心肌梗塞，CK-MB會出現於血液循環中，可作為心肌細胞損傷之標記：CK-MB在12小時內快速上升至最高值，在36-72小時內回復正常值；CK-MB之變化，配合EKG及胸痛之病史，可作為臨床診斷AMI之依據。CK-MB之測定同時可作為thrombolytic therapy之不具侵襲性的實驗室檢查項目；CK-MB上升也發生於骨骼肌損傷(muscle trauma)。免疫抑制法(Immuno-inhibition)常用來測定CK-MB之活性(activity)，其常與CK活性相比較(ratio CK-MB/CK)；但是，CK-BB, adenylate cyclase(AK)及atypical forms of CK(macro-CK)無法被anti-M antibody中和，使CK-MB檢測結果偽高。使用免疫分析法測定CK-MB mass (ng/mL)與CK-MB activity相關性良好，且測定時不會受CK-BB, adenylate cyclase(AK)及atypical forms of CK(macro-CK)之干擾。","tags":["心臟/心血管"]},{"n":"Crab (螃蟹)","c":"FALCRA","p":"F30022A(1620點)","r":"是","ct":"03號綠頭管(Lithium heparin)","d":"全血4.5 mL","g":"生化免疫組","t":"其他","m":"螢光酵素免疫分析法(Fluorescence enzyme immunoassay, FEIA)","rv":"＜0.35 kUA/L；參考值備註：0.35~0.69 kUA/L(Class I)、0.70~3.49 kUA/L(Class II)、3.50~17.49 kUA/L(Class III)、17.5~52.49 kUA/L(Class IV)、52.5~99.99 kUA/L(Class V)、≧100 kUA/L(Class VI)。","i":"定量分析特異性過敏原IgE之濃度，協助診斷IgE媒介之過敏疾病。","cl":"過敏性疾病大約佔全世界人口30%。過敏反應主要分為四型，其中過敏原引起主要為第一型過敏反應，為外因性氣喘、花粉熱或異位性濕疹的病人，當第一次接觸過敏原，症狀會立即發作，免疫系統會產生對應過敏原之過敏原特異性IgE抗體，其會循環於血液中並接合於mast cell上，當第二次接觸相同過敏原時，會使mast cell產生去顆粒作用，使細胞內之發炎性物質，例如：histamine、serotonin等，釋放至細胞外，造成流鼻水、打噴嚏等臨床症狀產生，嚴重者甚至產生休克。可藉由檢測血液中之引起過敏相關之特異性抗體IgE(如花粉、動物毛屑、塵?及家塵等)，此可輔助了解引起過敏之過敏原種類，仍需配合其它臨床證據一起判斷。","tags":["過敏"]},{"n":"Creatinine(血液、體液)","c":"FBICRE、FRCCRE、FBICREH、FBICCRB","p":"09015C(40點)","r":"是","ct":"03號綠頭管(Lithium Heparin)，得","d":"(A)血液檢體—全血3.5 mL；\r\n(B)體液檢體—體液1","g":"生化免疫組","t":"急診可","m":"呈色法(Jaffe rate method)，自動化儀器分析。","rv":"(1)血液肌酸酐：男生0.7~1.3 mg/dL；女生0.6~1.2 mg/dL；\n(2)Estimated GFR(eGFR)：>60 mL/min/1.73m^2；\n(備註說明： eGFR不適用於下列狀況，年齡小於18歲或大於70歲、懷孕、極端體型(如肥胖、嚴重營養不良、截肢、下半身癱瘓或其他肌肉消耗性疾病)、不尋常之飲食攝入(如素食、肌酸補充)。\n(3)體液：Not available","i":"(1)檢測血清或血漿中肌酸酐濃度，協助臨床診斷急性或慢性腎臟疾病。\n(2)檢測體液之肌酸酐濃度，可協助尿液外漏之診斷。","cl":"肌酸酐的測量是用來診斷和治療腎臟疾病，提供有效地腎小球功能評估與腎透析的監控，及作為測量其他尿液分析物的計算基礎。\n然而，血清中的濃度對早期腎損傷的反應是不靈敏的，以及反饋速度比因腎功能衰竭在血液透析治療期間所釋出的血中尿素氮(BUN)為慢。血清肌酸酐和尿素氮是用於鑑別腎前性與腎後性(阻塞)氮血症。血中尿素氮增加而血清肌酸酐未增加是鑑別腎前性氮血症的關鍵。腎後性氮血症則會發現血中尿素氮和血清肌酸酐同時增加，其中肌酸酐上升比例較尿素氮為大。血清的肌酸酐是和患者的年記、體重和性別有關。而有時也會跟其對象的肌肉大小成正比，就像是生重病的病人，斷肢者和年齡大的人。因此血清肌酸酐測出是安全值時也不能完全將腎臟的損害給完全排除。","tags":["腎臟"]},{"n":"Creatinine(尿液)","c":"FBICRR、FRCCRE、FBICRU、FBICCR","p":"09015C(40點)","r":"是","ct":"66號白頭塑膠管。","d":"尿液3 mL(白頭塑膠管5分滿)；全血3.5 mL(適用於F","g":"生化免疫組","t":"急診可","m":"呈色法(Jaffe rate method)","rv":"(1)24小時尿液肌酸酐檢測(FBICRU)：男生800~2000 mg/day；女生600~1800 mg/day。\n(2)常規尿液肌酸酐檢測(FBICRR)：Not available\n(3)肌酸酐廓清試驗(FBICCR)：男生100~120 mL/min；女生80~100 mL/min。","i":"檢測尿液中肌酸酐濃度，協助臨床診斷急性或慢性腎臟疾病。","cl":"肌酐酸是人體肌肉中肌酸的分解產物，由腎臟將其排至尿中，因此正常尿液即含有高濃的肌酐酸，此可協助評估腎臟功能。\n臨床上許多以隨機尿液為檢體的檢驗項目，幾乎都會受喝水量的影響產生稀釋或濃縮的效應，可利用同時檢測尿液creatinine濃度進行矯正，便可有效抵消喝水引起的濃度改變，因此尿液肌酐酸濃度常用來評尿液稀薄程度的參考。","tags":["腎臟"]},{"n":"Crossmatch for HLA compatibility","c":"FOTCMT","p":"12214B (2000點)","r":"否","ct":"15號-ACD淺黃頭管（ACD Solution","d":"(A)\tDonor:\r\n1.\t15-ACD淺黃頭管(ACD ","g":"血液及組織相容組","t":"其他","m":"本檢驗同時採以下兩種方法執行檢測\n(1)Flow Cytometric Crossmatch；FCXM\n(2)延長培養淋巴球微量細胞毒殺試驗（Extended Incubation lymphocyte microcytotoxicity technique）","rv":"Negative","i":"欲進行腎臟移植之患者，術前須執行此檢驗。","cl":"HLA preformed Antibody既存抗體的產生原因有：婦女懷孕、輸血及前次移植等。HLA抗體的產生，尤其是其特異性與捐贈者的抗原型相同時，會造成器官移植之急性排斥，甚或超急性排斥（Hyper Acute Rejection）。因此本項檢驗的意義，就是在移植前以受贈者血清對於捐贈者淋巴球細胞進行毒殺反應，以評估移植後發生排斥反應之風險。","tags":["輸血/血型","移植/免疫"]},{"n":"Cryofibrinogen","c":"FSICRF","p":"12070B(180點)","r":"是","ct":"02號黃頭管(Serum separator tu","d":"全血共19.8 mL","g":"生化免疫組","t":"其他","m":"沉澱法(Precipitation)","rv":"Negative","i":"協助臨床診斷冷凝纖維蛋白血症 (cryofibrinogenemia)","cl":"冷凝纖維蛋白血症(cryofibrinogenemia)可能與對冷耐受性較差之臨床症狀有關，例如雷諾氏症候群(Raynaud’s phenomenon)及因溫度較低引起之蕁麻疹(cold urticaria)，其他如紫斑、開刀後引起之血管栓塞、開刀後立即引起之皮膚壞疽，慢性腳部潰瘍、壞疽等。另外，研究顯示，冷凝纖維蛋白血症(cryofibrinogenemia)亦可能與腫瘤有關，特別是多發性骨髓瘤、數種固態腫瘤(solid tumor)、及白血病。\n曾有研究指出，在住院病人及無症狀捐血者檢體中，約有3%檢體為陽性反應。","tags":["腫瘤標記","貧血/血液疾病","過敏","凝血/血栓"]},{"n":"Cryoglobulin","c":"FSICRG","p":"12062B (163點)","r":"是","ct":"02號黃頭管(Serum separator tu","d":"9 mL全血","g":"生化免疫組","t":"其他","m":"沉澱法(Precipitation)","rv":"Negative","i":"協助臨床診斷冷凝球蛋白血症(cryoglobulinemia)","cl":"冷凝球蛋白血症(cryoglobulinemia)可造成關節炎、血管炎、腎絲球炎等組織發炎現象，也會激發其它的免疫反應，其中主要是免疫複合體及白血球介質(interleukin)產生，免疫複合體會引起補體的活化，吞噬性白血球的吞噬作用，釋出發炎介質及酵素，造成臨床上各種病變。","tags":["其他"]},{"n":"Cryptococcal Ag","c":"FSICRY、FCSCRY","p":"12069B(360點)","r":"是","ct":"02號黃頭管(Serum separator tu","d":"(A)血液：全血2 mL\r\n(B)腦脊髓液( CSF)：1 ","g":"微生物組","t":"其他","m":"免疫色層分析法（Immunochromatographic assay）","rv":"Negative","i":"以免疫色層分析法半定量檢測血清及腦脊髓液中Cryptococcus species complex (Cryptococcus neoformans 及Cryptococcus gatti)之夾膜多醣體抗原(capsular polysaccharide antigen)作為診斷隱球菌病(cryptococcosis)之依據。","cl":"(1)隱球菌病(cryptococcosis)為Cryptococcus species complex (C. neoformans 及C. gatti)感染造成之疾病。隱球菌對於細胞免疫(cell-mediated immunity)缺失的病人有較大的感染風險，也是常見造成AIDS病患伺機性感染的病因之一。IMMY CrAg LFA檢測血清和腦脊液中的隱球菌抗原（CrAg）已被廣泛應用，具有非常高的靈敏度和特異性，可作為疾病診斷及預後之追蹤。其抗原濃度與疾病嚴重程度成正相關，當抗原濃度上升或未下降，顯示治療可能無效。\n(2)若醫師懷疑有Cryptococcal infection，建議同時開立黴菌培養 (FMIFUN)。","tags":["其他"]},{"n":"CSF examination","c":"FCSCF、FRBCF","p":"12069B(360點)","r":"是","ct":"53號螺旋綠頭管/亦可使用74號黑頭無菌玻璃管代","d":"5 mL","g":"血液及組織相容組","t":"急診可","m":"(1)Appearance：以肉眼判讀\n(2)Cell count：以自動血球分析儀（體液模式）進行細胞計數。 \n(3)細胞分類以抹片進行判讀","rv":"(A)RBC count\na.Newborn preterm:0~1000（/μL）\nb.Newborn term:0~800（/μL）\nc.Neonate:0~50（/μL）\nd.> 3month:0~5（/μL）\ne.Adults:0~5（/μL）\n(B)Leukocyte count：\na.0-1 month：0~27（/μL）\nb.2 month-16 years：0~7（/μL）\nc.Adults：0~5（/μL）\n(C)Neutrophil\na.Neonates：0~8%\nb.Adults：0~2%\n(D)Lymphocyte\na.Neonates：2~38%\nb.Adults：63~99%\n(E)Monocyte\na.Neonates：50~94%\nb.Adults：3~37%\n(F)Histiocyte\na.Neonates：1-9%\nb.Adults：rare\n(G)Myelocyte：0 %\n(H)Promyelocyte：0 %\n(I)Blast：0 %","i":"懷疑患者體內有積水感染或不明出血時，可執行此項檢驗。","cl":"(A)黃色Xanthochromia 為形容CSF內紅血球溶解釋出血紅素，血紅素轉化為氧化血紅素所致。\n(B)正常CSF不會凝固，脊髓穿刺創傷檢體會形成凝固，因血漿中的纖維蛋白原（Fibrinogen）跑到CSF中。\n(C)腦脊髓液白血球計數增加而大部分細胞為嗜中性球時，顯示可能為細菌性腦膜炎；反之，如淋巴球或單核球增加時，則可能為病毒性、結核性、或黴菌性腦膜炎。\n(D)嗜伊紅性球增加且＞10%時方具臨床意義，如中樞神經系統被寄生蟲感染如廣東住血線蟲（Angiostrongylus cantonensis）、黴菌感染或過敏。\n(E)正常CSF不會出現histiocyte，但如有出血時可見histiocyte吞噬紅血球。結核性及黴菌性腦膜炎、中樞神經系統受傷、膿腫或梗塞時也會有histiocyte出現。\n(F)CSF中如出現惡性細胞可能為原發性中樞系統腫瘤如神經管胚細胞瘤或其他腫瘤轉移結果。","tags":["感染/敗血症","腫瘤標記","結核/呼吸道","凝血/血栓"]},{"n":"CSF IgG index","c":"FBIIND","p":"12025B(275點)*2+09038C(40點)+12112B(1100點)","r":"是","ct":"02號5 mL黃頭管(5 mL Serum sep","d":"3.5 mL血液(血清及0.5 mL腦脊髓液(CSF)(需同","g":"生化免疫組","t":"24小時","m":"(1)血液：免疫比濁法(Immunoturbidimetric assay) ；\n(2)CSF：免疫散射法(Immunonephelometry assay)","rv":"(1)Serum albumin：3.5~4.8 g/dL；\n(2)Serum IgG：635~1741 mg/dL；\n(3)CSF IgG：＜3.4 mg/dL；\n(4)CSF Albumin：＜35.0 mg/dL；\n(5)IgG index：＜0.8","i":"可協助與中樞神經系統，神經腫瘤或初級神經組織疾病(例如：多發性硬化症)之診斷。","cl":"CSF/Serum IgG ratio增加代表Intrathecal IgG合成或血漿IgG因血腦障壁缺損而出現於CSF。90% Multiple sclerosis (MS)患者CSF IgG濃度增加，其他如發炎性神經性疾病，CSF IgG濃度也可能上升。","tags":["腫瘤標記"]},{"n":"Cu (24 hr urine)","c":"FBICUU","p":"09047B(130點)","r":"否","ct":"Blood／64號重金屬專用HST試管","d":"尿液10 mL","g":"生化免疫組","t":"其他","m":"感應耦合電漿質譜儀(lnductively coupled plasma-mass spectrometry, ICP-MS), NexION 300 Series, PerkinElmer.","rv":"(1)Cu (urine)：＜80 μg/L; (2)Cu (24 hr urine)：＜60 μg/day.","i":"定量尿液中銅含量，協助Wilson's disease及銅代謝相關疾病之診斷。","cl":"銅為體內必需元素，參與一些酵素成份，包括cytochromec oxidase、catalase、ceruloplasmin、 uricase、tyrosinase，銅也參與血色素合成。銅存在自然界以銅鹽或純銅型態出現，常用在電子工業界、家庭、農業用硫酸銅或游泳池用在除藻劑。銅偶而當做催吐劑，會有潛在危險，致死食用量10克。食入過量銅後，會出現嚴重嘔吐、噁心、帶血嘔吐物、拉肚子、低血壓、黃疸現象。常暴露銅環境中會出現溶血性貧血。Wilson's disease(hepatolenticular degeneration)：是一種先天性遺傳疾病,導因於血中缺乏ceruloplasmin (一種plasma α-globulin，用來運送身體的銅)，使得銅累積在CNS系統。\n尿中銅減少可見於Menkes' syndrome (neurodegenerative change)。Wilson's disease血中銅偏低，但尿中銅含量則大幅增加。尿銅增高於Wilson's disease、腎病症候群、急性銅中毒、急性病毒性肝炎、肝硬化、結締組織病、再生障礙性貧血等，也會上升於Homocystinuria、原發性膽汁性肝硬化、腦豆狀核退化；降低於嚴重營養不良、燒傷等。","tags":["肝臟/膽道","腎臟","貧血/血液疾病"]},{"n":"Cyclosporin-A","c":"FDPSPO","p":"10522B(320點)","r":"是","ct":"4號紫頭管(K2EDTA tube)","d":"全血2 mL","g":"生化免疫組","t":"其他","m":"化學冷光微粒酵素免疫分析法(chemiluminescent Microparticle Immunoassay；CMIA), Abbott Alinity i","rv":"100~400 ng/mL；\n備註說明：\n(1)Renal transplant: \n(A)無公認之可用治療區間\n(B)0~90天之濃度為250~350 ng/mL，＞90天之濃度為125~250 ng/mL，＞1年之濃度為75~125 ng/mL。\n(2)General range of 100 to 400 ng/mL; refer to institutional protocol for specific therapeutic ranges.\n(3)Toxic level: Not well defined, nephrotoxicity may occur at any level.","i":"定量全血中Cyclosporine濃度，做為心臟、腎臟及肝臟移植患者追蹤及治療之依據。","cl":"環孢靈(Cyclosporine)是一種有效的免疫抑制劑。從1983年問世以來，cyclosporine實質地改善了接受心臟、腎臟、肝臟、胰臟或肺臟移植病人本身和移植器官的存活情況。許多研究證明了cyclosporine具有抗排斥的效果。Cyclosporine劑量和濃度不足可能會導致移植器官的排斥。Cyclosporine的毒性濃度和許多嚴重的副作用有關，包括了腎毒性、肝毒性以及一堆併發症。監控全血中cyclosporine原藥(parent drug)濃度，和其它實驗室數據以及臨床研究一起解釋這些濃度所代表的含意是確保器官接受者獲得適當的免疫抑制治療最有效的方法。選擇用全血來測定cyclosporine而不用血漿的原因是由於藥物會迅速地分布到紅血球中。Cyclosporine由肝臟代謝，血液中cyclosporine濃度同時受抑制hepatic microsomal ezmyme(特別為cytochrome P-450)藥物之影響，此類藥物如cimetidine, ketoconazole及methylprednisolone會降低肝臟代謝同時增加cyclosporine濃度；其他如cytochrome P-450之刺激物：rifampin, phenytoin, Phenobarbital, carbamazepine會增加肝臟代謝而降低cyclosporine濃度。","tags":["移植/免疫"]},{"n":"CYFRA 21-1(細胞角質素21-1)","c":"FSI211","p":"自費","r":"是","ct":"02號黃頭管(Serum separator tu","d":"全血4 mL","g":"生化免疫組","t":"2天","m":"化學冷光微粒酵素免疫分析法(Two-step chemiluminescent Microparticle Immunoassay；CMIA)(亞培試劑)","rv":"≦2.08 ng/mL。\n※備註說明：試劑廠商評估240位健康人，95%的健康人結果為≦2.08 ng/mL。","i":"輔助監測肺癌病人疾病進展及治療表現。","cl":"細胞角質蛋白片段19為至少20個不同細胞角質多胜?組成之家族成員之一。細胞角質構成上皮細胞架構的中間型絲狀體。細胞角質絲狀體溶解度差，但若經過蛋白質分解，可形成可溶性細胞角質並分泌至體液。ARCHITECT CYFRA 21-1為一免疫分析法確認血清中細胞角質蛋白片段19的濃度。ARCHITECT CYFRA 21-1分析建立於針對細胞角質蛋白片段19具有特異性之兩支單株抗體(BM19-21及KS19-1)。過高的細胞角質蛋白片段19濃度常在肺癌及其他癌症病患(如膀胱癌)中發現。\n罹患肺癌時CYFRA 21-1濃度會升高，特別是非小型細胞肺癌病患。CYFRA 21-1濃度在鱗狀上皮細胞癌中最高，CYFRA 21-1濃度與疾病的病程有相關性，因此CYFRA 21-1濃度可以用來輔助肺癌的組織學上的判定。數個文獻發表CYFRA 21-1可做於監測腫瘤反應的工具並預測肺癌治療的存活率。\nCYFRA 21-1不可作為診斷肺癌的標記，除了肺癌外，膀胱炎及非惡性疾病如急性肺炎、結核、肝疾及腎衰竭病人之血清濃度也可能上升。","tags":["腎臟","腫瘤標記","結核/呼吸道"]},{"n":"Cystatin C","c":"FRCCYS、FBICYS","p":"08133B (200點)","r":"否","ct":"03號綠頭管(Lithium heparin)","d":"全血3.5 mL","g":"生化免疫組","t":"急診可","m":"免疫比濁法(Particle-enhanced turbidimetric immunoassay, PETIA)","rv":"0.51~1.05 mg/L","i":"可作為第一型及第二型糖尿病病人腎臟功能監測、腎臟移植病人腎功能監測以及具急性腎衰竭風險病人之早期腎功能監測。","cl":"Cystatin C是一種分子量13.2 kD的非糖基化蛋白質，是一種蛋白?抑制劑，存在於有核的細胞內，Cystatin C唯一的清除途徑是通過腎小球濾過作用且不受腎小管再吸收的干擾，不會進入血液循環，與GFR之相關性佳，當病人Cystatin C增加，即表示腎臟廓清速率降低。研究顯示，Cystatin C的濃度並不會因為其他因素而受到明顯影響，像是肌肉質量、發炎性疾病、性別、年齡或飲食，其專一性優於Creatinine，可作為慢性腎臟病變(CKD)初期偵測指標。Cystatin C亦可用於急性冠狀動脈硬化併發症後群(ACS)復發評估，Cystatin C濃度越高，表示其復發率越高，死亡率也越高。","tags":["腎臟","心臟/心血管","糖尿病"]},{"n":"Cytomegalovirus culture","c":"FVPISO3","p":"14001B(350點)","r":"是","ct":"#35-50mL無菌試管","d":"(A)尿液：10-20 mL中段尿\r\n(B)其他檢體：至少2","g":"微生物組","t":"1週以上","m":"利用細胞株接種檢體(Shell vial)，觀察 。","i":"定量分析特異性過敏原IgE之濃度，協助診斷IgE媒介之過敏疾病。","cl":"過敏性疾病大約佔全世界人口30%。過敏反應主要分為四型，其中過敏原引起主要為第一型過敏反應，為外因性氣喘、花粉熱或異位性濕疹的病人，當第一次接觸過敏原，症狀會立即發作，免疫系統會產生對應過敏原之過敏原特異性IgE抗體，其會循環於血液中並接合於mast cell上，當第二次接觸相同過敏原時，會使mast cell產生去顆粒作用，使細胞內之發炎性物質，例如：histamine、serotonin等，釋放至細胞外，造成流鼻水、打噴嚏等臨床症狀產生，嚴重者甚至產生休克。可藉由檢測血液中之引起過敏相關之特異性抗體IgE(如花粉、動物毛屑、塵?及家塵等)，此可輔助了解引起過敏之過敏原種類，仍需配合其它臨床證據一起判斷。","tags":["過敏"]},{"n":"Dengue virus Ag & Ab (登革熱病毒抗原與抗體檢測)","c":"FVPDEN","p":"14062B (120點);14063B (120點)","r":"否","ct":"03號綠頭管(Lithium Heparin)，小","d":"(A)03號-綠頭管：全血3 mL；\r\n(B)12號-微量綠","g":"生化免疫組","t":"其他","m":"免疫色層分析法(Immunochromatographic assay)","rv":"(1)Dengue virus NS1 Ag：Negative、\n(2)Dengue virus Ab (IgM)：Negative、\n(3)Dengue virus Ab (IgG)：Negative。","i":"協助臨床推定並診斷初次及二次登革熱感染","cl":"登革熱病毒有四種不同的血清型（登革熱病毒1、2、3、4），是一種由蚊子（埃及斑蚊與白線斑蚊）傳播、廣泛分佈在世界上熱帶與亞熱帶地區的病毒。受感染的孩童常無臨床症狀，或是出現會自然痊癒的發燒症狀，然而若患者第二次被不同的血清型感染，可能發生出血性登革熱或登革休克症候群之類的嚴重疾病。由於登革熱病毒在人體的發病率與造成的致死率，使登革熱被認為是最重要的節肢動物傳播之病毒疾病。NS1是一個高度保守性的糖蛋白，會高濃度的出現在感染登革熱病毒患者之早期臨床階段的血清。初次及二次感染登革熱病毒的患者，出現發熱症狀的第1~9天，可在檢體中發現NS1 抗原。通常IgM 抗體無法立即檢出，初次感染者需等到發病5~10天後，二次感染者則是4~5天後才能檢測到IgM。IgG會在初次感染後14天出現，並且終身表現；二次感染者會在出現症狀後1~2天有IgG濃度升高的現象，並在感染20天後引發IgM反應。本檢驗無法區分登革熱病毒型別。","tags":["其他"]},{"n":"DHEA-S","c":"FENDHE","p":"27080B(421點)","r":"是","ct":"03號綠頭管(Lithium heparin)；得","d":"全血3 mL","g":"生化免疫組","t":"3天","m":"競爭型免疫酵素冷光分析法(competitive binding immunoenzymatic assay)","rv":"(95% Reference interval)18~<21歲：(Female)51.0~321.0 μg/dL、(Male)24.0~537.0 μg/dL；21~30歲：(Female)18.0~391.0 μg/dL、(Male)85.0~690.0 μg/dL；31-40歲：(Female)23.0~266.0 μg/dL、(Male)106.0~464.0 μg/dL；41-50歲：(Female)19.0~231.0 μg/dL、(Male)70.0~495.0 μg/dL；51-60歲：(Female)8.0~188.0 μg/dL、(Male)38.0~313.0 μg/dL；61-70歲：(Female)12.0~133.0 μg/dL、(Male)24.0~244.0 μg/dL；≧71歲：(Female)7.0~177.0 μg/dL、(Male)5.0~253.0 μg/dL","i":"定量血清或血漿中去氫化外層雄酯酮-硫酸(dehydroepiandrosterone sulfate，DHEA-S)濃度。","cl":"脫氫化外層雄酯酮-硫酸(dehydroepiandrosterone sulfate，DHEA-S)是一個最初由腎上腺所合成的類固醇。在這些組織中有硫酸酯?的活性，所以脫氫化外層雄酯酮-硫酸(DHEA-S)可以被轉變成游離的類固醇脫氫化外層雄酯酮(DHEA)。之後，部分的脫氫化外層雄酯酮與/或脫氫化外層雄酯酮-硫酸可以被代謝成為有活性的雄激素與雌激素。\n血清與血漿中DHEA-S濃度是所有類固醇當中最高的。脫氫化外層雄酯酮-硫酸的濃度，不論在男性及女性體內，都會在約30歲左右達到高峰後，隨著年齡的增加而下降。脫氫化外層雄酯酮-硫酸的半衰期約為8~10個小時，而其他雄性激素的半衰期約為30~60分鐘。血清當中DHEA-S長半衰期，以及其每日的變化不大，使得DHEA-S成為評估腎上腺功能極佳指標。\nDHEA-S可以用來區別診斷庫欣氏症候群(Cushing’s syndrome)，也可以用來評估腎上腺皮質的疾病。於先天性腎上腺增生(CHA)、腎上腺癌(adrenal adenoma)或腎上腺增生時，DHEA-S分泌會增加。當女性體內過高的DHEA-S，易發生多毛症及女性禿頭症或女人男性化、多囊性卵巢症候群PCOS等。當使用Phenytoin及Carbamazepine亦會使DHEA-S濃度下降；激烈運動後濃度會上升。","tags":["荷爾蒙/內分泌"]},{"n":"Digoxin","c":"FDPDIG、FRDDIG","p":"10511C(320點)","r":"是","ct":"02號黃頭管(Serum separator tu","d":"全血3.5 mL","g":"生化免疫組","t":"急診可","m":"競爭結合免疫酵素分析法(competitive binding immunoenzymatic assay)","rv":"0.50~2.00 (therapeutic range)／\n備註說明：\nHeart failure: 0.5 to 0.9 ng/mL.  \nAdults: 0.8 to 2.0 ng/mL; <0.5 ng/mL probably indicates underdigitalization unless there are special circumstances. \nA serum concentration ?1.2 ng/mL may be associated with increased all-cause mortality in patients with atrial fibrillation (regardless of heart failure).","i":"定量血清中Digoxin濃度作為臨床治療及血中藥物濃度監控之依據。","cl":"Digoxin(長葉毛地黃)是一種從洋地黃類植物葉子中萃取出來的強效強心醣?，這種醣?是廣泛應用於治療充血性心臟衰竭、心房纖維性顫動、心房急速顫動、上心室心跳過快以及其他心臟疾病的處方藥物，因此Digoxin可增強心肌的收縮能力，減低心肌傳導速度並降低心跳的速率。\nDigoxin的治療濃度範圍很窄，因此需監測血液中濃度。用藥後約60-80%由腸胃道吸收。Digoxin以原始型態由腎臟排出，因此患者之腎臟功能不足者，Digoxin的用量，應特別注意。正常腎臟功能患者，Digoxin之半衰期約1.5天。定量偵測毛地黃血中的濃度，可以幫助醫師調整病人使用的劑量，對於預防及診斷毛地黃中毒具有極大的價值。","tags":["心臟/心血管","藥物/毒物監測"]},{"n":"Direct Coombs' test(直接抗球蛋白試驗);Direct Coombs' C3d monospecific test;Direct Coombs' IgG monospecific test","c":"FBBDCO,FBBC3D,FBBIGG","p":"12097B(70點);12100B(250點) ;12099B(250點)","r":"是","ct":"07-6 mL紫頭管(K2 EDTA tube)","d":"6 mL","g":"血庫組","t":"24小時","m":"Antiglobulin test","rv":"Negative","i":"(1)診斷新生兒溶血性疾病\n(2)調查輸血反應所引起的溶血反應\n(3)診斷自體免疫溶血性貧血\n(4)因為藥物引起之溶血性貧血","cl":"(1)直接抗球蛋白試驗係偵測在體內已經附著於紅血球表面上的抗體或補體，可能會引起溶血反應。\n(2)Polyspecific antihuman globulin(AHG)主要是偵測紅血球上結合之IgG及C3d，但也有可能會與紅血球上之IgA及IgM分子反應(因anti-light chain activity導致)","tags":["貧血/血液疾病","自體免疫","輸血/血型"]},{"n":"Direct smear for fungus (KOH preparation)","c":"FCSDIR、FRBDIR","p"
