<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>檢驗項目查詢</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F4F3F0;--surface:#FFF;--surface2:#EEEDE9;
  --text:#181816;--text2:#5A5956;--text3:#97958F;
  --border:#D8D6D0;--border2:#B8B6B0;
  --accent:#1A6B4A;--accent-light:#E4F4EC;--accent-mid:#9DD4B8;
}
[data-theme="dark"]{
  --bg:#0A1628;--surface:#112036;--surface2:#172B45;
  --text:#C8E6FF;--text2:#6B93B4;--text3:#3A5570;
  --border:#1E3A5F;--border2:#2A5080;
  --accent:#38BDF8;--accent-light:#0C2D45;--accent-mid:#1565A0;--accent-dark:#7DD3FC;
}
.header-title-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.header-title{font-size:14px;font-weight:700;color:var(--accent);letter-spacing:.04em}
.theme-btn{height:26px;padding:0 10px;border:1.5px solid var(--border);border-radius:20px;background:var(--surface2);cursor:pointer;font-size:13px;color:var(--text2);transition:all .15s}
.theme-btn:hover{border-color:var(--border2);background:var(--surface)}
body{font-family:"Noto Sans TC",sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 24px 14px;position:sticky;top:0;z-index:100}
.search-row{display:flex;gap:8px;align-items:center}
.search-wrap{position:relative;flex:1;max-width:500px}
.search-wrap input{width:100%;height:40px;padding:0 12px 0 36px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;background:var(--surface);color:var(--text);outline:none;transition:border-color .15s}
.search-wrap input:focus{border-color:var(--accent)}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;font-size:15px}
.clear-btn{height:40px;padding:0 14px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text2);cursor:pointer;font-size:13px;font-family:inherit;white-space:nowrap}
.clear-btn:hover{background:var(--surface2)}
.stats-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.stat{background:var(--surface2);border-radius:7px;padding:6px 14px;font-size:12px;color:var(--text2)}
.stat strong{font-weight:700;color:var(--text);margin-right:3px}
.tag-bar{padding:10px 24px;display:flex;gap:6px;flex-wrap:wrap;background:var(--surface);border-bottom:1px solid var(--border)}
.tag{display:inline-flex;align-items:center;gap:4px;height:28px;padding:0 11px;border:1.5px solid var(--border);border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;transition:all .12s;background:var(--surface);color:var(--text2);user-select:none;white-space:nowrap}
.tag:hover{border-color:var(--border2);background:var(--surface2)}
.tag.on{border-color:var(--accent);background:var(--accent-light);color:var(--accent)}
.tag .cnt{font-size:10px;opacity:.55;font-weight:400}
.result-area{padding:14px 24px 40px}
.result-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.result-count{font-size:13px;color:var(--text3)}
.sort-row{display:flex;gap:6px}
.sort-btn{height:28px;padding:0 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text2);font-size:12px;cursor:pointer;font-family:inherit}
.sort-btn.on{background:var(--text);color:var(--surface);border-color:var(--text)}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;cursor:pointer;transition:all .15s}
.card:hover{border-color:var(--border2);box-shadow:0 2px 8px rgba(0,0,0,.06);transform:translateY(-1px)}
.card-name{font-size:14px;font-weight:700;margin-bottom:3px;line-height:1.3}
.card-code{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--text3);margin-bottom:8px}
.card-indication{font-size:12px;color:var(--text2);line-height:1.55;margin-bottom:6px}
.card-meaning{font-size:12px;color:var(--text3);line-height:1.5;margin-bottom:10px;padding-top:6px;border-top:1px solid var(--surface2)}
.card-tags{display:flex;flex-wrap:wrap;gap:4px}
.ctag{display:inline-block;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:500;background:var(--accent-light);color:var(--accent)}
.card-range{font-size:11px;color:var(--text3);margin-top:8px;padding-top:8px;border-top:1px solid var(--surface2)}
.pg{display:flex;gap:6px;align-items:center;margin-top:20px;flex-wrap:wrap;font-size:13px}
.pg button{height:30px;min-width:30px;padding:0 8px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);cursor:pointer;font-family:inherit;font-size:13px}
.pg button:hover{background:var(--surface2)}
.pg button.cur{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.pg button:disabled{opacity:.3;cursor:default}
.pg-info{color:var(--text3)}
.no-result{text-align:center;padding:60px;color:var(--text3);grid-column:1/-1}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;align-items:flex-start;justify-content:center;padding:32px 16px;overflow-y:auto}
.overlay.open{display:flex}
.modal{background:var(--surface);border-radius:14px;max-width:640px;width:100%;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.2);position:relative}
.modal-head{padding:22px 24px 18px;border-bottom:1px solid var(--border)}
.modal-head h2{font-size:18px;font-weight:700;margin-bottom:4px;line-height:1.3;padding-right:40px}
.modal-head .code-line{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--text3)}
.modal-close{position:absolute;top:18px;right:18px;width:30px;height:30px;border:1px solid var(--border);border-radius:6px;background:var(--surface);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--text2)}
.modal-close:hover{background:var(--surface2)}
.modal-body{padding:20px 24px 28px;overflow-y:auto;max-height:calc(85vh - 80px)}
.range-box{background:var(--accent-light);border:1px solid var(--accent-mid);border-radius:8px;padding:12px 14px;margin-bottom:18px}
.range-label{font-size:10px;font-weight:700;color:var(--accent);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
.range-val{font-size:12px;color:var(--text);font-family:"JetBrains Mono",monospace;white-space:pre-wrap}
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
.meta-item{background:var(--surface2);border-radius:7px;padding:9px 11px}
.meta-label{font-size:10px;color:var(--text3);font-weight:600;letter-spacing:.05em;text-transform:uppercase;margin-bottom:2px}
.meta-value{font-size:13px;font-weight:500;color:var(--text)}
.section{margin-bottom:18px}
.section-title{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
.section-content{font-size:13px;color:var(--text);line-height:1.75;white-space:pre-wrap;word-break:break-word}
</style>
</head>
<body>
<div class="header">
  <div class="header-title-row">
    <span class="header-title">🔬 彰化秀傳紀念醫院 檢驗項目查詢</span>
    <button class="theme-btn" id="theme-btn" onclick="toggleTheme()" title="切換顯示模式">☀️</button>
  </div>
  <div class="search-row">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input id="q" placeholder="輸入疾病名稱或症狀…例如：肝炎、貧血、腎衰竭、糖尿病" oninput="onSearch()">
    </div>
    <button class="clear-btn" onclick="clearAll()">清除篩選</button>
  </div>
  <div class="stats-row">
    <div class="stat"><strong id="sc">528</strong>筆符合</div>
  </div>
</div>
<div class="tag-bar" id="tagbar"></div>
<div class="result-area">
  <div class="result-header">
    <div class="result-count" id="rc"></div>
    <div class="sort-row">
      <button class="sort-btn on" id="sb-rel" onclick="setSortBy('rel')">相關度</button>
      <button class="sort-btn" id="sb-name" onclick="setSortBy('name')">名稱排序</button>
    </div>
  </div>
  <div class="cards" id="cards"></div>
  <div class="pg" id="pg"></div>
</div>
<div class="overlay" id="ov" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-head"><h2 id="mn"></h2><div class="code-line" id="mc"></div></div>
    <div class="modal-body" id="mb"></div>
  </div>
</div>
<script>
const ALL=[{"n":"A/G","c":"FBIAG","p":"09038C、09040C(80點)","r":"是","ct":"03號綠頭管(Lithium heparin)","d":"全血3.5 mL","g":"生化免疫組","t":"急診可","m":"(1)Total protein：速率雙縮尿法(Rate Biuret method)；\n(2)Albumin：呈色法，Bromocresol green (BCG)","rv":"(1)Total protein：6.4~8.3 g/dL；\n(2)Albumin3.5~5.7 g/dL；\n(3)Ratio：1.0~2.0","i":"協助評估營養狀況及診斷和治療與肝臟，腎臟，或骨髓有關的疾病，以及其他新陳代謝或營養的失調。","cl":"測量總蛋白質是用來診斷和治療與肝臟，腎臟，或骨髓有關的疾病，以及其他新陳代謝或營養的失調。血清白蛋白的檢測應用於許多臨床疾病的診斷。血清白蛋白升高通常是脫水的結果。血清白蛋白下降則發生於部分腎臟疾病，肝臟疾病，感染，嚴重燒傷和癌症疾病中。","tags":["肝臟/膽道","腎臟","腫瘤標記"]},{"n":"ABO antibody titer","c":"FBBABT","p":"自費（500元）","r":"否","ct":"07號 6.0 mL紫頭管(K2 EDTA tub","d":"6 mL","g":"血庫組","t":"24小時","m":"(1)儀器上機：管柱凝集法Column Agglutination test (CAT gel card)為主要檢驗方法\n(2)以手工稀釋後再以管柱血球凝集法(CAT)操作：為輔助檢驗方法","rv":"依受測者年齡不同而異，一般可由1：4~1：2048不等","i":"(1)輔助新生兒溶血疾病之調查\n(2)ABO血型不相容之造血幹細胞或肝臟移植之評估\n(3)免疫力(immune competency)之評估\n(4)新生兒換血用調合血及新生兒輸非相同ABO血型或非AB型之血小板時","cl":"(1)協助新生兒溶血疾病之探討\n(2)檢測血袋內Anti-A及Anti-B抗體效價，以減少輸注非ABO相同血型血品時，血袋內之Anti-A或Anti-B抗體被動免疫產生溶血性輸血反應之風險。\n(3)檢測ABO抗體效價，可避免ABO不相容之器官移植，包括：心臟、肝臟、肺臟及造血幹細胞產生排斥反應。","tags":["貧血/血液疾病","輸血/血型","移植/免疫"]},{"n":"Acetaminophen","c":"FDPACE、FRDACE","p":"10803B(320點)","r":"是","ct":"3號綠頭管(Lithium heparin tub","d":"全血3.5 mL","g":"生化免疫組","t":"急診可","m":"同質性的酵素免疫分析法(Homogenous enzyme immunoassay method)","rv":"10.0~30.0 μg/mL (therapeutic range)","i":"定量血漿中Acetaminophen濃度作為臨床診斷及治療藥物血中藥物濃度監控之依據。","cl":"乙醯氨酚(acetaminophen) 是一種廣泛使用的鎮痛劑和退熱劑，是一個常用於很多配方的藥物。用藥後快速且完全由腸胃道吸收，且於1小時內達血漿中最高濃度(peak)，90%治療劑量之acetaminophen與glucoronic acid結合且經由肝臟代謝，3-5%則經由P-450代謝後經由尿液排出體外，僅少量以原始藥物型態排出。在肝臟代謝之中間產物為造成肝臟毒性之主要物質。治療劑量之acetaminophen在體內之半衰期約2~3小時，在小孩(新生兒除外)代謝速度較快，在肝臟疾病及酗酒患者代謝速率相對較慢。\nAcetaminophen不具抗發炎反應且不影響血液凝固。服用大於15 g之acetaminophen可造成嚴重肝臟破壞，因此快速及準確的測定乙醯氨酚是有需要的。\n當服用過量時，可能導致嚴重的肝臟和腎臟損傷或死亡。Acetaminophen急性過量後，患者早期可能有輕微或沒有症狀。定量測量血清Acetaminophen濃度提供可靠的早期診斷依據。臨床證據顯示通常在攝入後24小時或更長時間後才出現肝臟和腎臟延遲損害，已超過預防性解毒劑acetylcysteine可以有效施用的時間。但acetylcysteine在預防肝損傷方面非常有效，特別是在過量服藥的8-10小時內施用，並且在過量服藥後12-16小時內施用能改善肝功能衰竭患者的存活率。\n此藥物可能會造成急性腎小管壞死、胰臟炎、與心肌壞死。\nN-acetylcysteine必須在服藥後8小時內採檢，以避免AST和ALT明顯增加造成肝臟受損。","tags":["肝臟/膽道","藥物/毒物監測"]},{"n":"Acetylcholine receptor Ab","c":"FSIACR","p":"自費","r":"否","ct":"02號黃頭管(Serum separator tu","d":"2 mL全血","g":"生化免疫組","t":"其他","m":"放射免疫分析法；Immunoradiometric assay (IRMA)","rv":"<0.5 nmol/L","i":"檢測血清Acetylcholine Receptor Autoantibody乙醯膽鹼受體抗體，協助重症肌無力之診斷。","cl":"Acetylcholine Receptor Ab可協助重肌無力症Myasthenia gravis(MG)診斷，當抗體存在時，會和肌肉神經接合處的nAchR(受體)作用，阻礙Acetylcholine和nAChR結合，而抑制肌肉的收縮。\n在重症肌無力(Myasthenia gravis)急性期，這個抗體陽性率85-90%。","tags":["其他"]},{"n":"Acid fast stain (direct smear)","c":"FCSAFM、FRBAFM","p":"13006C(45點)","r":"是","ct":"(A)呼吸道檢體：","d":"3 mL","g":"微生物組","t":"其他","m":"使用螢光染色法於螢光顯微鏡下鏡檢，對陽性菌型態有疑慮時，再以Ziehl-Neelsen染色法確認。","rv":"Negative","i":"懷疑或追蹤分枝桿菌感染","cl":"(1)\tAcid-fast stain對分枝桿菌不具特異性，Nocardia, Rhodococcus, Legionella micdadei, Cysts of Cryptosporidium species, Isopora species和其他Microsporidia等非分枝桿菌之微生物也可能呈現出不同的抗酸性。\n(2)\tAcid-fast stain酸性染色檢查主要偵測檢體中是否有分枝桿菌的存在，不能區分M. tuberculosis或Non-tuberculous Mycobacteria。分枝桿菌必須經由培養進一步鑑定或TB PCR加以確定。\n(3)\tAcid-fast stain抹片敏感度較低，與培養結果比較其敏感度為22%-78%，慢速生長分枝桿菌如MTBC之Acid-fast stain結果較一致性，快速生長分枝桿菌Acid-fast stain結果有差異性。Acid-fast stain陰性報告不能排除分枝桿菌感染，因為每mL痰液檢體中約需有5,000-10,000隻抗酸桿菌才能由染色的抹片鏡檢觀察出，每mL檢體中只需10-100隻活抗酸桿菌，即能經由培養發現抗酸菌。","tags":["結核/呼吸道"]},{"n":"ACTH (7~10AM)","c":"FENACT","p":"09119B(450點)","r":"是","ct":"04號紫頭管(K2 EDTA tube)","d":"全血2.0 mL","g":"生化免疫組","t":"其他","m":"電子化學冷光免疫分析法(Electrochemiluminescence immunoassay, ECLIA)","rv":"7.2~63.3 pg/mL(Adult) (5th percentile~95th percentile)\n說明：參考值適用於上午7~10點採血判讀。","i":"定量EDTA血漿中adrenocorticotropic hormone，作為腎上腺\n不足或分泌過多之參考。","cl":"促腎上腺皮質激素(Adrenocorticotropic hormone, ACTH)由腦下腺垂體前葉分泌，由下視丘分泌的CRF(corticotropin releasing factor)所刺激分泌，ACTH會刺激腎上腺皮質的形成和分泌糖皮質激素(尤其是cortisol)，血液中高濃度的糖皮質激素可通過負反饋機制抑制CRH和ACTH的分泌。經過刺激後(如體力勞動或體內時鐘等)，下丘腦會分泌CRH(促腎上腺皮質激素釋放激素)，CRH作用於腦下垂體，然後再合成並分泌ACTH，再刺激腎上腺分泌Cortisol；ACTH濃度表現為晝夜變化，早晨濃度較高，晚上濃度較低，與Cortisol表現相同，因此抽血時間點相當重要。\nACTH濃度檢測臨床上主用於鑑別診斷Cushing's disease(ACTH分泌過多)、自主產生ACTH的垂體組織(如Nelson's syndrome)，ACTH缺乏腦下垂體功能低下症和異位ACTH症候群，診斷糖皮質激素過量產生的原因，除檢測Cortieol外，也可進行ACTH抑制或刺激試驗。於腎上腺皮質功能不全症(如(Addison’s disease)亦可檢測ACTH進行鑑別診斷。ACTH上升可能為因腦下腺瘤造成分泌上升或是腎上腺分泌不足造成，ACTH下降原因可能為腦下腺功能低下或adrenal hyperplasia feed back造成抑制分泌。\n非垂體產生的ACTH被稱為異位ACTH，這通常與肺小細胞癌有關。在極少數情況下，異位ACTH可能由胸腺腫瘤、胰腺腺癌或支氣管類癌產生，這些腫瘤通常分泌ACTH前體(POMC和pro-ACTH)。Elecsys ACTH檢測使用兩種特異單株抗體對ACTH(9-12)和C末端區域(ACTH)。 由於具有共同的抗原結構，這些抗體可識別完整的具有生物活性的ACTH 1?39和ACTH前體POMC和前ACTH)。若ACTH上升而cortisol正常可能為變異型ACTH(大分子量，無功能之ACTH)。","tags":["腫瘤標記","荷爾蒙/內分泌"]},{"n":"ADA (Adenosine deaminase)","c":"FBIADA","p":"09102B(240點)","r":"是","ct":"02號黃頭管(Serum separator tu","d":"(A)全血3.0 mL；\r\n(B)體液(除CSF外之其他體液","g":"生化免疫組","t":"其他","m":"UV-Rate method","rv":"Blood：10-23 U/L (95% central interval)\nPleural effusion：6-33 U/L (95% central interval)\nAscites：4-25 U/L(95% central interval)\nCSF：1-10 U/L (95% central interval )\nBody fluid：Not available","i":"協助結核病、結核性肋膜炎、結核性腦膜炎及肺外結核病的診斷。","cl":"腺核?脫胺基?(Adenosine deaminase, ADA)是一種參與嘌呤(purine)代謝分解的酵素，催化腺?(adenosine)的不可逆的水解脫氨(deamination)成肌?和脫氧腺?的入脫氧肌?，釋放氨的?。在胸水中ADA活性的測定主用於結核(tuberculosis)診斷的重要工具，特異性約76~96%。偵測人類胸膜液(Pleural fluid) 腺核?脫胺基?(Adenosine deaminase, ADA)所含的量，以幫助結核性肋膜炎的診斷。結核菌感染時，腦脊髓液(CSF)檢體中之ADA濃度會較其他細菌性、病毒性感染或惡性腫瘤疾病為高。\n另於淋巴瘤(lymphomas)、類風濕性關節炎(rheumatoid arthritis)、膿胸(Empyema) 、乳糜胸(chylothorax)，和石棉沉著病(asbestosis)、某些惡性腫也會出現較高的ADA活性。\nADA活性存在T cell的細胞質中比起在B cell的細胞質高。由於刺激因素，在早期HIV感染中ADA活性較高。\n高氨血症，腎臟疾病和肝炎患者可能呈現高的ADA活性。慢性營養不良或HIV患者可能呈現低濃度的ADA值。","tags":["肝臟/膽道","腎臟","腫瘤標記","貧血/血液疾病","結核/呼吸道"]},{"n":"Adalimumab (阿達木單抗)","c":"FDPADL","p":"自費","r":"否","ct":"02號黃頭管(Serum separator tu","d":"3 mL全血","g":"生化免疫組","t":"1週以上","m":"螢光免疫分析(Fluorescence immunoassay, FIA), Boditech AFIAS1","rv":"<0.20 μg/mL","i":"定量測定血清中free Adalimumab濃度，可作為接受Adalimumab治療病人的血中藥物濃度監控之依據。","cl":"Adalimumab適用於治療類風濕性關節炎、幼年型自發性多關節炎、僵直性脊椎炎、乾癬性關節炎、乾癬、化膿性汗腺炎、成人和小兒克隆氏症、潰瘍性結腸炎、腸道貝西氏症和非感染性中段、後段和全葡萄膜炎。Adalimumab可以降低這些疾病的發炎過程。在接受治療後，可發現炎症急性期反應物(C反應蛋白(CRP)和紅血球沉降速率(ESR)和血清細胞激素(IL-6)的濃度較類風濕性關節炎病人的基準值快速降低。幼年型自發性多關節炎、克隆氏症或潰瘍性結腸炎及化膿性汗腺炎的病人亦被發現CRP濃度快速的下降，且克隆氏症的病人結腸中TNF的濃度及發炎指標，如人類白血球抗原(HLA-DR)和骨髓過氧化?(MPO)，亦顯著的下降。產生組織再造而造成 軟骨破壞的細胞基質蛋白酵素(Matrix metalloproteinases, MMP-1和MMP-3)的血清濃度也降低。類風濕性關節炎、乾癬性關節炎、僵直性脊椎炎的病人常發生輕度至中度的貧血和淋巴細胞數的降低，並且會有嗜中性白血球和血小板數量的升高。接受治療的病人通常在慢性炎症的這些血液指標上得到改善。\n臨床療效與下次給藥前血中Adalimumab濃度(trough level)有密切相關，藉由監測血中藥物濃度，可協助制定個人化劑量策略，提升治療成效。","tags":["貧血/血液疾病","藥物/毒物監測"]},{"n":"Aerobic actinomyces culture (放線菌培養)","c":"FMIACT","p":"13007C(200點)、1323C(300點)","r":"是","ct":"35號50 mL無菌試管","d":"(A)\t液體檢體：1mL以上\r\n(B)\t其他：未限定","g":"微生物組","t":"其他","m":"菌名鑑定：VITEK MS微生物鑑定質譜儀、VITEK 2自動分析儀","rv":"Not isolated","i":"分離與檢測檢體中的細菌，以提供臨床診斷與抗生素用藥參考。","cl":"放線菌是人類口腔、消化道和泌尿道的正常菌叢；而放線菌感染多是由於內因性創傷，引起放線菌病(Actinomycosis)。因其臨床症狀不明顯。","tags":["其他"]},{"n":"Aerobic culture for sputum (痰液嗜氧培養)","c":"FMISPU","p":"13007C(200點)、1323C(300點)","r":"是","ct":"48號蓄痰盒 ；咳痰（Sputum, cough","d":"1mL以上","g":"微生物組","t":"其他","m":"(1)\t菌名鑑定：VITEK MS微生物鑑定質譜儀、VITEK 2自動分析儀\n(2)\t藥物敏感性試驗： VITEK 2自動分析儀、瓊脂紙錠擴散試驗","rv":"No growth、分離菌株為上呼吸道常在菌種","i":"分離與檢測檢體中的細菌，以提供臨床診斷與抗生素用藥參考，特別是無菌體液的感染其致死率高，快速且正確的報告可成功提高病人治療照顧的品質。","cl":"(A)\t在院內感染肺炎或呼吸器相關肺炎(VAP)的患者，送驗下呼吸道檢體作細菌培養，可以診斷出感染源。\n(B)\t痰檢體含有許多正常細菌，若致病菌大量存在即造成感染，如β-Streptococcus group A, N. meningitides, Nocardia spp., S. pneumoniae, S. aureus, H. influenzae, Enterobacteriaceae, Glucose nonfermenter GNB,等。\n(C)\t陰性的細菌培養結果並無法排除下呼吸道感染；在肺炎患者之痰液檢體，時常無法於細菌培養中分離出主要致病菌，可能原因包含：(a)患者於檢體採檢前已使用抗生素治療；(b)不正確的檢體採檢方式或檢體延遲送檢；(c)感染原可能為其他微生物，例如：病毒、寄生蟲、黴菌、黴漿菌或分枝桿菌。\n(D)\t偽陽性培養結果的可能原因\n(a)\tS. pneumoniae, H. influenzae，但有時患者只是帶菌者(carriage) \n(b)\t檢體汙染了呼吸道正常菌，於培養基進一步生長後，造成實驗室過度判讀。","tags":["結核/呼吸道"]},{"n":"Albumin","c":"FBIALB","p":"09038C(40點)","r":"是","ct":"03號綠頭管(Lithium heparin)；","d":"血液：全血3.5 mL；體液：1.5 mL","g":"生化免疫組","t":"其他","m":"呈色法，Bromocresol green (BCG)","rv":"血液：3.5~5.7 g/dL；\n體液：Not available","i":"定量血清或血漿中白蛋白的濃度，協助診斷和治療肝臟及腎臟相關疾病。體液檢測可協助區分滲出液或漏出液。","cl":"(1)白蛋白的測量是用來診斷和治療肝臟和腎臟相關的疾病。白蛋白在人體內它最重要的作用是維持膠體滲透壓。身體缺少白蛋白會導致浮腫。肝硬化病人的血漿白蛋白含量比正常人低。\n(2)體液依據Serum-Ascites Albumin Gradient (Modified from McHutchinson JG. Differential diagnosis of ascites. Semin Liver Dis. 1997;17:191-202. Reprinted by permission from Thieme.)區分如下：High value(≧1.1 g/dL)見於Cirrhosis、Fulminant hepatic failure、Fatty liver、Alcoholic hepatitis、Portal vein thrombosis、Veno-occlisive disease，Low value(＜1.1 g/dL)見於Peritoneal carcinomatosis、Tuberculosis、Pancreatic、Connective tissue disease、Nephrotic syndrome、Biliary(without cirrhosis)。","tags":["肝臟/膽道","電解質/代謝"]},{"n":"Albumin (24 hr urine)","c":"FBIMAL","p":"12111C(275點)","r":"是","ct":"66號白頭塑膠管","d":"尿液3 mL，(白頭塑膠管約五分滿)","g":"生化免疫組","t":"其他","m":"Immunoturbidimetric (End method)","rv":"＜30.0 mg/day; \n檢驗報告備註：\n(1)Normal：＜30.0 mg/day；\n(2)Microalbuminuria：30~300 mg/day；\n(3)Clinical albuminuria：>300 mg/day。","i":"定量尿液白蛋白濃度，作為糖尿病腎病變早期之診斷及治療之依據。","cl":"尿蛋白可區分為兩類：腎小球的(glomerular)及腎小管(tubular)。腎小球蛋白尿(glomerular proteinuria)：是由於腎小球微細血管壁之穿透力改變 , 使大分子物質由腎小球濾出，其中以白蛋白為主要成份，其他如IgG, IgA亦會不正常升高；若超過腎小管對這些分子的再吸收能力。\n腎病的早期臨床證據是尿液中出現濃度較低但異常（> 30 mg/day或 20 μg/min）的白蛋白，尿白蛋白中度增高的患者被指患有早期腎病。傳統的蛋白尿定性試驗（化學試條或試紙）並不能檢測出腎病早期階段中尿白蛋白排泄量的輕微增加。因此使用了針對尿白蛋白中度增高的檢測，尿白蛋白中度增高定義為 3 次尿液採集中有 2 次白蛋白排泄率介於 30～300 mg/24h 之間。\n尿白蛋白流失增加被認為是糖尿病受試者腎功能惡化的一個重要臨床指標，定期篩檢尿白蛋白流失對於監測 1 型和 2 型糖尿病非常重要。前瞻性研究已表明尿白蛋白排泄增加會先出現，並可高度預測糖尿病性腎病、終末期腎病、心血管病死亡率以及糖尿病患者的總死亡率。此外，尿白蛋白排泄增加也可用於確定冠狀動脈疾病風險增加的非糖尿病受試者群體。","tags":["腎臟","心臟/心血管","糖尿病"]},{"n":"Aldosterone","c":"FENALD","p":"27031B(320點)","r":"否","ct":"02號黃頭管(Serum separator tu","d":"全血3.5 mL","g":"生化免疫組","t":"其他","m":"競爭性放射免疫分析法(Competitive Radioimmunoassay, RIA)","rv":"(1)站立(站立2小時後)︰48.3-270.0 pg/mL\n(2)躺臥(起床前)︰68.0-173.0 pg/mL","i":"同時測定不同姿勢(躺或站立)狀態下採檢之血Aldosterone、renin及cortisol，可區分原發性aldosteronism (原發性腎上腺疾病)續發性aldosteronism，測定血液中濃度建議作為急性期監控或 circadian rhythm；24小時尿液測定較接近實際分泌狀況。","cl":"醛類脂醇為一分子量360.4的類固醇荷爾蒙，為一種礦物皮質素，於腎上皮質的球狀層產生，受腎素-血管收縮素(renin-angiotensin)系統及ACTH所控制，也受血清鉀影響。Aldosterone作用於腎遠曲小管，促進鈉及水份吸收，增加鉀排泄，對調節細胞外液容積、血壓、鉀鈉平衡非常重要。並可用於區分為原發性或續發性之Aldosterone上升引起之高血壓。原發性aldosteronism (原發性腎上腺疾病)原因為腎上腺之adenoma, carcinoma(站立狀態不會上升)或腎上腺皮質增生(上升於站立狀態)；續發性aldosteronism上升於hyperreninism及ACTH製造增加，或代謝疾病(肝硬化及心臟衰竭)之病因。\n原發性醛固酮增加：原發性醛固酮過多症、腎上腺皮質細胞增生、腺瘤或癌。\n繼發性醛固酮過多症：肝硬化、腎病症候群、鬱血性心臟衰竭、惡性高血壓、Bartter氏症候群、其他腎素分泌增高的情況。\n醛固酮偏低：腎上腺皮質機能不全、自主神經機能障礙、礦物質醛固醇（醛固酮以外）過剩。","tags":["肝臟/膽道","腎臟","腫瘤標記","荷爾蒙/內分泌"]},{"n":"Aldosterone (24 hr urine)","c":"FENALU","p":"27031B(320點)","r":"否","ct":"66號白頭塑膠管","d":"尿液20 mL","g":"臨床服務組","t":"其他","m":"競爭性放射免疫分析法(Competitive Radioimmunoassay, RIA)","rv":"2.84-33.99 μg/ day","i":"同時測定不同姿勢(躺或站立)狀態下採檢之血Aldosterone、renin及cortisol，可區分原發性aldosteronism (原發性腎上腺疾病)續發性aldosteronism，測定血液中濃度建議作為急性期監控或 circadian rhythm；24小時尿液測定較接近實際分泌狀況。","cl":"醛類脂醇為一分子量360.4的類固醇荷爾蒙，為一種礦物皮質素，於腎上皮質的球狀層產生，受腎素-血管收縮素(renin-angiotensin)系統及ACTH所控制，也受血清鉀影響。Aldosterone作用於腎遠曲小管，促進鈉及水份吸收，增加鉀排泄，對調節細胞外液容積、血壓、鉀鈉平衡非常重要。並可用於區分為原發性或續發性之Aldosterone上升引起之高血壓。原發性aldosteronism (原發性腎上腺疾病)原因為腎上腺之adenoma, carcinoma(站立狀態不會上升)或腎上腺皮質增生(上升於站立狀態)；續發性aldosteronism上升於hyperreninism及ACTH製造增加，或代謝疾病(肝硬化及心臟衰竭)之病因。\n原發性醛固酮增加：原發性醛固酮過多症、腎上腺皮質細胞增生、腺瘤或癌。\n繼發性醛固酮過多症：肝硬化、腎病症候群、鬱血性心臟衰竭、惡性高血壓、Bartter氏症候群、其他腎素分泌增高的情況。\n醛固酮偏低：腎上腺皮質機能不全、自主神經機能障礙、礦物質醛固醇(醛固酮以外)過剩。","tags":["肝臟/膽道","腎臟","腫瘤標記","荷爾蒙/內分泌"]},{"n":"Allergen specific IgE (I)、Allergen specific IgE (II)、Allergen specific IgE (III)","c":"FALAL1、FALAL2、FALAL3","p":"F30022C(1620點)","r":"是","ct":"03號綠頭管(Lithium heparin)","d":"全血4.5 mL","g":"生化免疫組","t":"其他","m":"螢光酵素免疫分析法(Fluorescence enzyme immunoassay, FEIA)","rv":"＜0.35 kU/L(kUA/L)(Class 0)；參考值備註：0.35~0.69 kU/L(kUA/L) (Class I)、0.70~3.49 kU/L(kUA/L) (Class II)、3.50~17.49 kU/L(kUA/L) (Class III)、17.5~52.49 kU/L(kUA/L) (Class IV)、52.5~99.99 kU/L(kUA/L) (Class V)、≧100 kU/L(kUA/L) (Class VI)。\n※依據試劑不同，報告單位為kU/L或kUA/L","i":"定量分析特異性過敏原IgE之濃度，協助診斷IgE媒介之過敏疾病。","cl":"過敏性疾病大約佔全世界人口30%。過敏反應主要分為四型，其中過敏原引起主要為第一型過敏反應，為外因性氣喘、花粉熱或異位性濕疹的病人，當第一次接觸過敏原，症狀會立即發作，免疫系統會產生對應過敏原之過敏原特異性IgE抗體，其會循環於血液中並接合於mast cell上，當第二次接觸相同過敏原時，會使mast cell產生去顆粒作用，使細胞內之發炎性物質，例如：histamine、serotonin等，釋放至細胞外，造成流鼻水、打噴嚏等臨床症狀產生，嚴重者甚至產生休克。可藉由檢測血液中之引起過敏相關之特異性抗體IgE(如花粉、動物毛屑、塵?及家塵等)，此可輔助了解引起過敏之過敏原種類，仍需配合其它臨床證據一起判斷。","tags":["過敏"]},{"n":"Allergen specific I
