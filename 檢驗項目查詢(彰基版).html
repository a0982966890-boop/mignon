是人體致癌物，當工人在職業暴露下，吸 入灰塵含有高濃度的鎳化合物，會導致慢性支氣管炎和肺功能下降，甚至引起肺癌及鼻竇癌。若飲用水含有高濃度鎳時，則會有胃痛已及血液和腎臟不良的影響。","tags":["結核/呼吸道","過敏"]},{"n":"Norovirus antigen (諾羅病毒抗原檢測)","c":"FVPNOR","p":"自費800元","r":"是","ct":"#77立寶糞便採檢瓶","d":"(A)固體糞便：約花生米大小\r\n(B)液體糞便：0.5 mL","g":"微生物組","t":"其他","m":"免疫層析法（Immunochromatographic assay）","rv":"Negative","i":"協助臨床醫師診斷Norovirus感染","cl":"(1)諾羅病毒的感染是造成腸胃炎的主要原因，每年在美國約有2300萬個病例。諾羅病毒可藉人與人直接傳染，或是藉由受到汙染的水和食物感染人。諾羅病毒經常爆發於社區性場所，例如養老院、醫院、托兒所、監獄和郵輪中。本檢驗只能檢出基因群第一及第二型之Norovirus。\n(2)諾羅病毒抗原檢測為陰性結果時，無法完全排除病患感染諾羅病毒的可能性。造成無法檢驗出諾羅病毒的原因可能是檢體收集時間點不正確，使得檢體只含少量病毒以致無法檢出，或是收集檢體過程與檢體處理不當而導致。","tags":["其他"]},{"n":"NTM typing (NTM分型)","c":"FMINTMT","p":"13013C 抗酸菌鑑定檢查(200點)","r":"是","ct":"檢體：尿液(Urine)、腹水(Ascites)、","d":"沾滿1個接種環(1μL定量接種環)的菌量","g":"微生物組","t":"3天","m":"MALDI-TOF質譜儀","rv":"不適用","i":"用於區別臨床常見NTM的型別","cl":"(1)NTM廣泛存在於自然界，屬於環境中的腐生菌，為引起人類伺機性染之低病原性微生物。\n(2)大部分的NTM對於抵抗力不佳的宿主會引起感染症狀，其中與人類感染有關的疾病，包括：成年病患的肺部感染、孩童的頸部淋巴腺感染、皮膚軟組織骨骼感染及免疫機能不全病患的全身性感染。NTM有時會干擾結核病之診斷，面對類似病患，醫師在診斷時應格外謹慎。\n(3)將NTM分出型別有助於醫師選擇用藥及臨床處置","tags":["結核/呼吸道"]},{"n":"NT-proBNP","c":"FRCNTP","p":"12193B(800點)","r":"是","ct":"03號綠頭管(Lithium Heparin)","d":"全血3mL","g":"生化免疫組","t":"急診可","m":"電子化學冷光免疫分析法(Electrochemiluminescence immunoassay, ECLIA)","rv":"(1)Diagnosing heart failure cutoff for acute dyspnea patients in  the Emergency Department:\n(A)Rule in cut-point: \n(a)＜50 years: Optimal Cut-point 450 pg/mL(Sensitivity 97%, Specificity 93%, PPV 79%, NPV 99%, Accuracy 94%).\n(b)50-75 years: Optimal Cut-point 900 pg/mL(Sensitivity 90%, Specificity 82%, PPV 83%, NPV 88%, Accuracy 85%).\n(c)＞75 years: Optimal Cut-point 1800 pg/mL(Sensitivity 85%, Specificity 73%, PPV 92%, NPV 55%, Accuracy 83%).\n(B)Rule out cut-point: Optimal Cut-point 300 pg/mL(Sensitivity 99%, Specificity 60%, PPV 77%, NPV 98%, Accuracy 83%).\n(2)Recommended cutoffs in patients with diagnosed stable chronic heart failure: 125 pg/mL (Sensitivity 88%, Specificity 92%, NPV 96.7%, PPV 80.6%).","i":"(1)協助充血性心臟衰竭及嚴重性之輔助診斷；\n(2)檢測輕度的心臟功能障礙；\n(3)對患有急性冠狀動脈綜合症和充血性心臟衰竭的病人進行風險分層，也可用於左心室功能障礙的病患進行治療時的療效監控。","cl":"心臟衰竭是一種臨床綜合徵，其特徵在於心臟結構和功能性異常造成全身灌注不足以滿足身體的代謝需求，導致心輸出量降低和/或心室壓力升高；因此左心室功能障礙是導致心臟衰竭的前驅因素之一，部份的冠心病、動脈性高血壓、瓣膜疾病、及原發性心肌疾病中, 都可以出現左心室功能障礙。如果左心室功能障礙沒有治療而且是繼續呈進行性的話，潛在的死亡率是高的，例如，死於突發性心因性猝死。\nB型利鈉蛋白鏈(Brain natriuretic peptide, BNP)和氮端原生B型利鈉蛋白鏈(N-terminal pro-brain natriuretic peptide, NT-pro-BNP)是心臟衰竭很重要的生化指標，紐約心臟學會[NYHA]依據心臟機能不全出現症狀嚴重性分為I – IV等級(NYHA stage I~IV)，NT-proBNP濃度會隨著NYHA等級數愈高而升高，並且反應出心臟機能缺損的嚴重性。對於患有結構性心臟病但沒有症狀的病人而言，NT-proBNP的高敏感度使得輕度的心臟功能障礙也可被檢測到。已證實利尿鈉?對心血管功能的監控有著重要性。有數項研究顯示利尿鈉?可用於診斷與左心室功能障礙有關的臨床問題。利尿鈉?分為心房利尿鈉?(ANP)、B型利尿鈉?(BNP)、和C型利尿鈉?(CNP)。\nANP和BNP(兩者為腎素-血管收縮素-醛固酮系統的拮抗物)藉著它們的利鈉和利尿的特性，能影響人體內電解質與體液的平衡。在左心室功能障礙的病人中，他們血清或血漿BNP濃度會上升，不具活性的氨基端片段—NT-proBNP—之濃度也會上升。\nProBNP(由108個氨基酸組成)主要是由心室所分泌，當心室血流壓力增加、心室擴張或肥厚或是肌壁壓力增加時心室會分泌ProBNP至血流中，而在這分泌過程中，它被裂解為具有生理活性的BNP(77-108)和N端片段NT-proBNP(1-76)，BNP半衰期約20分鐘，NT-proBNP半衰期約120分鐘。\n於急性期，BNP或NT-proBNP可協助分辨病人呼吸困難為心因性或非心因性，及幫助確認左心室功能障礙的病人。歐洲心臟學會的慢性心臟衰竭診斷與治療工作小組在他們的指引中建議了利尿鈉?(包括NT-proBNP)“基於一致的及非常高的陰性預測值，因此可能是臨床上最有用的排除性測試。當與建議的臨界值一起使用時，Elecsys proBNP分析法可視乎年齡和性別而得到範圍在97%-100%的陰性預測值。NT-proBNP濃度的改變可以用於評估左心室功能障礙的病患治療是否成功。此外，NT-proBNP也適合用於評估血管再塑(remodeling)，因此可促使個體化復健程序的制訂。\nBNP及NT-proBNP濃度受年齡及性別影響，年齡與其濃度呈正相關，女性濃度較男性高；亦受到腎功能影響，其部份經由腎臟代謝，因此當腎功能不佳時，濃度液會隨之升高；其他像慢性阻塞性肺病、心房顫動、急性冠心症、瓣膜性心臟病等，皆可見BNP及NT-proBNP有升高情形。","tags":["腎臟","心臟/心血管","電解質/代謝"]},{"n":"Oat燕麥","c":"FALOAT","p":"30022C(1620點)","r":"是","ct":"03號綠頭管(Lithium heparin)","d":"全血4.5 mL","g":"生化免疫組","t":"其他","m":"螢光酵素免疫分析法(Fluorescence enzyme immunoassay, FEIA)","rv":"＜0.35 kUA/L(Class 0)；參考值備註：0.35~0.69 kUA/L(Class I)、0.70~3.49 kUA/L(Class II)、3.50~17.49 kUA/L(Class III)、17.5~52.49 kUA/L(Class IV)、52.5~99.99 kUA/L(Class V)、≧100 kUA/L(Class VI)。","i":"定量分析特異性過敏原IgE之濃度，協助診斷IgE媒介之過敏疾病。","cl":"過敏性疾病大約佔全世界人口30%。過敏反應主要分為四型，其中過敏原引起主要為第一型過敏反應，為外因性氣喘、花粉熱或異位性濕疹的病人，當第一次接觸過敏原，症狀會立即發作，免疫系統會產生對應過敏原之過敏原特異性IgE抗體，其會循環於血液中並接合於mast cell上，當第二次接觸相同過敏原時，會使mast cell產生去顆粒作用，使細胞內之發炎性物質，例如：histamine、serotonin等，釋放至細胞外，造成流鼻水、打噴嚏等臨床症狀產生，嚴重者甚至產生休克。可藉由檢測血液中之引起過敏相關之特異性抗體IgE(如花粉、動物毛屑、塵?及家塵等)，此可輔助了解引起過敏之過敏原種類，仍需配合其它臨床證據一起判斷。","tags":["過敏"]},{"n":"Occult blood (Body fluid)","c":"FCSOB、FRBOB","p":"07001C(20點)","r":"否","ct":"36號15 mL無菌試管、35號 50 mL無菌","d":"1 mL","g":"血液及組織相容組","t":"急診可","m":"過氧化?（peroxidase）測試原理","rv":"Negative","i":"胃液及嘔吐物，適用於胃損害或口腔、鼻咽及呼吸道損害造成出血的檢查。","cl":"陽性結果代表檢體內可能含有Hb ≧2.5μg/mL","tags":["其他"]},{"n":"Oligoclonal band for CSF","c":"FBICSF","p":"09065B(300點)、12157B(900點)","r":"是","ct":"02號黃頭管(Serum separator tu","d":"全血3 mL+ CSF 0.5 mL","g":"生化免疫組","t":"其他","m":"等電點聚焦電泳(Isoelectric focusing electrophoresis)","rv":"CSF IgG band count: Not detected; Serum IgG band count: Not detected; Oligoclonal IgG band: Not present; CSF Oligoclonal band interpretation: Normal pattern","i":"輔助診斷中樞神經系統發炎相關疾病","cl":"許多中樞神經系統(CNS)的疾病會因血腦障壁的通透性增加或CNS內免疫球蛋白(主要為IgG)合成增加，伴隨腦脊髓液的蛋白質濃度上升，蛋白質在電泳移動中會呈現幾條帶狀表現，稱為oligoclonal bands(OCB)。比對血清與CSF的OCB結果可顯示中樞神經系統(CNS)之腦脊髓膜內合成的情形，CSF與血清檢體在電泳上可能呈現不同圖譜，例如CSF分析圖譜上出現較強的區帶或多出一區帶，但在血清電泳上卻未發現，此種情況即顯示為腦脊髓膜內免疫球蛋白之合成增加。多數的案例中腦脊髓膜內免疫球蛋白之合成增加主要為IgG，極少數為IgA或IgM。若CSF IgG的泳動比血清中的IgG泳動更傾向陰極，則顯示CSF的IgG為腦脊髓膜內合成。若臨床上強烈懷疑為多發性硬化症(Multiple sclerosis, MS)，但在電泳未發現任何oligoclonal band，此種情形可能為CSF中的polyclonal 型態的免疫球蛋白比血清中的免疫球蛋白更具陰極性。CSF內免疫球蛋白合成的確認是懷疑中樞神經系統發炎疾病的重要資訊，CSF Oligoclonal band可發現於多發性硬化症(95%)、破壞性中樞神經系統傷害(CNS lesions)、全腦炎(Panencephalitis)、Sjogren syndrome、多神經病變(Polyneuropathy)等疾病在不同的中樞神經系統疾病上，臨床上的診斷需將臨床觀察與病史列入考慮。中樞神經感染及腦血管中風偶而也會在CSF出現相同OCB表現，但不常見。\n於1994年“Committee of the European Concerted Action for Multiple Sclerosis”建議CSF Oligoclonal band為輔助診斷多發性硬化症的方法，檢測CSF Oligoclonal band最靈敏的方法為等電點聚焦電泳(Isoelectric focusing electrophoresis)。","tags":["其他"]},{"n":"One-stage Factor VIII activity(Altuviiio專用)","c":"FHEF8A","p":"08060B(400點)","r":"是","ct":"10號1.8 mL淺藍頭管(3.2% buffer","d":"(A)患者Hct≦55％：上述採血試管建議採血量之±10％(","g":"血液及組織相容組","t":"1週以上","m":"One-stage APTT (Clotting method / Dade Actin FSL)","rv":"62-173%","i":"當APTT延長且患者有明顯出血症狀時，懷疑為內在路徑凝血因子活性缺乏時，可執行此相關因子之檢測。","cl":"(1)血液循環中，第八因子（Factor VIII）與其載體蛋白:血管性血友病因子（vWF）結合。兩者皆為急性期蛋白，於發炎或壓力狀態下會升高。另外Factor VIII活性升高為靜脈血栓栓塞症的常見且劑量依賴性危險因子。\n(2)A型血友病為第八因子缺乏所致之性聯遺傳性出血疾病；後天性血友病則可因產生第八因子特異性抑制劑而發生。\n(3)當APTT延長且患者有明顯出血症狀時，可懷疑為內在路徑凝血因子活性缺乏或抑制的可能，如A型血友病、後天性血友病或von Willebrand Disease（VWD）。\n(4)本方法不適用於 Hemlibra（emicizumab）治療之監測；\n(5)本方法適用於 Altuviiio（efanesoctocog alfa）治療病人之監測。\n(6)其他A型血友病基因工程製劑療效監測，請參考各製劑仿單建議，了解是否適用DadeR ActinR FSL APTT assay分析Factor VIII活性。","tags":["凝血/血栓"]},{"n":"One-stage Factor VIII activity；Factor IX activity；Factor XI activity；Factor XII activity","c":"FHEF8；FHEF9；FHEF11；FHEF12","p":"08060B(400點)、08061B(400點)、08080B(400點)、08081B(400點)","r":"是","ct":"10號1.8 mL淺藍頭管(3.2% buffer","d":"(A)患者Hct≦55％：上述採血試管建議採血量之±10％(","g":"血液及組織相容組","t":"1週以上","m":"One-stage APTT (Electromagnetic sensor/ Kaolin activator)","rv":"(1)One-stage Factor VIII activity：50-160%\n(2)Factor IX activity：60-150%\n(3)Factor XI activity：60-150%\n(4)Factor XII activity：39-134%","i":"當APTT延長且患者有明顯出血症狀時，懷疑為內在路徑凝血因子活性缺乏時，可執行此相關因子之檢測。","cl":"(1)當APTT延長且患者有明顯出血症狀時，可懷疑為第八因子缺乏，可能為A型血友病、第八因子抗體或VWD。其他血友病A型基因工程製劑療效監測，請參考各製劑仿單建議，了解是否適用STA C.K. Prest APTT assay 分析Factor VIII活性。\n(2)本方法不適用於Hemlibra用藥病人治療之監測。\n(3)STA C.K. Prest APTT assay不受到Prekallikrein (PK)缺乏的影響(insensitive)","tags":["凝血/血栓"]},{"n":"Opiates screening","c":"FDPMOR、FRDMOR、FDPMORA","p":"10811B(250點)","r":"是","ct":"66號白頭塑膠管(2支)，得用42號紅頭塑膠管及2","d":"尿液10 mL","g":"生化免疫組","t":"急診可","m":"同質性的酵素免疫法分析(Homogenous enzyme immunoassay method)","rv":"Negative；檢驗報告備註：\n臨界值：300 ng/mL，\n1.陽性(≧300 ng/mL)表示可能有嗎啡、\n2.陰性(<300 ng/mL)表示沒有或濃度低於300 ng/mL、\n3.陽性應進一步以氣相層析質譜儀確認、\n4.篩檢結果僅適用於醫療用途(如治療)，對於沒有經確認之篩檢結果不可使用於非醫療用途(如勞工檢查、法律要求檢查)。","i":"定性測定尿液中是否存在Opiates (cutoff為300 ng/mL)，協助臨床診斷尿液中是否存在Opiates之依據。","cl":"鴉片類藥物(Opiates)包含一群化合物，包括morphine, codeine及heroin。morphine codeine是從鴉片萃取而得(鴉片則來自罌粟的樹脂)，它可進一步用化學方法提煉為海洛英(更強效的雙乙醯化類似物)。這些化學上近似的“鴉片劑”(opiates)能減輕對物理和心理性刺激的敏感度、隱痛、恐懼及焦慮。用藥過量(通常是由於劑量計算錯誤或劑量濃度有變化)時會死於呼吸衰竭。鴉片劑的給藥途徑常為靜脈注射或皮下注射，但也可用吸或嗅的方式。鴉片劑進入血液循環後，會傾向集中在肺、脾、腎和肝；在肌肉系統及中央神經系統有較低的濃度。\n鴉片劑能產生很強的生理依藥性(physical dependence)，戒斷症狀在給予最後一次劑量後數小時內便會出現，並可持續5~10天。成癮者會繼續追求使用一樣多的鴉片劑， 以避免戒斷時的不愉悅感，及獲得預期的無意識興奮和快感(insensate euphoria)。在使用藥物後多久時間會有陽性的檢測結果，決定於數個因素，包括藥物服用的次數和劑量、代謝率、排泄率、藥物半衰期、以及藥物使用者的年齡、體重、活動力和飲食狀況。\n使用Opiates後人體吸收，Heroin快速代謝為morphine並由尿液中以2種型態排出：原始形態及glucuronidated metabolite；Codeine則以下形式尿液排出：glucronidated conjugate, free and conjugated norcodeine及morphine；尿液中出現opiates代表使用heroin, morphine或codeine。\n此檢測試劑可檢測出尿液中的嗎啡、嗎啡-3-葡萄醣醛酸(morphine-3-glucuronide)和可待因，此外還可以偵測與嗎啡相關的鴉片類合成藥物，像是二氫嗎啡酮(hydromorphone)、高濃度止痛劑佩西汀(meperidien)與麻醉拮抗劑納洛芬(nalorphine)。此檢驗方法為篩檢試驗，因此仍以GC/MS為藥物確認試驗，可提供最佳的信賴區間。","tags":["其他"]},{"n":"Oral glucose tolerance test (OGTT)","c":"FBIOGT、FBIOGT2、FBIGTT","p":"09005C(50點)","r":"是","ct":"03號綠頭管(Lithium Heparin)，得","d":"全血2.0 mL","g":"生化免疫組","t":"24小時","m":"Hexokinase-UV/NAD (End reaction)","rv":"(1)Gestational OGTT (75 gm, 0', 60', 120')：0分鐘70~100 mg/dL，120分鐘＜140 mg/dL。\n(2)Gestational OGTT (100 gm, 0', 60', 120', 180')：0分鐘＜95 mg/dL，60分鐘＜180 mg/dL，120分鐘＜155 mg/dL，180分鐘＜140 mg/dL。","i":"定量血液葡萄糖濃度，協助糖尿病之診斷。","cl":"口服葡萄糖耐量試驗(Oral glucose tolerance test, OGTT)，也稱「葡萄糖耐受性試驗」，測量人體代謝葡萄糖的能力。此測試可用於診斷糖尿病(diabetes)或糖尿病前期(prediabetes)。","tags":["糖尿病"]},{"n":"Orange (橘子)","c":"FALORA","p":"F30022A(1620點)","r":"是","ct":"03號綠頭管(Lithium heparin)","d":"全血4.5 mL","g":"生化免疫組","t":"其他","m":"螢光酵素免疫分析法(Fluorescence enzyme immunoassay, FEIA)","rv":"＜0.35 kU/L；參考值備註：0.35~0.69 kU/L(Class I)、0.70~3.49 kU/L(Class II)、3.50~17.49 kU/L(Class III)、17.5~52.49 kU/L(Class IV)、52.5~99.99 kU/L(Class V)、≧100 kU/L(Class VI)。","i":"定量分析特異性過敏原IgE之濃度，協助診斷IgE媒介之過敏疾病。","cl":"過敏性疾病大約佔全世界人口30%。過敏反應主要分為四型，其中過敏原引起主要為第一型過敏反應，為外因性氣喘、花粉熱或異位性濕疹的病人，當第一次接觸過敏原，症狀會立即發作，免疫系統會產生對應過敏原之過敏原特異性IgE抗體，其會循環於血液中並接合於mast cell上，當第二次接觸相同過敏原時，會使mast cell產生去顆粒作用，使細胞內之發炎性物質，例如：histamine、serotonin等，釋放至細胞外，造成流鼻水、打噴嚏等臨床症狀產生，嚴重者甚至產生休克。可藉由檢測血液中之引起過敏相關之特異性抗體IgE(如花粉、動物毛屑、塵?及家塵等)，此可輔助了解引起過敏之過敏原種類，仍需配合其它臨床證據一起判斷。","tags":["過敏"]},{"n":"Osmolality","c":"FBIOSM、FRCOSM、FBIOSU、FBIOSR、FRCOSR","p":"08075C(150點)(血液)、06503B(70點)(尿液)","r":"是","ct":"02號黃頭管(Serum separator tu","d":"(A)血液檢體--全血3 mL；\r\n(B)尿液檢體—尿液3 ","g":"生化免疫組","t":"急診可","m":"冰點下降法(Freezing-point depression method)","rv":"Blood：275~295 mOsm/kg H2O；\nUrine(Random urine)：50~1,200 mOsm/kg H2O；\nUrine(24 hr Urine)：300~900 mOsm/kg H2O。","i":"協助臨床診斷電解質平衡及代謝相關疾病","cl":"血液滲透壓檢測主要評估病人體內電解質與水份之間的平衡情形，可協助判斷病人體內體液過多或是脫水現象，也可協助酸中毒或有機溶劑中毒(alcohol、methanol、isopropanol、ethylene glycol…)等原因調查；主要影響血液滲透壓的因素有電解質、醣類、尿素等，其中約50%來自於鈉離子(Na)，血液滲透壓增加於脫水、高血鈉、高血糖、飲酒、甲醇中毒、尿毒症、生理食鹽水注射過量、Mannitol 治療、燒燙傷病人等；減少於嚴重水腫、低鈉、抗利尿荷爾蒙分泌異常、水分攝取過量等。\n尿液滲透壓檢測主要評估腎小管的濃縮能力及電解質與水份之間的平衡狀態，尿液滲透壓通常與血清滲透壓一起檢測及評估，正常血清與尿液滲透壓比值約1.0~3.0，當比值小於1.0表示腎小管濃縮功能不佳，當比值大於3.0表示呈現脫水狀態。但於健康人有時因運動或活動因素，血清與尿液滲透壓也可能小於1.0或大於3.0。尿液滲透壓增加於脫水、抗利尿荷爾蒙分泌不當、腎上腺皮質功能不全、糖尿、高血鈉、高蛋白飲食等，減少於尿崩、水分攝取過量、急性腎功能不全、腎小球腎炎等。","tags":["腎臟","電解質/代謝","荷爾蒙/內分泌"]},{"n":"PAPP-A(懷孕相關血漿蛋白A)","c":"FSIPAP","p":"自費","r":"是","ct":"02號黃頭管(Serum separator tu","d":"全血3 mL","g":"生化免疫組","t":"其他","m":"均質式全自動螢光免疫分析法(Automated immunofluorescent assay)","rv":"(5th percentile~95th percentile)\n11+0 week：0.790~5.620 IU/L; \n12+0 week：1.140~7.720 IU/L; \n13+0 week：1.650~11.080 IU/L; \n14+0 week：2.310~15.560 IU/L.","i":"PAPP-A與PlGF(FSIPLG)同時檢測可協助評估孕婦子癲前症篩檢(Preeclampsia Screening)。","cl":"於第一周產期(懷孕第11週~14週)抽血檢測PlGF與PAPP-A，可以篩檢80%早發型子癲前症，再搭配子宮動脈血流檢查及定期血壓量測，更可以有95%的篩檢率。","tags":["其他"]},{"n":"Paraquat (qualitative)","c":"FDPPAU、FRDPAU、FDPPAG、FRDPAG","p":"06510C(50點)","r":"是","ct":"21號10 mL尖底管；","d":"(A)尿液：10 mL；\r\n(B)胃液：4 mL。","g":"生化免疫組","t":"急診可","m":"呈色法(coloremetric)","rv":"Not detected","i":"協助除草劑Paraquat中毒診斷","cl":"Paraquat，巴拉刈：是很有效除草劑，而且在接觸土壤之後，很快就分解，消失作用。但是一旦人體接到巴拉劑，會引發嚴重的組織過氧化傷害，進而發生組織纖維化。所有器官系統裡，受損最厲害的是肺臟及腎臟。","tags":["藥物/毒物監測"]},{"n":"Peanut (花生)","c":"FALPEA","p":"F30022C(1620點)","r":"是","ct":"03號綠頭管(Lithium heparin)","d":"全血4.5 mL","g":"生化免疫組","t":"其他","m":"螢光酵素免疫分析法(Fluorescence enzyme immunoassay, FEIA)","rv":"＜0.35 kU/L；參考值備註：0.35~0.69 kU/L(Class I)、0.70~3.49 kU/L(Class II)、3.50~17.49 kU/L(Class III)、17.5~52.49 kU/L(Class IV)、52.5~99.99 kU/L(Class V)、≧100 kU/L(Class VI)。","i":"定量分析特異性過敏原IgE之濃度，協助診斷IgE媒介之過敏疾病。","cl":"過敏性疾病大約佔全世界人口30%。過敏反應主要分為四型，其中過敏原引起主要為第一型過敏反應，為外因性氣喘、花粉熱或異位性濕疹的病人，當第一次接觸過敏原，症狀會立即發作，免疫系統會產生對應過敏原之過敏原特異性IgE抗體，其會循環於血液中並接合於mast cell上，當第二次接觸相同過敏原時，會使mast cell產生去顆粒作用，使細胞內之發炎性物質，例如：histamine、serotonin等，釋放至細胞外，造成流鼻水、打噴嚏等臨床症狀產生，嚴重者甚至產生休克。可藉由檢測血液中之引起過敏相關之特異性抗體IgE(如花粉、動物毛屑、塵?及家塵等)，此可輔助了解引起過敏之過敏原種類，仍需配合其它臨床證據一起判斷。","tags":["過敏"]},{"n":"Penicillium naotanum (青黴菌)","c":"FALPEN","p":"F30022C(1620點)","r":"是","ct":"03號綠頭管(Lithium heparin)","d":"全血4.5 mL","g":"生化免疫組","t":"其他","m":"螢光酵素免疫分析法(Fluorescence enzyme immunoassay, FEIA)","rv":"＜0.35 kU/L；參考值備註：0.35~0.69 kU/L(Class I)、0.70~3.49 kU/L(Class II)、3.50~17.49 kU/L(Class III)、17.5~52.49 kU/L(Class IV)、52.5~99.99 kU/L(Class V)、≧100 kU/L(Class VI)。","i":"定量分析特異性過敏原IgE之濃度，協助診斷IgE媒介之過敏疾病。","cl":"過敏性疾病大約佔全世界人口30%。過敏反應主要分為四型，其中過敏原引起主要為第一型過敏反應，為外因性氣喘、花粉熱或異位性濕疹的病人，當第一次接觸過敏原，症狀會立即發作，免疫系統會產生對應過敏原之過敏原特異性IgE抗體，其會循環於血液中並接合於mast cell上，當第二次接觸相同過敏原時，會使mast cell產生去顆粒作用，使細胞內之發炎性物質，例如：histamine、serotonin等，釋放至細胞外，造成流鼻水、打噴嚏等臨床症狀產生，嚴重者甚至產生休克。可藉由檢測血液中之引起過敏相關之特異性抗體IgE(如花粉、動物毛屑、塵?及家塵等)，此可輔助了解引起過敏之過敏原種類，仍需配合其它臨床證據一起判斷。","tags":["過敏"]},{"n":"Pepsinogen I／II ratio (胃液素原 I / II比值)","c":"FBIPEP","p":"27066B(411點)*2","r":"否","ct":"66號白頭塑膠頭管","d":"2 mL全血","g":"生化免疫組","t":"2天","m":"酵素連結免疫分析法(enzyme-linked immunosorbent assay, ELISA)","rv":"Pepsinogen I／II ratio >3","i":"協助診斷萎縮性胃體炎(atrophic corpus gastritis)","cl":"胃液素原I (Pepsinogen I, PGI)是胃蛋白?的前體?，由胃粘膜的主細胞(chief cells)和頸細胞(neck cells)合成。PGI分泌到胃腔中，有少部份亦會分泌到血液中，血液中的PGI與胃部主細胞數量相關，當主細胞流失時，會造成PG I分泌下降，萎縮性胃炎(atrophic gastritis)會造成胃部主細胞流失，萎縮性胃炎會增加胃癌的風險，此PGI濃度檢測對於對於萎縮性胃炎診斷的敏感度和特異性分別為92%和90%。\n胃液素原II (Pepsinogen II, PGII)由胃粘膜的主細胞、粘液頸細胞、胃竇的幽門腺及近端十二指腸的Brunner腺產生。\n檢測血中PGI與PGII的濃度可反應胃黏膜腺細胞數，可作為胃黏膜健康狀況之指標。當胃部受到感染時，造成胃黏膜發生病理變化，其狀況即會影響血液中PGI與PGII的含量，故可利用檢測血清中PGI與PGII比值協助評估胃黏膜受損狀況，當中度或重度萎縮性胃炎(atrophic gastritis)PG I/II比值會小於3.0。","tags":["其他"]},{"n":"Pericardial fluid examination","c":"FCSPRI、FRBPRI","p":"16009C(170點)","r":"是","ct":"36號-15 mL無菌試管、47號-針筒、53號螺","d":"5 mL","g":"血液及組織相容組","t":"急診可","m":"(1)Appearance：以肉眼判讀\n(2)Cell count：以Hemocytometer進行細胞計數 \n(3)細胞分類以抹片進行判讀","rv":"The reference interval(s) and other method performance specifications are unavailable for this body fluid. Comparison of the result with concentration in the blood, serum, or plasma is recommended.\n(A)Myelocyte：0 %\n(B)Promyelocyte：0 %\n(C)Blast：0 %","i":"懷疑患者體內有積水感染或不明出血時，可執行此項檢驗。","cl":"心包膜液分析目的主要為區分\n(A)積水為濾出液（transudate）或滲出液(exudate)\n(B)區分積水為滲出液(exudate)病人為惡性或非惡性\n(C)診斷造成積水的的原因(惡性疾病、感染、SLE…等)","tags":["腫瘤標記"]},{"n":"pH (Body fluid)","c":"FCSPH、FRBPH","p":"06001C(15點)","r":"是","ct":"(A)體液（腹水、胸水、心包膜液、關節液）：36號","d":"5 mL","g":"其他","t":"急診可","m":"試紙法（呈色反應）","rv":"1.CSF\n(A)Lumbar fluid:7.28-7.32\n(B)Cisternal fluid:7.32-7.34\n2.Pleural fluid:7.6\n3.Synovial fluid、Bile、Ascites、Pericardial fluid:Not available","i":"檢測體液pH協助診斷感染或發炎等症狀","cl":"細菌感染、發炎或食道穿孔…等會使體液之pH值下降","tags":["其他"]},{"n":"Phenobarbital","c":"FDPENO、FRDENO、FOTENO","p":"10525B(320點)","r":"是","ct":"3號綠頭管(Lithium heparin tub","d":"全血3.5 mL","g":"生化免疫組","t":"急診可","m":"同質性的酵素免疫分析法(Homogenous enzyme immunoassay method)","rv":"Trough\nAdult:10~40 μg/mL\nPediatric & Neonate :15~40 μg/mL","i":"定量血漿中Phenobarbital之測定，作為臨床治療血中藥物濃度監控之依據。","cl":"Phenobarbital為癲癇的治療劑，也具有安眠作用。Phenobarbital常用來治療癲癇大發作及因酒精或barbiturate使用引起之癲癇發作，但不適用於治療小發作或精神運動性的癲癇。因個體間之變異及肝臟之代謝率不同，治療期間應監控血中藥物濃度，避免發生最大的anti-seizure效應。一旦代謝已飽和，小劑量之改變將造成血中濃度之改變甚至造成毒性。","tags":["藥物/毒物監測"]},{"n":"Phenytoin","c":"FDPENY、FRDENY","p":"10502B(320點)","r":"是","ct":"3號綠頭管(Lithium heparin tub","d":"全血3.5mL","g":"生化免疫組","t":"急診可","m":"同質性的酵素免疫分析法(Homogenous enzyme immunoassay method)","rv":"10.0~20.0 μg/mL (therapeutic range)","i":"定量血漿中Phenytoin濃度，作為臨床治療藥物phenytoin (dilantin, diphenylhydantoin)血中藥物濃度監控之依據。","cl":"Phenytoin是一個最被廣泛使用的抗痙攣藥物，同時可被用來治療心肌衰弱所引起的心率不整。Phenytoin常作為癲癇大發作、皮質性癲癇及暫時性腦葉癲癇的治療用藥。因個體間之變異及肝臟之代謝率不同，治療期間應監控血中藥物濃度，避免發生最大的anti-seizure效應。一旦代謝已飽和，小劑量之改變將造成血中濃度之改變甚至造成毒性。","tags":["藥物/毒物監測"]},{"n":"Phosphorus; P","c":"FRCP、FBIP、FBIPR、FBIIPU","p":"09012C(40點)","r":"是","ct":"03號綠頭(Lithium heparin)管。","d":"(A)血液檢體--全血3 mL；\r\n(B)尿液檢體—尿液3 ","g":"生化免疫組","t":"急診可","m":"時間速率法(呈色法) (Time rate method, Molybdate method)","rv":"(1)P(Serum or Plasma)：2.5~5.0 mg/dL； \n(2)P(24hr Urine)：300~1300 mg/day； \n(3)Urine P to creatinine ratio(Random urine)：0.4~1.3 (97年臨床諮詢)","i":"(1)定量血清、血漿中磷的的濃度，協助診斷或治療一些失調產生的疾病，包括副甲狀腺和腎臟疾病，以及維生素D不平衡等。\n(2)定量尿液中磷的濃度，協助評估體內磷離子及鈣離子的平衡狀態。","cl":"磷常與其它物質結合形成有機和無機磷酸鹽化合物，測試血液中磷含量，通常檢測無機磷的部分。磷酸鹽對能量產生，肌肉和神經功能以及骨生長至關重要。它們還作為緩沖劑起重要作用，有助於維持身體的酸鹼平衡。\n磷是透過飲食經由腸吸收進入體內再藉由腎臟排出以維持血液中的磷/磷酸鹽平衡。血液中磷濃度也受副甲狀腺激素(PTH)、鈣和維生素D相互作用的影響。\n約70~80%的體內磷酸鹽與鈣結合以幫助形成骨骼和牙齒，另外，10%於肌肉及約1%在神經組織中發現，其餘除儲存於細胞內，主要用於儲存能量。\n磷缺乏(hypophosphatemia)造成原因有營養不良(malnutrition)、吸收不良(malabsorption)、酸鹼失衡(acid-base imbalances)、副甲狀腺亢進引起之高鈣血症(hypercalacemia)、過度使用利尿劑(diuretics)、酒精中毒、嚴重燙傷、經過治療之高血糖酮酸血症、甲狀腺低下、低血鉀症、佝僂病、軟骨症等。輕度到中度的磷缺乏通常沒有任何症狀，但嚴重的磷缺乏，症狀可能包括肌肉無力和意識不清。\n磷過量(hyperphosphatemia)造成原因有磷酸鹽攝取增加、肝臟疾病、副甲狀腺功能低下、高血糖酮酸血症和腎功能衰竭所引起。通常磷過量，常會引起低鈣血症(hypocalacemia)。當極度過量的磷時，可能引起與低鈣相似的症狀，包括肌肉痙攣，混亂，甚至癲癇發作。","tags":["肝臟/膽道","腎臟","甲狀腺","電解質/代謝"]},{"n":"PIVKA-II(Protein induced by Vitamin K absence or antagonists-II)","c":"FSIPKA","p":"12211B (967點)","r":"是","ct":"02號黃頭管(Serum separator tu","d":"全血3.0 mL","g":"生化免疫組","t":"2天","m":"化學冷光微粒酵素免疫分析法(Two-step chemiluminescent Microparticle Immunoassay；CMIA), Abbott Alinity i","rv":"11.12~32.01 mAU/mL，\n檢驗報告備註：Cut-off value 40 mAU/mL，文獻顯示，當閾值(Cut-off)設於40 mAU/mL時，肝細胞癌診斷敏感度為48.16%，特異性為95.93%，正確診斷率為71.63%。","i":"定量血清中PIVKA-II濃度，協助肝細胞癌(hepatocellular carcinoma, HCC)的診斷和療效評估。","cl":"維生素K缺乏或阻抗劑-II所誘導蛋白(Protein induced by Vitamin K absence or antagonists-II, PIVKA-II)是一種異常的凝固因子factor II，在肝細胞癌病人的血液中會呈現特異性上昇，雖PIVKA-II與-Fetoprotein(AFP)無直接相關性，但PIVKA-II與AFP可作為肝細胞癌(hepatocellular carcinoma, HCC)互補的腫瘤標記，若檢測報告偏高時，表示罹患肝硬化或肝細胞癌的潛在風險，應持續追蹤並結合傳統影像學輔助HCC診斷，以及療效與疾病再發的評估。\n依據文獻顯示，當閾值(Cutoff)設於40 mAU/mL時，肝細胞癌診斷敏感度為48.16%，特異性為95.93%，正確診斷率為71.63%。\n當患者正在接受含維生素K類似藥物可能引起PIVKA-Ⅱ值可能會顯示偏低；當患者正在接受抗菌藥物、維生素K拮抗劑(vitamin K antagonists(如warfarin))或是飲食缺乏維生素K、有飲酒習慣的酒精性肝病病患，PIVKA-II值可能會顯示偏高。","tags":["肝臟/膽道","腫瘤標記"]},{"n":"Placenta Growth Factor (PlGF)胎盤生長因子","c":"FSIPLG","p":"自費","r":"是","ct":"02號黃頭管(Serum separator tu","d":"全血3 mL","g":"生化免疫組","t":"其他","m":"均質式全自動螢光免疫分析法(Automated immunofluorescent assay)","rv":"Female(5th percentile~95th percentile)\n11+0 week：19.0~61.0 pg/mL;\n12+0 week：21.3~96.7 pg/mL;\n13+0 week：25.2~100.4 pg/mL;\n14+0 week：34.3~132.0 pg/mL;\n14~19 week：43.0~348.0 pg/mL;\n20~24 week：183.0~868.0 pg/mL;\n25~28 week：145.0~1000.0 pg/mL.","i":"於第一周產期(懷孕第11週~14週)抽血檢測PlGF與PAPP-A，可以篩檢80%早發型子癲前症，再搭配子宮動脈血流檢查及定期血壓量測，更可以有95%的篩檢率。","cl":"胎盤成長因子(Placental growth factor，PlGF)：為血管生成因子家族(vascular endothelial growth factor, VEGF)的一員，PlGF在懷孕過程中可監測胎盤生長功能以及預測子癲前症發生。在第一孕期唐氏症篩檢時，加上都卜勒彩色超音波，子宮動脈搏動指數(PI)的測量，並結合孕產史，血壓和血清PAPP-A和PlGF，可預測95% 34週前的早發性子癲前症(Preeclampsia)與子宮內胎兒生長遲滯(FGR)的風險值。","tags":["其他"]},{"n":"Plasma Alcohol","c":"FDPALP、FDPALC、FRDPALC","p":"10807B (180點)","r":"是","ct":"6號灰頭管(Sodium fluoride/K3-","d":"採集2支灰頭管，每支各2 mL。","g":"生化免疫組","t":"急診可","m":"酵素分析法(Enzymatic method with alcohol dehydrogenase)","rv":"潛在毒性濃度：＞100 mg/dL；危險濃度：＞250 mg/dL；致命濃度：＞400 mg/dL。","i":"協助臨床診斷酒精中毒及監控；以酵素法檢測血漿中之alcohol濃度，無法排除LDH及lactic acid之干擾。","cl":"在醫學上提供中毒及醫療的評估：Ethanol 主要為抑制CNS作用，從欣快感，抑制力降低(50-100 mg/dL)，至自身定向力障礙(disorientation)和共濟官能喪失( incoordination) 的增加(100-300 mg/dL )，甚至昏迷、死亡(＞400 mg/dL)。酒精經由胃部吸收後，主要由小腸吸收。Ethyl Alcohol經由肝臟酵素代謝為acetaldehyde再代謝為acetic acid，95%經由肝臟代謝。通常呼氣酒精濃度≧0.25 mg/L相當於全血中濃度≧50 mg/dL。","tags":["其他"]},{"n":"Plasma Alcohol (Gas chromatography)","c":"FDPALP、FDPCOL、FDPAGC","p":"自費","r":"是","ct":"06號灰頭管","d":"全血4 mL(需採集2支灰頭管，每支各2 mL)","g":"生化免疫組","t":"3天","m":"氣相色層分析法(gas chromatography)","rv":"(1)潛在毒性濃度為＞100 mg/dL；(2)危險濃度：＞250 mg/dL；(3)致命濃度：＞400 mg/dL。","i":"定量血漿中Alcohol濃度，協助酒精中毒之診斷；以氣相層析法檢測Alcohol不受LDH及lactic acid之干擾。","cl":"Alcohol主要為抑制CNS作用，從欣快感，抑制力降低(50-100 mg/dL)，至自身定向力障礙(disorientation)和共濟官能喪失( incoordination) 的增加(100-300 mg/dL )，甚至昏迷、死亡(＞400 mg/dL )。","tags":["其他"]},{"n":"Plasma renin activity","c":"FENPRA","p":"27032B(400點)","r":"否","ct":"4-紫頭管(K2 EDTA)","d":"2 mL全血","g":"生化免疫組","t":"其他","m":"競爭性結合放射免疫分析法(radioimmunological competition assay)","rv":"直立，2小時：0.60-4.18 ng/mL/hr (2.5 th–97.5th percentile)；0.48-4.88 ng/mL/hr (Min-Max)\n清晨，仰臥：0.32-1.84 ng/mL/hr (2.5th–97.5th percentile) ；0.30-1.90 ng/mL/hr (Min-Max)","i":"協助區分診斷Primary & Secondary hyperaldosteronism","cl":"腎素(renin)是腎臟之近腎絲球細胞(juxtaglomerular cell)所產生，與血管收縮素(angiotensin)、醛固酮(aldosterone)等形成renin-agiotensin-aldosterone系統，是調節人體水分容積的重要激素。Renin的主要功能是催化水解血管收縮素原(angiotensinogen)成為angiotensin I，再經angiotensin轉化脢水解成angiotensin II，angiotensin II是最強的血管增壓素可經由amino peptidase轉為angiotensin lll。Angiotensin II與angiotensin lll可以結合到目標細胞的接受器上而刺激Aldosterone分泌，Aldosterone作用於腎小管上皮而增加『鈉』滯留(連帶留氯及水)，和鉀、氫的排泄。\nAngiotension I可直接反應plasma renin avtivity。\nPRA活性偏高:循環血液量減少，腎血管性高血壓，妊娠，口服雌激素或黃體激素，分泌腎素的腫瘤，Bartter氏症候群。\nPRA活性偏低: 循環血液量增加，甲狀腺機能低下症，Liddle syndrome，原發性醛固酮過高之高血壓或其他礦物質皮質類固醇過多引起的高血壓。","tags":["甲狀腺","腫瘤標記"]},{"n":"Platelet aggregation test","c":"FHEPAT","p":"08069B(800點)","r":"否","ct":"01-2.7 mL淺藍頭管(3.2% buffer","d":"(A)患者Hct≦55％：每一試管採血管為2.7±10％\r\n","g":"血液及組織相容組","t":"1週以上","m":"光學法","rv":"(1)ADP threshold for aggregation:2.9±3.1*10^-6M (Mean±SD)\n(2)Epinephrine threshold for aggregation:1.7±2.0*10^-6M (Mean±SD)\n(3)Collagen Amplitude (1 μg/mL)：59-93 %\n(4)Collagen Amplitude (2 μg/mL)：74.9-93.1 %\n(5)Collagen Amplitude (3.3 μg/mL)：71.3-92.7 %\n(6)Collagen Amplitude (5 μg/mL)：80.3-95.7 %\n(7)Arachidonic acid Amplitude (1.0 mM)：86.1-95.9%\n(8)Arachidonic acid Amplitude (1.5 mM)：79.5-94.5%\n(9)Ristocetin induced platelet aggregation (RIPA):Have a platelet response to high dose ristocetin (1.2 mg/mL) but not to the lower dose of ristocetin (0.5 mg/dL)","i":"可進行血小板功能之篩檢，包括：血小板無力症或von Willebrand disease、Bernard-Soulier syndrome等。","cl":"懷疑血小板功能異常之檢驗，藉以診斷先天性或後天性血小板功能異常的疾病也可協助診斷von Willebrand disease。","tags":["其他"]},{"n":"Platelet antibody","c":"FBBPLA","p":"11007B(2323點)","r":"否","ct":"02號黃頭管(Serum separator tu","d":"全血5 mL","g":"血庫組","t":"1週以上","m":"(1)ELISA\n(2)可偵測HLA CLASS I antigen以及對抗血小板glycoprotein (GP) IV、IIb/IIIa、Ib/IX及Ia/IIa之抗體。","rv":"Negative","i":"檢測患者血清中是否存在HLA CLASS I抗體或血小板抗體，這些抗體的存在可能與血小板的破壞有相關。","cl":"(1)陽性代表患者具血小板抗體GP IIb/IIIa (HPA-1a)、GP Ia/IIa (HPA-5b)、GP Ib/IX、GP IV或HLA Class I抗體。(不含低盛行率型別之抗體)\n(2)血小板抗體可能是自體免疫產生，也可能是異體免疫產生(如懷孕或輸血)。\n(3)血小板抗體可能與以下之臨床疾病有相關\n(A)Immune thrombocytopenia purpura (ITP)\n(B)Neonatal alloimmune thrombocytopenia (NAIT)\n(C)Post-transfusion purpura (PTP)\n(D)Platelet transfusion refractoriness\n(4)本試劑無法檢測血小板自體免疫抗體。","tags":["自體免疫","輸血/血型"]},{"n":"Pleural fluid examination","c":"FCSPLE、FRBPLE","p":"16003C(170點)","r":"是","ct":"Pleural fluid：36號-15 mL無菌","d":"5 mL","g":"血液及組織相容組","t":"急診可","m":"(1)Appearance：以肉眼判讀\n(2)Cell count：以自動血球分析儀（體液模式）進行細胞計數。\n(3)細胞分類以抹片進行判讀","rv":"(A)RBC count：The reference interval(s) and other method performance specifications are unavailable for this body fluid. Comparison of the result with concentration in the blood, serum, or plasma is recommended.\n(B)Nucleated cell count：1395~3734（/μL）\n(C)Leukocyte count：The reference interval(s) and other method performance specifications are unavailable for this body fluid. Comparison of the result with concentration in the blood, serum, or plasma is recommended.\n(D)Neutrophil：0~1％\n(E)Lymphocyte：18~36％\n(F)Mesothelial cell：0~2％\n(G)Histiocyte：64~80％\n(H)Myelocyte：0 %\n(I)Promyelocyte：0 %\n(J)Blast：0 %","i":"懷疑患者體內有積水感染或不明出血時，可執行此項檢驗。","cl":"(A)正常胸膜液量約1-15 mL，外觀澄清至淡黃色，不會凝固（因不含纖維蛋白原）。\n(B)血狀胸水可能為創傷、惡性疾病或肺梗塞引起。\n(C)如Neutrophil佔大多數（＞50%），可能為胸膜發炎，見於細菌性肺炎、肺梗塞、胰臟炎及早期結核病等。\n(D)Lymphocyte佔多數時（＞50%），見於結核病、病毒感染、惡性疾病等。\n(E)Eosinophil增多（＞10%），常見於肺梗塞、充血性心臟衰竭、寄生蟲或黴菌感染、過敏性症候群等。","tags":["心臟/心血管","感染/敗血症","腫瘤標記","結核/呼吸道","過敏","凝血/血栓"]},{"n":"Pneumocystis jirovecii DNA(肺囊蟲去氧核醣核酸)","c":"FVPPJP","p":"12182C(1000點)","r":"是","ct":"#76:立寶綠蓋檢體瓶","d":"1 mL","g":"微生物組","t":"3天","m":"Real-time PCR","rv":"Not detected","i":"臨床懷疑Pneumocystis jirovecii感染","cl":"Pneumocystis jirovecii先前命名為Pneumocystis carinii，一開始因為形態學類似錐蟲（trypanosome），而將此病原體被歸類為原蟲，1988年後以核酸及生化的分析結果發現其實更接近於黴菌，目前被歸類為黴菌的一種。Pneumocystis jirovecii主要感染人類，無法感染老鼠，會伺機性感染人類的下呼吸道，特別是免疫功能低下病人，引發Pneumocystis pneumonia。\n由於最近數十年來廣泛應用免疫抑制劑以及對惡性腫瘤病人進行化療，肺囊蟲肺炎較過去多見。尤以近10年愛滋病AIDS出現後，Pneumocystis jirovecii pneumonia (PJP)更受到廣泛關注。PJP主要見於五種病人：早產嬰兒和新生兒、先天免疫缺損或繼發性免疫低下的患者、惡性腫瘤如白血病、淋巴瘤病人以及器官移植接受免疫抑制劑治療的患者。\nPneumocystis jirovecii無法培養，不能利用培養進行診斷，顯微鏡檢是臨床上用來鑑別Pneumocystis jirovecii的gold standard，利用各種傳統染色法直接觀察檢體，但此方法敏感度不佳。PCR技術能快速地偵測肺囊蟲的存在，臨床上若無偵測到肺囊蟲DNA，有可能因為感染量低於偵測極限，並不代表未存在於體內，若肺囊蟲檢測陽性，則無法區分為活菌或死菌，故以分子生物學技術得知之結果須與病人的臨床資料等相關結果進行比較，才可做為臨床醫師重要的參考資料。","tags":["腫瘤標記","貧血/血液疾病","結核/呼吸道","移植/免疫"]},{"n":"Pneumonia panel (肺炎病原體多標的核酸檢測)","c":"FVPPNI、FVPPNO","p":"12182C*15 (15000點)","r":"否","ct":"#48號蓄痰盒。","d":"1mL","g":"微生物組","t":"其他","m":"Nested multiplex PCR (巢式多重聚合?鏈反應)","rv":"Not detected","i":"協助診斷下呼吸道感染，但此試驗結果無法作為診斷與治療的唯一依據。\n本檢驗可同時對下呼吸道感染的潛在病原體、相關抗生素抗藥性基因以及所列常見細菌病原體的核酸相對豐富度進行檢測和辨識，提供資料協助醫師確定適當的治療診斷，包括：\n(1)細菌(半定量)：A. calcoaceticus-baumannii complex (A. baumannii, A. calcoaceticus, A. pittii, A. seifertii, A. nosocomialis), E. cloacae complex (E. cloacae, E. asburiae, E. hormaechei, E. kobei, E. ludwigii), E. coli, H. influenzae, K. aerogenes, K.oxytoca, K. pneumoniae group (K.pneumoniae, K. quasipneumoniae, K. variicola), M. catarrhalis, Proteus spp., P. aeruginosa, S. marcescens, S. aureus, S. agalactiae, S. pneumonia, S. pyogenes\n(2)非典型細菌(定性)：C. pneumoniae, M. pneumoniae, L. pneumophila\n(3)病毒(定性)：Adenovirus, Coronavirus (Coronavirus 229E, OC43, HKU1, NL63), Human Metapneumovirus, Human Rhinovirus/Enterovirus, Influenza A, Influenza B, Parainfluenza Virus, Respiratory Syncytial Virus\n(4)抗生素抗藥性基因(定性)：ESBL (CTX-M), Carbapenemase (IMP, KPC, NDM, OXA-48-like, VIM), Beta-lactam (mecA/C and MREJ)","cl":"(1)陰性結果：可能是由於此試驗沒有檢測的病原體所導致的感染、病原體濃度低於最低檢測極限。\n(2)陽性結果：可能代表移生或正常呼吸菌叢，可能不代表肺炎的致病原；無法排除與其他微生物共同感染的可能性，需搭配其他檢驗(如微生物培養)。\n(3)檢測的半定量結果(copies/mL)不等同細菌培養的相對濃度(CFU/mL)，兩者未必相關。\n(4)抗生素抗藥性可透過多種機制發生。未檢測到抗藥基因，不代表對相關抗生素或抗生素類別具有感受性；檢測到抗藥基因，也不一定與檢測到的微生物有關。必須以培養的方式獲得分離株，進行抗生素藥敏試驗。\n(5)本檢驗對於監測感染治療情況的性能尚未確立。 \n(6)病毒及細菌核酸可能存在於體內，而與微生物本身活性無關。檢測到微生物核酸標的並不能表示對應的微生物具有感染性，或其為臨床症狀的致病原。\n(7)流感病毒疫苗可能會對Influenza A、B造成偽陽性。\n(8)當Legionella pneumophila檢驗結果陽性時，檢驗醫學部會主動通知感控中心主任，最終由感控中心確認及判定。","tags":["感染/敗血症","結核/呼吸道"]},{"n":"PNH immunophenotyping","c":"FCMPNH","p":"12075B(2000點)","r":"是","ct":"04-紫頭管","d":"3 mL","g":"血液及組織相容組","t":"其他","m":"Immunophenotyping by flow cytometry","rv":"Not detected","i":"符合下列情形可進行PNH篩檢：(a)患者出現血管內溶血、血色素尿或血漿血紅素升高；(b)不明原因的溶血且伴隨鐵質缺乏、腹部疼痛或食道痙攣、血栓、顆粒球或血小板減少；(c)於罕見的部位發生血栓如：肝門靜脈（Budd-Chiari syndrome）、大腦靜脈竇、皮膚血管；(d)骨髓分化失調如：再生不良性貧血、Refractory cytopenia with unilineage dysplasia或其他原因不明之cytopenia。","cl":"(1)PNH是相當罕見的疾病。當結果存在微量PNH granulocyte clone時，不一定代表患者患有PNH。在部分的aplastic anemia或myelodysplastic syndrome也會偵測到PNH clone。\n(2)PNH患者在初期也常被診斷為aplastic anemia或myelodysplastic syndrome，這類疾病皆起因於骨髓分化失調故皆具有關聯性，在臨床診斷上需特別留意。\n以FLAER方法分析白血球對於偵測PNH比紅血球更具有靈敏度及特異性，且不會受到因患者輸血所造成RBC PNH clone偽陰性的情形。CD24為一種 glycosylphosphatidylinositol-linked membrane sialoglycoprotein，通常與FLAER搭配染色用於分析白血球之granulocyte。","tags":["貧血/血液疾病","輸血/血型","凝血/血栓"]},{"n":"Porphyrin","c":"FURPOR","p":"06508B(40點)","r":"否","ct":"21號10 mL尖底管","d":"尿液10 mL","g":"生化免疫組","t":"其他","m":"以Erhlich reagent 篩檢尿液中是否含Porphobilinogen，陽性反應者再以Watson-Schwartz進行確認。","rv":"Negative","i":"懷疑患者有肝機能障礙、鉛中毒、紅血球有強烈崩壞現象或先天性紫質病尿症時，可執行此項檢驗。","cl":"(1)紫質病指臨床上與紫質或Porphobilinogen(PBG)有關的基因或合成異常的疾病，它可能是先天性遺傳或後天引起的。此類病人於Heme合成過程中，中間產物無法進行完整的代謝，而累積體內或由尿液、糞便中排出。\n(2)肝機能障礙、鉛中毒、紅血球有強烈崩壞現象或先天性紫質病尿症時，皆可使尿液中porphyrin升高。\nδ-ALA是合成Porphobilinogen(PBG)的前驅物，兩個分子的ALA經ALA dehydratase的作用形成一個分子的PBG，PBG在進一步形成紫質(porphyrin)衍生物。尿中δ-ALA的增加可以診斷急性紫質沉著症(acute porphyria)且可以追蹤病人治療情形。如果病人尿中δ-ALA增加但其PBG正常可能是鉛中毒或是遺傳性酪胺酸血症(tyrosinemia)。\n上升：急性紫質沉著症(acute intermittent，variegate，hereditary corporphyria)、鉛中毒、遺傳性酪胺酸血症、ALA dehydratase的缺乏(homozyous)。\n微量上升：糖尿病酮酸血症(Diabetic ketoacidosis)、懷孕、porphyria cutanea tarda、服用某種抗痙攣藥、有些惡性腫瘤。\n下降：酒精性肝病。","tags":["肝臟/膽道","糖尿病","腫瘤標記"]},{"n":"Prealbumin","c":"FBIPAB","p":"12110B(275點)","r":"是","ct":"03號綠頭管(Lithium heparin)","d":"全血3.5mL","g":"生化免疫組","t":"24小時","m":"比濁法(Turbidimetric method)","rv":"Adult: 17.0 - 34.0 mg/dL","i":"測量血液中的前白蛋白可有助於用來評估營養狀況","cl":"前白蛋白是一種轉運蛋白，在維生素 A 的代謝過程中扮演重要角色，通過與視黃醇結合蛋白結合，在人體維生素A通過時形成複合物。它是一種陰性急性期反應物，在炎症、惡性腫瘤以及肝硬化和蛋白消耗性腸道或腎臟疾病中，其濃度會因合成減少及降解略微增加而相應地降低。通過對其他急性期蛋白的分析，可鑒別前白蛋白降低是由營養不良引起的還是由炎症引起的。人們已經描述了許多遺傳變異體，其中絕大多數伴有各種組織中澱粉樣原纖維的細胞外沉積。何傑金病(Hodgkin's disease)中，前白蛋白濃度也會升高。","tags":["肝臟/膽道","腎臟","腫瘤標記"]},{"n":"Procalcitonin","c":"FRCPCT","p":"12192C (1000點)","r":"是","ct":"03號綠頭管(Lithium Heparin)。","d":"全血3mL","g":"生化免疫組","t":"急診可","m":"電子化學冷光免疫分析法(Electrochemiluminescence immunoassay, ECLIA)","rv":"＜0.5 ng/mL；檢驗報告備註：＜0.5 ng/mL：a low risk of severe sepsis；\n＞2.0 ng/mL：a high risk of severe sepsis.","i":"定量檢測血液中procalcitonin濃度，協助臨床早期診斷細菌感染或敗血症","cl":"前降鈣素(procalcitonin, PCT)是一個含有116個氨基酸、分子量接近12.7 kD的前激素。前降鈣素是由神經內分泌細胞(甲狀腺、肺及胰臟組織的C細胞)所表現，接著會被酵素裂解為(不成熟)的降鈣素、下鈣素(katacalcin)、和一個N-端的區域。健康人的血中只含有低水平的前降鈣素。已發現在細菌感染時前降鈣素的水平會上升。\n人體中的多種組織在面對敗血病的反應時可能會表現前降鈣素, 這已在動物模式裡得以證實。在敗血病病患血液循環中的前降鈣素只含有114個氨基酸，而缺少了N-端的二?丙氨酸-脯氨酸(Ala-Pro)。\n在罹患細菌性敗血病的病患中常可發現升高的前降鈣素水平, 特別是嚴重的敗血病和敗血性休克。前降鈣素被認為於敗血病病患中可用作支援結果預測的一個預後標記。\n在急性胰臟炎中，前降鈣素被發現可用作一個疾病嚴重性與出現重要併發症的可靠指標。\n在罹患社區獲得性呼吸道感染或呼吸器相關肺炎的病患中， 前降鈣素已被建議用作決定抗生素治療需要性及監控治療成效的一個指引。","tags":["甲狀腺","感染/敗血症","結核/呼吸道"]},{"n":"Progesterone","c":"FENPRO、FREPRO","p":"09105C(200點)","r":"是","ct":"02號黃頭管((Serum separator t","d":"全血3.5 mL","g":"生化免疫組","t":"急診可","m":"競爭型免疫酵素冷光分析法(competitive binding immunoenzymatic assay)","rv":"Males：0.14~2.06 ng/mL；\nFemales_\nNon-pregnancy：\n Mid-follicular phase: 0.31-1.52 ng/mL\n Mid-luteal phase: 5.16-18.56 ng/mL\n Postmenopausal: ＜0.08-0.78 ng/mL\nPregnancy：\n First trimester: 4.73-50.74 ng/mL\n Second trimester: 19.41-45.30 ng/mL","i":"定量偵測人類血清progesterone的含量，協助懷孕及排卵、黃體功能之監控。","cl":"類固醇的合成始於醋酸轉化路徑變成膽固醇。孕烯酮醇(Pregnenolone)是progesterone的中間前驅物，而17-?皮質酮(17-αhydroxyprogesterone)是progesterone開始代謝的產物之一。\n在女性月經週期中的濾泡期，progesterone的濃度仍然很低。在排卵期之後，由於黃體持續產生progesterone，而使progesterone在血清的濃度有明顯升高，這樣使子宮產生變化，而有利於受精卵著床。如果著床產生，而滋養層開始分泌hCG (human chorionic gonadotropin，人類絨毛膜性腺激素)，hCG能維持黃體的存在及progesterone的分泌。在妊娠第三個月的末期，主要由胎盤開始分泌progesterone，血清濃度持續升高。如果沒有發生著床，黃體開始衰退，血液循環中的progesterone濃度迅速下降，在下次月經週期前約四天達到濾泡期的濃度。\n懷孕8-10週濃度維持恆定，除非有流產可能；懷孕10-12週後，濃度快速增加，但Progesterone通常不用於懷孕末期之監控。","tags":["其他"]},{"n":"Prolactin","c":"FENPLA、FREPLA","p":"09120C(150點)","r":"是","ct":"03號綠頭管(Lithium heparin)。。","d":"全血3.5 mL","g":"生化免疫組","t":"急診可","m":"免疫酵素冷光分析法(immunoenzymatic assay, sandwich)","rv":"(1)Male (adult)(95% confidence interval)：2.64-13.13 ng/mL。\n(2)Female (adult)(95% confidence interval)： \n(A)Premenopausal: 3.34~26.72 ng/mL；\n(B)Postmenopausal: 2.74~19.64 ng/mL。","i":"定量偵測人類血清泌乳激素（Prolactin, PRL）的含量，以輔助診斷不孕症、原發性甲狀腺低下症、腦下垂體腫瘤及性無能(男性)。","cl":"泌乳激素的主要作用是刺激和維持女性泌乳。正常泌乳激素的分泌隨時間不同而變化，在晚上的分泌量為白天的2~3倍。催乳激素的半衰期大約為20~50分鐘。催乳激素會隨著月經週期而改變，而且通常在月經中期出現輕微的升高。在正常成人，下列生理刺激會導致泌乳激素濃度升高。睡眠、運動、乳尖刺激、性交、低血糖、懷孕和外科手術。\n泌乳激素由腦下垂體前葉分泌，作用為刺激女性的乳房發育和哺乳，在懷孕的第八週可檢測泌乳激素的增加，並在整個懷孕過程中持續升高。如果沒有哺乳，泌乳激素在嬰兒出生三週後恢復到正常濃度。泌乳激素的升高與下列疾病有關：女性不孕、男性陽痿或不孕、原發性甲狀腺低能症和腦下垂體腫瘤。\n泌乳激素臨盆前和分娩時升高。正常個體的泌乳激素缺乏很罕見。高泌乳激素血症的病理性原因主要包括：泌乳激素分泌性的垂體腺瘤(prolactinomas)、功能性和原發性的甲狀腺功低能症、腎功能衰竭和異位性腫瘤。在原發性下視丘腦疾病中，常見到泌乳激素濃度升高，可能的原因是TRH分泌增多(刺激泌乳激素釋放)、伴隨著血清T4濃度的減低，和血清促甲狀腺素濃度的增高所導致。高催乳激素血症也和卵巢膽固醇激素的抑制、濾泡的成熟、黃體生成素和濾泡刺激素的分泌相關。\n不同的藥物能升高或降低泌乳激素的濃度。左旋多巴(L-dopa)的使用會抑制泌乳激素的分泌。Bromocriptines能抑制泌乳激素的分泌，因此常用來治療由於高泌乳素血症引起的停經(amenorrhea)和乳溢(galactorrhea)。治療精神疾病的藥物(phenothiazines)、抗高血壓的藥物(reserpine)以及TRH能促進泌乳激素的分泌。雌激素治療也能引起泌乳激素在血清濃度的升高。","tags":["腎臟","甲狀腺","腫瘤標記","荷爾蒙/內分泌","過敏"]},{"n":"Prostate Health Index (phi) (前列腺健康指數)","c":"FSIPHI","p":"12198C(400點) +12081B(400點)+ 12218C (1606點)","r":"是","ct":"02號黃頭管(Serum separator tu","d":"全血3.5 mL","g":"生化免疫組","t":"其他","m":"雙向免疫酵素冷光分析法(two-site immunoenzymatic assay, sandwich), Beckman Coulter","rv":"Prostate Health Index(phi)值與攝護腺癌罹患機率為phi 0~21 vs.罹癌率8.4%、phi 21~40 vs.罹癌率21%、phi >40 vs.罹癌率44%。","i":"輔助區別前列腺腺癌與良性的前列腺疾病","cl":"攝護腺癌又稱為前列腺癌，當惡性腫瘤出現在前列腺腺就稱為前列腺癌(Prostate Cancer)，前列腺癌罹患危險性隨著年齡而增加，好發年齡在60~80歲的男性。\n攝護腺特異抗原(Prostate-specific antigen, PSA)是一種絲胺酸蛋白?，由攝護腺的上皮細胞產生，並且由良性及惡性細胞產生。由於傷口或疾病造成的攝護腺構造異常，可使PSA滲漏到血流中。血液中PSA主要是游離狀態(non-complexed form非複合物, fPSA)或主要與血清蛋白?抑制物(alpha-1 antichymotrypsin)形成複合物的狀態(complex, cPSA)。一般來說，血液中PSA有70~90%為cPSA，其餘為fPSA，臨床上，PSA濃度介於4~10 ng/mL的病人可計算血液中游離攝護腺特異抗原百分比(%fPSA, 即fPSA與PSA的比例)協助對罹患前列腺癌進行風險評估，%fPSA越高，罹患前列腺癌的風險越低，而%fPSA低於10%的病人，有較高風險可能罹患前列腺癌。\n近期發現PSA前驅物會在前列腺腫瘤組織中升高，其含有7個胺基酸的前導多?([-7]proPSA)的天然(native)前驅物(proPSA)形式，以及具截短形式的前導多?。截短的proPSA主要有含5個胺基酸前導多?([-5]proPSA)、4個胺基酸前導多?([-4]proPSA)及2個胺基酸前導多?([-2]proPSA)。[-2]proPSA為腫瘤萃取物發現的主要形式，且與良性組織相比，於攝護腺腫瘤呈現免疫組織強染色，因此最受重視，且[-2]proPSA亦為proPSA前導多?中在體外最穩定的形式。研究結果顯示，在以攝護腺切片確診為攝護腺癌的個案中，當男性的PSA濃度於2.0~10.0 ng/mL，檢測[-2]proPSA比單獨使用%fPSA相比，可改善攝護腺癌偵測的特異性；當PSA濃度小於4.0 ng/mL時，[-2]proPSA的效益仍令人關注，因為許多攝護腺癌亦發生在這個範圍內。\n文獻報告中顯示，當PSA濃度2.0~10.0 ng/mL時，可進一步檢測Access Hybritech p2PSA再搭配Access Hybritech PSA及free PSA，計算出前列腺健康指數(Prostate Health Index, phi)。\n前列腺健康指數(phi)可顯著提高PSA及%fPSA偵測攝護腺癌的臨床特異性，當PSA濃度2.0~10.0 ng/mL，95%臨床敏感性的情況下，phi的臨床特異性為18.2%，而%fPSA則為6.6%，因此可輔助男性PSA濃度落於2.0~10.0 ng/mL區別攝護腺癌與良性的攝護腺疾病，此指標也可對罹患前列腺腺癌進行風險評估，偵測罹癌的可能性，前列腺健康指數(phi)越高，罹癌風險越高，前列腺切片檢查仍為現今確認是否罹患前列腺癌的標準診斷方法。\n本院使用Access Hybritech p2PSA、Access Hybritech PSA及Access Hybritech Free PSA檢驗試劑檢測p2PSA、PSA及Free PSA，不同平台檢驗報告不可互相比較使用。","tags":["腫瘤標記"]},{"n":"Prostate specific antigen (PSA)","c":"FSIPSA","p":"12081B(400點)","r":"是","ct":"2號5 mL黃頭管(Serum separator","d":"全血3.5 mL","g":"生化免疫組","t":"2天","m":"雙向免疫酵素冷光分析法(two-site immunoenzymatic assay , sandwich)，Beckman Coulter Access Hybritech PSA.","rv":"＜4.0  ng/mL","i":"定量偵測人類血清總攝護腺特異抗原(Prostatic specific antigen, PSA)的量。PSA及肛門指診(rectal examination, DRE)可協助臨床診斷年齡大於50歲以上男性之攝護腺癌；連續監測PSA可協助攝護腺癌病人之預後及治療追蹤。","cl":"攝護腺癌發生率好發於男性，於台灣男性癌症中已為前五名，死亡率亦於男性癌症中前十名。\n1979年Wang等人鑑定並純化了PSA，PSA是一種單鏈糖蛋白，分子量約為34,000 daltons，含有7%碳水化合物。PSA以三種型態存在於血清中，第一種型式為被蛋白?抑制物(如alpha-2 macroglobulin)包覆型式，此缺乏免疫反應；第二種型式與另一個蛋白?抑制物(如alpha-1 antichymotrypsin (ACT))形成複合物；第三種不與任何蛋白?抑制物形成複合物的游離態存在，此即為游離型攝護腺特異抗原(free PSA)；後兩種型式可被市售PSA檢測 試劑得並統稱為total PSA。\n免疫組織化學研究指出，PSA主要存在於攝護腺漿核細胞及導管上皮細胞的細胞質中，PSA也會表現在正常細胞、良性增生細胞及惡性前列腺組織中，另外也存在於攝護腺液及精液中。在肺癌、大腸癌、直腸癌、胃癌、胰臟癌及甲狀腺癌中無法偵測到PSA。血清中攝護腺特異抗原(Prostate-specific antigen, PSA)濃度可估測攝護腺癌存在風險比率，對於攝護腺癌診斷仍需由切片(prostatic biopsy)檢查結果證實，血清中PSA濃度增加，可能因良性攝護腺細胞增生或是攝護腺細胞之鄰近細胞有發炎反應，攝護腺特異抗原的濃度在健康男性以及無攝護腺腫瘤的男性中是不會上升的。PSA可協助攝護腺癌病人進行攝護腺切除術後腫瘤殘留監測及攝護腺癌復發之監測。\nPSA檢測試劑為Beckman Coulter Access Hybritech PSA，校正追溯廠商Hybritech校正參考物質，因試劑廠商之檢測方法和試劑特異性隨校正追溯參考物質不同而有所差異，因此不同廠商試劑及檢測方法的檢測結果不可互換使用。","tags":["甲狀腺","腫瘤標記"]},{"n":"Protein (24hr urine)、Urine Protein-to-Creatinine Ratio","c":"FBIPCR、FBIPCRA","p":"09040C(40點)+09015C(40點)、P64013(80點)","r":"是","ct":"66號白頭塑膠管。","d":"尿液3 mL，白頭塑膠管約五分滿","g":"生化免疫組","t":"其他","m":"比色法 (Pyrogallol red method)","rv":"(1) Protein (24hr urine)：50-100 mg/ day\n(2) Protein (Random urine)：Protein-to-Creatinine Ratio＜200 mg/g","i":"定量尿液中微量蛋白的濃度，協助診斷腎臟病。","cl":"尿液中的總蛋白量測，對於腎臟、心臟和甲狀腺功能等相關的疾病之診斷及治療十分重要。這些疾病通常具有蛋白尿(proteinuria)的特徵，而分為四種主要的類型：(1)增加腎絲球滲透性(glomerular permeability)(腎絲球性蛋白尿)；(2)defective tubular reabsorption 缺陷腎小管重新吸收(腎小管性蛋白尿)；(3)低分子量蛋白濃度增加(過量性蛋白尿)；(4)進入泌尿道的蛋白質分泌異常(姿勢性蛋白尿)。激烈運動之後，或是具有下述狀況時，尿液蛋白量亦會增加：單株免疫球蛋白增高(monoclonal gammopathy)、腎炎、糖尿病性腎病變(diabetic nephropathy)或是泌尿道感染。","tags":["腎臟","糖尿病","甲狀腺"]},{"n":"Protein (Body fluid)","c":"FCSPRO、FRBPRO","p":"09040C(40點)","r":"是","ct":"36號15mL無菌試管，得以66號白頭塑膠管或21","d":"體液／CSF 1.5 mL","g":"生化免疫組","t":"急診可","m":"(1)CSF：Pyrogallol Red (End method);  \n(2)Body fluid：Biuret; Blanked(End method)","rv":"(1)CSF：15-45 mg/dL \n(2)Body fluid： \n     (A)Transudate：<3.0 g/dL or protein (body fluid) to (serum)   \n         ratio<0.50;     \n    (B)Exudate：>3.0 g/dL or protein (body fluid) to (serum) \n         ratio>0.50.","i":"定量體液或腦脊髓液中的微量蛋白濃度，以區分滲出液或漏出液。","cl":"漏出液(transudate)的總蛋白濃度＜3.0 g/dL，滲出液(exudate)的總蛋白濃度＞3.0 g/dL。濾出液／血清總蛋白比值＜0.5，滲出液／血清總蛋白比值＞0.5。滲出液(exudate)若含fibrinogen量達7%以上，滲出液會自動凝固。\n脊髓液中的總蛋白量測，對於測定血液／腦屏障(blood/brain barrier)到血漿蛋白增加的滲透性，或是測定腦脊髓膜內增加產量的免疫球蛋白十分重要。\n大部份的腦脊髓液中的蛋白質是原自於血漿，血漿經由腦膜和脈絡叢微血管壁的超微濾作用進入中樞神經系統。CSF中的蛋白質只有20%是脊髓腔內合成的。\n血腦屏障增加的滲透性，可能是由下列狀況所造成：大腦腫瘤、腦內出血(intracerebral hemorrhage)，或因為細菌性或是病毒性腦膜炎、腦炎或是脊髓灰質炎(poliomyelitis)所造成的發炎，會發現CSF中總蛋白質濃度增加(“influx syndrome”)。在髓鞘脫失性疾病(demyelinating disease)，例如多發性硬化症(multiple sclerosis) 的診斷上，測定增加的腦脊髓膜內免疫球蛋白合成十分重要。","tags":["腫瘤標記"]},{"n":"Protein C antigen","c":"FHEPCA","p":"08123B (367點)","r":"是","ct":"10號1.8 mL淺藍頭管(3.2% buffer","d":"(A)患者Hct≦55％：上述採血試管建議採血量之±10％(","g":"血液及組織相容組","t":"1週以上","m":"Enzyme Linked Fluorescent Assay（ELFA）","rv":"65%~140%","i":"Protein C功能之檢測，遺傳性的Protein C缺乏症常會導致血栓相關之併發症，後天性的protein C deficiency常見於嚴重的肝病，或患者接受anti-vitamin K治療時。","cl":"(1)遺傳性的Protein C缺乏症常會導致血栓相關之併發症，尤其是靜脈栓塞。如缺乏為異型接合子（heterozygote）導致，則通常會於青年時發病（＜40歲；Protein C antigen約為參考值之50﹪），反之如缺乏為同型接合子（Homozygote）導致，則通常於出生前或新生兒時期即發病（Protein C antigen小於參考值之10﹪）。\n(2)遺傳性Protein C antigen缺乏症主要分為以下兩種\n(A)Type 1：屬於quantitative deficiency，protein C antigen及activity均會下降。\n(B)Type 2：屬於qualitative deficiency，protein C activity會下降，但protein C antigen正常。\n(3)後天性的protein C deficiency常見於嚴重的肝病，或患者接受anti-vitamin K治療時。","tags":["肝臟/膽道","凝血/血栓"]},{"n":"Protein C function","c":"FHEPRC","p":"08077B(367點)","r":"是","ct":"10號1.8 mL淺藍頭管(3.2% buffer","d":"(A)患者Hct≦55％：上述採血試管建議採血量之±10％(","g":"血液及組織相容組","t":"1週以上","m":"Colorimetric Assay","rv":"70-130%","i":"用於Protein C功能之檢測，以協助診斷遺傳性或後天性的protein C缺乏症。","cl":"(1)先天性Protein C缺乏症主要以反覆的靜脈血栓形成為特徵，分為兩種類型：Type 1和Type II。\n(A)Type 1：屬於quantitative deficiency，protein C antigen及activity均會下降。\n(B)Type 2：較少見，屬於qualitative deficiency，protein C activity會下降，但protein C antigen正常。\n(2)後天性的protein C deficiency常見於口服抗凝劑治療患者、嚴重的肝疾病(肝炎、肝硬化)或disseminated intravascular coagulation(DIC)患者。\n(3)本項目檢測原理仍可檢出服用維生素K抗凝血藥物誘發之PIVKA-protein C (PIVKA: protein induced by vitamin K antagonists)，PIVKA-protein C不具生理性功能。","tags":["肝臟/膽道","凝血/血栓"]},{"n":"Protein S function","c":"FHEPRS","p":"08122B(367點)","r":"是","ct":"10號1.8 mL淺藍頭管(3.2% buffer","d":"(A)患者Hct≦55％：上述採血試管建議採血量之±10％(","g":"血液及組織相容組","t":"1週以上","m":"Clotting method (Electromagnetic sensor)","rv":"男：77-143%；女：55-123%","i":"(1)主要偵測Protein S功能，Protein S功能降低常見於先天與後天的Protein S缺損、懷孕期間、使用避孕藥、肝病、DIC或服用口服抗凝劑之病人\n(2)因血液中的Protein S會跟C4b binding protein (C4bBP)結合在一起，只有未結合的free protein S antigen才具有功能，依據美國病理醫師學會(CAP)參考文獻，建議應先檢測Free protein S antigen作為初步之篩檢或同時檢測Free protein S antigen以及Protein S function。","cl":"(1)Protein S是一種維生素 K 依賴性蛋白質，不具有任何酯?功能，在人體中的分子量為70,000，由一條多?鏈組成，在血漿中的濃度為25mg/L，protein S在肝臟中以無活性前體合成，活性態則是透過維生素K依賴性羧化?對谷氨酸殘基(glutamic residues)進行羧化後獲得的，並含有π-羧基谷氨酸殘留物(π-carboxyglutamic residues)，從而使之能夠固定鈣。\n(2)Protein S具有重要的抗凝血功能，可充當活化protein C的cofactor，與活化protein C形成化學計量複合物(stoichiometric complex)。在鈣存在的情況下，此複合物與磷脂表面牢固結合，從而調節凝血過程，透過蛋白水解凝血?活化Factor V和Factor VIII使其失去活性。protein S可以透過增加protein C對磷脂膜(phospholipid membranes)的親和力，增強Protein C的抗凝血功能。\n(3)Protein S的凝血?敏感區可以因受到thrombin有限的蛋白水解作用，使Protein S保留其對磷脂的親和力，但失去其作為活化Protein C的輔助因子的抗凝血功能。\n(4)當Protein S與補體C4b的蛋白質結合，即C4b結合蛋白(C4b-BP)時會形成動態平衡，此時會以兩種不同的形式存在於血漿中：一種低分子量形式（約佔總重量的20%），對Protein S沒有任何親和力；另一種是高分子量形式（約佔總重量的80%），它可以與Protein S以1:1的比例複合。\n(5)Protein S以兩種不同形式存在：\n(A)Free Protein S form，作為活化Protein C的輔因子約佔Total Protein S的40%。\n(B)High molecular weight C4b-BP結合Protein S形式，不具有活性，約佔總Protein S的60%。\n(6)後天Protein S缺乏症包含:C4b-BP升高導致的發炎症候群、肝臟疾病、腎病症候群、口服抗凝血劑、口服避孕藥及L-asparaginase治療。\n(7)先天性Protein S缺乏可分為三種類型\n(A)Type I deficiencies：Total Protein S及Free Protein S antigen均下降。\n(B)Type II deficiencies：Protein S function下降但Total Protein S及Free Protein S均正常\n(C)Type III deficiencies：Protein S function及Free Protein S antigen下降，但Total Protein S Ag正常。\n(8)先天性或後天性Protein S缺乏會因血液抗凝血能力降低而增加血栓栓塞的風險，可能會產生復發性血栓形成。\n(9)診斷Protein S缺乏應考量肝功能、consumptive coagulopathy、維他命K狀況以及是否處於急性栓塞期。當Free Protein S Antigen下降，而導致Protein S Function下降時，應排除是否因慢性或急性發炎導致C4bBP上升之影響。","tags":["肝臟/膽道","腎臟","凝血/血栓"]},{"n":"Prothrombin time","c":"FHEPRO、FRHPRO","p":"08026C(150點)","r":"是","ct":"10號1.8 mL淺藍頭管(3.2% buffer","d":"(A)患者Hct≦55％：上述採血管建議採血量之±10％ (","g":"血液及組織相容組","t":"急診可","m":"Clotting method (Electromagnetic sensor)","rv":"(1)生物參考區間：12.2-15.1 sec.\n(2)口服維他命K拮抗藥物建議(optimal)治療INR區間:2.0-3.0（reference：CHEST. 2004；126 ( Supple 3) 163S ~ 704S）","i":"(1)PT主要用於外在凝血路徑中，篩檢凝血因子功能及監控口服維他命K拮抗藥物(如：warfarin)治療的療效。\n(2)PT延長：先天性血液凝固因子 (Factor II, V, VII, or X)或fibrinogen缺乏、泛發性血管內血液凝固症(Disseminated Intravascular Coagulation, DIC)、口服維他命K拮抗藥物治療(VKA)、肝衰竭(肝硬化、硬化)。\n(3)PT縮短：多發性骨髓癌、急性血栓靜脈炎或服用維他命K\n(4)PT/INR不能作為Direct thrombin inhibitor(如：Dabigatran)及Anti-Xa inhibitor (如：Rivaroxaban、Apixaban或Edoxaban)療效之監測檢驗：因病人的PT/INR可正常表現，而且無法反映其體內(in vivo)凝血功能是否為正常，故對不清楚藥物使用史之病人，PT/INR無法可靠地篩檢出是否有使用此類抗凝藥物。","cl":"(1)PT延長：先天性血液凝固因子 (Factor II, V, VII, or X)或fibrinogen缺乏、泛發性血管內血液凝固症(Disseminated Intravascular Coagulation, DIC)、口服維他命K拮抗藥物治療(VKA)、肝衰竭(肝硬化、硬化)。\n(2)PT縮短：多發性骨髓癌、急性血栓靜脈炎或服用維他命K","tags":["肝臟/膽道","凝血/血栓"]},{"n":"Pseudocholinesterase","c":"FRCLIN","p":"09083B(90點)","r":"是","ct":"03號綠頭管(Lithium heparin)","d":"全血3.5 mL","g":"生化免疫組","t":"急診可","m":"Butyrylthiocholine (Rate method)","rv":"4900-11900 U/L","i":"定量檢驗血漿中假膽鹼酯?(pseudocholinesterase, (E.C. 3.1.1.8))的活性，協助有機磷中毒之診斷。","cl":"在人體組織中，主要有兩種類型的膽鹼酯?。真膽鹼酯?(True cholinesterase)存在於神經末梢及紅血球中，但不存在於血漿。假膽鹼酯?(pseudocholinesterase) 存在於血漿和肝臟，但不存在於紅血球中。假膽鹼酯?(pseudocholinesterase)的檢測主要為協助膽鹼酯?抑制症的診斷和治療，如殺蟲劑中毒或succinylcholine中毒。","tags":["其他"]},{"n":"Pus cell (WBC)","c":"FSTPUS","p":"07018C(25點)","r":"是","ct":"22號一般糞便收集瓶(CFEA收集瓶)；液狀糞便使","d":"1g(約一顆花生米大小)","g":"血液及組織相容組","t":"急診可","m":"以CFEA(Change’s feces examination apparatus)濃縮集卵法處理檢體後，以顯微鏡進行鏡檢。","rv":"≦3/HPF","i":"觀察糞便中是否有Pus cell（WBC）的存在","cl":"直接觀察糞便中是否有Pus cell (WBC)的出現來協助診斷患者是否發炎或受感染","tags":["其他"]},{"n":"Quantiferon (IGRA)","c":"FVPQUA、FVPQUAN、FVPQUA2、FAAIGR、FAAIGRH、FAAIGRZ","p":"自費","r":"是","ct":"16號Quantiferon專用採血管(QFT t","d":"共全血4 mL (每支試管各0.8~1.2 mL全血，須達每","g":"生化免疫組","t":"其他","m":"Enzyme linked immunosorbent assay (ELISA)：利用模擬分枝桿菌蛋白質的胜?抗原刺激淋巴細胞，檢測其所引發細胞媒介免疫產生之Interferon γ。","rv":"Quantiferon (IGRA) (Interpretation): Negative","i":"協助潛在性結核病感染(LTBI)輔助","cl":"結核病是透過感染結核分枝桿菌複合體(M. tuberculosis complex [M. tuberculosis、M. bovis、 M. africanum、M. microti、M. canetti 及 M. caprae] )所造成的傳染性疾病，通常透過來自肺 部結核病發病患者的空氣飛沫散播給新的患者。新感染的個體在數週至數個月內會發展成結 核病，但大多數已感染患者依舊能維持健康。潛伏結核感染(LTBI, Latent tuberculosis infection)為非傳染性、無症狀的帶原，結核菌會潛伏在那些已受感染的患者身上數個月、甚至數年之後才發病。診斷LTBI的主要目的是為了進行結核病的預防性治療。在以往持續超過100年的時間，僅能使用結核菌素皮膚檢測(TST, tuberculin skin test)診斷LTBI。受到感染之後2~10週，患者會對結核菌素會產生皮膚反應。但也有些已感染患者不會對結核菌素產生反應，包括各種患有免疫功能疾病的患者，但在其他狀況下也有患者會對TST沒有反應。相反地，有些不太可能受到感染的個體，在接受卡介苗(Bacille Calmette-Guerin [BCG])或感染其他非結核分枝桿菌，或是其他無法判斷的原因，會對結核菌素的產生反應且可判斷為陽性TST結果。\n使用QuantiFERON-TB Gold Plus (QFT-Plus)檢測，是第四代 QuantiFERON-TB檢測技術，藉由測量全血中IFN-的方式評估細胞媒介反應。QFT-Plus檢測以胜?抗原(ESAT-6和CFP-10)進行模擬分枝桿菌蛋白與全血中細胞的細胞媒介免疫(CMI)反應。所有BCG菌株以及除了M. kansasii、M. szulgai和M. marinum以外的大多數非結核性分枝桿菌(NTM)沒有這些蛋白(ESAT-6和CFP-10)。已感染結核性分枝桿菌群的個體，通常在其血液中具有辨識這些蛋白及其他分枝桿菌抗原的淋巴球。此辨識過程涉及干擾IFN-的生成及分泌。IFN-偵測及後續定量形成本檢測的基礎。\n結核菌素皮膚檢測(TST)及IGRA檢測對於診斷有幫助，但是不足以診斷結核分枝桿菌群感染，陽性結果可以支持診斷結核病發病；但是其他分枝桿菌(例如M. kansasii)也可能造成陽性結果。為了確認或排除結核病發病以進行其他醫療及診斷評估，用於QFT-Plus的抗原為模擬蛋白ESAT-6和CFP-10胜?混合物。許多研究已經證實這 些胜?抗原能刺激感染結核分枝桿菌個體的T細胞產生IFN-反應，但一般對未受感染者或接種BCG疫苗但無結核病或無LTBI風險者，則不會產生反應。但是，接受減弱 免疫功能的治療或免疫功能低下的狀況可能會減少IFN-反應。患有特定其他分枝桿菌感染的患者也可能對ESAT-6和CFP-10產生反應，因為這些蛋白的基因也存在於M. kansasii、M. szulgai及M. marinum。在結核分枝桿菌(MTBC)感染時，CD4+ T細胞透過分泌干擾IFN-，在免疫學控制方面扮演重要角色。目前的證據支持CD8+ T細胞參與宿主防禦 MTBC 的角色，藉由產生IFN-及其它可溶性因子，活化巨噬細胞以抑制MTBC生長、殺死受感染細胞，或直接溶解細胞內的MTBC。目前已經在LTBI患者及活動性肺結核病(active TB)患者的身上偵測到會產生IFN-的MTBC特異性CD8+細胞。根據文獻報告，相較於LTBI，在患有活性肺 結核病的受試者更常偵測到具有ESAT-6和CFP-10 特異性的CD8+ T淋巴球，而且可能與 近期暴露MTBC有相關性。除此之外，在患有活動性肺結核病並同時感染人類免疫缺乏病毒(HIV)的受試者，以及活動性肺結核病年幼兒童患者身上都偵測到可產生IFN-的MTBC特異性CD8+ T細胞。","tags":["結核/呼吸道"]},{"n":"Rapid plasma reagin (RPR)","c":"FSIVDR、FSIRPR、FOTVDR、FSIRPRN","p":"12001C(70點)","r":"是","ct":"02號黃頭管(Serum separator tu","d":"全血2 mL","g":"生化免疫組","t":"24小時","m":"常規篩檢檢測：免疫比濁法(Immunoturbidimetric assay)(Automation)；\n手工效價檢測：絮狀凝集法(Flocculation)","rv":"Nonreactive","i":"檢測血清中梅毒抗脂質抗體(Syphilis anti-lipid antibody)","cl":"RPR可作為第一及第二期梅毒的血清學篩檢，此檢測為非特異性梅毒螺旋體試驗，若結果為陽性反應時，須再以特異性梅毒試驗(如梅毒螺旋體乳膠凝集試驗(TPLA)、梅毒螺旋體酵素免疫分析法(EIA)、梅毒螺旋體化學冷光免疫分析法(CIA)及梅毒抗體間接螢光染色法(FTA-abs)等檢驗方法)進行確認試驗。\n硬下疳出現後1-3週內，RPR通常為陽性。第一期梅毒之RPR效價為≧1:32 reactive，後期梅毒效價則不定，經治療後效價通常會下降。\n自體免疫疾病患者體內可能出現自體抗體，而造成RPR生物性偽陽性反應。","tags":["自體免疫"]},{"n":"rAra h 2 Peanut花生蛋白 r Ara h 2","c":"FALARA","p":"30022C(1620點)","r":"是","ct":"03號綠頭管(Lithium heparin)","d":"全血4.5 mL","g":"生化免疫組","t":"其他","m":"螢光酵素免疫分析法(Fluorescence enzyme immunoassay, FEIA)","rv":"＜0.35 kUA/L(Class 0)；參考值備註：0.35~0.69 kUA/L(Class I)、0.70~3.49 kUA/L(Class II)、3.50~17.49 kUA/L(Class III)、17.5~52.49 kUA/L(Class IV)、52.5~99.99 kUA/L(Class V)、≧100 kUA/L(Class VI)。","i":"定量分析特異性過敏原IgE之濃度，協助診斷IgE媒介之過敏疾病。","cl":"過敏性疾病大約佔全世界人口30%。過敏反應主要分為四型，其中過敏原引起主要為第一型過敏反應，為外因性氣喘、花粉熱或異位性濕疹的病人，當第一次接觸過敏原，症狀會立即發作，免疫系統會產生對應過敏原之過敏原特異性IgE抗體，其會循環於血液中並接合於mast cell上，當第二次接觸相同過敏原時，會使mast cell產生去顆粒作用，使細胞內之發炎性物質，例如：histamine、serotonin等，釋放至細胞外，造成流鼻水、打噴嚏等臨床症狀產生，嚴重者甚至產生休克。可藉由檢測血液中之引起過敏相關之特異性抗體IgE(如花粉、動物毛屑、塵?及家塵等)，此可輔助了解引起過敏之過敏原種類，仍需配合其它臨床證據一起判斷。","tags":["過敏"]},{"n":"RBC crossmatch","c":"FBBCRO","p":"11002C(200點)","r":"否","ct":"07號6 mL紫頭管 (K2 EDTA tube)","d":"全血6 mL","g":"血庫組","t":"其他","m":"依患者抗體篩檢結果與抗體鑑定歷史紀錄，選擇以下方法：(1)立即離心法(人工法); (2)管柱血球凝集法(CAT); (3)預溫法; (4)試管法間接抗球蛋白試驗(Saline-IAT); (5)試管法間接抗球蛋白試驗(LISS IAT)","rv":"不適用","i":"以交叉試驗確認血品與用血者之相容性，確保病人輸血安全。","cl":"觀察受血者血清與待輸注血袋紅血球的反應，除非特殊狀況，需儘可能輸注血袋交叉試驗結果相合之血袋，以確保輸血安全。","tags":["輸血/血型"]},{"n":"RBC morphology","c":"FHERBM","p":"08009C(30點)","r":"是","ct":"04號-3mL紫頭管","d":"3 mL","g":"血液及組織相容組","t":"其他","m":"Liu's stain或wright stain/microscope","rv":"(1)Dimorphic red cells、RBC agglutinates、Rouleaux：Absence\n(2)Fragmented RBC: 成人及足月新生兒≦1%，早產兒≦5%\n(3)其他紅血球形態<2+","i":"紅血球形態常與血液疾病相關，例如：microcyte常見於缺鐵性貧血或thalassemia患者，Macrocytic RBC則見於megaloblastic anemia，target cell同樣常見於thalassemia患者，fragmented RBC則見於microangiopathic disorder患者，teardrop cell則可見於myelofibrosis患者。","cl":"(1)Anisocytosis：代表紅血球大小不一致，常見於缺鐵性貧血、Vitamin A 缺乏、Myelodysplastic syndrome (MDS)、地中海型貧血、維生素B12及葉酸缺乏症、輸血後病人。\n(2)Macrocyte：常見於慢性溶血性貧血伴隨網狀紅血球增生疾病、肝病、甲狀腺功能低下、脾臟切除及維生素B12及葉酸缺乏症或紅血球分化異常(dyserythropoiesis)者，如接受化療或MDS病人。\n(3)Microcyte：常見於缺鐵性貧血、地中海型貧血、鉛中毒以及因慢性病導致之貧血症。\n(4)Hypochromic cell：常見於Hb合成缺陷相關疾病伴隨著microcytosis，如缺鐵性貧血、地中海型貧血、sideroblastic anemia。若為normocytic RBC則可能出現在類風濕性關節炎、慢性感染或發炎等疾病。\n(5)Polychromatophilic RBC：polychromatophilic cells以supravital stain染色就是所謂的reticulocytes，當骨髓受到erythropoietin（EPO）刺激或骨髓造血亢進時reticulocytes會增加，此外新生兒此類血球的比例也會比正常成人為高。\n(6)Acanthocyte：出現在嚴重肝病、脾切除、肝腎衰竭、慢性飢餓、infantile pyknocytosis、McLeod phenotype、anorexia nervosa等疾病。\n(7)Bite cell：因藥物導致血色素氧化或不穩定之變異血色素形成之沉澱物(即為henze body)，經脾臟移除該沉澱物後，形成之紅血球，常見於G-6-PD缺乏症。\n(8)Blister cells/Prekeratocyte：此二細胞形態類似，均是紅血球細胞內有水泡狀物質，blister cells常見於sickle cell disease，prekeratocyte則常見於microangiopathic disease或偶而可見於缺鐵性貧血。\n(9)Echinocyte：又稱Burr cell，常出現在uremia、pyruvate kinase 缺乏症、脾切除病人、phospoglycerate kinase缺乏症或是新生兒肝炎。\n(10)Ovalocyte：又名elliptocytes，出現於hereditary elliptocytosis、紅血球skeletal膜蛋白異常疾病、缺鐵性貧血、thalassemia。\n(11)Fragmented RBC：為Schistocyte、Helmet cell、Keratocyte及Triangular cells的總稱。常出現於嚴重燒燙傷、disseminated intravascular coagulation (DIC)、thromboticthrombocytopenic purpura (TTP)以及microangiopathic hemolytic anemias。\n(12)Sickle cell：常見於接受脾摘除的sickle cell anemia病人。\n(13)Spherocytes：Spherocyte常出現在hereditary spherocytosis及immune hemolytic anemia病人，micro spherocyte則較常出現在嚴重燒燙傷及microangiopathic hemolytic anemias病人。\n(14)Stomatocyte：常見於遺傳性的Stomatocytosis疾病，後天性原因則可能為急性酒精中毒或肝臟疾病。\n(15)Target cell：又名Codocyte，常出現於thalassemia、缺鐵性貧血、肝臟疾病病人。\n(16)Teardrop cell：又名Dacrocyte，出現於myelofibrosis、惡性貧血、腎病引起的貧血、溶血性貧血及骨髓受腫瘤細胞浸潤時。\n(17)Basophilic stippling：為RBC inclusion bodys一種，出現於thalassemia、megaloblastic anemia及酒精中毒；重金屬砷與鉛中毒患者亦可見Basophilic stippling。\n(18)Howell-Jolly body：脾切除後的患者可見Howell-Jolly body。此外出現在megaloblastic anemia、先天性脾臟缺乏、梗塞性脾萎縮等疾病。\n(19)Pappenheimer body：脾切除或脾臟功能低下患者可見，也出現在sideroblastic anemia、thalassemia、hemolytic anemia、iron overload等疾病。\n(20)RBC agglutinates：常見於因病毒或黴漿菌感染產生冷凝集素時，Lymphoproliferative disorder、plasma cell dyscrasias以及PCH(Paroxysmal cold hemoglobinuria)之病人。\n(21)Rouleaux：當血液中有大量蛋白質、fibrinogen或globulin時，會容易出現此形態，常與發炎或感染有相關。也常出現於multiple myeloma、lymphoma(如:Waldenstrom’s macroglobulinemia)等與monoclonal gammopathies相關的疾病。","tags":["肝臟/膽道","腎臟","甲狀腺","腫瘤標記","貧血/血液疾病","輸血/血型","凝血/血栓"]},{"n":"rDer p10 Tropomyosi屋塵?肌肉纖維蛋白nDer p10","c":"FALTRO","p":"30022C(1620點)","r":"是","ct":"03號綠頭管(Lithium heparin)","d":"全血4.5 mL","g":"生化免疫組","t":"其他","m":"螢光酵素免疫分析法(Fluorescence enzyme immunoassay, FEIA)","rv":"＜0.35 kUA/L(Class 0)；參考值備註：0.35~0.69 kUA/L(Class I)、0.70~3.49 kUA/L(Class II)、3.50~17.49 kUA/L(Class III)、17.5~52.49 kUA/L(Class IV)、52.5~99.99 kUA/L(Class V)、≧100 kUA/L(Class VI)。","i":"定量分析特異性過敏原IgE之濃度，協助診斷IgE媒介之過敏疾病。","cl":"過敏性疾病大約佔全世界人口30%。過敏反應主要分為四型，其中過敏原引起主要為第一型過敏反應，為外因性氣喘、花粉熱或異位性濕疹的病人，當第一次接觸過敏原，症狀會立即發作，免疫系統會產生對應過敏原之過敏原特異性IgE抗體，其會循環於血液中並接合於mast cell上，當第二次接觸相同過敏原時，會使mast cell產生去顆粒作用，使細胞內之發炎性物質，例如：histamine、serotonin等，釋放至細胞外，造成流鼻水、打噴嚏等臨床症狀產生，嚴重者甚至產生休克。可藉由檢測血液中之引起過敏相關之特異性抗體IgE(如花粉、動物毛屑、塵?及家塵等)，此可輔助了解引起過敏之過敏原種類，仍需配合其它臨床證據一起判斷。","tags":["過敏"]},{"n":"Renin","c":"FENREN","p":"27032B(400點)","r":"否","ct":"4號紫頭管(K2 EDTA)","d":"全血2mL","g":"生化免疫組","t":"其他","m":"固相放射免疫分析法(Immunoradiometric assay, sandwich)","rv":"Adults(random): 3.18~32.61 pg/mL; \nAdults(supine): 2.71~16.51 pg/mL;\nAdults(upright): 5.41~34.53 pg/mL","i":"定量血漿中active renin濃度，協助原發性hyperaldosteronism\n或hypoaldosteronism之診斷。","cl":"腎素與血管收縮素(angiotensin)、醛固酮(aldosterone)等形成renin-agiotensin-aldosterone系統，是調節人體水分容積的重要激素，腎素是由腎臟近腎絲球的細胞所製造分泌的蛋白質水解酸性酵素，它能夠作用於血中的高壓素原(angiotensinogen)，使其轉變為高壓素I，angiotensin I(非活性)後者又可經過一種轉換?(angiotesin converting enzyme，ACE)的作用變成高壓素II，angiotensin II (具活性)。因此，腎素對於高壓素生成的調控是其能調節動脈血壓及水份與鈉離子代謝的關鍵因素。\n如同多數的酵素，腎素作用在其生成細胞的細胞外，以非活性及活性兩種形態存在。非活性腎素(蛋白質)發現於血漿、羊水及腎臟，可經由不同作用方式(cryoactivation, acidification或 partial proteolysis)顯露出酵素的活性位置而達到激化成為活性腎素之目的。在循環系統中，非活性腎素佔了總腎素的90%。活性腎素為分子量40,000，由345個氨基酸組成的多?鍵。高壓素原(angiotensinogen)為腎素基質，在肝臟作用後形成高壓素I，循環系統中angiotensin I的濃度影響血漿腎素活性，最終影響angiotensin II的濃度。經由證實，體內高壓素I的血壓昇高作用乃源自於其經carboxypeptides(converting enzyme)轉換為高壓素II後而達成。converting enzyme由糖皮質類固醇及甲狀腺素所調控。\n高壓素II 是 renin-angiotensin系統的主要影響因子，藉由直接作用在血管平滑肌、刺激皮質醛酮生成以及交感神經的刺激作用來維持循環系統的平衡。於腎臟，高壓素II與腎絲球過濾率及腎血液流通量之控制有關連。由腎臟所分泌的腎素會反應腎動脈(腎內重覺受器)的灌流減少、遠側腎小管對鈉離子再吸收之減少(鈉離子流失)、鉀離子過低血症或 B-腎上腺素激導性的刺激。此外，基於反饋作用，如果血漿高壓素II的濃度增高時，高壓素II 就可直接抑制腎素的分泌而使腎素恢復正常。\n採檢前應控制飲食中鈉的攝取量，並應控制最終24小時尿液鈉量為(60 to 200 mEq/24 hours)來確認。","tags":["甲狀腺"]},{"n":"Respiratory Adenovirus Antigen (呼吸道腺病毒抗原檢測)","c":"FVPADV","p":"14064B(150點)","r":"是","ct":"試劑套組內附之採檢拭子","d":"(A)\t喉頭拭子(Throat swab)：將拭子放入喉嚨，","g":"微生物組","t":"其他","m":"免疫色層分析法(Immunochromatographic assay)","rv":"Negative","i":"協助臨床醫師診斷呼吸道腺病毒感染","cl":"(1)\t腺病毒感染以傳染性、地方性或突發性的形式發生在全世界，導致2% - 7% 5歲以下的嬰幼兒呼吸道感染。因腺病毒是造成下呼吸道感染的病源之一，在嬰兒或孩童病毒性肺炎及支氣管炎的病例中，由腺病毒導致而成的病例佔5%-11%。尤其是年齡非常小或處在托兒所、過度擁擠及社會經濟地位貧困等環境危險因子下特別容易受到感染。腺病毒十分容易在擁擠且敏感的族群間傳播。\n(2)\t腹瀉之腸道腺病毒之檢測，請開立Rotavirus/Adenovirus Antigen (輪狀病毒與腺病毒抗原檢測)，檢驗碼為FVPROT。","tags":["感染/敗血症","結核/呼吸道"]},{"n":"Respiratory panel (呼吸道病原體多標的核酸檢測)","c":"FVPRPI","p":"12182C*5+12183C*4 (9800點)","r":"是","ct":"採檢容器：Nasopharyngeal swab","d":"1 mL","g":"微生物組","t":"其他","m":"Nested multiplex PCR (巢式多重聚合?鏈反應)","rv":"SARS-CoV-2 RNA：Negative；其他：Not detected","i":"對於疑似患有呼吸道感染個體取得的鼻咽拭子，同時進行多種呼吸道病毒和細菌核酸的定性檢測及辨識。可辨識的物種如下:\n(1)腺病毒（Adenovirus）\n(2)冠狀病毒229E（Coronavirus 229E）\n(3)冠狀病毒HKU1（Coronavirus HKU1）\n(4)冠狀病毒NL63（Coronavirus NL63）\n(5)冠狀病毒OC43（Coronavirus OC43）\n(6)人類間質肺炎病毒（Human Metapneumovirus）\n(7)人類鼻病毒/腸病毒（Human Rhinovirus/Enterovirus）\n(8)A型流感病毒（Influenza virus A），包括亞型H1、H1-2009、H3\n(9)B型流感病毒（Influenza virus B）\n(10)副流感病毒1型（Parainfluenza virus 1）\n(11)副流感病毒2型（Parainfluenza virus 2）\n(12)副流感病毒3型（Parainfluenza virus 3）\n(13)副流感病毒4型（Parainfluenza virus 4）\n(14)呼吸道融合病毒（Respiratory syncytial virus）\n(15)副百日咳博德氏菌(IS1001) (Bordetella parapertussis(IS1001))\n(16)百日咳博德氏菌(ptxP) (Bordetella pertussis(ptxP))\n(17)肺炎披衣菌（Chlamydia pneumoniae）\n(18)肺炎黴漿菌（Mycoplasma pneumoniae）\n(19)\t新型冠狀病毒(SARS-CoV-2)","cl":"呼吸道病原體會導致急性局部及全身性疾病，其中多數嚴重病例發生於兒童、老年人及免疫功能低下的個體。呼吸道症狀包括咳嗽、鼻涕、鼻塞、發燒、氣喘、頭痛及肌肉疼痛，由於許多病毒及細菌所導致疾病的相似性，難以僅根據臨床症狀進行診斷。進行潛在致病原因鑑定，可提供資料協助醫師確定適當的病患治療及公共衛生對策進行疾病控制。\n陰性結果不應作為診斷、治療或其他患者處理決定的唯一依據。在呼吸道疾病情況下獲得陰性結果，可能是由於此試驗沒有檢測到的其他病原體所導致；或是由於鼻咽拭子檢體可能未檢測到的下呼吸道感染所導致。陽性結果並不能排除其他微生物多重感染的可能性。\n施用鼻噴式流感疫苗（例如FluMist）不久後收集鼻咽拭子樣本，可能導致本產品檢測到疫苗內的病毒，但是不代表出現感染。","tags":["結核/呼吸道","過敏"]},{"n":"Respiratory syncytial virus antigen (呼吸道融合病毒抗原檢測)","c":"FVPRSA","p":"14058B(350點)","r":"是","ct":"#85尼龍植絨拭子","d":"不適用","g":"微生物組","t":"其他","m":"免疫螢光法(Immunofluorescence assay, FIA)","rv":"Negative","i":"(1)Sofia RSV FIA抗原檢驗採用免疫螢光技術，測定為直接由鼻咽拭子、鼻咽沖洗液/沖洗液檢測呼吸道融合病毒抗原之快速定性法。\n(2)此測定用來幫助快速鑑別診斷急性RSV感染。陰性結果無法排除RSV之感染，建議進一步執行viral culture","cl":"(1)呼吸道細胞融合病毒(Respiratory Syncytial Virus)造成所有年齡的人急性呼吸疾病。並為嬰兒及幼童肺炎和細支氣管炎的主要感染病毒，和其他呼吸道病毒感染一樣，RSV引發不同程度的病態，最常見的是遇到寒冷時會出現鼻漏灌流現象。\n(2)介於1-2%被感染的嬰兒需要住院治療，最嚴重的疾病發生在出生第一年內，而這些患者有潛在性心肺疾病的風險。對一般的嬰兒及幼童而言，感染RSV病毒後在2-3個禮拜會痊癒，大體上來說，經過治療的幼兒在1或2個星期就會痊癒。\n(3)RSV具有高度傳染性，也由於醫護人員與病患很容易受感染，因此RSV是小兒科病房內最常見的院內感染病毒之一。\n(4)由RSV引起的肺炎及細支氣管炎可以用Ribavirine Aerosol治療根治。因此正確且快速的檢驗法來鑑定感染源，是住院幼兒照護治療很重要的一部份。\n(5)RSV的感染好發於秋季到冬季，它的感染經常開始於晚秋，11月至隔年3月達尖峰之後才慢慢減少流行，RSV則少發於夏季。\n(6)RSV是藉由飛沫或者直接接觸患者的分泌物來傳染。RSV初次的感染通常發生在6個禮拜大至2歲，可從輕微的感冒至嚴重的細支氣管炎或肺炎來表現，但經常是會造成症狀且侵犯至下呼吸道造成細支氣管炎和肺炎。無症狀的RSV初次感染是非常少見的。","tags":["感染/敗血症","結核/呼吸道"]},{"n":"Respiratory virus culture (呼吸道病毒培養)","c":"FVPISO1","p":"14001B(350點)","r":"是","ct":"#35-50mL無菌試管","d":"鼻咽抽取液、氣管沖洗液、氣管抽取液：3 mL","g":"微生物組","t":"其他","m":"利用細胞株接種檢體，觀察細胞株是否有受感染而產生細胞病變，然後再以免疫螢光抗體染色的方式加以鑑定。","rv":"No virus isolated","i":"協助臨床醫師診斷呼吸道病毒的感染或疾病","cl":"由檢體中分離出的病毒，表示患者可能有該病毒的感染。此檢驗醫令僅針對懷疑呼吸道病毒感染進行培養與鑑定，可以培養鑑定出的病毒種類，請見其他資訊。","tags":["感染/敗血症"]},{"n":"Reticulocyte indices","c":"FHERET","p":"08008C(30點)","r":"是","ct":"04號-紫頭管；小兒科患者可採用13號-微量紫頭管","d":"(A)04號-紫頭管：3 mL\r\n(B)13號-微量紫頭管(","g":"血液及組織相容組","t":"其他","m":"(1)自動血球計數儀：Reticulocyte、IRF(Immature Reticulocyte Fraction)、Ret-He(Reticulocyte hemoglobin equivalent)\n(A)紅血球計數採用電子阻抗法\n(B)網狀紅血球採用核酸染色及流式細胞計數法分析\n(2)超活體染色鏡檢法：當儀器報告值異常無法採用時，以超活體染色（supravital stain）製備成血液抹片後於顯微鏡鏡檢。","rv":"(1)Reticulocyte：0.83-2.24%\n(2)Absolute Reticulocyte count：35.8-99.6x10^3/μL\n(3)IRF：3.2-13.5%\n(4)Ret-He：31.7-37.6 pg\n註：當Reticulocyte分析受到干擾時，僅能以鏡檢法施行替代檢驗，此時不發IRF及Ret-He數值報告，改發NA。","i":"(1)\tReticulocyte：\n(A)貧血原因之調查，協助區別造血問題或是溶血。\n(B)貧血治療（如鐵劑、維他命B12）療效之監控。\n(2)IRF：網狀紅血球成熟指標。評估骨髓移植或造血幹細胞植入情形，監測紅血球生成激素(EPO)治療反應等。\n(3)Ret-He：輔助診斷鐵儲存狀況、缺鐵性貧血(iron deficiency anemia)，及功能性缺鐵(functional iron deficiency)","cl":"(1)Reticulocyte\n(A)當有貧血時，網狀紅血球會提早從骨髓釋放，因此須校正網狀紅血球數(corrected count)才能判讀骨髓造血反應。建議使用網狀紅血球絕對數作為紅血球造血評估指標比百分比來得準確。\nCorrected count(%)=Reticulocyte(%)x(Hematocrit/45)\n(B)單純計數網狀紅血球比例在臨床上較不具參考意義。需搭配網狀紅血球生產指標(Reticulocyte Production Index，RPI)才能對造血機能做出正確的判斷。RPI= Corrected count(%)/Maturation days，maturation days在不同hematocrit之定義如下:\n(a)36-45：1.0天\n(b)26-35：1.5天\n(c)16-25：2.0天\n(d)15 and below：2.5天\n(C)臨床上RPI上升(>3.0)可能與慢性溶血、近期大量出血和貧血治療後的反應有關。 \n(D)RPI降低(<2.0)則表示骨髓造血機能低下，如：再生不良性貧血、惡性貧血或嚴重缺鐵性貧血。或者是紅血球造血失效，如：維他命B12和葉酸缺乏。\n(2)IRF：低螢光及中度螢光Reticulocyte之總和(%)\n(A)評估紅血球生成的早期指標。可應用於骨髓移植後之監測及慢性腎功能衰竭相關貧血或其他疾病(如AIDS和惡性腫瘤)患者對紅血球生成素(EPO)治療反應的指標。\n(B)同時參考IRF(如下述)及網狀紅血球絕對數時，可以不需要再計算RPI而有相同的判定價值，例如下述(C)(D)(E)。\n(C)當Absolute Reticulocyte count及IRF均下降時：須排除Aplastic anemia之可能性。\n(D)當Absolute Reticulocyte count下降，IRF低於或落於參考區間：為ineffective erythropoiesis之表現，可見於myelodysplastic syndrome或dyserythropoietic anemia。\n(E)當Absolute Reticulocyte count及IRF均增加時：早期急性出血、溶血性貧血或針對EPO治療之反應。\n(3)Ret-He：為網狀紅血球中血紅素含量指標，可用於監控早期鐵缺乏，如iron-restrictive erythropoiesis。\n(A)Ret-He低時，代表鐵供應量不足造血所需之量。可與鐵蛋白(ferritin)一起使用，高值或正常的鐵蛋白與低值Ret-He表示可能有功能性鐵缺乏；而低值鐵蛋白與低值Ret-He為典型的鐵缺乏症。(鐵蛋白增加可能原因是疾病的急性期所造成，此時不能以鐵蛋白含量判定體內的鐵儲量)，低於29 pg可能iron deficiency anemia。\n(B)當有小球性紅血球時(如：thalassemia)，上述閾值(<29.0 pg)必須下修，依據相關文獻(Pediatrics International (2019) 61, 240–245)，針對thalassemia族群以RET-He≦27.0為cutt-off時，鑑別IDA的靈敏度和特異性分別為91.7%及81%。","tags":["腎臟","腫瘤標記","貧血/血液疾病","移植/免疫"]},{"n":"RF-IgM","c":"FBIRA","p":"12011C(275點)","r":"是","ct":"03號綠頭管(Lithium heparin)。","d":"全血3.5 mL","g":"生化免疫組","t":"其他","m":"免疫比濁法(Immunoturbidimetric assay)","rv":"≦14.0 IU/mL (95th percentile).","i":"定量血漿中之rheumatoid factor協助臨床診斷類風濕性關節炎","cl":"RF抗體通常是IgM抗體，但也可能是IgG、IgA或IgE抗體。類風濕性因子是一種非特異的檢查，在1-5%的健康人群中，以及在有其他慢性疾病的15-20%的老年患者中，可觀察到低滴定量的類風濕性因子陽性結果。同樣地，在類風濕性關節炎也會出現陰性結果，大約25%的類風濕性關節炎病患可能出現類風濕性因子陰性結果。\n在自身免疫風濕性疾病和非風濕性疾病中，也可以見到不同比例的類風濕性因子陽性結果，例如系統性紅斑狼瘡、Sjogren 綜合征、亞急性細菌性心內膜炎和其他細菌性感染、傳染性肝炎、慢性肝臟疾病、慢性活動性肺病、寄生蟲感染和病毒感染。","tags":["肝臟/膽道","感染/敗血症","自體免疫"]},{"n":"r-GT","c":"FBIRGT、FRCRGT","p":"09031C(70點)","r":"是","ct":"02號黃頭管(Serum separator tu","d":"全血3.5mL","g":"生化免疫組","t":"24小時","m":"Glutamyl-carboxy-p-nitroanilide (Rate method)","rv":"9~64 U/L (參考值儘適用於成人)","i":"定量血清中麩胺轉酸?的活性，協助肝臟相關疾病之診斷及治療追蹤。","cl":"γ-GT (EC 2.3.2.2)主要存在腎臟、胰臟、肝臟、脾臟、骨骼肌等器官，以腎臟最多，其次是胰臟及肝臟。\n在所有的肝臟疾病中血清的γ-GT都會升高，尤其是酒精性肝炎，又稱做GGTP。它比鹼性的磷酸鹽酵素(ALP)、轉胺基?(ALT)、用來偵測阻塞性黃疸、膽管炎、膽囊炎之白胺酸氨基胜?酵素(LAP, leucine aminopeptidase)還要準確靈敏。\n其γ-GT在肝臟疾病初期就會上升很高而且還比LAP或是5'-核酸解酵素(5’-nucleotidase)還高。中度提升的值可見於傳染性肝炎。但是γ-GT值改變也要注意是否為慢性酒精中毒、糖尿病、或是某些的神經學上的失常。\n正常濃度的γ-GT也可在骨骼的疾病發現；因此血清中的γ-GT可來確定是否為骨骼的疾病或是肝膽疾病。","tags":["肝臟/膽道","糖尿病"]},{"n":"Rh (D) type","c":"FBBRH","p":"11003C(90點)","r":"是","ct":"採檢容器：血液（全血）/07號6 mL紫頭管 (K","d":"(A)血型檢測：6 mL；新生兒科(<120天)：0.5 m","g":"血庫組","t":"其他","m":"(1)管柱凝集法Column Agglutination test(CAT gel card)為主要檢驗方法\n(2)立即離心法(人工法)為輔助檢驗方法","rv":"國人分佈頻率：D(+)99.7%；RH(D)陰性0.3%","i":"Rh(D)血型檢測或輸血前檢驗","cl":"(1)篩檢Rh(D)陰性輸血患者，以供輸血血品選擇參考。\n(2)產前檢查Rh(D)血型，以篩檢陰性孕婦供Anti-D致敏化參考。","tags":["輸血/血型"]},{"n":"Rice (米)","c":"FALRIC","p":"F30022C(1620點)","r":"是","ct":"03號綠頭管(Lithium heparin)","d":"全血4.5 mL","g":"生化免疫組","t":"其他","m":"螢光酵素免疫分析法(Fluorescence enzyme immunoassay, FEIA)","rv":"＜0.35 kU/L；參考值備註：0.35~0.69 kU/L(Class I)、0.70~3.49 kU/L(Class II)、3.50~17.49 kU/L(Class III)、17.5~52.49 kU/L(Class IV)、52.5~99.99 kU/L(Class V)、≧100 kU/L(Class VI)。","i":"定量分析特異性過敏原IgE之濃度，協助診斷IgE媒介之過敏疾病。","cl":"過敏性疾病大約佔全世界人口30%。過敏反應主要分為四型，其中過敏原引起主要為第一型過敏反應，為外因性氣喘、花粉熱或異位性濕疹的病人，當第一次接觸過敏原，症狀會立即發作，免疫系統會產生對應過敏原之過敏原特異性IgE抗體，其會循環於血液中並接合於mast cell上，當第二次接觸相同過敏原時，會使mast cell產生去顆粒作用，使細胞內之發炎性物質，例如：histamine、serotonin等，釋放至細胞外，造成流鼻水、打噴嚏等臨床症狀產生，嚴重者甚至產生休克。可藉由檢測血液中之引起過敏相關之特異性抗體IgE(如花粉、動物毛屑、塵?及家塵等)，此可輔助了解引起過敏之過敏原種類，仍需配合其它臨床證據一起判斷。","tags":["過敏"]},{"n":"Rotavirus/Adenovirus Antigen (輪狀病毒與腺病毒抗原檢測)","c":"FVPROT","p":"14026B (280點)+14064B(150點)","r":"是","ct":"#77立寶糞便採檢瓶","d":"固體糞便：約花生米大小;液體糞便：0.5 mL","g":"微生物組","t":"其他","m":"免疫層析法（Immunochromatographic assay）","rv":"Negative","i":"協助臨床醫師診斷Rotavirus感染及Adenovirus感染","cl":"(1)輪狀病毒為造成全世界孩童嚴重脫水腹瀉最主要常見的病因。科學家提出輪狀病毒具A至G共7種型別，其中只有A 、B和C型會感染人類，又以A型最常造成孩童感染。然而，任何年齡層的人類對於輪狀病毒的感染均有感受性，以3到24個月的嬰幼兒最易造成嚴重感染。因輪狀病毒感染而造成腹瀉的人會分泌大量的病毒，這些病毒會直接藉由污染的雙手傳播。輪狀病毒耐熱，易生存於環境中，也可以透過污染物質、水或食物傳染。\n(2)腺病毒主要是引起人類在呼吸道、眼睛方面和腸胃道系統感染的病原體。常見於孩童感染，以及偶爾會造成大爆發流行。大約有5%的孩童急性呼吸道疾病和10%的孩童肺炎發燒與腺病毒的感染有關。眼睛受到腺病毒感染時，會導致咽結膜炎熱、濾泡性角膜炎或流行性角膜炎。腺病毒40型和41型與嬰幼兒的病毒性腸胃炎最具關聯性；並有報導指出：腺病毒40型和41型在小兒科病房亦會引起4~15%的院內感染。","tags":["感染/敗血症","結核/呼吸道"]},{"n":"RSV RNA (呼吸道融合病毒核酸擴增試驗)","c":"FVPRSO","p":"12183C (1200點)","r":"是","ct":"#81 RP拭子/保存液","d":"不適用","g":"微生物組","t":"其他","m":"恆溫核酸擴增技術(Isothermal nucleic acid amplification technology)","rv":"Not detected","i":"利用恆溫核酸擴增技術(Isothermal nucleic acid amplification technology)檢測呼吸道融合病毒，鼻咽拭子樣本中的呼吸道融合病毒核酸，有助於快速區別呼吸道融合病毒感染。","cl":"呼吸道融合瘤病毒 (RSV) 是嬰兒及幼童之嚴重呼吸道疾病單一最重要的成因，也是嬰幼兒細支氣管炎的一大成因。它是工業化國家嬰兒與幼童住院最常見的原因。RSV對年長者、心肺疾病患者和免疫功能障礙者也是一大困擾。","tags":["感染/敗血症"]},{"n":"Salicylate","c":"FDPSAL","p":"10508B(320點)","r":"否","ct":"03號綠頭管(Lithium heparin tu","d":"全血2mL","g":"生化免疫組","t":"2天","m":"呈色法(modification of the Trinder colorimetric method)","rv":"Therapeutic range: 2.8 -20.0 mg/dL；Toxic range:＞30.0 mg/dL； Lethal range:＞60.0 mg/dL","i":"定量血漿中Salicylate之濃度作為臨床治療藥物Salicylate血中藥物濃度監控之依據","cl":"水楊酸(salicylates, aspirin, acetylsalicylate acid )具有無麻醉性、止痛、退燒和消炎以及抑制血小板凝集的特性，在腸胃道吸收，肝臟代謝後由尿液排出。短期使用半衰期2-3小時，慢性用藥半衰期是15-30分，長期服用半衰期15-30小時。水楊酸服用過量會造成毒性，引起酸鹼失衡、痙攣、暈眩、體溫上升、血糖上升、噁心、嘔吐、耳鳴、喘氣、呼吸障礙。測定血中濃度對於水楊酸中毒嚴重性極具重要性。水楊酸中毒可能包括血液偏鹼、再看到偏酸，再繼之是酮酸中毒。","tags":["藥物/毒物監測"]},{"n":"SARS-CoV-2 Ag","c":"FVPCOVG、FVPCOVGE","p":"14084C (150點)","r":"否","ct":"(83)新冠抗原採檢套組","d":"無","g":"微生物組","t":"其他","m":"免疫色層分析法","rv":"Negative","i":"(1)本檢驗用於針對符合新冠肺炎臨床和/或流行病學標準的人，進行鼻咽拭子檢體的SARS-CoV-2抗原(Ag)定性檢測，以輔助診斷是否有SARS-CoV-2感染。本檢驗可提供初步的檢測結果。當結果呈陰性時，不能排除有SARS-CoV-2感染，也不能作為治療或其他臨床處置的唯一依據。當結果呈陰性時，必須同時參考臨床觀察、患者病史和流行病學資訊由醫師進行綜合判斷。\n(2)此檢測不可作為SARS-CoV-2的捐贈者篩檢之用。","cl":"此檢驗僅可提供鼻咽拭子檢體的SARS-CoV-2 抗原快速定性檢驗結果。當檢驗結果呈陰性時，無法排除SARS-CoV-2感染的可能性；而當檢驗結果呈陽性時，無法排除同時感染其他病原體的可能性，建議此檢測結果應由醫師配合其他臨床表現以及相關接觸史，進行整體判讀。與SARS-CoV-2核酸檢測比較，SARS-CoV-2抗原篩檢之檢測敏感度為93.3%（95%信賴區間: 83.8-98.2%），特異度為99.4%（95%信賴區間97.0-100%）。","tags":["結核/呼吸道"]},{"n":"SARS-CoV-2 RNA (新冠病毒核糖核酸)","c":"FVPCOVT、FVPCOVTE","p":"12215C (1200點)","r":"是","ct":"(81)RP拭子/保存液","d":"1 mL","g":"微生物組","t":"其他","m":"多重即時反轉錄聚合?連鎖反應 (Multiplex real-time RT-PCR)","rv":"Negative","i":"符合新型冠狀病毒檢驗條件者","cl":"(1)\t正常人為Negative。結果為Positive時，則代表檢體中含有SARS-CoV-2 RNA，須配合臨床症狀判讀。\n(2)\t可檢測得到英國突變株(202012/01, 20I/501Y.V1, B.1.1.7 lineage)、南非突變株(501Y.V2, 20H/501Y.V2, 20H/501Y.V3, B.1.351 lineage)、巴西突變株(P.1, 501Y.V3, 20B/S.484K, B.1.1.248 lineage)。","tags":["其他"]},{"n":"Semen examination","c":"FCSSE","p":"16001C(70點)","r":"否","ct":"26號萬用收集盒","d":"須將全部檢體完整收集","g":"血液及組織相容組","t":"24小時","m":"(1)Time to liquefaction、Appearance、Gross viscosity:肉眼觀察\n(2)Volume以有刻度尖底管量\n(3)pH以ADVANTEC book type pH 試紙量測\n(4)Motility、Abnormal morphology利用顯微鏡觀察並計數。\n(5)Sperm concentration、WBC則以Hemocytometer於顯微鏡下進行計數","rv":"(1)Appearance：Homogeneous，gray-opalescent\n(2)Volume：＞1.5 mL\n(3)Liquefaction：＜60min(RT)\n(4)Viscosity：Normal\n(5)pH：≧7.2\n(6)Progressive motility：＞32％\n(7)Total motility：＞40％\n(8)WBC：＜1000/μL\n(9)Sperm concentration：＞15×10^6/mL\n(10)Sperm morphology（normal form）：＞4%","i":"可協助不孕症原因之調查及輸精管結紮手術後評估","cl":"不孕症檢查、前列腺功能及結紮後檢查。","tags":["荷爾蒙/內分泌"]},{"n":"Serum Protein electrophoresis","c":"FBIPRO","p":"09065B(300點)","r":"是","ct":"02號黃頭管(Serum separator tu","d":"全血2.0 mL","g":"生化免疫組","t":"其他","m":"毛細管電泳法(capillary electrophoresis)","rv":"Total protein：6.4~8.3 g/dL, Albumin fraction：55.8~66.1%, Alpha-1 globulins fraction：2.9~4.9%, Alpha-2 globulins fraction：7.1~11.8 %, Beta-1 globulins fraction：4.7~7.2%, Beta-2 globulins fraction：3.2~6.5 %, Gamma globulins fraction：11.1~18.8%; M-protein：0%\nInterpretation：No evidence of monoclonal protein","i":"懷疑有monoclonal gammopathy之相關疾病時","cl":"蛋白質電泳會分析albumin/alpha1/alpha2/beta1/beta2/gamma globulins等fraction 之相對含量(%)，依據各fraction含量變化，可反映出早期感染症、慢性感染症、腎臟病變、酒精性肝炎、自體免疫疾病及monoclonal gammopathy等疾病。目前主要臨床用途為檢測病人是否有monoclonal gammopathy之表現。","tags":["肝臟/膽道","腎臟","自體免疫"]},{"n":"Serum viscosity","c":"FHEVIS","p":"08017B(50點)","r":"是","ct":"02號-5mL黃頭管","d":"5 mL","g":"血液及組織相容組","t":"其他","m":"RBC pipette","rv":"1.4-1.8 relative to water","i":"懷疑患者為高血清黏稠症狀(hyperviscosity syndrome)或單株免疫球蛋白症狀態(monoclonal gammopathy states)可開立此檢驗","cl":"藉由偵測患者之血清黏稠度來評估高血清黏稠症狀(hyperviscosity syndrome)與單株免疫球蛋白症狀態(monoclonal gammopathy states)","tags":["其他"]},{"n":"Sex hormone-binding globulin (SHBG)","c":"FENSHB","p":"自費","r":"否","ct":"02號黃頭管(Serum separator tu","d":"血液2 mL","g":"生化免疫組","t":"其他","m":"電化學發光免疫分析法(Electrochemiluminescence  immunoassay, ECLIA)","rv":"男性(20~49歲)：18.3~54.1 nmol/L；\n男性(≧50歲)：20.6~76.7 nmol/L；\n女性(20~49歲)：32.4~128.0 nmol/L；\n女性(≧50歲)：27.1~128.0 nmol/L","i":"定量偵測人類血清中性荷爾蒙結合球蛋白(sex hormone-binding globulin, SHBG)的含量，可協助診斷雄性素升高。","cl":"性荷爾蒙結合球蛋白(SHBG，sex hormone-binding globulin)是睪固酮(testosterone)和雌二醇(estradiol)的血液運輸蛋白，SHBG的半衰期為7 天，主要製造於肝臟，由雌激素調控其合成和分泌，85%的睪固酮會和SHBG緊密結合，不具生物活性。10-15%的睪固酮則和白蛋白結合，僅1-2%不和任何蛋白質結合(free testosterone)，後兩者則具有生物活性。\n血清中的SHBG主要是接管類固醇的運送和減少、調節雄性素的影響。SHBG血清濃度減少會伴隨著雄性素升高或是雄性素對其目標器官影響過度的情形。這說明了我們所觀察到男女之間和性別相關的差異，特別是青春期的變化。當雄性素濃度正常但臨床症狀卻似乎指向雄性素過量時，SHBG的檢測就是雄性素作用過度或延久性作用的重要指標。\nSHBG濃度昇高的現象可發現於老年人、甲狀腺機能亢進和肝硬化的病人。當使用口服避孕藥或抗癲癇藥物時，SHBG的濃度也會增加。孕婦因為體內雌激素增加，所以SHBG血清濃度會明顯較高。SHBG濃度減少常見於甲狀腺機能不全、多囊性卵巢症候群(polycystic ovarian syndrome)、肥胖、婦女多毛症(hirsutism)、雄性素濃度昇高、禿髮和肢端肥大症中。","tags":["肝臟/膽道","甲狀腺","荷爾蒙/內分泌"]},{"n":"Shrimp (蝦)","c":"FALSHR","p":"F30022C(1620點)","r":"是","ct":"03號綠頭管(Lithium heparin)","d":"全血4.5 mL","g":"生化免疫組","t":"其他","m":"螢光酵素免疫分析法(Fluorescence enzyme immunoassay, FEIA)","rv":"＜0.35 kU/L；參考值備註：0.35~0.69 kU/L(Class I)、0.70~3.49 kU/L(Class II)、3.50~17.49 kU/L(Class III)、17.5~52.49 kU/L(Class IV)、52.5~99.99 kU/L(Class V)、≧100 kU/L(Class VI)。","i":"定量分析特異性過敏原IgE之濃度，協助診斷IgE媒介之過敏疾病。","cl":"過敏性疾病大約佔全世界人口30%。過敏反應主要分為四型，其中過敏原引起主要為第一型過敏反應，為外因性氣喘、花粉熱或異位性濕疹的病人，當第一次接觸過敏原，症狀會立即發作，免疫系統會產生對應過敏原之過敏原特異性IgE抗體，其會循環於血液中並接合於mast cell上，當第二次接觸相同過敏原時，會使mast cell產生去顆粒作用，使細胞內之發炎性物質，例如：histamine、serotonin等，釋放至細胞外，造成流鼻水、打噴嚏等臨床症狀產生，嚴重者甚至產生休克。可藉由檢測血液中之引起過敏相關之特異性抗體IgE(如花粉、動物毛屑、塵?及家塵等)，此可輔助了解引起過敏之過敏原種類，仍需配合其它臨床證據一起判斷。","tags":["過敏"]},{"n":"Sirolimus","c":"FDPSIR","p":"10537C(1600點)","r":"是","ct":"4號紫頭管(K2 EDTA tube)","d":"2.0 mL全血","g":"生化免疫組","t":"其他","m":"化學冷光微粒酵素免疫分析法(chemiluminescent Microparticle Immunoassay；CMIA), Abbott Alinity i","rv":"4.0~15.0 ng/mL；\n備註說明：\nOptimal ranges depend on patients' clinical  state.","i":"定量全血中Sirolimus濃度，協助腎臟及肝臟移植患者治療及追蹤。","cl":"Sirolimus是一種免疫抑制藥物，常與cyclosporine並用，適用於預防低至中度免疫危險的腎臟移植病患手術後之器官排斥。Sirolimus分2種劑型：溶液及錠劑。用藥後，約95%進入紅血球中，主要由肝臟及小腸微粒體代謝，特別是經由CYP3A4。膽汁和糞便途徑是代謝Sirolimus的主要途徑，半衰期範圍35 ~95小時(平均60小時)。","tags":["肝臟/膽道"]},{"n":"Sodium;Na","c":"FBINA、FRCNA、FBINAR、FBINAU","p":"09023C(40點)","r":"是","ct":"03號綠頭管(Lithium Heparin)；","d":"(A)血液檢體--全血3.5 mL；\r\n(B)尿液檢體—尿液","g":"生化免疫組","t":"急診可","m":"離子選擇電極法 (ISE method)","rv":"(1)Serum or Plasma：136-146 mmol/L； \n(2)Urine：40-220 mmol/ day；\n(3)Random urine：Not applicable。","i":"定量血清或血漿中鈉的濃度，協助診斷電解質平衡相關疾病。","cl":"電解質對代謝過程影響很大。電解質提供滲透壓和使人體中各種的液態物進行水合和人體的pH值和調節正常的心跳和維持肌肉的正常功能。電解質也參與了氧化還原反應或是其它重要的部份像是當酵素的反應中的輔助因素。\n鈉的測量是用來診斷和治療醛類酯醇過多症、尿崩症、腎上腺性高血壓、愛迪生氏症(Addison’s Disease)、脫水及不當的抗利尿荷爾蒙分泌或與電解質不平衡相關的疾病。","tags":["電解質/代謝","荷爾蒙/內分泌"]},{"n":"Soluble fms-like tyrosine kinase(sFlt-1)","c":"FSIFLT","p":"自費","r":"否","ct":"02號黃頭管(Serum separator tu","d":"2 mL全血","g":"生化免疫組","t":"1週以上","m":"均質式全自動螢光免疫分析法(Automated immunofluorescent assay), Kryptor PLUS，Brahms","rv":"14~19 week：764.0~2545.0 pg/mL;\n20~24 week：626.0~4443.0 pg/mL;\n25~28 week：612.0~3958.0 pg/mL;\n29~33 week：697.0~3722.0 pg/mL;\n34~36 week：1023.0~8492.0 pg/mL;\n≧37 week：961.0~7524.0 pg/mL.","i":"定量檢測血液中Soluble fms-like tyrosine kinase(sFlt-1)，協助懷孕週數20週以上孕婦預測近期內發生子癲前症的機率。","cl":"可溶性fms樣酪胺酸激?(Soluble fms-like tyrosine kinase, sFlt-1)又稱可溶性血管內皮生長因子受體，一種被認為可抑制血管形成的物質。sFlt-1在血液裡與VEGF(血管內皮生長因子)和PlGF(胎盤生長因子)結合，透過減少游離的VEGF和PlGF濃度減緩血管生長。\n在子癲前症病人，sFlt-1濃度升高，而PlGF濃度下降。臨床上，可藉由檢測sFlt-1和PlGF並計算其比值(sFlt-1/PlGF ratio)，可以有效區分妊娠毒血症與其他妊娠相關高血壓疾病。","tags":["
