康檢查健康管理分級建議指引：血中鉛濃度男性≥ 40 μg/dL、女性≥ 30 μg/dL列第三、四級管理。 單次尿液： 非鉛作業： Lead：≦ 1.26 μg/L。 Creatinine：20~250 mg/dL。 Lead/Creatinine：≦ 1.13 μg/g Creatinine。 四烷基鉛作業： 勞工特殊健康檢查健康管理分級建議指引：尿中鉛濃度≧ 150 μg/L列第三、四級管理。","cl":"急性中毒：急性鉛中毒不常見，一般由食入溶於酸中的鉛化合物或者吸入鉛蒸氣所造成，最常發生在有異食癖病史的小孩身上。急性的中樞神經系統症狀包括感覺異常、疼痛、及肌肉無力。有時會出現急性溶血而造成嚴重貧血及紅血球素尿。 慢性中毒：小孩體重減輕、虛弱、貧血，神經行為異常。成人表現在不明確的胃腸道及中樞神經的病痛，腹絞痛及腕垂症較罕見。慢性鉛中毒 (plumbism) 可分為6 類症狀：胃腸道、神經肌肉、中樞神經系統、血液、腎臟及其它方面，其可分別發生或數種同時發生；神經肌肉及中樞神經系統的症狀通常起因於嚴重暴露，而腹部症狀則是一種非常緩慢及不知不覺性中毒的常見症狀。 腎臟毒性：慢性腎鉛暴露的特色是會造成腎間質纖維化及腎小管萎縮。近側腎小管內襯細胞退化萎縮牽涉到粒腺體腫大和邊緣纖毛細胞有嗜酸性緻密染質的包含體 (inclusion body)。 生殖毒性：許多人類與動物研究指出鉛會造成生殖細胞毒性，胚胎毒性和致畸胎的影響。並會影響新生兒和胎兒的存活與生長。除了影響胎兒期的發育能力與發展，鉛也會藉由影響母親的健康來間接影響胎兒的活力和發育。以易感性的觀念而言，未出生的新生兒是鉛暴露的危險族群。 血壓與心臟血管毒性：鉛的吸收會引起收縮和舒張壓輕度增高。","ref":"","note":"飲食、藥物以及營養補充劑可能造成干擾。 高濃度的碘元素可能造成干擾。 使用含Gadolinium (Gd)顯影劑應避免在48小時內收集尿液。 以碘治療或使用造影劑建議1個月後再採集檢體送檢。 檢體無法立即送檢時，請冷藏保存。 專用採檢管請向保吉生公司中央庫房領取，連絡電話：(04)23767386。專用尿杯請向本實驗室領取。若大量檢體需用時，請提早1個月前告知。 勞工健康檢查採檢時，應避免於工作場所中進行。 血中鉛原則上為每週三操作，另視檢體量增加而調整操作頻率。 可接受之尿液creatinine通常介於20~250 mg/dL，比重介於1.0030~1.0200，pH值介於4.5~9.0。若不在此範圍時，建議重新採檢。(依據勞工特殊健康檢查健康管理分級建議指引，2017年11月修訂)","tags":["尿液","腎臟"]},{"n":"LIAT SARS CoV-2 PCR/ SARS-CoV-2 RNA qualitative amplification test","cn":"緊急新冠肺炎核酸快篩/新型冠狀病毒核糖核酸定性擴增試驗","c":"T12XCN01","ins":"12215C","sp":"鼻咽檢體","ct":"含保存液之病毒UTM swab","d":"依醫師臨床採集標準執行","g":"台中醫院醫事檢驗科特檢組","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00           院內檢體24小時收檢","rt":"40分鐘","rv":"Negative","cl":"(1)目前已知罹患COVID-19確診個案之臨床表現包含發燒、乾咳、倦怠，約三分 之一會有呼吸急促。其他症狀包括肌肉痛、頭痛、喉嚨痛、腹瀉等，另有部 分個案出現嗅覺或味覺喪失（或異常）等。 (2)依據目前流病資訊，患者多數能康復，少數患者嚴重時將進展至嚴重肺炎、 呼吸道窘迫症候群或多重器官衰竭、休克等，也會死亡。死亡個案多具有潛 在病史，如糖尿病、慢性肝病、腎功能不全、心血管疾病等。 (3)報告指出，約有14%出現嚴重症狀需住院與氧氣治療，5%需加護病房治療。 COVID-19患者以成人為主，少數兒童個案多為其他確診成人患者之接觸者或 家庭群聚相關，兒童個案大多症狀輕微，但也有零星死亡個案，唯死亡原因 與SARS-CoV-2相關性仍調查中。","ref":"","note":"檢體必需無Fibrin、血樣或微粒及氣泡。 (1)適應症：符合抗病毒藥物使用條件者或臨床醫師懷疑為COVID-19中重症者，且抗原 快篩陰性或無法取得抗原快篩適用的檢體化驗時。 (2)支付規範：本項須按「全民健康保險鼓勵醫事服務機構即時查詢病患就醫資訊方案」 格式，於檢驗（查）申報前上傳檢驗（查）結果報告，未上傳者本項不予支付。","tags":["特殊檢驗","肝臟","腎臟"," 成腦炎及腦膜炎。於青春期 後感染，可能造成睪丸炎及卵巢炎。好發於春、冬兩季，懷孕中感染有高危險機率造成 胎兒先天異常。診斷腮腺炎病毒感染，需要急性期及恢復期檢體，兩次測定IgG，IgG 抗體由陰性轉陽性、或是IgG抗體陽性數據上升一倍，或者IgM抗體陽性。IgM可以維持 2個月時間存在，IgG抗體終身存在。","ref":"Mumps CF virus Ab--IgM。","note":"在腮腺腫大後採檢(急性期檢體)，經過7-14天再採檢一次(恢復期檢體)。","tags":["感染"]},{"n":"Mumps virus IgM","cn":"腮腺炎病毒IgM抗體","c":"T05XN054","ins":"14054B","sp":"Serum（血清）","ct":"含Gel血清試管","d":"4ml以上","g":"聯合醫事檢驗所代檢","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00             院內檢體24小時收檢","rt":"5個工作天","rv":"","cl":"腮腺炎病毒是急性、接觸性、傳染性的發熱疾病，造成腮腺炎及其他唾液腺發炎的病 原體。症狀：發燒、寒颤、頭痛、耳下疼痛、腮腺腫大，也可能造成腦炎及腦膜炎。 於青春期後感染，可能造成睪丸炎及卵巢炎。好發於春、冬兩季，懷孕中感染有高危 險機率造成胎兒先天異常。診斷腮腺炎病毒感染，需要急性期及恢復期檢體，兩次測 定IgG，IgG抗體由陰性轉陽性、或是IgG抗體陽性數據上升一倍，或者IgM抗體陽性。 IgM可以維持2個月時間存在，IgG代表終身免疫。","ref":"Mumps CF virus Ab--IgG。","note":"（1）在腮腺腫大後採檢(急性期檢體)，經過7-14天候再採檢一次(恢復期檢體)。","tags":["感染"]},{"n":"Mycoplasma Pneumonia Ab","cn":"肺炎黴漿菌抗體試驗","c":"T09X908","ins":"12020C","sp":"Serum（血清）","ct":"含Gel血清試管","d":"4ml以上","g":"中央實驗室特檢組","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00             院內檢體24小時收檢","rt":"3個工作天","rv":"Negative：＜100 U/mL Positive：＞320 U/mL Equivocal：100-320 U/mL","cl":"提供黴漿菌感染時之快速檢查方法給予醫師同等之參考。","ref":"無。","note":"（1）抗體測定為陰性結果，並不能排除感染之可能性，陽性結果仍需配合病之臨床 症狀。 （2）使用溶血的檢體、未完全凝固之血清、含有纖維蛋白的血漿檢體，皆可能產生 錯誤結果。 無。","tags":["特殊檢驗","感染"]},{"n":"Mycoplasma Pneumonia IgM","cn":"肺炎黴漿菌免疫球蛋白M","c":"T12X0202","ins":"12020C02","sp":"Serum（血清）","ct":"含Gel血清試管","d":"血清0.5 ml以上","g":"台中醫院醫事檢驗科特檢組","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00             院內檢體24小時收檢","rt":"3個工作天","rv":"","cl":"","ref":"","note":"","tags":["特殊檢驗"]},{"n":"Myoglobin(serum)","cn":"肌球蛋白","c":"T05XL061","ins":"12061B","sp":"Serum（血清）","ct":"含Gel血清試管","d":"3 ml","g":"聯合醫事檢驗所代檢","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00             院內檢體24小時收檢","rt":"3個工作天","rv":"","cl":"","ref":"","note":"","tags":["生化"]},{"n":"Myoglobin(urine)","cn":"肌球蛋白","c":"T05XL6101","ins":"12061B","sp":"Urine（尿液）","ct":"尖底  MTBC AFB was isolated代表檢體中具有非MTBC的抗酸菌存在。","ref":"抗酸菌染色、抗酸菌培養、MTBC DNA(TB-PCR)。","note":"無 無","tags":["生化"]},{"n":"MIC for yeast","cn":"Yeast 抗黴菌藥物感受性試驗","c":"T13XCM005","ins":"","sp":"分離Blood及CSF culture\n之Candia spp","ct":"","d":"","g":"豐原醫院微生物中心","st":"於報告核發後2天內通知實驗室加驗","rt":"3-5個工作天","rv":"","cl":"酵母菌的感染是人類黴菌病中最常見的，而其致病的可能性正隨著廣效性抗生素、腎上腺皮質素、類固醇與抗癌藥劑等的大量使用，而與日俱增。常見的疾病有：心內膜炎、腎盂腎炎、鵝口瘡、女陰道炎、敗血症、腦膜炎等等。臨床上重要的真菌可依照感染部位分成四類：深部或全身性黴菌病、伺機性黴菌病、下表皮黴菌病及表皮黴菌病；以前一些被認為污染菌的環境中黴菌，現在發現可引起人類疾病。因近來酵母菌藥物抗性有改變及增加趨勢，即需進行藥物感受性性試驗以提供正確有效之治療。","ref":"","note":"於報告核發後2天內通知實驗室加驗。","tags":["微生物","腎臟","腫瘤標記","感染"]},{"n":"Meningococcal Ag test","cn":"腦膜炎細菌抗原檢查檢測","c":"T12X1661","ins":"12166B","sp":"CSF","ct":"無菌尖底管","d":">1 ml","g":"中央實驗室-微生物中心","st":"每日","rt":"1個工作天","rv":"Negative","cl":"為一種快速乳膠凝集試驗（rapid latex agglutination test），主要應用於定性偵測CSF或血液培養的上清液（supernatant）檢體是否有Streptococcus group B，Haemophilus influenzae type b，Streptococcus pneumoniae，N. meningitidis group A、B、C、Y和W135以及N. meningitidis group B/E. coli K1等引發腦膜炎之細菌。然而，培養基法只能應用於N. meningitidis group B或E. coli K1之抗原檢測。此試驗提供即時輔助診斷與治療，以提升病人預後之療效。為一種篩檢CSF或血液中的引起腦膜炎之細菌抗原的方法。假如檢查結果為不確定，而患者有顯示臨床症狀，醫師必須考慮以其它臨床診斷法加以佐證。","ref":"CSF culture。","note":"研究指出，少數檢體有著非相關的細菌含有共同抗原，這與其它免疫檢驗 套組一樣，在乳膠凝集法也無法排除交叉反應的可能。 室溫新鮮傳送。","tags":["微生物"]},{"n":"Mixing PT","cn":"","c":"T05XH088","ins":"08088B","sp":"血漿-冷凍送檢","ct":"sodium citrate 管-2管","d":"2 C.C","g":"彰基檢驗醫學科血液鏡檢組","st":"W1-W5(國定例假日除外)","rt":"3個工作天","rv":"Interpretation is based on Rosner index (1)Index：>15 suggests of factor inhibitor (2)Index：≦15 suggests of factor deficiency","cl":"此為PT延長時，用以區分是凝固因子缺乏或是抑制物造成之檢驗，如為凝固因子缺乏則立即混合或混合後兩小時檢測均可補正。如兩種混合任一或都不可補正時，表示檢體中有抑制物質存在。一般而言，使PT延長之抑制物較少。","ref":"Factor II、V、VII、X活性檢測。","note":"1.Clot：因為凝固反應已被活化可能影響檢測結果。 2.檢體量不正確（超過建議採檢量±10％）：導致檢體內鈣離子螯合不完全或抗凝 劑過剩影響檢測結果。 3.溶血：紅血球碎片上之phospholipids會導致凝固因子活化影響檢測結果。 (1) 需檢附採檢時間。 (2) 資料來源：彰基檢驗資訊查詢系統。","tags":["血液學"]},{"n":"Mixing APTT","cn":"","c":"T05XH092","ins":"08092B","sp":"血漿-冷凍送檢","ct":"sodium citrate 管-2管","d":"2 C.C","g" 之尿液creatinine通常介於20~250 mg/dL，比重介於1.0030~1.0200，pH值介於4.5~9.0。若不在此範圍時，建議重新採檢。(依據勞工特殊健康檢查健康管理分級建議指引，2017年11月修訂)","tags":["尿液","腫瘤標記"]},{"n":"Norovirus RNA","cn":"諾羅病毒RNA","c":"T05XL1831","ins":"12183C","sp":"Stool (新鮮糞便)","ct":"50 ml無菌盒","d":"約1公克(1粒花生米大)","g":"長庚紀念醫院林口檢驗醫學科","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00           院內檢體24小時收檢","rt":"10個工作天","rv":"Negative 。","cl":"1.據流行病學調查，諾羅病毒是成人非細菌性腸胃炎的主要致病源，也是食物中毒最主要的致病源，約佔群聚性感染的70~95%，好發於成人及較大之孩童，並且容易在安養院、醫院及學校造成群聚型感染，全年皆有病例報告，但以冬天稍多。諾羅病毒(Norovirus)，屬於杯狀病毒科(Caliciviridae)，為單股RNA，二十面體無外套膜病毒，基因全長約7.5~7.7 kb，分成三個可讀碼構(open reading frame:ORFs)。 2.此實驗選用病毒基因穩定度高的RNA dependent RNA polymerase區域，設計以SR33為forward引子，SR46、SR48、SR50為G1之Reverse引子，SR52為G2之Reverse引子，可分別與G1或G2反應，得到反應產物123 bp。 3.目前可將諾羅病毒分為五個次分型，而主要感染人類為GI、GII、GIV次分型，而目前台灣最主要流行為GII之第四型(GII/4)。本檢驗使用PCR分析方法，執行針測感染人類GI、GII型之諾羅病毒，可以快速偵測臨床檢體中諾羅病毒的核酸。本實驗之靈敏度為100 %，特異性為100%，GI的detection limit為1 copies/μl 的病毒量，GII的detection limit為1000 copies/μl。","ref":"","note":"資料來源：長庚紀念醫院林口檢驗醫學科檢驗手冊。","tags":["糞便","感染"]},{"n":"NPM1 mutation assay","cn":"急性骨髓性白血病之NPM1突變篩檢","c":"T05XL182A","ins":"12182C","sp":"全血/骨髓","ct":"EDTA抗凝管","d":"10 C.C","g":"台大檢驗醫學部","st":"","rt":"3-4週","rv":"Gene mutant is not detcted","cl":"成人急性骨髓性白血病約有20-30%的機會有 NPM1基因突變，若以染色體正常的病人而言，其比例可高達40-50%。NPM1突變具有預後上之意義，而且可以做為微量殘存疾病之追蹤。","ref":"","note":"參考資料來源：台大檢驗醫學部臨床檢驗手冊","tags":["生化"]},{"n":"Occult Blood","cn":"糞便潛血反應檢查","c":"T07X001","ins":"07001C","sp":"Stool（糞便）","ct":"一般糞盒(藍蓋)","d":"花生米粒大","g":"急診檢驗室","st":"週一~週五 08:00~20:00            週六08:00~16:00            週日13:00~17:00            院內急件:24小時收檢","rt":"一般件當日/急件:30分鐘","rv":"Negative（－）","cl":"糞便中血液小量增加不會改變其外觀，肉眼看不出血液，此稱為潛血。任何出血造成 每150gm糞便中超過2 ml血液,則具臨床意義。其可能原因為： （1）消化性潰瘍。 （2）消化管腫瘤。 （3）上消化道(胃、十二指腸)出血－焦油便、下消化道 (直腸、肛門)出血－亮紅色。 （4）急性血液流失。 （5）痔血混入。","ref":"（1）stool routine。（含有鉤蟲卵通常OB陽性） （2）Immunologic fecal Hb。 （3）血液檢查：CBC routine、PT、APTT test。 （4）血清檢查：CEA。 （5）stool culture。","note":"false(+)：（1）肉類及魚類中的血紅素及肌紅蛋白含過氧化酶。 （2）Aspirin及鐵製劑會增加胃腸道出血。 （ 考。","cl":"鉑化合物用於電極、珠寶、牙科合金、印刷在陶瓷襯底上的厚膜電路，是作為化學製造中的氧化催化劑，以及用作治療癌症的藥物，例如順鉑Cisplatin、Carboplatin、Oxaliplatin。 鉑-銠(Platinum-rhodium)和鉑-鈀(platinum-palladium)晶體在石油煉製和車輛觸媒轉化器中用作催化劑來控制廢氣排放。 鉑-銠化合物也用於玻璃和玻璃纖維製造以及高溫熱電偶(Thermocouples)。 鉑造成的毒性取決於鉑化合物的類型，如金屬、無機鹽或有機金屬。暴露方式可藉由靜脈藥物使用、吸入、皮膚接觸及口服等。 在職業環境中遇到的可溶性鉑化合物可引起鉑鹽過敏反應，其症狀包括吸入暴露後的支氣管炎和哮喘以及皮膚暴露後的接觸性皮炎。 鉑金屬和不溶性鹽可能會引起眼睛刺激。當攝入或吸入時，鉑金屬和不溶性鹽吸收很差（劑量的1％以下），並在一次使用劑量後一週內從體內清除。 大多數吸收的鉑累積在腎臟，並由尿液排泄。 Cisplatin 在國際癌症調查組織(International Agency for Research on Cancer, IARC) 被分類為Group 2A，可能對人類致癌。","ref":"無。","note":"高濃度的鉬、釓、鉿元素可能造成干擾。 操作及報告時間原則上為收件後兩週內；視檢體量而增加操作頻次。 採檢容器請向微量元素分析室領取。 檢體無法立即送檢時，請冷藏保存。 可接受之尿液creatinine通常介於20~250 mg/dL，比重介於1.0030~1.0200，pH值介於4.5~9.0。若超過範圍時，建議重新採檢。(勞工特殊健康檢查健康管理分級建議指引)","tags":["尿液","腎臟","腫瘤標記"]},{"n":"PJP-Giemsa Stain","cn":"卡氏肺囊蟲Giemsa Stain","c":"T07X019","ins":"13006C32","sp":"Sputum","ct":"無菌痰盒","d":"一口痰","g":"特殊檢查組","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00           院內檢體24小時收檢","rt":"3個工作天","rv":"Not Found","cl":"肺囊蟲肺炎是一種肺囊蟲（Pneumocystis species）所引起的肺部感染症，常見於早產兒、患有慢性疾病及營養不良的嬰兒，成人則常見於使用免疫抑制劑或HIV感染者而導致後天免疫不全的病人身上，感染後主要以發燒、慢性乾咳、漸進性呼吸困難、胸悶 等症狀來現，極少數的病患（＜3﹪）可能產生淋巴結、脾臟、肝臟、腎臟、骨髓、腸胃道、眼睛、甲狀腺和腎上腺的病灶。","ref":"","note":"","tags":["肝臟","腎臟","甲狀腺","感染"]},{"n":"Parasite(malaria or filaria)","cn":"血中寄生蟲檢查","c":"T08X007","ins":"08007C","sp":"Blood-室溫保存","ct":"EDTA紫頭管","d":"4~5片","g":"台中醫院醫事檢驗科軌道組","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00           院內檢體24小時收檢","rt":"當日","rv":"未檢出(Not-Found)。","cl":"患病的初期若缺乏血片的採驗，較不易區分是何種瘧原蟲的感染，臨床症狀發作時，依序出現惡寒、高燒、出汗三個典型階段。疾病發作間隔時間，以各種瘧原蟲在人體血液內進行之無性分裂之生殖週期而定，間日瘧及卵形瘧均為48小時，三日瘧為72小時，惡性瘧則不規則。而其症狀又以惡性瘧最嚴重，甚至發生脾腫、黃疸、休克、肝、腎衰竭、急性腦病、昏迷、死亡，其死亡率超過10％以上，至於間日瘧、三日瘧、卵形瘧，則較不具致命性。血片的檢驗確認是必要的，如在採驗前曾接受藥物治療，則會影響到檢驗結果的正確性，故應以多次採驗結果加以判斷，方為可靠。","ref":"無。","note":"採檢血液不可混到Heparin抗凝劑，以致閱片干擾。 檢體應於採集後2小時內送達實驗室檢驗，4小時之內完成檢驗，為求報告準確，檢體務必 新鮮。","tags":["肝臟","腎臟","感染"]},{"n":"Parasite Ova-Conc Smear","cn":"寄生蟲卵濃縮法","c":"T07X012","ins":"07012C","sp":"Stool（糞便）","ct":"張氏濃    週日 13:00~17:00           院內檢體24小時收檢","rt":"5個工作天","rv":"","cl":"正常人的血清蛋白經電泳後,可分成5部份： Albumin、α1-globulin、α2-globulin、β-globulin、γ-globulin，各有其一定的比例。 Albumin的代謝過程可反應營養狀況，很多疾病會造成白蛋白含量的減少。 α1-globulin在Albumin降低、急性或慢性炎症及惡性腫瘤時上升。 α2-globulin的上升通常可反應急性發炎，腎病症候群，腸胃炎或燒傷的情況。 β-globulin本身並不易引起電泳圖形的改變，當高脂血症及運鐵素增加時會上升。 γ-globulin幾乎全是免疫球蛋白,常見的是高γ球蛋白病又分為多株性及單株性增多； 多株性γ球蛋白病常見於一般慢性肝炎或炎症或自體免疫疾病， 單株性γ球蛋白病則見於多發性骨髓瘤或其他淋巴細胞系的腫瘤。","ref":"","note":"溶血。","tags":["特殊檢驗","肝臟","腎臟","腫瘤標記","自體免疫"]},{"n":"Progesterone","cn":"黃體脂酮免疫分析","c":"T09X105","ins":"09105C","sp":"Serum（血清）","ct":"含Gel血清試管","d":"4ml以上","g":"台中醫院醫事檢驗科軌道組","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00           院內檢體24小時收檢","rt":"8小時","rv":"Males：0.14 - 2.06 ng/mL Females：Postmenopausal：≦0.78 ng/mL Females：Mid-Follicular Phase：0.31-1.52 ng/mL Females：Mid-Luteal Phase：5.16-18.56 ng/mL Pregnacy：First trimester：4.73-50.74 ng/mL Pregnacy： Second trimester：19.41-45.30 ng/mL","cl":"（1）持續升高的黃體脂酮濃度表示胎兒存活。在出現低黃體脂酮濃度時，需要用超音波做進一步確認。 （2）懷孕8-10周，血清黃體脂酮濃度維持穩定濃度，但如果黃體脂酮濃度持續下降，則是妊娠終止的信號。 （3）持續監測血清中黃體脂酮的濃度，可用來反應排卵和黃體的功能。當已發生排卵，但黃體生成和黃體脂酮分泌減少時，可以診斷黃體期功能不全。","ref":"超音波。","note":"僅能使用血清試管。","tags":["生化"]},{"n":"Prolactin (PRL)","cn":"催乳激素免疫分析","c":"T09X120","ins":"09120B","sp":"Serum（血清）","ct":"含Gel血清試管","d":"4ml以上","g":"台中醫院醫事檢驗科軌道組","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00           院內檢體24小時收檢","rt":"8小時","rv":"","cl":"","ref":"","note":"","tags":["生化"]},{"n":"Protein（qualitative）","cn":"蛋白質定性檢查","c":"T06X003","ins":"06003C","sp":"Urine（尿液）","ct":"尿液離心管","d":"7-10 ml以上","g":"急診檢驗室/特檢組","st":"週一~週五 08:00~20:00            週六08:00~16:00            週日13:00~17:00            院內急件:24小時收檢","rt":"一般件當日/急件:30分鐘","rv":"陰性（-）","cl":"蛋白尿： （1）生理性蛋白尿：站立姿勢、懷孕、劇烈運動…等 (為暫時性，多見於年輕成人)。 （2）腎臟以外的疾病：發燒、腹部急症、心臟病、血液病(貧血)、甲狀腺疾病等。 （3）全身性或代謝性疾病波及腎臟：糖尿病、高血壓、敗血症、多發性骨髓瘤、重金屬 中毒等。 （4）妊娠毒血症：子癲及前子癲。 （5）原發性腎臟病：腎盂腎炎、腎絲球腎炎等。","ref":"（1）尿液檢查：Urine Routine（含 Sediment）、Bence-Jones Protein 。 （2）血液檢查：CBC-I、Blood routine。 （3 的治療診斷，包括：\n(1)細菌(半定量)：\nA. calcoaceticus-baumannii complex (A. baumannii、 A. calcoaceticus、 A. pittii、 A. seifertii, A. nosocomialis)、E. cloacae complex (E. cloacae、 E. asburiae、 E. hormaechei、 E. kobei、 E. ludwigii) 、Escherichia coli、 Heamophilus. influenzae、Klebsiella aerogenes、 Klebsiella oxytoca、 Klebsiella pneumoniae group (K.pneumoniae、 K. quasipneumoniae、 K. variicola) 、Moraxella. catarrhalis、 Proteus spp. 、 Pseudomnas aeruginosa、 Serratia  marcescens、 Staphylococcus aureus, Staphylococcus agalactiae、 Staphylococcus pneumonia、 Staphylococcus pyogenes\n(2)非典型細菌(定性)：\nChlamydia pneumoniae、 Mycoplasma  pneumoniae、 Legionella  pneumophila \n(3)病毒(定性)：\nAdenovirus、 Coronavirus (Coronavirus 229E, OC43, HKU1, NL63) 、 Human Metapneumovirus、 Human Rhinovirus/Enterovirus、 Influenza A、 Influenza B、 Parainfluenza Virus、 Respiratory Syncytial Virus\n(4)抗生素抗藥性基因(定性)：\nESBL (CTX-M) 、 Carbapenemase (IMP、 KPC、 NDM、 OXA-48-like、 VIM) 、Beta-lactam (mecA/C and MREJ)","ref":"無。","note":"退件條件：\n(1) 檢體不良(如口水、含雜質(食物/藥物))或檢體不足。\n(2) 自咳痰液麟狀上皮細胞≧25/LPF時，不進行檢驗。 流感病毒疫苗可能會對Influenza A、B造成偽陽性。 採檢前請先聯絡檢驗科拿容器。採檢後盡速送檢驗科。 本項目僅限臺中本院開單，不收代檢。 室溫運送至豐原微生物中心。","tags":["微生物","感染"]},{"n":"Phadiatop","cn":"吸入性過敏原群","c":"T30X02103","ins":"30021C","sp":"血清、血漿","ct":"含gel血清試管、\n          含Heparin或EDTA抗凝管","d":"3 ml以上","g":"醫事檢驗科 特檢組","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00           院內檢體24小時收檢","rt":"3個工作天","rv":"<0.35 PAU/l (-)。 Phadiatop吸入性過敏原群所含細項如下：","cl":"病人本身患有急性氣喘、乾草熱、異位性皮膚炎以及過敏性鼻炎時，在接觸特殊過敏原後這些病症會馬上發作，這立即的反應是由於血清中的抗體免疫球蛋白E產生所造成的特殊反應。Phadiatop為一檢測體內循環IgE抗體的定性檢驗，若此檢驗呈陽性結果，表示該病患對常見的空氣過敏原群中有特異性IgE產生。","ref":"Specific IgE、Total IgE、MAST。","note":"有脂血、溶血或微生物污染情形的檢體測定結果不佳，避免使用。","tags":["特殊檢驗"]},{"n":"QuantiFERON TB-Gold Plus","cn":"丙型干擾素釋放試驗IGRA檢驗","c":"","ins":"E4004C","sp":"Blood","ct":"QuantiFERON-TB Plus專用管","d":"共4 ml","g":"大安聯合醫事檢驗所","st":"不限定","rt":"操作日三天內","rv":"Negative","cl":"利用模擬分枝桿菌蛋白質的胜肽抗原，並檢測其所引發細胞媒介免疫(Cell Mediated Immune，CMI)反應的測試。 QFT-Plus具有兩個不同的TB抗原採血管：TB抗原採血管1(TB1)和TB抗原採血管2 (TB2)。兩個採血管均含有來自MTB抗原中ESAT-6和CFP-10這兩種蛋白的胜肽抗原。TB1採血管和TB2採血管均含有來自ESAT-6和CFP-10的胜肽，皆用於刺激CD4+輔助T淋巴球之CMI反應；TB2採血管含有額外一組胜肽，目的是誘發CD8+細胞毒性T淋巴球之CMI反應。 所有的BCG菌株及大部份的非結核分枝 桿菌並不存在ESAT-6、CFP-10及TB7.7這三種蛋白質，但M. kansasii、M. szulgai及M. marinum除外。受感染的患者，其血液中通常有淋巴球能辨認抗原是來自結核菌複合有機體或是其他分枝桿菌，辨識過程會產生並分泌細胞激素，亦即INF-γ。 人體針對結核菌抗原所產生獲得性免疫(adaptive immunity)的原理，可用來診斷潛伏感染及活動性疾病，不受卡介苗及非結核分枝桿菌的影響，因使用的是結核分枝桿菌特異的抗原ESAT-6及CFP-10來刺激病患全血的T細胞，看其是否產生INF-γ，若產生INF-γ 則代表已產生結核菌感染原，也可用來輔助活動性肺結核病患的診斷。","ref":"","note":"(1) 請注意採檢順序、培養時間及保存溫度，不符合規定者將以退件方式處理： (2)報告判讀： (3)參考資料來源：大安聯合醫事檢驗所檢驗目錄。","tags":["感染"]},{"n":"RF (RA) test","cn":"類風濕性關節炎因子試驗","c":"T09X904","ins":"12011C","sp":"Serum（血清）、血漿","ct":"含Gel血清試管、含有\nLithium heparin或EDTA試管抗凝血劑試管。","d":"3 ml以上","g":"台中醫院醫事檢驗科軌道組","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00           院內檢體24小時收檢","rt":"3個工作天","rv":"≦14.0 IU/ml","cl":"1 、RF(rheumatoid Factor)為人體產生對抗自己免疫球蛋白之自體抗體；通常是直接對抗IgG的Fc部位。在類風溼性關節炎(Rheumatoid Arthritis)患者，血清中的RF濃度會上升；在其它自體免疫疾病（如：SLE、硬皮病）、傳染性單核細胞增多症、慢性發炎、及少部分正常人，RF也可能有上升的現象。 2、類風濕因子的定量除了可用於診斷類風濕性關節炎之外，對於疾病的預後，及監測治療反應也有幫助。關於RF的產生，是顯示了類風濕性關節炎的免疫致病機轉，還是RF的形成只不過單純地是慢性發炎過程的結果，現在仍然不能確定。但是，在高濃度的RF時，疾病的症狀會更嚴重，而且關節以外的併發症也較明顯。RF除了存在於類風濕性關節炎外，也存在於許多其他的風濕性疾病、腫瘤性疾病、感染性疾病、及老年人的血清中。所有這些疾病共同地都有一個慢性的抗原性刺激。由於類風濕性關節炎本身的發炎性質，也常以C-反應性蛋白(CRP)的檢測去監控疾病的病程。","ref":"四、參考檢驗：","note":"三、干擾因素： 檢體為血清、血漿種類時溶血(濃度達500mg/dL)、黃疸（Icterus）(濃度達40 mg/dL)、 高血脂(濃度達750 mg/dL) 都不具有顯著的干擾現象(CV<10%)。 血清、血漿應立刻與血球凝塊分離並進行分析。","tags":["腫瘤標記","感染","自體免疫"]},{"n":"R.B.C count","cn":"紅血球計數","c":"T08X001","ins":"08001C","sp":"Blood-室溫保存","ct":"EDTA紫頭管","d":"1-3ml(嬰兒至少0.5ml以上)","g":"台中醫院醫事檢驗科\n          軌道組/急診檢驗組","st":"週一~週五 08:00~20:00            週六08:00~16:00            週日13:00~17:00            院內檢體:24小時收檢","rt":"一般件當日/急件:30分鐘","rv":"Male：4.2-6.23 × 106/μl Female：3.68-5.46 × 106/μl","cl":"紅血球主要功能為氧氣與二氧化碳的輸送並與體液酸鹼的平衡有關。 增加： （1）續發性紅血球增多症（血液濃縮）。 （2）真性紅血球增多症（如骨髓細胞增生、組織缺氧及某些腫瘤引起）。 （3）因白血球增加而導致的假性增多。 降低： （1）貧血。 （2）因自體凝集作用而導致的假性減少。","ref":"（1）血液檢查：全套血液檢查、網狀紅血球計數（Reticulocyte count）、白血球分類檢 查、ESR。 （2）生化檢查：Iron、TIBC、GOT、GPT、BUN、CRE。 （3）血清檢查：Ferritine、維他命B12、甲狀腺檢查。 （4）尿液檢查。","note":"極高白血球、巨型血小板，自體凝集現象。 檢體和抗凝劑混合均勻。","tags":["腫瘤標記"]},{"n":"RBC morphology","cn":"紅血球形態","c":"T08X009","ins":"08009C","sp":"Blood-室溫保存","ct":"EDTA紫頭管","d":"至少0.5ml以上","g":"台中醫院醫事檢驗科軌道組","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00 院內急件:24小時收檢","rt":"當日","rv":"Normal","cl":"不同原因的貧血或血液性疾病，會造成紅血球的大小、形狀、顏色或其他特徵上的改變。利用顯微鏡來觀察紅血球的外觀，來輔助判斷貧血或血液性疾病發生的原因。","ref":"（1）血液檢查：全套血液檢查、白血球分類檢查、ESR。 （2）生化檢查：Iron、TIBC、GOT、GPT、BUN、CRE、CRP。 （3）血清檢查：Ferritine、維他命B12、甲狀腺檢查。 （4）尿液檢查。","note":"過久的檢體易造成血球變形而不易判別。 以新鮮血液觀察為佳，過久的檢體易造成血球變形而不易判別。","tags":["生化"]},{"n":"Reticulocyte count","cn":"網狀紅血球計數","c":"T08X008","ins":"08008C","sp":"Blood-室溫保存8小時\n          或冷藏保存24小時","ct":"EDTA紫頭管","d":"至少0.5ml以上","g":"台中醫院醫事檢驗科軌道組","st":"週一~週五 08:00~20:00            週六08:00~16:00            週日13:00~17:00            院內檢體:24小時收檢","rt":"當日","rv":"新生兒(出生一週內)：2-6 % 小孩\t(<18歲)：2-3 % 成人(>=18歲)   ：0.5-1.5 %","cl":"用來評估骨髓對紅血球的製造功能及貧血治療時的療效評估。增加於原發或繼發溶血 症、血紅素尿症、血紅素病變、急性出血症等。降低於惡性貧血、再生不良性貧血、 骨髓衰竭症、腎臟病等及受感染病原、藥物或毒素（如chloramphenicol等）暫時的抑 制。","ref":"（1）血液檢查：全套血液檢查、白血球分類檢查、ESR。 （2）生化檢查：Iron、TIBC、GOT、GPT、BUN、CRE。 （3）血清檢查：Ferritine、維他命B12、甲狀腺檢查。 （4）尿液檢查。","note":"檢體不新鮮或試劑污染。 檢體和抗凝劑混合均勻。","tags":["腎臟","感染"]},{"n":"RH(D)","cn":"RH(D)型檢查","c":"T11X003","ins":"11003C","sp":"Blood-室溫保存","ct":"EDTA紫頭管","d":"1ml以上","g":"急診檢驗室血庫組","st":"週一~週五 08:00~20:00            週六08:00~16:00            週日13:00~17:00            院內急件:24小時收檢","rt":"一般件當日/急件:30分鐘","rv":"Negative / Positive","cl":"紅血球上RH(D)血型的檢測，根據病人紅血球是否須有D抗原分為RH(+)及RH(-)為國內輸血前之常規檢驗。","ref":"（1）Du抗原（捐血者）。","note":"確認檢體姓名。","tags":["輸血/血型"]},{"n":"Rota virus Ag","cn":"輪狀病毒抗原","c":"T14X026","ins":"14026B","sp":"Stool（糞便）","ct":"一般糞盒(藍蓋)","d":"5 g","g":"豐原醫院細菌室","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00           院內檢體24小時收檢","rt":"當天","rv":"Neagtive","cl":"輪狀病毒僅能在小腸的表皮細胞內繁殖，都是在冬季或氣候較涼的時期感染嬰幼兒或兒童，造成水狀腹瀉，應是由糞口途徑傳染，病毒對嬰幼兒的感染是偶發的，但對孩童的感染是流行的。","ref":"","note":"建議採檢應在症狀出現後3-5天為佳。","tags":["糞便","感染"]},{"n":"RPR","cn":"梅毒血清抗體之篩檢","c":"T09X901","ins":"12001C","sp":"Serum（血清）","ct":"含Gel血清試管","d":"4ml以上","g":"台中醫院醫事檢驗科特檢組(一)","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00             院內檢體24小時收檢","rt":"3個工作天","rv":"Non-Reactive","cl":"（1）主要為梅毒之血清抗體之篩檢 （2）先天性梅毒：Treponema pallidum 可通過胎盤；患有梅毒之孕婦(尤其第二期)，易傳染給胎兒，造成死胎、流產或畸形(角膜炎或哈氏齒、牙齒成鋸齒狀)及中樞神經 異常等症狀。 （3）後天性梅毒 初  期：宿主感染2 ~ 10 週於感染部位出現，稱為丘疹，而後變大變硬，稱為硬性下疳。此下疳之滲出物含大量此菌，傳染力極強。 第二期：2 ~ 10 週後嚴重性依個人不同。病症除生殖器外，皮膚、黏膜、網狀內皮 系統、關節或其他器官亦可形成潰瘍。此期症狀溫和，易被病人忽略。 第三期：此期多為破壞性之肉芽腫，可在肝、皮膚、骨骼、口、鼻等器官形成中心潰 瘍結節或象皮腫。若發生在中樞神經則會引起全身性麻痺或脊髓痨。若發 生在主動脈則可發生主動脈瘤。此期之菌體少，不易發現，但組織已受到嚴重破壞。","ref":"TPPA","note":"（1）偽陽性：SLE，或肝炎、瘧疾、傳染性單核球增多症及懷孕婦女或臍帶血，會引起 偽陽性反應 （2）prozone現象之高濃度抗體的檢體,常出現弱陽性反應需作半定量稀釋，以免偽陰性 之產生。 無。","tags":["特殊檢驗","肝臟","感染"]},{"n":"RSV screening test","cn":"呼吸融合細胞病毒試驗","c":"T05XN058","ins":"14058B","sp":"鼻腔沖洗液","ct":"尖底白蓋管","d":"1 mL","g":"聯合醫事檢驗所代檢","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00             院內檢體24小時收檢","rt":"3個工作天","rv":"Negative","cl":"RSV流行於濕冷的季節，冬天與早春，引起兒童與老人呼吸道的疾病。RSV典型的反 應是在幼兒1-3歲的年紀，侵犯下呼吸道，細支氣管炎症狀可能很嚴重，甚至致死(Immunocompromised)，當年紀越小的嬰孩，例如6個月，會更深入侵犯到肺部。在成 人，RSV主要侵犯上呼吸道，尤其是肺部有問題或年老長者，很容易受到感染。即使 小時候感染到，長大了還是會再感染，產生比較輕微的上呼吸道症狀。","ref":"","note":"（1）檢體冰箱可保存二天，室溫4小時。 （2）收集約1 mL鼻腔沖洗液、或鼻咽拭棒於運送保存液（生理食鹽水2 mL）中。建議 使用新鮮鼻腔沖洗液以獲得最佳測試結果。鼻腔沖洗液在測試前，2-8oC下可保存 24小時，室溫只可保存4小時。鼻咽拭棒在測試前， 2-8oC下可保存48小時，室溫 只可保存4小時。檢體分析是一次性，不進行原管複驗，不接受痰液的檢體。 （3）資料來源：聯合檢驗目錄2011第247-248頁。","tags":["感染"]},{"n":"Specific IgE","cn":"特異性過敏原IgE","c":"T30X02103、T30X02214 、  \n          T30X02215、T30X02216","ins":"30022C","sp":"Serum（血清）、Plasma（血漿）","ct":"含Gel血清試管、\n          含EDTA或Heparin抗凝管","d":"3ml以上(Serum)","g":"台中醫院醫事檢驗科 特檢組","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00             院內檢體24小時收檢","rt":"三個工作天","rv":"","cl":"偵測血管中的特殊過敏原IgE 濃度，可以在臨床診斷上協助醫生診斷是否為過敏性疾 病，並對病患提出過敏原防治建議。確定造成過敏病症之過敏原，能夠清楚了解患者 因何種過敏原導致發炎反應和症狀。IgE 的濃度測定及了解患者的年齡、症狀、臨床 條件及出現症狀的時間，能有益於診治特異性過敏所引起的濕疹、喘息型支氣管炎、 過敏性鼻炎、結膜炎和哮喘。","ref":"","note":"有脂血、溶血或微生物污染情形的檢體測定結果不佳，避免使用。 現行臨床開立套組如下表","tags":["特殊檢驗"]},{"n":"Sputum，Rourine","cn":"痰液常規檢查","c":"T05XM001","ins":"13001C","sp":"痰液","ct":"無菌廣口瓶","d":"一口痰","g":"聯合醫事檢驗所代檢","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00             院內檢體24小時收檢","rt":"3個工作天","rv":"","cl":"常規檢查。","ref":"四、參考檢驗：","note":"三、注意事項： （1）新鮮檢體。 （2）資料來源：聯合檢驗目錄2011第257-258頁。","tags":["生化"]},{"n":"Stone analysis","cn":"結石分析","c":"T05XI078","ins":"09078B","sp":"泌尿道結石，肝膽結石","ct":"無菌盒","d":"至少米粒大小","g":"聯合醫事檢驗所代檢","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00           院內檢體24小時收檢","rt":"14個工作天","rv":"一、參考值： 無，報告以成份百分比表示，因為碎石機的廣泛使用，結石成份百分比與可得到的檢體有關。","cl":"肝膽、腎結石成份分析，以控制飲食避免復發。肝膽主要分析膽固醇、Calcium Bilirubinate、Calciium stearate、Calcium carbonate、磷酸鈣、蛋白質，膽固醇、碳酸鈣 、磷酸鈣結石主要原發於膽囊，膽紅素鈣主要發生於總膽管，硬脂酸鈣常發生在肝內膽 管，在不同的部位症狀不同，結石分析有助於瞭解病人整體結石病史，瞭解成分可以預測復發率以進一步避免再發，通常愈都市化的地區，膽固醇結石的比率比較高，膽紅素鈣與硬脂酸鈣結石經常復發，來自於肝內膽管手術清除不到的殘留。有一部份的結石成因來自於寄生蟲蟲卵等異物。","ref":"","note":"資料來源：聯合檢驗目錄2011第63-64頁。","tags":["尿液","肝臟","腎臟"]},{"n":"Stool occult blood (EIA/LIA)","cn":"糞便潛血免疫分析","c":"T09X134","ins":"09134C","sp":"Stool（糞便）","ct":"OC sensor專用的採集管","d":"10 mg","g":"台中醫院醫事檢驗科特檢組(二)","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00           院內檢體24小時收檢","rt":"3個工作天","rv":"Negative：<50~99 ng/mL","cl":"糞便潛血反應目的在於檢查肉眼無法檢視的腸胃道出血，許多消化道潰瘍或癌症可以 在未有明顯症狀時就由糞便潛血檢查先偵測出來，所以常用來作為篩檢之用。","ref":"（1）CEA （2）內視鏡 （3）X-ray","note":"（1）有痔瘡出血及女性月經期間，請暫停採便。 （2）酒精及某些藥物可能會造成某些病人腸胃出血，建議於受檢日前48小時起停用。","tags":["特殊檢驗","糞便","腫瘤標記"]},{"n":"Stool Routine","cn":"糞便一般檢查","c":"T07X009","ins":"07009C","sp":"Stool（糞便）","ct":"一般糞盒(藍蓋)/SY攪拌糞便採便器","d":"花生米粒大","g":"急診檢驗室/特檢組","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00           院內檢體24小時收檢","rt":"3個工作天","rv":"","cl":"糞便正常組成為食物殘渣、腸壁及膽汁的分泌物質、白血球、脫落之上皮細胞及細菌， 因此糞便的組成幾乎全是腸內的分泌物質及細菌。糞便檢查可以幫助診斷出腸胃道的 細菌、寄生蟲的感染，亦可提供除腸胃道外如肝臟、胰臟、血液等疾病之資料。","ref":"(1)生化檢驗： T-Bilirubin、D-Bilirubin、r-GT、CHE、Amylase、Llipase、 Alkaline-phosphatase、LDH、AST、ALT、TP、ALB。 （2）Immunologic fecal Hb。 （3）血液檢查：CBC routine、PT、APTT test。 （4）血清檢查：CEA。 （5）細菌檢查。","note":"（1）檢體不能污染到水、尿液或其他分泌物，尿液會破壞原蟲的滋養。 （2）採集後應盡快送檢。","tags":["特殊檢驗","糞便","肝臟","感染"]},{"n":"Sugar（qualitative）、葡萄糖Glucose","cn":"糖定性檢查","c":"T06X004","ins":"06004C","sp":"Urine（尿液）","ct":"尿液離心管","d":"7-10 ml以上","g":"急診檢驗室/特檢組","st":"週一~週五 08:00~20:00            週六08:00~16:00            週日13:00~17:00            院內急件:24小時收檢","rt":"一般件當日/急件:30分鐘","rv":"陰性（-）","cl":"正常狀況下尿液中只含微量葡萄糖(＜20mg/dl)，當血中葡萄糖濃度超過 renal threshold(約180mg/dl)，腎小管無法完全吸收而在尿液中出現葡萄糖，可見於 （1）糖尿病 （2）內分泌失調(胰臟腫瘤、甲狀腺功能亢進等) （3）中樞神經系統失調(腦腫瘤或出血、窒息等) （4）腎小管功能障礙 （5）懷孕、壓力或飽餐之後","ref":"（1）尿液檢查：Urine Routine（含 Sediment）。 （2）生化檢驗： GLU、BUN、CRE、HbA1c、胰島素免疫分析、葡萄糖耐性試驗、CHO、TG、 HDL-C、ISE、CRP。 （3）血清檢查：甲狀腺機能檢查。 （4）17-OHCS。 （5）心電圖。","note":"葡萄糖Glucose：濃度最高200 mg/dL 的抗壞血酸不會干擾葡萄糖化驗測試結果（沒有偽陰性結果）。高比重、酸性pH值和龍膽酸可能抑制顏色的形成。 清潔劑如次氯酸鹽和過氧化物可能導致偽陽性結果。抗壞血酸濃度≥300mg/dL可能會干擾本試驗。MESNA可能導致偽陽性結果。 1.檢體收集的容器若殘留強氧化性的消毒劑，會造成葡萄糖和潛血呈現偽陽性。 2.當維他命C的濃度20 mg/dl可能導致潛血呈偽陰性結果；維他命C的濃度40 mg/dl可能導致對葡萄糖、膽紅素、亞硝酸鹽和潛血的檢測呈偽陰性結果。 3.當出現血尿或膿尿的情況下，可能會影響尿液化學試驗呈色結果。","tags":["特殊檢驗","尿液","腎臟","腫瘤標記","甲狀腺","糖尿病"]},{"n":"Synovial fluid analysis-Routine","cn":"關節囊液分析-常規檢查","c":"T16X008","ins":"16008C","sp":"Synovial Fluid（關節液）","ct":"EDTA試管(紫頭)","d":"3ml","g":"急診檢驗室","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00           院內急件:24小時收檢","rt":"一般件當日/急件:60分鐘","rv":"（1）外觀：正常的滑液應呈現淡黃色、透明狀且具有高度黏性。 （2）粘稠度：Viscosity＞3 cm","cl":". （1）關節液之外觀： 正常的滑液應呈現淡黃色、透明狀且具有高度黏性。白血球增多是呈現混濁最常見的原因，通常與敗血性關節炎或無菌性發炎有關。若呈現乳糜狀或乳狀可能發生於結核性關節炎、慢性類風濕性關節炎、急性痛風關節炎等疾病。 （2）粘稠度： 滑液的粘稠度是由玻尿酸濃度來決定，若黏度下降表示關節可能有某種程度的發炎，包括：敗血性關節炎、痛風性關節炎、類風濕性關節炎等等。 （3）正常關節液白血球分類： 當關節發炎時PMN會增加，增加的程度與發炎程度成正比。","ref":"四、參考檢驗：","note":"三、干擾因素： 體液檢體採集後應立即送檢，避免放置過久造成細胞溶解破損。","tags":["生化"]},{"n":"Selenium (Se)","cn":"硒","c":"T10XCJ012(Serum/Plasma)\nT10XJ154 (Selenium-spot urine)\nT10XJ141 (Creatinine-spot urine)\nT10XJ155 (Selenium/Creatinine)","ins":"自費","sp":"尿液、血清(漿)","ct":"經處理尿杯\n經處理空白試管\n微量元素專用管（深藍色蓋）","d":"單次尿液至少 45 mL以上\n血液3 mL以上","g":"微量元素分析室","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00             院內檢體24小時收檢","rt":"一週","rv":"一、生物參考區間： 血清(漿)：23~190 μg/L 單次尿液： Selenium：≦ 144 μg/L。 Creatinine：20~250 mg/dL。 Selenium/Creatinine：≦ 126 μg/g Creatinine。","cl":"血液中硒濃度可反映最近飲食攝取狀況，硒中毒是相對少見的。 元素態的硒和大部分的金屬硒化物毒性較小，因為生物可用性(bioavailability)小。酸鹽和亞硒酸鹽的毒性較大，硒化氫(hydrogen selenide)的毒性最大，是一種氣狀的硒化合物。 有機態硒化物如甲硒胺酸和硒胺酸與含硫胺基酸相似，因此毒性較無機態硒為低，但其吸收率高，雖不致造成急性毒害，但長期大量攝取，會產生與無機硒相似的中毒症狀。 中毒的嚴重程度與所攝取的硒含量成正比的關係。中毒的症狀包含：反胃嘔吐、疲勞、腹瀉、頭髮與指甲損壞、異常刺痛感等，也會干擾硫的正常代謝以及抑制蛋白質合成。服用含有高量硒的藥物會造成急性硒中毒，嚴重過量會導致肝硬化、肺水腫(pulmonary edema)，甚至喪命。","ref":"","note":"檢體溶血。 飲食、藥物以及營養補充劑可能造成干擾。 高濃度的碘元素可能造成干擾。 使用含Gadolinium (Gd)顯影劑應避免在48小時內收集尿液。 以碘治療或使用造影劑建議1個月後再採集檢體送檢。 檢體無法立即送檢時，請冷藏保存。 專用採檢管請向保吉生公司中央庫房領取，連絡電話：(04)23767386。專用尿杯、專用血清(漿)分裝用含蓋康氏管請向本實驗室領取。若大量檢體需用時，請提早1個月前告知。 可接受之尿液creatinine通常介於20~250 mg/dL，比重介於1.0030~1.0200，pH值介於4.5~9.0。若不在此範圍時，建議重新採檢。(依據勞工特殊健康檢查健康管理分級建議指引，2017年11月修訂)","tags":["尿液","肝臟"]},{"n":"SMA  gene","cn":"脊髓性肌肉萎縮症基因檢測","c":"T05XCF018","ins":"","sp":"全血","ct":"EDTA管","d":"3C.C.","g":"訊聯生物科技分生實驗室","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00           院內檢體24小時收檢","rt":"30個工作天","rv":"無。","cl":"使用此方式約可準確診斷出95%脊髓性肌肉萎縮症基因帯因者及患者。","ref":"","note":"約有5%之帯因者具有非缺失型之基因型，無法經由此方法檢驗出。 屬研究性質，僅供臨床之參考。 資料來源：訊聯生物科技脊髓性肌肉萎縮症基因檢測檢驗說明。","tags":["分子檢驗"]},{"n":"Salicylate","cn":"水楊酸","c":"T05XJ508","ins":"10508B","sp":"Serum","ct":"紅蓋血清分離管","d":"3 ml","g":"聯合醫事檢驗所代檢","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00           院內檢體24小時收檢","rt":"3個工作天","rv":"2.8-20 mg/dL、Toxic：＞30 mg/dL，濃度＞60 mg/dL有致命危險。","cl":"水楊酸是一種無麻醉性、止痛、解熱、抗發炎、以及抑制血小板凝集的藥物。在胃腸道 吸收，肝臟代謝後由尿液排出。短期使用半衰期2-3個小時，長期服用半衰期15-30個 小時。使用在水楊酸治療時，評估毒性，或當懷疑過量使用時。高劑量誤食引起酸鹼失 衡、痙攣、暈眩、活動力上升、體溫上升、血糖上升、噁心、嘔吐、耳鳴、 喘氣、呼吸障礙。 水楊酸中毒可能包括血液偏鹼、再看到偏酸，再繼之是酮酸中毒。","ref":"","note":"","tags":["肝臟"]},{"n":"insulin-like growth factor 1    \n\n           (Somatomedine C)","cn":"類胰島素成長因子","c":"T05XX023","ins":"","sp":"serum","ct":"含Gel血清試管","d":"3ml","g":"大安聯合醫事檢驗所","st":"週一~週五 08:00~20:00           週六 08:00~16:00           週日 13:00~17:00           院內24小時收檢","rt":"三個工作天","rv":"備註：Tanner Stages男孩9-14歲平均12歲，女孩8-12歲平均11歲；在台灣男孩的平均青春期約14歲，女孩約為12歲","cl":"IGF-1主要是由肝臟製造的polypeptide，經由血液運送，到達目標後與細胞膜受體結合，刺激正常細胞的生長與繁殖。IGH-1影響葡萄糖的代謝，IGF-1受到GH活性的影響，因此使用GH治療時，可以偵測IGF-1，例如對成人補充GH、對侏儒症GH治療，都可以使用IGF-I觀察治療效果，當快速生長最有效果時，IGF-1數據最高。IGF-1也被用來評估肢端肥大症嚴重的程度。\nIGF-1上升於肢端肥大症，糖尿病視網膜病變，腦下垂體機能亢進，肥胖，巨人症，青春期早熟，懷孕。\n IGF-1下降於神經性厭食，肝硬化，慢性疾病，糖尿病，侏儒症，腦下垂體機能不足，停經後，GH缺損，甲狀腺機能亢進，營養不良。IGF-I也正確反應GH的分泌，下降於GH不足時。","ref":"生化檢驗：C-Peptide, Glucose, Glucose Tolerance Test (GTT)","note":"無 無","tags":["肝臟","甲狀腺","糖尿病"]},{"n":"SCC","cn":"SCC腫瘤標記","c":"T09X971","ins":"12080B","sp":"Serum、Plasma","ct":"含Gel血清試管、Heparin管、EDTA管","d":"1.5ml以上","g":"台中醫院醫事檢驗科 軌道組","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00           院內檢體24小時收檢","rt":"8小時","rv":"<＝1.5 ng/ml。","cl":"婦科、呼吸道、消化道鱗狀細胞癌的腫瘤標幟。 上升： 25﹪肺部鱗狀細胞癌 52﹪子宮鱗狀細胞癌 61﹪子宮頸癌。","ref":"","note":"1.反應過程中若受到汗水、唾液或其他體液污染，則可能產生錯誤之 較高SCC值。 2.曾接受鼠單株抗體診斷或治療之患者檢體可能含人類抗鼠抗體(HAMA)，這些檢體以含鼠單株抗體之分析試劑測試時，可能顯示偽性高值或低值，可能需要其他臨床或診斷訊息來判斷病患狀況。 肝素治療患者之檢體可能不完全凝結，因纖維蛋白存在而產生錯誤之結果。","tags":["腫瘤標記"]},{"n":"SCC","cn":"SCC腫瘤標記","c":"T09X971","ins":"12080B","sp":"Serum、Plasma","ct":"含Gel血清試管、Heparin管、EDTA管","d":"1.5ml以上","g":"台中醫院醫事檢驗科 軌道組","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00           院內檢體24小時收檢","rt":"8小時","rv":"<＝1.5 ng/ml。","cl":"婦科、呼吸道、消化道鱗狀細胞癌的腫瘤標幟。 上升： 25﹪肺部鱗狀細胞癌 52﹪子宮鱗狀細胞癌 61﹪子宮頸癌。","ref":"","note":"1.反應過程中若受到汗水、唾液或其他體液污染，則可能產生錯誤之 較高SCC值。 2.曾接受鼠單株抗體診斷或治療之患者檢體可能含人類抗鼠抗體(HAMA)，這些檢體以含鼠單株抗體之分析試劑測試時，可能顯示偽性高值或低值，可能需要其他臨床或診斷訊息來判斷病患狀況。 肝素治療患者之檢體可能不完全凝結，因纖維蛋白存在而產生錯誤之結果。","tags":["腫瘤標記"]},{"n":"Sediment(urine)","cn":"尿沉渣顯微鏡檢查","c":"T06X009","ins":"06009C","sp":"Urine（尿液）","ct":"尿杯或尿液離心管","d":"7-10 ml以上","g":"急診檢驗室/特檢組","st":"週一~週五 08:00~20:00          週六08:00~16:00          週日13:00~17:00          院內急件:24小時收檢","rt":"急件:30分鐘/一般件當日","rv":"","cl":"1、紅血球：紅血球可提示腎臟和系統性的多種疾病，包括腎外傷，也可見於外傷性的導尿後、結石的通過、或月經的污染。血尿可見於腎盂腎炎、腎結石、腎腫瘤和泌尿道的其他病變，也可見於出血性疾病。 2、白血球：泌尿道感染時會有大量白血球出現於尿液中(膿尿症)。膿尿還可見於急性腎小管腎炎，這些白血球多是分葉型的Neutrophil。腎移植病人的尿沉渣中可見大量的Monocyte可提示早期組織排斥現象。 3、上皮細胞：大量的腎性上皮細胞可提示活動性的腎小管病變。這些細胞常見於急性壞死和腎乳頭炎壞死期的病人尿沉渣中。鱗狀上皮細胞常見於正常尿中。 4、圓柱體：圓柱體是依據其內容物而命名。常見之圓柱體如下： 4.1紅血球圓柱體：可見於急性腎小管腎炎、腎梗塞、膠原組織疾病等患者之尿液中；且為亞急性細菌性心內膜炎所致之腎損傷的唯一指標。 4.2白血球圓柱體：可見於急性腎小管腎炎、腎綜合症、或腎盂腎炎的患者尿液中。 4.3上皮細胞圓柱體：是由融化的脫層管細胞所形成。因此，偶而見到一個或成堆 的腎性上皮細胞並非異常。但是，在任何引起腎小管損害的疾病中，大量上皮細胞圓柱體為上皮過度脫層造成，如見於：腎疾病、澱粉樣病變和重金屬中毒或其他毒素之中毒。 4.4透明圓柱體：劇烈運動、發燒、充血性心衰竭和利尿治療會出現暫時性的透明圓柱體。健康個體之尿沉渣偶而會少量出現(0-2/LPF)；而腎臟疾病時，出現的數量會顯著增加。 4.5顆粒性圓柱體：常見於慢性腎臟疾病，以及急性腎衰竭之恢復期。像腎盂腎炎、慢性鉛中毒等疾病都會出現顆粒性圓柱體。偶而劇烈運動後的健康個體也可能出現少量的顆粒性圓柱體。 5、細菌：正常尿液中無細菌存在。檢體中出現大量細菌為泌尿道感染的指標。 6、酵母菌(Yeast like )：出現這類細胞通常為尿道念珠菌感染(白色念珠菌)，常見於糖尿病患者。真菌還常出現於女性陰道念珠菌感染者的被污染尿液中。 7、結晶體：尿液中出現的結晶體中大多數是非病理性的。 7.1胱氨酸結晶：為一種新生兒代謝疾病。患者容易會有胱氨酸之泌尿道結石。 7.2尿酸結晶：尿液冷卻後出現的尿酸結晶無臨床意義。新鮮排出之尿液若出現尿酸結晶通常為白血病、痛風、呼吸-循環疾病、急性發熱或慢性腎臟疾病造成。 7.3酪氨酸及白氨酸結晶：屬於異常結晶偶而見於肝病患者的尿液中。如：病毒性肝炎、肝細胞中毒、肝硬化、阻塞性黃疸等。","ref":"（1）尿液檢查：Urine Routine、Bence-Jones Protein 。 （2）血液檢查：CBC-I、Blood routine。 （3）生化檢查： GLU、BUN、CRE、ALB、CHO、Total Protein (24hrsUrine)、Na、K、Cl、 Urine- Na、Urine-K、Urine- Cl、Urine- CRE 、Ca、IP、UA、Protein Electrophoresis、CRP。 （4）血清檢查：VDRL/RPR Test (STS)、ASLO（nephelometry）、補體檢查。 （5）細菌培養。","note":"在低比重的情況下：WBC、Cast、RBC易溶解。 （1）採集尿液前進可能最好先清潔尿道口。 （2）女性患者應盡量避開生理期就檢。 ( 3 ) 尿液取出後需儘速送檢，檢體不可加任何保存劑。 ( 4 ) 尿液取出未能儘速送檢，可先4℃冷藏，檢查時需要回復到室溫。","tags":["特殊檢驗","尿液","肝臟","腎臟","腫瘤標記","糖尿病","感染"]},{"n":"Semen analysis","cn":"精液常規檢查","c":"T16X001","ins":"16001C","sp":"Semen（精液）","ct":"無菌盒(50ml)","d":"","g":"急診檢驗室","st":"週一~週五 上午08:30~10:30           下午13:30~15:30 週     六 上午08:30~10:30","rt":"一般件當日/急件:60分鐘","rv":"Normal：（1）體積約≧1.4mL （2）PH 為7-8 （3）WBC：＜1 x 106 /ml （4）一小時後總運動性應≧42% （5）精蟲濃度：40x 106 /ml以上 （6）顏色：分為bloody、gray-white、reddish-yellow、yellow （7）液化時間：若超過30 分鐘中仍無法液化即視為不正常。","cl":"（1）正常精蟲一小時後快速直線前進運動性應≧32%，否則應考慮不孕。WHO 建議精蟲一小時後總運動性應≧42%。 （2）正常PH 。","note":"1. 液態抗凝血劑可能會有稀釋效果而導致個別病患檢體濃度降低。 2.目前並無任何診斷測試可以保證檢體不含低濃度的TP抗體，例如感染初期 的檢 體。因此任何時候的陰性結果無法排除曝露於感染梅毒的可能性。 3.下列干擾物存在時，膽紅素(≤ 20 mg/dL)、三酸甘油脂(≤ 3000 mg/dL)、蛋白質（≤12 g/dL）或血紅素(≤500 mg/dL)，測試結果陰性檢體的潛在干擾S/CO差異< 0.40，具反應性樣本之差異S/CO< 20%。 無。","tags":["感染"]},{"n":"疥瘡鏡檢（Scabies）","cn":"疥瘡鏡檢","c":"07011C01","ins":"07011C01","sp":"刮取病灶位置之皮削","ct":"紅蓋廣口瓶","d":"要有可見之適量皮削","g":"急檢組鏡檢室","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00           院內檢體24小時收檢","rt":"當天","rv":"sarcoptic mite eggs was found：有看到疥蟲卵。 sarcoptic mite and eggs was found：有看到疥蟲及蟲卵。 not found：只看到皮膚角質無發現蟲體或蟲卵。","cl":"1.「疥瘡」是一種因皮膚感染到節肢動物疥  （Sarcoptes scabiei）而引起嚴重搔癢的皮膚 病，其典型的症狀為皮膚劇癢且夜間更為嚴重，同時出現很小卻引起劇癢的水泡、膿 泡以及全身的搔破痕跡。疥蟲長得很小，約只有針尖大小，蟲體以肉眼可以看到一白 點，而成蟲及若蟲構造為一個體節四對腳，僅於幼蟲時具三對腳。疥蟲侵入皮膚角質 層而寄生在人體皮膚表面，分佈在人體皺摺處及柔軟的地方，所以在病人的手指間、 腳趾縫、腋下、下腹、屁股、陰部、女性的乳房下等處會長出奇癢無比的疹子，晚上 棉被蓋上後會更癢，甚至會讓人半夜癢醒，難以入眠。 2.疥瘡在正常人通常是不會長到臉上，但發生在嬰幼兒時可長到臉部及頭部。其傳播方式 主要經由皮膚接觸到疥瘡患者的疥蟲而得病，另外藉由衣服、棉被、床單等也可以傳染 疥。此病常發生在養護中心、軍中、監獄、學校等地。一般正常人患疥瘡，其身上的疥 蟲約十幾隻；如果是心智障礙、行動不便、長期臥床、免疫力有缺損或使用類固醇治療 的病人患有疥瘡，病人身上可能繁殖出多達幾百萬隻的疥蟲，皮膚會出現有角化或痂皮 的疹子，此時特稱為「挪威疥」（Norwegian scabies），或「角化型疥瘡」（keratotic scabies or crusted cabies），此種挪威疥傳染性極強。","ref":"","note":"1.臨床刮取病灶時需選擇完整的未經搔抓的早期新鮮的丘皰疹或隧道（末端），陽 性率較高。反復搔抓、擠壓均可破壞蟲體，影響檢查結果。 2.鏡檢的靈敏度並不高，如果檢查結果是陰性，也無法斷言患者必定未罹患疥瘡。 檢體為高接觸性感染檢體，試劑為強鹼，操作時務必做好防護措施。","tags":["感染"]},{"n":"T3","cn":"三碘甲狀腺素","c":"T09X117","ins":"09117B","sp":"Serum、Plasma","ct":"含Gel血清試管\n          Li-Heparin抗凝管","d":"4ml以上","g":"台中醫院醫事檢驗科 軌道組","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00           院內檢體24小時收檢","rt":"8小時","rv":"74-146 ng/dL","cl":"T3為評估甲狀腺機能亢進的優良指標。增加於甲狀腺機能亢進、T3甲狀腺毒症、治療中的甲狀腺機能亢進病人、早期甲狀腺壞死、缺碘性甲狀腺腫、伴隨有甲狀腺結合蛋白增加、懷孕、thyrotoxicosis factitia。正常或偏低：甲狀腺機能低下、伴隨有甲狀腺結合蛋白減少、急性或亞急性非甲狀腺疾病、老人及營養不良的人。","ref":"T4、TSH","note":"(1)不適用於新生兒檢驗。 (2)生物素濃度＞1ng/ml可能出現正偏差。","tags":["甲狀腺"]},{"n":"T4","cn":"四碘甲狀腺素T4","c":"T09X010","ins":"09010C","sp":"Serum、Plasma","ct":"含Gel血清試管\n          Li-Heparin抗凝管","d":"4ml以上","g":"台中醫院醫事檢驗科 軌道組","st":" 發成長的細胞激素。無論是否具有全身性肥大細胞增多症，Tryptase在血液學異常和惡性腫瘤中都具有診斷和預後意義。 Tryptase的基準值範圍大約在10~20 ug/l，一般會在11.0 ug/l以下，數值上升反應了有嚴重過敏病史的病人體內肥大細胞的負荷及風險程度。建議採檢二次，第一次於病患休克發生的15-120分鐘採檢，此時Tryptase濃度會達到最高值，第二次於24小時採檢，確認Tryptase是否回到基準值。結果需配合臨床醫師判讀。","ref":"","note":"1. 病患休克發生的15~120分鐘內採檢。 2. 檢體冷藏運送。 3. 本項目收費不適用健保點數，故僅收本院及豐原醫院檢體，其他代檢檢體不收。","tags":["腫瘤標記"]},{"n":"Total P1NP\n(Procollagen type 1 amino-terminal propeptide)","cn":"骨骼生成速度指標","c":"T05XCL060","ins":"無","sp":"Plasma","ct":"含EDTA試管","d":"3 c.c","g":"大安聯合醫事檢驗所","st":"連假前一天起暫停採檢","rt":"5個工作天","rv":"Pre-menopause停經前：15.13-58.59 ng/mL\nPost-menopause All停經後：16.27-73.87 ng/mL\nPost-menopause With HRT：14.28-58.92 ng/mL\nPost-menopause Without HRT：20.25-76.31 ng/mL (HRT荷爾蒙補充療法：Hormone Replacement Therapy)","cl":"在骨骼生成當中，第一型膠原蛋白(Collagen type 1 )由第一型膠原蛋白原(Procollagen type 1)藉由酵素轉化而成，在轉化的過程中第一型膠原蛋白原的N-terminal會被蛋白酶所分離出。因此P1NP(N-terminal)是骨骼生成重要指標之一。 藉由檢測血清P1NP含量，作為停經後婦女骨質疏鬆治療的標記，以及骨骼相關Paget's disease治療的評估。骨骼代謝疾病及腎功能不全的個案，可能呈現升高的數值。","ref":"","note":"1.血漿請分裝至康試管，最少送檢量0.5mL。保存在2-8°C可以保存5天，如遇連假超過3天，請於假期前一天暫停採檢至假期結束 2.資料參考來源：大安聯合醫事檢驗所網站","tags":["腎臟"]},{"n":"TSH receptor Ab","cn":"甲促素結合體抗體\n         (甲狀腺刺激素受體抗體)","c":"T12X121","ins":"12121C","sp":"Serum","ct":"含Gel血清分離試管","d":"5mL","g":"軌道組","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00           院內檢體24小時收檢","rt":"3個工作天","rv":"0~1.98 IU/L","cl":"1.輔助鑑別診斷葛瑞夫茲氏症(Graves’ disease)，診斷閾值為3.10 IU/L 2葛瑞夫茲氏症為自體免疫性甲狀腺機能亢進，由甲狀腺細胞上甲狀腺刺激素 （thyroid-stimulating hormone（TSH），又稱為促甲素（thyrotropin））受體的自體抗體引起。這些促甲素受體抗體在用於輔助鑑別診斷及檢測甲狀腺機能亢進病因時升高，顯示對葛瑞夫茲氏症具高臨床靈敏度及特異性。這些抗體可分為刺激性、抑制性或中性；其中刺激性抗體不受甲狀腺激素濃度升高的典型負回饋影響，導致甲狀腺持續受到刺激，進而造成葛瑞夫茲氏甲狀腺機能亢進的典型甲狀腺毒症症狀。 3.研究發現TRAb可用於鑑別診斷妊娠甲狀腺毒症為妊娠第一期病發或葛瑞夫茲氏症復發。現行指南納入懷孕期的TRAb測量。TRAb測量可用於診斷甲狀腺功能測試正常但呈現甲狀腺外症狀（例如內分泌性突眼症、脛前部黏液水腫及甲狀腺杵狀指）的病患是否罹患葛瑞夫茲氏症。 4.TRAb測量值顯示可監測對抗甲狀腺藥物治療的反應及預測復發。","ref":"TPO、TA、FT3、FT4、TSH。","note":"1.研究根據CLSI EP07第3版指南操作。各物質以2種分析物濃度（約1.70 IU/L及5.00 IU/L）測試。在下列濃度時，未觀察到顯著干擾（濃度為1.70 IU/L時，干擾在± 0.30 IU/L內，濃度為5.00 IU/L時，干擾在± 15.0%內）。 2.研究根據CLSI EP07第3 00          週日13:00~17:00          院內急件:24小時收檢","rt":"一般件當日/急件:30分鐘","rv":"陰性（-）","cl":"<排泄增加>： （1）肝機能過度負荷，血紅素異化增加：血管內溶血（例如輸血反應中毒、感染性 疾病）、溶血性貧血(hemolyticanemia)、惡性貧血(perniciousanemia)、伴隨有大 型血腫的再吸收、真性紅血球增多（polycythemia）。 （2）肝功能受限：病毒性肝炎、慢性肝炎和肝硬化(因肝實質損害範圍而定) 、伴隨毒 性肝障礙(例如：酒精、黴菌毒素、有機溶液、藥物、或由感染來的毒素。特別是 敗血症所引起的)、肝臟充血(例如：心肌梗塞，急性新衰竭，心臟功能不全之後) 、在肝臟缺氧(例如：嚴重貧血、一氧化碳中毒) 、肝癌(因部位大小而定)、不完全 膽道阻塞(因肝實質損害範圍而定)。 （3）不經肝臟代謝而使尿中尿膽原增加：在肝硬化伴有門靜脈高血壓、門靜脈栓塞的 結果、肝靜脈阻塞的結果。 <停止製造尿膽素原>： （1）膽道完全阻塞。 （2）腸道細菌缺乏(新生兒、有時在密集抗生素治療之間或之後)。","ref":"（1）尿液檢查：Urine Routine。 （2）血液檢查： Prothrombin Time、APTT(Activated Partial Thromboplastin Time)、Blood routine、 CBC-I、Reticulocyte Count。 （3）生化檢驗： T-Bilirubin、D-Bilirubin、LAP、r-GT、CHE、Alkaline-phosphatase、LDH、AST、ALT、TP、ALB、Protein Electrophoresis 、CRP。 （4）病毒學檢查：B型肝炎、C型肝炎檢查。","note":"甲醛濃度升高會抑制該測試。食物染料和那些可在酸性介質（如甜菜紅、偶氮染料、非那吡啶和 p-氨基苯甲酸）中呈現紅色的藥物，均可能引發偽陽性結果。曝光時間過長可能導致結果降低或偽陰性值。 若不能在排尿1小時內完成檢驗，必須放置於冰箱及避光。","tags":["特殊檢驗","尿液","肝臟","腫瘤標記","感染"]},{"n":"Valproic acid","cn":"發爾波克","c":"T10X510","ins":"10510C","sp":"Serum（血清）、Plasma（血漿）","ct":"含Gel血清試管、\n          含Li-Heparin抗凝劑的Heparin管","d":"2 mL以上","g":"台中醫院醫事檢驗科 軌道組","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00           院內檢體24小時收檢","rt":"40分鐘","rv":"Therapeutic：50-100 μg/ml","cl":"抗痙攣（癲癇治療）藥物，用於控制無急性使用的單純癲癇或是大癲癇發作時的 輔助治療藥劑，它也可用於治療偏頭痛、狂躁症。50至100 mcg/ml為有效劑量； 高於100 mcg/ml屬於中毒水平。","ref":"（1）血液檢查：CBC-I。 （2）生化檢查：AST，ALT。","note":"（1）血清、heparin血漿，避免使用溶血檢體。 （2）關於分析使用老鼠抗體，可能存在的影響是檢體內的human anti-mouse antibodies (HAMA)。人體抗老鼠抗體可能來自於使用單株抗體或規律接觸動物之個人接受 免疫治療或診斷步驟的病人而來。此外，其他異嗜性抗體，例如人體抗山羊抗體 可能出現在病人檢體內。 （1）採檢時機。 （2）在非常少的個案，若是病人檢體含有顆粒凝集物質將造成本分析產生較低的測試 結果。 （3）申請單上建議註明採檢及用藥時間。","tags":["生化"]},{"n":"Vancomycin","cn":"血中藥物濃度測定","c":"T05XJ531","ins":"10531B","sp":"Serum（血清）","ct":"含Gel血清試管","d":"3 ml","g":"聯合醫事檢驗所代檢","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00             院內檢體24小時收檢","rt":"3個工作天","rv":"Peak Therapeutic：輸注30分鐘後；30-40 ug/mL。 Trough Therapeutic：5-20 ug/mL，＞10ug/mL可以避免抗藥性。 若致病 \nT10XJ150 (Zinc-spot urine)\nT10XJ141 (Creatinine-spot urine)\nT10XJ151 (Zinc/Creatinine)","ins":"09048B","sp":"血清（漿）、尿液","ct":"經處理空白試管\n微量元素專用管（深藍色蓋）\n經處理尿杯","d":"血液3 mL以上\n單次尿液至少 45 mL以上","g":"微量元素分析室","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00           院內檢體24小時收檢","rt":"一週","rv":"一、生物參考區間： 血清(漿)鋅：60~120 μg/dL。 單次尿液： Zinc：150~1200 μg/L。 Creatinine：20~250 mg/dL。 Zinc/Creatinine：110.0~750.0 μg/g Creatinine。","cl":"急性中毒： 食人性：噁心、嘔吐、腹痛、血便、發燒、常自行恢復。 吸入性：吸入氯化鋅(Zinc Chloride)的煙霧微粒會引起咳嗽、呼吸困難，嚴重者會變成呼吸窘迫症，急性腎衰竭，甚至死亡。 接觸性：皮膚接觸鋅化合物會引起皮膚炎，有 些人會潰瘍，眼睛噴到氯化鋅及硫酸鋅溶液會引起傷害。 金屬燻煙熱：吸入氧化鋅的粉塵及煙霧4到小時後發生，有金屬味，咳嗽、呼吸短促、疲勞、肌痛、發燒到，流汗，化學性肺炎，肺水腫等。又叫 Metal fume fever。大多數人功能可完全恢復。 慢性中毒：長期大量鋅暴露，會引起慢性鋅中毒，如長期吃雄性動物生殖器、服用大量鋅藥片。會引起血銅濃度大幅下降，貧血、白血球稀少症、免疫力受損、體重減輕等症狀。 生理功能： 維持免疫功能：人體鋅不足會出現淋巴球數量低落、血中免疫球蛋白降低、自然殺手功能減弱、皮膚免疫測試 反應降低等狀況，臨床的結果就是肺炎、念珠球菌感染，甚至傷風感冒。 生長與發育：促進生長、性器官的發育、傷口癒合、毛髮、指甲，以及口腔黏膜等多處位置的修補作用。 運用在保養品：為控油類型的典型的成份。 調結基因表現：許多蛋白質轉錄因子的分子中含有鋅指結構，負責與DNA結合，而改變基因的表現功能，是很重要的調控機制。 酵素組成分：已知的含鋅酵素超過300多種，鋅位於催化中心，或穩定酶蛋白質的立體結構，失去鋅會使酵素失去活性。 維持味覺功能與促進食慾。 促進胰島素分泌。","ref":"","note":"檢體溶血。 飲食、藥物以及營養補充劑可能造成干擾。 高濃度的碘元素可能造成干擾。 使用含Gadolinium (Gd)顯影劑應避免在48小時內收集尿液。 以碘治療或使用造影劑建議1個月後再採集檢體送檢。 檢體無法立即送檢時，請冷藏保存。 專用採檢管請向保吉生公司中央庫房領取，連絡電話：(04)23767386。專用尿杯、專用血清(漿)分裝用含蓋康氏管請向本實驗室領取。若大量檢體需用時，請提早1個月前告知。 可接受之尿液creatinine通常介於20~250 mg/dL，比重介於1.0030~1.0200，pH值介於4.5~9.0。若不在此範圍時，建議重新採檢。(依據勞工特殊健康檢查健康管理分級建議指引，2017年11月修訂)","tags":["尿液","腎臟","感染"]},{"n":"5-HIAA","cn":"5-氫氧靛基醋酸","c":"T05XI056","ins":"09056B","sp":"24小時酸化Urine","ct":"24 hr酸化尿液+6N HCL 20 ml","d":"＞2ml（標示總量）","g":"聯合醫事檢驗所代檢","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00           院內檢體24小時收檢","rt":"10個工作天","rv":"2-8 mg/24hrs。","cl":"嗜銀細胞(argentaffin cell)引起的轉移性類癌腫瘤會產生大量之serotonin（血清張力素 ）、Urine中5-HIAA大部份由serotonin代謝而來，因此測定Urine中5-HIAA濃度可 顯示分泌情況。增加的情況發生於：類癌腫瘤，微量升高常見於非熱帶口炎性腹瀉或 口服reserpin後。降低於：腎功能不良或某些苯丙酮尿病人。","ref":"無","note":"香蕉、鳳梨、李子、蕃茄、梨、茄子、核桃，Serotonin含量較高，採樣前5天禁食這些 食物。 （1）尿液收集在3000mL的塑膠桶內，內容物預先放置20 mL醋酸。 （2）資料來源：聯合檢驗目錄2011第6頁。","tags":["腎臟","腫瘤標記"]},{"n":"25-hydroxy Vit.D","cn":"維他命D","c":"12XCL015","ins":"自費","sp":"Serum（血清）","ct":"含Gel血清試管","d":"4 ml","g":"醫事檢驗科 軌道組","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00","rt":"3個工作天","rv":"Sufficient(充足)：30.0-100.0 ng/mL Insufficient(不足)：20.0-30.0 ng/mL Deficient(缺乏)：＜20.0 ng/mL Toxic：＞100.0 ng/mL (來源：2011年Endocrine Society Task Force的臨床指引)","cl":"維他命D缺乏與生長遲緩、骨骼畸形、軟骨病、骨質疏鬆及骨折有關。最近發現在大部份的組織和細胞都有維他命D的受體，它的角色受到廣泛的注意，維他命D能夠降低許多慢性疾病的風險，包括癌症、自體免疫、傳染性疾病以及心臟血管疾病有關。 人類經由陽光、飲食和營養品的補充來得到維他命D，陽光的紫外線B可以將皮膚下7-dehydrocholesterol轉換成previtamin D3。食物、營養品中動物、魚油是D3的來源，植物、酵母是D2的來源，都在肝臟中轉換成25(OH)D。25(OH)D在腎臟轉換成活性的1,25(OH)2D，增加鈣、磷的吸收，協同副甲狀腺的PTH維持血液鈣、磷的平衡。 估計有40%-100%的歐美年長者維他命D是不足的，補充維他命D，標準建議量為400 IU，提高劑量，每天800 IU可以降低骨折的發生率。 骨骼肌具有維他命D的受體，肌肉力量與維他命D有正相關，因此足夠的維他命D或每天800 IU可以下降跌倒的概率。腦部、攝護腺、乳房、大腸、免疫細胞都有維他命D的受體，1,25(OH)2D調控超過200個基因。維他命D可以減少正常及癌症細胞的增生，目前認為是癌細胞內的1,25(OH)2D促進細胞的分化與自毀。血清25(OH)D濃度與大腸直腸癌的發生機率成反比，25(OH)D低於20 ng/mL時，攝護腺癌、乳房癌、大腸癌的風險上升30-50 %。25(OH)D低於12 ng/mL時，追蹤8年，大腸直腸癌的風險上升253 %。 足夠的維他命D可以藉由單核球、巨噬細胞殺掉傳染性異物，維他命D<20 ng/mL時，無法啟動免疫反應，這可以解釋黑人比白人容易感染MTB且症狀比較嚴重。低緯度日曬充足、攝取較多維他命D的人，罹癌概率下降，多發性硬化、腸胃發炎、骨關節炎的概率也都下降。 1,25(OH)2D可以抑制腎素的合成，增加胰島素的生產，增強心肌收縮的力量，調節血壓和血糖。同樣的，低緯度日曬充足、攝取較多維他命D的人，第一型、第二型糖尿病的概率下降，血壓相對的正常，心臟衰竭機會下降，CRP、IL-10下降。 維他命D缺乏和精神分裂及憂鬱症的發生率有關，在出生前後維持足夠的維他命D，對於腦部的發育及日後維持精神及智力功能，都是相當重要的。維他命D對肺功能也有幫助，媽媽在懷孕期間維他命D不足，其孩童氣喘的風險較高。 對於沒有足夠日曬的孩童或成人，專家的建議是D3每天800-1000 IU，因為D2的效果低，如果使用D2，可以使用3倍量。懷孕到哺乳的階段都應該維持足夠的維他命D。建議的日曬是在上午10時到下午3時間，依著季節、緯度、人種，手腳曝露5-30分鐘，每週兩次是適當的。如果每日使用D3達50000 IU，就會造成血中濃度到達中毒的程度，但是每日10000 IU，5個月並不會中毒。 25(OH)D是維他命D的血清標記，不僅作為骨質健康的評估，也作為癌症和其他慢性疾病風險的獨立預測因子。因此25(OH)D的檢驗在歐美國家爆出大量。本實驗室特別選擇Diasorin的試劑廠牌，這是在市場佔有率第一位，可以同時測得到D2加D3的總量。目前大家的共識是25(OH)D缺乏，PTH上升，蝕骨作用上升。當25(OH)D足夠時，PTH就會維持一個低的基礎濃度，我們使用這一方法建立參考區間。 很多人同意補充維他命D可以改變第二型糖尿病、高血壓及心臟血管疾病的危險機率。但是反對意見還是存在，他們認為Cohort study一群人看得出來，維他命D血清濃度偏低時，高血壓及心臟血管疾病的發病機率上升；但是Clinical trial看不出來，補充維他命D400 IU可以改變高血壓及心臟血管疾病的發病機率。這些意見值得進一步研究。三、參考檢驗：","ref":"","note":"","tags":["肝臟","腎臟","腫瘤標記","甲狀腺","糖尿病","感染"," const PS=24;
let pg=0,sortBy='rel',activeTags=new Set(),q='';
let fil=ALL;

// Build tag counts
function buildTagCounts(items){
  const c={};
  items.forEach(it=>it.tags.forEach(t=>{c[t]=(c[t]||0)+1}));
  return c;
}

// All tags from full dataset
const ALL_TAG_COUNTS=buildTagCounts(ALL);
const ALL_TAGS=Object.keys(ALL_TAG_COUNTS).sort((a,b)=>ALL_TAG_COUNTS[b]-ALL_TAG_COUNTS[a]);

const TAG_EMOJI={
  '肝臟':'🫀','腎臟':'🫘','腫瘤標記':'🔬','甲狀腺':'🦋','糖尿病':'🍬',
  '發炎':'🔥','感染':'🦠','凝血':'💉','自體免疫':'🛡️','心臟':'❤️',
  '貧血':'🩸','藥物監測':'💊','移植':'🏥','內分泌':'⚗️','電解質':'⚡',
  '營養':'🥗','微生物':'🔭','分子檢驗':'🧬','特殊檢驗':'🧪','輸血/血型':'🅰️',
  '免疫':'🛡️','生化':'⚗️','血液學':'🩺','尿液':'🧫','糞便':'🔬','其他':'📋'
};
function renderTags(){
  const fc=buildTagCounts(fil);
  document.getElementById('tagbar').innerHTML=ALL_TAGS.map(t=>{
    const cnt=fc[t]||0;
    const on=activeTags.has(t)?'on':'';
    const zero=(!activeTags.has(t)&&cnt===0)?'zero':'';
    const em=TAG_EMOJI[t]||'🏷️';
    return `<span class="tag ${on} ${zero}" onclick="toggleTag('${t}')">${em} ${t} <span class="cnt">${cnt}</span></span>`;
  }).join('');
}

function toggleTag(t){
  if(activeTags.has(t)) activeTags.delete(t);
  else activeTags.add(t);
  pg=0;
  applyFilter();
}

function score(it,kw){
  if(!kw) return 1;
  const k=kw.toLowerCase();
  let s=0;
  if(it.n.toLowerCase().includes(k)) s+=10;
  if(it.cn.toLowerCase().includes(k)) s+=9;
  if(it.c.toLowerCase().includes(k)) s+=8;
  if(it.ins.toLowerCase().includes(k)) s+=7;
  if(it.cl.toLowerCase().includes(k)) s+=2;
  if(it.rv.toLowerCase().includes(k)) s+=1;
  if(it.sp.toLowerCase().includes(k)) s+=1;
  if(it.g.toLowerCase().includes(k)) s+=1;
  return s;
}

function applyFilter(){
  const kw=q.trim();
  let res=ALL;
  if(kw){
    res=res.map(it=>({it,s:score(it,kw)})).filter(x=>x.s>0);
    if(sortBy==='rel') res.sort((a,b)=>b.s-a.s);
    else res.sort((a,b)=>a.it.n.localeCompare(b.it.n,'zh-TW'));
    res=res.map(x=>x.it);
  } else {
    if(sortBy==='name') res.sort((a,b)=>a.n.localeCompare(b.n,'zh-TW'));
  }
  if(activeTags.size>0){
    res=res.filter(it=>Array.from(activeTags).every(t=>it.tags.includes(t)));
  }
  fil=res;
  window._fil=fil;
  renderTags();
  document.getElementById('sc').textContent=fil.length;
  renderPage();
}

function renderPage(){
  const total=fil.length;
  const start=pg*PS;
  const page=fil.slice(start,start+PS);
  const cards=document.getElementById('cards');
  if(!total){
    cards.innerHTML='<div class="no-result">找不到符合的檢驗項目</div>';
    document.getElementById('pg').innerHTML='';
    document.getElementById('rc').textContent='';
    return;
  }
  document.getElementById('rc').textContent=`顯示第 ${start+1}–${Math.min(start+PS,total)} 筆，共 ${total} 筆`;
  cards.innerHTML=page.map((it,i)=>{
    const tags=it.tags.map(t=>`<span class="ctag">${t}</span>`).join('');
    const rv=it.rv?`<div class="card-rv">參考值：${esc(it.rv.slice(0,80))}${it.rv.length>80?'…':''}</div>`:'';
    return `<div class="card" onclick="openModal(${start+i})">
      <div class="card-name">${esc(it.n)}</div>
      ${it.cn?`<div class="card-cn">${esc(it.cn)}</div>`:''}
      <div class="card-code">${esc(it.c)}${it.ins?' · '+esc(it.ins):''}</div>
      ${it.sp?`<div class="card-specimen">📋 ${esc(it.sp.slice(0,40))}</div>`:''}
      ${rv}
      <div class="card-tags">${tags}</div>
      ${it.rt?`<div class="card-unit">⏱ 報告：${esc(it.rt)}</div>`:''}
    </div>`;
  }).join('');
  renderPg(total);
}

function renderPg(total){
  const tot=Math.ceil(total/PS);
  if(tot<=1){document.getElementById('pg').innerHTML='';return;}
  let h=`<span class="pg-info">第${pg*PS+1}–${Math.min((pg+1)*PS,total)}筆，共${total}筆</span>`;
  h+=`<button onclick="goPg(${pg-1})" ${!pg?'disabled':''}>‹</button>`;
  const start=Math.max(0,pg-3),end=Math.min(tot,pg+4);
  if(start>0) h+=`<button onclick="goPg(0)">1</button>${start>1?'<span>…</span>':''}`;
  for(let i=start;i<end;i++) h+=`<button class="${i===pg?'cur':''}" onclick="goPg(${i})">${i+1}</button>`;
  if(end<tot) h+=`${end<tot-1?'<span>…</span>':''}<button onclick="goPg(${tot-1})">${tot}</button>`;
  h+=`<button onclick="goPg(${pg+1})" ${pg>=tot-1?'disabled':''}>›</button>`;
  document.getElementById('pg').innerHTML=h;
}

function goPg(n){pg=n;renderPage();window.scrollTo(0,0);}
function onSearch(){q=document.getElementById('q').value;pg=0;applyFilter();}
function setSortBy(s){sortBy=s;document.getElementById('sb-rel').classList.toggle('on',s==='rel');document.getElementById('sb-name').classList.toggle('on',s==='name');pg=0;applyFilter();}
function clearAll(){q='';activeTags.clear();document.getElementById('q').value='';pg=0;applyFilter();}

function esc(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function openModal(idx){
  const it=fil[idx];
  document.getElementById('m-name').textContent=it.n;
  document.getElementById('m-cn').textContent=it.cn||'';
  document.getElementById('m-cn').style.display=it.cn?'':'none';
  document.getElementById('m-code').textContent=[it.c,it.ins].filter(Boolean).join(' · ');
  
  let body='';
  
  if(it.rv) body+=`<div class="range-box"><div class="range-label">參考值 / Reference Range</div><div class="range-val">${esc(it.rv)}</div></div>`;
  
  body+=`<div class="meta-grid">`;
  if(it.sp) body+=`<div class="meta-item"><div class="meta-label">檢體種類</div><div class="meta-value">${esc(it.sp)}</div></div>`;
  if(it.ct) body+=`<div class="meta-item"><div class="meta-label">採集容器</div><div class="meta-value">${esc(it.ct)}</div></div>`;
  if(it.d) body+=`<div class="meta-item"><div class="meta-label">採檢體量</div><div class="meta-value">${esc(it.d)}</div></div>`;
  if(it.g) body+=`<div class="meta-item"><div class="meta-label">操作單位</div><div class="meta-value">${esc(it.g)}</div></div>`;
  if(it.rt) body+=`<div class="meta-item"><div class="meta-label">報告時間</div><div class="meta-value">${esc(it.rt)}</div></div>`;
  if(it.ins) body+=`<div class="meta-item"><div class="meta-label">健保編號</div><div class="meta-value">${esc(it.ins)}</div></div>`;
  body+=`</div>`;
  
  if(it.st) body+=`<div class="section"><div class="section-title">送檢時間</div><div class="section-content">${esc(it.st)}</div></div>`;
  if(it.cl) body+=`<div class="section"><div class="section-title">臨床意義</div><div class="section-content">${esc(it.cl)}</div></div>`;
  if(it.ref) body+=`<div class="section"><div class="section-title">參考檢驗</div><div class="section-content">${esc(it.ref)}</div></div>`;
  if(it.note) body+=`<div class="section"><div class="section-title">注意事項</div><div class="section-content">${esc(it.note)}</div></div>`;
  
  if(it.tags&&it.tags.length) body+=`<div class="tag-list">${it.tags.map(t=>`<span class="ctag">${esc(t)}</span>`).join('')}</div>`;
  
  document.getElementById('modal-body').innerHTML=body;
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal(e){
  if(e.target===document.getElementById('overlay')) closeModalBtn();
}
function closeModalBtn(){
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow='';
}
document.addEventListener('keydown',e=>{if(e.key==='Escape') closeModalBtn();});

applyFilter();
</script>
</body>
</html>
