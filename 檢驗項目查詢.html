<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>檢驗項目查詢</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F4F3F0;--surface:#FFF;--surface2:#EEEDE9;
  --text:#181816;--text2:#5A5956;--text3:#97958F;
  --border:#D8D6D0;--border2:#B8B6B0;
  --accent:#1A6B4A;--accent-light:#E4F4EC;--accent-mid:#9DD4B8;
}
body{font-family:"Noto Sans TC",sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 24px 14px;position:sticky;top:0;z-index:100}
.search-row{display:flex;gap:8px;align-items:center}
.search-wrap{position:relative;flex:1;max-width:500px}
.search-wrap input{width:100%;height:40px;padding:0 12px 0 36px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;background:var(--surface);color:var(--text);outline:none;transition:border-color .15s}
.search-wrap input:focus{border-color:var(--accent)}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;font-size:15px}
.clear-btn{height:40px;padding:0 14px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text2);cursor:pointer;font-size:13px;font-family:inherit;white-space:nowrap}
.clear-btn:hover{background:var(--surface2)}
.stats-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.stat{background:var(--surface2);border-radius:7px;padding:6px 14px;font-size:12px;color:var(--text2)}
.stat strong{font-weight:700;color:var(--text);margin-right:3px}
.tag-bar{padding:10px 24px;display:flex;gap:6px;flex-wrap:wrap;background:var(--surface);border-bottom:1px solid var(--border)}
.tag{display:inline-flex;align-items:center;gap:4px;height:28px;padding:0 11px;border:1.5px solid var(--border);border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;transition:all .12s;background:var(--surface);color:var(--text2);user-select:none;white-space:nowrap}
.tag:hover{border-color:var(--border2);background:var(--surface2)}
.tag.on{border-color:var(--accent);background:var(--accent-light);color:var(--accent)}
.tag .cnt{font-size:10px;opacity:.55;font-weight:400}
.result-area{padding:14px 24px 40px}
.result-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.result-count{font-size:13px;color:var(--text3)}
.sort-row{display:flex;gap:6px}
.sort-btn{height:28px;padding:0 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text2);font-size:12px;cursor:pointer;font-family:inherit}
.sort-btn.on{background:var(--text);color:var(--surface);border-color:var(--text)}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;cursor:pointer;transition:all .15s}
.card:hover{border-color:var(--border2);box-shadow:0 2px 8px rgba(0,0,0,.06);transform:translateY(-1px)}
.card-name{font-size:14px;font-weight:700;margin-bottom:2px;line-height:1.3}
.card-cn{font-size:12px;color:var(--text2);margin-bottom:3px}
.card-code{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--text3);margin-bottom:8px}
.card-specimen{font-size:12px;color:var(--text2);margin-bottom:6px}
.card-rv{font-size:12px;color:var(--text3);line-height:1.5;margin-bottom:10px;padding-top:6px;border-top:1px solid var(--surface2)}
.card-tags{display:flex;flex-wrap:wrap;gap:4px}
.ctag{display:inline-block;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:500;background:var(--accent-light);color:var(--accent)}
.card-unit{font-size:11px;color:var(--text3);margin-top:8px;padding-top:8px;border-top:1px solid var(--surface2)}
.pg{display:flex;gap:6px;align-items:center;margin-top:20px;flex-wrap:wrap;font-size:13px}
.pg button{height:30px;min-width:30px;padding:0 8px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);cursor:pointer;font-family:inherit;font-size:13px}
.pg button:hover{background:var(--surface2)}
.pg button.cur{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.pg button:disabled{opacity:.3;cursor:default}
.pg-info{color:var(--text3)}
.no-result{text-align:center;padding:60px;color:var(--text3);grid-column:1/-1}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;align-items:flex-start;justify-content:center;padding:32px 16px;overflow-y:auto}
.overlay.open{display:flex}
.modal{background:var(--surface);border-radius:14px;max-width:680px;width:100%;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.2);position:relative}
.modal-head{padding:22px 24px 18px;border-bottom:1px solid var(--border)}
.modal-head h2{font-size:18px;font-weight:700;margin-bottom:2px;line-height:1.3;padding-right:40px}
.modal-head .cn-line{font-size:14px;color:var(--text2);margin-bottom:4px}
.modal-head .code-line{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--text3)}
.modal-close{position:absolute;top:18px;right:18px;width:30px;height:30px;border:1px solid var(--border);border-radius:6px;background:var(--surface);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--text2)}
.modal-close:hover{background:var(--surface2)}
.modal-body{padding:20px 24px 28px;overflow-y:auto;max-height:calc(85vh - 100px)}
.range-box{background:var(--accent-light);border:1px solid var(--accent-mid);border-radius:8px;padding:12px 14px;margin-bottom:18px}
.range-label{font-size:10px;font-weight:700;color:var(--accent);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
.range-val{font-size:12px;color:var(--text);font-family:"JetBrains Mono",monospace;white-space:pre-wrap}
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
.meta-item{background:var(--surface2);border-radius:7px;padding:9px 11px}
.meta-label{font-size:10px;color:var(--text3);font-weight:600;letter-spacing:.05em;text-transform:uppercase;margin-bottom:2px}
.meta-value{font-size:13px;font-weight:500;color:var(--text);white-space:pre-wrap;word-break:break-word}
.section{margin-bottom:18px}
.section-title{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
.section-content{font-size:13px;color:var(--text);line-height:1.75;white-space:pre-wrap;word-break:break-word}
.tag-list{display:flex;flex-wrap:wrap;gap:4px;margin-top:12px}
</style>
</head>
<body>
<div class="header">
  <div class="search-row">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input id="q" placeholder="輸入檢驗名稱、代碼、中文名稱或臨床意義…" oninput="onSearch()">
    </div>
    <button class="clear-btn" onclick="clearAll()">清除篩選</button>
  </div>
  <div class="stats-row">
    <div class="stat"><strong id="sc">0</strong>筆符合</div>
  </div>
</div>
<div class="tag-bar" id="tagbar"></div>
<div class="result-area">
  <div class="result-header">
    <div class="result-count" id="rc"></div>
    <div class="sort-row">
      <button class="sort-btn on" id="sb-rel" onclick="setSortBy('rel')">相關度</button>
      <button class="sort-btn" id="sb-name" onclick="setSortBy('name')">名稱排序</button>
    </div>
  </div>
  <div class="cards" id="cards"></div>
  <div class="pg" id="pg"></div>
</div>

<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-head">
      <h2 id="m-name"></h2>
      <div class="cn-line" id="m-cn"></div>
      <div class="code-line" id="m-code"></div>
      <button class="modal-close" onclick="closeModalBtn()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
const ALL=[{"n":"A.B.AB.O blood grouping","cn":"血型測定","c":"T11X001","ins":"11001C","sp":"Blood-室溫保存","ct":"EDTA試管(紫頭)","d":"1ml以上","g":"急檢血庫組","st":"週一～週五  08:00~20:00           週六 08:00~16:00           週日 13:00~17:00           院內檢體24小時收檢","rt":"當日","rv":"Type A , B , O , AB","cl":"人類的ABO血型抗體屬於同種凝集素（isoagglutinin），即人類彼此間可產生凝聚反應的抗體，有anti-A又稱α-agglutinin，可與Ａ抗原凝聚反應anti-B又稱β-agglutinin抗原凝聚反應，利用此反應可作為鑑定血型的依據。測定ABO血型可作為輸血時血型之確認，避免輸錯血；對產婦及新生兒而言，也可評估因血型不合所產生的溶血性疾病。","ref":"","note":"（1）血液惡性病及癌症病人在紅血球細胞上的A抗原或B抗原可能會減弱，而導致血型之改變，影響判讀。 （2）異常的血漿蛋白、冷凝集素、Direct coombs’test陽性血液及受細菌污染的血液均可能干擾血型判讀。 （1）檢體避免凝固。","tags":["輸血/血型"]},{"n":"Acetaminophen","cn":"乙醯對氨基酚","c":"T05XJ803","ins":"10803B","sp":"Serum（血清）","ct":"含Gel血清試管","d":"3ml以上","g":"大安聯合醫事檢驗所代檢","st":"週一～週五  08:00~20:00           週六 08:00~16:00           週日 13:00~17:00           院內檢體24小時收檢","rt":"3個工作天","rv":"治療濃度：10-30μg/mL 中毒劑量：4小時大於150μg/mL，12小時大於50μg/mL","cl":"乙醯氨酚(acetaminophen)是一種廣泛使用的鎮痛劑和退熱劑，是一個常用於很多配方的藥物。用藥後快速且完全由腸胃道吸收，且於1小時內達血漿中最高濃度(peak)，90%治療劑量之acetaminophen與glucoronic acid結合且經由肝臟代謝，3-5%則經由P-450代謝後經由尿液排出體外，僅少量以原始藥物型態排出。在肝臟代謝之中間產物為造成肝臟毒性之主要物質。 治療劑量之acetaminophen在體內之半衰期約2~3小時，在小孩(新生兒除外)代謝速度較快，在肝臟疾病及酗酒患者代謝速率相對較慢。Acetaminophen不具抗發炎反應且不影響血液凝固。服用大於15 g之acetaminophen可造成嚴重肝臟破壞，因此快速及準確的測定乙醯氨酚是有需要的。 當服用過量時，可能導致嚴重的肝臟和腎臟損傷或死亡。Acetaminophen急性過量後，患者早期可能有輕微或沒有症狀。定量測量血清Acetaminophen濃度提供可靠的早期診斷依據。臨床證據顯示通常在攝入後24小時或更長時間後才出現肝臟和腎臟延遲損害，已超過預防性解毒劑acetylcysteine可以有效施用的時間。但acetylcysteine在預防肝損傷方面非常有效，特別是在過量服藥的8-10小時內施用，並且在過量服藥後12-16小時內施用能改善肝功能衰竭患者的存活率。 此藥物可能會造成急性腎小管壞死、胰臟炎、與心肌壞死。","ref":"血液檢查：CBC-I。 生化檢查：GLU、BUN、CRE、AST、ALT。","note":"資料來源：大安聯合檢驗目錄。","tags":["肝臟","腎臟"]},{"n":"Acetylcholine Receptor Ab","cn":"乙醯膽鹼抗體","c":"T05XL181","ins":"12181C","sp":"Serum（血清）","ct":"含Gel血清試管","d":"3ml以上，分裝成2管血清","g":"大安聯合轉台北病理中心","st":"週一～週五  08:00~20:00           週六 08:00~16:00           週日 13:00~17:00           院內檢體24小時收檢","rt":"9-18個工作天","rv":"＜0.5 nmoles/L","cl":"重症肌無力是一種自體免疫疾病,由於人體胸腺中不正常淋巴球增生,產生對抗自體acetylcholine receptor的抗體,造成神經肌肉傳導錯誤,而抗體的測量可當作疾病診斷的評估值。成人和胎兒的acetylcholine receptor類型組成是不同於它的subunits，當成人時接受器其epsilon subunit會取代胎兒期接受器的delta subunit。另外，AChRAb在血清中可辨識胎兒接受器與成人接受器類型的差別。此試劑可以容易地去使用並提供一個特定及敏感的分析化驗,才能在重症肌無力病人中有90%的AChRAb偵測率。","ref":"","note":"溶血、脂血 1.病人需空腹，避免脂血。 2.如需稀釋或複驗，則再延一批次發報告。 3.血清分裝成2管，冷凍保存，每管至少0.5 C.C.。","tags":["自體免疫"]},{"n":"ACTH","cn":"血清促腎上腺皮質素","c":"T05XI119","ins":"09119B","sp":"儘速離心-Plasma 冷凍","ct":"EDTA紫頭管","d":"plasma 1ml以上","g":"聯合醫事檢驗所代檢","st":"週一～週五  08:00~20:00           週六 08:00~16:00           週日 13:00~17:00           院內檢體24小時收檢","rt":"3個工作天","rv":"7.9-47.1 pg/ml 。","cl":"ACTH是由腦下垂體前葉腺分泌，刺激腎上腺分泌皮質醇及雄性素。ACTH生理濃度會隨日夜有所起伏，早上6-8點濃度最高，下午6-11點濃度最低。常用來診斷庫辛氏症候群，ectopic以及腫瘤治療效果評估。 上升：腦下腺ACTH分泌亢進及ACTH分泌性腫瘤的庫辛氏症候群、原發性腎上腺功能不全、使用類固醇。 下降：腎上腺腫瘤之辛氏症候群、原發性腎上腺皮質功能亢進。","ref":"","note":"（1）早上6-8點濃度最高，下午6-11點濃度最低立即離心。 （2）立即冰浴送檢，或冷凍保存。 （3） 若有PRA須依同送檢時，請先分裝成2管後再冷凍送檢，並注意檢體量分別需1ml，請勿單送一管共用。 （4）資料來源：聯合檢驗目錄2011第10頁。","tags":["腎臟","腫瘤標記"]},{"n":"ADA","cn":"腺甘脫胺酶","c":"T12X102 for Pleural/Ascites/Pericardial\nT09X1021 for other body fluid","ins":"","sp":"Body Fluid","ct":"不含Gel血清試管","d":"2 ml以上","g":"軌道組","st":"週一～週五  08:00~20:00           週六 08:00~16:00           週日 13:00~17:00           院內檢體24小時收檢","rt":"7個工作天","rv":"BF：＜40 U/L CSF：＜9 U/L","cl":"","ref":"","note":"參考值僅適用於Pleural effusion","tags":["生化"]},{"n":"Adenovirus 40/41 Ag test","cn":"腺病毒抗原檢查","c":"T05XN064","ins":"14064B","sp":"Stool（糞便）","ct":"一般糞盒","d":"一粒花生米大小","g":"台中榮民總醫院代檢","st":"週一～週五  08:00~20:00           週六 08:00~16:00           週日 13:00~17:00           院內檢體24小時收檢","rt":"5個工作天","rv":"Negative","cl":"腺病毒可引起呼吸道感染,出血性結膜炎,腸胃炎及腦膜炎等疾病。偵測腺病毒抗原可作為診斷的參考。","ref":"無。","note":"無。 稀便至少1mL。","tags":["糞便","感染"]},{"n":"AFP α-fetoprotein","cn":"α－胎兒蛋白檢查","c":"T09X902","ins":"12007C","sp":"Serum（血清）、Plasma(血漿)","ct":"含Gel血清試管、含Li-Heparin試管","d":"4 mL以上","g":"軌道組","st":"週一～週五  08:00~20:00           週六 08:00~16:00           週日 13:00~17:00           院內檢體24小時收檢","rt":"8小時","rv":"0-9 ng/mL","cl":"AFP為一種醣蛋白，在胎兒的肝臟、卵囊及消化道中合成，正常成人體內不製造，臨床上用於追蹤肝硬化、肝癌及評估胎兒唐氏症、神經管缺損之發生率。原發性之肝 或橋本氏甲狀腺炎(Hashimoto’s disease)非常有用。","ref":"無。","note":"無。","tags":["甲狀腺","自體免疫"]},{"n":"Anti-β2-glycoprotein-I Ab","cn":"抗β2醣蛋白抗體","c":"T12X133","ins":"12133B","sp":"Serum（血清）、Plasma(血漿)","ct":"含Gel血清試管、含Heparin、檸檬 \n          酸、EDTA抗凝劑之抗凝管","d":"3ml以上","g":"台中醫院醫事檢驗科特檢組","st":"週一～週五  08:00~20:00           週六 08:00~16:00           週日 13:00~17:00           院內檢體24小時收檢","rt":"3個工作天","rv":"Negative：＜7 U/mL Weak positive：7-10 U/mL Positive：＞10 U/mL","cl":"1. 抗磷脂症候群（APS），亦是我們所稱的”Hughes syndrome”，是以典型的臨床症狀 為特徵，例如動脈或靜脈的血栓形成，或者是習慣性流產伴隨抗磷脂抗體測試陽性。 2. 抗磷脂症候群的分類標準於2004年在雪梨被修訂，除了臨床的分類標準之外，另列 出3項實驗室檢測項目：狼瘡性抗凝素（lupus anticoagulant, LA）、抗心磷脂抗體 （IgG/IgM）以及抗β2-glycoprotein I抗體（IgG/IgM）。其中抗β2-glycoprotein I抗體 被認為是血栓形成與妊娠併發症的風險因子。 3. 在APS診斷上，抗β2-glycoprotein I抗體顯示出較抗心磷脂抗體高的特異性，3-10% 的APS病人中，抗β2-glycoprotein I抗體可能是唯一陽性的檢測。抗 β2-glycoprotein I抗體與子癲前症/子癲症的相關性可以幫助妊娠症候群的判定。 4. 抗β2-glycoprotein I抗體檢測可以幫助APS的診斷，尤其是APS症狀明顯但抗心磷 脂抗體與狼瘡性抗凝素檢測結果為陰性的病患。","ref":"Anti-Cardiolipin IgM、Lupus Anticoagulant、Anti-B2GPI IgM","note":"（1）檢體可保存在2-8℃約7天，如超過7天需保存在-20℃（分析冷凍檢體，只可解凍 一次避免重複冷凍解凍分析物變質）。","tags":["特殊檢驗"]},{"n":"Anti-β2GPI IgM","cn":"抗β2醣蛋白I抗體IgM","c":"T05XAD201","ins":"12133B","sp":"serum","ct":"含Gel血清試管","d":"3 c.c","g":"大安聯合醫事檢驗所","st":"不限","rt":"10個工作天","rv":"Negative：≦20.0 SMU； Positive： >20.0 SMU","cl":"β2醣蛋白I又名脂蛋白原H(Apolipoprotein H、Apo-H、β2GPI)是一種分子量為54 kDa蛋白質的血清輔因子，具有抑制內在凝血途徑的作用，與血液凝固的調節、抗磷脂症候群的流產有關。抗心脂抗體的作用活性需要β2醣蛋白I，產生抗β2醣蛋白I抗體，自體免疫疾病的硬化、狼瘡在臨床上表現栓塞特徵與此抗體明顯相關。 抗體濃度和靜脈血栓的形成具有相關性，IgM的抗體濃度和動脈血栓形成亦有很好的相關性。對於抗磷脂症候群檢驗，抗β2醣蛋白I抗體，比抗心磷脂抗體具有特異性。","ref":"Anti-β2GPI IgG、Lupus Anticoagulant test、Anti-cardiolipin IgG and IgM。","note":"","tags":["凝血","自體免疫"]},{"n":"APCA（Anti-Gastric Parietal Cell Ab）","cn":"壁細胞抗體","c":"T05XL058","ins":"12058B","sp":"Serum（血清）","ct":"含Gel血清試管","d":"3ml以上","g":"聯合醫事檢驗所代檢","st":"週一～週五  08:00~20:00           週六 08:00~16:00           週日 13:00~17:00           院內檢體24小時收檢","rt":"7個工作天","rv":"1：10X (-)","cl":"Gastric parietal cell是胃壁表皮細胞，負責分泌胃酸以消化蛋白質，在惡性貧血 及其他位部疾病的病人身上產生自體免疫抗體。","ref" l":"無","ref":"","note":"","tags":["尿液"]},{"n":"AQP4 autoantibody","cn":"水通道蛋白4自體抗體","c":"T05XCL53","ins":"12210B","sp":"血清-冷藏送檢","ct":"血清分離管","d":"血清2 ml","g":"大安聯合醫事檢驗所","st":"W1-W5(國定例假日除外)","rt":"35個工作天","rv":"Negative","cl":"視神經脊髓炎(neuromyelitis optica)，簡稱為NMO，是一種自體免疫疾病，視神經脊髓炎患者會反復出現視覺障礙、眼部麻痹和疼痛等症狀，這些症狀與多發性硬化症(簡稱為MS)類似，診斷容易混淆。但治療方式不同，干擾素治療可減少多發性硬化症急性發作的頻率，是臨床治療多發性硬化症最重要的藥物之一，卻對視神經脊髓炎患者有害無益，甚或可能增加其急性發作。視神經脊髓炎目前的診斷依賴臨床症狀、MRI影像大於三節脊髓的病灶及血清AQP4自體抗體，血清AQP4自體抗體是視神經脊髓炎的特異性抗體，偵測AQP4自體抗體有助於醫師在臨床上對視神經脊髓炎的早期診斷，以便選擇適當的治療方式。。","ref":"無","note":"無 無","tags":["自體免疫"]},{"n":"Anti-CTD Screen","cn":"CTD自體抗體篩檢","c":"T12X0631","ins":"12063B01","sp":"Serum（血清）、Plasma(血漿)","ct":"含Gel血清試管、含Heparin、檸檬 \n          酸、EDTA抗凝劑之抗凝管","d":"3ml以上","g":"台中醫院醫事檢驗科特檢組","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00           院內檢體24小時收檢","rt":"3天","rv":"陰性：< 0.7 ratio 無法判定：0.7-1.0 ratio 陽性：> 1.0 ratio","cl":"1、利用CTD Screen 可初步排除是否為自體免疫性疾病。 2、在臨床上協助診斷全身性紅斑狼瘡（systemic lupus erythematosus；SLE）、混 合性結締組織疾病(MCTD)、Sjögren 氏症候群、硬皮症、以及多發性肌炎/皮肌 炎。 3、若篩檢為陽性，需進一步檢測單一項自體抗體項目鑑別自體抗體的種類，以評估可能為 何種自體免疫疾病。","ref":"ANA、Anti-ENA panel。","note":"溶血、脂血。 （1）檢體可保存在2-8℃約7天，如超過7天需保存在-20℃（分析冷凍檢體，只可解凍一 次避免重複冷凍解凍分析物變質）。","tags":["特殊檢驗","自體免疫"]},{"n":"Anti-HDV","cn":"D型肝炎抗體","c":"T05XN041","ins":"14041B","sp":"Serum","ct":"含Gel血清試管","d":"5 ml","g":"大安聯合醫事檢驗所","st":"週一～週五 08:00~20:00 週六 08:00~16:00 週日 13:00~17:00 院內檢體24 小時收檢","rt":"7個工作天","rv":"一、參考值： Non-Reactive：<1.000，Reactive≧1.000，Index","cl":"HDV是目前所發現最小的動物病毒(Rizzetto et al.，1980)，其病毒顆粒是由B型肝炎病毒表面抗原(hepatitis B surface antigen，HBsAg)、D型肝炎病毒抗原(hepatitis delta antigen，HDAg)以及HDV RNA 所組成。 HDV必須伴隨HBV才能造成宿主的感染，進而引發慢性肝炎或猛爆性肝炎(chronic or fulminate hepatitis)等疾病。。","ref":"HBV antibodies、Hepatitis B DNA Quantitative","note":"無。 (1)貯存在2-8℃，採檢至操作不超過六天，遇連續假日前一天起請勿採檢 (2)資料來源：大安聯合醫事檢驗所網站。","tags":["肝臟","感染"]},{"n":"Amylase (urine)","cn":"尿中澱粉酶","c":"T09X01704","ins":"09017C04","sp":"Urine(尿液)","ct":"不含抗凝劑及Gel之血清試管\n          (裝尿液檢體)","d":"2 ml以上","g":"中央實驗室軌道組/            週日 13:00~17:00           院內檢體24小時收檢","rt":"3個工作天","rv":"5.1-20.2 ug/L","cl":"Bone Alkaline Phosphatase，BAP或Ostase 是骨質代謝中之生物指標。骨質是一個不斷在進行新陳代謝活動的組織，其造骨與噬骨細胞交替進行造骨與噬骨的動作以達到新陳代謝的作用，BAP 是一種糖蛋白 (tetrameric glycoprotein) Carboxy-terminal glycan-phosphatidyl- inosital anchor 附著於骨細胞膜上。血清中的BAP是造骨細胞在進行造骨活動時所分泌出 來的一種酵素，經磷酯酵素作用釋出於血液循環中，其濃度可反應造骨細胞的代謝狀況、了解代謝骨骼疾病的嚴重程度及對治療的反應。可供監測的的疾病包括有Paget’s disease、成骨不全症、骨質疏鬆症、原發性副甲狀腺進症及癌症骨轉移。治療(HRT)後，血清BAP濃度會下降。大部分的骨質疏鬆患者發生於停經後女人雌激素 E2 的缺乏，以及卵巢切除的病人。大量骨質流失乃在於合成與流失作用之失調，停經後缺乏雌激素分泌。幾個研究報告顯示，Ostase濃度可於3至6個月內降低25%作為治療效果的判斷，此比一般X光及超音波檢查需要長達兩年以上才測得出骨質 ± 3% 的差異，更有效的追蹤治療效果。","ref":"","note":"資料來源：聯合醫事檢驗所網站","tags":["腫瘤標記","甲狀腺"]},{"n":"BUN, blood urea nitrogen","cn":"血中尿素氮","c":"T09X002","ins":"09002C","sp":"Serum（血清）、Plasma（血漿）","ct":"含Gel血清試管、\n          含Li-Heparin抗凝劑的heparin管","d":"2 ml以上","g":"台中醫院醫事檢驗科 軌道組","st":"週一～週五  08:00~20:00           週六 08:00~16:00           週日 13:00~17:00           院內檢體24小時收檢","rt":"一般件8小時/急件:40分鐘","rv":"7-25 mg/dl","cl":"BUN的濃度通常受每天攝食的蛋白質總量、體內蛋白質異化作用產生的尿素及腎臟排泄尿素的速率影響而有變動。 異常上升： （1）尿素產生過多：高蛋白質飲食、高燒、癌症、外傷、腸道出血等。 （2）尿素排泄障礙：急性或慢性腎疾病、乏尿、脫水等。 異常下降： 攝取低蛋白質和高碳水化合物的食物、晚期懷孕時、肝機能不佳、藥物中毒、吸收不良等。","ref":"（1）尿液檢查：Urine Routine（含 Sediment）。 （2）糞便檢查：OB test。 （3）血液檢查：CBC-III、Blood routine。 （4）生化檢查：GLU、CRE、ALB、Total Protein、Na、K、Cl、Amy、Lipase 、Ca、IP、UA、HDL、LDL、Triglycerides、肝機能檢查、CCr。 （5）血清檢查： VDRL/RPR Test (STS)、ASLO（nephelometry）、補體檢查、CRP、 Homocysteine、甲狀腺機能檢查、C3、C4。 （6）urine（blood）osmolarity test。","note":"（1）高血脂檢體(>3+)應該另行離心避免干擾。 （2）下列物質被檢驗出會影響尿素氮的測試方法： L-Dopa＞ 40μg/mL、 Methylbenzethonium Chloride＞ 0.5 mg/dL 無。","tags":["肝臟","腎臟","腫瘤標記"]},{"n":"C'3","cn":"血液補體-3測定","c":"T09X913","ins":"12034B","sp":"Serum（血清）","ct":"含Gel血清試管","d":"4ml以上","g":"台中醫院醫事檢驗科軌道組","st":"週一～週五  08:00~20:00           週六 08:00~16:00           週日 13:00~17:00           院內檢體24小時收檢","rt":"3個工作天","rv":"87.00～200.00 mg/dL 。","cl":"1、補體系統能經由傳統（classical）路徑與替換（alternative）路徑而被活化。這兩個途徑其後會一起進入一個共同的終端路徑。由於補體因子C3會共同參與這兩個途徑，因此可評估C3與其分解產物（包括C3c）的濃度，以此作為補體系統被活化的參數。濃度下降表示了活化。透過測定C4可得到額外的鑑別作用（differentiation）。如C4的濃度是正常，則有可能活化了替換路徑。 2、補體可經由細菌內毒素、發炎期間蛋白質溶解酵素的釋放以及抗原抗體複合物的刺激而在血液中進行酵素系統的交互作用。 3、補體系統是一種連續性的複合蛋白質，它在許多形態的免疫反應系統中伴演了很重要的角色例如：溶血（hemolysis）、細胞毒性（cytotoxicity）、血管滲透能力降低時、吞噬作用、免疫附著力（immune adherences）（如附著於淋巴球與吞噬細胞膜上）等。 4、補體是由9種蛋白質及酵素所組成C1-C9；C3是第三種補體，所以很容易被測出來，具溶血活性的C3是C3b片斷，它僅存在於新鮮的血清中，它可轉變為不具活性的形態~ C3d，經37℃保溫72小時，存放在4℃好幾個星期或用ether zymosan或hydrazine 處理過後便可得之。 5、 C3降低的情況： 可見於多種發炎性與感染性疾病。急性腎絲球腎炎、狼瘡腎炎、菌血症組織傷害、新生兒呼吸困難症候群，而且時常伴有高的γ-球蛋白。 6 、C3增加的情況： 急性發炎性疾病、特異性的皮膚炎、全身性感染、非感染性的慢性發炎性疾病（主要是慢性多發性關節炎）及生理狀態（懷孕）。","ref":"無。","note":"檢體為血清種類時溶血500 mg/dl、黃疸（Icterus）40 mg/dl、高血脂（Lipemia）500 mg/dl及RF陽性的檢體中(15-1838 IU/mL)以上時有干擾。 無。","tags":["腎臟","感染"]},{"n":"C'4","cn":"血液補體-4測定","c":"T09X914","ins":"12038B","sp":"Serum（血清）","ct":"含Gel血清試管","d":"4ml以上","g":"台中醫院醫事檢驗科軌道組","st":"週一～週五  08:00~20:00           週六 08:00~16:00           週日 13:00~17:00           院內檢體24小時收檢","rt":"3個工作天","rv":"19.00～52.00 mg/dL 。","cl":"1、補體系統能經由傳統（classical）路徑與替換（alternative）路徑而被活化。補體因子 C4是透過傳統路徑而參與這活化過程。C4濃度下降是常見的，但完全消失則較罕見。 2、補體可經由細菌內毒素、發炎期間蛋白質溶解酵素的釋放以及抗原抗體複合物的刺激而在血液中進行酵素系統的交互作用。 3、補體系統是一種連續性的複合蛋白質，它在許多形態的免疫反應系統中伴演了很重要的角色例如：溶血 (hemolysis)、細胞毒性(cytotoxicity)、血管滲透能力降低時、吞噬作用、免疫附著力 (immune adherences)(如附著於淋巴球與吞噬細胞膜上)等。 4、補體是由9種蛋白質及酵素所組成，C4在典型路徑作用有下降的現象，C4通常是以抗原抗體複合物的形態存在。 5 、C4降低的情況：免疫複合體疾病、全身性紅斑狼瘡（SLE）、自體免疫性甲狀腺炎及幼年型皮肌炎。 6 、C4增加的情況：急性發炎性疾病期、全身性感染、非感染性的慢性發炎性疾病（主要是慢性多發性關節炎）及生理狀態（懷孕）。","ref":"無。","note":"檢體為血清種類時溶血500 mg/dl、黃疸（Icterus）40 mg/dl、高血脂（Lipemia）500 mg/dl及RF陽性的檢體中(15-1838 IU/mL)以上時有干擾。 無。","tags":["甲狀腺","感染","自體免疫"]},{"n":"Ca （Blood）","cn":"鈣","c":"T09X011","ins":"09011C","sp":"Serum（血清）、Plasma（血漿）","ct":"含Gel血清試管、Li-Heparin 綠頭管","d":"2 ml以上","g":"軌道組","st":"週一～週五  08:00~20:00           週六 08:00~16:00           週日 13:00~17:00           院內檢體24小時收檢","rt":"一般件8小時/急件:40分鐘","rv":"8.6-10.3 mg/dl","cl":"血清鈣的數值發生異常時，可能與骨骼疾病、副甲狀腺疾病及Vit D的作用有關。 異常上升： （1）副甲狀腺功能亢進症（HPT）、甲狀腺功能亢進症。 （2）Vit D中毒。 （3）惡性腫瘤、多發性骨髓癌。 （4）牛奶鹼症候群、Addison's disease。 （5）藥物影響，如：利尿劑、毛地黃。 異常下降： （1）副甲狀腺機能低下症。 （ ,"rt":"8小時","rv":"＜35 U/mL","cl":"（1）血清中CA 125抗原的量可用來幫助監控上皮卵巢癌病人治療的反應。 （2）在其他非上皮卵巢癌的疾病中，也有可能會上升，包括其他良性或惡性的卵巢 疾病例如子宮內膜異位、肺癌、或是非癌症狀況例如懷孕。","ref":"無。","note":"無。 不應作為癌症篩檢測試。","tags":["腫瘤標記"]},{"n":"CA-153","cn":"CA-153腫瘤標記","c":"T09X918","ins":"12078C","sp":"Serum、Plasma","ct":"含Gel血清試管\n           Li-Heparin抗凝管","d":"4ml以上","g":"台中醫院醫事檢驗科 軌道組","st":"週一～週五  08:00~20:00           週六 08:00~16:00           週日 13:00~17:00           院內檢體24小時收檢","rt":"8小時","rv":"＜23.5 U/mL","cl":"（1）在上皮乳房細胞腫瘤的病人中，很多都有CA 15-3抗原上升的現象。 （2）CA 15-3抗原上升也會表現在肺癌、胰臟癌、大腸直腸癌以及一些非惡性 疾病的病人中，如良性的乳房疾病、肝病、肝硬化及肝炎。","ref":"無。","note":"無。 不應以Access BR Monitor 化驗做為癌症篩檢測試。","tags":["肝臟","腫瘤標記"]},{"n":"CA-199","cn":"CA-199腫瘤標記","c":"T09X919","ins":"12079C","sp":"Serum、Plasma","ct":"含Gel血清試管\n           Li-Heparin抗凝管","d":"4ml以上","g":"台中醫院醫事檢驗科 軌道組","st":"週一～週五  08:00~20:00           週六 08:00~16:00           週日 13:00~17:00           院內檢體24小時收檢","rt":"8小時","rv":"＜35 U/mL","cl":"（1）CA 19-9抗原是一個與路易斯血型相關的黏蛋白，並且為腫瘤相關抗原。 （2）CA 19-9抗原可由正常人類的胰臟細胞、膽管細胞、胃內膜細胞、大腸內膜細胞、以及唾液腺表皮細胞所合成。一般而言，只有少量的CA 19-9抗原會表現在正常人或是有良性腫瘤病人的血液循環中。大部分罹患胰臟癌的病人，血液中CA 19-9抗原的濃度會有上升的現象。 （3）CA 19-9抗原起初是在大腸直腸癌的病人中被發現的，之後陸續發現在胰臟癌、膽管癌、肝癌、胃癌還有食道炎的病人中也有CA 19-9抗原存在。但在沒有罹患癌症的病人體內也有CA 19-9抗原上升的現象，例如：肝硬化、膽道炎、肝炎、胰臟炎以及非惡性的胃腸疾病。","ref":"無。","note":"無。 1.不應作為癌症篩檢測試。 2.當體內生物素濃度> 25 ng/mL，可能會使CA-199結果出現顯著的(> 10%) 負偏差。","tags":["肝臟","腫瘤標記"]},{"n":"CA72-4","cn":"CA72-4腫瘤標記","c":"T12XCL010","ins":"218006","sp":"Serum（血清）","ct":"含Gel血清試管，K2-EDTA，\n           K3-EDTA，Lithium-Heparin採血管","d":"4ml以上","g":"中央實驗室特檢組","st":"週一～週五  08:00~20:00           週六 08:00~16:00           週日 13:00~17:00           院內檢體24小時收檢","rt":"3個工作天","rv":"＜6.9 U/ml","cl":"（1）良性疾病：罹患下列良性疾病的病人，其血清CA 72-4數值會上升：胰臟炎、肝硬化、良性卵巢疾病、卵巢囊腫、乳房疾病、及良性胃腸道異常。對於良性疾病具有特別地高的診斷特異性。 （2）胃癌：對於良性胃腸道疾病，有28-80%的診斷敏感度(更通常地是40-46%)和> 95%的診斷特異性被報告。CA 72-4濃度亦具有預後的價值。 （3）卵巢癌：有47-80%的診斷敏感度被報告。而在黏液性卵巢癌，CA 72-4的診斷敏感度比CA 125的要高。這兩個標記如合併使用，對於初步的診斷有73%加成的診斷敏感(CA 125單獨: 60%)，而對於監控目的則有67%加成的診斷敏感度(CA 125單獨: 60%)。 （4）結腸直腸癌：診斷敏感度是20-41%，這與Dukes的臨床分期具有相關性。而對於結腸的良性疾病，CA 72-4的診斷特異性是98%。當完全切除後, CA 72-4會明顯下降。在長期控制裏，當殘餘的腫瘤仍存在時，CA 72-4的濃度會依然保持上升。在手術後控制復發時，合併使用CA 72-4和癌胚抗原(CEA)能使診斷敏感度由78%增加至87%。","ref":"病理切片。","note":"溶血、脂血、黃疸 避免溶血","tags":["特殊檢驗","肝臟","腫瘤標記"]},{"n":"Catecholamine","cn":"兒荼酚酶測定","c":"T05XI077","ins":"09077B","sp":"24小時酸化Urine","ct":"尿液收集桶 / 無菌盒","d":"20ml（標示總量）","g":"大安聯合醫事檢驗所代檢","st":"不限","rt":"10個工作天","rv":"Epinephrine     ：＜27 ug/day Nonepinephrine  ：＜97 ug/day Dopamine      ：＜500 ug/day","cl":"Catecholamine，尿液分劃NEP、EP、Dopamine，前兩者來自腎上腺，而這三個成份都可以由神經末稍分泌，作用在血液流動及血壓控制。 上昇於嗜鉻細胞瘤，神經母細胞瘤，腎上腺腫瘤，Carcinoid syndrome (類癌症候群)，燒傷、激烈運動、壓力(憤怒焦慮)。 Dopamine在癌症轉移時，上升的幅度與腫瘤負擔成正比。","ref":"VMA。","note":"無。 （1）收集期間需冷藏保存，因在室溫下不穩定。 （2）尿液收集桶內預先放置20 mL 6N鹽酸(HCl)。 （3）在醫師的同意下，收集尿液的前三天停止phenothiazine、抗高血壓藥物、levodopa(停兩週)。直到最後一次滿24小時收集尿液後回復。 （4）在收集尿液時不建議作激烈運動。 （5）採檢前72小時禁食Aspirin、抗血壓藥、香蕉、酪梨、柑橘類、啤酒、葡萄酒、咖啡、茶、巧克力、可可、香草、胡桃。 （6）檢體退件：檢體量不足10 mL；尿液pH值 ≧8。","tags":["腎臟","腫瘤標記"]},{"n":"Calcitonin","cn":"降血鈣素","c":"T05XI115","ins":"09115B","sp":"儘速離心-Serum 冷凍","ct":"含Gel血清試管","d":"3ml以上","g":"大安聯合醫事檢驗所代檢","st":"不限","rt":"10個工作天","rv":"Male：≦18.2 pg/mL Female：≦11.5 pg/mL","cl":"","ref":"（1）血液檢查：CBC-I、白血球分類。 （2）生化檢查：BUN、CRE。 （3）CEA。","note":"血清儘速離心冷凍。","tags":["生化"]},{"n":"Carbamazepine","cn":"卡巴馬平","c":"T10X501","ins":"10501B","sp":"Serum（血清）、Plasma（血漿）","ct":"含Gel血清試管、\n          含Li-Heparin抗凝劑的Heparin管","d":"2 mL以上","g":"台中醫院醫事檢驗科 軌道組","st":"24小時收檢","rt":"40分鐘","rv":"Therapeutic：4.0 - 12.0 ug/ mL","cl":"Carbamazepine (Tegretol) (痛痙丁)用以治療癲癇大發作、混合型、其他局部或全身性痙攣，高於12 mcg/ml屬於中毒水平。在精神科的使用，主要是用在治療躁鬱症的患者，雖然鋰鹽是最早被使用的藥物，但有一些對鋰鹽效果不好的患者，或是快速循環期發作的躁鬱症患者，此藥物是可以作為治療上選擇的藥物，在使用時期需要定期監測病患血中濃度，以確定治療的效果。Carbamazepine常見的副作用有：口乾、頭痛、暈眩、嗜睡、運動失調等情形，尤其在使用初期最容易出現。但有一些嚴重的副作用，如：Stevens-Johnson症、骨髓抑制﹝白血球降低、血小板數降低等﹞、肝炎、心臟傳導異常等現象。但此些副作用大都是可以恢復的，只要在發現後，停藥觀察，大部分是可以恢復的。所以如果病患在使用此藥物時，需要定期作常規血球檢驗來追蹤，以策安全。","ref":"（1）肝功能、血液以及尿液分析。 （2）每月的血液檢查，包括全血檢查、白血球分類及血小板數目測定。","note":"（1）本藥在體內代謝率與投藥量、併用藥物及患者的肝腎功能有關。 （2）關於分析使用老鼠抗體，可能存在的影響是檢體內的human anti-mouse antibodies (HAMA)。人體抗老鼠抗體 d":"4 mL以上","g":"中央實驗室軌道組","st":"週一～週五  08:00~20:00           週六 08:00~16:00           週日 13:00~17:00           院內檢體24小時收檢","rt":"8小時","rv":"(依原廠試劑說明書)","cl":"CEA為最常用的癌症指標，可用以監測癌症的病情進展及治療後是否復發，CEA存在 於消化道及胎兒的血清中，但高濃度的血清CEA出現在結腸直腸的癌症患者。但是單 次CEA上升不一定代表癌症的發生。 高度增加：轉移性肝癌、大腸癌、胰臟癌、肺癌、胃癌等。 輕度增加：肝硬化、慢性肝炎、乳癌、食道癌、甲狀腺癌等。","ref":"","note":"","tags":["肝臟","腫瘤標記","甲狀腺"]},{"n":"Ceruloplasmin (Nephelometry)","cn":"轉銅素","c":"T05XL050","ins":"12050B","sp":"Serum（血清）","ct":"含Gel血清試管","d":"3ml以上","g":"聯合醫事檢驗所代檢","st":"週一～週五  08:00~20:00           週六 08:00~16:00           週日 13:00~17:00           院內檢體24小時收檢","rt":"3個工作天","rv":"17-31 mg/dL 。","cl":"Ceruloplasmin為一運送銅的蛋白質，亦可協助鐵的取用，是一種急性期反應物質，在臨床上最常使用於Wilson’s disease的診斷，因為肝臟製造Ceruloplasmin偏低，造成銅在組織的沉積，引起肝、腦的傷害病變。 上升：1. Cu缺乏症、2.急性發炎反應。","ref":"肝功能、血清Cu、24小時尿液Cu 。","note":"無。 無。 資料來源：聯合檢驗目錄2011第71頁。","tags":["肝臟"]},{"n":"CH50","cn":"補體溶血分析","c":"T05XL104","ins":"12104B","sp":"Serum（血清）","ct":"含Gel血清試管","d":"3ml以上","g":"中榮免疫風濕科代檢","st":"週一～週五  08:00~20:00           週六 08:00~16:00           週日 13:00~17:00           院內檢體24小時收檢","rt":"一個月內發報告","rv":"41.68 ~ 95.06 U/mL","cl":"（1）CH50為評估補體功能的指標。 （2）自體免疫疾病、感染過程、惡性腫瘤，會啟動體內免疫機制，抗原抗體結合惠耗掉補體導致CH50降低。","ref":"無。","note":"無。 取血清冷凍送檢。","tags":["免疫","腫瘤標記","感染","自體免疫"]},{"n":"Chlamydia Pneumonia IgG","cn":"肺炎披衣菌IgG","c":"T05XL190","ins":"12190C","sp":"Blood","ct":"含Gel血清試管","d":"3ml以上","g":"彰化基督教醫院檢驗醫學科代檢","st":"週一～週五  08:00~20:00           週六 08:00~16:00           週日 13:00~17:00           院內檢體24小時收檢","rt":"10個工作天","rv":"Negative：＜12 AU/mL Equivocal：12~18 AU/mL Positive：＞18 AU/mL","cl":"Chlamydia spp.是革蘭氏陰性細菌，具有強制性細胞內高寄生。大部分披衣菌肺炎感染是溫和且無症狀的，但可能造成嚴重的疾病，如咽喉炎、鼻竇炎、急性支氣管炎和社區型的肺炎。沒有檢查與治療會導致病情延長與持續。最近資料顯示披衣菌肺炎感染與一些慢性疾病相關，在兒童族群間披衣菌肺炎的血清學感染盛行率較低，隨著年齡增加而顯著提高，且仍然維持高比率於年長者(>50％)。血清學的試驗是常規性且無侵犯性的工具用來測定包括深部與慢性披衣菌感染。初次披衣菌感染其特性是IgM抗體在2~4週內有明顯的反應，然後IgG與IgA抗體在6~8週內隨後反應。急性披衣菌肺炎感染之後，IgM抗體通常在2~6個月內消失，IgG抗體的效價則慢慢降低，然而IgA抗體則會迅速的消失，當被懷疑是初次感染，IgM具有高度的診斷價值，然而，再感染或慢性感染IgM的出現率是較慢的，因此IgM抗體沒有出現並不能排除現在沒有感染，再感染時，IgG與IgA的效價通常1~2週內快速上升。","ref":"","note":"嚴重溶血(≧4+)、嚴重脂血(≧4+)，將以退件處理 (1)須檢附採檢時間、健保卡號、ICD10診斷碼。 (2)資料來源：彰化基督教醫院檢驗醫學科代檢網站。","tags":["感染"]},{"n":"Chlamydia Pneumonia IgM","cn":"肺炎披衣菌IgM","c":"T12X189","ins":"12189C","sp":"血清","ct":"含Gel血清試管","d":"3ml以上","g":"台中醫院醫事檢驗科\n           特檢組＆急檢組","st":"週一～週五  08:00~20:00           週六 08:00~16:00           週日 13:00~17:00           院內檢體24小時收檢","rt":"3個工作天","rv":"陰性：Negative","cl":"1、Chlamydia pneumoniae肺炎披衣菌是屬於披衣菌屬(Chlamydia)，存在於細胞的細菌 病原體。此細菌形成細胞內的包涵體，會在宿主細胞的細胞質中複製。 2、成人和幼童下呼吸道社區型肺炎(CAP)中約有10~20%是Chlamydia pneumoniae感染 造成。而成人急性支氣管炎中約10~20%的原發性呼吸道病原體是Chlamydia pneumoniae感染造成。它也會造成鼻竇炎，咽喉炎，有證據顯示與哮喘的發作有 關聯。此外，它也與動脈粥樣硬化發展有關。 3、陰性結果代表有可能沒有受到Chlamydia pneumoniae的感染，或不是處於急性期的 感染，亦可能是過去感染，近期感染，或持續性的感染在IgG和/或IgA抗體穩定持 續或下降中，也可能得到IgM陰性結果。若檢體太早取得，IgM抗體可能無法被偵 測出。","ref":"Chlamydia  Pneumonia  IgG。","note":"無。 無。","tags":["特殊檢驗","感染"]},{"n":"Chlamydia Trachomatis IgA","cn":"披衣菌抗體IgA","c":"T05XL1073","ins":"12107C","sp":"Serum（血清）","ct":"含Gel血清分離管","d":"3 ml","g":"大安聯合醫事檢驗所代檢","st":"週一~週五 08:00~20:00            週六08:00~16:00            週日13:00~17:00","rt":"3個工作天","rv":"Negative：＜5.0 Equivocal：≧5.0 ~ ＜6.0 Positive：≧6.0","cl":"Chlamydia trachomatis在女性會引起骨盆腔發炎、子宮內膜炎、輸卵管炎，而在男性則會引起尿道炎、副睪炎等，血中抗體是依據披衣菌所誘發免疫反應而定，當披衣菌發作時抗體濃度會上升。 這是測定C. trachomatis抗體的檢驗方法，是用病人血清來測其中的抗體濃度，因採檢方便，所以目前廣被使用，而血清中抗體是依據披衣菌所誘發身體免疫反應多少而定，披衣菌發作時抗體濃度會上升，而在經治療後，原被誘發的高濃度抗體會逐漸下降至正常範圍，但IgG抗體要降至陰性可能要多年以後的事。 通常這是在未使用抗生素治療前，病人尿液中白血球上升，預測披衣菌可能存在所作的檢驗，IgG極高值(>50)示最近感染或活化的機會很大，相對的IgA、IgM陽性的機率比較高，IgA代表披衣菌存在並且活化，IgM代表披衣菌初次感染，陽性大約維持6週。","ref":"無。","note":"本方法C. psittaci、C. pneumoniae會交叉反應。","tags":["感染"]},{"n":"Chlamydia Trachomatis Ag","cn":"包衣體試驗","c":"T05XL016","ins":"12016C","sp":"女性子宮頸拭子，男性尿道拭子，男性尿液","ct":"專用棉棒；無菌尿盒(50ml)","d":"尿液30 ml","g":"聯合醫事檢驗所代檢","st":"週一～週五  08:00~20:00           週六 08:00~16:00           週日 13:00~17:00           院內檢體24小時收檢","rt":"3個工作天","rv":"Negative","cl":"Chlamydia Trachomatis可引起砂眼(trachoma)、包涵性結膜炎(inclusion conjunctivitis)、花柳性淋巴肉芽腫(lymphogranuloma venereum)及非特異性尿道炎。一般而言，男性感染披衣菌尿道炎可能會引起副睪炎。 癌症病患（如膀胱癌）血清中的細胞角質蛋白片段19濃度會升高。 3. CYFRA 21-1在肺癌中會升高，在非小細胞肺癌病患中尤其明顯。CYFRA 21-1濃度在鱗狀細胞癌病患中最高，且與疾病發展階段相關，因此CYFRA 21-1可用於輔助肺癌的組織學診斷。數份文獻顯示CYFRA 21-1可用於監測腫瘤反應，並預測肺癌治療期間的存活率。","ref":"SCC、NSE、CEA、Cyfra21-1","note":"1. 測試膽紅素20mg/dl、血紅素500mg/dl、總蛋白質12g/dl及三酸甘油酯3000mg/dl濃度時，在亞培細胞角質素21-1檢驗試劑組中的潛在干擾 : 添加潛在干擾物質至亞培細胞角質素21-1檢驗試劑組濃度介於2.85 ng/mL及3.91 ng/mL之檢體。若檢體濃度≥ 3.3 ng/mL，研究期間測得之平均干擾量介於0%至8%。若檢體濃度< 3.3 ng/mL，測試樣本及對照樣本間測得之平均濃度變化介於0.02 ng/mL至0.32 ng/mL。 2.評估15份人類抗小鼠抗體（HAMA）陽性檢體濃度範圍14.5-122.3 U/ml，平均差異4%、12份類風濕因子（RF）陽性檢體濃度範圍47.5->100.0 U/ml，平均差異7%。 3.潛在干擾治療劑樣本的目標濃度為3.3 ng/mL時，比較潛在干擾物與對照樣本結果的平均測量濃度變化（平均百分比差異）< 10%。 1.不可使用有下列情況之檢體：加熱去活化、嚴重溶血、明顯微生物污染。 2. 若樣本受唾液污染，可能會產生假性升高的CYFRA 21-1濃度。","tags":["腫瘤標記"]},{"n":"Cadmium (Cd)","cn":"鎘","c":"T10XJ156 (Cadmium-spot urine)\nT10XJ141 (Creatinine-spot urine)\nT10XJ157 (Cadmium/Creatinine)\nT10X0058(Blood)","ins":"10005B","sp":"全血、尿液","ct":"微量元素專用管（深藍色蓋）\n經處理尿杯","d":"血液3 mL以上\n單次尿液至少 45 mL以上","g":"微量元素分析室","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00           院內檢體24小時收檢","rt":"一週","rv":"一、生物參考區間： 全血：非鎘作業：≦ 1.22 μg/L。 單次尿液： 非鎘作業： Cadmium：≦ 1.0 μg/L Creatinine：20~250 mg/dL。 Cadmium/Creatinine：≦ 3.2 μg/g Creatinine。 鎘及其化合物作業勞工特殊健康檢查健康管理分級建議指引：尿中鎘濃度≧ 5 μg/g creatinine列第三、四級管理。","cl":"急性中毒：少見，因為很少有人會接觸到高量會造成急性毒性的鎘，最少要口服50 μg/kg的鎘才會造成急性中毒。 食入性：噁心、腹痛、嘔吐、出血性腸胃炎、肝、腎壞死、心臟擴大。 吸入性：氧化鎘引起嚴重的金屬燻煙熱(Metal fume fever)在暴露後12~24小時後，發生胸痛、頭痛、咳嗽、呼吸困難、發燒、肺水腫、腎肝壞死。 慢性中毒 食入性：腎病變包括低分子量蛋白尿，胺基酸尿及糖尿、痛痛病、高血壓、心臟血管疾病、及癌症。 吸入性：肺纖維化及腎病變。","ref":"β2-Microglobulin(urine)","note":"飲食、藥物以及營養補充劑可能造成干擾。 高濃度的碘元素可能造成干擾。 使用含Gadolinium (Gd)顯影劑應避免在48小時內收集尿液。 以碘治療或使用造影劑建議1個月後再採集檢體送檢。 檢體無法立即送檢時，請冷藏保存。 專用採檢管請向保吉生公司中央庫房領取，連絡電話：(04)23767386。專用尿杯請向本實驗室領取。若大量檢體需用時，請提早1個月前告知。 勞工健康檢查採檢時，應避免於工作場所中進行。 可接受之尿液creatinine通常介於20~250 mg/dL，比重介於1.0030~1.0200，pH值介於4.5~9.0。若不在此範圍時，建議重新採檢。(依據勞工特殊健康檢查健康管理分級建議指引，2017年11月修訂)","tags":["尿液","肝臟","腎臟","腫瘤標記"]},{"n":"Chromium (Cr)","cn":"鉻","c":"T10X007(Serum/Plasma)\nT10XJ144 (Chromium-spot urine)\nT10XJ141 (Creatinine-spot urine)\nT10 ref":"血液檢查： CBC-I。 生化檢查： GOT、GPT、ALP、CRP、IRON、TIBC、urine- Cu。 藍胞漿素（Ceruloplasmin）檢查。","note":"檢體溶血。 飲食、藥物以及營養補充劑可能造成干擾。 高濃度的碘元素可能造成干擾。 使用含Gadolinium (Gd)顯影劑應避免在48小時內收集尿液。 以碘治療或使用造影劑建議1個月後再採集檢體送檢。 檢體無法立即送檢時，請冷藏保存。 專用採檢管請向保吉生公司中央庫房領取，連絡電話：(04)23767386。專用尿杯、專用血清(漿)分裝用含蓋康氏管請向本實驗室領取。若大量檢體需用時，請提早1個月前告知。 可接受之尿液creatinine通常介於20~250 mg/dL，比重介於1.0030~1.0200，pH值介於4.5~9.0。若不在此範圍時，建議重新採檢。(依據勞工特殊健康檢查健康管理分級建議指引，2017年11月修訂)","tags":["尿液","肝臟","腎臟","腫瘤標記","感染"]},{"n":"CMV DNA (定性)","cn":"巨細胞病毒 DNA","c":"T05XL1828","ins":"12182C","sp":"尿液","ct":"無菌尿杯","d":"30 mL","g":"彰基檢驗醫學部-微生物組","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00           院內檢體24小時收檢","rt":"7個工作天","rv":"Not detected。","cl":"檢驗結果為Positive則表示檢體中含有Cytomegalovirus DNA。","ref":"","note":"(1) 須檢附就醫序號、診斷碼。 (2) 提供檢體是否含Cytomegalovirus DNA之檢測，不適合作為診斷Cytomegalovirus感染狀態使用。","tags":["微生物","尿液"]},{"n":"Clostridium difficile Ag & Toxin A+B","cn":"困難梭狀桿菌抗原及毒素檢測","c":"T12XCM004","ins":"13029B","sp":"糞便","ct":"一般糞盒(藍蓋)","d":"1.約1x1 cm 大小\n          2.若為水樣1ml以上","g":"中央實驗室-微生物中心","st":"每日","rt":"1個工作天","rv":"Positive Antigen，Negative Tox :陽性抗原反應，毒素反應陰性。 Positive Antigen，Positve Tox : 陽性抗原反應，毒素反應陽性。 Negative Antigen，Negative Tox : 抗原與毒素反應皆陰性。","cl":"快速診斷試劑為一種偵測糞便檢體中是否含有艱難梭菌(Clostridium difficile)谷氨酸脫氫酶抗原，並且可以偵測糞便檢體中的艱難梭菌毒素A和B，以確認是否有艱難梭菌的毒素產生，做為是否受到艱難梭菌疾病的診斷。並且可和病人病史上其他的測試結果與臨床症狀相結合。","ref":"","note":"1.此偵測套組是用來檢測糞便檢體中艱難梭菌的抗原和毒素。可以偵測到含量大於0.63ng/mL的毒素A；16ng/mL的毒素B以及 0.8ng/mL的谷氨酸脫氫酶(抗原)。 2.糞便檢體是非常複雜的混合物，最好的偵測結果必須在採集糞便檢體24小時內進行完成。大部分沒有稀釋的檢體，可以保存在攝氏2-8℃中72小時。如果檢體在這段期間沒有分析，可以冷凍保存。但重複冷凍和解凍過程，將會失去抗原和毒素Ａ及Ｂ的免疫活性。 3.比較弱的反應，可能是以下的因素：抗原和毒素的含量太低；糞便中含有結合基質或是抑制活性的酵素。在此種狀況之下，必須採用新鮮的檢體。 4.唯一一種非艱難梭菌微生物，會影響此試劑套組的毒素測試部分是索氏梭菌VPI 9048 (Clostridium sordellii VPI 9048)，此菌株會產生毒素HT和LT，分別和毒素A和B有相似。 2-8℃新鮮傳送。","tags":["微生物","糞便"]},{"n":"Chromosome","cn":"染色體檢查","c":"T05XCAD03/ T05XCAD01","ins":"自費","sp":"血液/骨髓","ct":"Heparin管","d":"5 C.C","g":"彰基基因醫學部","st":"1-W4全日可採檢,W5需 9:30前送至臺中醫院檢驗科(國定例假日前一天及當天勿採檢)----採檢前請聯絡外送組","rt":"10個工作天","rv":"無","cl":"","ref":"","note":"1、需填寫染色體及基因檢查送檢單。 2、需檢附採檢時間。","tags":["生化"]},{"n":"CMV Q-PCR (Blood)","cn":"CMV聚合酶定量擴增試驗(血液)","c":"T05XCN012","ins":"12184C","sp":"血漿","ct":"EDTA抗凝管2管","d":"6 C.C","g":"大安聯合醫事檢驗所","st":"","rt":"4個工作天","rv":"Not detected","cl":"巨細胞病毒(Cytomegalovirus；簡稱CMV)是一種常見的雙股DNA病毒，其DNA 約由230,000個鹼基對所組成，屬於人類皰疹病毒家族的β皰疹病毒亞群，潛伏感染時會躲在單核淋巴細胞、液腺、唾液或其他腺體內，感染細胞後會造成細胞融合，並在細胞該內形成大型的包涵體，故命名為巨大細胞病毒。 大多數人都會被感染，但多是無症狀的感染，只有當患者免疫力喪失時，如愛滋病患者，才會引起嚴重的症狀，在公衛程度高的已發展國家，成人感染CMV的比例為40 %，整體陽性率為70 %；在發展中的國家，CMV陽性率約為90 %，全球六個月以下新生兒的陽性率為2-10 %。CMV為一潛伏性的病毒，一旦感染後會終身存在，無法完全清除，在免疫正常的健康人身上不會有明顯症狀，並且不會偵測到CMV病毒量。然而，對於未出生的胎兒或免疫力有缺陷者，巨細胞病毒卻具有致病力。 母親在懷孕期間如果受到巨大細胞病毒的初次感染或再復發，病毒可通過胎盤感染胎兒，導致新生兒聽力喪失和精神傷殘造成死胎或各種先天性胎兒畸形。在免疫功能不足或缺損的個體，例如：移植接受者和愛滋病患者，它可能會導致嚴重威脅生命的併發。 在造血的幹细胞和器官移植接受者因為巨大細胞病毒常潛伏於淋巴細胞或腎、骨髓等器官，而器官移植時又多使用免疫抑制藥物，所以會發生類似傳染性單核球增多的症狀如發燒、脾臟腫大及單核球異常增加。CMV感染依然是發病率和死亡率的重大起因。CMV會直接造成組織入侵的感染，間接引起急性和慢性移植排斥及次發性的細菌、黴菌和病毒感染的起因，最終，降低同種異體移植成功率和病人存活率。 長期使用免疫抑制性藥物治療之病人或愛滋病患常會導致潛伏的巨大細胞病毒再復發，引起伺機性感染，如間質性肺炎、腦炎或肝炎。以Real-Time PCR方法偵測CMV病毒量，可以較傳統血清學方法更為敏感，即早提供臨床醫師追蹤CMV病毒是否活化的報告。","ref":"","note":"1. 3000rpm離心5分鐘，分離血漿至康試管。室溫(15-30℃)僅能保存1天，冷藏(2-8℃)可以保存5天，冷凍(-10℃以下)可以保存30天。 2. 檢體退件：溶血4+；脂血4+；檢體並非以EDTA(紫頭)採血管採檢；血漿體積低於1.5mL。 3. 參考資料來源：大安聯合醫事檢驗所網站","tags":["肝臟","腎臟","感染"]},{"n":"Chromogranin A，CgA","cn":"嗜鉻粒蛋白A","c":"T05XCL054","ins":"自費","sp":"Serum","ct":"含Gel血清試管","d":"5mL","g":"聯合醫事檢驗所","st":"不限定","rt":"3個工作天","rv":"<101.9 ng/mL","cl":"Chromogranin A(CgA)是神經內分泌細胞內的主要蛋白，可作神經內分泌腫瘤血清標誌(Neuroendocrine Tumor，NET)，如神經母細胞瘤(Neuroblastoma)嗜鉻細胞瘤(Pheochromocytoma)。CgA比VMA檢出率高，且CgA濃度與腫瘤大小成正相關，CgA可用來判定腫瘤中是否有神經內分泌細胞的增生，可以作為兒童神經母細胞瘤的診斷工具及預測存活率。神經內分泌腫瘤會產生過多的血清素，血清素分解的代謝物是5-HIAA，由檢測尿中的5-HIAA量作為神經內分泌腫瘤的診斷參考，但5-HIAA較容易因食物造成偽陽性結果。 約50-100%的神經內分泌瘤病人可出現上升的嗜鉻粒蛋白A(CgA)，上升的程度與腫瘤的負荷量有關。以血中CgA值升高來診斷神經內分泌瘤的準確性，其特異性在71.3-85.3%，靈敏性在77.8-84%，NSE為神經內分泌細胞之高靈敏(sensitivity)及低特異(specificity)的標記，若以血中NSE值來診斷神經內分泌瘤，靈敏性可達100%，但特異性只有33%而已。在患有實質性腎臟病，或肝衰竭的病人血清中，會有非專一性的升高。 神經內分泌腫瘤危險因子：目前仍不確定原因 •年齡：好發於40~60 歲。 •性別：女性比男性多。 •種族：黑人發生比例較高。 •家族史：有些與遺傳有關。 •免疫功能抑制：愛滋病人由於免疫系統降低，有較高風險。 •砷：長期暴露在砷的環境，可能會增加罹患風險。","ref":"VMA，5-HIAA","note":"1.須避免使用血漿。室溫可存放48小時或-20℃冷凍保存及運送。 2.接受氫離子幫浦抑制劑治療的病人會導致CgA的濃度上升，建議在測量CgA至少兩週前需停用氫離子幫浦抑制劑。","tags":["肝臟","腎臟","腫瘤標記"]},{"n":"Cystatin C","cn":"胱蛋白C","c":"T05XH133","ins":"","sp":"serum","ct":"含Gel血清試管","d":"3ml","g":"聯合醫事檢驗所","st":"不限","rt":"三個工作天","rv":"0.62-1.11 mg/L","cl":"作為第一型及第二型糖尿病患者或腎臟移植病患的腎臟功能監測，具急性腎衰竭風險者之早期腎功能監測。 Cystatin C 是一種cysteine蛋白酶抑制劑，存在於有核的細胞內，它的持續形成與排泄速率可做為腎功能是否健康的評估標準，血清中的cystatin C濃度維持幾乎完全仰賴腎小球的過濾速率(GFR)，由腎小球的過濾速率(GFR)限制血清中的cystatin C升高，且不受腎小管再吸收的干擾，在creatinine升高並不顯著以前，腎小球的過濾速率(GFR)大約已下降50%，這是它比creatinine更值得評估腎功能的優點 另外cystatin C的濃度相對值較比creatinine的清除更能正確反映出腎小球的過濾速率(使用Cr EDTA清除率當參考)，因此cystatin C的分析比測量creatinine更能達到較高的sensitivity和specificity診斷。 Cystatin C與GFR將慢性腎病分成五個等級對照表：","ref":"creatinine","note":"無 無","tags":["腎臟","糖尿病"]},{"n":"Carbohydrate-deficient transferrin  (CDT)","cn":"缺糖型式運鐵蛋白","c":"T05XI136","ins":"09136B","sp":"Serum","ct":"含Gel血清試管","d":"5 c.c","g":"新隆醫事檢驗所","st":"不限","rt":"14個工作天","rv":"CDT≦1.3 %：正常\nCDT＞1.3%且≦1.6%：不確定\nCDT＞1.6%：異常","cl":"1. 每日飲酒量約50-60公克乙醇，持續兩週時間便會使糖缺失轉鐵蛋白(CDT)濃度升高。戒酒約二到四週後CDT%的數值會恢復正常。 2. 以CDT與Transferrin (轉鐵蛋白)濃度相除所得的CDT% ,能大幅降低transferrin濃度、鐵質營養狀態與肝功能不良對CDT測定結果的影響。 3. 有些非因酒精引起的疾病也可能刺激CDT增加，包括慢性活動性肝炎、原發性膽道硬化症、肝衰竭，以及極為罕見的缺糖型式糖蛋白(CDG , carbohydrate-deficient glycoprotein)症候群。","ref":"transferrin，肝功能檢查","note":"溶血、使用血漿檢體會造成電泳圖失真 檢體不可保存在室溫，應盡速離心冷藏。","tags":["肝臟"]},{"n":"Carbohydrate-deficient transferrin  (CDT)","cn":"缺糖型式運鐵蛋白","c":"T05XI136","ins":"09136B","sp":"Serum","ct":"含Gel血清試管","d":"5 c.c","g":"新隆醫事檢驗所","st":"不限","rt":"14個工作天","rv":"CDT≦1.3 %：正常\nCDT＞1.3%且≦1.6%：不確定\nCDT＞1.6%：異常","cl":"1. 每日飲酒量約50-60公克乙醇，持續兩週時間便會使糖缺失轉鐵蛋白(CDT)濃度升高。戒酒約二到四週後CDT%的數值會恢復正常。 2. 以CDT與Transferrin (轉鐵蛋白)濃度相除所得的CDT% ,能大幅降低transferrin濃度、鐵質營養狀態與肝功能不良對CDT測定結果的影響。 3. 有些非因酒精引起的疾病也可能刺激CDT增加，包括慢性活動性肝炎、原發性膽道硬化症、肝衰竭，以及極為罕見的缺糖型式糖蛋白(CDG , carbohydrate-deficient glycoprotein)症候群。","ref":"transferrin，肝功能檢查","note":"溶血、使用血漿檢體會造成電泳圖失真 檢體不可保存在室溫，應盡速離心冷藏。","tags":["肝臟"]},{"n":"C1 esterase inhibitor","cn":"第1補體酯脢抑制素","c":"","ins":"30013B","sp":"Serum（血清）","ct":"含Gel血清試管","d":"3ml以上","g":"台中榮總免風科","st":"院內檢體24小時收檢","rt":"30個工作天","rv":"0.21- 0.39 g/l 。","cl":"C1脂化脢抑制劑缺乏與遺傳性血管性水腫(hereditary angioedema)有關。另其他自體免疫疾病也可能引起C1脂化脢抑制劑低下。","ref":"建議加測C4以評估免疫系統補體系統之狀況。","note":"無。 僅限台中醫院開單，不接受其他代檢檢體。","tags":["自體免疫"]},{"n":"CMV Q-PCR (Urine)","cn":"CMV聚合酶定量擴增試驗(尿液)","c":"T05XCN022","ins":"12184C","sp":"尿液","ct":"一般尿管或康試管","d":"5 C.C","g":"大安聯合醫事檢驗所","st":"","rt":"4個工作天","rv":"Not detected","cl":"人類巨細胞病毒(Human CMV)是一雙股的DNA病毒，其DNA約由230,000個鹼基對所組成，屬於人類皰疹病毒家族的β皰疹病毒亞群。在公衛程度高的已發展國家，成人感染CMV的比例為40%，整體陽性率為70%；在發展中的國家，CMV陽性率約為90%，全球六個月以下新生兒的陽性率為2-10%。 CMV為一潛伏性的病毒，一旦感染後會終身存在，無法完全清除，在免疫正常的健康人身上不會有明顯症狀，並且不會偵測到CMV病毒量。此病毒普遍存在，全世界都可找到。在初次傳染以後，CMV建立終生潛伏。如果孕婦染上病毒，則引起胎兒感染和圍產期(妊娠22週後至出生後7天)感染。據統計，由原發性巨細胞病毒感染的孕婦所造成的新生兒的感染率可高達1/3，而圍產期感染比子宮內感染的百分率更高。新生兒CMV傳染是導致聽力喪失和精神傷殘的主要病毒起因。因此懷孕期間預防感染CMV是很重要的。 病毒在免疫活性的個體，導致溫和或臨床症狀不顯的疾病；在免疫功能不足或缺損的個體，例如移植接受者和愛滋病患者，它可能會導致嚴重威脅生命的併發症。在造血的幹细胞和器官移植接受者的CMV感染依然是發病率和死亡率的重大起因。愛滋病患者比正常人更易遭受病毒感染，約有 75%，或使原潛伏在體內的病毒再活化。在致死率方面，在正常免疫功能之宿主的死亡率 < 1%，而在器官和骨髓移植患者，巨細胞病毒可能造成重大的發病率和死亡率。CMV會直接造成組織入侵的感染，間接引起急性和慢性移植排斥及次發性的細菌、黴菌和病毒感染的起因，最終，降低同種異體移植成功率和病人存活率。CMV的脫氧核糖核酸定量與臨床表徵和其他實驗室標誌提供臨床醫師用來病患管理監測CMV脫氧核糖核酸量的方法。以real-time PCR方法偵測CMV病毒量，較傳統血清學方法更為敏感，可以及早提供臨床醫師追蹤CMV病毒是否活化。","ref":"","note":"1. 檢體退件：尿液體積低於1.5mL。 2. 參考資料來源：大安聯合醫事檢驗所網站。使用實驗室開發驗證的方法，Laboratory Developed Test","tags":["尿液","感染"]},{"n":"D-Dimer test","cn":"D-D雙合試驗","c":"T08X0793","ins":"08079B","sp":"儘速離心-Plasma 冷藏","ct":"Na-Citrate藍頭管(PT管)","d":"1.8ml","g":"急診檢驗室","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00           院內檢體24小時收檢","rt":"60分鐘","rv":"＜500 ng/ml","cl":"D-D Dimer濃度之提升表示體內Fibrinolysis處於活耀狀態，通常可見於下列數種臨床 症狀： （1）散發性血管內凝固症。 （2）血栓溶解之治療。 （3）惡性腫瘤、局部靜脈栓塞及動脈栓塞、肺栓塞。 （4）嚴重的感染或發炎、肝臟疾病、手術過後等。","ref":"（1）血液檢查：FDP。 （2）生化檢查：AST、ALT。","note":"若檢體離心時間不夠，容易造成假陽性。","tags":["肝臟","腫瘤標記","感染"]},{"n":"D、E、C、e、c","cn":"特殊血型","c":"T11X009","ins":"11009B","sp":"Plasma及RRC Cell","ct":"EDTA紫頭管","d":"3ml 法操作，需重新送檢。 2、資料來源：中山醫學大學附設醫院檢驗科。 .","tags":["分子檢驗","腫瘤標記"]},{"n":"ECP Test","cn":"嗜伊紅性白血球陽離子蛋白檢驗","c":"T05XAD023","ins":"30023B","sp":"Serum（血清）","ct":"含Gel血清試管","d":"3 ml","g":"聯合醫事檢驗所代檢","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00","rt":"7個工作天","rv":"＜15.0 ug/L。","cl":"嗜伊紅性白血球與多種過敏疾病引起的發炎反應有關，氣喘中尤其常被發現。在氣喘病患發炎組織中，嗜伊紅性白 血球及其毒素產物大量聚集，引起組織的破壞與氣管表皮細胞的脫落。因嗜伊紅性白血球的多寡與發炎反應密切相關，故發炎反應的嚴重程度可以周邊血管的活化嗜伊紅性白血球做一判別。 在試管的凝結中，嗜伊紅性白血球會持續釋放嗜酸性陽離子蛋白(ECP)，且隨著溫度增加有釋放愈多的趨勢。因嗜伊紅性白血球可持續分泌ECP，因此ECP也許是唯一可測量嗜伊紅性白血球活化程度的方法。在發炎反應例急性氣喘疾病中，常以抗發炎藥物如可體松、類固醇等來減低發炎反應。因嗜伊紅性白血球與發炎反應密切相關，所以當發炎反應減低時，ECP亦有下降趨勢，故ECP的測量可使用於類固醇藥物的監控上。氣喘、異位性皮膚炎，關節部分的自體免疫疾病、痛風，以及寄生蟲疾病等過敏疾病活化嗜酸性紅血球釋出ECP，作為治療監測的檢查。","ref":"無。","note":"1.必須為血清檢體，不可為血漿或其它檢體。 2.檢體離心後請分裝至康室管。由於嗜伊紅性白血球會持續釋放ECP，且會隨著溫度上升造成ECP的釋放增加，因此採血後血液凝固時間及溫度都必須受到限制，以確保檢測之正確性。 用SST (Serum Separator Tube)管(內含Clot activator可加速血液凝集，約30mins)收集血液2.5-4mL，為使管壁充分接觸血液，請上下輕輕翻轉試管五次。檢體放置在室溫下(適宜溫度為20-24℃)，靜置60-120分鐘(為使嗜伊紅性白血球充分釋放ECP)。在室溫下以1000-1300xg離心10分鐘，再分離血清至另一新試管，進行檢驗或保存。血清2-8℃可保5天，超過5天需置於-20℃。檢體量0.5 mL。 3.資料來源：聯合檢驗目錄。","tags":["自體免疫"]},{"n":"Eosinophil count","cn":"嗜酸性白血球計算","c":"T08X010","ins":"08010C","sp":"Blood-室溫保存","ct":"EDTA紫頭管","d":"1-3ml(嬰兒至少0.5ml以上)","g":"台中醫院醫事檢驗科\n          軌道組/急診檢驗組","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00           院內檢體24小時收檢","rt":"當日","rv":"100-300 /μl","cl":"增加： （1）寄生蟲感染：旋毛蟲、圓蟲幼蟲等。 （2）過敏性疾病：氣喘、乾草熱、風診等。 （3）皮膚性疾病：濕診、毒性皮炎。 ( 4 ) 胃腸道疾病：食物過敏。 ( 5 ) 惡性疾病：CML、惡性貧血、腫瘤等。 ( 6 ) 傳染性疾病：猩紅熱、布氏桿菌。 ( 7 ) 藥物：毛地黃、苯、碘、磷等。 降低： （1）庫欣氏症。 （2）腎上腺皮質賀爾蒙。","ref":"（1）血液檢查：全套血液檢查、白血球分類檢查、ESR。 （2）生化檢查：CRP","note":"檢體和抗凝劑混合均勻，避免凝固。","tags":["腎臟","腫瘤標記","感染"]},{"n":"E.S.R.","cn":"紅血球沈降速度測定","c":"T08X005","ins":"08005C","sp":"Blood-室溫保存","ct":"Na-Citrate黑頭管","d":"1.5 ml","g":"急診檢驗室","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00           院內檢體24小時收檢","rt":"每日","rv":"Male：≦50歲 0-10 mm/hr，>50歲 0-20 mm/hr Female：≦50歲 0-20 mm/hr，>50歲 0-30 mm/hr","cl":"此試驗特異性不高，但對炎症、組織損害、淋巴增殖症等較敏感。 增加： 2）hFSH增加：停經、停經後，早熟青春發動期（Precocious Puberty）、持續黃體症 、腦下腺及下視丘衰竭、月經失調或無經症…等。 （3）hFSH減少：妊娠、月經障礙、乳液漏（Galactorrhea）、 腦下腺癌、甲狀腺低能症 、腎衰竭、多囊性卵巢症候群（Polycystic Ovaria Syndrome）…等。","ref":"血清檢查：LH。","note":"無。","tags":["腎臟","腫瘤標記","甲狀腺"]},{"n":"FTA-ABS","cn":"梅毒抗體間接螢光染色法","c":"T05XL019","ins":"12019B","sp":"Serum（血清）","ct":"含Gel血清試管","d":"3ml","g":"聯合醫事檢驗所代檢","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00           院內檢體24小時收檢","rt":"10個工作天","rv":"Negative","cl":"梅毒是經由性行為傳染的疾病，FTA-ABS測定患者血清中抗treponema的抗體，對每 一期的梅毒都具有最佳的敏感度，尤其是感染的初期，此檢查特異性相當良好，可 避免偽陽性的發生，當此檢查為陽性時，應停止性行為兩個月，直至治癒為止，且 會傳染給胎兒，故患者兩年內不可懷孕。","ref":"STS(RPR)、VDRL。","note":"自體免疫疾病、異常球蛋白、懷孕、SLE可能造成偽陽性的發生。 （1）當報告顯示+/-、weakly reactive、borderline時，應間隔一個月後複驗。 （2）資料來源：聯合檢驗目錄148-149頁。","tags":["感染"]},{"n":"FTA-ABS IgM","cn":"梅毒抗體間接螢光染色法 IgM","c":"T05XL1901","ins":"12019B","sp":"Serum（血清）","ct":"含Gel血清試管","d":"3ml","g":"聯合醫事檢驗所代檢","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00           院內檢體24小時收檢","rt":"10個工作天","rv":"Negative。","cl":"IgM出現於早期或復發。","ref":"STS(RPR)、VDRL。","note":"自體免疫疾病、異常球蛋白、懷孕、SLE可能造成偽陽性的發生。 資料來源：聯合檢驗目錄2011第149頁。","tags":["生化"]},{"n":"Free light chain κ/λratio","cn":"免疫球蛋白游離輕鏈kappa, lamda","c":"T05XL160","ins":"12160B","sp":"Serum 血清","ct":"含Gel血清試管","d":"5.0 ml","g":"彰基生化免疫組代檢","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00           院內檢體24小時收檢","rt":"10個工作天","rv":"kappa free light chain: 3.30-19.4 mg/L (serum); lambda free light chain: 5.71-26.30 mg/L (serum) Free kappa/lambda ratio:0.26~1.65","cl":"測定游離型輕鏈之濃度可輔助臨床上對於多發性骨髓瘤、淋巴細胞腫瘤、Waldenstrom 巨大球蛋白血症、類粉樣變性(AL amyloidosis )、輕鏈沉積病變及結締組織性疾病(例如 全身性紅斑性狼瘡)等疾病之診斷及監測。","ref":"","note":"1. 溶血檢體(2+)以上退件。 2. 參考資料來源：彰基網站。 3. 需檢附採檢時間。","tags":["免疫","腫瘤標記"]},{"n":"FLT3/ITD mutation","cn":"FLT3/ITD突變基因","c":"T05XL1827","ins":"12182C","sp":"使用骨髓檢體","ct":"EDTA抗凝管","d":"3 c.c","g":"中國附醫分生組","st":"(假日及假日前一天不收檢)","rt":"10個工作天","rv":"Undetected","cl":"FLT3/ITD突變是近年來AML病人中最常見的突變類型之一。正常情況下，酪氨酸激酶磷酸化作用是由酪氨酸激酶和酪氨酸激酶拮抗調節維持平衡，如發生基因突變，將導致酪氨酸激酶持續活化，進而阻斷對細胞的分化、增殖和凋亡調節功能並與腫瘤發生有密切關係。成人急性骨髓性白血病約有20-30%的機會有 FLT/ITD基因突變，若以染色體正常的病人而言，其比例可高達40%。經臨床研究發現，FLT3/ITD突變，預後通常較差。因此FLT3/ITD對於AML可能是一個預後不良的指標之一。","ref":"","note":"1. 僅收臺中、豐原、彰化等醫院檢體，不收其他院外代檢檢體。 2. 請附上『中國醫藥大學附設醫院檢驗醫學部院外代檢申請單』並填寫完整。表單下載  處：http://61.66.117.10/HTML/dept/1t24/index.htm，點選『相關資訊』→『文件下載』。 3. 假日及假日前一天不收檢。 4. 檢驗效能：\nFLT3/ITD基因突變：Limit of detection(LOD)為1% mutant。","tags":["分子檢驗","腫瘤標記"]},{"n":"Factor XI activity","cn":"第十一因子活性測定","c":"T05XH0801","ins":"08080B","sp":"Plasma","ct":"淡藍PT管 × 2管","d":"依採血管規格至標準線× 2管","g":"台中榮總","st":"不限定","rt":"5個工作天","rv":"70-150%","cl":"當APTT延長且患者有明顯出血症狀時，懷疑為內在路徑凝血因子活性缺乏時，可執行  此相關因子之檢測。","ref":"Factor VIII、IX、XII activity","note":"1. 檢體冷凍送檢。 2. 病人必需在兩週內沒有服用warfarin(Coumadin)或兩天內未注射heparin。 3. 為減少誤差需依採血瓶規格採血至要求量，離心條件3000rpm 15分鐘以上。血液凝固相關的檢查，都應先假設受檢者有血液凝固的障礙，所以抽完血後請受檢者在抽血點至少加壓5分鐘以上，以避免受檢者血流不止的危險。因反覆冷凍解凍會影響檢體活性，無法原管複驗。若病人需由靜脈留置針採血，為避免檢體受到Heparin或被稀釋的干擾，管路應先用5 mL生理食鹽水沖洗，並丟棄前5 mL或6倍管路容積的血量，再以藍頭採血管(Na citrate)採集所需的血量，以防止上述干擾狀況的發生。 4. 此項目委外代檢，收費不適用健保點數，因此不接受院外檢體。 5. 須附採檢時間、健保卡號及 ICD10代碼。 6. 若同時開立其他凝血因子檢查，每項皆須採2管藍頭管。","tags":["凝血"]},{"n":"Factor XII activity","cn":"第十二因子活性測定","c":"T05XH0811","ins":"08081B","sp":"Plasma","ct":"淡藍PT管 × 2管","d":"依採血管規格至標準線× 2管","g":"台中榮總","st":"不限定","rt":"5個工作天","rv":"70-150%","cl":"當APTT延長且患者有明顯出血症狀時，懷疑為內在路徑凝血因子活性缺乏時，可執行  此相關因子之檢測。","ref":"Factor VIII、IX、XI activity","note":"1. 檢體冷凍送檢。 2. 病人必需在兩週內沒有服用warfarin(Coumadin)或兩天內未注射heparin。 3. 為減少誤差需依採血瓶規格採血至要求量，離心條件3000rpm 15分鐘以上。血液凝固相關的檢查，都應先假設受檢者有血液凝固的障礙，所以抽完血後請受檢者在抽血點至少加壓5分鐘以上，以避免受檢者血流不止的危險。因反覆冷凍解凍會影響檢體活性，無法原管複驗。若病人需由靜脈留置針採血，為避免檢體受到Heparin或被稀釋的干擾，管路應先用5 mL生理食鹽水沖洗，並丟棄前5 mL或6倍管路容積的血量，再以藍頭採血管(Na citrate)採集所需的血量，以防止上述干擾狀況的發生。 4. 此項目委外代檢，收費不適用健保點數，因此不接受院外檢體。 5. 須附採檢時間、健保卡號及 ICD10代碼。 6. 若同時開立其他凝血因子檢查，每項皆須採2管藍頭管。","tags":["凝血"]},{"n":"Factor  II assay","cn":"第二因子測定","c":"T05XHO571","ins":"08057B","sp":"Plasma - 儘速離心","ct":"Na-Citrate藍頭管×2管","d":"1.8ml×2管","g":"台中榮總","st":"週一～週五  08:00~20:00           週六 08:00~1600           週 ,"g":"大安聯合醫事檢驗所代檢","st":"不限","rt":"3個工作天","rv":"","cl":"","ref":"","note":"","tags":["生化"]},{"n":"Gastric juice","cn":"胃液分析","c":"T16X004","ins":"16004C","sp":"Gastric content（胃液）","ct":"EDTA試管(紫頭)3ml","d":"約3ml","g":"中央實驗室鏡檢組","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00           院內檢體24小時收檢","rt":"當日","rv":"Negative","cl":"正常胃液應無潛血，但此測試特異性較差，易受干擾，故本測試常用來篩檢胃部的潰 瘍、出血。","ref":"（1）內視鏡 （2）X-ray","note":"採檢前3天宜禁食動物血、肉類(含肌紅素myoglobin)、菠菜、鐵劑、溴化物、碘化物、X光 顯影劑等以避免潛血反應的偽陽性產生。 無。","tags":["生化"]},{"n":"Gastric juice-occult blood (EIA/LIA)","cn":"胃液潛血免疫分析","c":"T07X00101","ins":"16004C","sp":"Gastric content（胃液）","ct":"含蓋檢體杯(50ml)","d":"約3ml","g":"中央實驗室鏡檢組","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00           院內檢體24小時收檢","rt":"當日","rv":"Negative：0-100 ng/ml","cl":"正常胃液應無潛血，但此測試特異性較差，易受干擾，故本測試常用來篩檢胃部的潰 瘍、出血。","ref":"（1）內視鏡 （2）X-ray","note":"採檢前3天宜禁食動物血、肉類(含肌紅素myoglobin)、菠菜、鐵劑、溴化物、碘化物、X光 顯影劑等以避免偽陽性產生。 糞便中含大量還原物質( 如VitC)時,會造成偽陰性。 無。","tags":["生化"]},{"n":"Gastrin","cn":"胃泌激素放射免疫分析","c":"T05XI132","ins":"09132B","sp":"Serum（血清）","ct":"含Gel血清試管","d":"3ml","g":"聯合醫事檢驗所","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00","rt":"10個工作天","rv":"","cl":"","ref":"","note":"","tags":["生化"]},{"n":"General Urine Examination","cn":"尿一般檢查","c":"T06X012","ins":"06012C","sp":"Urine（尿液）","ct":"尿液離心管","d":"7-10 ml以上","g":"急檢組/特檢組","st":"週一～週五  07:00~21:30           週六 07:00~12:00           院內檢體24小時收檢","rt":"一般件當日/急件:30分鐘","rv":"","cl":"1、比重(Specific Gravity)： 尿中大部分的溶質為氯化鈉和尿素，測定尿比重可用來評估腎臟的濃縮與稀釋的能力，並可提供有關溶解於總檢體量中固態成份比率的情報，然因溫度而定。尿的濃度會因正常和病理性的理由而有所改變，有可能出現異常的濃縮或稀釋的情況，通常早晨的尿較為濃縮，為正常的現象。比重降低，表示腎臟的濃縮能力降低，發生在尿崩症、腎絲球腎炎、腎盂腎炎和其他疾病。比重上升，發生在嚴重脫水(流汗、發燒、嘔吐、下痢)、腎上腺功能缺損、肝臟疾病、鬱血性心衰竭。 2、酸鹼度(PH) ：腎小管可分泌氫離子，進入腎絲球濾液與鈉離子交換，使尿液變成酸性，因此測定尿液PH值，可反映腎臟維持血漿和細胞外液之氫離子濃度的能力，並反應體內酸鹼狀態；呼吸性或代謝性酸中毒時，酸性尿將會產生；呼吸性或代謝性鹼中毒時，鹼性尿將會產生。 3、白血球(Leukocyte)：正常人尿液中的少量白血球不會呈陽性反應，如陽性反應發生，表示有大量Neutrophils於尿液中，可作為泌尿道感染的指標。 4、亞硝酸鹽(Nitrite)：健康人尿中不會有nitrite，陽性反應表示尿中有超過105/ml的微生物，可作為UTI的指標 (膀胱炎上行到輸尿管、腎孟和腎臟，會造成腎臟組織損傷、腎功能減少、高血壓、敗血症等)，亦可作為抗生素治療的監測指標、反復性感染的定期檢查與UTI高危險群(如糖尿病、懷孕婦人等)的監測。 5、蛋白質( Protein)：當尿蛋白增加時，表示腎臟可能有問題，如腎絲球膜的損傷、腎小管再吸收障礙。此外，泌尿道結石、全身性紅斑性狼瘡、多發性骨髓瘤、初期子癩症等疾病亦會出現蛋白尿；有些蛋白尿發生沒有致病性意義，如寒冷、劇烈運動、發燒、脫水、嚴重疾病時期，懷疑此種情形則須反覆偵測。有些蛋白尿與姿勢有關，直立時出現，平躺時消失。 6、葡萄糖(Glucose)：當血糖濃度高於180 mg/dL的腎閾值以上，腎小管無法再吸收濾液中的葡萄糖，尿中就會出現葡萄糖，因此任何陽性反應都應做進一步檢查。 7、酮體(Ketone Bodies)：一般人尿中並無 ketone bodies存在，但在醣類代謝發生障礙時，會由脂肪代謝產生能量供給身體所需，於是脂肪的代謝物 ketone bodies便在體內堆積，進而排至尿液中。因此，在糖尿病酮酸中毒、外科手術後，腸胃障礙、饑餓、嘔吐等情況，均容易檢出尿酮體。 8、尿膽素原(Urobilinogen)：在運動、飲酒、疲勞、便秘等狀況可能出現陽性結果，健康個體亦可能分泌少量的尿膽素原。Urobilinogen的測定有助於肝臟疾病、溶血性疾病及膽道阻塞等疾病的確認，若與Bilirubin一起判讀，更有利於診斷。 9、膽紅素(Bilirubin)：由於Direct bilirubin為水溶性，可由腎排至尿中，正常人尿中約有0.02ml/dl，低於測試敏感度。當膽道阻塞時，肝臟無法將Direct bilirubin排到膽汁裡，血及尿中bilirubin便增加。溶血性貧血者，雖然血中indirect bilirubin濃度會上升，但肝可將轉換成Direct bilirubin並排至膽汁中，因此尿中會增加urobilinogen，而bilirubin仍維持正常，即使尿液中出現十分少量的膽紅素，也應視作有意義。 10、潛血(Blood) ： 10.1血尿：當腎生殖泌尿道出血、外傷或器官損傷時，尿中出現大量RBC稱為血尿(hematuria)如腎結石腎絲球疾病、腫瘤、外傷、腎孟腎炎、曝露在化學毒性中、激烈運動、月經等。 10.2血紅素尿(Hemoglobinuria)：尿中並無完整的RBC，僅出現大量血色素，如溶血性貧血、輸血反應、嚴重燒傷、感染、激烈運動。 10.3肌紅蛋白尿(Myoglobinuria)：肌肉組織的蛋白質由於肌肉組織受破壞造成，如外傷、長時間昏迷、抽筋、肌肉代謝疾病。","ref":"（1）尿液檢查：Bence-Jones Protein 。 （2）血液檢查：CBC-I、Blood routine。 （3）生化檢查：GLU、BUN、CRE、ALB、CHO、Total Protein(24hrsUrine)、Na、K、Cl、Urine- Na、Urine-K、Urine- Cl、Urine- CRE 、Ca、IP、UA、Protein Electrophoresis。 （4）血清檢查：VDRL/RPR Test (STS)、ASLO（nephelometry）、補體檢查、甲狀腺機能檢查等。 （5）細菌培養。","note":"1.檢體的比重會隨溫度而改變，所以尿液檢體的溫度必須在室溫下操作。 2.檢體收集的容器若殘留強氧化性的消毒劑，會造成葡萄糖和潛血呈現偽陽性。 3. 當出現血尿或膿尿的情況下，可能會影響尿液化學試驗呈色結果，故先將尿液離心1500g 5分鐘，再上機操作化學試驗，判讀尿沉渣，並在報告備註欄位註明血尿或膿尿。","tags":["特殊檢驗","尿液","肝臟","腎臟","腫瘤標記","糖尿病","感染"]},{"n":"Gentamycin","cn":"健大黴素","c":"T05XJ518","ins":"10518B","sp":"Plasma（血漿）","ct":"EDTA試管","d":"3 ml","g":"大安聯合醫事檢驗所代檢","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00           院內檢體24小時收檢","rt":"3個工作天","rv":"","cl":"","ref":"","note":"","tags":["生化"]},{"n":"GH (Growth hormon), EIA","cn":"生長激素免疫分析","c":"T05XI108","ins":"09108C","sp":"Serum（血清）","ct":"含Gel血清試管","d":"3 ml","g":"聯合醫事檢驗所代檢","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00","rt":"3個工作天","rv":"Male:0.003-0.971ng/mL Female:0.010-3.607ng/mL","cl":"GH(生長激素)是腦下腺前葉分泌的peptide荷爾蒙，是身體生長必要的因素，刺激產生RNA及合成蛋白質，以及調用脂肪酸及胰島素。 增加於： 腦下垂體引起之巨人症、 肢端肥大症、外生性的生長激素分泌過多、營養不良、 腎衰竭、壓力、運動、未控制 的糖尿病、禁食時間過長或神精性食慾減退等。 減少於： 腦下垂體引起之侏儒症、 腎上腺皮質功能亢進。","ref":"血清IGF-I。","note":"因半衰期僅6-12分鐘，因此血清測的結果幾乎為谷底濃度，會使得參考值與異常範圍 的重疊區域增大，影響判讀。 （1）GH分泌一般很低，但有分泌的高峰，因此需要多次測定。懷疑分泌不足時，可以 使用藥物刺激試驗看是否沒有上升；懷疑腦下腺GH分泌性腫瘤時，可以口服葡萄糖看是否沒有抑制。 （1）抽血前禁食10-12小時，也不要從事激烈的活動，抽血前橫臥30分鐘。 （1）資料來源：聯合檢驗目錄2011第158頁。","tags":["腎臟","糖尿病"]},{"n":"Glucose(AC)","cn":"血液及體液葡萄糖，飯前","c":"T09X005","ins":"09005C","sp":"Serum（血清）、Plasma（血漿）","ct":"含Gel血清試管、\nLi-Heparin 綠頭管、NaF管","d":"2 ml以上（或灰蓋管指示線）","g":"軌道組","st":"週一~週五 08:00~20:00            週六08:00~16:00            週日13:00~17:00            院內檢體24小時收檢","rt":"一般件8小時/急件:40分鐘","rv":"70 - 99 mg/dl","cl":"異常上升： （1）主要用來偵測糖尿病,飯前（後）血糖太高,都表示可能有糖尿病。 （2）生理方面：激烈運動、情感強烈、腎上腺素上升。 （3）內分泌疾病：嗜洛細胞瘤、甲狀腺毒症等。 （4）胰臟方面疾病：胰臟炎、胰臟癌等。 （5）其他相關疾病：腦中風、急性心肌梗塞或心絞痛、慢性肝病及腎病、Wernicke's encephalopathy(Vit. B1缺乏)。 異常下降： （1）胰臟方面疾病：胰島細胞瘤、升糖素(glucagon)缺乏。 （2）癌症、後胃切除術、自律神經系統疾病等。 （3）內分泌疾病：腦下垂體分泌不足、甲狀腺功能不足等。 （4）小兒科異常(Pediatric anomalies)：早產、懷孕引起的糖尿病、Zetterson's syndrome、 自發性leucine敏感。 （5）人為原因：胰島素注射過量、降血糖口服藥服用過量。","ref":"（1）尿液檢查：Urine Routine。 （2）血液檢查：CBC-III、Blood routine。 （3）生化檢查：BUN、CRE、ALB、Total Protein、Na、K、Cl、Amy、Lipase 、Ca、 IP、UA、HDL、 LDL、CHO、GOT、GPT、GLU -PC、HbA1c、葡萄糖耐性試驗。 （4）血清檢查： Microalbumin、Insulin、C-Peptide、甲狀腺檢查。","note":"脂血的檢體(>3+)應該額外離心，避免干擾物影響。 (1)通常晚餐後禁食10～12小時。第二天早晨飯前採取為原則。 (2)Heparin綠頭管僅限急件使用。","tags":["肝臟","腎臟","腫瘤標記","甲狀腺","糖尿病"]},{"n":"Glucose(AC)，one touch","cn":"血液及體液葡萄糖. 飯前","c":"T09X00502","ins":"09005C02","sp":"全血","ct":"穿刺針","d":"一滴","g":"醫事檢驗科","st":"週一～週五  07:00~21:00           週六 07:00~12:00           週日 停止服務           院內檢體由病房操作","rt":"當日","rv":"70-99 mg/dl","cl":"高血糖： （1）胰島腺機能降低：急性胰炎、胰結石、胰纖維症、胰癌、胰臟切除等。 （2）肝疾病：肝硬化、慢性肝炎、脂肪肝…等。 （3）內分泌疾病：末端肥大症、褐色細胞瘤、甲狀腺機能抗進、Cushing Syndrome…等。 低血糖： （1） "8小時","rv":"男性：＞40 mg/ dL 女性：＞50 mg/dL","cl":"高密度脂蛋白膽固醇是體內防止動脈硬化的重要物質，可用來評估冠狀動脈疾病 的發生機率。CHO/HDL膽固醇比值大於5.0，表示有較高機率得到冠狀動脈疾病","ref":"（1）尿液ㄧ般檢查。 （2）生化檢查：CHO、TG、LDL-C、GLU、hs-CRP。 （3）T3、T4、TSH。","note":"（1）非常嚴重血脂症(Triglyceride大於1700 mg/dL)檢體會造成偽陽性低下的結果。 （2）病人若是血清免疫球蛋白偏高時可能導致不正確的檢測結果(通常是negative interference)。 （3）病人若是罹患Type III hyperlipidemia時可能導致測測結果偽性偏低。 ( 4 ) 解熱鎮痛劑Metamizole(Dipyrone)可能造成偽性偏低。 無。","tags":["生化"]},{"n":"HIV Ag/Ab Combo test","cn":"人類免疫缺乏病毒抗原及 抗體複合型試驗","c":"T09X937","ins":"14082C／E3046C","sp":"Serum（血清）、血漿","ct":"含Gel血清試管、\n含有Potassium EDTA 、Lithium heparin、\nSodium heparin、Sodium citrate、ACD、\nCPDA-1、CPD、Potassium oxalate抗凝血劑\n之檢體管","d":"4ml以上","g":"台中醫院醫事檢驗科軌道組","st":"週一～週五  08:00~20:00           週六 08:00~16:00           週日 13:00~17:00           院內檢體24小時收檢","rt":"3個工作天","rv":"Nonreactive：<1.0 S/CO","cl":"此檢驗針對人類免疫不全病毒第一型、第二型病毒，感染人體後，所產生的抗原及抗體進行檢測，此法作為疾病輔助篩檢的有利工具，但若呈陽性反應，則須以HIV抗體免疫層析法做最後的確認。感染後約三個月，才能在血清中發現抗體，感染後抗體未出現前，稱為”空窗期”。","ref":"HIV抗體免疫層析法、HIV 病毒負荷量檢查。","note":"1.不可使用有下列情況之檢體：加熱去活化、混合檢體、嚴重溶血（>500 mg/dL）、明顯微 生物污染。 2.實驗對照組、超過20個無反應性或超過20個有反應性檢體加入大量膽紅素(20 mg/dL)、 三酸甘油脂(3,000 mg/dL)、蛋白質（12 g/dL）或血紅素(500 mg/dL)，測試結果並無定性效 能上之差異。 3.曾接受診斷或治療所需之小鼠單株抗體製品的病患檢體，可能含有人類抗小鼠抗體（Human anti-mouse antibodies，HAMA）。利用含小鼠單株抗體之檢驗試劑組測試這類檢體時，可能會出現假性升高或降低之數值。試劑含可降低HAMA反應性檢體之作用成分。 4.人類血清中的嗜異性抗體可能會與試劑中的免疫球蛋白反應，而干擾體外免疫分析。經常接觸動物或動物血清產品的病患，可能較易受到干擾而呈現異常值。 1.來自肝素治療患者之檢體可能不完全凝結且含有纖維蛋白，因此須在進行肝素治療前抽 取檢體。 2.血清及血漿檢體應不含纖維蛋白、紅血球或其他微粒物質。","tags":["感染"]},{"n":"Helicobacter pylori Ab","cn":"胃幽門螺旋桿菌抗體","c":"T09XCI005","ins":"自費","sp":"Serum（血清）","ct":"含Gel血清試管","d":"4 ml以上","g":"台中醫院醫事檢驗科\n          特檢組(一)","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00           院內檢體24小時收檢","rt":"3個工作天","rv":"Negative","cl":"胃幽門螺旋桿菌是屬於格蘭氏陰性菌，帶4~6根鞭毛，具活動性的螺旋菌體，人類是它唯一宿主，寄居在胃上皮細胞上面的中性粘液層下，含有豐富的尿素，可分解上皮細胞滲透出來的尿素成為氨和重碳酸鹽來中和胃酸。在臨床上公認上消化道黏膜病變與胃幽門螺旋桿菌的感染有明顯的因果關係。自從1982年以來，在臨床上陸續有數千種研究報告發表，指出十二指腸潰瘍罹患者的胃幽門螺旋桿菌的感染率高達90~95%，胃潰瘍罹患者則達70~80%，胃炎罹患者則佔90%，胃癌罹患者亦高達60~70%。根據流行病學的探討，在台灣地區的胃幽門螺旋桿菌的感染人口數高達一千萬人左右，而這些受感染個體或許也是將來成為胃癌罹患者的高危險群；另外，胃幽門螺旋桿菌的感染也是台灣地區居民最主要的胃十二指腸疾病。","ref":"病理切片。","note":"含紅血球或脂質之檢體可能會產生不一致之結果，故測試前應先離心。 無。","tags":["特殊檢驗","腫瘤標記","感染"]},{"n":"Hematocrite (Hct)","cn":"血球比容值測定","c":"T08X004","ins":"08004C","sp":"Blood-室溫保存","ct":"EDTA紫頭管","d":"1-3ml(嬰兒至少0.5ml以上)","g":"台中醫院醫事檢驗科\n          軌道組/急診檢驗組","st":"週一~週五 08:00~20:00            週六08:00~16:00            週日13:00~17:00            院內檢體:24小時收檢","rt":"一般件當日/急件:30分鐘","rv":"男：38.8-53.1 % 女：33.5-46.9 %","cl":"增加： （1）血液濃縮（如脫水、燒傷等）。 （2）真性紅血球增多症。 （3）身體過度運動。 降低： （1）貧血（如缺鐵性貧血、地中海型貧血）。 （2）維他命B12或葉酸缺乏、肝臟疾病、甲狀腺功能低下等。 （3）急性出血。","ref":"（1）血液檢查：全套血液檢查、網狀紅血球計數（Reticulocyte count）、白血球分類檢 查、ESR。 （2）生化檢查：Iron、TIBC、GOT、GPT、BUN、CRE。 （3）血清檢查：Ferritine、維他命B12、甲狀腺檢查。 （4）尿液檢查。","note":"Hct、MCH、MCHC當計算過程中的參數受干擾影響時需修正。 （1）檢體和抗凝劑混合均勻。 （2）Hct、MCH、MCHC當計算過程中的參數受干擾影響時需修正。","tags":["肝臟","甲狀腺"]},{"n":"Hemoglobin (Hb)","cn":"血色素檢查","c":"T08X003","ins":"08003C","sp":"Blood-室溫保存","ct":"EDTA紫頭管","d":"1-3ml(嬰兒至少0.5ml以上)","g":"台中醫院醫事檢驗科\n          軌道組/急診檢驗組","st":"週一~週五 08:00~20:00            週六08:00~16:00            週日13:00~17:00            院內檢體:24小時收檢","rt":"一般件當日/急件:30分鐘","rv":"","cl":"增加： （1）血液濃縮（如脫水、燒傷等）。 （2）真性紅血球增多症。 （3）身體過度運動。 降低： （1）貧血（如缺鐵性貧血、地中海型貧血）。 （2）維他命B12或葉酸缺乏、肝臟疾病、甲狀腺功能低下等。 （3）急性出血。","ref":"（1）血液檢查：全套血液檢查、網狀紅血球計數（Reticulocyte count）、白血球分類 檢查、ESR。 （2）生化檢查：Iron、TIBC、GOT、GPT、BUN、CRE。 （3）血清檢查：Ferritine、維他命B12、甲狀腺檢查。 （4）尿液檢查。","note":"極高白血球、嚴重脂血、肝素檢體，紅血球溶解不全。 檢體和抗凝劑混合均勻。","tags":["肝臟","甲狀腺"]},{"n":"HBV viral load","cn":"B型肝炎病毒去氧核醣核酸定量","c":"T14X0331","ins":"12184C","sp":"Plasma","ct":"9 mL EDTA試管","d":"9 mL","g":"大安聯合醫事檢驗所","st":"不限","rt":"4個工作天","rv":"Not Detected。","cl":"B型肝炎病毒DNA定量分析，敏感度高，適合干擾素等藥物治療偵測，作為治療效果評估，臨床特異性為100%，具有95%以上的陽性偵測率，對於HBV所有基因型別和具pre-core突變的病毒彼此間之複製數(copy numbers)和對照質體DNA的濃度皆呈現很好的一致性。","ref":"生化檢查：ALT、AST、a-feto protein (AFP)","note":"無 檢體採集後於15-25℃24小時內須離心，並分裝血漿至專用離心管。 分裝後的血漿2-8℃下保存3天，在-20℃以下可穩定30天。送檢時請以冷凍低溫傳送。 如需複驗則再往後加一個工作日。","tags":["肝臟"]},{"n":"HBV mutant","cn":"B型肝炎病毒突變株","c":"T05XL1874","ins":"12187C","sp":"儘速離心-Plasma 冷藏","ct":"2管紫頭EDTA試管","d":"6 ml","g":"大安聯合醫事檢驗所","st":"不限，唯連續假期前一天起請勿採檢","rt":"10個工作天","rv":"Normal HBV DNA，Wild Type表示未檢測出可偵測之突變點。 報告說明： 1. Target gene: Reverse transcriptase gene 2. Limit of Detection: 120 IU/mL 3. Report Form:","cl":"主要偵測B型肝炎病毒4種口服抗病毒藥物之抗藥性，包括Entecavir (ETV) mutant貝樂克、Adefovir (ADV) mutant肝適能、Lamivudine(LMV)肝安能& Sebivo (LdT) mutant與喜必福。 Lamivudine(肝安能)為一核苷類似物(nucleoside analogue)為治療慢性B型肝炎的抗病毒藥物。最近的研究發現超過一年的肝安能延長治療(additional treatment)，對大多數病患可以持續抑制B型肝炎病毒的複製，維持血清轉氨酶(ALT)值正常，並且可以提高e抗原陰轉的比例。然而長期的肝安能治療會增加病毒的抗藥性，連續服用肝安能一年，約15-20%患者產生抗藥性，連續服用2年增至40%，連續3年則高達66%，最常見的抗藥基因突變發生在B型肝炎病毒聚合酶中YMDD的區域，在第552個氨基酸methionine會被valin或isoleucine 所取代；產生具抗藥性的YVDD或YIDD。 Adefovir dipivoxil(肝適能)會直接和B型肝炎病毒的DNA聚合酶結合，進而抑制B型肝炎病毒的複製，在一般的治療劑量下，它對人類細胞的DNA聚合酶並沒有影響。因此可達到選擇性抑制病毒複製的效果。肝適能在用藥一段時間後，有些病毒會在DNA上發生變異而產生抗藥性，使第188個氨基酸Alanine被Valine或Threonine所取代；第236個氨基酸Asparagine (Asn)轉變成為Threonine(Thr)。 Entecavir(貝樂克)與肝適能相同，可以抑制已對肝安能產生抗藥性的B肝病毒，由於需要多位點的氨基酸突變才會產生抗藥性，所以連續服藥5年的抗藥性比率約為1.2％，但已對肝安能產生抗藥性的患者，改用貝樂克後再度產生抗藥性的機會還是略高。 Sebivo(喜必福)為新型的口服抗病毒藥物，產生抗藥性的比例比肝安能稍低，但若是對肝安能或貝樂克已經產生抗藥性，便不建議使用喜必福。","ref":"Hepatitis B DNA Quantitative","note":"無。 (1)貯存在2-8℃，採檢至操作不超過七天，遇連續假日前一天起請勿採檢 (2)血漿須分裝至康試管冷藏 (3)資料來源：大安聯合醫事檢驗所網站。","tags":["肝臟"]},{"n":"HCV viral load","cn":"C型肝炎病毒核醣核酸定量","c":"T14X0511","ins":"12185C","sp":"儘速離心-Plasma 冷凍","ct":"9 mL EDTA試管","d":"9 mL","g":"大安聯合醫事檢驗所","st":"不限","rt":"4個工作天","rv":"Not Detected。","cl":"C型肝炎RNA血清定量，分析線性可達12 - 1.0x108，適合治療評估，干擾素及Ribavirin治療C型肝炎時，需要在治療前及三個月後檢驗HCV-RNA的量，如果沒有超過103下降時，很有可能治療無效。因而應考慮停止治療。 HCV RNA可確認HCV感染。適合治療評估，HCV病毒治療的目標是要達到一種持續性病毒學反應(sustained virologic response,SVR)，其呈現出持續偵測不到HCV RNA。 病人HCV RNA陽性時，代表感染C型肝炎，肝硬化與肝癌的危險機率上升。 臨床特異性100.0%，RNA測定結果介於100~1.0x108時，準確度1個標準差≦0.25 log IU。","ref":"生化檢查：ALT、AST、a-feto protein (AFP)","note":"無 檢體採集後24小時內須離心，並分裝血漿至專用離心管。 分裝後的血漿可於2-8℃下保存3天，否則就需儲存於-20℃以下。送檢時請以冷凍低溫傳送。 如需複驗則再往後加一個工作日。","tags":["肝臟","腫瘤標記","感染"]},{"n":"Hepatitis C RNA，Genotyping","cn":"C型肝炎病毒基因型","c":"T05XCN007","ins":"12202B","sp":"Serum（血清）","ct":"含Gel血清試管","d":"血清2 ml以上","g":"聯合醫事檢驗所代檢","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00           院內檢體24小時收檢","rt":"10個工作天","rv":"N.A.","cl":"C型肝炎病毒基因型分型主要用來評估對於干擾素治療的療效，目前的研究已知台 灣人感染 HCV 中 1b 型對於干擾素的治療效果並不好。結果 Negative 表示無法由 檢體偵測到 HCV RNA 來加以作基因型分型。","ref":"無。","note":"無。 資料來源：聯合檢驗目錄2011第171-172頁。","tags":["肝臟","感染"]},{"n":"Haptoglobin","cn":"結合蛋白","c":"T05XL046","ins":"12046B","sp":"Serum（血清）","ct":"含Gel血清試管","d":"3ml","g":"聯合醫事檢驗所代檢","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00             院內檢體24小時收檢","rt":"3個工作天","rv":"30-200mg/dL 二臨床意義： 當RBC破裂時，Heptoglobin會結合破裂RBC所釋出的Hemoglobin，主要功能為保存 體內鐵質，當溶血疾病發生時，Heptoglobin快速下降，可作為溶血的指標。 Heptoglobin上升於疾病急性期。 Heptoglobin下降於肝臟疾病、先天缺損、血管內外溶血、瘧疾、變異血紅素、SLE、 組織輸血、地中海型貧血、鐮刀型貧血、溶血性貧血、輸血溶血反應…等等。","cl":"","ref":"","note":"溶血會嚴重影響檢驗值。 （1）不能使用採檢溶血的檢體。 （2）新生兒很低，成長到4個月就可回復成人標準，國外的報告約有1%為先天缺損(congenital ahaptoglobinemia)。 （3）資料來源：聯合檢驗目錄2011第159頁。","tags":["生化"]},{"n":"HIV viral load","cn":"HIV 病毒負荷量檢查","c":"T14X074","ins":"14074B","sp":"儘速離心-Plasma 冷凍","ct":"紫頭EDTA試管","d":"9 mL","g":"大安聯合醫事檢驗所","st":"不限","rt":"4個工作天","rv":"Not Detected。","cl":"HIV-1 viral load(核酸確認檢驗)，是藉由偵測HIV-1的RNA來判斷是否被HIV-1感染的確認檢驗，同時也做為HIV-1治療成效的追蹤監控檢驗。一般來說，感染HIV-1最快兩週後可以檢測出HIV-1 RNA(核酸)。 人類免疫缺乏病毒(HIV)是後天免疫缺乏症候群(AIDS)的致病原因。目前HIV可分為兩型，HIV-1和HIV-2，HIV-1是大多數國家中最主要造成愛滋病的病因，HIV-2主要分布在西非；兩種病毒的致病力並不相同，感染HIV-1後超過90%的患者會在10-12年內發病成為愛滋病，感染HIV-2往往沒有相關的病症；因此如果沒有特別的接觸史，是不需要懷疑受HIV-2的感染，目前臺灣也尚未有HIV-2感染的案例。 根據臺灣愛滋病學會愛滋病檢驗及治療指引第六版(2020修訂)，當確認診斷為HIV-1感染後，應先執行CD4淋巴球數與HIV-1 viral load(病毒量)兩項檢驗，如果允許應當日投藥治療(ART)。服藥1個月後再檢驗一次CD4淋巴球數與病毒量以評估該抗病毒藥物處方之療效。此後若服藥穩定，第1年內建議每3個月檢驗一次CD4淋巴球數與病毒量；若連續兩次間隔3個月的病毒量檢驗結果都為 < 50 Copies/mL，且感染者都會乖乖服藥沒有擅自停藥的情形，可考慮延長檢驗之間隔；若感染者依照醫囑使用抗病毒藥物治療6個月以上，但是血漿HIV-1病毒量檢驗結果仍 > 200 Copies/mL，代表治療效果不佳，可能有抗藥性HIV-1產生，更改抗病毒藥物前建議執行HIV基因型抗藥檢驗。","ref":"血清免疫：anti-HIV-1 Ab、HIV-1western blot","note":"無。 1.\t檢體採集後須盡速離心，並分裝血漿至專用離心管。 2.\t分裝後的血漿2-8℃下保存3天，在-20℃以下可穩定30天。送檢時請以冷凍低溫傳送。 3.  如需複驗則再往後加一個工作日。 4.  單位轉換：1 Copies/mL = 1.63 IU/mL。","tags":["感染"]},{"n":"HLA-B 1502基因檢測","cn":"HLA-B 1502基因檢測","c":"T12X196","ins":"12196B","sp":"Blood - 冷藏","ct":"EDTA管","d":"3 mL.","g":"大安聯合醫事檢驗所","st":"不限","rt":"5個工作天","rv":"N.A","cl":"HLA-B1502基因型被發現對於漢族血統者(Han Chinese)因使用卡巴馬平 (Carbamazepine，Tegretol)藥物而引起的史帝芬強生症候群(Steven-Johnson Syndrome，SJS)，及毒性上皮溶解(Toxic Epidermal Necrolysis，TEN)(致死率約30%)有關聯性。 HLA-B1502為藥物過敏基因，帶有此基因者在服用Carbamazepine時可能發生過敏反應，嚴重時會因為藥物的皮膚黏膜毒性，導致死亡、失明、重殘。","ref":"無。","note":"無。 溶血檢體無法進行檢驗。","tags":["生化"]},{"n":"HLA-B27","cn":"組織抗原配合試驗－HLA-B27","c":"T12X086","ins":"12086B","sp":"Blood-冷藏保存","ct":"EDTA管","d":"3 mL.","g":"大安聯合醫事檢驗所","st":"六、日、國定假日(含)前一天不收檢","rt":"4個工作天\n(須再次確認者再延3個工作天)","rv":"","cl":"HLA-B27抗原陽性與僵直性脊椎炎(ankylosing spondylitis)及類風濕性關節炎具有強烈的相關性。90%的僵直性脊椎炎病人表現HLA B-27，而HLA B-27陽性個案比HLA B-27陰性個案，發生僵直性脊椎炎的機會高出120倍。 HLA-B27基因屬於Ⅰ型MHC基因，基本上表達在有機體中所有含核的細胞上，尤其是淋巴細胞的表面有豐富的含量。早在二十多年前，人們就已發現HLA-B27抗原的表達與僵直性脊椎炎有著高度相關性，超過90%的僵直性脊椎炎患者其HLA-B27抗原表現陽性，普通人群中僅5-10%爲陽性；僵直性脊椎炎的症狀與許多疾病相似而難以診斷，因此HLA-B27的檢測在病情的診斷中有著重要意義。 在脊椎性關節病這一類的疾病中除了僵直性脊椎炎以外，還有許多其他的疾病與HLA-B27抗原的表達有著或多或少的相關性，比如說反應性關節炎(Reiter's syndrome)，HLA-B27陽性率爲70-90%；銀屑病性關節炎(psoriatic arthritis)，HLA-B27陽性率爲50-60%；葡萄膜炎(uveitis)，HLA-B27陽性率爲40-50%；潰瘍性結腸炎伴有關節病(inflammatory bowel disease-associated arthritis)，HLA-B27陽性率爲5-10%。因此HLA-B27的檢測在這些疾病的診斷中是一個非常有價值的指標。","ref":"無。","note":"使用Flow cytometry(流式細胞儀)，具有同時分析多種抗原及快速準確的偵測特性，應用於T細胞上HLA-B27抗原的表現測定，搭配自動偵測分析軟體，可在短時間內得到精確的結果，此BDTM HLA-B27 Kit的靈敏度為100%，特異性為97.4%。此系統所使用的抗HLA-B27抗體(Clone GS145.2)已被發現與HLA-B7抗原有交叉反應(cross-reaction)，在螢光上會呈現gray zone結果反應，需要以Real-Time PCR方法進行二次確認，以精確判斷HLA-B27抗原的表現情形，再次確認報告時間需再延後3個工作天。 1、週六、週日、國定假日(含)前一天勿採檢。 2、採檢後只能於室溫(20-25℃)存放且穩定最多48小時，請盡速送檢。 3、請註明採檢時間，室溫保存，切勿冷藏。 4、退件原則：全血體積未達1mL或是凝血及溶血。","tags":["生化"]},{"n":"Homocysteine","cn":"同半胱胺酸","c":"T12X151","ins":"12151C","sp":"血清、血漿","ct":"血清分離管或\n         含有Potassium EDTA 、\n         Lithium heparin抗凝血劑之檢體管","d":"3 ml以上","g":"台中醫院醫事檢驗科軌道組","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00             院內檢體24小時收檢","rt":"3個工作天","rv":"男: 5.46-16.20 μmol/L 女: 4.44-13.56 μmol/L","cl":"Homocysteine和心血管疾病發生有密切關聯性，是評估動脈梗塞的危險因素，研究 發現，若血中濃度過高，則會破壞動脈內皮層，而導致心肌梗塞、腦中風的毛病。 上升：中風、心肌梗塞、胎兒神經缺損、流產等。","ref":"HDL、LDL。","note":"1.將同半胱胺酸濃度介於1.00至50.00μmol/L的EDTA血漿檢體添加膽紅素20 mg/dL、血紅素1000 mg/dL、低蛋白質3 g/dL、高蛋白質12 g/dL、三酸甘油酯6000 mg/dL、肝素1 U/ml時，EDTA血漿檢體平均回收率介於94.4%至104.5%。 2.下列藥物可能使同半胱胺酸濃度升高：胺基甲基葉酸、卡巴馬平、二苯妥因、一氧化二氮、抗痙攣劑及氮尿苷乙酯。上述藥物的作用機制會影響同半胱胺酸新陳代謝途徑的不同部分。 3. S-腺苷甲硫胺酸為與S-腺苷同半胱胺酸分子形式相似的抗憂鬱劑，該藥物可能干擾本產品。 不可使用有下列情況之檢體：加熱去活化、嚴重溶血、明顯微生物污染。","tags":["生化"]},{"n":"HPV DNA Test","cn":"人類乳突病毒","c":"T05XCN001","ins":"","sp":"子宮頸分泌物","ct":"HPV DNA 專用管","d":"","g":"新隆醫事檢驗所代檢","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00           院內檢體24小時收檢","rt":"7個工作天","rv":"陰性反應：＜1.0 陽性反應：≧1.0","cl":"子宮頸抹片檢查是一項用來檢查婦女是否可能有子宮頸癌或其前驅病變的初步篩檢， 若抹片結果異常，則須作進一步的子宮頸鏡或切片檢查。然而受制於傳統抹片檢查之 取樣、染色過程及主觀的判讀影響，加上大約15~25%患有子宮頸癌前驅病變者，其先 前之抹片正常，導致傳統子宮頸抹片檢查的偽陰性高達20~40%。目前已知約有95%的 子宮頸癌或高度病變患者可測出HPV DNA，而HPV在子宮頸癌致病機轉中的角色亦 已日趨明朗，若能在子宮頸癌的診斷上輔以HPV DNA的檢查，將可使子宮頸癌的檢 出率與準確性大為提高，可減少不必要的子宮頸鏡檢查，避免過度診斷造成醫療資源 的浪費。","ref":"子宮頸鏡或切片檢查。","note":"無 （1）檢體可於4-37C存放3星期，切勿冷凍；常溫可放置2星期。 （2）此檢驗針對13種高危險致癌型人類乳突病毒進行檢驗，包含16、18、31、33、35、39、45、51、52、56、58、59、68等亞型。","tags":["腫瘤標記"]},{"n":"Hs-CRP(CRPH)","cn":"高敏感度C反應性蛋白試驗","c":"T09X950","ins":"12015C","sp":"Serum（血清）、plasma(血漿)","ct":"含Gel血清試管、\n含Li-Heparin抗凝劑的heparin管","d":"2ml以上","g":"中央實驗室 軌道組","st":"週一～週五  08:00~20:00           週六 08:00~16:00           週日 13:00~17:00           院內檢體24小時收檢","rt":"一般件8小時/急件40分鐘","rv":"Low risk：＜0.1 mg/dL Average risk： 0.1-0.3 mg/dL High risk：＞0.3 mg/dL","cl":"C反應蛋白的測量是用來診斷壓力、創傷、感染、發炎、手術。已知血液中的C反應蛋白會快速上升，甚至高達50 mg/dL ，反應出人體對感染或受傷的非特異性發炎反應。HSCRP較CRP有更高的靈敏度，能更精確的定量更低濃度的CRP，用以評估心血管疾病的危險機率，其靈敏度為一般CRP的10倍以上，使用對象應為心血管危險指標出現異常、糖尿病、高血壓等潛在發病危機的患者。","ref":"生化檢查：HDL、CHOL、HDLD、TG、Glu。","note":"(1)在反應溶液中若有灰塵粒子或其他微粒物質(碎屑或細菌)可能無關的光散射信號，導致結果分析變異。 (2)接受過免疫治療或使用單株抗體的病人檢體中若存有人體抗老鼠抗體(HAMA)會有干擾的可能。 (3)脂血檢體應使用超高速離心機離心避免干擾，再上機執行。 CRP數值上升是非特異性的，解釋上升代表之意義時應有完整臨床病史佐證。因此，任何針對發炎之判斷應該基於多次測量產生之CRP數值的改變，並且用來與其他心臟風險指標(如.HDLC，CHOL，etc.)相互結合。","tags":["糖尿病","感染"]},{"n":"HSV I IgG","cn":"單純疱疹病毒抗體I-IgG","c":"T14X0691","ins":"14069B","sp":"Serum、Plasma","ct":"含Gel血清試管\n          含EDTA、Citrate、Heparin試管","d":"血清、血漿0.5ml以上","g":"台中醫院醫事檢驗科特檢組(二)","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00             院內檢體24小時收檢","rt":"3個工作天","rv":"","cl":"","ref":"","note":"","tags":["特殊檢驗"]},{"n":"HSV II IgG","cn":"單純疱疹病毒抗體II -IgG","c":"T14X0692","ins":"14069B","sp":"Serum、Plasma","ct":"含Gel血清試管\n          含EDTA、Citrate、Heparin試管","d":"血清、血漿0.5ml以上","g":"台中醫院醫事檢驗科特檢組(二)","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00             院內檢體24小時收檢","rt":"3個工作天","rv":"","cl":"","ref":"","note":"","tags":["特殊檢驗"]},{"n":"HSV Type I +II IgM Ab","cn":"單純庖疹病毒I+II型IgM抗體","c":"T05XN0523","ins":"14052B","sp":"Serum（血清）","ct":"含Gel血清試管","d":"3ml","g":"聯合醫事檢驗所代檢","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00             院內檢體24小時收檢","rt":"3個工作天","rv":"Negative：＜0.9 Equivocal：0.9-1.09 Positive：≧1.1 Index","cl":"本檢查診斷HSV病毒最近感染或病毒再活化，個體免疫反應不同，部份HSV IgG並未上昇至異常高值，可以使HSV IgM協助診斷。診斷皰疹病毒最近感染或者病毒再活化，通常感染後14天，可以測到IgM抗體陽性，約維持一個月。診斷意義相當於兩次IgG抗體檢驗間隔14天，看到IgG抗體上升兩倍以上。病毒潛伏再活化時IgM抗體不一定可以測得到。這一個檢查使用分型相對特異性比較高的檢驗方法，第一型抗體與第二型抗體以及帶狀皰疹(V. zoster)抗體間的交叉反應幾乎可以忽略。顯微鏡下感染的表皮細胞呈現多核非典型核的上皮細胞。","ref":"無。","note":"無。 （1）新方法只提供1+2型複合測試，無法單一對各型作分析。 （2）資料來源：聯合檢驗目錄2011第173-174頁。","tags":["感染"]},{"n":"HLA-ABC","cn":"人類白血球抗原第一型","c":"T05XL087","ins":"12087B","sp":"Blood","ct":"紫頭管","d":"6 mL","g":"彰基血液鏡檢組","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00           院內檢體24小時收檢","rt":"7個工作天","rv":"無。","cl":"HLA為位於chromosome 6短臂的許多loci上，衍製成許多不同構造之分子。 HLA-A，-B，-C，屬於class I分子；HLA-DR，-DQ，-DP屬於HLA-D，為class II分子，HLA typing已應用到臨床，尤其在器官移植。病人及donor均需徹底做HLA typing以期找到最適合的donor，HLA也應用在親子鑑定上。最近更在主動免疫導致疾病上發現種族上的關聯性，可見HLA是多變異性及多樣性（polymorphism）的基因系統，為研究族群關係很好之材料。","ref":"","note":"(1) 需檢附採檢時間。 (2) 資料來源：彰基檢驗資訊查詢系統。","tags":["血液學"]},{"n":"HLA-DR,DQ","cn":"人類白血球抗原第二型","c":"T05XL088","ins":"12088B","sp":"Blood","ct":"大紫頭管","d":"8 mL","g":"中榮免風科","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00           院內檢體24小時收檢","rt":"14個工作天","rv":"無。","cl":"HLA為位於chromosome 6短臂的許多loci上，衍製成許多不同構造之分子。 HLA-A，-B，-C，屬於class I分子；HLA-DR，-DQ，-DP屬於HLA-D，為class II分子，HLA typing已應用到臨床，尤其在器官移植。病人及donor均需徹底做HLA typing以期找到最適合的donor，HLA也應用在親子鑑定上。最近更在主動免疫導致疾病上發現種族上的關聯性，可見HLA是多變異性及多樣性（polymorphism）的基因系統，為研究族群關係很好之材料。","ref":"","note":"3個月內有輸血可能會影響結果。 (1) 需檢附採檢時間、健保卡號、診斷碼、就醫科別及開單醫師。 (2) 如遇3天以上連續假期，於假期前一日停止採檢。","tags":["生化"]},{"n":"HSV PCR","cn":"單純皰疹病毒基因檢查","c":"T05XL1823/T05XL1821","ins":"12182C04/12182C01","sp":"全血 /CSF","ct":"EDTA抗凝管 /無菌白色尖底管","d":"3 C.C","g":"中國檢驗部分生組","st":"","rt":"10個工作天","rv":"No HSV DNA was detected","cl":"","ref":"","note":"PCR技術具有高度的靈敏度和特異性，實驗室確效，最低偵測極限為100 copies/mL。PCR 與傳統病毒培養方法所需要的時間來比較，PCR技術確實能快速地偵測病毒的存在，利 用分子生物學技術所得到的HSV診斷結果，若無偵測到HSV病毒的DNA，有可能因為病 毒量低於偵測極限，並不代表病毒未存在於體內；若有偵測到HSV病毒的DNA，則無法 區分為活病毒或死病毒，故以PCR得知之結果須與病人的臨床資料及病毒培養結果比 較，才可做為臨床醫師重要的參考資料。 參考資料來源：中國附醫檢驗部網站。","tags":["分子檢驗"]},{"n":"HTLV-I antibody (qualitative)","cn":"第一型人類嗜T細胞抗體(定性)","c":"T05XL163","ins":"12163B","sp":"Serum（血清）","ct":"含Gel血清試管","d":"3ml","g":"聯合醫事檢驗所代檢","st":"週一～週五  08:00~20:00           週六 08:00~16:00           週日 13:00~17:00           院內檢體24小時收檢","rt":"3個工作天","rv":"Non-reactive：<1.0 S/CO，Reactive：>=1.0 S/CO","cl":"HTLV-I鑲嵌到Atypical lymphocyte，形成四分葉狀核clover-leaf lymphocytes，為成人T-cell白血病，也會有免疫抑制的現象。HTLV-I侵犯神經，表現痙攣性下身麻痺，骨髓，多肌炎，關節炎，血管炎，乾眼症。高濃度的抗體及sIL-2R都指向與罹患Adult T-cell leukemia /lymphoma(ATL)有關，但抗體陽性僅有2-4%為ATL。","ref":"無。","note":"無。 資料來源：聯合檢驗目錄2011第183頁。","tags":["生化"]},{"n":"HLA-B5801","cn":"人類白血球抗原基因B*58:01","c":"T05XL1761","ins":"12176 B","sp":"全血","ct":"EDTA紫頭管","d":"6mL","g":"彰化基督教醫院檢驗科分子檢驗組","st":"全日收檢(國定假日前一日請勿採檢，收假前一日可恢復採檢)","rt":"7個工作天","rv":"Not detected","cl":"(1)Allopurinol為治療痛風及高尿酸的常見用藥，但此藥物有一個相當嚴重的藥物不良反應，就是可能引起Sever cutaneous adverse reaction（SCAR），其中包括：allopurinol hypersensitivity syndrome (AHS)，甚至更罕見的 Steven-Johnson Syndrome (SJS)（死亡率達3-15%）或臨床致死率高達30%的Toxic Epidermal Necrolysis (TEN)。 (2)在台灣，約有15-20%的人口帶有HLA-B*58:01這個基因，而SJS/TEN 的發生率為每年每百萬人口8例，相較於歐美地區每年每百萬人的二至三人，台灣SJS的發生率高的驚人，為確保用藥安全，首次使用Allopurinol治療之患者建議執行HLA-B*58:01 allele檢驗，以避免其嚴重藥物過敏之風險的發生。","ref":"無。","note":"檢體溶血、檢體Clot、檢體量少、萃取後DNA濃度未達允收標準。（20ng/uL）。 資料來源：彰化基督教醫院檢驗資訊查詢系統HLA-B*58:01 allele。","tags":["分子檢驗"]},{"n":"HIV抗體免疫層析法","cn":"HIV抗體免疫層析法","c":"T14X0752","ins":"14075C02","sp":"血清、血漿、靜脈全血、\n          指尖採血全血","ct":"血清分離管、含EDTA、Heparin或Sodium citrate抗凝血劑之檢體管","d":"3 mL","g":"台中醫院醫事檢驗科特檢組","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00           院內檢體24小時收檢","rt":"一個工作日","rv":"Negative 。","cl":"HIV感染血清檢測的主要免疫性蛋白質及抗原標的為HIV病毒穿膜蛋白(TMP)。對抗TMP的抗體(anti-TMP)都是在HIV感染個體血清轉換時最先出現的；由HIV感染之無症狀期及症狀期幾乎都有抗TMP之抗體存在可證明抗TMP反應在整個病程當中一直都相當強。在HIV感染不久後、血清轉換前，血清或血漿檢體中便可測得HIV抗原。最常被用來作為抗原血症指標的HIV結構蛋白為核心蛋白p24，目前分析試劑已有抗HIV p24抗體來偵測血清轉換前之HIV p24抗原，以藉此減少血清轉換之空窗期，並提高HIV感染之早期偵測力。","ref":"無。","note":"無。 無。","tags":["特殊檢驗","感染"]},{"n":"Helicobacter pylori Ag","cn":"幽門桿菌糞便抗原檢驗","c":"T30X522","ins":"30522C01","sp":"糞便","ct":"專用糞便收集瓶(藍蓋)-含稀釋液","d":"約30-50毫克(約一顆綠豆大小)\n          隨機刺入3個不同部位","g":"臺中醫院醫事檢驗科 特檢組","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00           院內檢體24小時收檢","rt":"2個工作天","rv":"NEGATIVE。","cl":"幽門螺桿菌糞便抗原（HpSA）檢測用來診斷幽門螺桿菌感染和監測幽門螺桿菌感染的 治療效果。研究發現，90%以上的十二指腸潰瘍患者和80%以上的胃潰瘍患者都感染了幽門螺桿菌。幽門螺桿菌是一種小型螺旋狀細菌，生活在胃和十二指腸表面。它與多種胃腸道疾病的病因有關，包括十二指腸和胃潰瘍、非潰瘍性消化不良以及活動性和慢性胃炎。 .","ref":"Helicobacter pylori Ab、病理切片、胃鏡檢查。","note":"1. 不要舀取糞便標本，禁止採集過量糞便。 2. 如果檢測結果為陰性且臨床症狀持續存在，建議使用其他方法進行檢測。 3. 陰性結果不代表排除幽門螺桿菌感染的可能性。 4. 建議正確的收集方式應於藥物治療前或是停止藥物治療14天後收集糞便檢體。","tags":["特殊檢驗","糞便","感染"]},{"n":"HbcrAg + HBs Ag定量","cn":"B型肝炎病毒核心關連抗原(HBcrAg)合併表面抗原(HBsAg)定量檢驗","c":"T05XCN027","ins":"14085C","sp":"Serum（血清）","ct":"含 Gel 血清試管","d":"3 ml","g":"大安聯合醫事檢驗所代檢\n(HbcrAg轉立人醫事檢驗所)","st":"不限","rt":"10個工作天","rv":"","cl":"","ref":"","note":"","tags":["生化"]},{"n":"IgA","cn":"免疫球蛋白A","c":"T09X943","ins":"12027B","sp":"Serum（血清）、血漿","ct":"含Gel血清試管、含有Lithium heparin或EDTA試管抗凝血劑試管。","d":"4 mL以上","g":"台中醫院醫事檢驗科軌道組","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00           院內檢體24小時收檢","rt":"3個工作天","rv":"66.00-433.00 mg/dL","cl":"1、 Ig A的分子量約為160,000，沉澱係數7 S，IgA以選擇性的方式存在漿膜和黏膜的分泌液中，具有抑制微生物黏附到黏膜細胞上的功能，因此可以防止微生物進入體內，此外IgA和溶菌及補體有協同作用，可以消滅某些腸內細菌。凝聚的Ig A可和多形核白血球結合，活化C3的替代路境。Ig A佔總免疫球蛋白的15%。 2、免疫球蛋白能保護人體對抗外侵的生物及病原體。免疫球蛋白含有一個抗原結合的部份（Fab部份），和一個可與免疫系統細胞及補體因子發生互動的Fc部份。免疫球蛋白的Fab部份可辨識溶液中的抗原（例如毒素），及與微生物有關的抗原（例如細菌、病毒）。抗原結合區能啟動以下的反應：將毒素直接中和、具免疫能力的細胞（immunocompetent cells）之致敏化、降低病毒感染力、發炎反應之形成。 3、 IgA濃度可於以下的情形升高： 皮膚感染、腸道感染、呼吸道感染、及腎臟感染。製造免疫球蛋白的細胞（漿細胞）如有惡性增殖時，會引起血清單一種免疫球蛋白的濃度增加（漿細胞瘤）。 4、免疫球蛋白的缺乏則是由於： 蛋白質流失綜合症、遺傳性缺乏、或繼發於淋巴的惡性腫瘤。由於IgA的合成發生較慢，嬰孩血清中IgA濃度要比成人的低。","ref":"無。","note":"檢體為血清、血漿種類時溶血小於500 mg/dL、黃疸（Icterus）小於40 mg/dL、高血脂（Lipemia）小於1000 mg/dL及RF陽性的檢體 (600IU/mL)，都無顯著干擾現象。 血清、血漿應立刻與血球凝塊分離並進行分析。","tags":["腎臟","腫瘤標記","感染"]},{"n":"IgD","cn":"免疫球蛋白Ｄ","c":"T05XL030","ins":"12030B","sp":"Serum（血清）","ct":"含Gel血清試管","d":"3ml","g":"大安聯合醫事檢驗所\n轉林口長庚代檢","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00             院內檢體24小時收檢","rt":"10個工作天","rv":"","cl":"","ref":"","note":"","tags":["生化"]},{"n":"IgE","cn":"免疫球蛋白Ｅ","c":"T09X912","ins":"12031C","sp":"Serum、Plasma","ct":"含Gel血清試管，或含EDTA、Li- heparin、\nNa- heparin 、sodium citrate等抗凝劑之試管。","d":"4ml以上","g":"中央實驗室特檢組","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00           院內檢體24小時收檢","rt":"3個工作天","rv":"0 ~ < 7歲：< 25.0 – 440.0 IU/mL 7 ~ < 19歲：< 25.0 – 450.0 IU/mL 成人(20~60歲)：0.0 – 160.0 IU/mL","cl":"免疫球蛋白E（IgE）在免疫系統對抗寄生蟲感染及過敏（第一型過敏反應）上均扮演著一個重要的角色。 增加：患有過敏性疾病（如乾草熱、異位性支氣管炎及皮膚炎）的病患。在非過敏性疾病中也可出現升高的血清IgE濃度，例如支氣管肺炎麴菌症、Wiskott-Aldrich氏症候群、高免疫球蛋白E症候群、骨髓瘤及寄生蟲感染。 降低：惡性腫瘤、先天性疾病、長期使用免疫抑制劑等。","ref":"MAST、Specific IgE。","note":"無。 無。","tags":["特殊檢驗","腫瘤標記","感染"]},{"n":"IgG","cn":"免疫球蛋白Ｇ","c":"T09X942","ins":"12025B","sp":"Serum、Plasma","ct":"含Gel血清試管、含有Lithium heparin或EDTA試管抗凝血劑試管。","d":"4ml以上","g":"台中醫院醫事檢驗科軌道組","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00             院內檢體24小時收檢","rt":"3個工作天","rv":"635～1741mg/dL。","cl":"1 、IgG分子量約為150,000，沉澱係數為7S，佔總免疫球蛋白的80%。因為IgG可以通過胎盤，因此它可以保護初生兒抗感染的能力。Ig G具有誘導活化補體的典型途徑，可以和單核球、嗜中性球和殺手細胞結合來對抗微生物及其分泌的毒性。 2、免疫球蛋白可保護人體對抗外來的微生物及物質。免疫球蛋白包含一個抗原結合部份(Fab 端)以及與免疫系統細胞和補體反應的Fc端。免疫球蛋白的Fab部份會辨認溶液中的抗原(如：毒素)及微生物相關的抗原(如：細菌，病毒)。抗原結合位置最初可能直接中和毒素，引發免疫勝任細胞，降低病毒感染力，或造成發炎反應。免疫球蛋白產生的細胞(plasma cell)若有惡性增生，會造成血清內單一免疫球蛋白的增加(plasmocytoma)。免疫球蛋白的缺乏可能是由於蛋白質流失症，遺傳缺失或其次為淋巴癌。 3、所謂的漿細胞惡病質症(monoclonal immunoglobulinemia)的異常蛋白質分泌可能與多 株來源的各種免疫球蛋白在胺基酸組成與大小上有所不同。這可能會減少與抗體的結合，因而減少正確的定量。 4、多株抗體 (polyclonal)增加發生於肝臟疾病，如慢性活動性肝炎，肝硬化及慢性感染。 5、單株抗體 (monoclonal)增加發生於多發性骨隨瘤，淋巴瘤。","ref":"無。","note":"檢體(Serum、Plasma)溶血小於500mg/dl、黃疸：膽紅素小於40 mg/dl、高血脂Lipemia 小於1000 mg/dl、RF濃度小於1200IU/ml之檢體無顯著干擾現象。 血清、血漿應立刻與血球凝塊分離並進行分析。","tags":["肝臟","腫瘤標記","感染"]},{"n":"IgG 4 subclass","cn":"Ｇ型免疫球蛋白4次群定量","c":"T05XL149","ins":"12149B","sp":"Serum（血清）","ct":"含Gel血清試管","d":"5 ml","g":"長庚紀念醫院林口檢驗醫學科","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00           院內檢體24小時收檢","rt":"10個工作天","rv":"3~200 mg/dL。","cl":"免疫球蛋白IgG可分為四種亞型IgG1、IgG2、IgG3、IgG4，這四種亞型在正常人體所佔含量比率分別為60-70%、14-20%、4-8% 及2-6%。 IgG1、 IgG3主要對抗蛋白質抗原，如常見的病毒感染等。IgG2為對抗含多醣體莢膜細菌的主要抗體，發育最慢，最易缺乏。 IgG4與食物之過敏反應有關。IgG2、IgG3、IgG4亞型的量會被主要的IgG1遮蓋，故不論IgG總量為低值或正常值，皆不能排除出現亞型缺陷的情況，其缺乏可以單獨出現或組合出現。 IgG4上升：過敏、哮喘、特異性濕疹、皮炎，最近文獻報告顯示自體免疫胰臟炎 (Autoimmune pancreatitis，AIP)病人IgG4會升高。\nIgG4下降：免疫缺陷疾病、莢膜細菌的反復感染會出現 IgG2 和 IgG4下降，帶有支氣管 擴張的復發感染會出現 IgG2、 IgG3和IgG4下降。","ref":"無。","note":"資料來源: 長庚紀念醫院林口檢驗醫學科網站檢驗項目資料查詢。","tags":["感染","自體免疫"]},{"n":"IgM","cn":"免疫球蛋白M","c":"T09X944","ins":"12029B","sp":"Serum（血清）、血漿","ct":"含Gel血清試管、含有Lithium heparin或EDTA試管抗凝血劑試管。","d":"4ml以上","g":"台中醫院醫事檢驗科軌道組","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00             院內檢體24小時收檢","rt":"3個工作天","rv":"45.00～281.00 mg/dL","cl":"1、在一個正常的感染下，所有血清內免疫球蛋白量都會升高。在肝細胞疾病（例如：肝炎、肝硬化）、自體免疫疾病以及特別是在急性和慢性病毒性感染期間IgM會上昇。免疫球蛋白製造細胞（漿細胞）的惡性細胞增生會造成血清內單一免疫球蛋白（漿細胞瘤(plasmocytoma)）的濃度增加。免疫球蛋白的缺乏可能是由於蛋白質流失症，遺傳缺失或其次為淋巴癌。 2、IgM常被認為是一種大分子球蛋白的抗體，分子量約為900,000，沉澱係數為19S， IgM是由5個unit所組成的polymers，彼此間以J-chain連著，佔總免疫球蛋白的6%。 3、、IgM不能通過胎盤，是急性疾病期最早出現的抗體，具有活化補體的典型途徑，但不會和單核球，嗜中性球結合，是B cell 細胞膜上最主要的免疫球蛋白。 4、多株抗體 (polyclonal)增加發生於肝臟疾病和慢性感染，病毒性肝炎，單核球疾病，原發性膽汁性肝硬變。 5、單株抗體 (monoclonal)增加：Waldenstrom’s macroglobulinemia。","ref":"無。","note":"檢體為血清、血漿種類時溶血小於500 mg/dL、黃疸（Icterus）小於40 mg/dL、高血脂（Lipemia）小於200 mg/dL)，都無顯著干擾現象。 血清、血漿應立刻與血球凝塊分離並進行分析。","tags":["肝臟","腫瘤標記","感染","自體免疫"]},{"n":"Immuno-EP CSF","cn":"腦脊髓液免疫球蛋白電泳","c":"T05XL157","ins":"12157B","sp":"CSF腦脊髓液","ct":"尖底白蓋管","d":"3 ml","g":"大安聯合醫事檢驗所代檢","st":"不限","rt":"10個工作天","rv":"","cl":"","ref":"","note":"","tags":["生化"]},{"n":"Indirect antihuman globulin test","cn":"間接抗球蛋白試驗","c":"T12X098","ins":"12098B","sp":"Serum（血清）","ct":"含Gel血清試管","d":"3 mL","g":"急檢檢驗室","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00           院內檢體24小時收檢","rt":"當日","rv":"Negative","cl":"利用已知抗原的O型紅血球與受檢者血清(漿)反應，以獲知不規則抗體。","ref":"不規則抗體篩檢。","note":"若為使用Heparin之患者，如洗腎檢體，Polybrene 試劑的量需增加2～3倍，否則 會影響判讀。 無。","tags":["生化"]},{"n":"Influenza A Ag","cn":"流行性感冒A型病毒抗原","c":"T14X065","ins":"14065C","sp":"鼻腔或鼻咽拭子\n鼻腔沖洗液/吸引液","ct":"Influenza Extration tube","d":"","g":"急診檢驗室","st":"週一~週五 08:00~20:00            週六08:00~16:00            週日13:00~17:00            院內檢體24小時收檢","rt":"一般件當日/急件:40分鐘","rv":"Negative","cl":"檢測是否有influenza A病毒抗原存在。","ref":"無。","note":"無。 檢體於室溫容器(1~30℃)或冷藏(2-8℃)可保存8小時。","tags":["生化"]},{"n":"Influenza A Ag","cn":"流行性感冒A型病毒抗原","c":"T14X065","ins":"14065C","sp":"鼻腔或鼻咽拭子\n鼻腔沖洗液/吸引液","ct":"Influenza Extration tube","d":"","g":"急診檢驗室","st":"週一~週五 08:00~20:00            週六08:00~16:00            週日13:00~17:00            院內檢體24小時收檢","rt":"一般件當日/急件:40分鐘","rv":"Negative","cl":"檢測是否有influenza A病毒抗原存在。","ref":"無。","note":"無。 檢體於室溫容器(1~30℃)或冷藏(2-8℃)可保存8小時。","tags":["生化"]},{"n":"Influenza B Ag","cn":"流行性感B型病毒抗原","c":"T14X066","ins":"14066C","sp":"鼻腔或鼻咽拭子\n鼻腔沖洗液/吸引液","ct":"Influenza Extration tube","d":"","g":"急診檢驗室","st":"週一~週五 08:00~20:00            週六08:00~16:00            週日13:00~17:00            院內檢體24小時收檢","rt":"一般件當日/急件:40分鐘","rv":"Negative","cl":"檢測是否有influenza B病毒抗原存在。","ref":"無。","note":"無。 檢體於室溫容器(1~30℃)或冷藏(2-8℃)可保存8小時。","tags":["生化"]},{"n":"Insulin","cn":"胰島素免疫分析","c":"T09X103","ins":"09103C","sp":"Serum（血清）","ct":"含Gel血清試管","d":"4ml以上","g":"台中醫院醫事檢驗科軌道組","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00           院內檢體24小時收檢","rt":"3個工作天","rv":"1.9 - 23.0 uIU/ml","cl":"","ref":"生化檢驗：C-Peptide、 Glucose、Glucose Tolerance Test (GTT)。","note":"無。 (1)數據超過30 uIU/mL，應立即追蹤是否低血糖或者飯後的檢體。 (2) 8小時以上空腹，不要進食、飲料(除了白開水)。未遵守空腹原則，會得到偽高值。 (3)同時檢驗空腹血糖時可以計算HOMA-IR 是目前普遍使用的間接評估胰島素阻抗的方 法。計算公式：HOMA-IR =空腹 insulin (μIU/ mL) ×空腹 glucose (mg/dL) / 405 . 參考來源：Matthews DR, Hosker JP, Rudenski AS, Naylor BA, Treacher DF, Turner RC. Homeostasis model assessment: insulin resistance and beta-cell function from fasting plasma glucose and insulin concentrations in man. Diabetologia. 1985;28(7):412-419.","tags":["生化"]},{"n":"insulin-like growth factor 1    \n\n           (Somatomedine C)","cn":"類胰島素成長因子","c":"T05XX023","ins":"","sp":"serum","ct":"含Gel血清試管","d":"3ml","g":"大安聯合醫事檢驗所","st":"週一~週五 08:00~20:00           週六 08:00~16:00           週日 13:00~17:00           院內24小時收檢","rt":"三個工作天","rv":"備註：Tanner Stages男孩9-14歲平均12歲，女孩8-12歲平均11歲；在台灣男孩的平均青春期約14歲，女孩約為12歲","cl":"IGF-1主要是由肝臟製造的polypeptide，經由血液運送，到達目標後與細胞膜受體結合，刺激正常細胞的生長與繁殖。IGH-1影響葡萄糖的代謝，IGF-1受到GH活性的影響，因此使用GH治療時，可以偵測IGF-1，例如對成人補充GH、對侏儒症GH治療，都可以使用IGF-I觀察治療效果，當快速生長最有效果時，IGF-1數據最高。IGF-1也被用來評估肢端肥大症嚴重的程度。\nIGF-1上升於肢端肥大症，糖尿病視網膜病變，腦下垂體機能亢進，肥胖，巨人症，青春期早熟，懷孕。\n IGF-1下降於神經性厭食，肝硬化，慢性疾病，糖尿病，侏儒症，腦下垂體機能不足，停經後，GH缺損，甲狀腺機能亢進，營養不良。IGF-I也正確反應GH的分泌，下降於GH不足時。","ref":"生化檢驗：C-Peptide, Glucose, Glucose Tolerance Test (GTT)","note":"無 無","tags":["肝臟","甲狀腺","糖尿病"]},{"n":"Intact parathyrin(i-PTH)","cn":"Intact副甲狀腺素免疫分析","c":"T09X122","ins":"09122C","sp":"Serum（血清）、血漿","ct":"含Gel血清試管、\n          含有Potassium EDTA 、\n          Lithium heparin、sodium heparin\n          抗凝血劑之檢體管","d":"3ml以上","g":"台中醫院醫事檢驗科軌道組","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00             院內檢體24小時收檢","rt":"3個工作天","rv":"15.0 ~ 68.3 pg/mL","cl":"（1）PTH和維生素D、甲狀腺降鈣素(calcitonin)使得骨骼系統中的鈣離子和磷酸鹽得以流通，而且會增加腸道中鈣的吸收以及經過腎臟將磷酸鹽排泄出去。PTH和甲狀腺降鈣素(calcitonin)的交互作用確保了血中鈣濃度的恆定性，鈣的濃度太高會抑制PTH分泌，太低則會促進分泌。副甲狀腺疾病會導致血鈣濃度的增加或降低，造成PTH分泌的改變。副甲狀腺機能亢進(hyperparathyroidism)會導致PTH分泌增加，原發性的原因是副甲狀腺腺瘤。 （2）續發性副甲狀腺機能不足(hypoparathyroidism)血鈣濃度降低是由於其它病理狀態所造成的(例如：維生素D缺乏)。 （3）每次副甲狀腺腺瘤切除手術之間(interoperative)測定PTH可以讓外科醫師根據PTH快速降低來評估切除是否完全。","ref":"無。","note":"潛在干擾之內生性物質根據美國國家臨床實驗室標準委員會（NCCLS）Protocol EP7-A的研究評估ARCHITECT Intact PTH分析血紅素、膽紅素、三酸甘油酯及蛋白質於以下所示濃度之潛在干擾。結果顯示並未出現顯著之干擾，因為平均回收率都在預期結果的± 10%以內。測試結果摘錄如下表 不可使用有下列情況之檢體：加熱去活化、嚴重溶血、明顯微生物污染。","tags":["腎臟","甲狀腺"]},{"n":"Intercellular substance antibody","cn":"細胞間質抗體","c":"T05XL067","ins":"12067B","sp":"Serum（血清）","ct":"含Gel血清試管","d":"3 ml","g":"大安聯合醫事檢驗所代檢","st":"不限","rt":"7個工作天","rv":"","cl":"","ref":"Basement membrane zone Ab、ANA。","note":"無。 資料來源：大安聯合醫事檢驗所。","tags":["生化"]},{"n":"Isolation and identification of virus","cn":"病毒培養及鑑定","c":"T05XN001","ins":"14001B","sp":"tissue、CSF、血液等各種體液","ct":"Viral transport medium、無菌管、 \n          EDTA管等","d":"Urine 5-10c.c/其他體液3-5c.c","g":"中榮病毒室","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17:00           院內檢體24小時收檢","rt":"15天(懷疑CMV感染30天發報告)","rv":"無。","cl":"病毒培養是診斷病毒感染之標準方法(Gold standard)，目前可培養之病毒如下:呼吸道病 毒Influenza virus A&B、RSV、Adenovirus、Parainfluenza virus type 1-3 腸病毒Poliovirus type 1-3、Echovirus、Coxsackievirus A&B、EV-71 疱疹病毒HSV I&II、CMV、VZV(Varicella-Zoster virus) 。","ref":"","note":"1.發病超過4天之檢體，病毒量會迅速下降。 2.採取Throat swab檢體時，請用力刮取發病部位之表面細胞。 3.檢體採集後應盡快以冰浴傳送至病毒室，如暫時無法傳送，先保存在4℃冰箱。 4.Viral transport medium先回溫成液態才可使用。 資料來源：中榮病理檢驗部網站。","tags":["感染"]},{"n":"IgG-CSF","cn":"免疫球蛋白Ｇ-CSF","c":"T05XL0251","ins":"12025B01","sp":"CSF","ct":"含Gel血清試管","d":"0.5ml以上","g":"聯合醫事檢驗所代檢","st":"週一～週五  08:00~20:00           週六 08:00~1600           週日 13:00~17
