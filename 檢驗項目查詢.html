<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>檢驗項目查詢</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F6F3;--surface:#FFFFFF;--surface2:#EFEFEC;
  --text:#1A1A18;--text2:#555550;--text3:#999990;
  --border:#DDDCD8;--border2:#AEADA8;
  --accent:#2D6A4F;--accent-light:#E8F4EE;--accent-mid:#95D5B2;--accent-dark:#1B4332;
}
body{font-family:"Noto Sans TC",sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;min-height:100vh}
.header{background:var(--surface);border-bottom:2px solid var(--accent);padding:12px 20px 10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.header-title{font-size:14px;font-weight:700;color:var(--accent-dark);letter-spacing:.04em;margin-bottom:9px}
.search-row{display:flex;gap:8px;align-items:center}
.search-wrap{position:relative;flex:1;max-width:560px}
.search-wrap input{width:100%;height:36px;padding:0 12px 0 32px;border:1.5px solid var(--border);border-radius:7px;font-size:13px;font-family:inherit;background:var(--surface);color:var(--text);outline:none;transition:border-color .15s}
.search-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(45,106,79,.1)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;font-size:13px}
.clear-btn{height:36px;padding:0 12px;border:1.5px solid var(--border);border-radius:7px;background:var(--surface);color:var(--text2);cursor:pointer;font-size:12px;font-family:inherit;white-space:nowrap;transition:all .12s}
.clear-btn:hover{border-color:var(--border2);background:var(--surface2)}
.sort-row{display:flex;gap:5px}
.sort-btn{height:28px;padding:0 9px;border:1.5px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text2);font-size:11px;cursor:pointer;font-family:inherit;transition:all .12s}
.sort-btn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.stats-row{display:flex;gap:8px;margin-top:8px;align-items:center;flex-wrap:wrap}
.stat{background:var(--accent-light);border-radius:5px;padding:3px 9px;font-size:11px;color:var(--accent-dark);font-weight:500}
.stat strong{font-weight:700;margin-right:2px}
.active-tags{display:flex;gap:5px;flex-wrap:wrap}
.active-tag{display:inline-flex;align-items:center;gap:4px;height:22px;padding:0 8px;background:var(--accent);color:#fff;border-radius:20px;font-size:11px;font-weight:500}
.active-tag .rm{cursor:pointer;opacity:.8;font-size:12px;line-height:1;margin-left:1px}
.active-tag .rm:hover{opacity:1}
.tag-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;flex-wrap:wrap;gap:6px}
.tag-bar-unused{}
.tag-bar-unused2{}
.tag{display:inline-flex;align-items:center;gap:4px;height:26px;padding:0 10px;border:1.5px solid var(--border);border-radius:20px;font-size:11.5px;font-weight:500;cursor:pointer;transition:all .12s;background:var(--surface);color:var(--text2);user-select:none;white-space:nowrap}
.tag:last-child{margin-right:0}
.tag:hover{border-color:var(--border2);background:var(--surface2)}
.tag.on{border-color:var(--accent);background:var(--accent-light);color:var(--accent)}
.tag.zero{opacity:.3;pointer-events:none}
.tag .cnt{font-size:10px;opacity:.55;font-weight:400;margin-left:1px}
.result-area{padding:12px 20px 60px}
.result-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.result-count{font-size:12px;color:var(--text3)}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:13px;cursor:pointer;transition:all .15s}
.card:hover{border-color:var(--accent);box-shadow:0 3px 12px rgba(45,106,79,.12);transform:translateY(-1px)}
.card-name{font-size:13.5px;font-weight:700;line-height:1.35;margin-bottom:1px}
.card-cn{font-size:10.5px;color:var(--text3);margin-bottom:3px}
.card-code{font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--text3);margin-bottom:7px}
.card-specimen{font-size:11px;color:var(--text2);padding:3px 7px;background:var(--surface2);border-radius:4px;display:inline-block;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:5px}
.card-rv{font-size:11px;color:var(--text3);line-height:1.5;margin-top:5px;padding-top:5px;border-top:1px solid var(--surface2);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:7px}
.ctag{display:inline-block;padding:1px 6px;border-radius:10px;font-size:10px;font-weight:500;background:var(--accent-light);color:var(--accent)}
.card-footer{display:flex;justify-content:space-between;align-items:center;margin-top:7px;padding-top:5px;border-top:1px solid var(--surface2)}
.card-rt{font-size:10px;color:var(--text3)}
.card-unit{font-size:10px;color:var(--text3);text-align:right;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:55%}
.pg{display:flex;gap:5px;align-items:center;margin-top:18px;flex-wrap:wrap;font-size:12px}
.pg button{height:27px;min-width:27px;padding:0 7px;border:1.5px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);cursor:pointer;font-family:inherit;font-size:12px;transition:all .12s}
.pg button:hover{background:var(--surface2)}
.pg button.cur{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.pg button:disabled{opacity:.3;cursor:default}
.pg-info{color:var(--text3)}
.no-result{text-align:center;padding:60px 20px;color:var(--text3);grid-column:1/-1;font-size:14px}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;align-items:flex-start;justify-content:center;padding:24px 16px;overflow-y:auto}
.overlay.open{display:flex}
.modal{background:var(--surface);border-radius:14px;max-width:680px;width:100%;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.22);position:relative}
.modal-head{padding:18px 20px 14px;border-bottom:1.5px solid var(--border);background:linear-gradient(135deg,var(--accent-light) 0%,var(--surface) 100%)}
.modal-head h2{font-size:17px;font-weight:700;margin-bottom:2px;line-height:1.3;padding-right:44px;color:var(--accent-dark)}
.modal-head .modal-cn{font-size:12.5px;color:var(--text2);margin-bottom:2px}
.modal-head .code-line{font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--text3)}
.modal-close{position:absolute;top:14px;right:14px;width:28px;height:28px;border:1.5px solid var(--border);border-radius:7px;background:var(--surface);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:all .12s}
.modal-close:hover{background:var(--surface2)}
.modal-body{padding:16px 20px 24px;overflow-y:auto;max-height:calc(85vh - 90px)}
.range-box{background:var(--accent-light);border:1.5px solid var(--accent-mid);border-radius:8px;padding:10px 13px;margin-bottom:14px}
.range-label{font-size:9.5px;font-weight:700;color:var(--accent);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
.range-val{font-size:11.5px;color:var(--text);font-family:"JetBrains Mono",monospace;white-space:pre-wrap;line-height:1.6}
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px}
.meta-item{background:var(--surface2);border-radius:7px;padding:8px 10px}
.meta-label{font-size:9px;color:var(--text3);font-weight:700;letter-spacing:.07em;text-transform:uppercase;margin-bottom:2px}
.meta-value{font-size:12px;font-weight:500;color:var(--text);line-height:1.45}
.section{margin-bottom:14px}
.section-title{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:5px;display:flex;align-items:center;gap:5px}
.section-title::before{content:"";width:3px;height:11px;background:var(--accent);border-radius:2px;display:inline-block}
.section-content{font-size:12.5px;color:var(--text);line-height:1.8;white-space:pre-wrap;word-break:break-word}
@media(max-width:600px){.meta-grid{grid-template-columns:1fr}.cards{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="header">
  <div class="header-title">🔬 檢驗項目查詢系統</div>
  <div class="search-row">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input id="q" placeholder="輸入檢驗名稱、代碼、健保編號、採集容器…" oninput="onSearch()">
    </div>
    <button class="clear-btn" onclick="clearAll()">清除篩選</button>
    <div class="sort-row">
      <button class="sort-btn on" id="sb-rel" onclick="setSortBy('rel')">相關度</button>
      <button class="sort-btn" id="sb-name" onclick="setSortBy('name')">名稱</button>
    </div>
  </div>
  <div class="stats-row">
    <div class="stat"><strong id="sc">0</strong>筆符合</div>
    <div class="stat">共 <strong>491</strong> 個項目</div>
    <div class="active-tags" id="active-tags"></div>
  </div>
</div>
<div class="tag-bar" id="tagbar"></div>
<div class="result-area">
  <div class="result-header"><div class="result-count" id="rc"></div></div>
  <div class="cards" id="cards"></div>
  <div class="pg" id="pg"></div>
</div>
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-head">
      <h2 id="m-name"></h2>
      <div class="modal-cn" id="m-cn"></div>
      <div class="code-line" id="m-code"></div>
      <button class="modal-close" onclick="closeModalBtn()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>
<script>

性反應表示尿中有超過 105/ml 的微生 物，可作為 UTI 的指標 (膀胱炎上行到輸尿管、腎孟和腎臟，會造成腎臟組織損傷、 腎功能減少、高血壓、敗血症等)，亦可作為抗生素治療的監測指標、反復性感染的 定期檢查與 UTI 高危險群(如糖尿病、懷孕婦人等)的監測。 5、蛋白質( Protein)：當尿蛋白增加時，表示腎臟可能有問題，如腎絲球膜的損傷、腎小 管再吸收障礙。此外，泌尿道結石、全身性紅斑性狼瘡、多發性骨髓瘤、初期子癩症 等疾病亦會出現蛋白尿；有些蛋白尿發生沒有致病性意義，如寒冷、劇烈運動、發 燒、脫水、嚴重疾病時期，懷疑此種情形則須反覆偵測。有些蛋白尿與姿勢有關，直 立時出現，平躺時消失。 6、葡萄糖(Glucose)：當血糖濃度高於 180 mg/dL 的腎閾值以上，腎小管無法再吸收濾液 中的葡萄糖，尿中就會出現葡萄糖，因此任何陽性反應都應做進一步檢查。 7、酮體(Ketone Bodies)：一般人尿中並無 ketone bodies 存在，但在醣類代謝發生障礙 時，會由脂肪代謝產生能量供給身體所需，於是脂肪的代謝物 ketone bodies便在體內 堆積，進而排至尿液中。因此，在糖尿病酮酸中毒、外科手術後，腸胃障礙、饑餓、 嘔吐等情況，均容易檢出尿酮體。 8、尿膽素原(Urobilinogen)：在運動、飲酒、疲勞、便秘等狀況可能出現陽性結果，健康 個體亦可能分泌少量的尿膽素原。Urobilinogen 的測定有助於肝臟疾病、溶血性疾病 及膽道阻塞等疾病的確認，若與 Bilirubin 一起判讀，更有利於診斷。 9、膽紅素(Bilirubin)：由於 Direct bilirubin 為水溶性，可由腎排至尿中，正常人尿中約有 0.02ml/dl，低於測試敏感度。當膽道阻塞時，肝臟無法將 Direct bilirubin 排到膽汁 裡，血及尿中 bilirubin 便增加。溶血性貧血者，雖然血中 indirect bilirubin 濃度會上 升，但肝可將轉換成 Direct bilirubin 並排至膽汁中，因此尿中會增加 urobilinogen，而 bilirubin 仍維持正常，即使尿液中出現十分少量的膽紅素，也應視作有意義。 10、潛血(Blood) ： 10.1 血尿：當腎生殖泌尿道出血、外傷或器官損傷時，尿中出現大量 RBC 稱為血尿 (hematuria)如腎結石腎絲球疾病、腫瘤、外傷、腎孟腎炎、曝露在化學毒性中、 激烈運動、月經等。 10.2 血紅素尿(Hemoglobinuria)：尿中並無完整的 RBC，僅出現大量血色素，如溶血性 貧血、輸血反應、嚴重燒傷、感染、激烈運動。 10.3 肌紅蛋白尿(Myoglobinuria)：肌肉組織的蛋白質由於肌肉組織受破壞造成，如外 傷、長時間昏迷、抽筋、肌肉代謝疾病。", "notes": "1.檢體的比重會隨溫度而改變，所以尿液檢體的溫度必須在室溫下操作。 2.檢體收集的容器若殘留強氧化性的消毒劑，會造成葡萄糖和潛血呈現偽陽性。 3. 當出現血尿或膿尿的情況下，可能會影響尿液化學試驗呈色結果，故先將尿液離 心 1500g 5 分鐘，再上機操作化學試驗，判讀尿沉渣，並在報告備註欄位註明血尿或 膿尿。", "n": "General Urine Examination", "tags": ["生化", "感染", "肝臟", "腎臟", "腫瘤標記", "血液學", "尿液", "貧血", "心臟", "糖尿病", "輸血/血型"]}, {"cn": "健大黴素", "c": "T05XJ518", "ins": "10518B", "sp": "Plasma（血漿）", "ct": "EDTA 管", "d": "標準檢體量 3ml；最低檢體量 2ml", "g": "大安聯合醫事檢驗所代", "st": "不限", "rt": "3 個工作天", "rv": "4.0-10.0 ug/mL at peak", "cl": "Gentamicin 經由腎臟排泄，可以累積在腎小管細胞，具耳、腎毒性。Gentamicin 半衰期 2-3 小 時，約 10-15 小時可以到達 steady-state，一般是在用藥 40 小時後檢驗(tid or bid)，抗生素治療 藥物濃度偵測是在下一次用藥前採檢看低值，看是否超過中毒濃度，然後在用藥後 30 分鐘至 3 小時(IV)或 15-60 分鐘(IM)，檢驗高峰濃度。 中毒時，透析可以清除 gentamicin。", "notes": "（1）抽血後 1 小時內離心，分裝血漿至康試管。 （2）檢體退件：溶血 4+；錯誤的血漿檢體。", "n": "Gentamycin", "tags": ["腎臟"]}, {   body+='</div>';
  if(it.cl) body+=`<div class="section"><div class="section-title">臨床意義</div><div class="section-content">${esc(it.cl)}</div></div>`;
  if(it.notes) body+=`<div class="section"><div class="section-title">注意事項</div><div class="section-content">${esc(it.notes)}</div></div>`;
  if(it.tags&&it.tags.length) body+=`<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:10px">${it.tags.map(t=>`<span class="ctag">${TAG_EMOJI[t]||''} ${esc(t)}</span>`).join('')}</div>`;
  document.getElementById('modal-body').innerHTML=body;
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(e){if(e.target===document.getElementById('overlay')) closeModalBtn();}
function closeModalBtn(){document.getElementById('overlay').classList.remove('open');document.body.style.overflow='';}
document.addEventListener('keydown',e=>{if(e.key==='Escape') closeModalBtn();});
applyFilter();
</script>
</body>
</html>
